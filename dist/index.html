    const best = currentDecision.bestRoute;
    const bi = Number(best.index);
    if (!Number.isFinite(bi)) return;
    let pickRaw = null;
    try {
      pickRaw = window.__clearRoadUserPickIndex;
    } catch (_) {
      pickRaw = null;
    }
    const pickNum = pickRaw !== null && pickRaw !== undefined && String(pickRaw) !== "" ? Number(pickRaw) : NaN;
    const onBest =
      selectedRoute && best && Number(selectedRoute.index) === Number(best.index);
    const pickIsBestOrUnset = !Number.isFinite(pickNum) || pickNum === bi;
    if (onBest && pickIsBestOrUnset) return;
    selectDisplayedRoute(bi);
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        try {
          var el = document.querySelector("#alt-routes-panel .dashboard-route-card[data-route-index=\"" + bi + '"]');
          if (!el) el = document.querySelector(".dashboard-route-card[data-route-index=\"" + bi + '"]');
          if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
        } catch (_) {}
      });
    });
  } catch (e) {
    console.warn("selectRecommendedRoute", e);
  }
}
try {
  window.selectRecommendedRoute = selectRecommendedRoute;
} catch (_) {}

function renderResults() {
  const container = document.getElementById("results");
  const quickAccess = document.getElementById("quick-access");
  const aiPanel = document.getElementById("ai-decision-panel");

  function clearAiPlaceholder() {
    const ph = document.getElementById("ai-decision-placeholder");
    if (ph && ph.parentNode) ph.parentNode.removeChild(ph);
  }

  if (!container) return;
  const tk =
    typeof t === "function"
      ? t
      : function(k) {
          return k;
        };
  const lifecycleState = String(document.documentElement.getAttribute("data-route-state") || "").toUpperCase();
  const hasRenderableRoutes =
    Array.isArray(analyzedRoutes) &&
    analyzedRoutes.length > 0 &&
    currentDecision &&
    currentDecision.bestRoute;

  function idlePlaceholderHtml() {
    return (
      '<div class="dashboard-routes-empty-placeholder">' +
      _tz1EscapeHTML(tk("ai_panel_insights_empty")) +
      "</div>"
    );
  }

  function resetAiPanelIdle() {
    if (!aiPanel) return;
    aiPanel.innerHTML =
      '<div class="dashboard-ai-placeholder" id="ai-decision-placeholder">' +
      _tz1EscapeHTML(tk("ai_panel_insights_empty")) +
      "</div>";
  }

  if (lifecycleState === "IDLE") {
    container.innerHTML = idlePlaceholderHtml();
    resetAiPanelIdle();
    if (quickAccess) quickAccess.classList.remove("hidden");
    return;
  }
  if (lifecycleState === "ERROR") {
    if (!hasRenderableRoutes) {
      container.innerHTML = idlePlaceholderHtml();
      if (quickAccess) quickAccess.classList.remove("hidden");
      resetAiPanelIdle();
      return;
    }
  }
  if (!Array.isArray(analyzedRoutes) || !analyzedRoutes.length) {
    container.innerHTML = idlePlaceholderHtml();
    resetAiPanelIdle();
    if (quickAccess) quickAccess.classList.remove("hidden");
    return;
  }

  if (quickAccess) quickAccess.classList.add("hidden");

  // ============================================================
  //  ТЗ-6 — DECISION UI BINDING
  // ============================================================
  if (!currentDecision || !currentDecision.bestRoute) {
    container.innerHTML = idlePlaceholderHtml();
    resetAiPanelIdle();
    return;
  }
  if (!Array.isArray(currentDecision.alternatives)) {
    try { currentDecision.alternatives = []; } catch (_alt) {}
  }

  const best = currentDecision.bestRoute;
  if (!best) {
    container.innerHTML = idlePlaceholderHtml();
    resetAiPanelIdle();
    return;
  }
  const decisionBestIndex = Number(best.index);
  let matchedBest = best;
  if (Number.isFinite(decisionBestIndex)) {
    const found = analyzedRoutes.find(function(route) { return route && Number(route.index) === decisionBestIndex; });
    if (found) {
      matchedBest = found;
      _bestRoute = found;
    }
  }
  let pickIdx = null;
  try {
    pickIdx = window.__clearRoadUserPickIndex;
  } catch (_) {
    pickIdx = null;
  }
  const pickNum = Number(pickIdx);
  if (Number.isFinite(pickNum)) {
    const picked = analyzedRoutes.find(function(route) { return route && Number(route.index) === pickNum; });
    if (picked) {
      selectedRoute = picked;
    } else {
      try {
        window.__clearRoadUserPickIndex = null;
      } catch (_) {}
      try {
        window.selectedRouteId = null;
      } catch (_) {}
      selectedRoute = matchedBest;
    }
  } else {
    selectedRoute = matchedBest;
  }
  try {
    if (selectedRoute && selectedRoute.id != null) window.selectedRouteId = selectedRoute.id;
    else if (selectedRoute && Number.isFinite(selectedRoute.index))
      window.selectedRouteId = "route-" + (Number(selectedRoute.index) + 1);
  } catch (_sid) {}
  const decisionAlternatives = tz8GetDecisionAlternatives(currentDecision, best, analyzedRoutes);
  if (currentDecision) currentDecision.alternatives = decisionAlternatives;

  const altRefs = crAltRoutesComputeRefs(analyzedRoutes);

  const panelRoute =
    selectedRoute && analyzedRoutes.some(function(r) { return r && selectedRoute && Number(r.index) === Number(selectedRoute.index); })
      ? selectedRoute
      : best;
  crRefreshRoutesSalikPricing(analyzedRoutes);
  const aiHero = crBuildAiHeroCopy(panelRoute, matchedBest, analyzedRoutes);

  if (aiPanel) {
    clearAiPlaceholder();
    const salikExtras =
      (aiHero.salikLine
        ? '<p class="dashboard-ai-compact-line dashboard-ai-salik-compare" id="ai-hero-salik">' +
          _tz1EscapeHTML(aiHero.salikLine) +
          "</p>"
        : "") +
      (aiHero.salikPick
        ? '<p class="dashboard-ai-compact-rec dashboard-ai-salik-pick" id="ai-hero-salik-pick">' +
          _tz1EscapeHTML(aiHero.salikPick) +
          "</p>"
        : "") +
      (aiHero.salikDisclaimer
        ? '<p class="dashboard-ai-salik-disclaimer">' + _tz1EscapeHTML(aiHero.salikDisclaimer) + "</p>"
        : "");
    aiPanel.innerHTML =
      '<div class="dashboard-ai-inner decision-hero" data-bound-to="currentDecision" data-best-route-index="' +
      _tz1EscapeHTML(String(best.index)) +
      '" data-selected-route-index="' +
      _tz1EscapeHTML(String(panelRoute && Number.isFinite(panelRoute.index) ? panelRoute.index : "")) +
      '">' +
      '<p class="dashboard-ai-compact-title" id="ai-hero-title">' +
      _tz1EscapeHTML(aiHero.title) +
      "</p>" +
      '<p class="dashboard-ai-compact-line dashboard-ai-text" id="ai-hero-decision">' +
      _tz1EscapeHTML(aiHero.decision) +
      "</p>" +
      '<p class="dashboard-ai-compact-rec" id="ai-hero-reason">' +
      _tz1EscapeHTML(aiHero.reason) +
      "</p>" +
      salikExtras +
      '<button type="button" class="dashboard-ai-primary-btn" id="ai-default-cta" onclick="selectRecommendedRoute()">' +
      _tz1EscapeHTML(tk("ai_default_route_cta")) +
      "</button>" +
      "</div>";
  }

  let h = "";
  h += '<div class="predictive-card" id="predictive-card" style="display:none"><div class="pc-icon">&#9200;</div><div class="pc-content"><div class="pc-title">' + _tz1EscapeHTML(t("dh_pred_title")) + '</div><div class="pc-main" id="pc-main"></div><div class="pc-sub" id="pc-sub"></div></div><div class="pc-save" id="pc-save"></div></div>';

  h += crRenderAlternativeRoutesListHtml(analyzedRoutes, best, selectedRoute, altRefs);

  h += '<div class="predict-tip" id="predict-tip" style="display:none"></div>';
  h +=
    '<div id="other-routes-section" class="other-routes tz8-visible expanded dashboard-other-routes-stub" aria-hidden="true"></div>';

  container.innerHTML = h;
  if (typeof crNormalizeDurationNode === "function") {
    try { crNormalizeDurationNode(document); } catch (_e) {}
  }

  if (typeof renderPredictiveDecision === "function") {
    try { renderPredictiveDecision(); } catch (e) { console.warn("predictive render skipped", e); }
  }
}

</script>

<script id="cr-route-compare-modal-ui">
// ТЗ-2 [v04] — якорь «ТЗ-8 — RESTORE ALTERNATIVES + ROUTE COMPARE UI»: модалка деталей / сравнение (openRouteDetails, toggleAlternatives).
// Порядок: после cr-render-results-decision-ui, до cr-drive-start-nav-entry.
// Зависит от main: tz1EtaDiffMinutes, analyzedRoutes, currentDecision, _bestRoute, generateNeutralWhy,
// generateDecisionInsight, _tz2BuildTradeOff, buildRouteSegments, isMeaningfulManeuver, t(), _tz1EscapeHTML, _tz1Minutes, …
// и от cr-route-cards-ui-cleanup: tz8RouteDistanceKm, tz9RouteCharacter.

function tz10SafeNumber(value, fallback) {
  const n = Number(value);
  return Number.isFinite(n) ? n : fallback;
}

function tz10RouteSteps(route) {
  try {
    return (route && route.route && route.route.legs && route.route.legs[0] && route.route.legs[0].steps) || [];
  } catch (e) { return []; }
}

function tz10StepText(step) {
  return String((step && (step.instructions || step.html_instructions)) || "")
    .replace(/<[^>]*>/g, " ")
    .replace(/&nbsp;/g, " ")
    .replace(/&amp;/g, "&")
    .replace(/\s+/g, " ")
    .trim();
}

function tz10RouteDetailsViewModel(r, best) {
  const steps = tz10RouteSteps(r);
  const bestMin = best ? _tz1Minutes(best) : _tz1Minutes(r);
  const thisMin = _tz1Minutes(r);
  const diff = tz1EtaDiffMinutes(r, best || r);
  const distanceKm = tz8RouteDistanceKm(r) || (r.distance ? Math.round((r.distance / 1000) * 10) / 10 : 0);
  const delay = tz10SafeNumber(r.delayMinutes, 0);
  const score = Math.round(tz10SafeNumber(r.decisionScore, tz10SafeNumber(r.score, 0)));
  const turns = tz10SafeNumber(r.complexity, tz10SafeNumber(r.stopsCount, steps.length));
  const traffic = toTitleCaseLabel(getTrafficText(r.traffic || r.trafficLevel || r.trafficLabel || "medium"));
  const highwayPct = Math.round(tz10SafeNumber(r.highwayShare, 0) * 100);
  const routeTitle = getRouteSummaryName(r);
  const isBest = best && r.index === best.index;
  const whyPoints = Array.isArray(r.whyPoints) && r.whyPoints.length ? r.whyPoints : generateNeutralWhy(r, best || r);
  const trade = isBest ? (r.tradeOff || _tz2BuildTradeOff(r, r, analyzedRoutes)) : generateDecisionInsight(r, best || r);
  const character = typeof tz9RouteCharacter === "function" ? tz9RouteCharacter(r, best || r) : "ROUTE OPTION";
  return { steps, bestMin, thisMin, diff, distanceKm, delay, score, turns, traffic, highwayPct, routeTitle, isBest, whyPoints, trade, character };
}

function tz10RenderRouteBreakdown(vm) {
  const delayText = vm.delay <= 0 ? "0 min" : "+" + vm.delay + " min";
  const diffText = vm.isBest ? "Best route" : (vm.diff <= 0 ? "Same as best" : "+" + vm.diff + " min vs best");
  return `
    <div class="detail-section">
      <div class="detail-section-title">Route metrics</div>
      <div class="tz10-breakdown-grid">
        <div class="tz10-breakdown-item"><div class="tz10-breakdown-title">ETA comparison</div><div class="tz10-breakdown-value">${_tz1EscapeHTML(diffText)}</div></div>
        <div class="tz10-breakdown-item"><div class="tz10-breakdown-title">Traffic</div><div class="tz10-breakdown-value">${_tz1EscapeHTML(vm.traffic)}</div></div>
        <div class="tz10-breakdown-item"><div class="tz10-breakdown-title">Delay</div><div class="tz10-breakdown-value">${_tz1EscapeHTML(delayText)}</div></div>
        <div class="tz10-breakdown-item"><div class="tz10-breakdown-title">Turns / actions</div><div class="tz10-breakdown-value">${_tz1EscapeHTML(vm.turns)}</div></div>
        <div class="tz10-breakdown-item"><div class="tz10-breakdown-title">Highway share</div><div class="tz10-breakdown-value">${_tz1EscapeHTML(vm.highwayPct)}%</div></div>
        <div class="tz10-breakdown-item"><div class="tz10-breakdown-title">Route type</div><div class="tz10-breakdown-value">${_tz1EscapeHTML(vm.character)}</div></div>
      </div>
    </div>`;
}

function tz10RenderKeySteps(vm) {
  const meaningful = vm.steps
    .map(function(step, i) { return { step, i, text: tz10StepText(step) }; })
    .filter(function(x) { return x.text && (isMeaningfulManeuver(x.step, { }) || /exit|ramp|merge|keep|left|right|u-turn|fork/i.test(x.text)); })
    .slice(0, 5);
  const picked = meaningful.length ? meaningful : vm.steps.slice(0, 4).map(function(step, i) { return { step, i, text: tz10StepText(step) || "Continue on route" }; });
  if (!picked.length) return "";
  return `
    <div class="detail-section">
      <div class="detail-section-title">Key driving actions</div>
      <div class="segment-list">
        ${picked.map(function(item) {
          const dist = item.step && item.step.distance && item.step.distance.text ? item.step.distance.text : "";
          const dur = item.step && item.step.duration && item.step.duration.text ? item.step.duration.text : "";
          const details = [dist, dur].filter(Boolean).join(" · ") || "route step";
          return `<div class="segment-item"><div class="segment-icon turns">&#10148;</div><div class="segment-content"><div class="segment-title">${_tz1EscapeHTML(item.text)}</div><div class="segment-details">${_tz1EscapeHTML(details)}</div></div></div>`;
        }).join("")}
      </div>
      <div class="tz10-segment-note">These are the most important visible instructions from the route steps. Full turn-by-turn stays in Drive Mode.</div>
    </div>`;
}

function openRouteDetails(index) {
  const r = analyzedRoutes.find(function(x) { return x.index === index; });
  if (!r) return;

  const best = currentDecision && currentDecision.bestRoute ? currentDecision.bestRoute : _bestRoute;
  const vm = tz10RouteDetailsViewModel(r, best || r);
  const segments = buildRouteSegments(r);
  const tollText = r.tollCost > 0 ? `${r.tollCost} AED` : "No tolls";
  const delayText = vm.delay === 0 ? "0 min" : `+${vm.delay} min`;

  const compareNote = !vm.isBest
    ? `<div class="comparison-note">${_tz1EscapeHTML(vm.trade)}</div>`
    : `<div class="tz10-score-box"><div><div class="tz10-score-main">Recommended by Decision Engine</div><div class="tz10-score-sub">${_tz1EscapeHTML(vm.trade)}</div></div><div class="tz10-score-number">#1</div></div>`;

  const segmentsHtml = segments.length > 0 ? `
    <div class="detail-section">
      <div class="detail-section-title">Route breakdown</div>
      <div class="segment-list">
        ${segments.map(function(seg) { return `
          <div class="segment-item">
            <div class="segment-icon ${seg.type}">${seg.icon}</div>
            <div class="segment-content">
              <div class="segment-title">${_tz1EscapeHTML(seg.title)}</div>
              <div class="segment-details">${_tz1EscapeHTML(seg.details)}</div>
            </div>
          </div>`; }).join("")}
      </div>
    </div>
  ` : "";

  const modal = document.getElementById("modal-content");
  if (!modal) return;
  modal.classList.add("tz10-details");
  modal.innerHTML = `
    <div class="modal-handle"></div>

    <div class="modal-header">
      <div>
        <h2 class="modal-title">${_tz1EscapeHTML(vm.routeTitle)}</h2>
        <div class="tz10-modal-subtitle">${_tz1EscapeHTML(vm.character)} · ${_tz1EscapeHTML(vm.distanceKm)} km · ${_tz1EscapeHTML(vm.traffic)}</div>
      </div>
      <span class="modal-role-badge ${vm.isBest ? "recommended" : "alternative"}">
        ${vm.isBest ? t("modal_recommended") : t("modal_alternative")}
      </span>
    </div>

    <div class="tz10-summary-strip">
      <div class="tz10-summary-item"><div class="tz10-summary-label">ETA</div><div class="tz10-summary-value">${vm.thisMin} min</div></div>
      <div class="tz10-summary-item"><div class="tz10-summary-label">Distance</div><div class="tz10-summary-value">${vm.distanceKm} km</div></div>
      <div class="tz10-summary-item"><div class="tz10-summary-label">Score</div><div class="tz10-summary-value">${vm.score}</div></div>
    </div>

    ${compareNote}

    <div class="modal-why">
      <div class="modal-why-title">${vm.isBest ? t("modal_why_title") : t("modal_tradeoff")}</div>
      <ul class="modal-why-points">
        ${vm.whyPoints.map(function(point) { return `<li>${_tz1EscapeHTML(point)}</li>`; }).join("")}
      </ul>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">${t("modal_key_facts")}</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-label">${t("modal_time")}</div><div class="detail-value">${vm.thisMin} min</div></div>
        <div class="detail-item"><div class="detail-label">${t("modal_distance")}</div><div class="detail-value">${vm.distanceKm} km</div></div>
        <div class="detail-item"><div class="detail-label">${t("modal_delay")}</div><div class="detail-value">${_tz1EscapeHTML(delayText)}</div></div>
        <div class="detail-item"><div class="detail-label">${t("modal_tolls")}</div><div class="detail-value" style="font-size:14px">${_tz1EscapeHTML(tollText)}</div></div>
        <div class="detail-item"><div class="detail-label">${t("modal_traffic")}</div><div class="detail-value" style="font-size:14px">${_tz1EscapeHTML(vm.traffic)}</div></div>
        <div class="detail-item"><div class="detail-label">${t("modal_turns")}</div><div class="detail-value">${_tz1EscapeHTML(vm.turns)}</div></div>
        <div class="detail-item full-width"><div class="detail-label">${t("modal_highway")}</div><div class="detail-value">${vm.highwayPct}%</div></div>
      </div>
    </div>

    ${tz10RenderRouteBreakdown(vm)}
    ${segmentsHtml}
    ${tz10RenderKeySteps(vm)}

    <div class="tz10-modal-actions">
      <button class="tz10-secondary-btn" onclick="closeModal({target:document.getElementById('modal-overlay')})">Close</button>
      <button class="modal-cta" onclick="startDrive(${r.index})">${vm.isBest ? `${t("modal_go")} ${_tz1EscapeHTML(vm.routeTitle)}` : `${t("modal_try")} ${_tz1EscapeHTML(vm.routeTitle)}`}</button>
    </div>
  `;

  document.getElementById("modal-overlay").classList.add("visible");
}

function closeModal(event) {
  if (event.target.id === "modal-overlay" || event.target.classList.contains("modal-cta")) {
    document.getElementById("modal-overlay").classList.remove("visible");

}

function toggleAlternatives() {

  }
}

<script id="cr-predictive-layer">
// cr-predictive-layer.js — extracted from input/index.html (main inline script).
// External module; depends on globals (script order in input / ТЗ-0).



// ============================================================
//  DAY 6.5 — Predictive Engine (+15 min departure)
// ============================================================

function getDepartureDecision(nowMin, laterMin, waitMinutes = 15) {
  const saving = nowMin - laterMin;

  if (saving >= 3) {
    return {
      type: "wait",
      waitMinutes,
      nowMin,
      laterMin,
      saving,
      confidence: "high",
      message: `Wait ${waitMinutes} min → smoother trip and save ${saving} min`
    };
  }

  if (saving <= -3) {
    return {
      type: "leave_now",
      waitMinutes,
      nowMin,
      laterMin,
      saving: Math.abs(saving),
      confidence: "high",
      message: `Leave now → traffic likely gets heavier soon`
    };
  }

  return {
    type: "neutral",
    waitMinutes,
    nowMin,
    laterMin,
    saving,
    confidence: "low",
    message: "No strong timing advantage"
  };
}

function renderPredictiveDecision() {
  var box = document.getElementById("predict-tip");
  if (box) { box.style.display = "none"; box.innerHTML = ""; }

  var card = document.getElementById("predictive-card");
  if (!card) return;

  // ---- helpers for inline hero wait-hint ----
  var waitHint  = document.getElementById("dh-wait-hint");
  var waitTimes = document.getElementById("dh-wait-times");
  var waitSave  = document.getElementById("dh-wait-save");

  function _hideWaitHint() {
    if (waitHint) waitHint.style.display = "none";
  }
  function _showWaitHint(timesText, saveText) {
    if (!waitHint) return;
    if (waitTimes) waitTimes.textContent = timesText;
    if (waitSave)  waitSave.textContent  = saveText;
    waitHint.style.display = "block";
  }

  if (!_departureDecision || _departureDecision.type === "neutral") {
    card.style.display = "none";
    _hideWaitHint();
    return;
  }

  var pcMain = document.getElementById("pc-main");
  var pcSub  = document.getElementById("pc-sub");
  var pcSave = document.getElementById("pc-save");

  if (_departureDecision.type === "wait" && _predictiveData) {
    // update inline hero hint
    var saving = (_predictiveData.nowMin || 0) - (_predictiveData.laterMin || 0);
    var timesText = "Wait " + _predictiveData.waitMinutes + " min \u2192 " + _predictiveData.laterMin + " min";
    var saveText  = saving > 0 ? "Save " + saving + " min" : "";
    _showWaitHint(timesText, saveText);

    // update predictive-card (action buttons)
    card.style.display = "flex";
    var titleEl = card.querySelector(".pc-title");
    if (titleEl) titleEl.textContent = "BETTER OPTION AHEAD";
    if (pcMain) pcMain.textContent = "Leave in " + _predictiveData.waitMinutes + " min \u2192 " + _predictiveData.laterMin + " min";
    if (pcSave && saving > 0) pcSave.textContent = "Save " + saving + " min";
    else if (pcSave) pcSave.textContent = "";
    if (pcSub) {
      var subHtml = _departureDecision.message;
      subHtml += '<div class="pc-actions">';
      subHtml += '<button type="button" class="pc-action-btn primary" onclick="scheduleDelayedStart()">Wait &amp; go later</button>';
      subHtml += '<button type="button" class="pc-action-btn secondary" onclick="goNowDecision()">Go now</button>';
      subHtml += "</div>";
      subHtml += '<div id="delayed-start-status" style="margin-top:8px;font-size:12px;color:#94a3b8;"></div>';
      pcSub.innerHTML = subHtml;
    }
    return;
  }

  if (_departureDecision.type === "leave_now") {
    _hideWaitHint();
    card.style.display = "flex";
    var titleEl2 = card.querySelector(".pc-title");
    if (titleEl2) titleEl2.textContent = "AI TIMING ADVICE";
    if (pcMain) pcMain.textContent = _departureDecision.message;
    if (pcSub) {
      pcSub.innerHTML = '<div class="pc-actions"><button type="button" class="pc-action-btn primary" onclick="goNowDecision()">Go now</button></div>';
    }
    if (pcSave) pcSave.textContent = "";
  }
}


function goNowDecision() {
  if (!_bestRoute) return;
  clearDelayedStartTimer();
  startDrive(_bestRoute.index);
}

function scheduleDelayedStart() {
  if (!_bestRoute || !_departureDecision || _departureDecision.type !== "wait") return;

  clearDelayedStartTimer();

  const waitMs = _departureDecision.waitMinutes * 60 * 1000;
  _delayedStartUntil = Date.now() + waitMs;

  updateDelayedStartStatus();

  _delayedStartTimer = setInterval(() => {
    const remainingMs = _delayedStartUntil - Date.now();

    if (remainingMs <= 0) {
      clearDelayedStartTimer();
      startDrive(_bestRoute.index);
      return;
    }

    updateDelayedStartStatus();
  }, 1000);
}

function updateDelayedStartStatus() {
  const el = document.getElementById("delayed-start-status");
  if (!el || !_delayedStartUntil) return;

  const remainingMs = Math.max(0, _delayedStartUntil - Date.now());
  const totalSec = Math.ceil(remainingMs / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;

  el.textContent = `Starting in ${min}:${String(sec).padStart(2, "0")}`;
}

function clearDelayedStartTimer() {
  if (_delayedStartTimer) {
    clearInterval(_delayedStartTimer);
    _delayedStartTimer = null;
  }
  _delayedStartUntil = null;
}

function runPredictiveCheck(origin, destination, nowBestMin) {
  _predictiveData = null;
  _departureDecision = null;

  if (!directionsService || !origin || !destination) return;

  const waitMinutes = 15;

  directionsService.route({
    origin,
    destination,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: false,
    drivingOptions: {
      departureTime: new Date(Date.now() + waitMinutes * 60 * 1000),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK" || !result.routes?.length) {
      renderPredictiveDecision();
      return;
    }

    const leg = result.routes[0].legs[0];
    const laterSec = (leg.duration_in_traffic || leg.duration).value;
    const laterMin = Math.round(laterSec / 60);

    _predictiveData = { laterMin, nowMin: nowBestMin, saving: nowBestMin - laterMin };
    _departureDecision = getDepartureDecision(nowBestMin, laterMin, waitMinutes);

    renderPredictiveDecision();
  });
}

</script>

<script id="cr-routing-core">
// cr-routing-core.js — extracted from input/index.html (main inline script).
// External module; depends on globals (script order in input / ТЗ-0).

function clearRoutes() {
  renderers.forEach(r => r.setMap(null));
  renderers = [];
  analyzedRoutes = [];
  selectedRoute = null;
  _bestRoute = null;
  _fastestRoute = null;
  currentDecision = null;
  activeDriveRouteIndex = null;
  activeDriveRouteSnapshot = null;
  try { window.__CLEAR_ROAD_AI_DECISION_STICKY__ = null; } catch (_) {}
  try { window.__clearRoadUserPickIndex = null; } catch (_) {}
  try { window.selectedRouteId = null; } catch (_) {}
  try {
    lastDriveDirectionsRequestAt = 0;
    _driveDisplayedEtaMin = null;
    _driveEtaSmoothLastAt = 0;
  } catch (_) {}
}

// ============================================================
//  ROUTE ANALYSIS + RENDERING
// ============================================================

function calculateRoutes() {
  clearRoutes();

  const start = document.getElementById("start").value.trim();
  const end = document.getElementById("end").value.trim();

  // ТЗ5: detect parking type (does NOT affect route selection)
  _parkingType = detectParkingType(end);

  if (!start || !end) {
    document.getElementById("results").innerHTML = "";
    return;
  }

  document.getElementById("results").innerHTML = '<div class="loading">Finding best routes...</div>';

  directionsService.route({
    origin: start,
    destination: end,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK") {
      document.getElementById("results").innerHTML = `<div class="error">Could not find route: ${status}</div>`;
      return;
    }

    const routeData = extractRoutesFromDirectionsResult(result);
    const extractionCheck = validateExtractedRoutes(routeData);
    if (!extractionCheck.ok) {
      document.getElementById("results").innerHTML = `<div class="error">${extractionCheck.message}</div>`;
      return;
    }

    currentDirectionsResult = result;

    analyzedRoutes = routeData.map((data, i) => {
      const route = data.rawRoute || data.route;
      const leg = data.rawLeg || (route && route.legs ? route.legs[0] : null);
      const metrics = calculateRouteMetrics(route, leg, route);
      return normalizeRoute({
        ...data,
        id: data.id || `route-${i + 1}`,
        route,
        index: i,
        displayIndex: i + 1,
        duration: data.duration,
        duration_in_traffic: data.duration_in_traffic,
        distance: data.distance,
        legs: data.legs,
        steps: data.steps,
        extractedRoute: data,
        ...metrics
      }, i);
    });

    const normalizationCheck = validateNormalizedRoutes(analyzedRoutes);
    if (!normalizationCheck.ok) {
      document.getElementById("results").innerHTML = `<div class="error">${normalizationCheck.message}</div>`;
      return;
    }

    analyzedRoutes = scoreRoutes(analyzedRoutes);

    const scoreCheck = validateScoredRoutes(analyzedRoutes);
    if (!scoreCheck.ok) {
      document.getElementById("results").innerHTML = `<div class="error">${scoreCheck.message}</div>`;
      return;
    }

    currentDecision = selectBestRouteDecision(analyzedRoutes);
    const decisionCheck = validateAIDecision(currentDecision);
    if (!decisionCheck.ok) {
      document.getElementById("results").innerHTML = `<div class="error">${decisionCheck.message}</div>`;
      return;
    }

    _bestRoute = currentDecision.bestRoute;
    _fastestRoute = [...analyzedRoutes].sort((a, b) => a.time - b.time)[0];
    selectedRoute = _bestRoute;

    // SSOT этап 1: не пересчитывать выбор маршрута вторым buildRealDecision — только WHY-тексты
    analyzedRoutes = applyWhyToRoutes(analyzedRoutes, _bestRoute);

    analyzedRoutes.forEach(r => {
      r.role = getRouteRole(r, _bestRoute, _fastestRoute, analyzedRoutes);
    });

    renderResults();
    drawRoutes(result);

    // Day 6.5: fire predictive check asynchronously — doesn't block current render
    runPredictiveCheck(start, end, getDisplayMinutes(_bestRoute));
  });
}

function drawRoutes(result) {
  renderers.forEach(function(renderer) { renderer.setMap(null); });
  renderers = [];

  const sorted =
    typeof crSortRoutesByIndex === "function"
      ? crSortRoutesByIndex(analyzedRoutes)
      : Array.isArray(analyzedRoutes)
        ? analyzedRoutes.filter(function(r) { return r && Number.isFinite(r.index); })
        : [];
  const best = currentDecision && currentDecision.bestRoute ? currentDecision.bestRoute : _bestRoute;

  let userPicked = false;
  try {
    const v = window.__clearRoadUserPickIndex;
    userPicked = v !== null && v !== undefined && String(v) !== "" && Number.isFinite(Number(v));
  } catch (_) {}

  const focusRoute =
    userPicked && selectedRoute && sorted.some(function(r) { return r && selectedRoute && Number(r.index) === Number(selectedRoute.index); })
      ? selectedRoute
      : null;

  const mapOpts = { userPicked: userPicked };

  sorted.forEach(function(r) {
    if (!r || !Number.isFinite(r.index)) return;
    const poly =
      typeof crRoutePolylineOptionsForMap === "function"
        ? crRoutePolylineOptionsForMap(r, sorted, focusRoute, best, mapOpts)
        : {
            strokeColor: "#3b82f6",
            strokeWeight: 4,
            strokeOpacity: 0.8,
            zIndex: 10
          };
    const showMarkers = userPicked
      ? focusRoute && Number(r.index) === Number(focusRoute.index)
      : best && Number(r.index) === Number(best.index);
    const renderer = new google.maps.DirectionsRenderer({
      map: map,
      directions: result,
      routeIndex: r.index,
      suppressMarkers: !showMarkers,
      preserveViewport: true,
      polylineOptions: {
        strokeColor: poly.strokeColor,
        strokeOpacity: poly.strokeOpacity,
        strokeWeight: poly.strokeWeight,
        zIndex: poly.zIndex
      }
    });
    renderers.push(renderer);
  });

  const boundsTarget = userPicked && focusRoute && focusRoute.route && focusRoute.route.bounds
    ? focusRoute
    : best && best.route && best.route.bounds
      ? best
      : null;
  if (boundsTarget && boundsTarget.route && boundsTarget.route.bounds) {
    try {
      map.fitBounds(boundsTarget.route.bounds, userPicked ? 48 : 32);
    } catch (_fb) {
      try {
        map.fitBounds(boundsTarget.route.bounds);
      } catch (_fb2) {}
    }
  }
}

</script>

<script id="cr-autocomplete-geo">

const AUTOCOMPLETE_DEBOUNCE_MS  = 220;
const STEP_SWITCH_COOLDOWN_MS   = 1800;
const STEP_REACHED_RADIUS_M     = 28;
const NEXT_STEP_PREPARE_RADIUS_M = 180;
const NEXT_STEP_SOON_RADIUS_M   = 90;

let _startInputDebounced   = null;
let _endInputDebounced     = null;
let _lastManualRouteTrigger = 0;

function debounce(fn, delay) {
  let t = null;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay || 220); };
}

function setGpsLoading(on) {
  const btn = document.getElementById("gps-btn");
  if (btn) btn.classList.toggle("gps-loading", !!on);
}

function setGpsResolving(on) {
  const si = document.getElementById("start");
  if (!si) return;
  si.classList.toggle("gps-resolving", !!on);
  si.setAttribute("aria-busy", on ? "true" : "false");
}

function tryCalculateRoutesFromInputs() {
  const now   = Date.now();
  const start = document.getElementById("start")?.value?.trim() || "";
  const end   = document.getElementById("end")?.value?.trim() || "";
  if (!start || !end) return;
  if (now - _lastManualRouteTrigger < 900) return;
  _lastManualRouteTrigger = now;
  calculateRoutes();
}

function wireInputAssist() {
  const startInput = document.getElementById("start");
  const endInput   = document.getElementById("end");
  if (!startInput || !endInput) return;

  if (!_startInputDebounced) {
    _startInputDebounced = debounce(() => {
      const s = startInput.value.trim();
      const e = endInput.value.trim();
      if ((s.length >= 3 || e.length >= 3) && s && e) tryCalculateRoutesFromInputs();
    }, AUTOCOMPLETE_DEBOUNCE_MS);
  }
  if (!_endInputDebounced) {
    _endInputDebounced = debounce(() => {
      const s = startInput.value.trim();
      const e = endInput.value.trim();
      if ((s.length >= 3 || e.length >= 3) && s && e) tryCalculateRoutesFromInputs();
    }, AUTOCOMPLETE_DEBOUNCE_MS);
  }

  if (!startInput.dataset.inputAssistBound) {
    startInput.addEventListener("input", _startInputDebounced);
    startInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); tryCalculateRoutesFromInputs(); }
    });
    startInput.addEventListener("blur", () => tryCalculateRoutesFromInputs());
    startInput.dataset.inputAssistBound = "1";
  }
  if (!endInput.dataset.inputAssistBound) {
    endInput.addEventListener("input", _endInputDebounced);
    endInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); tryCalculateRoutesFromInputs(); }
    });
    endInput.addEventListener("blur", () => tryCalculateRoutesFromInputs());
    endInput.dataset.inputAssistBound = "1";
  }
}

function ensureAutocompleteReady() {
  if (!google?.maps?.places) {
    console.error("[Clear Road UX] Google Places library is not loaded (ensureAutocompleteReady). Same checks as initAutocomplete: libraries=places, legacy Places API for Autocomplete widget.");
    try { window.__CLEAR_ROAD_PLACES_AUTOCOMPLETE_READY__ = false; } catch (_) {}
    try {
      if (typeof window.__clearRoadUxDiagPlaces === "function") {
        window.__clearRoadUxDiagPlaces(false, "places missing in ensureAutocompleteReady");
      }
    } catch (_) {}
    wireInputAssist();
    return;
  }
  if (!startAutocomplete || !endAutocomplete) initAutocomplete();
  wireInputAssist();
}

function _safeLatLngFromPlace(place) {
  try {
    const loc = place && place.geometry && place.geometry.location;
    if (!loc) return null;
    const lat = typeof loc.lat === "function" ? loc.lat() : Number(loc.lat);
    const lng = typeof loc.lng === "function" ? loc.lng() : Number(loc.lng);
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
    return { lat, lng };
  } catch (_) {
    return null;
  }
}

function bindAutocompletePlaceChanged(autocomplete, kind) {
  if (!autocomplete || autocomplete.__patchedPlaceChanged) return;
  autocomplete.addListener("place_changed", () => {
    try {
      const place = autocomplete.getPlace();
      const ll = _safeLatLngFromPlace(place);
      if (!ll) return;

      const input = document.getElementById(kind === "start" ? "start" : "end");
      if (!input) return;

      try {
        const lp = document.getElementById("cr-ac-panel-" + input.id);
        if (lp) lp.style.display = "none";
      } catch (_) {}

      input.value = (place && (place.formatted_address || place.name)) || input.value || "";

      if (kind === "start") {
        currentUserCoords = { lat: ll.lat, lng: ll.lng };
      } else {
        try {
          window.__clearRoadEndCoords = { lat: ll.lat, lng: ll.lng };
        } catch (_) {}
      }

      tryCalculateRoutesFromInputs();
    } catch (_) {
      /* ignore — bad or partial Places result must not break the app */
    }
  });
  autocomplete.__patchedPlaceChanged = true;
}

function patchAutocompleteBindings() {
  if (startAutocomplete) bindAutocompletePlaceChanged(startAutocomplete, "start");
  if (endAutocomplete)   bindAutocompletePlaceChanged(endAutocomplete, "end");
}

function handleGeoError(err) {
  setGpsLoading(false);
  try { setGpsResolving(false); } catch (_) {}
  const startInput = document.getElementById("start");
  if (!startInput) return;
  let msg;
  if (err?.code === 1) { startInput.placeholder = t("gps_blocked"); msg = startInput.placeholder; }
  else if (err?.code === 2) { startInput.placeholder = t("gps_unavail"); msg = startInput.placeholder; }
  else if (err?.code === 3) { startInput.placeholder = t("gps_timeout"); msg = startInput.placeholder; }
  else { startInput.placeholder = t("gps_error"); msg = startInput.placeholder; }
  startInput.title = msg;
  try {
    if (typeof window.__clearRoadUxDiagGps === "function") {
      window.__clearRoadUxDiagGps(false, { code: err?.code, message: msg, via: "handleGeoError" });
    }
  } catch (_) {}
}

function _normalizeLatLngForGeocode(latLng) {
  const lat = typeof latLng.lat === "function" ? latLng.lat() : Number(latLng.lat);
  const lng = typeof latLng.lng === "function" ? latLng.lng() : Number(latLng.lng);
  return { lat, lng };
}

function _latLngLikelyUAE(lat, lng) {
  if (!Number.isFinite(lat) || !Number.isFinite(lng)) return false;
  return lat >= 22.4 && lat <= 26.25 && lng >= 51.3 && lng <= 56.75;
}

function _geocodeResultHasUAECountry(result) {
  const comps = result && result.address_components;
  if (!comps || !comps.length) return false;
  return comps.some(
    (c) => c.types && c.types.includes("country") && c.short_name === "AE"
  );
}

function _geocodeGranularityRank(result) {
  const order = ["street_address", "premise", "point_of_interest", "establishment", "route", "neighborhood", "sublocality", "locality", "administrative_area_level_1"];
  let rank = 0;
  for (const c of result.address_components || []) {
    for (const t of c.types || []) {
      const i = order.indexOf(t);
      if (i >= 0 && i >= rank) rank = i + 1;
    }
  }
  return rank;
}

/** Prefer AE country component when coords in UAE; else first formatted line (best-effort), not blind results[0] only for non-UAE. */
function pickFormattedAddressFromGeocoderResults(results, latLng) {
  if (!results || !results.length) return null;
  const { lat, lng } = _normalizeLatLngForGeocode(latLng);
  const expectUAE = _latLngLikelyUAE(lat, lng);
  const uaeCandidates = results.filter(_geocodeResultHasUAECountry);
  if (expectUAE) {
    if (uaeCandidates.length) {
      let best = uaeCandidates[0];
      let bestR = _geocodeGranularityRank(best);
      for (let i = 1; i < uaeCandidates.length; i++) {
        const r = _geocodeGranularityRank(uaeCandidates[i]);
        if (r > bestR) {
          bestR = r;
          best = uaeCandidates[i];
        }
      }
      return best.formatted_address || null;
    }
    const first = results[0];
    return (first && first.formatted_address) ? first.formatted_address : null;
  }
  const first = results[0];
  return (first && first.formatted_address) ? first.formatted_address : null;
}

function reverseGeocodeLatLng(latLng) {
  return new Promise((resolve) => {
    try {
      const { lat, lng } = _normalizeLatLngForGeocode(latLng);
      const fallbackCoord = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      const expectUAE = _latLngLikelyUAE(lat, lng);
      if (!google?.maps?.Geocoder) {
        try {
          window.__clearRoadUxDiagGeocode && window.__clearRoadUxDiagGeocode({
            lat, lng, picked: fallbackCoord, reason: "Geocoder class missing", expectUAE
          });
        } catch (_) {}
        resolve(fallbackCoord);
        return;
      }
      new google.maps.Geocoder().geocode({ location: { lat, lng } }, (results, status) => {
        let picked = fallbackCoord;
        let reason = "";
        if (status !== "OK" || !results?.length) {
          reason = "no results or status " + String(status);
        } else {
          const addr = pickFormattedAddressFromGeocoderResults(results, { lat, lng });
          const uaeCand = results.filter(_geocodeResultHasUAECountry);
          picked = addr || fallbackCoord;
          if (addr) {
            if (expectUAE && !uaeCand.length) {
              reason = "UAE bbox: no country AE in results — using first formatted_address as best-effort (verify on map)";
            } else if (expectUAE) {
              reason = "formatted address from UAE-filtered geocoder candidate";
            } else {
              reason = "formatted address (non-UAE coords, first suitable)";
            }
          } else if (expectUAE) {
            reason = "no formatted address from geocoder — coordinates only";
          } else {
            reason = "pick returned null — coordinates only";
          }
        }
        try {
          window.__clearRoadUxDiagGeocode && window.__clearRoadUxDiagGeocode({
            lat, lng, status, expectUAE, picked, reason, resultCount: results?.length || 0
          });
        } catch (_) {}
        resolve(picked);
      });
    } catch {
      try {
        const { lat, lng } = _normalizeLatLngForGeocode(latLng);
        const fb = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        window.__clearRoadUxDiagGeocode && window.__clearRoadUxDiagGeocode({ picked: fb, reason: "reverseGeocodeLatLng exception" });
        resolve(fb);
      } catch {
        resolve("");
      }
    }
  });
}

async function applyResolvedStartLocation(latLng, shouldRoute = true) {
  const startInput = document.getElementById("start");
  if (!startInput) return;
  const latN = Number(latLng.lat);
  const lngN = Number(latLng.lng);
  const coordStr = `${latN.toFixed(5)}, ${lngN.toFixed(5)}`;
  try {
    currentUserCoords = { lat: latN, lng: lngN };
    let address = "";
    try {
      address = await reverseGeocodeLatLng({ lat: latN, lng: lngN });
    } catch (geoErr) {
      console.error("[Clear Road UX] reverse geocode threw", geoErr);
    }
    const line = (address && String(address).trim()) ? String(address).trim() : coordStr;
    startInput.value = line;
    startInput.placeholder = t("gps_current");
    startInput.title = line;
    if (map) map.panTo({ lat: latN, lng: lngN });
    if (shouldRoute) tryCalculateRoutesFromInputs();
  } catch (e) {
    console.error("[Clear Road UX] applyResolvedStartLocation failed", e);
    startInput.value = coordStr;
    startInput.placeholder = t("gps_current");
    startInput.title = coordStr;
    if (shouldRoute) tryCalculateRoutesFromInputs();
  }
}

async function requestGPSPatched() {
  if (!navigator.geolocation) {
    const si = document.getElementById("start");
    if (si) si.placeholder = t("gps_unsupported");
    try {
      if (typeof window.__clearRoadUxDiagGps === "function") {
        window.__clearRoadUxDiagGps(false, { code: 0, message: "geolocation not supported", via: "requestGPSPatched" });
      }
    } catch (_) {}
    return;
  }
  setGpsLoading(true);
  setGpsResolving(true);
  const si = document.getElementById("start");
  if (si) si.placeholder = t("gps_detecting");

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      await applyResolvedStartLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }, true);
      setGpsLoading(false);
      setGpsResolving(false);
      try {
        if (typeof window.__clearRoadUxDiagGps === "function") {
          window.__clearRoadUxDiagGps(true, { lat: pos.coords.latitude, lng: pos.coords.longitude, via: "requestGPSPatched" });
        }
      } catch (_) {}
    },
    (err) => { setGpsResolving(false); handleGeoError(err); },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 10000 }
  );
}

async function requestGPS() { await requestGPSPatched(); }

function patchGpsEntrypoints() {
  const btn = document.getElementById("gps-btn");
  if (!btn) return;
  btn.onclick = function () {
    console.info("[Clear Road UX] GPS button → requestGPS()");
    if (typeof requestGPS !== "function") {
      console.error("[Clear Road UX] requestGPS is not available");
      return;
    }
    requestGPS();
  };
}

</script>

<script id="cr-drive-start-nav-entry">
// ТЗ-2 [v01] — точка входа в поездку: handleStartNavTap, startDrive
// Зависит от глобалей основного бандла (resolveDriveRoute, validateSelectedDriveRoute, startDriveMode, …).

function handleStartNavTap() {
  const routeToStart = resolveDriveRoute(selectedRoute ? selectedRoute.index : (_bestRoute && _bestRoute.index));
  if (routeToStart) {
    startDrive(routeToStart.index);
    return;
  }
  const startVal = (document.getElementById("start")?.value || "").trim();
  const endVal = (document.getElementById("end")?.value || "").trim();
  if (startVal && endVal) calculateRoutes();
  else if (!endVal) document.getElementById("end")?.focus();
  else requestGPS();
}
