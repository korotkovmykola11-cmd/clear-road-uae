        duration_in_traffic: data.duration_in_traffic,
        distance: data.distance,
        legs: data.legs,
        steps: data.steps,
        extractedRoute: data
      }, metrics), i);
    });

    const normalizationCheck = validateNormalizedRoutes(freshRoutes);
    if (!normalizationCheck.ok) throw new Error(normalizationCheck.message || "Route normalization failed");

    const canonical = buildCanonicalDecisionState(freshRoutes);
    return { routes: canonical.routes, decision: canonical.decision };
  }

  function tz7BuildLiveDecision(currentRoute, freshBest) {
    if (!currentRoute || !freshBest) return null;

    const currentMin = getDisplayMinutes(currentRoute);
    const freshMin = getDisplayMinutes(freshBest);
    const timeGain = currentMin - freshMin;

    const currentScore = Number.isFinite(currentRoute.score) ? currentRoute.score : 0;
    const freshScore = Number.isFinite(freshBest.score) ? freshBest.score : 0;
    const scoreGain = currentScore - freshScore;

    const routeChanged = Number(currentRoute.index) !== Number(freshBest.index);
    const hasUsefulGain = timeGain >= TZ7_MIN_TIME_GAIN_MIN || scoreGain >= TZ7_MIN_SCORE_GAIN;

    if (!routeChanged && !hasUsefulGain) return null;
    if (!hasUsefulGain) return null;

    return {
      action: timeGain >= 3 || scoreGain >= 8 ? "switch" : "suggest",
      confidence: timeGain >= 3 || scoreGain >= 8 ? "high" : "medium",
      title: timeGain > 0 ? ("Better route available → save " + timeGain + " min") : "Better route available",
      detail: (Array.isArray(freshBest.whyPoints) && freshBest.whyPoints.length ? freshBest.whyPoints.slice(0, 2).join(" · ") : (freshBest.why || "Improved live route")) + " via " + getRouteSummaryName(freshBest),
      timeGain: timeGain,
      scoreGain: scoreGain
    };
  }

  function tz7ApplyFreshRoutes(freshRoutes, freshDecision, result) {
    currentDirectionsResult = result;
    analyzedRoutes = freshRoutes;
    currentDecision = freshDecision;
    _bestRoute = freshDecision.bestRoute;
    _fastestRoute = freshRoutes.slice().sort(function(a, b) { return _tz1Minutes(a) - _tz1Minutes(b); })[0];

    if (selectedRoute) {
      const sameIndex = freshRoutes.find(function(route) { return Number(route.index) === Number(selectedRoute.index); });
      selectedRoute = sameIndex || freshDecision.bestRoute;
    } else {
      selectedRoute = freshDecision.bestRoute;
    }

    if (typeof renderResults === "function") renderResults();
    if (typeof drawRoutes === "function") drawRoutes(result);
  }

  function tz7ShowBetterRouteIfNeeded(previousSelected, freshDecision, freshRoutes, result) {
    if (!freshDecision || !freshDecision.bestRoute || !previousSelected) return;

    const freshBest = freshDecision.bestRoute;
    const liveDecision = tz7BuildLiveDecision(previousSelected, freshBest);
    if (!liveDecision) return;

    const now = Date.now();
    const signature = Number(previousSelected.index) + "→" + Number(freshBest.index) + ":" + Math.round(liveDecision.scoreGain || 0) + ":" + Math.round(liveDecision.timeGain || 0);
    if (signature === tz7LastSignature && now - tz7LastAlertAt < TZ7_MIN_ALERT_GAP_MS) return;

    tz7ApplyFreshRoutes(freshRoutes, freshDecision, result);

    betterRouteIndex = freshBest.index;
    _rerouteDecision = {
      action: liveDecision.action,
      confidence: liveDecision.confidence,
      targetIndex: freshBest.index,
      title: liveDecision.title,
      detail: liveDecision.detail,
      scoreGain: liveDecision.scoreGain || 0,
      timeGain: liveDecision.timeGain || 0,
      createdAt: now,
      source: "TZ7 live recalculation"
    };

    tz7LastSignature = signature;
    tz7LastAlertAt = now;

    if (typeof renderDriveAlertDecision === "function") {
      renderDriveAlertDecision(liveDecision, freshBest);
    } else {
      const alert = document.getElementById("drive-alert");
      const message = document.getElementById("drive-alert-message");
      if (alert && message) {
        message.textContent = liveDecision.title + " — " + liveDecision.detail;
        alert.classList.add("visible");
      }
    }

    if (driveMap && freshBest.route && freshBest.route.bounds) {
      try { driveMap.fitBounds(freshBest.route.bounds); } catch (_) {}
    }
  }

  function runLiveRecalculation() {
    if (tz7InProgress) return;
    if (!tz7CanUseMaps()) return;
    if (!selectedRoute && !currentDecision) return;

    const tickNow = Date.now();
    if (typeof offRouteRecalcInProgress !== "undefined" && offRouteRecalcInProgress) return;
    if (tickNow - lastOffRouteRecalcAt < DRIVE_OFF_ROUTE_REROUTE_COOLDOWN_MS) return;
    if (tickNow - lastDriveDirectionsRequestAt < DRIVE_DIRECTIONS_MIN_GAP_MS) return;

    const origin = tz7GetOrigin();
    const destination = tz7GetDestination();
    if (!origin || !destination) return;

    const previousSelected = selectedRoute || (currentDecision && currentDecision.bestRoute) || _bestRoute;
    if (!previousSelected) return;

    tz7InProgress = true;
    lastDriveDirectionsRequestAt = Date.now();

    directionsService.route({
      origin: origin,
      destination: destination,
      travelMode: google.maps.TravelMode.DRIVING,
      provideRouteAlternatives: true,
      drivingOptions: {
        departureTime: new Date(),
        trafficModel: "bestguess"
      }
    }, function(result, status) {
      tz7InProgress = false;
      try {
        if (status !== "OK" || !result || !Array.isArray(result.routes) || !result.routes.length) return;

        const fresh = tz7NormalizeFreshRoutes(result);
        const freshBest = fresh.decision && fresh.decision.bestRoute;
        if (!freshBest) return;

        const liveDecision = tz7BuildLiveDecision(previousSelected, freshBest);
        if (liveDecision) {
          tz7ShowBetterRouteIfNeeded(previousSelected, fresh.decision, fresh.routes, result);
        }
      } catch (e) {
        tz7Log("runLiveRecalculation callback", e);
      }
    });
  }

  function startTZ7LiveRecalculation() {
    stopTZ7LiveRecalculation();
    tz7Timer = setInterval(runLiveRecalculation, TZ7_RECALC_INTERVAL_MS);
  }

  function stopTZ7LiveRecalculation() {
    if (tz7Timer) {
      clearInterval(tz7Timer);
      tz7Timer = null;
    }
    tz7InProgress = false;
  }

  const tz7OriginalStartDriveMode = typeof startDriveMode === "function" ? startDriveMode : null;
  if (tz7OriginalStartDriveMode) {
    startDriveMode = function(index) {
      const result = tz7OriginalStartDriveMode.apply(this, arguments);
      startTZ7LiveRecalculation();
      return result;
    };
  }

  const tz7OriginalExitDriveMode = typeof exitDriveMode === "function" ? exitDriveMode : null;
  if (tz7OriginalExitDriveMode) {
    exitDriveMode = function() {
      stopTZ7LiveRecalculation();
      return tz7OriginalExitDriveMode.apply(this, arguments);
    };
  }

  const tz7OriginalClearRoutes = typeof clearRoutes === "function" ? clearRoutes : null;
  if (tz7OriginalClearRoutes) {
    clearRoutes = function() {
      stopTZ7LiveRecalculation();
      return tz7OriginalClearRoutes.apply(this, arguments);
    };
  }

  const tz7OriginalStopLiveDriveTracking = typeof stopLiveDriveTracking === "function" ? stopLiveDriveTracking : null;
  if (tz7OriginalStopLiveDriveTracking) {
    stopLiveDriveTracking = function() {
      stopTZ7LiveRecalculation();
      return tz7OriginalStopLiveDriveTracking.apply(this, arguments);
    };
  }

  window.clearRoadTZ7LiveRecalculation = {
    start: startTZ7LiveRecalculation,
    stop: stopTZ7LiveRecalculation,
    runNow: runLiveRecalculation,
    isRunning: function() { return !!tz7Timer; },
    intervalMs: TZ7_RECALC_INTERVAL_MS
  };
})();

</script>

<script id="cr-tz3-predictive-stability-layer">
// ============================================================
//  ТЗ-3 — PREDICTIVE ENGINE STABILITY LAYER
//  Adds reliable "Go now / Wait 15 min" departure advice.
//  Does not change GPS, Drive Mode, route cards or the route engine.
// ============================================================
(function() {
  const TZ3_WAIT_MINUTES = 15;
  const TZ3_MIN_STRONG_DIFF = 3;
  const TZ3_MIN_SOFT_DIFF = 2;

  function tz3SafeNumber(value, fallback) {
    const n = Number(value);
    return Number.isFinite(n) ? n : fallback;
  }

  function tz3GetDisplayMinutesSafe(route, fallback) {
    try {
      if (route && typeof getDisplayMinutes === "function") {
        const m = getDisplayMinutes(route);
        if (Number.isFinite(Number(m))) return Number(m);
      }
    } catch (_) {}
    if (route && Number.isFinite(Number(route.time))) return Number(route.time);
    return fallback;
  }

  function tz3MinutesFromResult(result) {
    try {
      const leg = result.routes[0].legs[0];
      const sec = ((leg.duration_in_traffic || leg.duration || {}).value);
      if (Number.isFinite(Number(sec))) return Math.max(1, Math.round(Number(sec) / 60));
    } catch (_) {}
    return null;
  }

  function tz3UaeHour(date) {
    try {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "Asia/Dubai",
        hour: "2-digit",
        hour12: false
      }).formatToParts(date);
      const h = parts.find(p => p.type === "hour");
      return h ? Number(h.value) : date.getHours();
    } catch (_) {
      return date.getHours();
    }
  }

  function tz3UaeWeekday(date) {
    try {
      const label = new Intl.DateTimeFormat("en-US", {
        timeZone: "Asia/Dubai",
        weekday: "short"
      }).format(date);
      return label;
    } catch (_) {
      return ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][date.getDay()];
    }
  }

  function tz3TrafficPressure(date) {
    const hour = tz3UaeHour(date);
    const weekday = tz3UaeWeekday(date);
    const isWeekend = weekday === "Sat" || weekday === "Sun";
    if (isWeekend) {
      if (hour >= 18 && hour <= 22) return 1;
      return 0;
    }
    if ((hour >= 7 && hour <= 9) || (hour >= 17 && hour <= 20)) return 2;
    if ((hour >= 6 && hour < 7) || (hour >= 10 && hour <= 11) || (hour >= 15 && hour < 17) || (hour > 20 && hour <= 21)) return 1;
    return 0;
  }

  function tz3EstimateLaterMinutes(nowMin) {
    const safeNow = Math.max(1, tz3SafeNumber(nowMin, 1));
    const now = new Date();
    const later = new Date(Date.now() + TZ3_WAIT_MINUTES * 60 * 1000);
    const currentPressure = tz3TrafficPressure(now);
    const laterPressure = tz3TrafficPressure(later);
    let delta = 0;

    if (currentPressure > laterPressure) delta -= Math.max(2, Math.round(safeNow * 0.08));
    else if (currentPressure < laterPressure) delta += Math.max(2, Math.round(safeNow * 0.08));
    else if (currentPressure === 2) delta -= Math.max(1, Math.round(safeNow * 0.04));
    else delta += 0;

    if (_bestRoute && Number.isFinite(Number(_bestRoute.trafficDelayMin))) {
      const delay = Math.max(0, Number(_bestRoute.trafficDelayMin));
      if (currentPressure === 2 && delay >= 5) delta -= Math.min(5, Math.round(delay * 0.35));
    }

    return Math.max(1, safeNow + delta);
  }

  function getDepartureDecision(nowMin, laterMin, waitMinutes = TZ3_WAIT_MINUTES, source = "heuristic") {
    const nowSafe = Math.max(1, tz3SafeNumber(nowMin, 1));
    const laterSafe = Math.max(1, tz3SafeNumber(laterMin, nowSafe));
    const saving = nowSafe - laterSafe;
    const sourceLabel = source === "traffic-api" ? "live traffic forecast" : "UAE timing estimate";

    if (saving >= TZ3_MIN_STRONG_DIFF) {
      return {
        type: "wait",
        waitMinutes,
        nowMin: nowSafe,
        laterMin: laterSafe,
        saving,
        confidence: source === "traffic-api" ? "high" : "medium",
        message: `Wait ${waitMinutes} min → estimated ${laterSafe} min, save ${saving} min`,
        why: `Traffic trend looks better soon · ${sourceLabel}`
      };
    }

    if (saving <= -TZ3_MIN_STRONG_DIFF) {
      return {
        type: "leave_now",
        waitMinutes,
        nowMin: nowSafe,
        laterMin: laterSafe,
        saving: Math.abs(saving),
        confidence: source === "traffic-api" ? "high" : "medium",
        message: `Go now → waiting may add ${Math.abs(saving)} min`,
        why: `Traffic trend may get worse · ${sourceLabel}`
      };
    }

    if (saving >= TZ3_MIN_SOFT_DIFF) {
      return {
        type: "wait",
        waitMinutes,
        nowMin: nowSafe,
        laterMin: laterSafe,
        saving,
        confidence: "medium",
        message: `Wait ${waitMinutes} min → small chance to save ${saving} min`,
        why: `Small timing advantage · ${sourceLabel}`
      };
    }

    return {
      type: "leave_now",
      waitMinutes,
      nowMin: nowSafe,
      laterMin: laterSafe,
      saving: Math.max(0, Math.abs(saving)),
      confidence: source === "traffic-api" ? "medium" : "low",
      message: `Go now → no strong benefit from waiting ${waitMinutes} min`,
      why: `No clear wait advantage · ${sourceLabel}`
    };
  }

  function tz3ApplyPrediction(nowMin, laterMin, source) {
    const nowSafe = Math.max(1, tz3SafeNumber(nowMin, tz3GetDisplayMinutesSafe(_bestRoute, 1)));
    const laterSafe = Math.max(1, tz3SafeNumber(laterMin, nowSafe));
    _predictiveData = {
      waitMinutes: TZ3_WAIT_MINUTES,
      nowMin: nowSafe,
      laterMin: laterSafe,
      saving: nowSafe - laterSafe,
      source: source || "heuristic"
    };
    _departureDecision = getDepartureDecision(nowSafe, laterSafe, TZ3_WAIT_MINUTES, _predictiveData.source);
    if (typeof renderResults === "function") {
      try {
        renderResults();
      } catch (_) {}
    } else if (typeof renderPredictiveDecision === "function") {
      renderPredictiveDecision();
    }
  }

  function renderPredictiveDecision() {
    const waitHint = document.getElementById("dh-wait-hint");
    if (waitHint) waitHint.style.display = "none";
    const card = document.getElementById("predictive-card");
    if (card) card.style.display = "none";
  }

  function runPredictiveCheck(origin, destination, nowBestMin) {
    const nowMin = Math.max(1, tz3SafeNumber(nowBestMin, tz3GetDisplayMinutesSafe(_bestRoute, 1)));
    const estimatedLater = tz3EstimateLaterMinutes(nowMin);

    // Immediate result: never leave Decision Hero empty while the API forecast is loading/failing.
    tz3ApplyPrediction(nowMin, estimatedLater, "heuristic");

    if (!directionsService || !origin || !destination || !window.google || !google.maps) return;

    try {
      directionsService.route({
        origin,
        destination,
        travelMode: google.maps.TravelMode.DRIVING,
        provideRouteAlternatives: false,
        drivingOptions: {
          departureTime: new Date(Date.now() + TZ3_WAIT_MINUTES * 60 * 1000),
          trafficModel: "bestguess"
        }
      }, function(result, status) {
        if (status !== "OK" || !result || !result.routes || !result.routes.length) {
          return;
        }
        const apiLaterMin = tz3MinutesFromResult(result);
        if (!apiLaterMin) return;
        tz3ApplyPrediction(nowMin, apiLaterMin, "traffic-api");
      });
    } catch (e) {
      try { console.warn("[TZ3 Predictive] API forecast skipped", e); } catch (_) {}
    }
  }

  try { window.getDepartureDecision = getDepartureDecision; } catch (_) {}
  try { window.renderPredictiveDecision = renderPredictiveDecision; } catch (_) {}
  try { window.runPredictiveCheck = runPredictiveCheck; } catch (_) {}

  window.clearRoadTZ3Predictive = {
    waitMinutes: TZ3_WAIT_MINUTES,
    estimateLaterMinutes: tz3EstimateLaterMinutes,
    current: function() { return { predictiveData: _predictiveData, departureDecision: _departureDecision }; },
    rerender: renderPredictiveDecision
  };
})();

</script>

<script id="cr-tz4-uae-local-layer">
// ============================================================
//  ТЗ-4 — UAE-ONLY LOCAL LOGIC / SALIK / PEAK PATTERNS
//  Scope: additive safety layer only. Does not replace GPS, Drive Mode,
//  Predictive Engine, route cards, or core UI rendering.
// ============================================================
(function() {
  function tz4uaeSafeNumber(value, fallback) {
    const n = Number(value);
    return Number.isFinite(n) ? n : fallback;
  }

  /** Dubai-local Salik price per gate (AED). Mon–Sat peak 06:00–10:00 & 16:00–20:00 = 6; night 01:00–06:00 = 0; else 4. */
  function tz4uaeGetSalikPricePerGate(at) {
    const d = at && at instanceof Date ? at : new Date();
    let hour = 0;
    let minute = 0;
    let wd = "";
    try {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "Asia/Dubai",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        weekday: "short"
      }).formatToParts(d);
      const hP = parts.find(function(p) { return p.type === "hour"; });
      const mP = parts.find(function(p) { return p.type === "minute"; });
      const wP = parts.find(function(p) { return p.type === "weekday"; });
      hour = hP ? Number(hP.value) : d.getUTCHours();
      minute = mP ? Number(mP.value) : 0;
      wd = wP ? String(wP.value) : "";
    } catch (_) {
      hour = d.getHours();
      minute = d.getMinutes();
      wd = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][d.getDay()];
    }
    const h = hour + minute / 60;
    const isSun = wd === "Sun";
    const monSat = !isSun;

    if (h >= 1 && h < 6) return 0;

    if (monSat) {
      if (h >= 6 && h < 10) return 6;
      if (h >= 16 && h < 20) return 6;
    }
    return 4;
  }

  function tz4uaeApplySalikPricingToRoute(route, at) {
    if (!route || typeof route !== "object") return route;
    const when = at instanceof Date ? at : new Date();
    const cnt = tz4uaeSafeNumber(
      route.salikCount != null ? route.salikCount : route.tollCount,
      0
    );
    route.salikCount = Math.max(0, Math.round(cnt));
    const ppg = tz4uaeGetSalikPricePerGate(when);
    route.salikPricePerGate = ppg;
    const raw = route.salikCount * ppg;
    route.salikCost = Math.round(raw * 100) / 100;
    route.tollCount = route.salikCount;
    route.tollCost = route.salikCost;
    route.hasToll = route.salikCost > 0;
    route.tolls = route.salikCost > 0;
    return route;
  }

  const TZ4_SALIK_LEGACY_FALLBACK_PER_GATE = 4;
    const n = Number(value);
    return Number.isFinite(n) ? n : fallback;
  }

  function tz4uaeEscape(value) {
    if (typeof _tz1EscapeHTML === "function") return _tz1EscapeHTML(value);
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function tz4uaeStepText(step) {
    if (!step) return "";
    return [
      step.instruction,
      step.instructions,
      step.maneuver,
      step.roadName,
      step.road,
      step.html_instructions
    ].filter(Boolean).join(" ");
  }

  function tz4uaeRouteText(route) {
    if (!route) return "";
    const parts = [route.title, route.summary, route.name, route.routeName];
    if (route.route && route.route.summary) parts.push(route.route.summary);
    if (route.extractedRoute && route.extractedRoute.summary) parts.push(route.extractedRoute.summary);
    const steps = Array.isArray(route.steps) ? route.steps : [];
    steps.forEach(function(step) { parts.push(tz4uaeStepText(step)); });
    const legs = Array.isArray(route.legs) ? route.legs : [];
    legs.forEach(function(leg) {
      if (leg.start_address) parts.push(leg.start_address);
      if (leg.end_address) parts.push(leg.end_address);
      if (Array.isArray(leg.steps)) leg.steps.forEach(function(step) { parts.push(tz4uaeStepText(step)); });
    });
    return parts.filter(Boolean).join(" ").replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
  }

  function tz4uaeDetectCorridors(text) {
    const s = String(text || "").toLowerCase();
    const corridors = [];
    const add = function(id, label) {
      if (!corridors.some(function(c) { return c.id === id; })) corridors.push({ id: id, label: label });
    };

    if (/\be11\b|sheikh zayed|szr/.test(s)) add("e11", "E11 / Sheikh Zayed Road");
    if (/\be311\b|sheikh mohammed bin zayed|mbz/.test(s)) add("e311", "E311 / Sheikh Mohammed Bin Zayed Road");
    if (/\be611\b|emirates road/.test(s)) add("e611", "E611 / Emirates Road");
    if (/\be44\b|al khail/.test(s)) add("e44", "E44 / Al Khail Road");
    if (/\be66\b|dubai[\s-]*al[\s-]*ain|al ain road/.test(s)) add("e66", "E66 / Dubai-Al Ain Road");
    if (/\be88\b|beirut street/.test(s)) add("e88", "E88 / Beirut Street");
    if (/\be89\b|airport road/.test(s)) add("e89", "E89 / Airport Road");
    if (/\be311\b|\be611\b|\be11\b|\be44\b|\be66\b|\be88\b|\be89\b/.test(s) === false && /highway|motorway|freeway/.test(s)) add("highway", "UAE highway corridor");
    return corridors;
  }

  function tz4uaeDetectSalik(text, route) {
    const s = String(text || "").toLowerCase();
    const gates = [];
    const add = function(id, label) {
      if (!gates.some(function(g) { return g.id === id; })) gates.push({ id: id, label: label });
    };

    // Strong named-gate patterns first.
    if (/al\s+safa/.test(s)) add("al-safa", "Al Safa Salik");
    if (/al\s+barsha/.test(s)) add("al-barsha", "Al Barsha Salik");
    if (/al\s+mamzar/.test(s)) add("al-mamzar", "Al Mamzar Salik");
    if (/al\s+garhoud|garhoud bridge/.test(s)) add("al-garhoud", "Al Garhoud Salik");
    if (/al\s+maktoum|maktoum bridge/.test(s)) add("al-maktoum", "Al Maktoum Salik");
    if (/airport tunnel/.test(s)) add("airport-tunnel", "Airport Tunnel Salik");
    if (/business bay crossing|business bay bridge/.test(s)) add("business-bay", "Business Bay Crossing Salik");
    if (/jebel ali/.test(s)) add("jebel-ali", "Jebel Ali Salik");

    // Generic E11/SZR fallback: probable Salik only when the route text clearly uses Dubai E11/SZR.
    if (!gates.length && (/\be11\b|sheikh zayed|szr/.test(s)) && /dubai|jumeirah|marina|downtown|business bay|jebel ali|barsha|safa/.test(s)) {
      add("e11-generic", "Dubai E11 / Sheikh Zayed Salik area");
    }

    // Avoid false positives on common free outer corridors unless a named Salik gate was detected.
    const onlyOuterFree = /\be311\b|sheikh mohammed bin zayed|\be611\b|emirates road/.test(s) && !(/\be11\b|sheikh zayed|al\s+safa|al\s+barsha|al\s+mamzar|garhoud|maktoum|airport tunnel|business bay|jebel ali/.test(s));
    if (onlyOuterFree) return { gates: [], count: 0, cost: 0, confidence: "high", source: "free-corridor" };

    const previousCost = tz4uaeSafeNumber(route && route.tollCost, 0);
    const previousCount = tz4uaeSafeNumber(route && route.tollCount, 0);
    let count = gates.length;

    if (count === 0 && previousCost > 0) {
      count = Math.max(1, Math.round(previousCost / TZ4_SALIK_LEGACY_FALLBACK_PER_GATE));
      gates.push({ id: "estimated", label: "Estimated Salik area" });
    } else if (count === 0 && previousCount > 0) {
      count = previousCount;
      gates.push({ id: "estimated", label: "Estimated Salik area" });
    } else if (count === 0 && route && tz4uaeSafeNumber(route.highwayShare, 0) >= 0.42 && /\be11\b|sheikh zayed|szr/.test(s) && /dubai|jumeirah|marina|downtown|business bay|jebel ali|barsha|safa/.test(s)) {
      const hs = tz4uaeSafeNumber(route.highwayShare, 0);
      count = Math.min(4, Math.max(1, 1 + Math.floor(hs * 2)));
      gates.push({ id: "segment-estimate", label: "Salik-prone segments (estimate)" });
    }

    return {
      gates: gates.slice(0, Math.max(0, count)),
      count: count,
      costPreview: count * TZ4_SALIK_LEGACY_FALLBACK_PER_GATE,
      confidence:
        gates.length && gates[0].id !== "estimated" && gates[0].id !== "segment-estimate"
          ? "medium"
          : gates[0] && gates[0].id === "segment-estimate"
            ? "low"
            : count > 0
              ? "low"
              : "high",
      source:
        gates.length && gates[0].id !== "estimated" && gates[0].id !== "segment-estimate"
          ? "route-text"
          : count > 0
            ? gates[0] && gates[0].id === "segment-estimate"
              ? "segment-estimate"
              : "existing-estimate"
            : "no-salik"
    };
  }

  function tz4uaePeakWindow() {
    const d = new Date();
    const day = d.getDay();
    const h = d.getHours() + d.getMinutes() / 60;
    const weekday = day >= 1 && day <= 5;
    if (weekday && h >= 6.5 && h <= 9.5) return { active: true, label: "morning peak", weight: 1.15 };
    if (weekday && h >= 16.5 && h <= 20.0) return { active: true, label: "evening peak", weight: 1.20 };
    if (day === 5 && h >= 11.0 && h <= 14.5) return { active: true, label: "Friday midday movement", weight: 1.10 };
    return { active: false, label: "normal local window", weight: 1.0 };
  }

  function tz4uaeDetectLocalPattern(text, route) {
    const s = String(text || "").toLowerCase();
    const corridors = tz4uaeDetectCorridors(text);
    const peak = tz4uaePeakWindow();
    const highwayShare = Math.max(0, Math.min(1, tz4uaeSafeNumber(route && route.highwayShare, 0)));
    const complexity = tz4uaeSafeNumber(route && (route.complexity || (route.scoreBreakdown && route.scoreBreakdown.complexityScore)), 0);
    const delay = tz4uaeSafeNumber(route && (route.delayMinutes || (route.scoreBreakdown && route.scoreBreakdown.delayMin)), 0);

    let personality = "local balanced route";
    if (/\be311\b|sheikh mohammed bin zayed/.test(s)) personality = "outer bypass corridor";
    else if (/\be611\b|emirates road/.test(s)) personality = "long outer bypass corridor";
    else if (/\be11\b|sheikh zayed|szr/.test(s)) personality = "central Dubai corridor";
    else if (/\be44\b|al khail/.test(s)) personality = "Dubai city bypass corridor";
    else if (highwayShare >= 0.55) personality = "highway-first route";
    else if (highwayShare <= 0.25) personality = "city-street route";

    const peakRisk = peak.active ? Math.round((delay + complexity * 3 + highwayShare * 4) * peak.weight) : Math.round(delay + complexity * 2);
    let peakLabel = "low";
    if (peakRisk >= 12) peakLabel = "high";
    else if (peakRisk >= 6) peakLabel = "medium";

    return {
      corridors: corridors,
      personality: personality,
      peakWindow: peak,
      peakRisk: peakRisk,
      peakLabel: peakLabel
    };
  }

  function tz4uaeBuildAdvice(meta, route) {
    const ppg = tz4uaeGetSalikPricePerGate(new Date());
    const sc = tz4uaeSafeNumber(meta.salik.count, 0) * ppg;
    const tollPart = sc > 0 ? Math.round(sc * 100) / 100 + " AED Salik" : "no Salik detected";
    const peakPart = meta.pattern.peakWindow.active ? (meta.pattern.peakWindow.label + ", " + meta.pattern.peakLabel + " local risk") : (meta.pattern.peakLabel + " local risk now");
    const corridor = meta.pattern.corridors[0] ? meta.pattern.corridors[0].label : meta.pattern.personality;
    return corridor + " · " + tollPart + " · " + peakPart;
  }

  function tz4uaeEnrichRoute(route) {
    if (!route || typeof route !== "object") return route;
    const text = tz4uaeRouteText(route);
    const salik = tz4uaeDetectSalik(text, route);
    const pattern = tz4uaeDetectLocalPattern(text, route);
    const meta = {
      salik: salik,
      pattern: pattern,
      textFingerprint: text.slice(0, 240),
      updatedAt: Date.now()
    };

    route.uaeLocal = meta;
    route.salikCount = Math.max(0, Math.round(tz4uaeSafeNumber(salik.count, 0)));
    route.salikMeta = {
      confidence: salik.confidence,
      source: salik.source,
      gateCount: route.salikCount
    };
    route.salikEstimateUncertain =
      route.salikCount > 0 &&
      (salik.confidence === "low" ||
        salik.source === "segment-estimate" ||
        salik.source === "existing-estimate" ||
        !!(salik.gates && salik.gates[0] && salik.gates[0].id === "estimated"));

    tz4uaeApplySalikPricingToRoute(route, new Date());

    route.uaePeakRisk = pattern.peakRisk;
    route.uaePeakLabel = pattern.peakLabel;
    route.uaeRoutePersonality = pattern.personality;
    route.uaeAdvice = tz4uaeBuildAdvice(meta, route);

    if (route.scoreBreakdown) {
      route.scoreBreakdown.tollCost = route.salikCost;
      route.scoreBreakdown.tollPenalty = route.salikCost > 0 ? 6 : 0;
      route.scoreBreakdown.uaePeakRisk = pattern.peakRisk;
      route.scoreBreakdown.uaePeakLabel = pattern.peakLabel;
    }
    return route;
  }

  function tz4uaeEnrichRoutes(routes) {
    if (!Array.isArray(routes)) return routes;
    routes.forEach(tz4uaeEnrichRoute);
    return routes;
  }

  function tz4uaeAppendDecision() {
    try {
      const advice = document.querySelector(".ai-advice-line");
      const best = (typeof _bestRoute !== "undefined" && _bestRoute) || (typeof selectedRoute !== "undefined" && selectedRoute) || null;
      if (!advice || !best) return;
      tz4uaeEnrichRoute(best);
      if (advice.dataset.tz4uaeApplied === "1") return;
      const local = best.uaeAdvice || "UAE local route check ready";
      advice.innerHTML += `<br><span>UAE</span>${tz4uaeEscape(local)}`;
      advice.dataset.tz4uaeApplied = "1";
    } catch (e) {
      try { console.warn("[TZ4 UAE] decision render skipped", e); } catch (_) {}
    }
  }

  const tz4uaeOriginalScoreRoutes = typeof scoreRoutes === "function" ? scoreRoutes : null;
  if (tz4uaeOriginalScoreRoutes) {
    scoreRoutes = function(routes) {
      tz4uaeEnrichRoutes(routes);
      const scored = tz4uaeOriginalScoreRoutes.apply(this, arguments);
      tz4uaeEnrichRoutes(scored);
      return scored;
    };
  }

  try { window.clearRoadTZ4UAE = {
    enrichRoute: tz4uaeEnrichRoute,
    enrichRoutes: tz4uaeEnrichRoutes,
    detectSalik: function(route) { return tz4uaeDetectSalik(tz4uaeRouteText(route), route); },
    detectPattern: function(route) { return tz4uaeDetectLocalPattern(tz4uaeRouteText(route), route); },
    peakWindow: tz4uaePeakWindow,
    getSalikPricePerGate: tz4uaeGetSalikPricePerGate,
    applySalikPricingToRoute: tz4uaeApplySalikPricingToRoute,
    refreshRoutesSalikPricing: function(routes, at) {
      if (!Array.isArray(routes)) return routes;
      const when = at instanceof Date ? at : new Date();
      routes.forEach(function(r) { tz4uaeApplySalikPricingToRoute(r, when); });
      return routes;
    }
  }; } catch (_) {}
  try {
    window.getSalikPriceUAE = function(currentTime) {
      return tz4uaeGetSalikPricePerGate(currentTime || new Date());
    };
  } catch (_) {}
})();

</script>

<script id="cr-tz5-filters-preferences-layer">
// ============================================================
//  ТЗ-5 — FILTERS / PREFERENCES STABILITY LAYER
//  Adds visible route preferences and decision-score filters.
//  Does not replace ТЗ-1 / ТЗ-2 / ТЗ-3 / ТЗ-4 layers.
// ============================================================
(function(){
  "use strict";

  const TZ5_FILTER_DEFAULTS = {
    avoid_highways: false,
    fewer_turns: false,
    less_traffic: false,
    fewer_stops: false,
    stable_route: false,
    avoid_complex: false
  };

  const TZ5_PREFS = ["balanced", "fastest", "no_tolls"];

  function tz5fltSafeNumber(value, fallback) {
    const n = Number(value);
    return Number.isFinite(n) ? n : (Number.isFinite(fallback) ? fallback : 0);
  }

  function tz5fltRound(value, decimals) {
    const factor = Math.pow(10, Number.isFinite(decimals) ? decimals : 1);
    return Math.round(tz5fltSafeNumber(value, 0) * factor) / factor;
  }

  function tz5fltRouteMinutes(route) {
    if (typeof _tz1Minutes === "function") return tz5fltSafeNumber(_tz1Minutes(route), 0);
    return tz5fltSafeNumber(route && route.durationMin, tz5fltSafeNumber(route && route.durationTrafficSec, 0) / 60);
  }

  function tz5fltRouteText(route) {
    if (!route) return "";
    const parts = [route.summary, route.routeTitle, route.title, route.name, route.why, route.tradeOff, route.uaeAdvice, route.uaePattern, route.drivePersonality];
    if (Array.isArray(route.whyPoints)) parts.push(route.whyPoints.join(" "));
    if (Array.isArray(route.legs)) {
      route.legs.forEach(function(leg){
        if (leg && leg.start_address) parts.push(leg.start_address);
        if (leg && leg.end_address) parts.push(leg.end_address);
      });
    }
    if (Array.isArray(route.steps)) {
      route.steps.forEach(function(step){
        if (step && step.instructions) parts.push(step.instructions);
      });
    }
    return parts.filter(Boolean).join(" ").toLowerCase();
  }

  function tz5fltTraffic(route) {
    const sb = route && route.scoreBreakdown ? route.scoreBreakdown : {};
    const trafficScore = tz5fltSafeNumber(route && route.trafficScore, tz5fltSafeNumber(sb.trafficScore, 0));
    const delayMin = tz5fltSafeNumber(route && route.delayMin, tz5fltSafeNumber(sb.delayMin, 0));
    const trafficLevel = tz5fltSafeNumber(route && (route.trafficLevel || route.trafficRank), tz5fltSafeNumber(sb.trafficRank, 1));
    return Math.max(0, trafficScore * 18 + delayMin * 0.9 + Math.max(0, trafficLevel - 1) * 3);
  }

  function tz5fltStops(route) {
    const sb = route && route.scoreBreakdown ? route.scoreBreakdown : {};
    return Math.max(0, Math.round(tz5fltSafeNumber(route && (route.stopsCount || route.turnsCount), tz5fltSafeNumber(sb.stopsCount, tz5fltSafeNumber(sb.turns, 0)))));
  }

  function tz5fltComplexity(route) {
    const sb = route && route.scoreBreakdown ? route.scoreBreakdown : {};
    const text = tz5fltRouteText(route);
    let complexity = tz5fltSafeNumber(route && route.complexityScore, tz5fltSafeNumber(sb.complexityScore, 0)) * 12;
    complexity += tz5fltStops(route) * 0.45;
    if (/interchange|merge|ramp|exit|flyover|junction|roundabout|развяз|съезд|слияние/.test(text)) complexity += 4;
    if (route && route.uaePattern && String(route.uaePattern).toLowerCase().includes("cross-emirate")) complexity += 2;
    return Math.max(0, complexity);
  }

  function tz5fltHighway(route) {
    const text = tz5fltRouteText(route);
    const share = tz5fltSafeNumber(route && route.highwayShare, tz5fltSafeNumber(route && route.highwayPct, 0) / 100);
    return !!(route && route.highway) || share >= 0.45 || /e11|e311|e611|sheikh zayed|emirates road|mohammed bin zayed|highway|motorway/.test(text);
  }

  function tz5fltTolls(route) {
    const sb = route && route.scoreBreakdown ? route.scoreBreakdown : {};
    return !!(route && (route.tolls || route.hasTolls || route.salikDetected || route.uaeSalik || route.salikCost > 0 || route.uaeTollCost > 0 || route.tollCost > 0 || sb.tollCost > 0));
  }

  function tz5fltActiveFilters() {
    try {
      window.userFilters = Object.assign({}, TZ5_FILTER_DEFAULTS, (typeof userFilters === "object" && userFilters) ? userFilters : {});
      try { localStorage.setItem("clearRoadUAE.filters.v1", JSON.stringify(window.userFilters)); } catch (_) {}
      return window.userFilters;
    } catch (_) {
      return Object.assign({}, TZ5_FILTER_DEFAULTS);
    }
  }

  function tz5fltPreference() {
    try {
      const pref = typeof getUserPreference === "function" ? getUserPreference() : (localStorage.getItem("clearRoadUAE.pref") || "balanced");
      return TZ5_PREFS.includes(pref) ? pref : "balanced";
    } catch (_) { return "balanced"; }
  }

  function tz5fltPreferencePenalty(route) {
    const pref = tz5fltPreference();
    if (pref === "fastest") {
      return tz5fltRound(tz5fltRouteMinutes(route) * 0.25 + tz5fltTraffic(route) * 0.15, 1);
    }
    if (pref === "no_tolls") {
      return tz5fltTolls(route) ? 32 : -2;
    }
    return 0;
  }

  function tz5fltFilterPenalty(route) {
    const filters = tz5fltActiveFilters();
    let penalty = 0;
    if (filters.avoid_highways && tz5fltHighway(route)) penalty += 12;
    if (filters.fewer_turns) penalty += tz5fltStops(route) * 1.0;
    if (filters.less_traffic) penalty += tz5fltTraffic(route) * 1.25;
    if (filters.fewer_stops) penalty += tz5fltStops(route) * 1.4;
    if (filters.stable_route) penalty += Math.max(0, 100 - tz5fltSafeNumber(route && route.stabilityScore, 75)) * 0.22 + tz5fltTraffic(route) * 0.55;
    if (filters.avoid_complex) penalty += tz5fltComplexity(route) * 1.15;
    return tz5fltRound(penalty, 1);
  }

  function tz5fltExplain(route) {
    const filters = tz5fltActiveFilters();
    const notes = [];
    const pref = tz5fltPreference();
    if (pref === "fastest") notes.push("fastest preference active");
    if (pref === "no_tolls") notes.push(tz5fltTolls(route) ? "toll route penalized" : "no-toll route preferred");
    if (filters.less_traffic) notes.push("traffic weight increased");
    if (filters.stable_route) notes.push("stability weight increased");
    if (filters.fewer_stops) notes.push("stops/turns reduced");
    if (filters.avoid_complex) notes.push("complex junctions avoided");
    if (filters.avoid_highways) notes.push("highways penalized");
    if (filters.fewer_turns) notes.push("fewer turns preferred");
    return notes.slice(0, 4).join(" · ");
  }

  const tz5fltOriginalPreferencePenalty = typeof tz5PreferencePenalty === "function" ? tz5PreferencePenalty : null;
  window.tz5PreferencePenalty = function(route) {
    const base = tz5fltOriginalPreferencePenalty ? tz5fltSafeNumber(tz5fltOriginalPreferencePenalty(route), 0) : 0;
    return tz5fltRound(base + tz5fltPreferencePenalty(route), 1);
  };
  try { tz5PreferencePenalty = window.tz5PreferencePenalty; } catch (_) {}

  const tz5fltOriginalFilterPenalty = typeof tz5FilterPenalty === "function" ? tz5FilterPenalty : null;
  window.tz5FilterPenalty = function(route) {
    const base = tz5fltOriginalFilterPenalty ? tz5fltSafeNumber(tz5fltOriginalFilterPenalty(route), 0) : 0;
    return tz5fltRound(base + tz5fltFilterPenalty(route), 1);
  };
  try { tz5FilterPenalty = window.tz5FilterPenalty; } catch (_) {}

  const tz5fltOriginalScoreRoute = typeof scoreRoute === "function" ? scoreRoute : null;
  if (tz5fltOriginalScoreRoute) {
    scoreRoute = function(route, allRoutes) {
      const scored = tz5fltOriginalScoreRoute.apply(this, arguments);
      const prefPenalty = tz5fltPreferencePenalty(scored);
      const filterPenalty = tz5fltFilterPenalty(scored);
      scored.preferencePenalty = prefPenalty;
      scored.filterPenalty = filterPenalty;
      scored.filterDecisionScore = tz5fltRound(tz5fltSafeNumber(scored.score, 0) + prefPenalty + filterPenalty, 1);
      scored.filterExplanation = tz5fltExplain(scored);
      if (scored.scoreBreakdown) {
        scored.scoreBreakdown.preferencePenalty = prefPenalty;
        scored.scoreBreakdown.filterPenalty = filterPenalty;
        scored.scoreBreakdown.filterDecisionScore = scored.filterDecisionScore;
      }
      return scored;
    };
  }

  const tz5fltOriginalSetUserPreference = typeof setUserPreference === "function" ? setUserPreference : null;
  window.setUserPreference = function(value) {
    if (!TZ5_PREFS.includes(value)) return;
    try { localStorage.setItem("clearRoadUAE.pref", value); } catch (_) {}
    tz5fltSyncUI();
    if (typeof calculateRoutes === "function") calculateRoutes();
  };
  try { setUserPreference = window.setUserPreference; } catch (_) {}

  window.toggleFilter = function(key) {
    const filters = tz5fltActiveFilters();
    if (!(key in filters)) return;
    filters[key] = !filters[key];
    try {
      window.userFilters = filters;
      localStorage.setItem("clearRoadUAE.filters.v1", JSON.stringify(filters));
    } catch (_) {}
    tz5fltSyncUI();
    if (typeof calculateRoutes === "function") calculateRoutes();
  };
  try { toggleFilter = window.toggleFilter; } catch (_) {}

  function tz5fltEnsurePanel() {
    if (document.getElementById("tz5-preference-panel")) return;
    const anchor = document.getElementById("top-utility-bar") || document.querySelector(".hero-section");
    if (!anchor || !anchor.parentNode) return;
    const panel = document.createElement("div");
    panel.id = "tz5-preference-panel";
    panel.className = "tz5-preference-panel";
    panel.innerHTML = `
      <div class="tz5-pref-row" aria-label="Route preferences">
        <button type="button" class="tz5-pref-chip" data-pref="balanced" onclick="setUserPreference('balanced')">Balanced</button>
        <button type="button" class="tz5-pref-chip" data-pref="fastest" onclick="setUserPreference('fastest')">Fastest</button>
        <button type="button" class="tz5-pref-chip" data-pref="no_tolls" onclick="setUserPreference('no_tolls')">No tolls</button>
      </div>
      <div class="tz5-filter-row" aria-label="Route filters">
        <button type="button" class="tz5-filter-chip" data-filter="less_traffic" onclick="toggleFilter('less_traffic')">Less traffic</button>
        <button type="button" class="tz5-filter-chip" data-filter="stable_route" onclick="toggleFilter('stable_route')">Stable</button>
        <button type="button" class="tz5-filter-chip" data-filter="fewer_stops" onclick="toggleFilter('fewer_stops')">Fewer stops</button>
        <button type="button" class="tz5-filter-chip" data-filter="avoid_complex" onclick="toggleFilter('avoid_complex')">Easy junctions</button>
        <button type="button" class="tz5-filter-chip" data-filter="avoid_highways" onclick="toggleFilter('avoid_highways')">Avoid highways</button>
      </div>
    `;
    anchor.parentNode.insertBefore(panel, anchor.nextSibling);
  }

  function tz5fltInjectCSS() {
    if (document.getElementById("tz5-filter-style")) return;
    const style = document.createElement("style");
    style.id = "tz5-filter-style";
    style.textContent = `
      .tz5-preference-panel {
        position: relative;
        z-index: 29;
        margin: -2px 14px 10px;
        padding: 10px;
        border-radius: 18px;
        background: hsla(220,11%,10%,.62);
        border: 1px solid hsla(220,10%,20%,.45);
        backdrop-filter: blur(16px) saturate(130%);
        -webkit-backdrop-filter: blur(16px) saturate(130%);
      }
      .tz5-pref-row, .tz5-filter-row { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; }
      .tz5-filter-row { margin-top:7px; }
      .tz5-pref-row::-webkit-scrollbar, .tz5-filter-row::-webkit-scrollbar { display:none; }
      .tz5-pref-chip, .tz5-filter-chip {
        flex: 0 0 auto;
        border: 1px solid hsla(220,10%,24%,.75);
        background: hsla(220,10%,14%,.72);
        color: var(--text2);
        border-radius: 999px;
        padding: 7px 10px;
        font-family: inherit;
        font-size: 10px;
        font-weight: 750;
        letter-spacing: .08em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .tz5-pref-chip.active {
        background: var(--green);
        border-color: var(--green);
        color: #090e1a;
      }
      .tz5-filter-chip.active {
        background: hsla(38,95%,58%,.16);
        border-color: hsla(38,95%,58%,.42);
        color: var(--amber);
      }
      .tz5-filter-note {
        display:block;
        margin-top: 8px;
        font-size: 11px;
        line-height: 1.3;
        color: var(--text2);
      }
      .tz5-filter-note strong { color: var(--green); font-weight: 800; }
      body.rtl .tz5-pref-row, body.rtl .tz5-filter-row { flex-direction: row-reverse; }
    `;
    document.head.appendChild(style);
  }

  function tz5fltSyncUI() {
    const filters = tz5fltActiveFilters();
    const pref = tz5fltPreference();
    document.querySelectorAll(".pref-btn, .tz5-pref-chip").forEach(function(btn){
      if (btn && btn.dataset) btn.classList.toggle("active", btn.dataset.pref === pref);
    });
    document.querySelectorAll(".filter-btn, .tz5-filter-chip").forEach(function(btn){
      if (btn && btn.dataset) btn.classList.toggle("active", !!filters[btn.dataset.filter]);
    });
  }

  function tz5fltAppendDecisionNote() {
    try {
      const advice = document.getElementById("ai-advice-line") || document.querySelector(".ai-advice-line");
      const best = (typeof _bestRoute !== "undefined" && _bestRoute) || (typeof selectedRoute !== "undefined" && selectedRoute) || null;
      if (!advice || !best || advice.dataset.tz5filtersApplied === "1") return;
      const filters = tz5fltActiveFilters();
      const active = Object.keys(filters).filter(function(k){ return !!filters[k]; });
      const pref = tz5fltPreference();
      if (pref === "balanced" && !active.length) return;
      const note = best.filterExplanation || tz5fltExplain(best) || (pref !== "balanced" ? ("Preference: " + pref) : "Filters active");
      advice.innerHTML += `<br><span>FILTER</span>${String(note).replace(/[&<>"']/g, function(ch){ return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[ch]; })}`;
      advice.dataset.tz5filtersApplied = "1";
    } catch (e) {
      try { console.warn("[TZ5 Filters] decision note skipped", e); } catch (_) {}
    }
  }

  function tz5fltBoot() {
    tz5fltInjectCSS();
    tz5fltEnsurePanel();
    tz5fltSyncUI();
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", tz5fltBoot);
  else tz5fltBoot();

  try { window.clearRoadTZ5Filters = {
    activeFilters: tz5fltActiveFilters,
    preference: tz5fltPreference,
    filterPenalty: tz5fltFilterPenalty,
    preferencePenalty: tz5fltPreferencePenalty,
    explain: tz5fltExplain,
    hasTolls: tz5fltTolls,
    hasHighway: tz5fltHighway
  }; } catch (_) {}
})();

</script>

<script id="cr-tz6-quick-start-layer">
// ============================================================
//  ТЗ-6 — SAVED PLACES / QUICK START / RECENT PLACES LAYER
//  Safe additive layer: does not replace GPS, Drive Mode, Predictive,
//  UAE/Salik, Filters/Preferences, or route rendering logic.
// ============================================================
(function(){
  "use strict";

  const TZ6QS_SAVED_KEY = "clearRoadUAE.savedPlaces.v2";
  const TZ6QS_LEGACY_KEY = typeof SAVED_PLACES_KEY !== "undefined" ? SAVED_PLACES_KEY : "clearRoadUAE.savedPlaces.v1";
  const TZ6QS_RECENTS_KEY = "clearRoadUAE.recentPlaces.v1";
  const TZ6QS_MAX_RECENTS = 5;

  function tz6qsLog(label, err) {
    try { console.warn("[TZ6 Quick Start] " + label, err); } catch (_) {}
  }

  function tz6qsEscape(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, function(ch){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[ch];
    });
  }

  function tz6qsReadJSON(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) {
      return fallback;
    }
  }

  function tz6qsWriteJSON(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
      return true;
    } catch (e) {
      tz6qsLog("localStorage write failed", e);
      return false;
    }
  }

  function tz6qsNormalizePlaceName(name) {
    const lower = String(name || "").toLowerCase();
    if (lower === "home") return "Home";
    if (lower === "work") return "Work";
    return String(name || "").trim() || "Saved";
  }

  function tz6qsDefaultSaved() {
    return { Home: "", Work: "" };
  }

  function tz6qsSavedPlaces() {
    const base = tz6qsDefaultSaved();
    const legacy = tz6qsReadJSON(TZ6QS_LEGACY_KEY, {});
    const current = tz6qsReadJSON(TZ6QS_SAVED_KEY, {});
    const merged = Object.assign({}, base, legacy || {}, current || {});
    Object.keys(merged).forEach(function(k){
      if (typeof merged[k] !== "string") merged[k] = "";
      merged[k] = merged[k].trim();
    });
    return merged;
  }

  function tz6qsSavePlace(name, address) {
    const key = tz6qsNormalizePlaceName(name);
    const value = String(address || "").trim();
    if (!value) return false;
    const places = tz6qsSavedPlaces();
    places[key] = value;
    const ok = tz6qsWriteJSON(TZ6QS_SAVED_KEY, places);
    try {
      if (typeof savePlace === "function") savePlace(key, value);
    } catch (_) {}
    tz6qsRenderPanel();
    return ok;
  }

  function tz6qsGetPlace(name) {
    const key = tz6qsNormalizePlaceName(name);
    const places = tz6qsSavedPlaces();
    if (places[key]) return places[key];
    try {
      if (typeof getSavedPlace === "function") return getSavedPlace(key) || null;
    } catch (_) {}
    return null;
  }

  function tz6qsRecents() {
    const list = tz6qsReadJSON(TZ6QS_RECENTS_KEY, []);
    return Array.isArray(list) ? list.filter(function(item){
      return item && typeof item.address === "string" && item.address.trim();
    }).slice(0, TZ6QS_MAX_RECENTS) : [];
  }

  function tz6qsAddRecent(address, label) {
    const clean = String(address || "").trim();
    if (!clean) return;
    const list = tz6qsRecents().filter(function(item){
      return item.address.toLowerCase() !== clean.toLowerCase();
    });
    list.unshift({
      label: String(label || clean).trim().slice(0, 80),
      address: clean,
      ts: Date.now()
    });
    tz6qsWriteJSON(TZ6QS_RECENTS_KEY, list.slice(0, TZ6QS_MAX_RECENTS));
    tz6qsRenderPanel();
  }

  function tz6qsSetEndAndRoute(address, label) {
    const endField = document.getElementById("end");
    if (!endField) return;
    endField.value = String(address || "").trim();
    if (!endField.value) return;
    tz6qsAddRecent(endField.value, label || endField.value);
    try {
      if (typeof calculateRoutes === "function") calculateRoutes();
    } catch (e) {
      tz6qsLog("calculateRoutes from quick start", e);
    }
  }

  function tz6qsPromptAndSave(name) {
    const key = tz6qsNormalizePlaceName(name);
    const current = tz6qsGetPlace(key) || "";
    const value = window.prompt((current ? "Update " : "Enter ") + key + " address:", current);
    if (value === null) return;
    const clean = value.trim();
    if (!clean) return;
    tz6qsSavePlace(key, clean);
    tz6qsSetEndAndRoute(clean, key);
  }

  function tz6qsUseSaved(name) {
    const key = tz6qsNormalizePlaceName(name);
    const address = tz6qsGetPlace(key);
    if (!address) {
      tz6qsPromptAndSave(key);
      return;
    }
    tz6qsSetEndAndRoute(address, key);
  }

  function tz6qsClearRecents() {
    tz6qsWriteJSON(TZ6QS_RECENTS_KEY, []);
    tz6qsRenderPanel();
  }

  function tz6qsEnsureCSS() {
    if (document.getElementById("tz6-quickstart-css")) return;
    const style = document.createElement("style");
    style.id = "tz6-quickstart-css";
    style.textContent = `
      .tz6-quickstart-panel {
        margin: 0 14px 12px;
        padding: 12px;
        border-radius: 22px;
        background: hsla(220,11%,10%,.72);
        border: 1px solid hsla(220,10%,20%,.74);
        box-shadow: 0 14px 38px -24px rgba(0,0,0,.7);
      }
      .tz6-quickstart-head {
        display:flex; align-items:center; justify-content:space-between; gap:10px;
        margin-bottom: 10px;
      }
      .tz6-quickstart-title {
        font-size: 10px; font-weight: 800; letter-spacing: .16em;
        text-transform: uppercase; color: var(--text2);
      }
      .tz6-quickstart-edit {
        border: 1px solid hsla(72,96%,56%,.18);
        background: hsla(72,96%,56%,.08);
        color: var(--green);
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: .12em;
        text-transform: uppercase;
        cursor:pointer;
        font-family: inherit;
      }
      .tz6-quickstart-row {
        display:grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 9px;
      }
      .tz6-quick-card {
        display:flex; align-items:center; gap:9px;
        min-width:0;
        padding: 11px 10px;
        border-radius: 15px;
        border: 1px solid var(--border2);
        background: hsla(220,14%,8%,.68);
        color: var(--text);
        cursor:pointer;
        text-align:left;
        font-family: inherit;
      }
      .tz6-quick-card:active { transform: scale(.985); }
      .tz6-quick-icon {
        width: 32px; height: 32px; border-radius: 11px;
        display:grid; place-items:center;
        background: hsla(72,96%,56%,.10);
        color: var(--green);
        flex-shrink:0;
      }
      .tz6-quick-body { min-width:0; flex:1; }
      .tz6-quick-label {
        font-size: 13px; font-weight: 750; color: var(--text); line-height:1.15;
      }
      .tz6-quick-address {
        margin-top: 3px;
        font-size: 11px; color: var(--text2);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .tz6-recent-list {
        display:flex; gap:7px; overflow-x:auto; padding-bottom:2px;
        scrollbar-width:none;
      }
      .tz6-recent-list::-webkit-scrollbar { display:none; }
      .tz6-recent-chip {
        flex:0 0 auto;
        max-width: 190px;
        border: 1px solid var(--border2);
        background: hsla(220,14%,8%,.52);
        color: var(--text2);
        border-radius: 999px;
        padding: 8px 11px;
        font-size: 11px;
        font-weight: 700;
        cursor:pointer;
        font-family: inherit;
        white-space: nowrap; overflow:hidden; text-overflow:ellipsis;
      }
      .tz6-recent-empty {
        font-size: 11px; color: var(--text3); padding: 4px 1px 0;
      }
      .tz6-clear-recents {
        border:none; background:transparent; color:var(--text3); font-size:10px; cursor:pointer; font-family:inherit;
      }
      body.rtl .tz6-quickstart-head { flex-direction: row-reverse; }
      body.rtl .tz6-quick-card { flex-direction: row-reverse; text-align:right; }
      @media (max-width: 380px) {
        .tz6-quickstart-row { grid-template-columns: 1fr; }
      }
    `;
    document.head.appendChild(style);
  }

  function tz6qsCard(name, icon) {
    const address = tz6qsGetPlace(name);
    const shown = address ? address : "Tap to save address";
    return `
      <button type="button" class="tz6-quick-card" onclick="clearRoadTZ6QuickStart.useSaved('${tz6qsEscape(name)}')" ondblclick="clearRoadTZ6QuickStart.editSaved('${tz6qsEscape(name)}')">
        <span class="tz6-quick-icon">${icon}</span>
        <span class="tz6-quick-body">
          <span class="tz6-quick-label">${tz6qsEscape(name)}</span>
          <span class="tz6-quick-address">${tz6qsEscape(shown)}</span>
        </span>
      </button>`;
  }

  function tz6qsRecentHTML() {
    const recents = tz6qsRecents();
    if (!recents.length) return `<div class="tz6-recent-empty">Recent places will appear after you build a route.</div>`;
    return `<div class="tz6-recent-list">` + recents.map(function(item, index){
      const label = item.label || item.address;
      return `<button type="button" class="tz6-recent-chip" title="${tz6qsEscape(item.address)}" onclick="clearRoadTZ6QuickStart.useRecentIndex(${index})">${tz6qsEscape(label)}</button>`;
    }).join("") + `</div>`;
  }

  function tz6qsPanelHTML() {
    return `
      <div class="tz6-quickstart-head">
        <div class="tz6-quickstart-title">Quick Start</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button type="button" class="tz6-clear-recents" onclick="clearRoadTZ6QuickStart.clearRecents()">Clear recent</button>
          <button type="button" class="tz6-quickstart-edit" onclick="clearRoadTZ6QuickStart.editSaved('Home')">Set Home</button>
          <button type="button" class="tz6-quickstart-edit" onclick="clearRoadTZ6QuickStart.editSaved('Work')">Set Work</button>
        </div>
      </div>
      <div class="tz6-quickstart-row">
        ${tz6qsCard("Home", "🏠")}
        ${tz6qsCard("Work", "💼")}
      </div>
      ${tz6qsRecentHTML()}
    `;
  }

  function tz6qsEnsurePanel() {
    tz6qsEnsureCSS();
    let panel = document.getElementById("tz6-quickstart-panel");
    if (!panel) {
      panel = document.createElement("div");
      panel.id = "tz6-quickstart-panel";
      panel.className = "tz6-quickstart-panel";
      const results = document.getElementById("results");
      const content = document.querySelector(".content-scroll") || document.body;
      if (results && results.parentNode) results.parentNode.insertBefore(panel, results);
      else content.insertBefore(panel, content.firstChild || null);
    }
    return panel;
  }

  function tz6qsRenderPanel() {
    try {
      const panel = tz6qsEnsurePanel();
      panel.innerHTML = tz6qsPanelHTML();
    } catch (e) {
      tz6qsLog("render panel", e);
    }
  }

  const tz6qsOriginalSetDestination = typeof window.setDestination === "function" ? window.setDestination : (typeof setDestination === "function" ? setDestination : null);
  window.setDestination = function(place) {
    try { return tz6qsUseSaved(place); }
    catch (e) {
      tz6qsLog("setDestination wrapper", e);
      if (tz6qsOriginalSetDestination) return tz6qsOriginalSetDestination.apply(this, arguments);
    }
  };

  window.updateSavedPlace = function(place) {
    try { return tz6qsPromptAndSave(place); }
    catch (e) { tz6qsLog("updateSavedPlace wrapper", e); }
  };

  const tz6qsOriginalCalculateRoutes = typeof calculateRoutes === "function" ? calculateRoutes : null;
  if (tz6qsOriginalCalculateRoutes) {
    calculateRoutes = function() {
      const endField = document.getElementById("end");
      const endValue = endField && endField.value ? endField.value.trim() : "";
      const result = tz6qsOriginalCalculateRoutes.apply(this, arguments);
      if (endValue) tz6qsAddRecent(endValue, endValue);
      return result;
    };
  }

  function tz6qsBoot() {
    tz6qsRenderPanel();
  }

  window.clearRoadTZ6QuickStart = {
    useSaved: tz6qsUseSaved,
    editSaved: tz6qsPromptAndSave,
    savePlace: tz6qsSavePlace,
    getPlace: tz6qsGetPlace,
    recents: tz6qsRecents,
    useRecentIndex: function(index){
      const item = tz6qsRecents()[Number(index)];
      if (item && item.address) tz6qsSetEndAndRoute(item.address, item.label || item.address);
    },
    clearRecents: tz6qsClearRecents,
    render: tz6qsRenderPanel
  };

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", tz6qsBoot);
  else tz6qsBoot();
})();

</script>

  let activeRecognition = null;

  let statusTimer = null;

        voice_mic_denied: 'Доступ к микрофону запрещён. Разрешите микрофон и попробуйте снова.'
      },
      ua: {
        voice_start_title: 'Голосом: звідки',
        voice_end_title: 'Голосом: куди',
        voice_listening_start: 'Слухаю точку відправлення…',
        voice_listening_end: 'Слухаю пункт призначення…',
        voice_not_supported: 'Голосове введення не підтримується в цьому браузері. Введіть адресу вручну.',
        voice_no_match: 'Адресу не розпізнано. Спробуйте ще раз або введіть вручну.',
        voice_error: 'Помилка голосового введення. Введіть адресу вручну або спробуйте ще раз.',
        voice_set_start: 'Точку відправлення введено голосом',
        voice_set_end: 'Пункт призначення введено голосом',
        voice_mic_denied: 'Доступ до мікрофона заборонено. Дозвольте мікрофон і спробуйте знову.'
      },
      ar: {
        voice_start_title: 'إدخال نقطة البداية بالصوت',
        voice_end_title: 'إدخال الوجهة بالصوت',
        voice_listening_start: 'أستمع إلى نقطة البداية…',
        voice_listening_end: 'أستمع إلى الوجهة…',
        voice_not_supported: 'الإدخال الصوتي غير مدعوم في هذا المتصفح. أدخل العنوان يدويًا.',
        voice_no_match: 'لم ألتقط العنوان. حاول مرة أخرى أو أدخله يدويًا.',
        voice_error: 'خطأ في الإدخال الصوتي. أدخل العنوان يدويًا أو حاول مرة أخرى.',

        voice_set_end: 'تم تعيين الوجهة بالصوت',

    Object.keys(pack).forEach(lang => {
      i18n[lang] = Object.assign({}, i18n[lang] || {}, pack[lang]);

  }

  function tr(key) {
    try { return typeof t === 'function' ? t(key) : key; } catch { return key; }
  }

  function getVoiceLang() {
    try {
      if (typeof voiceLang === 'function') return voiceLang();
      const map = { en: 'en-US', ru: 'ru-RU', ua: 'uk-UA', ar: 'ar-AE' };
      return map[window.currentLang] || 'en-US';
    } catch { return 'en-US'; }
  }

  function ensureStatusEl() {
    let el = document.getElementById('tz9-voice-status');
    if (!el) {
      el = document.createElement('div');
      el.id = 'tz9-voice-status';
      el.className = 'tz9-voice-status';
      document.body.appendChild(el);
    }
    return el;
  }

  function showVoiceStatus(message, type = 'good', timeout = 2400) {
    const el = ensureStatusEl();
    el.textContent = message;
    el.className = 'tz9-voice-status visible ' + type;
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => el.classList.remove('visible'), timeout);
  }

  function stopActiveRecognition() {
    try { if (activeRecognition) activeRecognition.stop(); } catch {}
    document.querySelectorAll('.tz9-voice-btn.listening').forEach(btn => btn.classList.remove('listening'));
    activeRecognition = null;
    activeTarget = null;
  }

  function triggerRouteIfReady() {
    try {
      const start = document.getElementById('start');
      const end = document.getElementById('end');
      if (start && end && start.value.trim() && end.value.trim() && typeof calculateRoutes === 'function') {
        calculateRoutes();
      }
    } catch (err) {
      console.warn('TZ9 voice route trigger skipped:', err);
    }
  }

  function setInputValue(target, text) {
    const input = document.getElementById(target === 'start' ? 'start' : 'end');
    if (!input) return;
    input.value = String(text || '').trim();
    input.dispatchEvent(new Event('input', { bubbles: true }));
    input.dispatchEvent(new Event('change', { bubbles: true }));
    if (target === 'end') triggerRouteIfReady();
  }

  function startVoiceInput(target) {
    if (!SpeechRecognitionCtor) {
      showVoiceStatus(tr('voice_not_supported'), 'warn', 4200);
      return;
    }
    if (activeRecognition) stopActiveRecognition();

    const btn = document.querySelector('.tz9-voice-btn[data-voice-target="' + target + '"]');
    const recognition = new SpeechRecognitionCtor();
    recognition.lang = getVoiceLang();
    recognition.interimResults = false;
    recognition.continuous = false;
    recognition.maxAlternatives = 3;

    activeRecognition = recognition;
    activeTarget = target;
    if (btn) btn.classList.add('listening');
    showVoiceStatus(tr(target === 'start' ? 'voice_listening_start' : 'voice_listening_end'), 'good', 5000);

    recognition.onresult = function(event) {
      const results = event && event.results && event.results[0] ? event.results[0] : null;
      const transcript = results && results[0] ? results[0].transcript : '';
      if (!transcript || !String(transcript).trim()) {
        showVoiceStatus(tr('voice_no_match'), 'warn', 3200);
        return;
      }
      setInputValue(target, transcript);
      showVoiceStatus(tr(target === 'start' ? 'voice_set_start' : 'voice_set_end') + ': ' + transcript, 'good', 3200);
    };

    recognition.onerror = function(event) {
      const err = event && event.error ? event.error : '';
      if (err === 'not-allowed' || err === 'service-not-allowed') {
        showVoiceStatus(tr('voice_mic_denied'), 'bad', 4500);
      } else if (err === 'no-speech' || err === 'audio-capture') {
        showVoiceStatus(tr('voice_no_match'), 'warn', 3500);
      } else {
        showVoiceStatus(tr('voice_error'), 'bad', 3500);
      }
    };

    recognition.onend = function() {
      if (btn) btn.classList.remove('listening');
      if (activeRecognition === recognition) {
        activeRecognition = null;
        activeTarget = null;
      }
    };

    try { recognition.start(); }
    catch (err) {
      console.warn('TZ9 voice start failed:', err);
      if (btn) btn.classList.remove('listening');
      activeRecognition = null;
      activeTarget = null;
      showVoiceStatus(tr('voice_error'), 'bad', 3500);
    }
  }

  function makeVoiceButton(target) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tz9-voice-btn';
    btn.dataset.voiceTarget = target;
    btn.setAttribute('aria-label', tr(target === 'start' ? 'voice_start_title' : 'voice_end_title'));
    btn.title = tr(target === 'start' ? 'voice_start_title' : 'voice_end_title');
    btn.textContent = '🎙';
    btn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      startVoiceInput(target);
    });
    return btn;
  }

  function installButtons() {
    const start = document.getElementById('start');
    const end = document.getElementById('end');
    if (start && !document.querySelector('.tz9-voice-btn[data-voice-target="start"]')) {
      start.insertAdjacentElement('afterend', makeVoiceButton('start'));
    }
    if (end && !document.querySelector('.tz9-voice-btn[data-voice-target="end"]')) {
      end.insertAdjacentElement('afterend', makeVoiceButton('end'));
    }
  }

  function refreshVoiceLabels() {
    document.querySelectorAll('.tz9-voice-btn').forEach(btn => {
      const target = btn.dataset.voiceTarget === 'start' ? 'start' : 'end';
      const key = target === 'start' ? 'voice_start_title' : 'voice_end_title';
      btn.title = tr(key);
      btn.setAttribute('aria-label', tr(key));
    });
  }

  addI18n();
  installButtons();

  const oldSetLang = typeof setLang === 'function' ? setLang : null;
  if (oldSetLang && !oldSetLang.__tz9VoiceWrapped) {
    const wrapped = function(lang) {
      const result = oldSetLang.apply(this, arguments);

      refreshVoiceLabels();

    };
    wrapped.__tz9VoiceWrapped = true;

  }

  document.addEventListener('DOMContentLoaded', function(){
    addI18n();
    installButtons();
    refreshVoiceLabels();
  });

  window.clearRoadTZ9VoiceInput = {
    installed: true,
    supported: !!SpeechRecognitionCtor,
    start: startVoiceInput,
    stop: stopActiveRecognition,
    refresh: function(){ addI18n(); installButtons(); refreshVoiceLabels(); }
  };
})();

</script>

<script id="cr-tz10-ai-assistant">
(function(){
  'use strict';
  if (window.__CLEAR_ROAD_TZ10_AI_ASSISTANT__) return;
  window.__CLEAR_ROAD_TZ10_AI_ASSISTANT__ = true;

  function lang(){
    try {
      return (typeof currentLang !== 'undefined' && currentLang) || localStorage.getItem('clearroad_lang') || document.documentElement.lang || 'en';
    } catch(e) { return 'en'; }
  }
  function esc(v){
    return String(v == null ? '' : v).replace(/[&<>'"]/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];
    });
  }
  function clean(v){
    if (typeof stripHtml === 'function') return stripHtml(v);
    return String(v || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
  }
  function tr(key){
    var L = lang();
    var dict = {
      en:{title:'AI route assistant',status:'ready',listen:'Voice answer',why:'Why',timing:'Timing',fallback:'Build a route first. Then I will explain the best option.',
          noSalik:'No clear Salik risk detected on this option.', salik:'Possible Salik / toll section on this route.', now:'Leaving now looks acceptable.', wait:'Waiting may improve the trip.'},
      ru:{title:'AI помощник маршрута',status:'готов',listen:'Голосовой ответ',why:'Почему',timing:'Когда ехать',fallback:'Сначала постройте маршрут. Потом я объясню лучший вариант.',
          noSalik:'Явного риска Salik на этом варианте не вижу.', salik:'На маршруте возможен Salik / платный участок.', now:'Сейчас ехать можно.', wait:'Небольшое ожидание может улучшить поездку.'},
      ua:{title:'AI помічник маршруту',status:'готово',listen:'Голосова відповідь',why:'Чому',timing:'Коли їхати',fallback:'Спочатку побудуйте маршрут. Потім я поясню найкращий варіант.',
          noSalik:'Явного ризику Salik на цьому варіанті не бачу.', salik:'На маршруті можливий Salik / платна ділянка.', now:'Зараз їхати можна.', wait:'Невелике очікування може покращити поїздку.'},
      ar:{title:'مساعد الطريق بالذكاء الاصطناعي',status:'جاهز',listen:'إجابة صوتية',why:'لماذا',timing:'التوقيت',fallback:'ابنِ المسار أولاً. بعد ذلك سأشرح أفضل خيار.',
          noSalik:'لا يظهر خطر واضح لرسوم سالك في هذا الخيار.', salik:'قد يحتوي هذا الطريق على سالك أو جزء برسوم.', now:'المغادرة الآن تبدو مناسبة.', wait:'الانتظار قليلاً قد يحسن الرحلة.'}
    };
    return (dict[L] && dict[L][key]) || dict.en[key] || key;
  }
  function bestRoute(){
    try {
      if (typeof currentDecision !== 'undefined' && currentDecision && currentDecision.bestRoute) return currentDecision.bestRoute;
      if (typeof selectedRoute !== 'undefined' && selectedRoute) return selectedRoute;
      if (typeof _bestRoute !== 'undefined' && _bestRoute) return _bestRoute;
      if (typeof analyzedRoutes !== 'undefined' && Array.isArray(analyzedRoutes) && analyzedRoutes.length) return analyzedRoutes[0];
    } catch(e) {}
    return null;
  }
  function minutes(r){
    try { if (typeof getDisplayMinutes === 'function') return getDisplayMinutes(r); } catch(e) {}
    try { if (typeof _tz1Minutes === 'function') return _tz1Minutes(r); } catch(e) {}
    return Math.round((r && (r.durationInTraffic || r.duration || r.minutes)) || 0);
  }
  function routeName(r){
    try { if (typeof getRouteSummaryName === 'function') return getRouteSummaryName(r); } catch(e) {}
    try { if (typeof _tz1RouteName === 'function') return _tz1RouteName(r); } catch(e) {}
    return (r && (r.name || r.summary || r.routeName)) || 'selected route';
  }
  function confidence(r){
    try {
      if (typeof currentDecision !== 'undefined' && currentDecision && currentDecision.confidence && currentDecision.confidence.level) return currentDecision.confidence.level;
      if (typeof calculateConfidence === 'function') return calculateConfidence(r, analyzedRoutes);
    } catch(e) {}
    return (r && r.confidence) || 'MEDIUM';
  }
  function hasSalik(r){
    try { if (typeof tz4EstimateSalik === 'function') return Number(tz4EstimateSalik(r) || 0) > 0; } catch(e) {}
    try { if (r && (r.tollCost || r.salikCost || r.salikGates)) return true; } catch(e) {}
    var text = JSON.stringify(r || {}).toLowerCase();
    return /salik|toll|darb/.test(text);
  }
  function timingLine(r){
    try {
      if (typeof generateTimeInsight === 'function') {
        var insight = clean(generateTimeInsight(r));
        if (insight) return insight;
      }
    } catch(e) {}
    return tr('now');
  }
  function fullText(mode){
    var r = bestRoute();
    if (!r) return tr('fallback');
    var L = lang();
    var name = routeName(r);
    var min = minutes(r);
    var conf = String(confidence(r) || 'MEDIUM').toUpperCase();
    var why = '';
    try { if (typeof getAIAdviceText === 'function') why = clean(getAIAdviceText(r)); } catch(e) {}
    if (!why) {
      try { if (typeof getRouteInsight === 'function') why = clean(getRouteInsight(r, r, r)); } catch(e) {}
    }
    var salik = hasSalik(r) ? tr('salik') : tr('noSalik');
    var timing = timingLine(r);
    if (mode === 'timing') return timing;
    if (mode === 'salik') return salik;
    if (mode === 'why' && why) return why;
    if (L === 'ru') return 'AI объяснение: лучший вариант сейчас — через ' + name + ', примерно ' + min + ' минут. ' + (why ? why + ' ' : '') + salik + ' Тайминг: ' + timing + ' Уверенность: ' + conf + '.';

      '</div>';
    var anchor = hero.querySelector('.decision-actions') || hero.querySelector('.ai-advice-line') || hero.lastElementChild;

  var oldSpeak = window.speakCurrentDecision;

    try { return window.tz10SpeakAIAssistant('full'); }
    catch(e) { if (typeof oldSpeak === 'function') return oldSpeak.apply(this, arguments); }
  };

})();

</script>
<!-- ===== ТЗ-11: CODE CLEANUP / STABILIZATION LAYER ===== -->
<script id="cr-tz11-cleanup">
(function(){
  'use strict';
  const TZ11_VERSION = 'TZ11_CLEANUP_STABILITY_2026_04_25';

  function log(status, name, detail){
    const fn = status === 'ok' ? console.log : console.warn;
    fn('[TZ11]', status.toUpperCase(), name, detail || '');
  }

  function safeGet(id){
    try { return document.getElementById(id); } catch (_) { return null; }
  }

  function ensureBodyClass(){
    if (!document.body) return;
    document.body.classList.add('tz11-stabilized');
    document.documentElement.setAttribute('data-tz11', TZ11_VERSION);
  }

  function protectFunction(name, fallback){
    if (typeof window[name] !== 'function') {
      window[name] = fallback || function(){
        log('warn', name, 'Fallback called because original function is missing.');
      };
      return false;
    }
    return true;
  }

  function safeCall(name, args){
    try {
      if (typeof window[name] === 'function') return window[name].apply(window, args || []);
    } catch (err) {
      log('warn', name, err && err.message ? err.message : err);
    }
    return null;
  }

  function installSafeWrappers(){
    ['startDriveMode','exitDriveMode','requestGPS','calculateRoutes','renderResults','setLang','speakCurrentDecision','startRouteVoiceInput']
      .forEach(name => protectFunction(name));

    const wrapList = ['renderResults','setLang','speakCurrentDecision','startRouteVoiceInput','requestGPS','startDriveMode'];
    wrapList.forEach(name => {
      const original = window[name];
      if (typeof original !== 'function' || original.__tz11Wrapped) return;
      const wrapped = function(){
        try {
          return original.apply(this, arguments);
        } catch (err) {
          log('warn', name, err && err.message ? err.message : err);
          return null;
        }
      };
      wrapped.__tz11Wrapped = true;
      wrapped.__tz11Original = original;
      window[name] = wrapped;
    });
  }

  function stabilizeDom(){
    ensureBodyClass();
    const requiredIds = ['start','end','results','drive-mode','drive-status','drive-map','modal-overlay','modal-content'];
    requiredIds.forEach(id => {
      if (safeGet(id)) log('ok', 'DOM #' + id);
      else log('warn', 'DOM #' + id, 'missing');
    });

    document.querySelectorAll('[data-i18n], [data-i18n-ph]').forEach(el => {
      if (!el.getAttribute('data-tz11-i18n-checked')) el.setAttribute('data-tz11-i18n-checked', 'true');
    });

    const lang = (window.currentLang || localStorage.getItem('clearRoadLang') || document.documentElement.lang || 'en').toLowerCase();
    if (lang === 'ar') {
      document.body.classList.add('rtl','tz8-rtl-ar');
      document.documentElement.setAttribute('dir','rtl');
      document.documentElement.setAttribute('lang','ar');
    }
  }

  function normalizeStorage(){
    const keys = ['clearRoadSavedPlaces','clearRoadRecentPlaces','clearRoadUserPreference','clearRoadFilters','clearRoadLang'];
    keys.forEach(k => {
      try { localStorage.getItem(k); log('ok', 'localStorage ' + k); }
      catch (err) { log('warn', 'localStorage ' + k, err && err.message ? err.message : err); }
    });
  }

  function auditLayers(){
    const source = document.documentElement.innerHTML;
    const markers = [
      'Drive Mode Reality Fix',
      'GPS STABILITY LAYER',
      'PREDICTIVE ENGINE STABILITY LAYER',
      'UAE-ONLY LOCAL LOGIC',
      'FILTERS / PREFERENCES',
      'SAVED PLACES / QUICK START',
      'MULTILANGUAGE / I18N',
      'RTL ARABIC UI POLISH',
      'VOICE INPUT / SPEECH RECOGNITION',
      'AI ASSISTANT / VOICE ADVICE'
    ];
    const result = {};
    markers.forEach((m, i) => {
      const ok = source.indexOf(m) !== -1;
      result['TZ' + (i + 1)] = ok;
      log(ok ? 'ok' : 'warn', 'ТЗ-' + (i + 1), m);
    });
    window.clearRoadTZ11Audit = result;
    return result;
  }

  function run(){
    installSafeWrappers();
    stabilizeDom();
    normalizeStorage();
    auditLayers();
    window.clearRoadTZ11 = { version: TZ11_VERSION, runAudit: auditLayers, safeCall };
    log('ok', 'ТЗ-11 stabilization loaded', TZ11_VERSION);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run, { once:true });
  else run();
})();

</script>

<script id="cr-tz12-final-audit">
(function(){
  'use strict';
  const TZ12_VERSION = 'TZ12_FINAL_AUDIT_DEMO_2026_04_25';

  const DEMO_ROUTES = [
