  <style id="clear-road-inline-theme">
/* ===== clear-road.css block 1/7 (DOM order, Phase 2) ===== */
html { color-scheme: dark; }
* { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: hsl(220 14% 5%);
        --surface: hsl(220 12% 7%);
        --surface2: hsl(220 11% 10%);
        --surface3: hsl(220 10% 14%);
        --green: hsl(72 96% 56%);
        --green-dim: hsl(72 80% 45%);
        --green-glow: hsla(72,96%,56%,0.15);
        --blue: hsl(210 90% 60%);
        --amber: hsl(38 95% 58%);
        --text: hsl(30 10% 96%);
        --text2: hsl(220 8% 56%);
        --text3: hsl(220 10% 40%);
        --border: hsl(220 10% 14%);
        --border2: hsl(220 10% 20%);
        --shadow-elev: 0 20px 60px -20px rgba(0,0,0,.6), 0 8px 24px -8px rgba(0,0,0,.4);
        --shadow-glow: 0 0 60px -10px hsla(72,96%,56%,.35);
      }

      body {
        font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding-bottom: 80px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "ss01", "cv11", "tnum";
      }

      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
      ::selection { background: hsla(72,96%,56%,.3); color: var(--text); }

      /* ===== HERO SECTION (map background) ===== */
      .hero-section {
        position: relative;
        z-index: 5;
        isolation: isolate;
        height: max(28vh, 238px);
        min-height: 238px;
        max-height: 320px;
        background: hsl(220 16% 9%);
        overflow: hidden;
        flex-shrink: 0;
      }
      .hero-section::after {
        content: "";
        position: absolute; left: 0; right: 0; bottom: 0;
        height: 55%;
        background: linear-gradient(180deg, transparent, var(--bg) 80%);
        pointer-events: none;
      }

      #map {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }
      #map[data-cr-maps-auth="failed"] {
        box-sizing: border-box;
        outline: 2px dashed rgba(248, 113, 113, 0.55);
        outline-offset: -2px;
        background: hsl(220 16% 12%);
      }

      /* TOP FLOATING BAR */
      /* Above #map (z-index 0) and above overlapping main content (content-scroll z-index 1) */
      .top-bar {
        position: absolute;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        display: flex;
        align-items: flex-start;
        gap: 0.625rem;
        z-index: 50;
        pointer-events: auto;
      }

      .top-btn {
        display: grid; place-items: center;
        height: 2.5rem; width: 2.5rem;
        border-radius: 1rem;
        background: hsla(220,10%,14%,.7);
        border: 1px solid hsla(220,10%,20%,.35);
        color: hsla(30,10%,96%,.72);
        cursor: pointer; flex-shrink: 0;
        transition: background 0.15s ease;
      }
      .top-btn:hover { background: hsl(220 10% 18%); }

      .route-panel {
        flex: 1;
        position: relative;
        z-index: 1;
        pointer-events: auto;
        background: hsla(220,11%,10%,.55);
        backdrop-filter: blur(16px) saturate(120%);
        -webkit-backdrop-filter: blur(16px) saturate(120%);
        border: 1px solid hsla(220,10%,20%,.5);
        border-radius: 14px;
        padding: 0.5rem;
        overflow: visible;
        min-width: 0;
      }

      .route-row {
        display: flex; align-items: center; gap: 0.75rem;
        padding: 0.625rem 0.75rem;
      }

      .route-row:first-child { border-bottom: 1px solid var(--border); }

      .route-field {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 4px;
        min-width: 0;
      }
      .route-field .route-input {
        flex: 1;
        min-width: 0;
      }
      .route-clear-btn {
        flex-shrink: 0;
        width: 1.6rem;
        height: 1.6rem;
        padding: 0;
        border: none;
        border-radius: 8px;
        background: hsla(220,10%,22%,0.88);
        color: hsla(30,10%,88%,0.8);
        font-size: 1.05rem;
        line-height: 1;
        cursor: pointer;
        font-family: inherit;
        display: grid;
        place-items: center;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .route-clear-btn:hover {
        background: hsla(220,10%,30%,0.95);
        color: var(--text);
      }
      .route-clear-btn:focus-visible {
        outline: 2px solid hsla(72, 96%, 56%, 0.45);
        outline-offset: 1px;
      }
      body.rtl .route-field { flex-direction: row-reverse; }

      .route-dot {
        position: relative;
        width: 0.5rem; height: 0.5rem;
        border-radius: 9999px;
        background: var(--text3); flex-shrink: 0;
      }
      .route-dot.green { 
        background: var(--green);
      }
      .route-dot.green::before {
        content: "";
        position: absolute; inset: 0;
        border-radius: 9999px;
        background: hsla(72,96%,56%,.6);
        animation: ping 2.4s ease-out infinite;
      }
      @keyframes ping { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(3); opacity: 0; } }

      .route-label {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
        color: var(--text2); margin-right: 0.5rem;
      }
      .route-input {
        flex: 1;
        position: relative;
        z-index: 1;
        pointer-events: auto;
        background: transparent; border: none; outline: none;
        font-size: 14px; font-weight: 450; color: var(--text); font-family: inherit;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .route-input::placeholder { color: var(--text3); font-weight: 400; }
      .route-input:focus,
      .route-input:focus-visible {
        outline: none;
        box-shadow: 0 0 0 1.5px hsla(72, 96%, 56%, 0.5);
        border-radius: 6px;
      }
      .route-input.gps-resolving::placeholder {
        color: var(--amber);
        font-weight: 500;
      }

      .gps-btn-top {
        display: grid; place-items: center;
        height: 2.5rem; width: 2.5rem;
        border-radius: 1rem;
        background: hsl(220 10% 14%);
        border: none; cursor: pointer; flex-shrink: 0;
        color: hsla(30,10%,96%,.8);
        transition: background 0.15s ease;
      }
      .gps-btn-top:hover { background: hsl(220 10% 18%); }
      .gps-btn-top svg { width: 1rem; height: 1rem; fill: currentColor; }
      .gps-btn-top.gps-loading { opacity: 0.5; pointer-events: none; }

      .route-mode-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 4px;
        padding-top: 6px;
        border-top: 1px solid rgba(255,255,255,0.06);
      }
      .route-mode-toggle {
        display: inline-flex;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.10);
        overflow: hidden;
        background: rgba(0,0,0,0.25);
      }
      .route-mode-btn {
        padding: 6px 12px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        border: none;
        cursor: pointer;
        font-family: inherit;
        color: var(--text3);
        background: transparent;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .route-mode-btn + .route-mode-btn { border-left: 1px solid rgba(255,255,255,0.08); }
      .route-mode-btn.active {
        color: var(--green);
        background: var(--green-glow);
      }
      .route-mode-btn:focus-visible { outline: 2px solid hsla(72, 96%, 56%, 0.45); outline-offset: 1px; }
      .route-mode-hint {
        font-size: 11px;
        color: var(--text2);
        line-height: 1.3;
        flex: 1;
        min-width: 120px;
      }

      /* LIVE BADGE */
      .live-badge {
        display: none !important;
      }
      .live-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--green);
        animation: livePulse 1.6s infinite;
      }
      @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

      /* ===== CONTROLS STRIP (hidden - minimal UI) ===== */
      .controls-strip {
        display: none !important;
      }

      .pref-bar { display:none; }
      .pref-btn {
        flex:1; padding:5px 8px; font-size:11px;
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
        border-radius:9px; cursor:pointer; font-family:inherit; color: var(--text3);
        transition: all 0.15s;
      }
      .pref-btn.active { background: var(--green-glow); color: var(--green); border-color: rgba(34,211,160,0.30); }

      .filter-bar { display:none; }
      .filter-btn {
        flex:1; padding:4px 8px; font-size:10px;
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
        border-radius:7px; cursor:pointer; font-family:inherit; color: var(--text3);
      }
      .filter-btn.active { background: rgba(245,158,11,0.12); color: #fbbf24; border-color: rgba(245,158,11,0.28); }

      .lang-bar { display:flex; gap:4px; margin-left: auto; }
      .lang-btn {
        padding:3px 10px; border-radius:16px; border:1px solid rgba(255,255,255,0.06);
        background:rgba(17,24,39,0.5); font-size:10px; font-weight:600;
        cursor:pointer; color:var(--text3); transition:all 0.15s; min-width:28px;
      }
      .lang-btn.active { background:var(--green); color:#090e1a; border-color:var(--green); }

      /* ===== CONTENT SCROLL ===== */
      .content-scroll {
        flex: 1;
        overflow-y: auto;
        position: relative;
        z-index: 1;
      }

      /* Route results: vertical stack so panels never sit under a fixed overlay */
      #results {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        padding: 4px 0 10px;
        min-height: 0;
      }

      /* ===== PREMIUM DECISION HERO (Lovable style) ===== */
      /* In-flow below the map: participates in scroll stack; alternatives stay visible below */
      .decision-hero {
        position: relative;
        left: auto;
        right: auto;
        bottom: auto;
        margin: 0.25rem 12px 0;
        max-width: 760px;
        margin-left: auto;
        margin-right: auto;
        background: hsla(220,11%,10%,.85);
        backdrop-filter: blur(32px) saturate(160%);
        -webkit-backdrop-filter: blur(32px) saturate(160%);
        border: 1px solid hsla(220,10%,20%,.9);
        border-radius: 24px;
        padding: 0.85rem 1.15rem 0.7rem;
        z-index: 1;
        overflow: visible;
        box-shadow: var(--shadow-elev), inset 0 1px 0 hsla(255,255,255,.04);
        pointer-events: auto;
        flex-shrink: 0;
      }
      .decision-hero * {
        pointer-events: auto;
      }
      .decision-hero::before {
        content:''; position:absolute; top:0; left:0; right:0; height:2px;
        background: linear-gradient(90deg, transparent 0%, var(--green) 50%, transparent 100%);
        opacity: 0.6;
      }

      .dh-overline {
        font-size: 11px; font-weight: 500; letter-spacing: 0.22em;
        color: var(--green); text-transform: uppercase; margin-bottom: 0.45rem;
        display: flex; align-items: center; gap: 0.5rem;
      }
      .dh-overline::before {
        content: "★";
        display: inline-grid; place-items: center;
        width: 1.5rem; height: 1.5rem;
        border-radius: 9999px;
        background: hsla(72,96%,56%,.15);
        font-size: 10px;
      }
      .dh-meta-row {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 0.75rem;
      }
      .dh-live-tag {
        display: inline-flex; align-items: center; gap: 0.375rem;
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
        color: var(--text2);
      }
      .dh-live-dot {
        width: 0.375rem; height: 0.375rem;
        border-radius: 9999px;
        background: hsl(142 70% 50%);
        animation: pulseDot 2.4s ease-in-out infinite;
      }
      @keyframes pulseDot { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: 0.4; } }
      .dh-headline {
        display: none;
      }
      .dh-check { display: none; }
      .dh-eta {
        font-size: clamp(38px, 8vw, 60px);
        font-weight: 200;
        color: var(--pv-neon);
        line-height: 1;
        letter-spacing: -0.03em;
        margin-bottom: 0.45rem;
        text-shadow:
          0 0 40px rgba(223, 255, 0, 0.38),
          0 0 88px rgba(223, 255, 0, 0.12);
      }
      .dh-eta .dh-min {
        font-size: 11px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.42);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        margin-left: 0.5rem;
        vertical-align: middle;
      }
      .dh-chips { display:none; }
      .chip {
        padding: 4px 10px; border-radius: 20px;
        font-size: 11px; font-weight: 600;
        background: var(--surface2); color: var(--text2); border: 1px solid var(--border2);
      }
      .chip.chip-green { background:rgba(34,211,160,0.11); color:var(--green); border-color:rgba(34,211,160,0.25); }
      .chip.chip-blue  { background:rgba(96,165,250,0.11); color:var(--blue); border-color:rgba(96,165,250,0.25); }
      .chip.chip-amber { background:rgba(245,158,11,0.11); color:var(--amber); border-color:rgba(245,158,11,0.25); }

      .dh-route-line { 
        font-size: 14px; color: hsla(30,10%,96%,.85); 
        margin-bottom: 0.55rem; font-weight: 400; 
        line-height: 1.35; text-wrap: balance;
      }
      .dh-route-line em { color: var(--text); font-style: normal; }
      .dh-route-line span { color: var(--text2); }

      .ai-advice-line {
        margin: -2px 0 8px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(223, 255, 0, 0.06);
        border: 1px solid rgba(223, 255, 0, 0.22);
        color: rgba(255, 255, 255, 0.92);
        font-size: 12px;
        font-weight: 600;
        line-height: 1.35;
        max-height: 5.75rem;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        transition: border-color 0.25s var(--pv-ease), background 0.25s var(--pv-ease);
      }
      .ai-advice-line span {
        color: var(--pv-neon);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 10px;
        margin-right: 6px;
      }
      body.rtl .ai-advice-line span { margin-right:0; margin-left:6px; }

      /* Signals grid disabled: design reference only, no new visible blocks */
      .dh-signals { display: none !important; }
      .dh-signal { display: none !important; }
      .dh-signal-head { display: none !important; }
      .dh-signal-val { display: none !important; }

      /* inline wait-hint — integrated into hero */
      .dh-wait-hint { 
        margin-bottom: 18px; 
        background: rgba(96,165,250,0.08);
        border: 1px solid rgba(96,165,250,0.15);
        border-radius: 14px;
        padding: 14px 16px;
      }
      .dh-wait-title { 
        display:block; 
        font-size:10px; font-weight:700; letter-spacing:0.8px;
        color:var(--blue); text-transform:uppercase; margin-bottom:6px;
      }
      .dh-wait-times { font-size:15px; font-weight:700; color:var(--text); letter-spacing:-0.2px; line-height:1.4; }
      .dh-wait-save  { font-size:13px; color:var(--green); font-weight:700; margin-top:6px; }

      /* slim confidence strip — secondary, bottom of hero */
      .dh-conf-slim {
        display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
        margin-top: 2px; padding-top: 8px;
        border-top: 1px solid var(--border);
      }
      .dh-conf-label {
        font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
        color: var(--text3); text-transform: uppercase;
      }
      .dh-conf-level {
        font-size: 10px; font-weight: 700;
        padding: 1px 7px; border-radius: 8px; text-transform: uppercase;
      }
      .dh-conf-level.high   { background:rgba(34,211,160,0.12); color:var(--green); }
      .dh-conf-level.medium { background:rgba(245,158,11,0.12); color:var(--amber); }
      .dh-conf-level.low    { background:rgba(148,163,184,0.10); color:var(--text3); }
      .dh-conf-pct { font-size:11px; font-weight:600; color:var(--text3); }
      .dh-conf-bar { flex:1; min-width:60px; height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; }
      .dh-conf-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.6s ease; }

      /* ===== PREDICTIVE CARD (hidden - merged into hero) ===== */
      .predictive-card {
        display: none !important;
      }
      .predictive-card-legacy {
        margin: 0 14px 10px;
        background: var(--surface2);
        border: 1px solid rgba(96,165,250,0.18);
        border-radius: 16px;
        padding: 14px 16px;
        display: flex; align-items: flex-start; gap: 14px;
      }
      .pc-icon {
        width: 42px; height: 42px; border-radius: 12px;
        background: rgba(96,165,250,0.12);
        display:flex; align-items:center; justify-content:center;
        font-size:20px; flex-shrink:0;
      }
      .pc-content { flex:1; }
      .pc-title {
        font-size:10px; font-weight:700; letter-spacing:0.8px;
        color:var(--blue); text-transform:uppercase; margin-bottom:3px;
      }
      .pc-main { font-size:14px; font-weight:600; color:var(--text); margin-bottom:3px; }
      .pc-sub  { font-size:12px; color:var(--text2); }
      .pc-save { font-size:12px; font-weight:700; color:var(--green); white-space:nowrap; padding-top:2px; }
      .pc-actions { display:flex; gap:8px; margin-top:10px; }
      .pc-action-btn {
        flex:1; padding:9px 12px; border-radius:10px;
        font-size:13px; font-weight:600; border:none; cursor:pointer; font-family:inherit;
      }
      .pc-action-btn.primary { background:var(--green); color:#090e1a; }
      .pc-action-btn.secondary { background:var(--surface); color:var(--text2); border:1px solid var(--border2); }

      /* ===== CTA — primary neon pill ===== */
      .cta-row {
        margin: 0;
        margin-top: 0.75rem;
        padding: 0 14px 0.65rem;
        flex-shrink: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .cta-start {
        width: 100%;
        max-width: min(680px, 100%);
        margin: 0 auto;
        min-height: 56px;
        max-height: none;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.62rem 1.4rem;
        background: linear-gradient(180deg, #edff4a 0%, var(--pv-neon) 100%);
        color: #0b0b0f;
        border: 1px solid rgba(223, 255, 0, 0.65);
        border-radius: 999px;
        font-size: 14px;
        font-weight: 750;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        line-height: 1.2;
        cursor: pointer;
        box-shadow:
          0 0 32px rgba(223, 255, 0, 0.45),
          0 12px 36px -12px rgba(223, 255, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.45);
        transition:
          transform 0.22s var(--pv-ease),
          box-shadow 0.22s var(--pv-ease),
          filter 0.22s var(--pv-ease);
        font-family: inherit;
        box-sizing: border-box;
      }
      .cta-start:hover {
        transform: scale(1.025) translateY(-1px);
        filter: brightness(1.08);
        box-shadow:
          0 0 44px rgba(223, 255, 0, 0.58),
          0 16px 42px -10px rgba(223, 255, 0, 0.48),
          inset 0 1px 0 rgba(255, 255, 255, 0.55);
      }
      .cta-start:active {
        transform: scale(0.985) translateY(1px);
        filter: brightness(0.97);
        box-shadow:
          0 0 22px rgba(223, 255, 0, 0.32),
          inset 0 2px 8px rgba(0, 0, 0, 0.18);
      }
      .cta-start:focus-visible {
        outline: 2px solid var(--pv-neon);
        outline-offset: 3px;
      }
      .cta-start small {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        opacity: 0.82;
        line-height: 1.15;
      }
      .cta-details {
        display: none !important;
      }

      /* ===== OTHER ROUTES — glass panel ===== */
      .other-routes {
        margin: 0 12px 8px;
        background: linear-gradient(180deg, rgba(24, 24, 34, 0.72) 0%, rgba(12, 12, 18, 0.86) 100%);
        backdrop-filter: blur(28px) saturate(150%);
        -webkit-backdrop-filter: blur(28px) saturate(150%);
        border: 1px solid rgba(223, 255, 0, 0.12);
        border-radius: 26px;
        overflow: hidden;
        box-shadow:
          0 18px 48px -26px rgba(0, 0, 0, 0.72),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .other-routes .alt-row { display: none; }
      .other-routes.expanded .alt-row { display: block; }
      .see-alts-btn {
        width: 100%; padding: 1rem 1.25rem 0.5rem;
        background: transparent; border: none;
        font-size: 10px; font-weight: 500; color: var(--text2);
        display: flex; align-items: center; justify-content: space-between;
        text-transform: uppercase; letter-spacing: 0.22em;
        cursor: pointer; transition: color 0.15s;
      }
      .see-alts-btn:hover { color: var(--text); }
      .see-alts-btn .arrow { transition: transform 0.2s; font-size: 10px; }
      .other-routes.expanded .see-alts-btn .arrow { transform: rotate(180deg); }
      .alt-routes-panel {
        margin: 0 12px;
        background: linear-gradient(180deg, rgba(26, 26, 36, 0.78) 0%, rgba(12, 12, 18, 0.9) 100%);
        backdrop-filter: blur(32px) saturate(160%);
        -webkit-backdrop-filter: blur(32px) saturate(160%);
        border: 1px solid rgba(223, 255, 0, 0.16);
        border-radius: 26px;
        overflow: hidden;
        flex-shrink: 0;
        position: relative;
        z-index: 2;
        box-shadow:
          0 22px 52px -24px rgba(0, 0, 0, 0.75),
          0 0 48px -28px rgba(223, 255, 0, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      .alt-routes-head {
        padding: 0.62rem 1.2rem 0.2rem;
      }
      .alt-routes-micro {
        font-size: 12px;
        font-weight: 650;
        letter-spacing: 0.04em;
        color: hsla(30, 10%, 96%, 0.9);
        line-height: 1.25;
        margin-bottom: 0.2rem;
      }
      .alt-routes-heading {
        padding: 0 0 0.35rem;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(223, 255, 0, 0.62);
      }
      .alt-routes-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 8px 12px 14px;
      }
      .alt-route-row {
        width: 100%;
        margin: 0;
        padding: 0.95rem 1.15rem;
        display: block;
        text-align: left;
        font: inherit;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 20px;
        background: rgba(20, 20, 30, 0.55);
        backdrop-filter: blur(20px) saturate(145%);
        -webkit-backdrop-filter: blur(20px) saturate(145%);
        color: rgba(255, 255, 255, 0.9);
        box-shadow:
          0 12px 36px -20px rgba(0, 0, 0, 0.65),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        transition:
          transform 0.26s var(--pv-ease),
          box-shadow 0.26s var(--pv-ease),
          opacity 0.26s var(--pv-ease),
          border-color 0.26s var(--pv-ease),
          background 0.26s var(--pv-ease);
      }
      .alt-route-row:not(.alt-route-row--best) {
        opacity: 0.74;
      }
      .alt-route-row:not(.alt-route-row--best):hover {
        opacity: 0.9;
      }
      .alt-route-row:hover {
        transform: translateY(-3px);
        border-color: rgba(223, 255, 0, 0.22);
        box-shadow:
          0 20px 48px -18px rgba(0, 0, 0, 0.68),
          0 0 0 1px rgba(223, 255, 0, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      .alt-route-row--best {
        padding: 1.12rem 1.28rem;
        background: linear-gradient(165deg, rgba(36, 36, 48, 0.88) 0%, rgba(18, 18, 28, 0.92) 100%);
        border-color: rgba(223, 255, 0, 0.48);
        opacity: 1;
        transform: translateY(-2px);
        z-index: 1;
        animation: pvNeonPulse 2.85s ease-in-out infinite;
      }
      .alt-route-row--best:hover {
        transform: translateY(-5px);
        animation: none;
        border-color: rgba(223, 255, 0, 0.65);
        box-shadow:
          0 28px 64px -18px rgba(223, 255, 0, 0.32),
          0 0 0 1px rgba(223, 255, 0, 0.62),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      .alt-route-row.is-selected {
        background: rgba(223, 255, 0, 0.08);
        box-shadow:
          inset 4px 0 0 var(--pv-neon),
          0 0 0 1px rgba(223, 255, 0, 0.28),
          0 16px 40px -22px rgba(0, 0, 0, 0.55);
      }
      .alt-route-row--best.is-selected {
        background: linear-gradient(165deg, rgba(40, 40, 52, 0.92) 0%, rgba(24, 24, 34, 0.95) 100%);
        box-shadow:
          inset 4px 0 0 var(--pv-neon),
          0 0 0 1px rgba(223, 255, 0, 0.52),
          0 24px 56px -18px rgba(223, 255, 0, 0.22);
      }
      .alt-route-row:focus-visible {
        outline: 2px solid var(--pv-neon);
        outline-offset: 2px;
      }
      .alt-route-row-main {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        align-items: flex-start;
      }
      .alt-route-time-block {
        display: flex;
        align-items: baseline;
        gap: 0.35rem;
        margin-bottom: 0.15rem;
        unicode-bidi: isolate;
      }
      .alt-route-row:not(.alt-route-row--best) .alt-route-time {
        font-size: clamp(26px, 6vw, 36px);
        font-weight: 250;
        letter-spacing: -0.03em;
        line-height: 1;
        color: rgba(255, 255, 255, 0.82);
      }
      .alt-route-row--best .alt-route-time {
        font-size: clamp(39px, 9vw, 56px);
        font-weight: 200;
        letter-spacing: -0.04em;
        line-height: 1;
        color: var(--pv-neon);
        text-shadow: 0 0 28px rgba(223, 255, 0, 0.42);
      }
      .alt-route-time-unit {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.38);
      }
      .alt-route-row--best .alt-route-time-unit {
        color: rgba(223, 255, 0, 0.68);
      }
      .alt-route-subtitle {
        font-size: 12px;
        font-weight: 500;
        line-height: 1.3;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.44);
      }
      .alt-route-row--best .alt-route-subtitle {
        color: rgba(255, 255, 255, 0.58);
      }
      .alt-route-title {
        font-size: 13px;
        font-weight: 500;
        line-height: 1.3;
        word-break: break-word;
      }
      .alt-route-selling {
        display: block;
        width: 100%;
        font-size: 11px;
        font-weight: 650;
        color: rgba(223, 255, 0, 0.74);
        letter-spacing: 0.03em;
        line-height: 1.4;
        margin-top: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .alt-route-badges { display: flex; flex-wrap: wrap; gap: 0.28rem; }
      .alt-route-badge {
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.2rem 0.38rem;
        border-radius: 6px;
        border: 1px solid rgba(223, 255, 0, 0.16);
        color: rgba(255, 255, 255, 0.55);
        background: rgba(14, 14, 20, 0.55);
      }
      .alt-route-badge.alt-badge-fast { color: var(--amber); border-color: hsla(38,95%,58%,.35); }
      .alt-route-badge.alt-badge-calm { color: var(--blue); border-color: hsla(210,90%,60%,.35); }
      .alt-route-badge.alt-badge-toll { color: var(--green); border-color: hsla(72,96%,56%,.35); }
      .alt-route-badge.alt-badge-stress { color: #93c5fd; border-color: hsla(213,94%,68%,.35); }
      @media (min-width: 768px) {
        .alt-route-row {
          padding: 0.95rem 1.2rem;
        }
        .alt-route-row--best {
          padding: 1.18rem 1.32rem;
        }
      }
      .section-head {
        display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;
      }
      .section-head > span:first-child {
        font-size:10px; font-weight:700; letter-spacing:0.8px;
        color:var(--text3); text-transform:uppercase;
      }
      .how-compare { font-size:10px; color:var(--text3); cursor:pointer; }
      .alt-row { display: block; }
      .alt-card-p {
        width: 100%;
        display: flex; align-items: center; gap: 1rem;
        padding: 0.875rem 1.25rem;
        background: transparent; border: none;
        border-top: 1px solid var(--border);
        cursor: pointer; transition: background 0.15s;
        text-align: left;
      }
      .alt-card-p:first-child { border-top: none; }
      .alt-card-p:hover { background: hsla(220,10%,14%,.4); }
      .alt-bar {
        height: 1.75rem; width: 0.25rem;
        border-radius: 9999px; flex-shrink: 0;
        background: var(--blue);
      }
      .alt-bar.faster { background: var(--amber); }
      .alt-bar.relaxed { background: var(--blue); }
      .alt-bar.no-tolls { background: var(--green); }
      .alt-role { display: none; }
      .alt-body { flex: 1; min-width: 0; }
      .alt-time-p {
        display: flex; align-items: center; gap: 0.5rem;
        font-size: 14px; font-weight: 500; color: var(--text);
        margin-bottom: 0.125rem;
      }
      .alt-time-p span { 
        font-size: 10px; font-weight: 500; color: var(--text2);
        text-transform: uppercase; letter-spacing: 0.18em;
      }
      .alt-label-p { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .alt-badges { display: none; }
      .alt-insight { display: none; }
      .alt-end { text-align: right; }
      .alt-end-time { font-weight: 500; font-size: 15px; color: var(--text); font-variant-numeric: tabular-nums; }
      .alt-end-diff { font-size: 10px; letter-spacing: 0.06em; color: var(--text2); font-variant-numeric: tabular-nums; }
      .alt-end-diff.warn { color: var(--amber); }
      .alt-chev { width: 1rem; height: 1rem; color: hsla(220,8%,56%,.6); flex-shrink: 0; }

      /* ===== INFO STRIP (removed from main screen) ===== */
      .info-strip {
        display: none !important;
      }
      .info-item { display:flex; flex-direction:column; align-items:center; gap:2px; }
      .info-label { font-size:9px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.4px; }
      .info-value { font-size:12px; font-weight:600; color:var(--text2); }

      /* ===== QUICK ACCESS (hidden on initial load) ===== */
      /* visibility: JS adds .hidden when routes render; global .hidden { display:none !important } */
      .quick-section { margin: 16px 14px 12px; }
      .quick-title { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
      .quick-list { background:var(--surface); border-radius:14px; overflow:hidden; border:1px solid var(--border); }
      .quick-item {
        display:flex; align-items:center; gap:14px; padding:15px 16px;
        border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.12s;
      }
      .quick-item:last-child { border-bottom:none; }
      .quick-item:hover { background:var(--surface2); }
      .quick-icon { width:38px; height:38px; background:var(--surface2); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
      .quick-label { flex:1; font-size:15px; font-weight:500; color:var(--text); }
      .quick-arrow { color:var(--text3); font-size:18px; }

      /* ===== BOTTOM NAV (Lovable pill style) ===== */
      .bottom-nav {
        position: fixed; 
        bottom: max(env(safe-area-inset-bottom), 0.75rem);
        left: 50%; transform: translateX(-50%);
        background: hsla(220,11%,10%,.85);
        backdrop-filter: blur(32px) saturate(160%);
        -webkit-backdrop-filter: blur(32px) saturate(160%);
        border: 1px solid hsla(220,10%,20%,.9);
        border-radius: 9999px;
        display: flex; align-items: center; gap: 0.25rem;
        padding: 0.5rem; z-index: 100;
        box-shadow: var(--shadow-elev);
      }
      .nav-item {
        display: inline-flex; align-items: center; gap: 0.5rem;
        border-radius: 9999px; padding: 0.625rem 1rem;
        cursor: pointer; color: var(--text2);
        transition: all 0.15s ease;
        font-size: 12px; font-weight: 500;
      }
      .nav-item.active { 
        background: var(--green); 
        color: hsl(220 20% 6%);
        box-shadow: var(--shadow-glow);
      }
      .nav-item:hover:not(.active) { color: var(--text); }
      .nav-item svg { width: 1rem; height: 1rem; }
      .nav-label { 
        font-size: 10px; font-weight: 500; 
        text-transform: uppercase; letter-spacing: 0.16em;
      }

      /* ===== ROUTE DETAILS MODAL ===== */
      .modal-overlay {
        position:fixed; top:0; left:0; right:0; bottom:0;
        background:rgba(0,0,0,0.72);
        display:flex; align-items:flex-end; justify-content:center;
        z-index:1000; opacity:0; visibility:hidden;
        transition:opacity 0.2s, visibility 0.2s;
      }
      .modal-overlay.visible { opacity:1; visibility:visible; }
      .modal-content {
        background:var(--surface); border-radius:24px 24px 0 0;
        padding:24px; width:100%; max-width:500px; max-height:85vh; overflow-y:auto;
        transform:translateY(100%); transition:transform 0.3s ease;
        border:1px solid var(--border2); border-bottom:none;
      }
      .modal-overlay.visible .modal-content { transform:translateY(0); }
      .modal-handle { width:40px; height:4px; background:var(--surface2); border-radius:2px; margin:0 auto 20px; }
      .modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
      .modal-title { font-size:22px; font-weight:700; color:var(--text); }
      .modal-role-badge { padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600; text-transform:uppercase; }
      .modal-role-badge.recommended { background:var(--green); color:#090e1a; }
      .modal-role-badge.alternative { background:var(--surface2); color:var(--text2); }
      .detail-section { margin-bottom:20px; }
      .detail-section-title { font-size:12px; font-weight:600; color:var(--text3); text-transform:uppercase; margin-bottom:10px; }
      .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
      .detail-item { background:var(--surface2); padding:14px; border-radius:12px; }
      .detail-label { font-size:12px; color:var(--text3); margin-bottom:4px; }
      .detail-value { font-size:20px; font-weight:600; color:var(--text); }
      .detail-item.full-width { grid-column:1/-1; }
      .modal-why { background:rgba(34,211,160,0.06); border:1px solid rgba(34,211,160,0.16); padding:16px; border-radius:12px; margin-bottom:16px; }
      .modal-why-title { font-size:13px; font-weight:600; color:var(--green); margin-bottom:8px; }
      .modal-why-points { list-style:none; }
      .modal-why-points li { font-size:14px; color:var(--text); line-height:1.5; padding-left:20px; position:relative; margin-bottom:6px; }
      .modal-why-points li::before { content:""; position:absolute; left:0; top:8px; width:8px; height:8px; background:var(--green); border-radius:50%; }
      .comparison-note { background:rgba(245,158,11,0.09); border:1px solid rgba(245,158,11,0.2); padding:14px; border-radius:12px; font-size:14px; color:#fbbf24; margin-bottom:16px; }
      .segment-list { display:flex; flex-direction:column; gap:10px; }
      .segment-item { background:var(--surface2); padding:14px; border-radius:12px; display:flex; align-items:center; gap:12px; }
      .segment-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
      .segment-icon.highway { background:rgba(59,130,246,0.15); }
      .segment-icon.city    { background:rgba(245,158,11,0.15); }
      .segment-icon.traffic { background:rgba(239,68,68,0.15); }
      .segment-icon.turns   { background:rgba(168,85,247,0.15); }
      .segment-content { flex:1; }
      .segment-title { font-size:14px; font-weight:600; color:var(--text); }
      .segment-details { font-size:13px; color:var(--text2); }
      .modal-cta {
        width:100%; padding:16px; background:var(--green); color:#090e1a;
        border:none; border-radius:14px; font-size:17px; font-weight:700; cursor:pointer;
        text-transform:uppercase; letter-spacing:0.3px; font-family:inherit;
      }

      /* ===== DRIVE MODE ===== */
      .drive-mode {
        display:none; position:fixed; top:0; left:0; right:0; bottom:0;
        background:#0f172a; z-index:2000; flex-direction:column;
      }
      .drive-mode.active { display:flex; }
      .drive-header { padding:16px 20px; background:#1e293b; display:flex; justify-content:space-between; align-items:center; }
      .drive-status { color:#94a3b8; font-size:14px; }
      .drive-exit { padding:10px 20px; background:#ef4444; color:white; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
      .drive-map-container { flex:1; min-height:0; position:relative; }
      #drive-map { width:100%; height:100%; }
      .drive-ahead { position:absolute; top:16px; left:16px; right:16px; background:rgba(30,41,59,0.95); border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:12px; }
      .drive-ahead-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
      .drive-ahead-icon.stable  { background:#166534; }
      .drive-ahead-icon.warning { background:#f59e0b; }
      .drive-ahead-icon.alert   { background:#ef4444; }
      .drive-ahead-text { flex:1; color:white; font-size:14px; font-weight:500; }
      .drive-alert { position:absolute; bottom:16px; left:16px; right:16px; background:rgba(15,23,42,0.96); border:1px solid rgba(148,163,184,0.18); border-radius:18px; padding:16px; display:none; box-shadow:0 10px 30px rgba(0,0,0,0.28); backdrop-filter:blur(8px); }
      .drive-alert.visible { display:block; }
      .drive-alert-header { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
      .drive-alert-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; }
      .drive-alert-badge .dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }
      .drive-alert-badge.high   { background:rgba(16,185,129,0.18); color:#6ee7b7; }
      .drive-alert-badge.medium { background:rgba(245,158,11,0.18); color:#fcd34d; }
      .drive-alert-badge.low    { background:rgba(148,163,184,0.18); color:#cbd5e1; }
      .drive-alert-state { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; }
      .drive-alert-state.switch  { color:#86efac; }
      .drive-alert-state.suggest { color:#fcd34d; }
      .drive-alert-message { color:white; margin-bottom:12px; }
      .drive-alert-title  { font-size:18px; font-weight:700; line-height:1.2; margin-bottom:4px; }
      .drive-alert-detail { font-size:14px; color:#cbd5e1; line-height:1.4; margin-bottom:6px; }
      .drive-alert-meta   { font-size:12px; color:#94a3b8; line-height:1.3; }
      .drive-alert-actions { display:flex; gap:10px; }
      .drive-alert-btn { flex:1; padding:12px 14px; border-radius:12px; font-size:14px; font-weight:700; border:none; cursor:pointer; transition:transform 0.15s ease, opacity 0.15s ease; }
      .drive-alert-btn:hover { transform:translateY(-1px); }
      .drive-alert-btn.primary { background:#2d6a4f; color:white; }
      .drive-alert-btn.primary.suggest { background:#b45309; }
      .drive-alert-btn.secondary { background:#334155; color:white; }
      .drive-panel { background:#1e293b; padding:24px 20px; border-radius:28px 28px 0 0; }
      .drive-eta { text-align:center; margin-bottom:16px; }
      .drive-eta-time { font-size:56px; font-weight:700; color:white; line-height:1; }
      .drive-eta-label { font-size:14px; color:#64748b; margin-top:4px; }
      .drive-info { display:flex; justify-content:center; gap:32px; padding:16px 0; border-top:1px solid #334155; }
      .drive-info-item { text-align:center; }
      .drive-info-value { font-size:22px; font-weight:600; color:white; }
      .drive-info-label { font-size:12px; color:#64748b; margin-top:4px; }
      .drive-next { margin-top:16px; padding:18px; background:#334155; border-radius:16px; display:flex; align-items:center; gap:14px; }
      .drive-next-icon { width:52px; height:52px; background:var(--green); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:26px; color:#090e1a; }
      .drive-next-text { flex:1; }
      .drive-next-instruction { color:white; font-size:17px; font-weight:600; }
      .drive-next-distance { color:#94a3b8; font-size:14px; margin-top:4px; }
      .drive-lane-block { display:none; align-items:center; gap:10px; margin-top:8px; padding:10px 14px; background:rgba(245,158,11,0.10); border:1px solid rgba(245,158,11,0.28); border-radius:12px; transition:background 0.3s; }
      .drive-lane-block.lane-warn { background:rgba(245,158,11,0.18); border-color:rgba(245,158,11,0.50); }
      .drive-lane-block.lane-alert { background:rgba(239,68,68,0.18); border-color:rgba(239,68,68,0.50); }
      .drive-lane-icon { font-size:18px; flex-shrink:0; width:24px; text-align:center; }
      .drive-lane-text { flex:1; }
      .drive-lane-instruction { color:#fbbf24; font-size:13px; font-weight:600; }
      .drive-lane-block.lane-alert .drive-lane-instruction { color:#f87171; }
      .drive-lane-distance { color:#94a3b8; font-size:11px; margin-top:2px; }

      /* Complex interchange warning */
      .drive-interchange-warn {
        display:none; position:absolute; top:60px; left:16px; right:16px;
        background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.40);
        border-radius:12px; padding:10px 14px;
        font-size:13px; font-weight:600; color:#fbbf24;
        text-align:center;
      }
      .drive-interchange-warn.visible { display:block; }


      /* ===== ТЗ-1: Drive Mode Reality Fix ===== */
      .drive-reality-strip {
        position:absolute; left:16px; right:16px; top:76px;
        display:flex; align-items:center; justify-content:space-between; gap:10px;
        padding:10px 12px; border-radius:14px;
        background:rgba(15,23,42,0.82);
        border:1px solid rgba(148,163,184,0.16);
        color:#cbd5e1; font-size:12px; font-weight:700;
        backdrop-filter:blur(8px); z-index:3;
      }
      .drive-reality-strip strong { color:#fff; font-size:13px; }
      .drive-next { border:1px solid rgba(148,163,184,0.14); }
      .drive-next-instruction { font-size:19px; line-height:1.18; }
      .drive-next-distance { font-size:15px; color:#cbd5e1; }
      .drive-lane-block { margin-top:12px; }
      .drive-lane-instruction { font-size:15px; line-height:1.2; }
      .drive-lane-distance { font-size:12px; color:#cbd5e1; }
      .drive-lane-block.lane-alert { box-shadow:0 0 0 1px rgba(239,68,68,.25), 0 12px 28px rgba(0,0,0,.22); }
      .drive-ahead-text { line-height:1.25; }

      /* ===== MISC ===== */
      .hidden { display:none !important; }
      .loading { display:flex; align-items:center; justify-content:center; padding:40px; color:var(--text2); font-size:15px; }
      .error { margin:16px; padding:16px; background:rgba(239,68,68,0.10); border:1px solid rgba(239,68,68,0.20); border-radius:12px; color:#f87171; font-size:14px; }
      .predict-tip { display:none !important; }

      /* ===== AUTOCOMPLETE (dark) ===== */
      .pac-container { z-index:9999 !important; border-radius:12px; background:var(--surface); border:1px solid var(--border2); box-shadow:0 16px 40px rgba(0,0,0,0.5); font-family:inherit; margin-top:4px; }
      .pac-item { padding:10px 14px; font-size:14px; cursor:pointer; border-top:1px solid var(--border); background:transparent; color:var(--text2); }
      .pac-item:first-child { border-top:none; }
      .pac-item:hover { background:var(--surface2); }
      .pac-item-query { font-size:14px; color:var(--text); font-weight:500; }
      .pac-matched { color:var(--green); font-weight:700; }
      .pac-icon { display:none; }
      .pac-logo::after { display:none; }

      /* ===== UX diagnostics: tiny read-only strip (no layout impact) ===== */
      .cr-ux-diag-strip {
        position: fixed;
        left: 6px;
        bottom: calc(max(env(safe-area-inset-bottom), 10px) + 68px);
        z-index: 9990;
        max-width: min(100vw - 12px, 420px);
        font-size: 9px;
        line-height: 1.2;
        font-family: ui-monospace, "JetBrains Mono", monospace;
        color: hsla(220, 8%, 56%, 0.72);
        pointer-events: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ===== AI DECISION UX (legacy modal compat) ===== */
      .ai-confidence-badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.4px; }
      .ai-confidence-badge .conf-dot { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }
      .confidence-high   { background:rgba(34,211,160,0.14); color:var(--green); }
      .confidence-medium { background:rgba(245,158,11,0.14); color:var(--amber); }
      .confidence-low    { background:rgba(148,163,184,0.12); color:var(--text3); }

      /* ===== LANGUAGE BAR ===== */
      /* (already defined above in controls-strip) */



      /* ===== FIX-1: visible language + AI voice controls ===== */
      .top-utility-bar {
        position: relative;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        /* margin-top: -6px; */
        margin: 0 14px 8px;
        padding: 8px 10px;
        background: hsla(220,11%,10%,.68);
        border: 1px solid hsla(220,10%,20%,.55);
        border-radius: 999px;
        backdrop-filter: blur(18px) saturate(130%);
        -webkit-backdrop-filter: blur(18px) saturate(130%);
      }
      .top-utility-bar .lang-bar {
        display: flex !important;
        gap: 4px;
        margin-left: 0;
      }
      .ai-voice-btn,
      .decision-voice-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        border: 1px solid hsla(72,96%,56%,.22);
        background: hsla(72,96%,56%,.10);
        color: var(--green);
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: .12em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
      }
      .ai-voice-btn:active,
      .decision-voice-btn:active { transform: scale(.98); }
      .decision-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 6px;
      }
      .decision-voice-btn {
        width: 100%;
        border-radius: 14px;
        padding: 10px 12px;
        background: hsla(210,90%,60%,.10);
        border-color: hsla(210,90%,60%,.20);
        color: var(--blue);
      }
      .nav-item.disabled,
      .nav-item[aria-disabled="true"] {
        opacity: .38;
        pointer-events: none;
        cursor: not-allowed;
      }
      body.rtl .top-utility-bar,
      body.rtl .decision-actions { flex-direction: row-reverse; }

      /* ===== RTL ===== */
      body.rtl { direction:rtl; }
      body.rtl .route-row  { flex-direction:row-reverse; }
      body.rtl .top-bar    { flex-direction:row-reverse; }
      body.rtl .pref-bar, body.rtl .filter-bar, body.rtl .lang-bar { flex-direction:row-reverse; }
      body.rtl .drive-next { flex-direction:row-reverse; }
      body.rtl .drive-lane-block { flex-direction:row-reverse; }
      body.rtl .drive-info { flex-direction:row-reverse; }
      body.rtl .drive-eta  { text-align:right; }
      body.rtl .modal-header { flex-direction:row-reverse; }
      body.rtl .detail-grid { direction:rtl; }
      body.rtl .modal-why-points { padding-right:18px; padding-left:0; }
      body.rtl .quick-item { text-align:right; flex-direction:row-reverse; }
      body.rtl .dh-conf-slim { flex-direction:row-reverse; }
      body.rtl .dh-chips { flex-direction:row-reverse; }
      body.rtl .section-head { flex-direction:row-reverse; }
      body.rtl .cta-row  { flex-direction:row-reverse; }
      body.rtl .info-strip { flex-direction:row-reverse; }
      body.rtl .alt-row  { direction:rtl; }
    

      /* ===== ТЗ-8: Restore Alternatives + Route Compare UI ===== */
      .other-routes.tz8-visible .alt-row { display: block !important; }
      .other-routes.tz8-visible .alt-insight {
        display: block !important;
        margin-top: 4px;
        font-size: 11px;
        color: var(--text2);
        line-height: 1.25;
      }
      .other-routes.tz8-visible .alt-label-p { white-space: normal; line-height: 1.25; }
      .other-routes.tz8-visible .alt-card-p[data-best-alternative="true"] {
        background: hsla(72,96%,56%,.045);
      }
      .alt-distance-p {
        margin-top: 2px;
        font-size: 10px;
        color: var(--text3);
        letter-spacing: .08em;
        text-transform: uppercase;
      }
      .tz8-no-alts {
        padding: 0.875rem 1.25rem 1rem;
        border-top: 1px solid var(--border);
        color: var(--text2);
        font-size: 12px;
        line-height: 1.35;
      }


      /* ===== ТЗ-9: Route Cards UI Cleanup ===== */
      .other-routes.tz9-clean .see-alts-btn span:first-child {
        color: var(--text);
      }
      .tz9-alt-card {
        align-items: flex-start !important;
        gap: 0.875rem !important;
      }
      .tz9-route-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
        padding: 3px 8px;
        border-radius: 999px;
        background: hsla(220,10%,14%,.72);
        color: var(--text2);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: .14em;
        text-transform: uppercase;
      }
      .tz9-route-tag.best-alt { background: hsla(72,96%,56%,.10); color: var(--green); }
      .tz9-route-main {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 3px;
      }
      .tz9-route-time {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -.02em;
        font-variant-numeric: tabular-nums;
      }
      .tz9-route-diff {
        font-size: 11px;
        font-weight: 700;
        color: var(--text2);
        letter-spacing: .04em;
        text-transform: uppercase;
      }
      .tz9-route-diff.warn { color: var(--amber); }
      .tz9-route-title {
        font-size: 13px;
        font-weight: 650;
        color: var(--text);
        line-height: 1.25;
        margin-bottom: 4px;
      }
      .tz9-route-reason {
        font-size: 12px;
        color: var(--text2);
        line-height: 1.28;
        margin-bottom: 5px;
      }
      .tz9-route-meta {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 6px;
      }
      .tz9-pill {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: .1em;
        text-transform: uppercase;
        color: var(--text3);
        border: 1px solid var(--border2);
        background: hsla(220,11%,10%,.60);
        border-radius: 999px;
        padding: 3px 7px;
      }
      .tz9-pill.traffic-low { color: var(--green); border-color: hsla(72,96%,56%,.22); background: hsla(72,96%,56%,.07); }
      .tz9-pill.traffic-medium { color: var(--amber); border-color: hsla(38,95%,58%,.20); background: hsla(38,95%,58%,.07); }
      .tz9-pill.traffic-heavy { color: #f87171; border-color: rgba(248,113,113,.22); background: rgba(248,113,113,.07); }
      .tz9-alt-end {
        min-width: 64px;
        text-align: right;
        padding-top: 2px;
      }
      .tz9-score-label {
        font-size: 9px;
        color: var(--text3);
        letter-spacing: .1em;
        text-transform: uppercase;
        margin-bottom: 3px;
      }
      .tz9-score-value {
        font-size: 14px;
        font-weight: 700;
        color: var(--text2);
        font-variant-numeric: tabular-nums;
      }
      body.rtl .tz9-alt-end { text-align: left; }


      /* ===== ТЗ-10: Route Details — useful route explanation modal ===== */
      .modal-content.tz10-details {
        background: linear-gradient(180deg, hsl(220 12% 8%), hsl(220 12% 6%));
      }
      .tz10-modal-subtitle {
        margin-top: 5px;
        color: var(--text2);
        font-size: 13px;
        line-height: 1.35;
      }
      .tz10-summary-strip {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin: 0 0 16px;
      }
      .tz10-summary-item {
        background: hsla(220,11%,10%,.74);
        border: 1px solid var(--border2);
        border-radius: 14px;
        padding: 10px;
      }
      .tz10-summary-label {
        font-size: 9px;
        color: var(--text3);
        font-weight: 700;
        letter-spacing: .12em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .tz10-summary-value {
        font-size: 16px;
        color: var(--text);
        font-weight: 750;
        font-variant-numeric: tabular-nums;
      }
      .tz10-score-box {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0 0 16px;
        padding: 13px 14px;
        border-radius: 16px;
        background: hsla(72,96%,56%,.07);
        border: 1px solid hsla(72,96%,56%,.18);
      }
      .tz10-score-main { font-size: 13px; color: var(--text); font-weight: 700; line-height: 1.25; }
      .tz10-score-sub { font-size: 11px; color: var(--text2); line-height: 1.25; margin-top: 3px; }
      .tz10-score-number {
        min-width: 62px;
        text-align: center;
        border-radius: 999px;
        padding: 7px 9px;
        color: var(--green);
        background: hsla(72,96%,56%,.10);
        font-size: 13px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }
      .tz10-breakdown-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .tz10-breakdown-item {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 13px;
        padding: 11px 12px;
      }
      .tz10-breakdown-title { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
      .tz10-breakdown-value { font-size: 15px; color: var(--text); font-weight: 700; }
      .tz10-segment-note {
        margin-top: 10px;
        color: var(--text3);
        font-size: 11px;
        line-height: 1.35;
      }
      .tz10-modal-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 16px;
      }
      .tz10-secondary-btn {
        width: 100%;
        padding: 15px;
        background: var(--surface2);
        color: var(--text2);
        border: 1px solid var(--border2);
        border-radius: 14px;
        font-size: 13px;
        font-weight: 750;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: .08em;
        font-family: inherit;
      }
      @media (max-width: 430px) {
        .tz10-summary-strip { grid-template-columns: 1fr 1fr 1fr; }
        .tz10-summary-value { font-size: 14px; }
        .tz10-breakdown-grid { grid-template-columns: 1fr; }
      }

      /* ===== MOBILE SAFETY PATCH ===== */
      @media (max-width: 430px) {
        .bottom-nav {
          max-width: calc(100vw - 16px);
          overflow-x: auto;
          scrollbar-width: none;
        }
        .bottom-nav::-webkit-scrollbar { display: none; }
        .nav-item { padding: 0.55rem 0.75rem; }
        .nav-label { font-size: 9px; }
        .dh-eta {
          font-size: clamp(40px, 14vw, 56px);
        }
        .decision-hero {
          margin: 0.2rem 10px 0;
          max-width: none;
          border-radius: 20px;
          padding: 0.75rem 0.9rem 0.6rem;
        }
      }
    

/* ===== ТЗ-4: Mobile layout cleanup / safe responsive layer ===== */
:root {
  --tz4-bottom-nav-h: 74px;
  --tz4-safe-bottom: max(env(safe-area-inset-bottom), 12px);
}
html, body {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}
body {
  padding-bottom: calc(var(--tz4-bottom-nav-h) + var(--tz4-safe-bottom) + 12px);
}
.content-scroll {
  min-height: 0;
  position: relative;
  z-index: 1;
  padding-bottom: calc(var(--tz4-bottom-nav-h) + var(--tz4-safe-bottom) + 16px);
  overscroll-behavior: contain;
}
.bottom-nav {
  width: min(560px, calc(100vw - 16px));
  max-width: calc(100vw - 16px);
  justify-content: space-between;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  bottom: var(--tz4-safe-bottom);
}
.bottom-nav::-webkit-scrollbar { display: none; }
.nav-item {
  flex: 0 0 auto;
  min-width: 0;
  white-space: nowrap;
  touch-action: manipulation;
}
.modal-overlay {
  padding-top: max(env(safe-area-inset-top), 8px);
}
.modal-content {
  max-height: calc(100dvh - max(env(safe-area-inset-top), 8px) - 8px);
  padding-bottom: calc(24px + var(--tz4-safe-bottom));
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
.modal-content.tz10-details {
  max-height: calc(100dvh - max(env(safe-area-inset-top), 8px) - 8px);
}
.drive-mode {
  height: 100dvh;
  max-height: 100dvh;
  overflow: hidden;
}
.drive-header {
  flex-wrap: wrap;
  gap: 10px;
  padding-top: max(env(safe-area-inset-top), 12px);
}
.drive-header > div {
  min-width: 0;
  flex: 1 1 auto;
  flex-wrap: wrap;
}
.drive-map-container {
  min-height: 180px;
}
.drive-panel {
  flex-shrink: 0;
  max-height: 42dvh;
  overflow-y: auto;
  padding-bottom: calc(18px + var(--tz4-safe-bottom));
  -webkit-overflow-scrolling: touch;
}
.drive-ahead,
.drive-alert,
.drive-interchange-warn,
.drive-reality-strip {
  max-width: calc(100vw - 32px);
}
.pac-container {
  max-width: calc(100vw - 24px) !important;
  overflow-x: hidden;
}

    return "Parking via Salik may be available";
  }
  return "";
}

function loadUserProfile() {
  try {
    const raw = localStorage.getItem("clearroad_user_profile");
    if (!raw) return;
    const parsed = JSON.parse(raw);
    userProfile = { ...userProfile, ...parsed };
  } catch (e) {}
}

function saveUserProfile() {
  try {
    localStorage.setItem("clearroad_user_profile", JSON.stringify(userProfile));
  } catch (e) {}
}

function learnFromRouteChoice(route) {
  if (!route) return;

  const total = (userProfile.totalChoices || 0) + 1;
  userProfile.totalChoices = total;

  const currentStress = route.stressScore || 0;
  const currentComplexity = route.complexity || 0;

  userProfile.avgChosenStress =
    userProfile.avgChosenStress == null
      ? currentStress
      : ((userProfile.avgChosenStress * (total - 1)) + currentStress) / total;

  userProfile.avgChosenComplexity =
    userProfile.avgChosenComplexity == null
      ? currentComplexity
      : ((userProfile.avgChosenComplexity * (total - 1)) + currentComplexity) / total;

  const noTollChoices = route.tollCost === 0;
  const calmChoice = currentStress <= 8;
  const fastChoice = route.index === (_fastestRoute && _fastestRoute.index);

  if (total >= 3) {
    if (noTollChoices) userProfile.prefersNoTolls = true;
    if (calmChoice)    userProfile.prefersCalmRoutes = true;
    if (fastChoice)    userProfile.prefersFastest = true;
  }

  saveUserProfile();
}

function getPersonalizationBias(route) {
  let bias = 0;

  if (userProfile.prefersNoTolls && route.tollCost === 0) {
    bias -= 2.5;
  }

  if (userProfile.prefersCalmRoutes) {
    bias -= (route.stressScore || 0) * 0.35;
  }

  if (userProfile.prefersFastest) {
    bias -= ((route.time - (_fastestRoute ? _fastestRoute.time : route.time)) / 60) * 0.8;
  }

  if (userProfile.avgChosenComplexity != null) {
    const complexityGap = Math.abs((route.complexity || 0) - userProfile.avgChosenComplexity);
    bias += complexityGap * 0.15;
  }

  if (userProfile.avgChosenStress != null) {
    const stressGap = Math.abs((route.stressScore || 0) - userProfile.avgChosenStress);
    bias += stressGap * 0.2;
  }

  return bias;
}

function getUserProfileLabel() {
  if (userProfile.prefersCalmRoutes) return t("pers_calm");
  if (userProfile.prefersNoTolls)    return t("pers_no_tolls");
  if (userProfile.prefersFastest)    return t("pers_fastest");
  return "";
}

function generateProfileAwareWhy(route, allRoutes) {
  const road = getRouteSummaryName(route);
  const stress = route.stressScore || 0;

  if (userProfile.prefersCalmRoutes && stress <= 8) {
    return `Matches your calm driving style via ${road}`;
  }
  if (userProfile.prefersNoTolls && route.tollCost === 0) {
    return `Matches your no-tolls preference via ${road}`;
  }
  if (userProfile.prefersFastest && _fastestRoute && route.index === _fastestRoute.index) {
    return `Matches your fastest-route style via ${road}`;
  }
  return "";
}

function getTimingDecisionHint() {
  if (!_departureDecision || _departureDecision.type === "neutral") return "";
  if (_departureDecision.type === "wait") {
    return `Better to leave in ${_departureDecision.waitMinutes} min`;
  }
  if (_departureDecision.type === "leave_now") {
    return t("dep_leave_now");
  }
  return "";
}

function getUnifiedRouteMeta(route) {
  const stress = getStressBadge(route.stressScore || 0);
  const personality = route.drivePersonality || "Steady drive";
  const delay = route.delayMinutes || 0;
  const delayText = delay === 0 ? "0 min delay" : `+${delay} min delay`;
  return {
    stressLabel: stress.label,
    stressTone: stress.tone,
    personality,
    delayText
  };
}

function generateUnifiedDecisionWhy(route, allRoutes) {
  const road = getRouteSummaryName(route);
  const profileWhy = generateProfileAwareWhy(route, allRoutes);
  const timingHint = getTimingDecisionHint();

  if (profileWhy) return profileWhy;

  const others = (allRoutes || []).filter(r => r.index !== route.index);
  if (!others.length) return `Best available route via ${road}`;

  const fastestAlt = others.reduce((a, b) =>
    getDisplayMinutes(a) < getDisplayMinutes(b) ? a : b
  );
  const diff = getDisplayMinutes(fastestAlt) - getDisplayMinutes(route);

  if (route.tollCost === 0 && fastestAlt.tollCost > 0 && Math.abs(diff) <= 3) {
    return `No tolls with similar time via ${road}`;
  }
  if (diff > 0 && route.stressScore <= (fastestAlt.stressScore || 999)) {
    return `${diff} min faster with smoother drive via ${road}`;
  }
  if (trafficRank(route.traffic) < trafficRank(fastestAlt.traffic)) {
    return `Less traffic than faster alternatives via ${road}`;
  }
  if ((route.stressScore || 0) + 2 < (fastestAlt.stressScore || 0)) {
    return `Lower-stress route via ${road}`;
  }
  if (timingHint && route.index === (_bestRoute && _bestRoute.index)) {
    return `${timingHint} via ${road}`;
  }
  return `Best overall balance via ${road}`;
}

function speakText(text, priority = "normal") {
  if (!voiceEnabled || !text) return;
  if (!("speechSynthesis" in window)) {
    console.warn("Speech synthesis is not supported in this browser.");
    return;
  }
  try {
    const normalized = normalizeVoiceText(stripHtml(text));
    if (!normalized) return;

    const now = Date.now();
    if (normalized === lastSpokenText && now - lastSpokenAt < 5000) return;

    // Urgent maneuver warnings may interrupt; normal AI explanations should queue naturally.
    if (priority === "urgent") window.speechSynthesis.cancel();
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();

    const utter = buildNativeUtterance(normalized, priority);
    if (!utter) return;

    lastSpokenText = normalized;
    lastSpokenAt = now;
    window.speechSynthesis.speak(utter);
  } catch (e) {
    console.warn("speech failed", e);
  }
}


function stripHtml(value) {
  return String(value || "")
    .replace(/<[^>]*>/g, " ")
    .replace(/&nbsp;/g, " ")
    .replace(/&amp;/g, "&")
    .replace(/\s+/g, " ")
    .trim();
}

function translateConfidenceForVoice(conf) {
  const c = String(conf || "").toUpperCase();
  if (currentLang === "ru") return c === "HIGH" ? "высокая" : c === "MEDIUM" ? "средняя" : "низкая";
  if (currentLang === "ua") return c === "HIGH" ? "висока" : c === "MEDIUM" ? "середня" : "низька";
  if (currentLang === "ar") return c === "HIGH" ? "عالية" : c === "MEDIUM" ? "متوسطة" : "منخفضة";
  return c === "HIGH" ? "high" : c === "MEDIUM" ? "medium" : "low";
}

function translateTrafficForVoice(traffic) {
  const tr = String(traffic || "stable");
  if (currentLang === "ru") return tr === "high" ? "плотный" : tr === "medium" ? "умеренный" : "стабильный";
  if (currentLang === "ua") return tr === "high" ? "щільний" : tr === "medium" ? "помірний" : "стабільний";
  if (currentLang === "ar") return tr === "high" ? "كثيف" : tr === "medium" ? "متوسط" : "مستقر";
  return tr === "high" ? "heavy" : tr === "medium" ? "moderate" : "stable";
}

// ── Step Stability ──

function getDistanceToStepStartMeters(step, userLatLng) {
  if (!step?.start_location || !userLatLng) return null;
  return google.maps.geometry.spherical.computeDistanceBetween(userLatLng, step.start_location);
}

function isStepActuallyReached(step, userLatLng) {
  const d = getDistanceToStepEndMeters(step, userLatLng);
  return d != null && d <= STEP_REACHED_RADIUS_M;
}

function findBestCurrentStepIndex(routeObj, userLatLng, fromIndex) {
  const steps = routeObj.route.legs[0].steps;
  const now   = Date.now();
  const start = Math.max(0, fromIndex - 1);
  const end   = Math.min(steps.length - 1, fromIndex + 2);
  let bestIndex = fromIndex;
  let bestScore = Infinity;

  for (let i = start; i <= end; i++) {
    const step        = steps[i];
    const distToEnd   = getDistanceToStepEndMeters(step, userLatLng) ?? 999999;
    const distToStart = getDistanceToStepStartMeters(step, userLatLng) ?? 999999;
    const reachedPenalty = isStepActuallyReached(step, userLatLng) ? 1000 : 0;
    const futurePenalty  = i > fromIndex ? 120 : 0;
    const score = distToEnd + distToStart * 0.35 + futurePenalty + reachedPenalty;
    if (score < bestScore) { bestScore = score; bestIndex = i; }
  }

  if (bestIndex !== lastStableStepIndex && now - lastStepSwitchAt < STEP_SWITCH_COOLDOWN_MS) {
    return lastStableStepIndex;
  }
  if (bestIndex > fromIndex) {
    const distCurrentEnd = getDistanceToStepEndMeters(steps[fromIndex], userLatLng) ?? 999999;
    if (distCurrentEnd > NEXT_STEP_PREPARE_RADIUS_M) return fromIndex;
  }
  if (bestIndex !== lastStableStepIndex) { lastStableStepIndex = bestIndex; lastStepSwitchAt = now; }
  return bestIndex;
}

function getUpcomingMeaningfulStep(steps, currentIndex, routeObj) {
  for (let i = currentIndex + 1; i < steps.length; i++) {
    if (getStepWarningMeta(steps[i], routeObj.route)) return { index: i, step: steps[i] };
  }
  return null;
}

// ТЗ7: One-line route "personality" — how the drive will feel
function generateRoutePersonality(best) {
  const hwy = best.highwayShare || 0;
  const turns = best.complexity || 0;
  const traffic = best.traffic;

  // Scenario 4 (priority): busy / complex → stressful drive
  if (turns >= 12 || traffic === "high") {
    return "Busy route — expect frequent actions";
  }
  // Scenario 1: smooth highway
  if (hwy >= 0.7 && turns <= 8) {
    return "Smooth highway drive";
  }
  // Scenario 3: city driving
  if (hwy < 0.3) {
    return "City driving with turns";
  }
  // Scenario 2: mixed (0.3 ≤ hwy < 0.7)
  if (hwy >= 0.3 && hwy < 0.7) {
    return "Mixed city and highway";
  }
  // Fallback
  return "Standard route";
}

// ТЗ6: One-line "when to go" timing insight for best route
function generateTimeInsight(best) {
  const delay = best.delayMinutes || 0;
  const traffic = best.traffic;

  // Scenario 3: bad — wait
  if (delay > 5 || traffic === "high") {
    return t("pred_consider");
  }
  // Scenario 1: ideal — go now
  if (delay <= 2 && traffic === "low") {
    return t("pred_best_now");
  }
  // Scenario 2: ok — light delays
  if (delay <= 5 && traffic === "medium") {
    return t("pred_good_time");
  }
  // Fallback
  return t("pred_stable");
}

// One-line AI decision — always comparative, always factual
function generateAIDecision(best, routes) {
  const road = getRouteSummaryName(best);
  const others = (routes || []).filter(r => r.index !== best.index);

  if (!others.length) {
    return `Best available route via ${road}`;
  }

  const fastestAlt = others.reduce((a, b) => (a.time < b.time ? a : b));
  const calmestAlt = others.reduce((a, b) =>
    trafficRank(a.traffic) < trafficRank(b.traffic) ? a :
    trafficRank(a.traffic) > trafficRank(b.traffic) ? b :
    (a.delayMinutes || 0) <= (b.delayMinutes || 0) ? a : b
  );
  const simplestAlt = others.reduce((a, b) =>
    (a.complexity || 0) <= (b.complexity || 0) ? a : b
  );

  const bestMin = getDisplayMinutes(best);
  const fastestAltMin = getDisplayMinutes(fastestAlt);
  const bestDelay = best.delayMinutes || 0;
  const fastestAltDelay = fastestAlt.delayMinutes || 0;
  const bestTurns = best.complexity || 0;
  const fastestAltTurns = fastestAlt.complexity || 0;

  const timeAdvantage = fastestAltMin - bestMin;
  const delayAdvantage = fastestAltDelay - bestDelay;
  const turnAdvantage = fastestAltTurns - bestTurns;

  // 1. Best is actually the fastest
  if (timeAdvantage >= 1) {
    if (best.tollCost === 0 && fastestAlt.tollCost > 0) {
      return `${timeAdvantage} min faster with no tolls via ${road}`;
    }
    if (delayAdvantage >= 2) {
      return `${timeAdvantage} min faster with less delay via ${road}`;
    }
    return `${timeAdvantage} min faster than alternatives via ${road}`;
  }

  // 2. Similar time, but avoids tolls
  if (best.tollCost === 0) {
    const paidCloseAlt = others.find(r =>
      r.tollCost > 0 && Math.abs(getDisplayMinutes(r) - bestMin) <= 3
    );
    if (paidCloseAlt) {
      return `No tolls with similar time via ${road}`;
    }
  }

  // 3. Similar/faster alternatives exist, but best is calmer
  if (trafficRank(best.traffic) < trafficRank(fastestAlt.traffic)) {
    return `Less traffic than faster routes via ${road}`;
  }

  // 4. Similar/faster alternatives exist, but best has less delay
  if (delayAdvantage >= 2) {
    return `${delayAdvantage} min less delay via ${road}`;
  }

  // 5. Similar/faster alternatives exist, but best is easier to drive
  if (turnAdvantage >= 2) {
    return `${turnAdvantage} fewer turns than alternatives via ${road}`;
  }

  // 6. Best is calmer than the calmest close-time route
  const closeAlt = others.find(r => Math.abs(getDisplayMinutes(r) - bestMin) <= 2);
  if (closeAlt && trafficRank(best.traffic) < trafficRank(closeAlt.traffic)) {
    return `Calmer drive with similar time via ${road}`;
  }

  // 7. Best is simpler than the simplest close-time route
  if (closeAlt && bestTurns < (closeAlt.complexity || 0)) {
    return `Simpler route with similar time via ${road}`;
  }

  // 8. Fallback
  return `Best overall balance via ${road}`;
}

// ТЗ5: Decision insight — only 3 types (paid / fast / no tolls)
function getRouteInsight(r, best, fastest) {
  if (r.index === best.index) return "";

  const routeName = getRouteSummaryName(r);
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);
  const delayDiff = (r.delayMinutes || 0) - (best.delayMinutes || 0);
  const turnDiff = (r.complexity || 0) - (best.complexity || 0);

  // Faster but more stressful
  if (timeDiff < 0) {
    if (trafficRank(r.traffic) > trafficRank(best.traffic)) {
      return `${Math.abs(timeDiff)} min faster, but busier`;
    }
    if (delayDiff > 1) {
      return `${Math.abs(timeDiff)} min faster, but more delay`;
    }
    if (turnDiff > 1) {
      return `${Math.abs(timeDiff)} min faster, but more turns`;
    }
    return `${Math.abs(timeDiff)} min faster via ${routeName}`;
  }

  // Similar time, but avoids tolls
  if (timeDiff >= 0 && timeDiff <= 3 && r.tollCost === 0 && best.tollCost > 0) {
    return `No tolls, only ${timeDiff} min slower`;
  }

  // Slightly slower, but calmer
  if (timeDiff > 0 && timeDiff <= 4 && trafficRank(r.traffic) < trafficRank(best.traffic)) {
    return `${timeDiff} min slower, but calmer traffic`;
  }

  // Slightly slower, but less delay
  if (timeDiff > 0 && timeDiff <= 4 && delayDiff < 0) {
    return `${timeDiff} min slower, but less delay`;
  }

  // Slightly slower, but easier
  if (timeDiff > 0 && timeDiff <= 4 && turnDiff < 0) {
    return `${timeDiff} min slower, but fewer turns`;
  }

  // Cheaper paid route
  if (r.tollCost < best.tollCost && r.tollCost > 0) {
    return `Lower toll cost`;
  }

  // Toll-free general
  if (r.tollCost === 0 && best.tollCost > 0) {
    return `Toll-free alternative`;
  }

  return "";
}

function getAlternativeTitle(r, best, fastest) {
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);

  if (r.index === fastest.index && r.index !== best.index) {
    return "Fastest option";
  }

  if (r.tollCost === 0 && best.tollCost > 0) {
    return "No tolls route";
  }

  if (trafficRank(r.traffic) < trafficRank(best.traffic) && timeDiff <= 3) {
    return "Calmer option";
  }

  if ((r.complexity || 0) < (best.complexity || 0) && timeDiff <= 3) {
    return "Simpler route";
  }

  if (timeDiff <= 2) {
    return `Similar time via ${getRouteSummaryName(r)}`;
  }

  return `Alternative via ${getRouteSummaryName(r)}`;
}

function getFallbackAlternativeInsight(r, best) {
  const routeName = getRouteSummaryName(r);
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);
  const delayDiff = (r.delayMinutes || 0) - (best.delayMinutes || 0);
  const turnDiff = (r.complexity || 0) - (best.complexity || 0);

  if (timeDiff < 0) {
    return `${Math.abs(timeDiff)} min faster via ${routeName}`;
  }

  if (timeDiff === 0 && r.tollCost < best.tollCost) {
    return `Same time, lower cost`;
  }

  if (timeDiff <= 2 && trafficRank(r.traffic) < trafficRank(best.traffic)) {
    return `Similar time, calmer traffic`;
  }

  if (timeDiff <= 2 && delayDiff < 0) {
    return `Similar time, less delay`;
  }

  if (timeDiff <= 3 && turnDiff < 0) {
    return `Similar time, fewer turns`;
  }

  if (r.tollCost === 0) {
    return `No tolls alternative`;
  }

  return `Alternative via ${routeName}`;
}

function generateNeutralWhy(route, bestRoute) {
  const points = [];
  const isBest = bestRoute && route.index === bestRoute.index;
  const diff = bestRoute ? getDisplayDiff(route, bestRoute) : 0;
  const absDiff = Math.abs(diff);

  if (isBest) {
    points.push(generateUnifiedDecisionWhy(route, analyzedRoutes));

    if ((route.delayMinutes || 0) === 0) {
      points.push("No added traffic delay right now");
    } else {
      points.push(`Includes about ${route.delayMinutes} min delay`);
    }

    if (route.tollCost > 0) {
      points.push(`${route.tollCost} AED tolls on this route`);
    } else {
      points.push("No tolls on this route");
    }
  } else {
    points.push(generateDecisionInsight(route, bestRoute));

    if (diff > 0) {
      points.push(`${absDiff} min slower than recommended`);
    } else if (diff < 0) {
      points.push(`${absDiff} min faster than recommended`);
    } else {
      points.push("Similar time to recommended");
    }

    if (route.tollCost > 0) {
      points.push(`${route.tollCost} AED tolls on this route`);
    } else {
      points.push("No tolls on this route");
    }
  }

  return points.filter(Boolean).slice(0, 3);
}

function generateDecisionInsight(route, bestRoute) {
  if (!bestRoute || route.index === bestRoute.index) return "";

  const diff = getDisplayDiff(route, bestRoute);
  const absDiff = Math.abs(diff);
  const routeDelay = route.delayMinutes || 0;
  const bestDelay = bestRoute.delayMinutes || 0;
  const routeTurns = route.complexity || 0;
  const bestTurns = bestRoute.complexity || 0;

  // Faster, but worse trade-off
  if (diff < 0) {
    if (trafficRank(route.traffic) > trafficRank(bestRoute.traffic)) {
      return `${absDiff} min faster, but busier`;
    }
    if (routeDelay > bestDelay + 1) {
      return `${absDiff} min faster, but more delay`;
    }
    if (routeTurns > bestTurns + 1) {
      return `${absDiff} min faster, but more turns`;
    }
    if (route.tollCost > bestRoute.tollCost) {
      return `${absDiff} min faster, but higher tolls`;
    }
    return `${absDiff} min faster alternative`;
  }

  // Slightly slower, but avoids tolls
  if (diff > 0 && diff <= 4 && route.tollCost === 0 && bestRoute.tollCost > 0) {
    return `${diff} min slower, but no tolls`;
  }

  // Slightly slower, but calmer
  if (diff > 0 && diff <= 4 && trafficRank(route.traffic) < trafficRank(bestRoute.traffic)) {
    return `${diff} min slower, but calmer traffic`;
  }

  // Slightly slower, but less delay
  if (diff > 0 && diff <= 4 && routeDelay < bestDelay) {
    return `${diff} min slower, but less delay`;
  }

  // Slightly slower, but simpler
  if (diff > 0 && diff <= 4 && routeTurns < bestTurns) {
    return `${diff} min slower, but fewer turns`;
  }

  // Similar time, but lower tolls
  if (diff === 0 && route.tollCost < bestRoute.tollCost) {
    return "Similar time, lower toll cost";
  }

  // Similar time, but calmer
  if (Math.abs(diff) <= 1 && trafficRank(route.traffic) < trafficRank(bestRoute.traffic)) {
    return "Similar time, calmer traffic";
  }

  return `Alternative via ${getRouteSummaryName(route)}`;
}

// ТЗ-1: safe ETA difference formatter.
// Fixes JS floating point noise in ETA comparison.
// and prevents negative ETA comparison from being shown to the user.
function tz1EtaDiffMinutes(route, bestRoute) {
  const routeMin = Number(typeof _tz1Minutes === "function" ? _tz1Minutes(route) : 0);
  const bestMin = Number(typeof _tz1Minutes === "function" ? _tz1Minutes(bestRoute || route) : routeMin);
  if (!Number.isFinite(routeMin) || !Number.isFinite(bestMin)) return 0;
  const rounded = Math.round(routeMin - bestMin);
  return Math.abs(rounded) < 1 ? 0 : rounded;
}

function tz1FormatEtaVsBest(route, bestRoute, isBest) {
  if (isBest) return "Best route";
  const diff = tz1EtaDiffMinutes(route, bestRoute);
  if (diff <= 0) return "Same as best";
  return "+" + diff + " min vs best";
}
