<script id="cr-tz3-score-engine">
// ТЗ-2 [v07] — якорь «ТЗ-3 — SCORE ENGINE»: скоринг маршрутов.
// Порядок: внешний <script> сразу после cr-tz1-drive-update-ui.js — до cr-tz4-why-generator.js
// Зависит от cr-tz2-normalization-layer.js: normalizeRoute.
// Зависит от cr-tz1-tz2-decision-helpers.js: _tz2TollCost, _tz1RouteName, _tz2TrafficLabel.
// Зависит от main: getDrivePersonality.

// ============================================================
//  ТЗ-3 — SCORE ENGINE
//  Uses normalized ТЗ-2 fields as the primary source of truth.
//  Existing UI compatibility fields are preserved.
// ============================================================
function tz3SafeNumber(value, fallback = 0) {
  const number = Number(value);
  return Number.isFinite(number) ? number : fallback;
}

function tz3Round(value, decimals = 1) {
  const factor = Math.pow(10, decimals);
  return Math.round(tz3SafeNumber(value, 0) * factor) / factor;
}

/** Per-step hints for calm routing: lane wording and heavy junction maneuvers (Directions steps). */
function tz3StepDerivedSignals(route) {
  const steps = Array.isArray(route && route.steps) ? route.steps : [];
  let laneHints = 0;
  let heavyJunctionSteps = 0;
  for (let i = 0; i < steps.length; i++) {
    const step = steps[i] || {};
    const text = String(step.instruction || step.instructions || "").toLowerCase();
    const man = String(step.maneuver || "").toLowerCase();
    const j = man + " " + text;
    if (/keep (left|right|center)|use (the )?\d[\d]?(st|nd|rd|th)? (from the )?(left|right) (lane|lanes)|change (to |)lane|take the .{0,24}lane|veer (left|right)|bear (left|right)/i.test(j)) {
      laneHints++;
    }
    if (/fork|merge onto|take the exit|exit the highway|take (the )?ramp|roundabout|rotary|traffic circle|interchange/i.test(j)) {
      heavyJunctionSteps++;
    }
  }
  return { laneHints, heavyJunctionSteps };
}

function scoreRoute(route, allRoutes) {
  const r = route && route.normalizedRoute ? route : normalizeRoute(route || {}, route && Number.isFinite(route.index) ? route.index : 0);

  const durationTrafficSec = Math.max(0, tz3SafeNumber(r.durationTrafficSec, tz3SafeNumber(r.time, tz3SafeNumber(r.durationSec, 0))));
  const durationSec = Math.max(0, tz3SafeNumber(r.durationSec, durationTrafficSec));
  const durationMin = tz3Round(durationTrafficSec / 60, 1);
  const baseDurationMin = tz3Round(durationSec / 60, 1);
  const distanceKm = tz3Round(tz3SafeNumber(r.distanceKm, tz3SafeNumber(r.distance, 0) / 1000), 1);

  const stopsCount = Math.max(0, Math.round(tz3SafeNumber(r.stopsCount, tz3SafeNumber(r.turnsCount, 0))));
  const trafficScore = Math.max(0, Math.min(1, tz3SafeNumber(r.trafficScore, 0)));
  const complexityScore = Math.max(0, Math.min(1, tz3SafeNumber(r.complexityScore, 0)));

  const delaySec = Math.max(0, durationTrafficSec - durationSec);
  const delayMin = tz3Round(delaySec / 60, 1);

  const stepSig = tz3StepDerivedSignals(r);
  const laneHints = stepSig.laneHints;
  const heavyJunctionSteps = stepSig.heavyJunctionSteps;

  // MVP formula for ТЗ-3: all values are in comparable penalty points.
  const timeComponent = durationTrafficSec / 60;
  const trafficPenalty = trafficScore * 18;
  const stopsPenalty = stopsCount * 0.7;
  const complexityPenalty = complexityScore * 12;
  const delayPenalty = delayMin * 0.9;

  // Keep already existing UAE/local logic alive if old helpers can detect tolls/highway.
  const tollCost = typeof _tz2TollCost === "function" ? tz3SafeNumber(_tz2TollCost(r), 0) : 0;
  const tollPenalty = tollCost > 0 ? 6 : 0;

  const rawTotal = timeComponent + trafficPenalty + stopsPenalty + complexityPenalty + delayPenalty + tollPenalty;
  const score = tz3Round(rawTotal, 1);

  const trafficLevel = trafficScore >= 0.45 ? 3 : trafficScore >= 0.2 ? 2 : 1;
  const trafficLabel = trafficScore >= 0.45 ? "heavy" : trafficScore >= 0.2 ? "moderate" : "stable";
  const incidentsCount = delayMin >= 8 ? 1 : 0;
  const stabilityScore = Math.max(0, Math.round(100 - trafficPenalty * 2.2 - complexityPenalty * 2.5 - delayPenalty * 1.3));
  // Stress (0–100): turns / junction complexity / lane changes dominate; traffic weighted lower than turns.
  const stressScore = Math.max(
    0,
    Math.min(
      100,
      Math.round(
        stopsCount * 2.05 +
          complexityScore * 20 +
          laneHints * 1.35 +
          heavyJunctionSteps * 1.05 +
          trafficScore * 7.5
      )
    )
  );
  // Uncapped scalar for CALM mode ordering (lower = easier drive).
  const calmStressScore = tz3Round(
    stopsCount * 2.75 + complexityScore * 24 + laneHints * 1.85 + heavyJunctionSteps * 1.15 + trafficScore * 5.5,
    2
  );

  const breakdown = {
    total: score,
    formula: "durationTrafficMin + trafficPenalty + stopsPenalty + complexityPenalty + delayPenalty + tollPenalty",
    durationSec,
    durationTrafficSec,
    durationMin,
    baseDurationMin,
    distanceKm,
    delaySec,
    delayMin,
    stopsCount,
    turns: stopsCount,
    trafficScore,
    trafficRank: trafficLevel,
    complexityScore,
    timeComponent: tz3Round(timeComponent, 1),
    trafficPenalty: tz3Round(trafficPenalty, 1),
    stopsPenalty: tz3Round(stopsPenalty, 1),
    turnsPenalty: tz3Round(stopsPenalty, 1),
    complexityPenalty: tz3Round(complexityPenalty, 1),
    delayPenalty: tz3Round(delayPenalty, 1),
    tollCost,
    tollPenalty,
    stressScore,
    stabilityScore,
    laneHints,
    heavyJunctionSteps,
    calmStressScore
  };

  return {
    id: r.id || ("route-" + r.index),
    googleRouteIndex: r.index,
    title: typeof _tz1RouteName === "function" ? _tz1RouteName(r) : (r.summary || ("Route " + ((r.index || 0) + 1))),
    durationMin,
    distanceKm,
    trafficLevel,
    trafficLabel: typeof _tz2TrafficLabel === "function" ? _tz2TrafficLabel({ ...r, traffic: trafficLabel }) : trafficLabel,
    stopsCount,
    turnsCount: stopsCount,
    incidentsCount,
    tolls: tollCost > 0,
    score,
    scoreBreakdown: breakdown,
    trafficPenalty: breakdown.trafficPenalty,
    stopsPenalty: breakdown.stopsPenalty,
    incidentsPenalty: incidentsCount ? 4 : 0,
    complexityPenalty: breakdown.complexityPenalty,
    tollPenalty: breakdown.tollPenalty,
    delayPenalty: breakdown.delayPenalty,
    stressScore,
    calmStressScore,
    drivePersonality: typeof getDrivePersonality === "function" ? getDrivePersonality({ ...r, stressScore }) : "Steady drive",
    stabilityScore
  };
}

function scoreRoutes(routes) {
  if (!Array.isArray(routes)) return [];
  return routes.map(function(route) {
    return Object.assign(route, scoreRoute(route, routes));
  });
}

function validateScoredRoutes(routes) {
  if (!Array.isArray(routes) || routes.length === 0) {
    return { ok: false, message: "No scored routes" };
  }
  const invalid = routes.find(function(route) {
    if (!route) return true;
    const dm = Number(route.durationMin);
    const dk = Number(route.distanceKm);
    if (!Number.isFinite(dm) || !Number.isFinite(dk)) return true;
    return false;
  });
  if (invalid) {
    return { ok: false, message: "Invalid scored route: " + ((invalid && invalid.id) || "unknown route") };
  }
  return { ok: true, message: "OK" };
}

function calculateRouteScore(r, allRoutes) {
  return scoreRoute(r, allRoutes);
}

<script id="cr-tz4-why-generator">
// ТЗ-2 [v06] — якорь «ТЗ-4 — WHY GENERATOR»: WHY / trade-off тексты и применение к маршрутам.
// Порядок: внешний <script> сразу после cr-tz3-score-engine.js — до cr-ai-decision-layer.js
// (buildCanonicalDecisionState вызывает applyWhyToRoutes).
// Зависит от main: analyzedRoutes, getRouteSummaryName, window.buildRealDecision (если есть).
// Зависит от cr-tz1-tz2-decision-helpers.js: _tz1Minutes, _tz2Turns, _tz2TollCost, _tz1RouteName.

function _tz2CompareMetric(best, others, getter, direction) {
  if (!best || !others || !others.length) return null;
  const bestValue = getter(best);
  const values = others.map(getter).filter(Number.isFinite);
  if (!values.length) return null;
  const target = direction === "lower" ? Math.min.apply(null, values) : Math.max.apply(null, values);
  return { bestValue, target, diff: direction === "lower" ? target - bestValue : bestValue - target };
}

function _tz2BuildWhy(best, routes) {
  const r = routes || analyzedRoutes;
  return generateWhyLine(best, r, clearRoadOfficialBestRoute(r));
}

function _tz2BuildTradeOff(route, best, routes) {
  if (!route) return "";
  const others = (routes || []).filter(function(r) { return r && r.index !== route.index; });
  const fastest = (routes || []).slice().sort(function(a, b) { return _tz1Minutes(a) - _tz1Minutes(b); })[0];
  const lowestToll = (routes || []).slice().sort(function(a, b) { return _tz2TollCost(a) - _tz2TollCost(b); })[0];
  const simplest = (routes || []).slice().sort(function(a, b) { return _tz2Turns(a) - _tz2Turns(b); })[0];
  const currentMin = _tz1Minutes(route);

  if (fastest && route.index !== fastest.index) {
    const extra = currentMin - _tz1Minutes(fastest);
    if (extra > 0 && extra <= 5 && _tz2Turns(route) + 2 < _tz2Turns(fastest)) return "+" + extra + " min, but simpler drive";
    if (extra > 0 && _tz2TollCost(route) < _tz2TollCost(fastest)) return "+" + extra + " min, but lower tolls";
  }

  if (lowestToll && route.index === lowestToll.index && _tz2TollCost(route) === 0 && fastest && fastest.index !== route.index) {
    const extra = currentMin - _tz1Minutes(fastest);
    if (extra > 0) return "No tolls, but +" + extra + " min";
  }

  if (simplest && route.index === simplest.index && fastest && fastest.index !== route.index) {
    const extra = currentMin - _tz1Minutes(fastest);
    if (extra > 0 && extra <= 4) return "Slightly longer, but calmer";
  }

  if (best && route.index === best.index && others.length) {
    let second = null;
    if (typeof window.buildRealDecision === "function") {
      const alts = window.buildRealDecision(routes || []).alternatives;
      if (alts && alts[0]) second = alts[0];
    }
    if (!second) second = others.slice().sort(function(a, b) { return (a.score || 0) - (b.score || 0); })[0];
    if (second) {
      const diff = _tz1Minutes(route) - _tz1Minutes(second);
      if (diff < 0 && _tz2Turns(route) > _tz2Turns(second) + 2) return "Faster, but more turns";
      if (diff <= 1 && _tz2TollCost(route) > _tz2TollCost(second)) return "Best balance, but tolls apply";
    }
  }

  return "Balanced time, traffic and driving effort";
}

// ============================================================
//  ТЗ-4 — WHY GENERATOR
//  Generates clear, data-based reasons after ТЗ-3 score is ready.
// ============================================================
function tz4SafeNumber(value, fallback = 0) {
  const number = Number(value);
  return Number.isFinite(number) ? number : fallback;
}

function tz4Minutes(route) {
  if (!route) return 0;
  if (Number.isFinite(route.durationMin)) return Math.round(route.durationMin);
  if (Number.isFinite(route.durationTrafficSec)) return Math.round(route.durationTrafficSec / 60);
  if (Number.isFinite(route.time)) return Math.round(route.time / 60);
  if (typeof _tz1Minutes === "function") return _tz1Minutes(route);
  return 0;
}

function tz4TrafficScore(route) {
  if (!route) return 0;
  if (Number.isFinite(route.trafficScore)) return route.trafficScore;
  if (route.scoreBreakdown && Number.isFinite(route.scoreBreakdown.trafficScore)) return route.scoreBreakdown.trafficScore;
  if (typeof _tz1TrafficRank === "function") return _tz1TrafficRank(route.traffic) / 3;
  return 0;
}

function tz4Stops(route) {
  if (!route) return 0;
  if (Number.isFinite(route.stopsCount)) return route.stopsCount;
  if (Number.isFinite(route.turnsCount)) return route.turnsCount;
  if (typeof _tz2Turns === "function") return _tz2Turns(route);
  return 0;
}

function tz4DelayMin(route) {
  if (!route) return 0;
  if (route.scoreBreakdown && Number.isFinite(route.scoreBreakdown.delayMin)) return Math.round(route.scoreBreakdown.delayMin);
  if (Number.isFinite(route.delayMinutes)) return Math.round(route.delayMinutes);
  if (Number.isFinite(route.durationTrafficSec) && Number.isFinite(route.durationSec)) {
    return Math.max(0, Math.round((route.durationTrafficSec - route.durationSec) / 60));
  }
  return 0;
}

function tz4RoadName(route) {
  if (typeof _tz1RouteName === "function") return _tz1RouteName(route);
  if (typeof getRouteSummaryName === "function") return getRouteSummaryName(route);
  return (route && route.summary) || (route && route.title) || "selected route";
}

/** TZ4 legacy sort by route.score — только подписи/сравнения текста; не использовать как выбор лучшего маршрута (SSOT: buildRealDecision). */
function tz4BestByScore(routes) {
  const safeRoutes = Array.isArray(routes) ? routes.filter(Boolean) : [];
  if (!safeRoutes.length) return null;
  return safeRoutes.slice().sort(function(a, b) {
    return tz4SafeNumber(a.score, 999999) - tz4SafeNumber(b.score, 999999);
  })[0];
}

function clearRoadOfficialBestRoute(routes) {
  const safe = Array.isArray(routes) ? routes.filter(Boolean) : [];
  if (!safe.length) return null;
  if (typeof window.buildRealDecision === "function") return window.buildRealDecision(safe).bestRoute;
  return tz4BestByScore(safe);
}

function generateWhy(route, bestRoute, allRoutes) {
  const r = route || null;
  const routes = Array.isArray(allRoutes) && allRoutes.length ? allRoutes : (Array.isArray(analyzedRoutes) ? analyzedRoutes : []);
  const best = bestRoute || clearRoadOfficialBestRoute(routes) || r;
  if (!r) return ["Route is being calculated"];

  const reasons = [];
  const isBest = best && r.index === best.index;
  const others = routes.filter(function(item) { return item && item.index !== r.index; });
  const road = tz4RoadName(r);

  if (isBest) {
    const second = others.slice().sort(function(a, b) {
      return tz4SafeNumber(a.score, 999999) - tz4SafeNumber(b.score, 999999);
    })[0];

    if (second) {
      const timeAdvantage = tz4Minutes(second) - tz4Minutes(r);
      const trafficAdvantage = tz4TrafficScore(second) - tz4TrafficScore(r);
      const stopsAdvantage = tz4Stops(second) - tz4Stops(r);
      const delayAdvantage = tz4DelayMin(second) - tz4DelayMin(r);
      const scoreAdvantage = Math.round(tz4SafeNumber(second.score, 0) - tz4SafeNumber(r.score, 0));

      if (timeAdvantage >= 2) reasons.push("Faster by " + timeAdvantage + " min");
      if (trafficAdvantage >= 0.12) reasons.push("Less traffic");
      if (delayAdvantage >= 2) reasons.push("Less delay by " + delayAdvantage + " min");
      if (stopsAdvantage >= 2) reasons.push("Fewer stops");
      if (!reasons.length && scoreAdvantage >= 3) reasons.push("Best score balance");
    }

    if (!reasons.length) {
      if (tz4DelayMin(r) <= 1 && tz4TrafficScore(r) <= 0.2) reasons.push("Stable traffic now");
      else if (tz4TrafficScore(r) <= 0.3) reasons.push("Balanced traffic and time");
      else reasons.push("Best overall balance");
    }
  } else if (best) {
    const timeDiff = tz4Minutes(r) - tz4Minutes(best);
    const trafficDiff = tz4TrafficScore(r) - tz4TrafficScore(best);
    const stopsDiff = tz4Stops(r) - tz4Stops(best);
    const delayDiff = tz4DelayMin(r) - tz4DelayMin(best);

    if (timeDiff < 0) reasons.push("Faster by " + Math.abs(timeDiff) + " min");
    else if (timeDiff > 0) reasons.push(timeDiff + " min slower than best");
    else reasons.push("Similar time to best");

    if (trafficDiff <= -0.12) reasons.push("Less traffic");
    else if (trafficDiff >= 0.12) reasons.push("More traffic");

    if (stopsDiff <= -2) reasons.push("Fewer stops");
    else if (stopsDiff >= 2) reasons.push("More stops");

    if (delayDiff <= -2) reasons.push("Less delay by " + Math.abs(delayDiff) + " min");
    else if (delayDiff >= 2) reasons.push("More delay by " + delayDiff + " min");
  }

  const unique = [];
  reasons.forEach(function(reason) {
    if (reason && unique.indexOf(reason) === -1) unique.push(reason);
  });

  if (!unique.length) unique.push("Route profile calculated");
  if (road && unique.length) unique[0] = unique[0] + " via " + road;
  return unique.slice(0, 3);
}

function generateWhyLine(route, allRoutes, bestRoute) {
  const routes = allRoutes || analyzedRoutes;
  const best = bestRoute || clearRoadOfficialBestRoute(routes);
  return generateWhy(route, best, routes).join(" · ");
}

function applyWhyToRoutes(routes, bestRoute) {
  if (!Array.isArray(routes)) return [];
  const best = bestRoute || clearRoadOfficialBestRoute(routes);
  return routes.map(function(route) {
    const points = generateWhy(route, best, routes);
    route.whyPoints = points;
    route.why = points.join(" · ");
    return route;
  });
}

function validateWhyRoutes(routes) {
  if (!Array.isArray(routes) || !routes.length) return { ok: false, message: "No WHY routes" };
  const invalid = routes.find(function(route) {
    return !route || !Array.isArray(route.whyPoints) || !route.whyPoints.length || typeof route.why !== "string" || !route.why.trim();
  });
  if (invalid) return { ok: false, message: "Invalid WHY route: " + ((invalid && invalid.id) || "unknown route") };
  return { ok: true, message: "OK" };
}

</script>

<script id="cr-ai-decision-layer">
// ТЗ-2 [v05] — якорь «ТЗ-5 — AI DECISION LAYER» (buildAIDecision, buildCanonicalDecisionState, …).
// Порядок: внешний <script> сразу после cr-tz4-why-generator.js — до cr-tz1-drive-voice-ai-advice.js
// (нужен для buildCanonicalDecisionState в TZ7 live, TZ2 integrity, TZ7+TZ8 bundle).
// Зависит от cr-tz2-normalization-layer.js: normalizeRoutes, validateNormalizedRoutes, applyClearRoadRouteSanityMarks.
// Зависит от cr-tz4-why-generator.js: applyWhyToRoutes, clearRoadOfficialBestRoute.
// Зависит от cr-tz3-score-engine.js: scoreRoutes, validateScoredRoutes.
// Зависит от cr-tz1-tz2-decision-helpers.js: _tz1Minutes, _tz2Turns.
// От main: getUserPreference, userFilters, getRouteRole,
// window.buildRealDecision (если задан), currentDecision (в calculateConfidence).
// ============================================================
//  ТЗ-5 — AI DECISION LAYER
//  Builds one official decision object without changing the UI contract.
// ============================================================
function tz5PreferencePenalty(route) {
  const pref = typeof getUserPreference === "function" ? getUserPreference() : "balanced";
  if (pref === "fastest") return _tz1Minutes(route) * 0.7;
  if (pref === "no_tolls" && route && route.tolls) return 18;
  return 0;
}

function tz5FilterPenalty(route) {
  const safeFilters = typeof userFilters === "object" && userFilters ? userFilters : {};
  return (safeFilters.avoid_highways && route && route.highway ? 8 : 0) +
         (safeFilters.fewer_turns ? _tz2Turns(route) * 0.8 : 0);
}

function calculateDecisionConfidence(bestRoute, alternatives) {
  const routes = [bestRoute].concat(Array.isArray(alternatives) ? alternatives : []).filter(Boolean);
  return buildAIDecision(routes).confidence;
}

function buildAIDecision(routes) {
  if (typeof window.buildRealDecision === "function") return window.buildRealDecision(routes);
  const safe = Array.isArray(routes) ? routes.filter(Boolean) : [];
  const fastestRoute =
    safe.slice().sort(function(a, b) {
      return _tz1Minutes(a) - _tz1Minutes(b);
    })[0] || safe[0] || null;
  const bestRoute = safe[0] || null;
  const alternatives = bestRoute ? safe.filter(function(route) {
    return route && route.index !== bestRoute.index;
  }) : [];
  return {
    bestRoute,
    alternatives,
    rankedRoutes: safe,
    confidence: { level: "LOW", percent: 55, margin: 0, reason: "Bootstrap · awaiting SSOT engine" },
    selectedRouteId: bestRoute ? bestRoute.id : null,
    selectedRouteIndex: bestRoute ? bestRoute.index : null,
    fastestRoute: fastestRoute || bestRoute,
    generatedAt: new Date().toISOString()
  };
}

function validateAIDecision(decision) {
  if (!decision || !decision.bestRoute) return { ok: false, message: "AI decision has no best route" };
  if (!Array.isArray(decision.alternatives)) return { ok: false, message: "AI decision alternatives are missing" };
  if (!decision.confidence || typeof decision.confidence.level !== "string" || !Number.isFinite(decision.confidence.percent)) {
    return { ok: false, message: "AI decision confidence is invalid" };
  }
  return { ok: true, message: "OK" };
}

function selectBestRouteDecision(routes) {
  return buildAIDecision(routes);
}

function selectBestRoute(routes) {
  return buildAIDecision(routes).bestRoute;
}

function buildCanonicalDecisionState(routesInput, options) {
  const opts = options || {};
  let normalized = normalizeRoutes(Array.isArray(routesInput) ? routesInput : []);
  applyClearRoadRouteSanityMarks(normalized);
  let kept = normalized.filter(function(route){ return route && !route.invalidRoute; });
  if (!kept.length && normalized.length) {
    try {
      if (window.__CLEAR_ROAD_ROUTE_DEBUG__ === true) {
        console.warn('[ROUTE REJECT]', 'buildCanonical all sanity-filtered — keeping Google routes', normalized.length);
      }
    } catch (_) {}
    normalized.forEach(function(r) {
      if (r) {
        r.invalidRoute = false;
        delete r.invalidReason;
      }
    });
    kept = normalized.filter(function(route){ return route && !route.invalidRoute; });
  }
  normalized = kept;
  if (!normalized.length) throw new Error("Route data looks incorrect. Please choose a more specific destination.");
  const alreadyScored = !!opts.assumeScored && normalized.every(function(route) {
    return Number.isFinite(route && route.score) && !!(route && route.scoreBreakdown);
  });
  const scored = alreadyScored ? normalized : scoreRoutes(normalized);
  const scoreCheck = validateScoredRoutes(scored);
  if (!scoreCheck.ok) throw new Error(scoreCheck.message);

  const firstDecision = selectBestRouteDecision(scored);
  const decisionCheck = validateAIDecision(firstDecision);
  if (!decisionCheck.ok) throw new Error(decisionCheck.message);

  const best = firstDecision.bestRoute;
  const fastest = scored.slice().sort(function(a, b) { return _tz1Minutes(a) - _tz1Minutes(b); })[0] || best || null;
  const withWhy = applyWhyToRoutes(scored, best);
  const withRoles = withWhy.map(function(route, index) {
    route.role = getRouteRole(route, best, fastest, withWhy);
    route.decisionRank = Number.isFinite(route.decisionRank) ? route.decisionRank : (index + 1);
    route.decisionScore = Number.isFinite(route.decisionScore)
      ? Math.round(route.decisionScore * 10) / 10
      : Math.round((Number.isFinite(route && route.score) ? Number(route.score) : 0) * 10) / 10;
    return route;
  });

  // SSOT этап 1: один вызов buildRealDecision на scored; withRoles — те же объекты маршрутов
  return {
    routes: withRoles,
    decision: firstDecision,
    bestRoute: best,
    fastestRoute: fastest
  };
}

function calculateConfidence(best, allRoutes) {
  if (!best) return "HIGH";

  if (typeof currentDecision !== "undefined" && currentDecision && currentDecision.bestRoute && currentDecision.confidence) {
    const dbr = currentDecision.bestRoute;
    if (Number(best.index) !== Number(dbr.index)) return "LOW";
    const lvl = String(currentDecision.confidence.level || "HIGH").toUpperCase();
    if (dbr.tooSlow || dbr.notRecommended) return "LOW";
    return lvl;
  }

  if (!Array.isArray(allRoutes) || allRoutes.length < 2) return "HIGH";

  let decision = null;
  if (typeof window.buildRealDecision === "function") {
    decision = window.buildRealDecision(allRoutes);
  } else {
    decision = buildAIDecision(allRoutes);
  }

  if (!decision || !decision.bestRoute) return "HIGH";

  if (Number(best.index) !== Number(decision.bestRoute.index)) return "LOW";

  const br = decision.bestRoute;
  const fr = decision.fastestRoute || br;

  if (br.tooSlow || br.notRecommended) return "LOW";

  const gapBestVsFastest = Math.round(_tz1Minutes(br) - _tz1Minutes(fr));
  const alts = Array.isArray(decision.alternatives) ? decision.alternatives : [];
  const hasAlternatives = alts.length > 0;
  let strongAlternative = false;
  if (hasAlternatives && alts[0]) {
    strongAlternative =
      Math.abs(_tz1Minutes(alts[0]) - _tz1Minutes(br)) <= 12;
  }

  if (gapBestVsFastest > 22) return "LOW";
  if (!hasAlternatives) return "HIGH";
  if (strongAlternative || gapBestVsFastest > 8) return "MEDIUM";
  return "HIGH";
}

function _tz1ConfidencePercent(level) {
  if (level === "HIGH") return 90;
  if (level === "MEDIUM") return 70;
  return 55;
}

</script>

    if (currentLang === "ru") return "Постройте маршрут — я объясню лучший вариант.";
    if (currentLang === "ua") return "Побудуйте маршрут — я поясню найкращий варіант.";
    if (currentLang === "ar") return "ابنِ المسار أولاً — سأشرح أفضل خيار.";
    return "Build a route — I will explain the best option.";
  }
  const mins = getDisplayMinutes(r);
  const name = getRouteSummaryName(r);
  const alt = getBestComparableAlternative(r);
  const why = stripHtml(getRouteInsight(r, _bestRoute || r, _fastestRoute) || generateWhyLine(r, analyzedRoutes) || "");
  const traffic = translateTrafficForVoice(r.traffic || "stable");
  const stress = stripHtml((getUnifiedRouteMeta(r)?.stressLabel || r.drivePersonality || "steady drive")).toLowerCase();

  let diffText = "";
  if (alt) {
    const diff = getDisplayMinutes(alt) - mins;
    if (currentLang === "ru") {
      diffText = diff > 0 ? " На " + diff + " мин быстрее ближайшей альтернативы." : " Время похоже на альтернативу, но маршрут стабильнее.";
    } else if (currentLang === "ua") {
      diffText = diff > 0 ? " На " + diff + " хв швидше найближчої альтернативи." : " Час схожий на альтернативу, але маршрут стабільніший.";
    } else if (currentLang === "ar") {
      diffText = diff > 0 ? " أسرع بحوالي " + diff + " دقيقة من أقرب بديل." : " الوقت مشابه للبديل، لكن المسار أكثر استقراراً.";
    } else {
      diffText = diff > 0 ? " " + diff + " min faster than the closest alternative." : " Similar time, but the route is more stable.";
    }
  }

  if (currentLang === "ru") {
    return "AI совет: ехать через " + name + " — " + mins + " мин. " +
      (why ? why + ". " : "") + "Трафик " + traffic + ", характер: " + stress + "." + diffText;
  }
  if (currentLang === "ua") {
    return "AI порада: їхати через " + name + " — " + mins + " хв. " +
      (why ? why + ". " : "") + "Трафік " + traffic + ", характер: " + stress + "." + diffText;
  }
  if (currentLang === "ar") {
    return "نصيحة الذكاء الاصطناعي: الطريق عبر " + name + "، حوالي " + mins + " دقيقة. " +
      (why ? why + ". " : "") + "المرور " + traffic + "، والطريق " + stress + "." + diffText;
  }
  return "AI advice: take " + name + " — " + mins + " min. " +
    (why ? why + ". " : "") + "Traffic is " + traffic + ", route feel: " + stress + "." + diffText;
}

function renderAIAdviceLine(route) {
  const advice = getAIAdviceText(route);
  const tag = typeof t === "function" ? t("dh_advice_tag") : "Why";
  return '<div class="ai-advice-line" id="ai-advice-line"><span>' + _tz1EscapeHTML(tag) + '</span>' + advice + '</div>';
}

function buildDecisionVoiceText(route, mode) {
  const r = route || selectedRoute || _bestRoute;
  if (!r) {
    if (currentLang === "ru") return "Сначала постройте маршрут. Затем я объясню, почему выбран лучший вариант.";
    if (currentLang === "ua") return "Спочатку побудуйте маршрут. Потім я поясню, чому обрано найкращий варіант.";
    if (currentLang === "ar") return "ابنِ المسار أولاً. بعد ذلك سأشرح لماذا هذا الطريق أفضل.";
    return "Build a route first. Then I will explain why this route is better.";
  }
  const advice = getAIAdviceText(r);
  const alt = getBestComparableAlternative(r);
  const conf = calculateConfidence(r, analyzedRoutes);
  let altLine = "";
  if (alt) {
    const diff = getDisplayMinutes(alt) - getDisplayMinutes(r);
    if (currentLang === "ru") altLine = diff > 0 ? " Ближайшая альтернатива дольше примерно на " + diff + " минут." : " Альтернатива не быстрее, поэтому оставляю этот маршрут.";
    else if (currentLang === "ua") altLine = diff > 0 ? " Найближча альтернатива довша приблизно на " + diff + " хвилин." : " Альтернатива не швидша — залишаю цей маршрут.";
    else if (currentLang === "ar") altLine = diff > 0 ? " البديل الأقرب أطول بحوالي " + diff + " دقيقة." : " البديل ليس أسرع — أبقي هذا المسار.";
    else altLine = diff > 0 ? " The closest alternative is about " + diff + " minutes longer." : " The alternative is not faster, so I keep this route.";
  }
  if (currentLang === "ru") return advice + altLine + " Уверенность решения: " + translateConfidenceForVoice(conf) + ".";
  if (currentLang === "ua") return advice + altLine + " Впевненість рішення: " + translateConfidenceForVoice(conf) + ".";
  if (currentLang === "ar") return advice + altLine + " ثقة القرار: " + translateConfidenceForVoice(conf) + ".";
  return advice + altLine + " Decision confidence is " + translateConfidenceForVoice(conf) + ".";
}

function buildRerouteVoiceText(decision, altRoute) {
  if (!decision || !altRoute || decision.action === "stay") return "";
  const altName = getRouteSummaryName(altRoute);
  const mins = getDisplayMinutes(altRoute);
  const currentMins = selectedRoute ? getDisplayMinutes(selectedRoute) : null;
  const gain = currentMins != null ? currentMins - mins : null;
  if (currentLang === "ru") {
    return (decision.action === "switch" ? "AI совет: лучше сменить маршрут. " : "AI совет: есть альтернатива. ") +
      "Через " + altName + " около " + mins + " минут. " +
      (gain != null && gain > 0 ? "Экономия примерно " + gain + " минут. " : "Время примерно такое же, но движение может быть спокойнее. ") +
      stripHtml(decision.detail || "");
  }
  if (currentLang === "ua") {
    return (decision.action === "switch" ? "AI порада: краще змінити маршрут. " : "AI порада: є альтернатива. ") +
      "Через " + altName + " близько " + mins + " хвилин. " +
      (gain != null && gain > 0 ? "Економія приблизно " + gain + " хвилин. " : "Час майже такий самий, але рух може бути спокійнішим. ") +
      stripHtml(decision.detail || "");
  }
  if (currentLang === "ar") {
    return (decision.action === "switch" ? "نصيحة الذكاء الاصطناعي: من الأفضل تغيير الطريق. " : "نصيحة الذكاء الاصطناعي: يوجد طريق بديل. ") +
      "عبر " + altName + " حوالي " + mins + " دقيقة. " +
      (gain != null && gain > 0 ? "التوفير حوالي " + gain + " دقيقة. " : "الوقت قريب، لكن الطريق قد يكون أهدأ. ") +
      stripHtml(decision.detail || "");
  }
  return (decision.action === "switch" ? "AI advice: switch route. " : "AI advice: an alternative is available. ") +
    "Via " + altName + ", about " + mins + " minutes. " +
    (gain != null && gain > 0 ? "You may save about " + gain + " minutes. " : "Time is similar, but traffic may be calmer. ") +
    stripHtml(decision.detail || "");
}

function speakRerouteDecision(decision, altRoute) {
  if (!voiceEnabled) return;
  const now = Date.now();
  if (now - lastRerouteVoiceAt < 20000) return;
  const text = buildRerouteVoiceText(decision, altRoute);
  if (!text) return;
  lastRerouteVoiceAt = now;
  speakText(text);
}

function speakCurrentDecision() {
  voiceEnabled = true;
  const now = Date.now();
  if (now - lastDecisionVoiceAt < 1200) return;
  lastDecisionVoiceAt = now;
  speakText(buildDecisionVoiceText((currentDecision && currentDecision.bestRoute) || selectedRoute || _bestRoute, "manual"));
}

</script>

<script id="cr-reroute-decision">
// cr-reroute-decision.js — extracted from input/index.html (main inline script).
// External module; depends on globals (script order in input / ТЗ-0).

function getRerouteDecision(currentRoute, alternativeRoute) {
  if (!currentRoute || !alternativeRoute) {
    return { action: "stay", confidence: "low", title: "Stay on current route", detail: "Missing route data" };
  }

  const currentMin = getDisplayMinutes(currentRoute);
  const altMin = getDisplayMinutes(alternativeRoute);
  const timeGain = currentMin - altMin;

  const currentDelay = currentRoute.delayMinutes || 0;
  const altDelay = alternativeRoute.delayMinutes || 0;
  const delayGain = currentDelay - altDelay;

  const currentScore = Number.isFinite(currentRoute.score) ? currentRoute.score : calculateRouteScore(currentRoute);
  const altScore = Number.isFinite(alternativeRoute.score) ? alternativeRoute.score : calculateRouteScore(alternativeRoute);
  const scoreGain = currentScore - altScore;

  const trafficBetter = trafficRank(alternativeRoute.traffic) < trafficRank(currentRoute.traffic);
  const simplerDrive = (alternativeRoute.complexity || 0) < (currentRoute.complexity || 0);
  const calmerDrive = (alternativeRoute.stressLevel || 0) < (currentRoute.stressLevel || 0);
  const fewerStops = (alternativeRoute.stopsCount || 0) < (currentRoute.stopsCount || 0);
  const tollImprovement = !!currentRoute.tolls && !alternativeRoute.tolls;

  const reasons = [];
  if (timeGain > 0) reasons.push(timeGain + " min faster");
  if (delayGain > 0) reasons.push(delayGain + " min less delay");
  if (trafficBetter) reasons.push("lighter traffic");
  if (simplerDrive) reasons.push("simpler drive");
  if (calmerDrive) reasons.push("calmer route");
  if (fewerStops) reasons.push("fewer stops");
  if (tollImprovement) reasons.push("no tolls");
  if (!reasons.length && scoreGain > 0) reasons.push("better total score");

  const reasonText = reasons.slice(0, 3).join(" · ") || "No strong advantage";
  const via = getRouteSummaryName(alternativeRoute);

  if (timeGain >= 4 || scoreGain >= 10) {
    return {
      action: "switch",
      confidence: "high",
      title: timeGain >= 4 ? ("Switch now → save " + timeGain + " min") : "Switch now → better route score",
      detail: reasonText + " via " + via,
      timeGain,
      delayGain,
      scoreGain
    };
  }

  if ((timeGain >= 2 && (trafficBetter || delayGain >= 2 || scoreGain >= 5)) || scoreGain >= 7) {
    return {
      action: "switch",
      confidence: "high",
      title: "Switch recommended",
      detail: reasonText + " via " + via,
      timeGain,
      delayGain,
      scoreGain
    };
  }

  if ((timeGain >= 1 && (trafficBetter || simplerDrive || calmerDrive || delayGain >= 1)) || scoreGain >= 4) {
    return {
      action: "suggest",
      confidence: "medium",
      title: "Alternative may be better",
      detail: reasonText + " via " + via,
      timeGain,
      delayGain,
      scoreGain
    };
  }

  if (timeGain >= 0 && (trafficBetter || calmerDrive || tollImprovement) && scoreGain >= 2) {
    return {
      action: "suggest",
      confidence: "medium",
      title: "Calmer route available",
      detail: reasonText + " via " + via,
      timeGain,
      delayGain,
      scoreGain
    };
  }

  return {
    action: "stay",
    confidence: "low",
    title: "Stay on current route",
    detail: "No strong reroute advantage",
    timeGain,
    delayGain,
    scoreGain
  };
}

</script>

<script id="cr-tz1-drive-live-gps-tracking">
// ТЗ-2 [v22] — live GPS в Drive: watchPosition, сглаживание, маркер/камера, мягкий reroute / off-route recalc (монолит).
// Порядок DOM: сразу после cr-tz1-drive-voice-ai-advice.js — до cr-route-cards-ui-cleanup.js
// (нужны speakRerouteDecision из voice-ai; selectBestRoute из AI layer; applyWhyToRoutes из TZ4; calculateRouteScore из TZ3;
// updateDriveUI из drive-update-ui; isDriveGpsUsable / shouldTriggerSoftOffRouteReroute из cr-tz1-drive-gps-warnings).
// Из основного <script> до внешних файлов: getRerouteDecision, findBestCurrentStepIndex, setActiveDriveRoute, dismissAlert,
// directionsService, renderSelectedRouteOnDriveMap, updateDriveRouteStatusLabel, speakText и связанные глобалы.

function renderDriveAlertDecision(decision, altRoute) {
  const alert = document.getElementById("drive-alert");
  const message = document.getElementById("drive-alert-message");

  if (!alert || !message) return;

  if (!decision || decision.action === "stay" || !altRoute) {
    alert.classList.remove("visible");
    return;
  }

  const confidenceClass = decision.confidence === "high" ? "high" :
                          decision.confidence === "medium" ? "medium" : "low";

  const actionLabel = decision.action === "switch" ? "Switch recommended" : "Alternative suggested";
  const scoreText = Number.isFinite(decision.scoreGain) ? ("Score +" + Math.round(decision.scoreGain)) : "AI route check";

  _rerouteDecision = {
    action: decision.action,
    confidence: decision.confidence,
    targetIndex: altRoute.index,
    title: decision.title,
    detail: decision.detail,
    scoreGain: decision.scoreGain || 0,
    timeGain: decision.timeGain || 0,
    createdAt: Date.now()
  };

  const viaName = getRouteSummaryName(altRoute);
  message.innerHTML = `
    <div class="drive-alert-header">
      <span class="drive-alert-badge ${confidenceClass}">
        <span class="dot"></span>
        ${_tz1EscapeHTML(decision.confidence)} confidence
      </span>
      <span class="drive-alert-state ${decision.action}">${_tz1EscapeHTML(actionLabel)}</span>
    </div>
    <div class="drive-alert-title">${_tz1EscapeHTML(decision.title)}</div>
    <div class="drive-alert-detail">${_tz1EscapeHTML(decision.detail)}</div>
    <div class="drive-alert-meta">${_tz1EscapeHTML(scoreText)} · Via ${_tz1EscapeHTML(viaName)}</div>
  `;

  const primaryBtn = alert.querySelector(".drive-alert-btn.primary");
  const secondaryBtn = alert.querySelector(".drive-alert-btn.secondary");

  if (primaryBtn && secondaryBtn) {
    primaryBtn.textContent = decision.action === "switch" ? "Switch now" : "Try alternative";
    primaryBtn.className = `drive-alert-btn primary${decision.action === "suggest" ? " suggest" : ""}`;
    secondaryBtn.textContent = "Keep current";
  }

  alert.classList.add("visible");
  speakRerouteDecision(decision, altRoute);
}

function evaluateReroute(currentRoute, allRoutes) {
  if (!currentRoute || !Array.isArray(allRoutes) || allRoutes.length <= 1) return null;

  const now = Date.now();
  const alternatives = allRoutes.filter(function(route) {
    if (!route || route.index === currentRoute.index) return false;
    if (_rerouteDismissedIndex === route.index && now < _rerouteDismissedUntil) return false;
    return true;
  });

  let bestAlt = null;
  let bestDecision = null;

  alternatives.forEach(function(alt) {
    const decision = getRerouteDecision(currentRoute, alt);
    if (!decision || decision.action === "stay") return;

    if (!bestAlt) {
      bestAlt = alt;
      bestDecision = decision;
      return;
    }

    const currentPriority = bestDecision.action === "switch" ? 2 : bestDecision.action === "suggest" ? 1 : 0;
    const newPriority = decision.action === "switch" ? 2 : decision.action === "suggest" ? 1 : 0;

    const currentScoreGain = Number(bestDecision.scoreGain || 0);
    const newScoreGain = Number(decision.scoreGain || 0);
    const currentTimeGain = Number(bestDecision.timeGain || 0);
    const newTimeGain = Number(decision.timeGain || 0);

    if (
      newPriority > currentPriority ||
      (newPriority === currentPriority && newScoreGain > currentScoreGain) ||
      (newPriority === currentPriority && newScoreGain === currentScoreGain && newTimeGain > currentTimeGain)
    ) {
      bestAlt = alt;
      bestDecision = decision;
    }
  });

  if (!bestAlt || !bestDecision) return null;

  return {
    index: bestAlt.index,
    route: bestAlt,
    decision: bestDecision,
    signature: currentRoute.index + "→" + bestAlt.index + ":" + bestDecision.action
  };
}

function getUserLatLngFromPosition(pos) {
  return new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
}

function smoothUserPosition(newLatLng) {
  if (!smoothedUserLatLng) {
    smoothedUserLatLng = newLatLng;
    return newLatLng;
  }
  const alpha = 0.35;
  smoothedUserLatLng = new google.maps.LatLng(
    smoothedUserLatLng.lat() + (newLatLng.lat() - smoothedUserLatLng.lat()) * alpha,
    smoothedUserLatLng.lng() + (newLatLng.lng() - smoothedUserLatLng.lng()) * alpha
  );
  return smoothedUserLatLng;
}

function updateUserHeading(prevLatLng, nextLatLng) {
  if (!prevLatLng || !nextLatLng) return lastUserHeading || 0;

  const d = google.maps.geometry.spherical.computeDistanceBetween(prevLatLng, nextLatLng);
  if (d < 5) return lastUserHeading || 0;

  lastUserHeading = google.maps.geometry.spherical.computeHeading(prevLatLng, nextLatLng) || 0;
  return lastUserHeading;
}

function updateDriveUserMarker(userLatLng) {
  if (!driveMap) return;

  const icon = {
    path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
    scale: 6,
    fillColor: "#2563eb",
    fillOpacity: 1,
    strokeColor: "#ffffff",
    strokeWeight: 2,
    rotation: lastUserHeading || 0,
    anchor: new google.maps.Point(0, 2)
  };

  if (!driveUserMarker) {
    driveUserMarker = new google.maps.Marker({
      position: userLatLng,
      map: driveMap,
      title: "You",
      zIndex: 9999,
      icon
    });
  } else {
    driveUserMarker.setPosition(userLatLng);
    driveUserMarker.setIcon(icon);
  }
}

function updateDriveCamera(userLatLng) {
  if (!driveMap || !followUserMode || !userLatLng) return;

  if (!driveMapHasFollowed) {
    driveMap.setZoom(17);
    driveMap.panTo(userLatLng);
    driveMapHasFollowed = true;
    return;
  }

  driveMap.panTo(userLatLng);

  const currentZoom = driveMap.getZoom() || 0;
  if (currentZoom < 16) {
    driveMap.setZoom(16);
  }
}

function handleLiveDrivePosition(pos) {
  if (!selectedRoute) return;

  if (!isDriveGpsUsable(pos)) {
    updateDriveGpsStatus(selectedRoute, null, "GPS weak" + formatGpsAccuracy());
    return;
  }

  const rawLatLng = getUserLatLngFromPosition(pos);
  const userLatLng = smoothUserPosition(rawLatLng);
  const prevLatLng = lastKnownUserLatLng;

  lastDriveGpsMoveMeters = prevLatLng
    ? google.maps.geometry.spherical.computeDistanceBetween(prevLatLng, userLatLng)
    : 999;

  updateUserHeading(prevLatLng, userLatLng);
  lastKnownUserLatLng = userLatLng;

  updateDriveUserMarker(userLatLng);
  updateDriveCamera(userLatLng);

  const nextStepIndex = findBestCurrentStepIndex(selectedRoute, userLatLng, currentStepIndex);
  if (nextStepIndex !== currentStepIndex) {
    currentStepIndex = nextStepIndex;
    lastWarningPhase = "";
    lastDriveVoiceStepIndex = -1;
    lastDriveVoicePhase = "";
  }

  updateDriveUI();

  if (shouldTriggerSoftOffRouteReroute(userLatLng, selectedRoute)) {
    handleOffRouteRecalculation(userLatLng);
    return;
  }

  const now = Date.now();
  if (currentStepIndex >= 2 && now - lastRerouteCheckAt > DRIVE_REROUTE_EVAL_INTERVAL_MS) {
    lastRerouteCheckAt = now;

    const reroute = evaluateReroute(selectedRoute, analyzedRoutes);

    if (!reroute) {
      if (betterRouteIndex !== null) {
        betterRouteIndex = null;
        _rerouteDecision = null;
        _rerouteLastSignature = "";
        const alert = document.getElementById("drive-alert");
        if (alert) alert.classList.remove("visible");
      }
      return;
    }

    const shouldShow = reroute.signature !== _rerouteLastSignature || now - _rerouteLastShownAt > 60000;
    betterRouteIndex = reroute.index;

    if (shouldShow) {
      _rerouteLastSignature = reroute.signature;
      _rerouteLastShownAt = now;
      renderDriveAlertDecision(reroute.decision, reroute.route);
    }
  }
}

function handleOffRouteRecalculation(userLatLng) {
  const now = Date.now();
  if (offRouteRecalcInProgress) return;
  if (now - lastOffRouteRecalcAt < DRIVE_OFF_ROUTE_REROUTE_COOLDOWN_MS) return;

  offRouteRecalcInProgress = true;
  lastOffRouteRecalcAt = now;
  lastDriveDirectionsRequestAt = now;
  betterRouteIndex = null;
  _rerouteDecision = null;
  dismissAlert();
  updateDriveGpsStatus(selectedRoute, null, "Off route · recalculating…");

  const destination = document.getElementById("end").value.trim();
  if (!destination || !directionsService) {
    offRouteRecalcInProgress = false;
    return;
  }

  directionsService.route({
    origin: userLatLng,
    destination,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    offRouteRecalcInProgress = false;

    if (status !== "OK" || !result.routes?.length) {
      updateDriveGpsStatus(selectedRoute, null, "Off route · recalculation unavailable");
      return;
    }

    currentDirectionsResult = result;

    analyzedRoutes = result.routes.map((route, i) => {
      const leg = route.legs[0];
      const metrics = calculateRouteMetrics(route, leg, route);
      return { route, index: i, displayIndex: i + 1, ...metrics };
    });

    analyzedRoutes = analyzedRoutes.map(r => {
      const scoreData = calculateRouteScore(r, analyzedRoutes);
      return { ...r, ...scoreData };
    });

    _bestRoute = selectBestRoute(analyzedRoutes);
    _fastestRoute = [...analyzedRoutes].sort((a, b) => a.time - b.time)[0];
    selectedRoute = _bestRoute;

    analyzedRoutes = applyWhyToRoutes(analyzedRoutes, _bestRoute);
    const whyCheck = validateWhyRoutes(analyzedRoutes);
    if (!whyCheck.ok) {
      document.getElementById("results").innerHTML = `<div class="error">${whyCheck.message}</div>`;
      return;
    }

    analyzedRoutes.forEach(r => {
      r.role = getRouteRole(r, _bestRoute, _fastestRoute, analyzedRoutes);
    });

    setActiveDriveRoute(_bestRoute, "softOffRouteReroute");
    currentStepIndex = 0;
    betterRouteIndex = null;
    _rerouteDecision = null;
    offRouteSince = 0;
    lastStepSwitchAt = 0;
    lastStableStepIndex = 0;
    smoothedUserLatLng = userLatLng;
    dismissAlert();

    renderSelectedRouteOnDriveMap(selectedRoute);
    updateDriveRouteStatusLabel(selectedRoute, "GPS reroute locked");
    updateDriveUI();
    updateDriveCamera(userLatLng);

    if (voiceEnabled) speakText("Route updated from your current position.", "normal");
  });
}

function startLiveDriveTracking() {
  if (!navigator.geolocation) {
    updateDriveGpsStatus(selectedRoute, null, "GPS not supported");
    return;
  }

  stopLiveDriveTracking();
  updateDriveGpsStatus(selectedRoute, null, "Waiting for GPS…");

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      handleLiveDrivePosition(pos);
      updateDriveGpsStatus(selectedRoute, null, "GPS live" + formatGpsAccuracy());
    },
    function(err) {
      console.error("Initial Drive GPS error:", err);
      updateDriveGpsStatus(selectedRoute, null, "GPS blocked or unavailable");
    },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
  );

  driveWatchId = navigator.geolocation.watchPosition(
    function(pos) {
      handleLiveDrivePosition(pos);
    },
    function(err) {
      console.error("Drive GPS error:", err);
      updateDriveGpsStatus(selectedRoute, null, "GPS error: allow location");
    },
    { enableHighAccuracy: true, maximumAge: 500, timeout: 10000 }
  );
}

function stopLiveDriveTracking() {
  if (driveWatchId !== null) {
    navigator.geolocation.clearWatch(driveWatchId);
    driveWatchId = null;
  }
  smoothedUserLatLng = null;
  offRouteSince = 0;
  offRouteRecalcInProgress = false;
  lastStepSwitchAt = 0;
  lastStableStepIndex = 0;
  lastGpsAccuracyMeters = null;

<script id="cr-drive-binding">

function getCanonicalRouteByIndex(index) {
  if (!Array.isArray(analyzedRoutes) || !analyzedRoutes.length) return null;
  const normalizedIndex = Number(index);
  if (Number.isFinite(normalizedIndex)) {
    const exact = analyzedRoutes.find(function(route) { return Number(route.index) === normalizedIndex; });
    if (exact) return exact;
  }

}

function resolveDriveRoute(index) {
  const exact = getCanonicalRouteByIndex(index);
  if (exact) return exact;

  if (selectedRoute) {
    const selected = getCanonicalRouteByIndex(selectedRoute.index);
    if (selected) return selected;
  }

  if (_bestRoute) {
    const best = getCanonicalRouteByIndex(_bestRoute.index);
    if (best) return best;

  return Array.isArray(analyzedRoutes) && analyzedRoutes.length ? analyzedRoutes[0] : null;
}

<script id="cr-route-cards-ui-cleanup">

function tz8SameRoute(a, b) {

  "#a78bfa",

function crRoutePolylineOptionsForMap(route, sortedRoutes, focusRoute, bestRoute, mapOpts) {

try {

  window.crRoutePaletteColorForSlot = crRoutePaletteColorForSlot;
  window.crRoutePolylineOptionsForMap = crRoutePolylineOptionsForMap;

function tz8GetDecisionAlternatives(decision, best, routes) {
  const fromDecision = decision && Array.isArray(decision.alternatives) ? decision.alternatives : [];
  const fallback = Array.isArray(routes) ? routes.filter(function(route) { return !tz8SameRoute(route, best); }) : [];
  const merged = [];

  fromDecision.concat(fallback).forEach(function(route) {
    if (!route || tz8SameRoute(route, best)) return;
    const exists = merged.some(function(item) { return tz8SameRoute(item, route); });
    if (!exists) merged.push(route);
  });

  return merged.sort(function(a, b) {
    const ar = Number.isFinite(a.decisionRank) ? a.decisionRank : 99;
    const br = Number.isFinite(b.decisionRank) ? b.decisionRank : 99;
    if (ar !== br) return ar - br;
    const as = Number.isFinite(a.decisionScore) ? a.decisionScore : (Number.isFinite(a.score) ? a.score : 999999);
    const bs = Number.isFinite(b.decisionScore) ? b.decisionScore : (Number.isFinite(b.score) ? b.score : 999999);
    return as - bs;
  });
}

function tz8RouteDistanceKm(route) {
  if (!route) return 0;
  if (Number.isFinite(route.distanceKm)) return Math.round(route.distanceKm * 10) / 10;

//  Make alternatives readable in 3 seconds: time, difference, character, WHY.
// ============================================================
function tz9RouteCharacter(route, best) {
  const diff = _tz1Minutes(route) - _tz1Minutes(best);
  const traffic = String(route && (route.traffic || route.trafficLevel || "")).toLowerCase();
  const stops = Number.isFinite(route && route.stopsCount) ? route.stopsCount : 0;
  const complexity = Number.isFinite(route && route.complexityScore) ? route.complexityScore : 0;

  if (diff < 0) return "FASTER OPTION";
  if (traffic === "low" || traffic === "light") return "CALMER TRAFFIC";
  if (stops <= 2 && complexity <= 4) return "SMOOTHER DRIVE";
  if (diff <= 2) return "SIMILAR ETA";
  if (traffic === "heavy" || traffic === "high") return "TRAFFIC RISK";
  return "ALTERNATIVE ROUTE";
}

function tz9TrafficClass(route) {

  if (traffic.includes("low") || traffic.includes("light") || traffic.includes("stable")) return "traffic-low";

function tz9CleanReason(route, best, analyzedRoutes) {

  const diff = tz1EtaDiffMinutes(route, best);

  const rank = Number.isFinite(route.decisionRank) ? route.decisionRank : idx + 2;
  const character = tz9RouteCharacter(route, best);

  const trafficText = route.trafficLabel || route.traffic || "traffic";

  let h = "";
  h += '<div class="alt-card-p tz9-alt-card" onclick="openRouteDetails(' + route.index + ')" data-decision-rank="' + _tz1EscapeHTML(rank) + '" data-best-alternative="' + (idx === 0 ? 'true' : 'false') + '">';

  h += '<div class="tz9-route-main"><div class="tz9-route-time">' + _tz1Minutes(route) + ' min</div><div class="tz9-route-diff' + (diff > 0 ? ' warn' : '') + '">' + _tz1EscapeHTML(diffText) + '</div></div>';
  h += '<div class="tz9-route-title">' + _tz1EscapeHTML(character) + ' · via ' + _tz1EscapeHTML(_tz1RouteName(route)) + '</div>';

  h += '</div>';
  h += '</div>';

<script id="cr-render-results-decision-ui">
// ТЗ-2 [v02] — renderResults(): блок results + ТЗ-6 DECISION UI BINDING (currentDecision).
// Загружается после cr-route-cards-ui-cleanup; onclick openRouteDetails / toggleAlternatives — в cr-route-compare-modal-ui.js [v04].

function crAltRoutesComputeRefs(allRoutes) {
  const list = Array.isArray(allRoutes)
    ? allRoutes.filter(function(r) { return r && Number.isFinite(r.index); })
    : [];
  let fastest = null;
  let calmest = null;
  if (list.length) {
    fastest = list.slice().sort(function(a, b) { return _tz1Minutes(a) - _tz1Minutes(b); })[0];
    calmest = list.slice().sort(function(a, b) {
      const ca = Number.isFinite(a.calmStressScore) ? a.calmStressScore : (Number(a.stressScore) || 999);
      const cb = Number.isFinite(b.calmStressScore) ? b.calmStressScore : (Number(b.stressScore) || 999);
      if (ca !== cb) return ca - cb;
      return _tz1Minutes(a) - _tz1Minutes(b);
    })[0];
  }
  return { fastest: fastest, calmest: calmest };
}

function crAltRouteHasNoTolls(route) {
  if (!route) return true;
  const tc = Number(route.tollCost);
  if (Number.isFinite(tc) && tc > 0) return false;
  if (route.hasToll) return false;
  return true;
}

function crRefreshRoutesSalikPricing(routes) {
  if (!Array.isArray(routes) || !routes.length) return;
  try {
    if (window.clearRoadTZ4UAE && typeof clearRoadTZ4UAE.refreshRoutesSalikPricing === "function") {
      clearRoadTZ4UAE.refreshRoutesSalikPricing(routes, new Date());
      return;
    }
  } catch (_) {}
  const ppg =
    typeof window.getSalikPriceUAE === "function"
      ? getSalikPriceUAE(new Date())
      : 4;
  routes.forEach(function(r) {
    if (!r) return;
    const cnt = Number(r.salikCount != null ? r.salikCount : r.tollCount) || 0;
    r.salikCount = Math.max(0, Math.round(cnt));
    r.salikPricePerGate = ppg;
    const raw = r.salikCount * ppg;
    r.salikCost = Math.round(raw * 100) / 100;
    r.tollCost = r.salikCost;
    r.hasToll = r.salikCost > 0;
    r.tolls = r.salikCost > 0;

}

function crRouteSalikAed(route) {
  if (!route) return 0;
  const c = Number(route.salikCost != null ? route.salikCost : route.tollCost);
  return Number.isFinite(c) ? c : 0;
}

function crSalikUncertain(route) {
  return !!(route && route.salikEstimateUncertain);
}

function crComputeSalikWaitHint(route, tk, sub) {
  const cnt = route ? Number(route.salikCount != null ? route.salikCount : route.tollCount) || 0 : 0;
  if (cnt < 1) return null;
  const getP =
    window.clearRoadTZ4UAE && typeof clearRoadTZ4UAE.getSalikPricePerGate === "function"
      ? function(d) { return clearRoadTZ4UAE.getSalikPricePerGate(d); }
      : typeof window.getSalikPriceUAE === "function"
        ? window.getSalikPriceUAE
        : null;
  if (typeof getP !== "function") return null;
  const now = new Date();
  const later = new Date(now.getTime() + 15 * 60 * 1000);
  const p0 = Number(getP(now));
  const p1 = Number(getP(later));
  if (!(p1 < p0)) return null;
  if (p0 === 6 && p1 === 4) {
    return {
      decision: sub(tk("salik_wait_peak_to_off"), { n: 15 }),
      reason: sub(tk("salik_wait_peak_to_off_reason"), { aed: cnt * (p0 - p1) })
    };
  }
  if (p1 === 0 && p0 > 0) {
    return {
      decision: tk("salik_wait_to_free_decision"),
      reason: sub(tk("salik_wait_to_free_reason"), { n: cnt * p0 })
    };
  }
  return {
    decision: sub(tk("salik_wait_generic_decision"), { n: 15, from: p0, to: p1 }),
    reason: sub(tk("salik_wait_generic_reason"), { aed: cnt * (p0 - p1) })
  };
}

function crFindFastestFreeRoute(routes) {
  const list = Array.isArray(routes)
    ? routes.filter(function(r) { return r && Number.isFinite(r.index); })
    : [];
  const frees = list.filter(function(r) { return crRouteSalikAed(r) < 0.01; });
  if (!frees.length) return null;
  return frees.slice().sort(function(a, b) {
    return crHeroMinutesForRoute(a) - crHeroMinutesForRoute(b);
  })[0];

function crBuildSalikHeroExtras(panelRoute, matchedBest, analyzedRoutes, tk, sub) {
  const out = {
    salikLine: "",
    salikPick: "",
    disclaimer: "",
    salikWaitOverride: null
  };
  const list = Array.isArray(analyzedRoutes) ? analyzedRoutes : [];
  if (!panelRoute || !list.length) return out;

  var sw = crComputeSalikWaitHint(panelRoute, tk, sub);
  if (sw) out.salikWaitOverride = sw;

  if (crSalikUncertain(panelRoute)) {
    out.disclaimer = tk("salik_disclaimer_uncertain");
  }

  const counter =
    matchedBest && panelRoute && Number(panelRoute.index) !== Number(matchedBest.index)
      ? matchedBest
      : null;
  let other = counter;
  if (!other && matchedBest && list.length > 1) {
    const cand = list
      .filter(function(r) { return r && Number(r.index) !== Number(panelRoute.index); })
      .slice()
      .sort(function(a, b) {
        return Math.abs(crHeroMinutesForRoute(a) - crHeroMinutesForRoute(panelRoute)) -
          Math.abs(crHeroMinutesForRoute(b) - crHeroMinutesForRoute(panelRoute));
      });
    other = cand[0] || null;
  }
  if (!other || Number(other.index) === Number(panelRoute.index)) {
    const engineBest = matchedBest;
    const freeBest = crFindFastestFreeRoute(list);
    if (engineBest && freeBest && Number(engineBest.index) !== Number(freeBest.index)) {
      const tE = crHeroMinutesForRoute(engineBest);
      const tF = crHeroMinutesForRoute(freeBest);
      const cE = crRouteSalikAed(engineBest);
      const save = tF - tE;
      if (cE > 4 && save < 5) {
        out.salikPick = tk("salik_rule_recommend_free");
      } else if (cE > 0 && save >= 8) {
        out.salikPick = tk("salik_rule_recommend_paid");
      } else if (cE > 0) {
        out.salikPick = tk("salik_rule_either");
      }
    }
    return out;
  }

  const pMin = crHeroMinutesForRoute(panelRoute);
  const oMin = crHeroMinutesForRoute(other);
  const pCost = crRouteSalikAed(panelRoute);
  const oCost = crRouteSalikAed(other);
  const dMin = pMin - oMin;
  const dCost = pCost - oCost;

  if (Math.abs(dMin) < 2 && Math.abs(dCost) < 1.5) {
    out.salikLine = tk("salik_compare_same_time_cost");
    out.salikPick = tk("salik_pick_either");
  } else if (dMin <= -3 && dCost > 0.5) {
    out.salikLine = sub(tk("salik_line_faster_costs"), { m: Math.abs(dMin), aed: Math.round(dCost) });
    out.salikPick = tk("salik_pick_time_priority");

/**
 * Premium decision copy: max 2 phrases, outcome-first (existing metrics only).
 * @param {object} route
 * @param {number} [displayNum] — UI route # (1-based), for lead-row treatment
 */
function buildRouteSellingPoints(route, displayNum) {
  if (!route) return [];
  const tk = typeof t === "function" ? t : function(k) { return k; };
  const best = currentDecision && currentDecision.bestRoute;
  const routes = Array.isArray(analyzedRoutes)
    ? analyzedRoutes.filter(function(r) { return r && Number.isFinite(r.index); })
    : [];

  const num =
    Number(displayNum) > 0
      ? Number(displayNum)
      : Number(route.displayIndex) > 0
        ? Number(route.displayIndex)
        : Number(route.index) + 1;

  const rankOf = function(r) {
    return typeof _tz1TrafficRank === "function" ? _tz1TrafficRank(r.traffic) : 2;
  };
  const minOf = function(r) {
    return typeof _tz1Minutes === "function" ? Math.round(_tz1Minutes(r)) : 0;
  };

  let fastest = null;
  let calmest = null;
  if (routes.length) {
    fastest = routes.slice().sort(function(a, b) { return minOf(a) - minOf(b); })[0];
    calmest = routes.slice().sort(function(a, b) {
      const ca = Number.isFinite(a.calmStressScore) ? a.calmStressScore : (Number(a.stressScore) || 999);
      const cb = Number.isFinite(b.calmStressScore) ? b.calmStressScore : (Number(b.stressScore) || 999);
      if (ca !== cb) return ca - cb;
      return minOf(a) - minOf(b);
    })[0];
  }

  const rMin = minOf(route);
  const bMin = best ? minOf(best) : rMin;
  const deltaVsBest = bMin - rMin;
  const rankR = rankOf(route);
  const rankB = best ? rankOf(best) : rankR;
  const isFastest =
    fastest &&
    routes.length >= 1 &&
    Number(fastest.index) === Number(route.index);
  const isCalmest =
    calmest &&
    routes.length >= 1 &&
    Number(calmest.index) === Number(route.index);
  const isAi = best && Number(route.index) === Number(best.index);

  const delayR = Number(route.delayMinutes) || 0;
  const delayB = best ? Number(best.delayMinutes) || 0 : delayR;
  const compR = Number(route.complexity) || 0;
  const compB = best ? Number(best.complexity) || 0 : compR;
  const stressR = Number(route.stressScore);
  const stressB = best ? Number(best.stressScore) : NaN;
  const hwR = Number(route.highwayShare) || 0;
  const hwB = best ? Number(best.highwayShare) || 0 : hwR;
  const noToll = crAltRouteHasNoTolls(route);
  const bestHasToll = best && !crAltRouteHasNoTolls(best);

  const pushPair = function(a, b) {
    const out = [];
    if (a) out.push(a);
    if (b && b !== a) out.push(b);
    return out.slice(0, 2);
  };

  /** #1 in list = headline lane: reads as the default recommendation. */
  if (num === 1) {
    if (isAi) return pushPair(tk("alt_pv_r1_ai_a"), tk("alt_pv_r1_ai_b"));
    if (isFastest) return pushPair(tk("alt_pv_r1_fast_a"), tk("alt_pv_r1_fast_b"));
    if (isCalmest) return pushPair(tk("alt_pv_r1_calm_a"), tk("alt_pv_r1_calm_b"));
    if (noToll && bestHasToll) return pushPair(tk("alt_pv_r1_cash_a"), tk("alt_pv_r1_cash_b"));
    if (rankR === 1 && rankB > 1) {
      return pushPair(tk("alt_pv_r1_clear_a"), tk("alt_pv_r1_clear_b"));
    }
    if (deltaVsBest >= 1) {
      return pushPair(
        tk("alt_pv_save_a").replace(/\{n\}/g, String(Math.max(1, deltaVsBest))),
        tk("alt_pv_save_b_clear")
      );
    }
    return pushPair(tk("alt_pv_r1_default_a"), tk("alt_pv_r1_default_b"));
  }

  if (isAi) return pushPair(tk("alt_pv_ai_alt_a"), tk("alt_pv_ai_alt_b"));

  if (isFastest) {
    return pushPair(
      tk("alt_pv_fast_a"),
      hwR >= 0.42 ? tk("alt_pv_fast_hwy_b") : tk("alt_pv_fast_b")
    );
  }

  if (isCalmest) return pushPair(tk("alt_pv_calm_a"), tk("alt_pv_calm_b"));

  if (deltaVsBest >= 1) {
    return pushPair(
      tk("alt_pv_save_a").replace(/\{n\}/g, String(Math.max(1, deltaVsBest))),
      rankR < rankB ? tk("alt_pv_save_b_spike") : tk("alt_pv_save_b_run")
    );
  }

  if (noToll && bestHasToll) {
    const add = Math.max(1, Math.abs(deltaVsBest));
    return pushPair(
      tk("alt_pv_toll_a"),
      deltaVsBest <= -1
        ? tk("alt_pv_toll_b_long").replace(/\{n\}/g, String(add))
        : tk("alt_pv_toll_b_same")
    );
  }

  if (rankR < rankB || (rankR === 1 && rankB > 1)) {
    return pushPair(tk("alt_pv_spike_a"), tk("alt_pv_spike_b"));
  }

  if (delayR + 2 <= delayB && delayB > 2) {
    return pushPair(tk("alt_pv_jam_a"), tk("alt_pv_jam_b"));
  }

  if (compR + 2 <= compB && compR <= 10) {
    return pushPair(tk("alt_pv_turns_easy_a"), tk("alt_pv_turns_easy_b"));
  }

  if (Number.isFinite(stressR) && Number.isFinite(stressB) && stressR < stressB - 1) {
    return pushPair(tk("alt_pv_calm_a"), tk("alt_pv_stress_b"));
  }

  if (hwR >= hwB + 0.12 && hwR >= 0.4) {
    return pushPair(tk("alt_pv_hwy_a"), tk("alt_pv_hwy_b"));
  }

  if (best && compR >= compB + 4 && compR >= 12) {
    return pushPair(tk("alt_pv_turns_hard_a"), tk("alt_pv_turns_hard_b"));
  }

  if (deltaVsBest <= -2 && noToll) {
    return pushPair(
      tk("alt_pv_budget_a"),
      tk("alt_pv_budget_b").replace(/\{n\}/g, String(Math.max(1, Math.abs(deltaVsBest))))
    );
  }

  return pushPair(tk("alt_pv_alt_a"), tk("alt_pv_alt_b"));
}
