<script id="cr-tz1-directions-route-extract">
// ТЗ-2 [v11] — якорь «ТЗ-1 — ROUTE DATA EXTRACTION» (монолит).
// Порядок: первый внешний <script> после основного inline <\/script> — до cr-tz1-route-metrics-traffic.js
// (extractRoutesFromDirectionsResult → normalizeRoute в main; UI и скоринг не меняют контракт).
// Зависимостей от main нет.

// ============================================================
//  ТЗ-1 — ROUTE DATA EXTRACTION
//  Goal: extract 2–3 Google Directions alternatives into a stable
//  Route[] structure without changing UI or later scoring logic.
// ============================================================
function tz1SafeValue(obj, fallback = 0) {
  if (!obj) return fallback;
  if (Number.isFinite(obj.value)) return obj.value;
  if (typeof obj.value === "number") return obj.value;
  return fallback;
}

function tz1SafeText(obj, fallback = "") {
  if (!obj) return fallback;
  if (typeof obj.text === "string") return obj.text;
  return fallback;
}

function extractStepData(step, stepIndex) {
  const distanceValue = tz1SafeValue(step && step.distance, 0);
  const durationValue = tz1SafeValue(step && step.duration, 0);

  return {
    index: stepIndex,
    distance: distanceValue,
    distanceText: tz1SafeText(step && step.distance, ""),
    duration: durationValue,
    durationText: tz1SafeText(step && step.duration, ""),
    htmlInstructions: (step && step.html_instructions) || "",
    maneuver: (step && step.maneuver) || "",
    travelMode: (step && step.travel_mode) || "DRIVING",
    startLocation: step && step.start_location ? {
      lat: typeof step.start_location.lat === "function" ? step.start_location.lat() : null,
      lng: typeof step.start_location.lng === "function" ? step.start_location.lng() : null
    } : null,
    endLocation: step && step.end_location ? {
      lat: typeof step.end_location.lat === "function" ? step.end_location.lat() : null,
      lng: typeof step.end_location.lng === "function" ? step.end_location.lng() : null
    } : null,
    rawStep: step || null
  };
}

function extractLegData(leg, legIndex) {
  const steps = Array.isArray(leg && leg.steps) ? leg.steps.map(extractStepData) : [];
  const duration = tz1SafeValue(leg && leg.duration, 0);
  const durationInTraffic = tz1SafeValue(leg && leg.duration_in_traffic, duration);
  const distance = tz1SafeValue(leg && leg.distance, 0);

  return {
    index: legIndex,
    duration,
    durationText: tz1SafeText(leg && leg.duration, ""),
    duration_in_traffic: durationInTraffic,
    durationInTraffic,
    durationInTrafficText: tz1SafeText(leg && leg.duration_in_traffic, tz1SafeText(leg && leg.duration, "")),
    distance,
    distanceText: tz1SafeText(leg && leg.distance, ""),
    startAddress: (leg && leg.start_address) || "",
    endAddress: (leg && leg.end_address) || "",
    steps,
    rawLeg: leg || null
  };
}

function extractRouteData(route, index) {
  const legs = Array.isArray(route && route.legs) ? route.legs.map(extractLegData) : [];
  const primaryLeg = legs[0] || null;
  const allSteps = legs.flatMap(leg => leg.steps || []);
  const routeId = `route-${index + 1}`;

  return {
    id: routeId,
    index,
    displayIndex: index + 1,
    summary: (route && route.summary) || `Route ${index + 1}`,
    duration: primaryLeg ? primaryLeg.duration : 0,
    duration_in_traffic: primaryLeg ? primaryLeg.duration_in_traffic : 0,
    distance: primaryLeg ? primaryLeg.distance : 0,
    legs,
    steps: allSteps,
    rawLeg: route && route.legs && route.legs[0] ? route.legs[0] : null,
    rawRoute: route || null,
    route: route || null
  };
}

function extractRoutesFromDirectionsResult(result) {
  const rawRoutes = result && Array.isArray(result.routes) ? result.routes : [];
  return rawRoutes.slice(0, 3).map(extractRouteData);
}

function validateExtractedRoutes(routes) {
  if (!Array.isArray(routes) || routes.length === 0) {
    return { ok: false, message: "No routes extracted from Directions result" };
  }

  const invalid = routes.find(route =>
    !route ||
    !route.id ||
    !Number.isFinite(route.duration) ||
    !Number.isFinite(route.duration_in_traffic) ||
    !Number.isFinite(route.distance) ||
    !Array.isArray(route.legs) ||
    !Array.isArray(route.steps)
  );

  if (invalid) {
    return { ok: false, message: `Invalid route data: ${invalid.id || "unknown route"}` };
  }

  return { ok: true, message: routes.length >= 2 ? "OK" : "Only one route returned by API" };
}

</script>

<script id="cr-tz1-route-metrics-traffic">
// ТЗ-2 [v12] — якорь «HELPERS» + «ROUTE METRICS» (монолит).
// Порядок: внешний <script> после cr-tz1-directions-route-extract.js — до cr-tz1-route-role-segments.js
// (calculateRouteMetrics / trafficRank / stepLooksLikeHighway вызываются из main после полной загрузки страницы).
// Зависимости от main: глобальные function t(…) (i18n) и function stripHtml(…) — объявлены в основном inline <script> раньше по выполнению.

// ============================================================
//  HELPERS
// ============================================================

function normalizeRoadText(step, route) {
  const summary = (route.summary || "");
  const html = stripHtml(step.html_instructions || "");
  return `${summary} ${html}`.toUpperCase();
}

function stepLooksLikeHighway(step, route) {
  const text = normalizeRoadText(step, route);
  return (
    /\bE11\b/.test(text) ||
    /\bE311\b/.test(text) ||
    /\bE611\b/.test(text) ||
    text.includes("SHEIKH") ||
    text.includes("HIGHWAY") ||
    text.includes("EXPRESSWAY")
  );
}

function getTrafficLevel(base, traffic) {
  if (!traffic || !base || traffic <= base) return "low";
  const ratio = (traffic - base) / base;
  if (ratio <= 0.05) return "low";
  if (ratio <= 0.15) return "medium";
  return "high";
}

function trafficRank(level) {
  if (level === "low") return 1;
  if (level === "medium") return 2;
  return 3;
}

function getTrafficText(traffic) {
  if (traffic === "low") return t("traf_stable");
  if (traffic === "medium") return t("traf_moderate");
  return t("traf_heavy");
}

function toTitleCaseLabel(value) {
  if (!value) return "";
  return value.charAt(0).toUpperCase() + value.slice(1);
}

function getStabilityLabel(stabilityScore) {
  if (stabilityScore >= 70) return t("stab_very");
  if (stabilityScore >= 50) return t("stab_stable");
  if (stabilityScore >= 30) return t("stab_moderate");
  return t("stab_unpred");
}

function isMeaningfulManeuver(step, route) {
  if (!step) return false;
  const html = stripHtml(step.html_instructions || "").toLowerCase();
  const maneuver = (step.maneuver || "").toLowerCase();
  const strong = ["turn-left", "turn-right", "uturn-left", "uturn-right", "roundabout"];
  if (strong.some(m => maneuver.includes(m))) return true;
  if (
    html.includes("exit") ||
    html.includes("keep right") ||
    html.includes("keep left") ||
    html.includes("ramp") ||
    html.includes("merge")
  ) return true;
  if (html.includes("continue") || html.includes("slight")) return false;
  return false;
}

function countComplexity(leg, route) {
  return leg.steps.filter(s => isMeaningfulManeuver(s, route)).length;
}

function calculateHighwayShare(leg, route) {
  const total = leg.distance?.value || 0;
  if (!total) return 0;
  let hwDistance = 0;
  leg.steps.forEach(step => {
    if (stepLooksLikeHighway(step, route)) {
      hwDistance += step.distance?.value || 0;
    }
  });
  return hwDistance / total;
}

function getDisplayMinutes(route) {
  return Math.round(route.time / 60);
}

function getDisplayDiff(routeA, routeB) {
  return getDisplayMinutes(routeA) - getDisplayMinutes(routeB);
}

function getRouteSummaryName(route) {
  const summary = route.route.summary || "";
  if (summary.includes("E311")) return "E311";
  if (summary.includes("E11")) return "E11";
  if (summary.includes("E611")) return "E611";
  if (summary.includes("Sheikh Zayed")) return "Sheikh Zayed Rd";
  return summary.split("/")[0].trim() || `Route ${route.displayIndex}`;
}

// ============================================================
//  ROUTE METRICS
// ============================================================

function calculateRouteMetrics(route, leg, rawRoute) {
  const baseTime = leg.duration.value;
  const time = leg.duration_in_traffic?.value || baseTime;
  const distance = leg.distance.value;
  const delaySeconds = Math.max(0, time - baseTime);
  const delayMinutes = Math.round(delaySeconds / 60);
  const complexity = countComplexity(leg, rawRoute);
  const highwayShare = calculateHighwayShare(leg, rawRoute);
  const traffic = getTrafficLevel(baseTime, time);

  // ТЗ3 ЭТАП 1: Salik toll data
  const tollCount = Math.floor(highwayShare * 3); // rough estimate based on highway usage
  const tollCost = tollCount * 4; // 4 AED per Salik gate
  const hasToll = tollCost > 0;

  return {
    time,
    baseTime,
    distance,
    delaySeconds,
    delayMinutes,
    complexity,
    highwayShare,
    traffic,
    highway: highwayShare >= 0.35,
    tollCount,
    tollCost,
    hasToll
  };
}

function calculateDriveStress(route) {
  let stress = 0;

  stress += (route.complexity || 0) * 0.55;
  stress += (route.delayMinutes || 0) * 0.9;
  stress += route.traffic === "high" ? 5 : route.traffic === "medium" ? 2 : 0;
  stress += route.highway ? 0 : 1.5;

  if ((route.highwayShare || 0) < 0.25) stress += 1.5;
  if ((route.complexity || 0) >= 12) stress += 2;
  if ((route.delayMinutes || 0) >= 6) stress += 2;

  return Math.round(stress * 10) / 10;
}

function getDrivePersonality(route) {
  const stress = route.stressScore || 0;
  const turns = route.complexity || 0;
  const delay = route.delayMinutes || 0;
  const highwayShare = route.highwayShare || 0;

  if (stress <= 6 && highwayShare >= 0.5 && turns <= 8) {
    return t("stress_smooth");
  }

  if (stress <= 9 && delay <= 3) {
    return t("stress_steady");
  }

  if (stress <= 12) {
    return t("stress_active");
  }

  if (turns >= 12 || delay >= 6) {
    return t("stress_stressful");
  }

  return t("stress_busy");
}

function getStressBadge(stressScore) {
  if (stressScore <= 6) {
    return { label: "Low stress", tone: "low" };
  }
  if (stressScore <= 10) {
    return { label: "Medium stress", tone: "medium" };
  }
  return { label: "High stress", tone: "high" };
}

</script>

<script id="cr-tz1-route-role-segments">
// ТЗ-2 [v13] — якорь «ROUTE ROLE CLASSIFICATION» + «ROUTE SEGMENTS» (монолит).
// Порядок: внешний <script> после cr-tz1-route-metrics-traffic.js — до cr-tz1-drive-gps-warnings.js
// (getDisplayDiff, trafficRank, stepLooksLikeHighway, isMeaningfulManeuver — из cr-tz1-route-metrics-traffic.js).
// Зависимостей от main нет (чистые функции над объектами маршрута).

// ============================================================
//  ROUTE ROLE CLASSIFICATION
// ============================================================

function getRouteRole(r, bestRoute, fastestRoute, allRoutes) {
  if (r.index === bestRoute.index) return "recommended";

  const diffFromBest = getDisplayDiff(r, bestRoute);
  const isFaster = diffFromBest < 0;
  const isSlower = diffFromBest > 0;

  const hasMoreTraffic = trafficRank(r.traffic) > trafficRank(bestRoute.traffic);
  const hasMoreDelay = r.delayMinutes > bestRoute.delayMinutes + 2;
  const isRiskier = hasMoreTraffic || hasMoreDelay;

  const fewerTurns = r.complexity < bestRoute.complexity - 1;
  const lighterTraffic = trafficRank(r.traffic) < trafficRank(bestRoute.traffic);
  const isMoreRelaxed = fewerTurns || lighterTraffic;

  const timeSimilar = Math.abs(diffFromBest) <= 1;
  const complexitySimilar = Math.abs(r.complexity - bestRoute.complexity) <= 2;
  const trafficSimilar = trafficRank(r.traffic) === trafficRank(bestRoute.traffic);
  const isSimilar = timeSimilar && complexitySimilar && trafficSimilar;

  if (isFaster && isRiskier) return "faster_risky";
  if (isSlower && isMoreRelaxed) return "more_relaxed";
  if (isSimilar) return "similar";
  return "balanced";
}

// ============================================================
//  DECISION LOGIC — SELECT RECOMMENDED ROUTE
// ============================================================

// ── Confidence helper: practical, decision-aligned (matches selectBestRoute logic) ──
// HIGH   = obvious human choice (free vs slightly faster paid, lower traffic, lower delay, or dominant)
// MEDIUM = real trade-off (faster alt exists but worse on cost/stability)
// LOW    = routes are genuinely interchangeable on all dimensions

// ============================================================
//  ROUTE SEGMENTS (for Route Details modal)
// ============================================================

function buildRouteSegments(r) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const segments = [];

  let currentSegment = null;
  let segmentSteps = [];

  steps.forEach((step, i) => {
    const isHw = stepLooksLikeHighway(step, r.route);
    const isMeaningful = isMeaningfulManeuver(step, r.route);

    let type = isHw ? "highway" : "city";

    if (!isHw && isMeaningful) {
      const nearbyManeuvers = steps.slice(Math.max(0, i - 2), i + 3)
        .filter(s => isMeaningfulManeuver(s, r.route)).length;
      if (nearbyManeuvers >= 3) type = "turns";
    }

    if (!currentSegment || currentSegment.type !== type) {
      if (currentSegment && segmentSteps.length > 0) {
        currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
        currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
        segments.push(currentSegment);
      }
      currentSegment = { type, steps: [] };
      segmentSteps = [];
    }

    segmentSteps.push(step);
    currentSegment.steps = segmentSteps;
  });

  if (currentSegment && segmentSteps.length > 0) {
    currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
    currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
    segments.push(currentSegment);
  }

  const mergedSegments = [];
  segments.forEach(seg => {
    if (seg.distance < 500 && mergedSegments.length > 0) {
      const prev = mergedSegments[mergedSegments.length - 1];
      prev.distance += seg.distance;
      prev.duration += seg.duration;
    } else {
      mergedSegments.push(seg);
    }
  });

  if (r.delayMinutes > 3 && mergedSegments.length > 0) {
    const citySegment = mergedSegments.find(s => s.type === "city");
    if (citySegment) citySegment.type = "traffic";
  }

  return mergedSegments.map(seg => {
    const km = (seg.distance / 1000).toFixed(1);
    const mins = Math.round(seg.duration / 60);
    const labels = {
      highway: { icon: "&#128739;", title: "Highway section", note: "stable flow" },
      city: { icon: "&#127961;", title: "City driving", note: "urban roads" },
      traffic: { icon: "&#128679;", title: "Congested area", note: "expect delays" },
      turns: { icon: "&#128260;", title: "Complex section", note: "multiple turns" }
    };
    const label = labels[seg.type] || labels.city;
    return {
      type: seg.type,
      icon: label.icon,
      title: label.title,
      details: `${km} km · ~${mins} min · ${label.note}`,
      distance: seg.distance,
      duration: seg.duration
    };
  });
}

</script>

<script id="cr-tz1-drive-gps-warnings">
// ТЗ-2 [v14] — якорь «DRIVE MODE» + «GPS / LIVE POSITION» + предупреждения шагов (монолит).
// Порядок: внешний <script> после cr-tz1-route-role-segments.js — до cr-tz1-drive-voice-timed-warnings.js
// Зависимости: cr-tz1-route-metrics-traffic.js — getTrafficText, stripHtml, normalizeRoadText, getRouteSummaryName, stepLooksLikeHighway;
// основной script — lastKnownUserLatLng, lastRouteDistanceMeters, lastGpsAccuracyMeters, lastGpsStatusText, currentStepIndex,
// DRIVE_GPS_MAX_ACCURACY_M, DRIVE_OFF_ROUTE_GRACE_MS, DRIVE_OFF_ROUTE_REROUTE_COOLDOWN_MS, offRouteSince, lastOffRouteRecalcAt,
// offRouteRecalcInProgress, isUserOffRoute(…); google.maps.geometry после загрузки Maps.

function getWarningPhaseForType(distanceMeters, type = "") {
  if (distanceMeters == null || !isFinite(distanceMeters)) return "none";
  const meters = Math.max(0, Number(distanceMeters));
  const t = String(type || "").toLowerCase();
  const isExitLike = ["exit", "ramp", "fork"].includes(t);
  const isLaneLike = ["lane", "merge"].includes(t);
  const isUTurn = t === "uturn";

  if (isExitLike) {
    if (meters <= 180) return "now";
    if (meters <= 700) return "soon";
    if (meters <= 1400) return "prepare";
    return "none";
  }
  if (isLaneLike) {
    if (meters <= 140) return "now";
    if (meters <= 520) return "soon";
    if (meters <= 1100) return "prepare";
    return "none";
  }
  if (isUTurn) {
    if (meters <= 120) return "now";
    if (meters <= 450) return "soon";
    if (meters <= 900) return "prepare";
    return "none";
  }
  if (meters <= 100) return "now";
  if (meters <= 350) return "soon";
  if (meters <= 800) return "prepare";
  return "none";
}

// ============================================================
//  DRIVE MODE
// ============================================================

function buildDriveViewModel(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const currentStep = steps[stepIndex] || steps[0];

  const liveMeters = getLiveRemainingMeters(r, stepIndex, lastKnownUserLatLng);
  const liveSeconds = getLiveRemainingSeconds(r, stepIndex, lastKnownUserLatLng);

  let remainingDistance = Number.isFinite(liveMeters) ? liveMeters : 0;
  let remainingTime = Number.isFinite(liveSeconds) ? liveSeconds : 0;

  if (!Number.isFinite(liveMeters) || !Number.isFinite(liveSeconds)) {
    for (let i = stepIndex; i < steps.length; i++) {
      remainingDistance += steps[i].distance?.value || 0;
      remainingTime += steps[i].duration?.value || 0;
    }
  }

  lastRouteDistanceMeters = remainingDistance;

  return {
    eta: Math.max(1, Math.round(remainingTime / 60)),
    distance: (remainingDistance / 1000).toFixed(1),
    traffic: r.traffic,
    trafficText: getTrafficText(r.traffic),
    instruction: stripHtml(currentStep?.html_instructions || "Follow the route"),
    instructionDistance: currentStep?.distance?.text || "",
    maneuver: currentStep?.maneuver || "",
    stepIndex,
    totalSteps: steps.length
  };
}


// ============================================================
//  ТЗ5 — GPS / LIVE POSITION BINDING HELPERS
//  Real GPS position drives marker, remaining distance, next action,
//  off-route detection and soft reroute. No UI/CSS redesign.
// ============================================================
function isDriveGpsUsable(pos) {
  if (!pos || !pos.coords) return false;
  const acc = Number(pos.coords.accuracy);
  lastGpsAccuracyMeters = Number.isFinite(acc) ? acc : null;
  if (!Number.isFinite(acc)) return true;
  return acc <= DRIVE_GPS_MAX_ACCURACY_M;
}

function formatGpsAccuracy() {
  if (!Number.isFinite(lastGpsAccuracyMeters)) return "";
  return " · ±" + Math.round(lastGpsAccuracyMeters) + "m";
}

function getLiveRemainingMeters(routeObj, stepIndex, userLatLng) {
  const steps = routeObj?.route?.legs?.[0]?.steps || [];
  if (!steps.length) return null;

  const safeIndex = Math.min(Math.max(0, stepIndex || 0), steps.length - 1);
  let meters = 0;

  if (userLatLng) {
    const currentEnd = getDistanceToStepEndMeters(steps[safeIndex], userLatLng);
    meters += Number.isFinite(currentEnd) ? Math.max(0, currentEnd) : (steps[safeIndex]?.distance?.value || 0);
  } else {
    meters += steps[safeIndex]?.distance?.value || 0;
  }

  for (let i = safeIndex + 1; i < steps.length; i++) {
    meters += steps[i]?.distance?.value || 0;
  }

  return meters;
}

function getLiveRemainingSeconds(routeObj, stepIndex, userLatLng) {
  const steps = routeObj?.route?.legs?.[0]?.steps || [];
  if (!steps.length) return null;

  const safeIndex = Math.min(Math.max(0, stepIndex || 0), steps.length - 1);
  let seconds = 0;
  const step = steps[safeIndex];

  const stepDistance = step?.distance?.value || 0;
  const stepDuration = step?.duration?.value || 0;

  if (userLatLng && stepDistance > 0 && stepDuration > 0) {
    const currentEnd = getDistanceToStepEndMeters(step, userLatLng);
    const ratio = Number.isFinite(currentEnd)
      ? Math.min(1, Math.max(0.05, currentEnd / stepDistance))
      : 1;
    seconds += stepDuration * ratio;
  } else {
    seconds += stepDuration;
  }

  for (let i = safeIndex + 1; i < steps.length; i++) {
    seconds += steps[i]?.duration?.value || 0;
  }

  return seconds;
}

function buildDriveGpsStatus(routeObj, vm) {
  const base = lastKnownUserLatLng ? "GPS live" : "Waiting for GPS";
  const step = routeObj && vm ? " · Step " + (currentStepIndex + 1) + "/" + vm.totalSteps : "";
  const distance = Number.isFinite(lastRouteDistanceMeters) ? " · " + (lastRouteDistanceMeters / 1000).toFixed(1) + " km left" : "";
  return base + step + distance + formatGpsAccuracy();
}

function updateDriveGpsStatus(routeObj, vm, overrideText) {
  const st = document.getElementById("drive-status");
  if (!st) return;
  lastGpsStatusText = overrideText || buildDriveGpsStatus(routeObj, vm);
  st.textContent = lastGpsStatusText;
}

function shouldTriggerSoftOffRouteReroute(userLatLng, routeObj) {
  if (!userLatLng || !routeObj) return false;
  if (Number.isFinite(lastGpsAccuracyMeters) && lastGpsAccuracyMeters > DRIVE_GPS_MAX_ACCURACY_M) return false;
  if (!isUserOffRoute(userLatLng, routeObj)) {
    offRouteSince = 0;
    return false;
  }

  if (!offRouteSince) offRouteSince = Date.now();

  const now = Date.now();
  if (now - offRouteSince < DRIVE_OFF_ROUTE_GRACE_MS) return false;
  if (now - lastOffRouteRecalcAt < DRIVE_OFF_ROUTE_REROUTE_COOLDOWN_MS) return false;
  if (offRouteRecalcInProgress) return false;

  lastOffRouteRecalcAt = now;
  return true;
}


function getStepWarningMeta(step, route) {
  const html = stripHtml(step?.html_instructions || "");
  const text = html.toLowerCase();
  const maneuver = (step?.maneuver || "").toLowerCase();
  const roadText = normalizeRoadText(step, route);

  const roadMatch =
  roadText.match(/\bE311\b/) ||
  roadText.match(/\bE11\b/) ||
  roadText.match(/\bE611\b/) ||
  roadText.match(/\bE66\b/) ||
  roadText.match(/\bE44\b/) ||
  roadText.match(/\bD\d+\b/);
  const roadName = roadMatch ? roadMatch[0] : getRouteSummaryName({ route });

  // Enhanced lane hints
  const laneHint = extractLaneHint(text);

  if (maneuver.includes("uturn") || text.includes("u-turn"))
    return { type: "uturn", icon: "↩", shortText: "U-turn ahead", longText: "Prepare for U-turn ahead", laneHint };
  if (text.includes("fork right") || maneuver.includes("fork-right"))
    return { type: "fork", icon: "⤴", shortText: `Fork right to ${roadName}`, longText: `Take the right fork toward ${roadName}`, laneHint: laneHint || "Use right lanes" };
  if (text.includes("fork left") || maneuver.includes("fork-left"))
    return { type: "fork", icon: "⤳", shortText: `Fork left to ${roadName}`, longText: `Take the left fork toward ${roadName}`, laneHint: laneHint || "Use left lanes" };
  if (text.includes("fork") || maneuver.includes("fork"))
    return { type: "fork", icon: "⤴", shortText: `Fork ahead to ${roadName}`, longText: `Prepare for fork toward ${roadName}`, laneHint: laneHint || "Choose lane early" };
  if (text.includes("keep right")) return { type: "lane",  icon: "↗", shortText: `Keep right for ${roadName}`,  longText: `Keep right ahead for exit toward ${roadName}`, laneHint: laneHint || "Use right lanes" };
  if (text.includes("keep left"))  return { type: "lane",  icon: "↖", shortText: `Keep left for ${roadName}`,   longText: `Keep left ahead toward ${roadName}`, laneHint: laneHint || "Use left lanes" };
  if (text.includes("exit"))       return { type: "exit",  icon: "⇢", shortText: `Exit ahead to ${roadName}`,   longText: `Prepare for exit toward ${roadName}`, laneHint: laneHint || "Move to exit lane" };
  if (text.includes("ramp"))       return { type: "ramp",  icon: "⇗", shortText: `Ramp ahead to ${roadName}`,   longText: `Take the ramp ahead toward ${roadName}`, laneHint: laneHint || "Use right lane" };
  if (text.includes("merge"))      return { type: "merge", icon: "⇄", shortText: `Merge ahead`,                 longText: `Merge carefully ahead`, laneHint: "Watch for merging traffic" };
  return null;
}

function extractLaneHint(text) {
  // Try to extract lane info from instruction text
  if (text.includes("3 left lanes") || text.includes("three left"))   return "Use 3 left lanes";
  if (text.includes("3 right lanes") || text.includes("three right")) return "Use 3 right lanes";
  if (text.includes("2 left lanes") || text.includes("two left"))     return "Use 2 left lanes";
  if (text.includes("2 right lanes") || text.includes("two right"))   return "Use 2 right lanes";
  if (text.includes("leftmost lane"))    return "Use leftmost lane";
  if (text.includes("rightmost lane"))   return "Use rightmost lane";
  if (text.includes("left lane"))        return "Use left lane";
  if (text.includes("right lane"))       return "Use right lane";
  if (text.includes("middle lane") || text.includes("center lane"))  return "Stay in middle lanes";
  if (text.includes("any lane"))         return "Any lane";
  if (text.includes("stay in lane"))     return "Stay in lane";
  return null;
}

function isComplexInterchangeAhead(steps, currentStepIndex, route, userLatLng = lastKnownUserLatLng) {
  if (!Array.isArray(steps) || !steps.length) return false;

  const startIndex = Math.max(0, currentStepIndex || 0);
  let accumulatedMeters = 0;
  let actionCount = 0;
  let exitLikeCount = 0;
  let mergeLikeCount = 0;
  let highwayActionCount = 0;

  for (let i = startIndex; i < Math.min(steps.length, startIndex + 7); i++) {
    const step = steps[i];
    if (!step) continue;

    const stepMeters = i === startIndex
      ? (getDistanceToStepEndMeters(step, userLatLng) ?? (step.distance?.value || 0))
      : (step.distance?.value || 0);

    accumulatedMeters += Math.max(0, stepMeters || 0);
    if (accumulatedMeters > 2400) break;

    const meta = getStepWarningMeta(step, route);
    if (!meta) continue;

    if (["exit", "ramp", "fork", "lane", "merge"].includes(meta.type)) {
      actionCount++;
      if (["exit", "ramp", "fork"].includes(meta.type)) exitLikeCount++;
      if (["merge", "lane"].includes(meta.type)) mergeLikeCount++;
      if (stepLooksLikeHighway(step, route)) highwayActionCount++;
    }
  }

  // UAE reality: several exit/ramp/fork/merge actions close together usually means
  // a complex interchange where the driver needs lane focus before the actual exit.
  return exitLikeCount >= 2 || (actionCount >= 3 && mergeLikeCount >= 1) || (actionCount >= 2 && highwayActionCount >= 2);
}

function showInterchangeWarning() {
  const interchangeWarn = document.getElementById("drive-interchange-warn");
  if (interchangeWarn) {
    interchangeWarn.classList.add("visible");
  }
}

function getDrivePriorityWarning(r, stepIndex, userLatLng) {
  const steps = r.route.legs[0].steps;
  const ulng = userLatLng || lastKnownUserLatLng;
  const currentStep = steps[stepIndex];

  if (!currentStep) return null;

  const phaseRank    = { now: 3, soon: 2, prepare: 1, none: 0 };
  const typePriority = { exit: 5, ramp: 5, lane: 4, merge: 3, uturn: 2, interchange: 1 };

  // 1. Current step wins if already active
  const currentMeta = getStepWarningMeta(currentStep, r.route);
  if (currentMeta) {
    const currentDist  = getDistanceToStepEndMeters(currentStep, ulng);
    const currentPhase = getWarningPhaseForType(currentDist, currentMeta.type || "");
    if (currentPhase !== "none") {
      return currentMeta;
    }
  }

  // 2. Upcoming steps — score all candidates, pick best
  const candidates = [];

  for (let i = stepIndex + 1; i < Math.min(steps.length, stepIndex + 5); i++) {
    const step = steps[i];
    const meta = getStepWarningMeta(step, r.route);
    if (!meta) continue;

    // Effective distance = remaining current step + full intermediate steps + approach to target
    let effectiveMeters = getDistanceToStepEndMeters(currentStep, ulng) ?? 0;
    for (let j = stepIndex + 1; j < i; j++) {
      effectiveMeters += steps[j]?.distance?.value || 0;
    }
    effectiveMeters += Math.min(step.distance?.value || 0, 180);

    const phase = getWarningPhaseForType(effectiveMeters, meta.type || "");
    if (phase === "none") continue;

    candidates.push({
      meta,
      type:           meta.type,
      phase,
      effectiveMeters,
      typeScore:  typePriority[meta.type] || 0,
      phaseScore: phaseRank[phase]        || 0
    });
  }

  if (candidates.length > 0) {
    candidates.sort((a, b) => {
      if (b.typeScore  !== a.typeScore)  return b.typeScore  - a.typeScore;
      if (b.phaseScore !== a.phaseScore) return b.phaseScore - a.phaseScore;
      return a.effectiveMeters - b.effectiveMeters;
    });
    return candidates[0].meta;
  }

  // 3. Fallback advisory only if nothing more concrete exists
  if (isComplexInterchangeAhead(steps, stepIndex, r.route)) {
    return {
      type:      "interchange",
      icon:      "⚠",
      shortText: "Complex interchange ahead",
      longText:  "Complex interchange ahead — stay focused for lane choice"
    };
  }

  return null;
}

function parseStepDistanceMeters(step) {
  if (!step?.distance?.value) return null;
  return step.distance.value;
}

function getDistanceToStepEndMeters(step, userLatLng) {
  if (!step?.end_location || !userLatLng) return parseStepDistanceMeters(step);
  return google.maps.geometry.spherical.computeDistanceBetween(
    userLatLng,
    step.end_location
  );
}

function getEffectiveDistanceToStepMeters(steps, currentIndex, targetIndex, userLatLng) {
  if (!steps?.[targetIndex]) return null;
  if (targetIndex === currentIndex) return getDistanceToStepEndMeters(steps[currentIndex], userLatLng);
  let meters = getDistanceToStepEndMeters(steps[currentIndex], userLatLng);
  if (meters == null) meters = steps[currentIndex]?.distance?.value || 0;
  for (let i = currentIndex + 1; i < targetIndex; i++) meters += steps[i]?.distance?.value || 0;
  meters += Math.min(steps[targetIndex]?.distance?.value || 0, 120);
  return meters;
}

</script>

<script id="cr-tz1-drive-voice-timed-warnings">
// ТЗ-2 [v15] — якорь «timed warnings» + контекстный голос драйва (монолит).
// Порядок: внешний <script> после cr-tz1-drive-gps-warnings.js — до cr-tz1-drive-lane-timed-hud.js
// Зависимости: cr-tz1-drive-gps-warnings.js — getDistanceToStepEndMeters, getWarningPhaseForType;
// основной script — currentLang, t, stripHtml, voiceEnabled, lastSpokenAt, lastSpokenText, buildNativeUtterance.

function getWarningPhase(distanceMeters) {
  return getWarningPhaseForType(distanceMeters, "");
}

function buildTimedWarning(priorityWarning, step, userLatLng, effectiveMeters = null) {
  if (!priorityWarning || !step) return null;

  const meters = Number.isFinite(effectiveMeters) ? effectiveMeters : getDistanceToStepEndMeters(step, userLatLng);
  const phase = getWarningPhaseForType(meters, priorityWarning.type);

  if (phase === "none") return null;

  let distanceText = "Ahead";
  if (meters != null) {
    if (meters <= 60) {
      distanceText = "Now";
    } else if (meters < 1000) {
      distanceText = `${Math.round(meters / 10) * 10} m`;
    } else {
      distanceText = `${(meters / 1000).toFixed(1)} km`;
    }
  }

  let shortText = priorityWarning.shortText;

  if (phase === "prepare") {
    if (priorityWarning.type === "exit" || priorityWarning.type === "ramp") {
      shortText = `Prepare: ${priorityWarning.shortText}`;
    } else if (priorityWarning.type === "lane" || priorityWarning.type === "merge") {
      shortText = `Lane: ${priorityWarning.shortText}`;
    } else if (priorityWarning.type === "uturn") {
      shortText = `Prepare: ${priorityWarning.shortText}`;
    }
  }

  if (phase === "now") {
    if (priorityWarning.type === "exit")  shortText = "Take the exit now";
    if (priorityWarning.type === "ramp")  shortText = "Take the ramp now";
    if (priorityWarning.type === "lane")  shortText = priorityWarning.shortText.replace("ahead", "now");
    if (priorityWarning.type === "merge") shortText = "Merge now";
    if (priorityWarning.type === "uturn") shortText = "Make a U-turn now";
  }

  return {
    ...priorityWarning,
    phase,
    shortText,
    distanceText
  };
}

function normalizeVoiceText(text) {
  let value = String(text || "");
  const roadNames = {
    en: { E311:"E three one one", E611:"E six one one", E11:"E eleven" },
    ru: { E311:"Е три один один", E611:"Е шесть один один", E11:"Е одиннадцать" },
    ua: { E311:"Е три один один", E611:"Е шість один один", E11:"Е одинадцять" },
    ar: { E311:"إي ثلاثة واحد واحد", E611:"إي ستة واحد واحد", E11:"إي أحد عشر" }
  };
  const names = roadNames[currentLang] || roadNames.en;
  return value
    .replace(/\bE311\b/g, names.E311)
    .replace(/\bE611\b/g, names.E611)
    .replace(/\bE11\b/g, names.E11)
    .replace(/\s*[·•]\s*/g, ", ")
    .replace(/\s*→\s*/g, ", ")
    .replace(/\s+/g, " ")
    .trim();
}


function getVoicePromptFromTimedWarning(timedWarning) {
  if (!timedWarning) return "";
  if (timedWarning.phase === "prepare") return timedWarning.shortText.replace(/^Prepare:\s*/i, "Prepare to ");
  if (timedWarning.phase === "soon")    return timedWarning.shortText;
  if (timedWarning.phase === "now")     return timedWarning.shortText.replace(/^NOW:\s*/i, "Now ");
  return timedWarning.shortText || "";
}

function buildContextAwareVoicePrompt(step, phase) {
  const html = stripHtml(step?.html_instructions || "");
  const text = html.toLowerCase();
  const maneuver = (step?.maneuver || "").toLowerCase();

  const isUTurn     = maneuver.includes("uturn") || text.includes("u-turn");
  const isKeepLeft  = text.includes("keep left");
  const isKeepRight = text.includes("keep right");
  const isExit      = text.includes("exit");
  const isRamp      = text.includes("ramp");
  const isMerge     = text.includes("merge");
  const isLeft      = text.includes("left") && !isKeepLeft;
  const isRight     = text.includes("right") && !isKeepRight;

  if (phase === "prepare") {
    if (isExit)      return t("tw_prep_exit");
    if (isRamp)      return t("tw_prep_ramp");
    if (isKeepLeft)  return t("tw_prep_keep_left");
    if (isKeepRight) return t("tw_prep_keep_right");
    if (isUTurn)     return t("tw_prep_uturn");
    if (isMerge)     return t("tw_prep_merge");
    if (isLeft)      return t("tw_prep_left");
    if (isRight)     return t("tw_prep_right");
    return t("tw_prep_straight");
  }

  if (phase === "soon") {
    if (isExit)      return t("tw_soon_exit");
    if (isRamp)      return t("tw_soon_ramp");
    if (isKeepLeft)  return t("tw_soon_keep_left");
    if (isKeepRight) return t("tw_soon_keep_right");
    if (isUTurn)     return t("tw_soon_uturn");
    if (isMerge)     return t("tw_soon_merge");
    if (isLeft)      return t("tw_soon_left");
    if (isRight)     return t("tw_soon_right");
    return t("tw_soon_straight");
  }

  if (phase === "now") {
    if (isExit)      return t("tw_now_exit");
    if (isRamp)      return t("tw_now_ramp");
    if (isKeepLeft)  return t("tw_now_keep_left");
    if (isKeepRight) return t("tw_now_keep_right");
    if (isUTurn)     return t("tw_now_uturn");
    if (isMerge)     return t("tw_now_merge");
    if (isLeft)      return t("tw_now_left");
    if (isRight)     return t("tw_now_right");
  }

  return t("tw_now_straight");
}

function getPriority(type) {
  if (type === "exit") return 5;
  if (type === "ramp") return 4;
  if (type === "merge") return 3;
  if (type === "lane") return 2;
  return 1;
}

let _currentHighestPriority = 0;

function speakDriveInstruction(step, phase, instructionType) {
  if (!voiceEnabled || !step) return;
  const text = buildContextAwareVoicePrompt(step, phase);
  
  // TASK 3: Kill straight voice
  if (text && text.toLowerCase().includes("straight")) return;
  
  if (!text || text === "Continue straight") return;
  
  // TASK 2: Priority system - only show instruction if it's highest priority
  const priority = getPriority(instructionType);
  if (priority < _currentHighestPriority) return;
  _currentHighestPriority = priority;
  
  const now = Date.now();
  if (Date.now() - lastSpokenAt < 3500 && lastSpokenText === text) return;
  if (text === lastSpokenText && now - lastSpokenAt < 4500) return;
  try {
    window.speechSynthesis.cancel();
    const utter = buildNativeUtterance(text, "urgent");
    if (!utter) return;
    window.speechSynthesis.speak(utter);
    lastSpokenText = text;
    lastSpokenAt = now;
  } catch (e) { console.warn("speech failed", e); }
}

let _lastInterchangeWarningAt = 0;

function speakInterchangeWarning() {
  const now = Date.now();
  if (now - _lastInterchangeWarningAt < 30000) return; // Don't repeat within 30s
  _lastInterchangeWarningAt = now;
  
  try {
    if ("speechSynthesis" in window) {
      const text = t("interchange_warn") || "Complex interchange ahead. Stay focused.";
      const utter = buildNativeUtterance(text, "urgent");
      if (!utter) return;
      window.speechSynthesis.speak(utter);
    }
  } catch (e) { console.warn("interchange voice failed", e); }
}

function getVoicePromptFromManeuver(vm) {
  if (!vm) return "";
  const m = (vm.maneuver || "").toLowerCase();
  if (!m || m === "straight") return "";
  if (m.includes("uturn"))      return t("ctx_uturn");
  if (m.includes("turn-left"))  return t("ctx_left");
  if (m.includes("turn-right")) return t("ctx_right");
  if (m.includes("keep-left"))  return t("ctx_keep_left");
  if (m.includes("keep-right")) return t("ctx_keep_right");
  if (m.includes("ramp"))       return t("ctx_ramp");
  if (m.includes("fork"))       return t("ctx_fork") || "Take the fork";
  if (m.includes("merge"))      return t("ctx_merge");
  return stripHtml(vm.instruction || "");
}

</script>

<script id="cr-tz1-drive-lane-timed-hud">
// ТЗ-2 [v18] — выбор timed warning + lane guidance для HUD (монолит).
// Порядок: внешний <script> после cr-tz1-drive-voice-timed-warnings.js — до cr-tz1-drive-upcoming-condition.js
// Зависимости: cr-tz1-drive-gps-warnings — getStepWarningMeta, getEffectiveDistanceToStepMeters,
// isComplexInterchangeAhead, getWarningPhaseForType; cr-tz1-drive-voice-timed-warnings — buildTimedWarning;
// основной script — lastKnownUserLatLng, t().

let heldTimedWarning = null;
let heldTimedWarningUntil = 0;
let lastPhaseChangeAt = 0;
let lastStableTimedPhase = "";
let _laneGuidanceHeld = null;
let _laneGuidanceHeldUntil = 0;

function getDriveTimedWarning(r, stepIndex) {
  const steps = r?.route?.legs?.[0]?.steps || [];
  const ulng = lastKnownUserLatLng;
  if (!steps.length) return null;

  const candidates = [];
  const phaseRank = { now: 3, soon: 2, prepare: 1, none: 0 };
  const typePriority = { exit: 6, ramp: 6, fork: 6, lane: 5, merge: 4, uturn: 3, interchange: 1 };

  for (let i = stepIndex; i < Math.min(steps.length, stepIndex + 6); i++) {
    const step = steps[i];
    const meta = getStepWarningMeta(step, r.route);
    if (!meta) continue;

    const meters = getEffectiveDistanceToStepMeters(steps, stepIndex, i, ulng);
    const timed = buildTimedWarning(meta, step, ulng, meters);
    if (!timed) continue;

    candidates.push({
      timed,
      phaseScore: phaseRank[timed.phase] || 0,
      typeScore: typePriority[timed.type] || 0,
      meters: Number.isFinite(meters) ? meters : 999999
    });
  }

  if (candidates.length) {
    candidates.sort(function(a, b) {
      if (b.typeScore !== a.typeScore) return b.typeScore - a.typeScore;
      if (b.phaseScore !== a.phaseScore) return b.phaseScore - a.phaseScore;
      return a.meters - b.meters;
    });
    return candidates[0].timed;
  }

  if (isComplexInterchangeAhead(steps, stepIndex, r.route, ulng)) {
    return {
      type: "interchange",
      icon: "⚠",
      phase: "prepare",
      shortText: "Complex interchange ahead",
      longText: "Complex interchange ahead — stay focused for lane choice",
      distanceText: "Ahead"
    };
  }

  return null;
}

function getHeldTimedWarning(timedWarning) {
  const now = Date.now();

  if (!timedWarning) {
    if (heldTimedWarning && now < heldTimedWarningUntil) {
      return heldTimedWarning;
    }
    heldTimedWarning = null;
    heldTimedWarningUntil = 0;
    return null;
  }

  const nextPhase = timedWarning.phase || "";
  const currentPhase = lastStableTimedPhase || "";

  if (nextPhase !== currentPhase) {
    if (now - lastPhaseChangeAt < 1800 && currentPhase) {
      if (heldTimedWarning && now < heldTimedWarningUntil) {
        return heldTimedWarning;
      }
    }
    lastPhaseChangeAt = now;
    lastStableTimedPhase = nextPhase;
  }

  heldTimedWarning = timedWarning;
  heldTimedWarningUntil = now + 2500;

  return heldTimedWarning;
}

function buildLaneGuidanceText(meta, phase) {
  const type = meta?.type || "";
  const base = meta?.shortText || "";
  const laneHint = meta?.laneHint || "";

  if (type === "exit") {
    if (phase === "prepare") return laneHint ? `${laneHint} — exit ahead` : base.replace("ahead", "").trim();
    if (phase === "soon") return laneHint ? `${laneHint} — exit soon` : base;
    if (phase === "now") return t("lg_exit_now");
  }

  if (type === "ramp") {
    if (phase === "prepare") return laneHint ? `${laneHint} — ramp ahead` : base.replace("ahead", "").trim();
    if (phase === "soon") return laneHint ? `${laneHint} — ramp soon` : base;
    if (phase === "now") return t("lg_ramp_now");
  }

  if (type === "fork") {
    if (phase === "prepare") return laneHint ? `${laneHint} — fork ahead` : base;
    if (phase === "soon") return laneHint ? `${laneHint} — fork soon` : base;
    if (phase === "now") {
      if (base.toLowerCase().includes("left")) return "Fork left now";
      if (base.toLowerCase().includes("right")) return "Fork right now";
      return "Take the fork now";
    }
  }

  if (type === "lane") {
    if (phase === "prepare") return laneHint || base;
    if (phase === "soon") return laneHint || base;
    if (phase === "now") {
      if (base.toLowerCase().includes("left")) return "Keep left now";
      if (base.toLowerCase().includes("right")) return "Keep right now";
      return "Use the correct lane now";
    }
  }

  if (type === "merge") {
    if (phase === "prepare") return laneHint || "Prepare to merge";
    if (phase === "soon") return laneHint || "Merge ahead";
    if (phase === "now") return "Merge now";
  }

  return laneHint || base;
}

function getDriveLaneGuidance(r, stepIndex, userLatLng) {
  const steps = r.route.legs[0].steps;
  const ulng = userLatLng || lastKnownUserLatLng;
  const now = Date.now();

  const candidates = [];

  for (let i = stepIndex; i < Math.min(steps.length, stepIndex + 4); i++) {
    const step = steps[i];
    const meta = getStepWarningMeta(step, r.route);
    if (!meta) continue;

    if (!["lane", "exit", "ramp", "merge", "fork"].includes(meta.type)) continue;

    const meters = getEffectiveDistanceToStepMeters(steps, stepIndex, i, ulng);
    const phase = getWarningPhaseForType(meters, meta.type);
    if (phase === "none") continue;

    const priority =
      meta.type === "exit" || meta.type === "ramp" || meta.type === "fork" ? 3 :
      meta.type === "lane" ? 2 :
      meta.type === "merge" ? 1 : 0;

    candidates.push({
      stepIndex: i,
      type: meta.type,
      phase,
      priority,
      meters,
      icon: meta.icon,
      shortText: buildLaneGuidanceText(meta, phase),
      text: buildLaneGuidanceText(meta, phase),
      distanceText:
        meters == null
          ? "Ahead"
          : meters <= 60
            ? "Now"
            : meters < 1000
              ? `${Math.round(meters / 10) * 10} m`
              : `${(meters / 1000).toFixed(1)} km`
    });
  }

  if (!candidates.length) {
    if (_laneGuidanceHeld && now < _laneGuidanceHeldUntil) {
      return _laneGuidanceHeld;
    }
    _laneGuidanceHeld = null;
    _laneGuidanceHeldUntil = 0;
    return null;
  }

  candidates.sort((a, b) => {
    if (b.priority !== a.priority) return b.priority - a.priority;
    const phaseRank = { now: 3, soon: 2, prepare: 1 };
    if (phaseRank[b.phase] !== phaseRank[a.phase]) return phaseRank[b.phase] - phaseRank[a.phase];
    return (a.meters ?? 999999) - (b.meters ?? 999999);
  });

  const best = candidates[0];

  if (_laneGuidanceHeld && now < _laneGuidanceHeldUntil) {
    const sameType = _laneGuidanceHeld.type === best.type;
    const samePhase = _laneGuidanceHeld.phase === best.phase;

    if (sameType && samePhase) {
      return _laneGuidanceHeld;
    }

    const heldPriority =
      _laneGuidanceHeld.type === "exit" || _laneGuidanceHeld.type === "ramp" || _laneGuidanceHeld.type === "fork" ? 3 :
      _laneGuidanceHeld.type === "lane" ? 2 :
      _laneGuidanceHeld.type === "merge" ? 1 : 0;

    if (heldPriority > best.priority) {
      return _laneGuidanceHeld;
    }
  }

  _laneGuidanceHeld = best;
  _laneGuidanceHeldUntil = now + 2200;
  return best;
}

</script>

<script id="cr-tz1-drive-upcoming-condition">
// ТЗ-2 [v21] — полоса «условия впереди» в Drive / HUD (монолит).
// Порядок: внешний <script> после cr-tz1-drive-lane-timed-hud.js — до cr-tz1-drive-main-instruction.js
// Зависимости: cr-tz1-drive-lane-timed-hud — getDriveTimedWarning;
// cr-tz1-route-metrics-traffic — stepLooksLikeHighway, isMeaningfulManeuver.

function getUpcomingCondition(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const upcoming = steps.slice(stepIndex, stepIndex + 5);

  const timedWarning = getDriveTimedWarning(r, stepIndex);
  if (timedWarning) {
    return { type: timedWarning.phase === "now" ? "alert" : "warning", icon: timedWarning.icon, text: timedWarning.longText };
  }

  const hasHighway = upcoming.some(s => stepLooksLikeHighway(s, r.route));
  const hasManyTurns = upcoming.filter(s => isMeaningfulManeuver(s, r.route)).length >= 3;
  const isNearEnd = stepIndex >= steps.length - 3;

  if (r.traffic === "high") return { type: "warning", icon: "&#9888;", text: "Heavier traffic ahead" };
  if (hasManyTurns)         return { type: "warning", icon: "&#128260;", text: "Multiple turns ahead" };
  if (isNearEnd)            return { type: "stable",  icon: "&#127937;", text: "Approaching destination" };
  if (hasHighway)           return { type: "stable",  icon: "&#128739;", text: "Highway section ahead — smooth driving" };
  if (r.traffic === "low")  return { type: "stable",  icon: "&#9728;", text: "Stable traffic ahead" };
  return { type: "stable", icon: "&#9728;", text: "Moderate conditions ahead" };
}

</script>

<script id="cr-tz1-drive-main-instruction">
// ТЗ-2 [v19] — текст/иконка главной подсказки в Drive HUD (монолит).
// Порядок: внешний <script> после cr-tz1-drive-upcoming-condition.js — до cr-tz1-drive-voice-nav-turns.js
// Зависимости: cr-tz1-drive-gps-warnings — getStepWarningMeta, getDistanceToStepEndMeters, getEffectiveDistanceToStepMeters, getWarningPhaseForType;
// cr-tz1-drive-lane-timed-hud — buildLaneGuidanceText; cr-tz1-route-metrics-traffic — getRouteSummaryName;
// основной script — lastKnownUserLatLng, stripHtml.

function getDriveIcon(maneuver) {
  const m = (maneuver || "").toLowerCase();
  if (m.includes("uturn")) return "↺";
  if (m.includes("left")) return "←";
  if (m.includes("right")) return "→";
  if (m.includes("merge")) return "⇢";
  if (m.includes("ramp")) return "↗";
  return "↑";
}

function formatDriveMeters(meters) {
  if (meters == null || !isFinite(meters)) return "Ahead";
  if (meters <= 25) return "Now";
  if (meters < 1000) return `${Math.round(meters / 10) * 10} m`;
  return `${(meters / 1000).toFixed(1)} km`;
}

function getStepActionText(step, routeObj) {
  const meta = getStepWarningMeta(step, routeObj?.route || routeObj);
  const instruction = stripHtml(step?.html_instructions || "");
  const m = (step?.maneuver || "").toLowerCase();
  if (meta?.shortText) return meta.shortText;
  if (m.includes("turn-left")) return "Turn left";
  if (m.includes("turn-right")) return "Turn right";
  if (m.includes("uturn")) return "Make a U-turn";
  if (m.includes("merge")) return "Merge ahead";
  if (m.includes("ramp")) return "Take the ramp";
  if (instruction) return instruction;
  return "Follow the route";
}

function getNextMeaningfulDriveAction(r, stepIndex, userLatLng) {
  const steps = r?.route?.legs?.[0]?.steps || [];
  for (let i = stepIndex; i < Math.min(steps.length, stepIndex + 5); i++) {
    const meta = getStepWarningMeta(steps[i], r.route);
    if (!meta) continue;
    const meters = getEffectiveDistanceToStepMeters(steps, stepIndex, i, userLatLng);
    return { index: i, step: steps[i], meta, meters, distanceText: formatDriveMeters(meters), actionText: meta.shortText || getStepActionText(steps[i], r) };
  }
  return null;
}

function getCleanDriveMainInstruction(r, stepIndex, vm) {
  const steps = r?.route?.legs?.[0]?.steps || [];
  const currentStep = steps[stepIndex];
  const meta = getStepWarningMeta(currentStep, r.route);
  const currentMeters = getDistanceToStepEndMeters(currentStep, lastKnownUserLatLng);
  const currentPhase = meta ? getWarningPhaseForType(currentMeters, meta.type) : "none";
  if (meta && currentPhase !== "none") {
    return { text: buildLaneGuidanceText(meta, currentPhase) || meta.shortText, distance: formatDriveMeters(currentMeters), icon: meta.icon || getDriveIcon(vm.maneuver || "") };
  }
  const upcoming = getNextMeaningfulDriveAction(r, stepIndex, lastKnownUserLatLng);
  if (upcoming) return { text: upcoming.actionText, distance: upcoming.distanceText, icon: upcoming.meta.icon || getDriveIcon(vm.maneuver || "") };
  const raw = stripHtml(vm.instruction || "");
  const isGeneric = !raw || /^(head|continue|follow|drive|go)\b/i.test(raw);
  const routeName = getRouteSummaryName(r);
  return { text: isGeneric && routeName ? `Continue via ${routeName}` : raw || "Follow the route", distance: vm.instructionDistance || "", icon: getDriveIcon(vm.maneuver || "") };
}

</script>

<script id="cr-tz1-drive-voice-nav-turns">
// ТЗ-2 [v17] — голос навигации: старт, повороты, maybeSpeakDriveNavigation (монолит).
// Порядок: внешний <script> после cr-tz1-drive-main-instruction.js — до cr-tz2-normalization-layer.js
// Зависимости: cr-tz1-drive-gps-warnings — getDistanceToStepEndMeters;
// cr-tz1-drive-voice-timed-warnings — buildContextAwareVoicePrompt;
// cr-tz1-drive-main-instruction — formatDriveMeters;
// основной script — speakText, stripHtml, selectedRoute, voiceEnabled, hasSpokenStartNavigation,
// lastKnownUserLatLng, lastDriveGpsMoveMeters, lastVoiceInstructionKey, lastVoiceInstructionAt,
// lastDriveVoiceStepIndex, lastDriveVoicePhase, currentLang, getRouteSummaryName.

// ============================================================
//  FULL VOICE NAVIGATION FIX
//  - AI WHY voice
//  - start navigation voice
//  - turn-by-turn prepare / now prompts
// ============================================================
function getRouteStepsForVoice(routeObj) {
  const r = routeObj || selectedRoute;
  return r?.route?.legs?.[0]?.steps || [];
}

function getStepInstructionText(step) {
  return stripHtml(step?.html_instructions || step?.instructions || "");
}

function getStepDistanceText(step) {
  return step?.distance?.text || "";
}

function isMeaningfulVoiceManeuver(step) {
  if (!step) return false;
  const text = getStepInstructionText(step).toLowerCase();
  const m = String(step.maneuver || "").toLowerCase();
  return /left|right|u-turn|uturn|exit|ramp|merge|fork|keep/.test(text + " " + m);
}

function getVoicePhaseByDistance(distanceMeters) {
  if (distanceMeters == null || !isFinite(distanceMeters)) return "";
  if (distanceMeters <= 100) return "now";
  if (distanceMeters <= 450) return "prepare";
  return "";
}

function buildStartNavigationVoiceText(routeObj) {
  const r = routeObj || selectedRoute;
  const steps = getRouteStepsForVoice(r);
  if (!r || !steps.length) return "";

  const routeName = getRouteSummaryName(r);
  const first = steps[0];
  const firstInstruction = getStepInstructionText(first);
  const firstDistance = getStepDistanceText(first);

  if (currentLang === "ru") {
    return "Начинайте движение" + (routeName ? " по маршруту через " + routeName : "") + ". " +
      (firstInstruction ? "Сначала: " + firstInstruction + (firstDistance ? ", примерно " + firstDistance : "") + "." : "Следуйте по маршруту.");
  }
  if (currentLang === "ua") {
    return "Починайте рух" + (routeName ? " маршрутом через " + routeName : "") + ". " +
      (firstInstruction ? "Спочатку: " + firstInstruction + (firstDistance ? ", приблизно " + firstDistance : "") + "." : "Рухайтесь за маршрутом.");
  }
  if (currentLang === "ar") {
    return "ابدأ القيادة" + (routeName ? " عبر " + routeName : "") + ". " +
      (firstInstruction ? "أولاً: " + firstInstruction + (firstDistance ? "، حوالي " + firstDistance : "") + "." : "اتبع الطريق.");
  }
  return "Start driving" + (routeName ? " via " + routeName : "") + ". " +
    (firstInstruction ? "First, " + firstInstruction + (firstDistance ? " for about " + firstDistance : "") + "." : "Follow the route.");
}

function speakStartNavigation(routeObj) {
  if (!voiceEnabled || hasSpokenStartNavigation) return;
  const text = buildStartNavigationVoiceText(routeObj || selectedRoute);
  if (!text) return;
  hasSpokenStartNavigation = true;
  speakText(text, "normal");
}

function buildTurnVoiceText(step, phase, distanceText) {
  if (!step) return "";
  const base = buildContextAwareVoicePrompt(step, phase) || getStepInstructionText(step);
  if (!base) return "";
  if (currentLang === "ru") {
    return (phase === "now" ? "Сейчас: " : "Подготовьтесь: ") + base + (distanceText && phase !== "now" ? ", через " + distanceText : "");
  }
  if (currentLang === "ua") {
    return (phase === "now" ? "Зараз: " : "Підготуйтеся: ") + base + (distanceText && phase !== "now" ? ", через " + distanceText : "");
  }
  if (currentLang === "ar") {
    return (phase === "now" ? "الآن: " : "استعد: ") + base + (distanceText && phase !== "now" ? "، بعد " + distanceText : "");
  }
  return (phase === "now" ? "Now: " : "Prepare: ") + base + (distanceText && phase !== "now" ? " in " + distanceText : "");
}

function maybeSpeakDriveNavigation(routeObj, stepIndex, timedWarning, laneGuidance) {
  if (!voiceEnabled || !routeObj || !lastKnownUserLatLng) return;
  if (!document.getElementById("drive-mode")?.classList.contains("active")) return;

  const steps = getRouteStepsForVoice(routeObj);
  const step = steps[stepIndex];
  if (!step) return;

  const distanceMeters = getDistanceToStepEndMeters(step, lastKnownUserLatLng);
  let phase = "";
  let type = "maneuver";
  let distanceText = formatDriveMeters(distanceMeters);

  if (laneGuidance && ["prepare", "soon", "now"].includes(laneGuidance.phase)) {
    phase = laneGuidance.phase === "soon" ? "prepare" : laneGuidance.phase;
    type = laneGuidance.type || "lane";
    distanceText = laneGuidance.distanceText || distanceText;
  } else if (timedWarning && ["prepare", "soon", "now"].includes(timedWarning.phase)) {
    phase = timedWarning.phase === "soon" ? "prepare" : timedWarning.phase;
    type = timedWarning.type || "warning";
    distanceText = timedWarning.distanceText || distanceText;
  } else {
    if (!isMeaningfulVoiceManeuver(step)) return;
    phase = getVoicePhaseByDistance(distanceMeters);
    if (!phase) return;
  }

  // Do not speak from GPS jitter. "Prepare" needs real movement; "now" can speak close to maneuver.
  if (phase !== "now" && lastDriveGpsMoveMeters < 25) return;

  const key = stepIndex + ":" + phase + ":" + type;
  const now = Date.now();
  if (key === lastVoiceInstructionKey && now - lastVoiceInstructionAt < 45000) return;
  if (lastDriveVoiceStepIndex === stepIndex && lastDriveVoicePhase === phase && now - lastVoiceInstructionAt < 45000) return;

  const text = buildTurnVoiceText(step, phase, distanceText);
  if (!text) return;

  lastVoiceInstructionKey = key;
  lastVoiceInstructionAt = now;
  lastDriveVoiceStepIndex = stepIndex;
  lastDriveVoicePhase = phase;
  speakText(text, phase === "now" ? "urgent" : "normal");
}

</script>

<script id="cr-tz2-normalization-layer">
// ТЗ-2 [v10] — якорь «ТЗ-2: NORMALIZATION LAYER» (монолит): стабильный формат маршрута Google → поля для Score Engine.
// Порядок: после cr-tz1-drive-voice-nav-turns.js — до cr-tz1-tz2-decision-helpers.js
// (cr-tz3-score-engine вызывает normalizeRoute; main — normalizeRoutes / validateNormalizedRoutes / applyClearRoadRouteSanityMarks).
// Зависимостей от main нет (чистые утилиты + объекты маршрутов).

// ============================================================
//  ТЗ-2: NORMALIZATION LAYER
//  Converts extracted Google route data into one stable format
//  without removing old fields used by the existing UI.
// ============================================================
function tz2ToNumber(value, fallback = 0) {
  const n = Number(value);
  return Number.isFinite(n) ? n : fallback;
}

function tz2Clamp(value, min, max) {
  const n = tz2ToNumber(value, min);
  return Math.min(max, Math.max(min, n));
}

function tz2Round(value, digits = 1) {
  const factor = Math.pow(10, digits);
  return Math.round(tz2ToNumber(value, 0) * factor) / factor;
}

function tz2StripHtml(value) {
  const text = String(value || "");
  return text.replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
}

function tz2GetStepDistance(step) {
  if (!step) return 0;
  if (Number.isFinite(step.distance)) return step.distance;
  if (step.distance && Number.isFinite(step.distance.value)) return step.distance.value;
  if (step.rawStep && step.rawStep.distance && Number.isFinite(step.rawStep.distance.value)) return step.rawStep.distance.value;
  return 0;
}

function tz2GetStepDuration(step) {
  if (!step) return 0;
  if (Number.isFinite(step.duration)) return step.duration;
  if (step.duration && Number.isFinite(step.duration.value)) return step.duration.value;
  if (step.rawStep && step.rawStep.duration && Number.isFinite(step.rawStep.duration.value)) return step.rawStep.duration.value;
  return 0;
}

function tz2GetStepInstruction(step) {
  if (!step) return "";
  return tz2StripHtml(step.instruction || step.instructions || (step.rawStep && step.rawStep.instructions) || "");
}

function tz2NormalizeStep(step, index) {
  const maneuver = (step && (step.maneuver || (step.rawStep && step.rawStep.maneuver))) || "straight";
  return {
    index,
    instruction: tz2GetStepInstruction(step),
    maneuver,
    distance: tz2GetStepDistance(step),
    duration: tz2GetStepDuration(step),
    startLocation: (step && step.startLocation) || null,
    endLocation: (step && step.endLocation) || null,
    rawStep: (step && step.rawStep) || step || null
  };
}

function tz2CalculateStopsCount(steps) {
  if (!Array.isArray(steps)) return 0;
  return steps.filter(function(step) {
    const instruction = (step.instruction || "").toLowerCase();
    const maneuver = String(step.maneuver || "").toLowerCase();
    return /turn|left|right|roundabout|exit|ramp|merge|fork|u-turn|uturn|keep/.test(maneuver + " " + instruction);
  }).length;
}

function tz2CalculateTrafficScore(durationSec, durationTrafficSec) {
  const base = Math.max(1, tz2ToNumber(durationSec, 0));
  const traffic = Math.max(base, tz2ToNumber(durationTrafficSec, base));
  const delayRatio = Math.max(0, (traffic - base) / base);
  return tz2Round(tz2Clamp(delayRatio, 0, 1), 2);
}

function tz2CalculateComplexityScore(steps, distanceKm) {
  const safeSteps = Array.isArray(steps) ? steps : [];
  const km = Math.max(1, tz2ToNumber(distanceKm, 0));
  const stops = tz2CalculateStopsCount(safeSteps);
  const exits = safeSteps.filter(function(step) {
    const joined = String(step.maneuver || "") + " " + String(step.instruction || "");
    return /exit|ramp|merge|fork|roundabout/i.test(joined);
  }).length;
  const rawScore = (stops / km) * 0.55 + exits * 0.18;
  return tz2Round(tz2Clamp(rawScore, 0, 1), 2);
}

function normalizeRoute(route, index = 0) {
  const normalizedIndex = Number.isFinite(route && route.index) ? route.index : index;
  const durationSec = tz2ToNumber(route && (route.durationSec ?? route.duration), 0);
  const durationTrafficSec = tz2ToNumber(route && (route.durationTrafficSec ?? route.duration_in_traffic ?? route.durationInTraffic ?? route.time), durationSec);
  const distanceMeters = tz2ToNumber(route && (route.distanceMeters ?? route.distance), 0);
  const distanceKm = tz2Round(distanceMeters / 1000, 1);
  const steps = Array.isArray(route && route.steps) ? route.steps.map(tz2NormalizeStep) : [];
  const legs = Array.isArray(route && route.legs) ? route.legs : [];
  const stopsCount = tz2CalculateStopsCount(steps);
  const trafficScore = tz2CalculateTrafficScore(durationSec, durationTrafficSec);
  const complexityScore = tz2CalculateComplexityScore(steps, distanceKm);

  return {
    ...route,
    id: (route && route.id) || `route-${normalizedIndex + 1}`,
    index: normalizedIndex,
    displayIndex: normalizedIndex + 1,
    summary: (route && route.summary) || `Route ${normalizedIndex + 1}`,

    // Stable ТЗ-2 fields for the next Score Engine step
    durationSec,
    durationTrafficSec,
    distanceMeters,
    distanceKm,
    legs,
    steps,
    stopsCount,
    trafficScore,
    complexityScore,

    // Compatibility aliases for the existing UI and old scoring logic
    duration: tz2ToNumber(route && route.duration, durationSec),
    duration_in_traffic: tz2ToNumber(route && route.duration_in_traffic, durationTrafficSec),
    distance: tz2ToNumber(route && route.distance, distanceMeters),
    time: tz2ToNumber(route && route.time, durationTrafficSec),
    baseTime: tz2ToNumber(route && route.baseTime, durationSec),
    turnsCount: tz2ToNumber(route && route.turnsCount, stopsCount),
    normalizedRoute: true
  };
}

function normalizeRoutes(routes) {
  if (!Array.isArray(routes)) return [];
  return routes.map(function(route, index) {
    return normalizeRoute(route, index);
  });
}

function clearRoadDurSecTrafficForSanity(route) {
  if (!route) return 0;
  var t = tz2ToNumber(route.durationTrafficSec ?? route.time ?? route.duration_in_traffic ?? route.durationInTraffic, 0);
  if (!(Number.isFinite(t) && t > 0)) t = tz2ToNumber(route.durationSec ?? route.duration, 0);
  return Number.isFinite(t) && t > 0 ? t : 0;
}

function clearRoadDistanceKmForSanity(route) {
  if (!route) return 0;
  if (Number.isFinite(route.distanceKm) && route.distanceKm > 0) return route.distanceKm;
  var m = tz2ToNumber(route.distanceMeters ?? route.distance, 0);
  return m > 0 ? m / 1000 : 0;
}

function applyClearRoadRouteSanityMarks(routes) {
  var list = Array.isArray(routes) ? routes.filter(Boolean) : [];
  if (!list.length) return;

  var dbg = false;
  try {
    dbg = window.__CLEAR_ROAD_ROUTE_DEBUG__ === true;
  } catch (e) {
    dbg = false;
  }

  list.forEach(function(route) {
    route.invalidRoute = false;
    delete route.invalidReason;

    var raw = route.rawRoute || route.route;
    var legCount = Array.isArray(route.legs) ? route.legs.length : 0;
    if (!legCount && raw && Array.isArray(raw.legs)) legCount = raw.legs.length;

    var durSec = clearRoadDurSecTrafficForSanity(route);
    var dM = tz2ToNumber(route.distanceMeters ?? route.distance, 0);
    if (!(dM > 0)) {
      var kmFallback = clearRoadDistanceKmForSanity(route);
      if (Number.isFinite(kmFallback) && kmFallback > 0) dM = kmFallback * 1000;
    }

    var reason = null;
    if (!legCount) reason = "no_legs";
    else if (!Number.isFinite(durSec) || durSec <= 0) reason = "no_duration_or_nan";
    else if (!Number.isFinite(dM) || dM <= 0) reason = "no_distance_or_nan";

    if (reason) {
      route.invalidRoute = true;
      route.invalidReason = reason;
      if (dbg) console.warn("[ROUTE REJECT]", reason, { summary: route.summary, durSec: durSec, distanceM: dM, legs: legCount });
    } else if (dbg) {
      console.log("[ROUTE KEEP]", route);
    }
  });
}

function validateNormalizedRoutes(routes) {
  if (!Array.isArray(routes) || routes.length === 0) {
    return { ok: false, message: "No normalized routes" };
  }

  const invalid = routes.find(function(route) {
    if (!route || !route.normalizedRoute) return true;
    const ds = Number(route.durationSec);
    const dts = Number(route.durationTrafficSec);
    const dk = Number(route.distanceKm);
    if (!Number.isFinite(ds) || !Number.isFinite(dts) || !Number.isFinite(dk)) return true;
    if (ds <= 0 || dk <= 0) return true;
    return false;
  });

  if (invalid) {
    return { ok: false, message: `Invalid normalized route: ${(invalid && invalid.id) || "unknown route"}` };
  }

  return { ok: true, message: "OK" };
}

</script>

<script id="cr-tz1-tz2-decision-helpers">
// ТЗ-2 [v08] — якорь «ТЗ-1 PATCH — ROUTE DECISION CORE LOCK» / «ТЗ-2: Decision Engine Strengthening».
// Порядок: внешний <script> сразу после cr-tz2-normalization-layer.js — до cr-tz1-drive-update-ui.js
// (_tz1Minutes / _tz2Turns и т.д. нужны скорингу, WHY, AI decision, TZ5/TZ6 слоям).
// Зависит от main: getRouteSummaryName, calculateDriveStress (опционально).

// ============================================================
//  ТЗ-1 PATCH — ROUTE DECISION CORE LOCK
//  Scope: no redesign, no CSS/layout changes. Logic only.
// ============================================================
// ============================================================
//  ТЗ-2: Decision Engine Strengthening
//  Scope: score + WHY + trade-off only. No redesign/CSS/layout changes.
// ============================================================
function _tz1Minutes(route) {
  if (!route) return 0;
  if (typeof route.durationMin === "number") return route.durationMin;
  if (typeof route.time === "number") return Math.round(route.time / 60);
  return 0;
}

function _tz1TrafficRank(level) {
  if (level === "low" || level === "stable") return 1;
  if (level === "medium" || level === "moderate") return 2;
  if (level === "high" || level === "heavy") return 3;
  return 2;
}

function _tz1EscapeHTML(value) {
  return String(value == null ? "" : value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/** Short label / icon for drive-ahead chip: allows numeric entities (&#…;) and symbols, blocks tag injection */
function _tz1SanitizeAheadIcon(icon) {
  const s = String(icon == null ? "" : icon).replace(/[<>]/g, "").trim().slice(0, 96);
  return s || "&#9728;";
}

function _tz1RouteName(route) {
  try {
    return getRouteSummaryName(route);
  } catch (e) {
    return route && route.displayIndex ? "Route " + route.displayIndex : "route";
  }
}

function _tz2Number(value, fallback) {
  const n = Number(value);
  return Number.isFinite(n) ? n : fallback;
}

function _tz2Delay(route) {
  return Math.max(0, _tz2Number(route && route.delayMinutes, 0));
}

function _tz2Complexity(route) {
  return Math.max(0, _tz2Number(route && route.complexity, 0));
}

function _tz2Turns(route) {
  return Math.max(0, _tz2Number(route && (route.turnsCount || route.stopsCount || route.complexity), 0));
}

function _tz2TollCost(route) {
  return Math.max(0, _tz2Number(route && (route.tollCost || (route.hasToll ? 4 : 0)), 0));
}

function _tz2HighwayShare(route) {
  return Math.max(0, Math.min(1, _tz2Number(route && route.highwayShare, 0)));
}

function _tz2TrafficLabel(route) {
  const rank = _tz1TrafficRank(route && route.traffic);
  if (rank <= 1) return "light traffic";
  if (rank === 2) return "moderate traffic";
  return "heavy traffic";
}

function _tz2BuildScoreBreakdown(route) {
  const durationMin = _tz1Minutes(route);
  const trafficRank = _tz1TrafficRank(route && route.traffic);
  const delayMin = _tz2Delay(route);
  const turns = _tz2Turns(route);
  const complexity = _tz2Complexity(route);
  const tollCost = _tz2TollCost(route);
  const highwayShare = _tz2HighwayShare(route);
  const stressScore = typeof calculateDriveStress === "function" ? calculateDriveStress(route) : 0;

  const timeCost = durationMin;
  const trafficPenalty = trafficRank * 4 + delayMin * 1.7;
  const complexityPenalty = complexity * 1.35;
  const turnsPenalty = turns * 0.55;
  const tollPenalty = tollCost > 0 ? 4 + Math.min(8, tollCost * 0.45) : 0;
  const stressPenalty = stressScore ? stressScore * 0.65 : 0;
  const stabilityBonus = highwayShare >= 0.45 && trafficRank <= 2 ? -3 : highwayShare < 0.2 && complexity > 8 ? 2 : 0;

  const total = timeCost + trafficPenalty + complexityPenalty + turnsPenalty + tollPenalty + stressPenalty + stabilityBonus;
  const stabilityScore = Math.max(0, Math.min(100, Math.round(100 - trafficRank * 11 - delayMin * 2.2 - complexity * 1.6 - turns * 0.55 + highwayShare * 12)));

  return {
    timeCost,
    trafficPenalty,
    complexityPenalty,
    turnsPenalty,
    tollPenalty,
    stressPenalty,
    stabilityBonus,
    total,
    stabilityScore,
    durationMin,
    trafficRank,
    delayMin,
    turns,
    complexity,
    tollCost,
    highwayShare,
    stressScore
  };
}

</script>

<script id="cr-tz1-drive-update-ui">
// ТЗ-2 [v20] — сглаживание ETA + полный проход updateDriveUI (монолит).
// Порядок: внешний <script> после cr-tz1-tz2-decision-helpers.js — до cr-tz3-score-engine.js
// (нужен _tz1SanitizeAheadIcon из decision helpers; до этого в DOM — drive/voice/lane/main-instruction/nav.)
let _driveDisplayedEtaMin = null;
let _driveEtaSmoothLastAt = 0;

function applySmoothedDriveEta(rawEta) {
  const raw = Math.max(1, Math.round(Number(rawEta)));
  const now = Date.now();
  if (!Number.isFinite(raw)) return "--";
  if (_driveDisplayedEtaMin == null) {
    _driveDisplayedEtaMin = raw;
    _driveEtaSmoothLastAt = now;
    return String(_driveDisplayedEtaMin);
  }
  const diff = raw - _driveDisplayedEtaMin;
  if (Math.abs(diff) >= 2) {
    _driveDisplayedEtaMin = raw;
    _driveEtaSmoothLastAt = now;
  } else if (diff === 1 && now - _driveEtaSmoothLastAt > 12000) {
    _driveDisplayedEtaMin = raw;
    _driveEtaSmoothLastAt = now;
  } else if (diff === -1 && now - _driveEtaSmoothLastAt > 9000) {
    _driveDisplayedEtaMin = raw;
    _driveEtaSmoothLastAt = now;
  }
  return String(_driveDisplayedEtaMin);
}

function updateDriveUI() {
  const r = validateSelectedDriveRoute(selectedRoute || _bestRoute, "updateDriveUI");
  if (!r) return;
  if (lastKnownUserLatLng) currentStepIndex = findBestCurrentStepIndex(r, lastKnownUserLatLng, currentStepIndex);

  const vm = buildDriveViewModel(r, currentStepIndex);
  let timedWarning = getDriveTimedWarning(r, currentStepIndex);
  timedWarning = getHeldTimedWarning(timedWarning);
  const laneGuidance = getDriveLaneGuidance(r, currentStepIndex, lastKnownUserLatLng);
  const stress = getStressBadge(r.stressScore || 0);

  document.getElementById("drive-eta-time").textContent = applySmoothedDriveEta(vm.eta);
  document.getElementById("drive-distance").textContent = vm.distance;
  document.getElementById("drive-traffic").textContent = vm.trafficText;

  const main = getCleanDriveMainInstruction(r, currentStepIndex, vm);
  document.getElementById("drive-next-instruction").textContent = main.text;
  document.getElementById("drive-next-distance").textContent = main.distance;
  document.getElementById("drive-next-icon").textContent = main.icon;

  const realityStrip = document.getElementById("drive-reality-strip");
  const realityMain = document.getElementById("drive-reality-main");
  const realityDist = document.getElementById("drive-reality-distance");
  const nextAction = getNextMeaningfulDriveAction(r, currentStepIndex, lastKnownUserLatLng);
  if (realityStrip && realityMain && realityDist && nextAction) {
    realityStrip.style.display = "flex";
    realityMain.textContent = nextAction.actionText;
    realityDist.textContent = nextAction.distanceText;
  } else if (realityStrip) realityStrip.style.display = "none";

  let condition;
  if (timedWarning) {
    condition = { type: timedWarning.phase === "now" ? "alert" : "warning", icon: timedWarning.icon || "⚠", text: `${timedWarning.shortText || timedWarning.longText || "Action ahead"} · ${timedWarning.distanceText || "Ahead"}` };
  } else if (laneGuidance) {
    condition = { type: laneGuidance.phase === "now" ? "alert" : "warning", icon: laneGuidance.icon || "⇢", text: `${laneGuidance.text || laneGuidance.shortText || "Lane guidance"} · ${laneGuidance.distanceText || "Ahead"}` };
  } else condition = getUpcomingCondition(r, currentStepIndex);
  if (!condition || !condition.text || /calculating conditions/i.test(String(condition.text))) {
    condition = { type: "stable", icon: "☀", text: "Route conditions stable" };
  }

  const aheadIcon = document.getElementById("drive-ahead-icon");
  aheadIcon.innerHTML = _tz1SanitizeAheadIcon(condition.icon);
  aheadIcon.className = `drive-ahead-icon ${condition.type}`;
  document.getElementById("drive-ahead-text").textContent = `${condition.text} · ${stress.label.toLowerCase()} · ${r.drivePersonality || "steady drive"}`;
  updateDriveGpsStatus(r, vm);

  const steps = r.route.legs[0].steps;
  const interchangeWarn = document.getElementById("drive-interchange-warn");
  if (interchangeWarn) {
    const isComplex = isComplexInterchangeAhead(steps, currentStepIndex, r.route);
    const wasVisible = interchangeWarn.classList.contains("visible");
    if (isComplex) showInterchangeWarning(); else interchangeWarn.classList.remove("visible");
    if (isComplex && !wasVisible && voiceEnabled) speakInterchangeWarning();
  }

  const laneBlock = document.getElementById("drive-lane-block");
  const laneIcon = document.getElementById("drive-lane-icon");
  const laneInstruction = document.getElementById("drive-lane-instruction");
  const laneDistance = document.getElementById("drive-lane-distance");
  if (laneBlock && laneIcon && laneInstruction && laneDistance) {
    const shouldShowLane = laneGuidance && ["prepare", "soon", "now"].includes(laneGuidance.phase) && ["exit", "ramp", "fork", "lane", "merge"].includes(laneGuidance.type);
    if (shouldShowLane) {
      laneBlock.style.display = "flex";
      laneBlock.className = "drive-lane-block";
      if (laneGuidance.phase === "prepare" || laneGuidance.phase === "soon") laneBlock.classList.add("lane-warn");
      if (laneGuidance.phase === "now") laneBlock.classList.add("lane-alert");
      laneIcon.textContent = laneGuidance.icon || "⇢";
      laneInstruction.textContent = laneGuidance.text || laneGuidance.shortText || "Use the correct lane";
      laneDistance.textContent = laneGuidance.distanceText || "Ahead";
    } else {
      laneBlock.style.display = "none";
      laneBlock.className = "drive-lane-block";
      laneInstruction.textContent = "";
      laneDistance.textContent = "";
    }
  }

  maybeSpeakDriveNavigation(r, currentStepIndex, timedWarning, laneGuidance);

  lastWarningPhase = timedWarning?.phase || laneGuidance?.phase || "";
}
