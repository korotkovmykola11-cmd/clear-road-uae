  ];

  const REQUIRED_LAYERS = [
    ['TZ1', 'Drive Mode Reality Fix'],
    ['TZ2', 'GPS STABILITY LAYER'],
    ['TZ3', 'PREDICTIVE ENGINE STABILITY LAYER'],
    ['TZ4', 'UAE-ONLY LOCAL LOGIC'],
    ['TZ5', 'FILTERS / PREFERENCES'],
    ['TZ6', 'SAVED PLACES / QUICK START'],
    ['TZ7', 'MULTILANGUAGE / I18N'],
    ['TZ8', 'RTL ARABIC UI POLISH'],
    ['TZ9', 'VOICE INPUT / SPEECH RECOGNITION'],
    ['TZ10', 'AI ASSISTANT / VOICE ADVICE'],
    ['TZ11', 'CODE CLEANUP / STABILIZATION LAYER']
  ];

  const REQUIRED_FUNCTIONS = [
    'calculateRoutes',
    'renderResults',
    'startDriveMode',
    'exitDriveMode',
    'requestGPS',
    'setLang',
    'speakCurrentDecision',
    'startRouteVoiceInput'
  ];

  const REQUIRED_DOM = [
    'start',
    'end',
    'results',
    'drive-mode',
    'drive-status',
    'drive-map',
    'modal-overlay',
    'modal-content',
    'top-utility-bar'
  ];

  function log(status, name, detail){
    const fn = status === 'ok' ? console.info : console.warn;
    fn('[TZ12]', status.toUpperCase(), name, detail || '');
  }

  function getSource(){
    return document.documentElement ? document.documentElement.innerHTML : '';
  }

  function checkLayers(){
    const source = getSource();
    const result = {};
    REQUIRED_LAYERS.forEach(([key, marker]) => {
      const ok = source.indexOf(marker) !== -1;
      result[key] = ok;
      log(ok ? 'ok' : 'warn', key, marker);
    });
    return result;
  }

  function checkFunctions(){
    const result = {};
    REQUIRED_FUNCTIONS.forEach(name => {
      const ok = typeof window[name] === 'function';
      result[name] = ok;
      log(ok ? 'ok' : 'warn', 'function ' + name);
    });
    return result;
  }

  function checkDom(){
    const result = {};
    REQUIRED_DOM.forEach(id => {
      const ok = !!document.getElementById(id);
      result[id] = ok;
      log(ok ? 'ok' : 'warn', 'DOM #' + id);
    });
    return result;
  }

  function checkLanguages(){
    const result = {};
    ['en','ru','ua','ar'].forEach(lang => {
      const btn = document.querySelector('.lang-btn[data-lang="' + lang + '"]');
      result[lang] = !!btn;
      log(btn ? 'ok' : 'warn', 'language ' + lang);
    });
    return result;
  }

  function getBestRouteSummary(routes){
    if (!Array.isArray(routes) || !routes.length) return null;
    const sorted = routes.slice().sort((a, b) => {
      const as = Number(a.aiScore || a.score || 0);
      const bs = Number(b.aiScore || b.score || 0);
      if (bs !== as) return bs - as;
      return Number(a.duration || a.durationMin || 9999) - Number(b.duration || b.durationMin || 9999);
    });
    const r = sorted[0];
    return {
      label: r.label || r.name || r.summary || 'Best route',
      eta: r.durationText || r.duration || r.durationMin || null,
      distance: r.distanceText || r.distance || null,
      score: r.aiScore || r.score || null
    };
  }

  function runDemoSimulation(){
    const output = [];
    DEMO_ROUTES.forEach(test => {
      let status = 'ready';
      let summary = null;
      try {
        if (typeof window.calculateRoutes === 'function') {
          const maybeRoutes = window.calculateRoutes(test.from, test.to, { demo: true, tz12: true });
          if (Array.isArray(maybeRoutes)) summary = getBestRouteSummary(maybeRoutes);
          else if (maybeRoutes && Array.isArray(maybeRoutes.routes)) summary = getBestRouteSummary(maybeRoutes.routes);
        }
      } catch (err) {
        status = 'manual_check_required';
        summary = { error: err && err.message ? err.message : String(err) };
      }
      output.push({
        route: test.label,
        status,
        summary,
        note: summary ? 'Route engine responded.' : 'Ready for live Google Maps/API test in browser.'
      });
    });
    return output;
  }

  function finalAudit(){
    const audit = {
      version: TZ12_VERSION,
      timestamp: new Date().toISOString(),
      layers: checkLayers(),
      functions: checkFunctions(),
      dom: checkDom(),
      languages: checkLanguages(),
      demoRoutes: runDemoSimulation()
    };

    audit.ok =
      Object.values(audit.layers).every(Boolean) &&
      Object.values(audit.functions).every(Boolean) &&
      Object.values(audit.dom).every(Boolean) &&
      Object.values(audit.languages).every(Boolean);

    window.clearRoadTZ12Audit = audit;
    document.documentElement.setAttribute('data-tz12', TZ12_VERSION);
    if (document.body) document.body.classList.add('tz12-final-ready');

    log(audit.ok ? 'ok' : 'warn', 'Final audit complete', audit);
    return audit;
  }

  function installDemoHelpers(){
    window.clearRoadDemoRoutes = DEMO_ROUTES.slice();
    window.clearRoadRunFinalAudit = finalAudit;
    window.clearRoadTZ12 = {
      version: TZ12_VERSION,
      demoRoutes: DEMO_ROUTES.slice(),
      runFinalAudit: finalAudit,
      runDemoSimulation
    };
  }

  function run(){
    installDemoHelpers();
    finalAudit();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run, { once:true });
  else run();
})();

</script>

    if (p.delay == null) p.delay = p.time;
    if (p.saving == null) p.saving = p.delay;
    if (typeof p.time === 'number') p.time = pluralMinute(lang, p.time);
    if (typeof p.delay === 'number') p.delay = pluralMinute(lang, p.delay);
    if (typeof p.saving === 'number') p.saving = pluralMinute(lang, p.saving);
    if (!p.road) p.road = 'main route';
    return p;
  }

  function fillTemplate(template, params){
    return String(template || '').replace(/\{(\w+)\}/g, function(_, key){
      return params[key] != null ? String(params[key]) : '';
    }).replace(/\s+/g, ' ').trim();
  }

  function getScenarioText(lang, scenario, params){
    const safeLang = SUPPORTED_LANGS.includes(lang) ? lang : 'en';
    const dict = TEXT[safeLang] || TEXT.en;
    const key = SCENARIOS[scenario] || scenario || SCENARIOS.ROUTE_READY;
    const template = dict[key] || TEXT.en[key] || TEXT.en.route_ready;
    return fillTemplate(template, normalizeParams(safeLang, params));
  }

  function getAdvicePayload(input){
    const lang = (input && input.lang) || currentLangSafe();
    const scenario = (input && input.scenario) || inferScenario((input && input.route) || getCurrentRoute());
    const params = Object.assign(defaultParamsFromRoute((input && input.route) || getCurrentRoute()), input && input.params);
    const text = getScenarioText(lang, scenario, params);
    return {
      lang,
      scenario,
      text,
      displayText: (TEXT[lang] && TEXT[lang].ai_prefix ? TEXT[lang].ai_prefix : TEXT.en.ai_prefix) + ': ' + text,
      voiceText: buildVoiceText(lang, scenario, params),
      params: normalizeParams(lang, params)
    };
  }

  function getCurrentRoute(){
    try {
      return (window.currentDecision && window.currentDecision.bestRoute) || window.selectedRoute || window._bestRoute || null;
    } catch { return null; }
  }

  function routeDurationMin(route){
    return Math.round(n(route && (route.duration_min || route.duration || route.time || route.minutes), 0));
  }

  function routeDelayMin(route){
    return Math.round(n(route && (route.trafficDelay || route.delay || route.delayMin || route.delay_min), 0));
  }

  function defaultParamsFromRoute(route){
    const delay = routeDelayMin(route);
    let saving = 0;
    try {
      const fastest = window._fastestRoute;
      if (fastest && route) saving = Math.max(0, routeDurationMin(route) - routeDurationMin(fastest));
    } catch {}
    return {
      time: 15,
      delay: delay || 5,
      saving: saving || delay || 5,
      road: (route && (route.name || route.summary || route.routeName)) || 'route'
    };
  }

  function inferScenario(route){
    const delay = routeDelayMin(route);
    const text = JSON.stringify(route || {}).toLowerCase();
    if (/gps.*weak|weak.*gps|gps.*lost|location.*lost/.test(text)) return 'GPS_WEAK';
    if (/interchange|exit|ramp|fork|lane/.test(text)) return 'COMPLEX_INTERCHANGE';
    if (/salik|toll/.test(text) && !/no.?toll|avoid.?toll/.test(text)) return 'SALIK_ROUTE';
    if (/no.?toll|avoid.?toll|without.?toll/.test(text)) return 'NO_TOLL';
    if (delay >= 8) return 'TRAFFIC_AHEAD';
    return 'STABLE_ROUTE';
  }

  function buildVoiceText(lang, scenario, params){
    const safeLang = SUPPORTED_LANGS.includes(lang) ? lang : 'en';
    const key = SCENARIOS[scenario] || scenario || SCENARIOS.ROUTE_READY;
    const shortKey = key === 'go_now' ? 'voice_short_go' : key === 'wait_15' ? 'voice_short_wait' : 'voice_short_stable';
    const dict = TEXT[safeLang] || TEXT.en;
    return dict[shortKey] || getScenarioText(safeLang, scenario, params);
  }

  function findBestBrowserVoice(profile){
    if (!window.speechSynthesis || !profile) return null;
    const voices = window.speechSynthesis.getVoices ? window.speechSynthesis.getVoices() : [];
    const lang = String(profile.lang || '').toLowerCase();
    return voices.find(v => String(v.lang || '').toLowerCase() === lang) ||
      voices.find(v => String(v.lang || '').toLowerCase().startsWith(lang.split('-')[0])) || null;
  }

  function showLanguageNotice(message){
    let el = document.getElementById('tz13-language-notice');
    if (!el) {
      el = document.createElement('div');
      el.id = 'tz13-language-notice';
      el.setAttribute('role', 'status');
      document.body.appendChild(el);
    }
    el.textContent = message;
    el.classList.add('visible');
    clearTimeout(showLanguageNotice._timer);
    showLanguageNotice._timer = setTimeout(() => el.classList.remove('visible'), 3200);
  }

  async function speakPremium(lang, text){
    const profile = VOICE_PROFILES[lang] || VOICE_PROFILES.en;
    const cloud = window.clearRoadCloudTTS;
    if (cloud && typeof cloud.speak === 'function') {
      await cloud.speak({ lang: profile.lang, voice: profile.cloudVoice, text });
      return true;
    }

    if (profile.premiumRequired) {
      showLanguageNotice((TEXT[lang] || TEXT.en).voice_cloud_needed);
      return false;
    }

    if (!window.speechSynthesis || typeof SpeechSynthesisUtterance === 'undefined') {
      showLanguageNotice((TEXT[lang] || TEXT.en).voice_unavailable);
      return false;
    }

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = profile.lang;
    const voice = findBestBrowserVoice(profile);
    if (voice) utterance.voice = voice;
    try { window.speechSynthesis.cancel(); } catch {}
    window.speechSynthesis.speak(utterance);
    return true;
  }

  function installTextHooks(){
    const originalSetLang = window.setLang;
    if (typeof originalSetLang === 'function' && !originalSetLang.__tz13Wrapped) {
      const wrappedSetLang = function(lang){
        const result = originalSetLang.apply(this, arguments);
        applyDirection(lang);
        setTimeout(refreshVisibleAdvice, 0);
        return result;
      };
      wrappedSetLang.__tz13Wrapped = true;
      window.setLang = wrappedSetLang;
    }
  }

  function applyDirection(lang){
    const safeLang = SUPPORTED_LANGS.includes(lang) ? lang : currentLangSafe();
    document.documentElement.setAttribute('lang', safeLang);
    document.documentElement.setAttribute('dir', safeLang === 'ar' ? 'rtl' : 'ltr');
    if (document.body) {
      document.body.classList.toggle('rtl', safeLang === 'ar');
      document.body.classList.toggle('tz13-rtl', safeLang === 'ar');
    }
  }

  function refreshVisibleAdvice(){
    const lang = currentLangSafe();
    const payload = getAdvicePayload({ lang });
    const line = document.querySelector('.ai-advice-line');
    if (line && payload.displayText) {
      const prefix = (TEXT[lang] && TEXT[lang].ai_prefix) || TEXT.en.ai_prefix;
      line.innerHTML = '<span>' + escapeHtml(prefix) + '</span>' + escapeHtml(payload.text);
    }
    const voiceBtn = document.querySelector('.ai-voice-btn');
    if (voiceBtn) {
      voiceBtn.setAttribute('data-tz13-lang', lang);
      voiceBtn.title = VOICE_PROFILES[lang] && VOICE_PROFILES[lang].premiumRequired ?
        (TEXT[lang] || TEXT.en).voice_cloud_needed : 'AI Voice';
    }
  }

  function escapeHtml(value){
    return String(value || '').replace(/[&<>"']/g, function(ch){
      return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[ch];
    });
  }

  function installVoiceHooks(){
    window.speakCurrentDecision = function(){
      const lang = currentLangSafe();
      const payload = getAdvicePayload({ lang });
      refreshVisibleAdvice();
      return speakPremium(lang, payload.voiceText || payload.text);
    };

    window.clearRoadSpeakPremiumAdvice = window.speakCurrentDecision;

    window.buildDecisionVoiceText = function(routeObj){
      const lang = currentLangSafe();
      return getAdvicePayload({ lang, route: routeObj }).voiceText;
    };

    window.buildRerouteVoiceText = function(decision, altRoute){
      const lang = currentLangSafe();
      const gain = decision && Number.isFinite(Number(decision.gainMin)) ? Number(decision.gainMin) : routeDelayMin(altRoute) || 5;
      const scenario = gain > 0 ? 'FASTER_ROUTE' : 'NO_DIFFERENCE';
      return getAdvicePayload({ lang, route: altRoute, scenario, params: { saving: gain, delay: gain } }).voiceText;
    };
  }

  function audit(){
    const checks = {
      langEngine: typeof window.clearRoadLanguageEngine === 'object',
      voiceEngine: typeof window.clearRoadSpeakPremiumAdvice === 'function',
      templates: SUPPORTED_LANGS.every(l => !!TEXT[l] && !!TEXT[l].go_now && !!TEXT[l].traffic_ahead),
      grammarRU: pluralMinute('ru', 1).includes('минута') && pluralMinute('ru', 2).includes('минуты') && pluralMinute('ru', 5).includes('минут'),
      grammarUA: pluralMinute('ua', 1).includes('хвилина') && pluralMinute('ua', 2).includes('хвилини') && pluralMinute('ua', 5).includes('хвилин'),
      previousCore: ['calculateRoutes','renderResults','startDriveMode','requestGPS','setLang'].every(fn => typeof window[fn] === 'function')
    };
    checks.ok = Object.values(checks).every(Boolean);
    window.clearRoadTZ13Audit = checks;
    console.info('[TZ13]', checks.ok ? 'OK' : 'WARN', checks);
    return checks;
  }

  function install(){
    window.clearRoadLanguageEngine = {
      version: TZ13_VERSION,
      supportedLanguages: SUPPORTED_LANGS.slice(),
      scenarios: Object.assign({}, SCENARIOS),
      getAdvice: getAdvicePayload,
      getScenarioText,
      pluralMinute,
      voiceProfiles: JSON.parse(JSON.stringify(VOICE_PROFILES)),
      textDictionaries: TEXT
    };
    window.clearRoadVoiceEngine = {
      version: TZ13_VERSION,
      speak: speakPremium,
      profiles: VOICE_PROFILES,
      requiresPremiumVoice: function(lang){ return !!(VOICE_PROFILES[lang] && VOICE_PROFILES[lang].premiumRequired); }
    };
    document.documentElement.setAttribute('data-tz13', TZ13_VERSION);
    if (document.body) document.body.classList.add('tz13-premium-language');
    installTextHooks();
    installVoiceHooks();
    applyDirection(currentLangSafe());
    refreshVisibleAdvice();
    audit();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', install, { once: true });
  else install();
})();

</script>

<script id="cr-tz1-elevenlabs-tts">
(function(){
  'use strict';

  const TZ1_TTS_VERSION = 'TZ1_ELEVENLABS_NATIVE_TTS_FINAL_2026_04_25';
  const SUPPORTED_TTS_LANGS = ['en', 'ru', 'ua', 'ar'];

  const DEFAULT_ELEVENLABS_VOICE_IDS = Object.freeze({
    en: '21m00Tcm4TlvDq8ikWAM',
    ru: 'EXAVITQu4vr4xnSDxMaL',
    ua: 'EXAVITQu4vr4xnSDxMaL',
    ar: 'ErXwobaYiN019PkySvjV'
  });

  const ELEVENLABS_LANG = Object.freeze({
    en: { code: 'en-US', label: 'English' },
    ru: { code: 'ru-RU', label: 'Русский' },
    ua: { code: 'uk-UA', label: 'Українська' },
    ar: { code: 'ar-AE', label: 'العربية' }
  });

  let activeAudio = null;
  let activeObjectUrl = null;
  let lastSpokenText = '';

  function getCurrentLang(){
    const raw = String(
      window.currentLang ||
      document.documentElement.getAttribute('lang') ||
      (document.body && document.body.getAttribute('data-lang')) ||
      localStorageGet('clearroad_lang') ||
      'en'
    ).toLowerCase();
    if (raw === 'uk') return 'ua';
    if (raw.startsWith('ar')) return 'ar';
    if (raw.startsWith('ru')) return 'ru';
    if (raw.startsWith('ua') || raw.startsWith('uk')) return 'ua';
    return SUPPORTED_TTS_LANGS.includes(raw) ? raw : 'en';
  }

  function localStorageGet(key){
    try { return window.localStorage ? localStorage.getItem(key) : null; } catch (_) { return null; }
  }

  function getElevenLabsKey(){
    return String(window.TTS_API_KEY || window.ELEVENLABS_API_KEY || window.CLEAR_ROAD_TTS_API_KEY || '').trim();
  }

  function getVoiceId(lang){
    const custom = window.TTS_VOICE_IDS || window.ELEVENLABS_VOICE_IDS || window.CLEAR_ROAD_TTS_VOICE_IDS || {};
    return String(custom[lang] || DEFAULT_ELEVENLABS_VOICE_IDS[lang] || DEFAULT_ELEVENLABS_VOICE_IDS.en).trim();
  }

  function getDecisionText(lang){
    try {
      if (window.clearRoadLanguageEngine && typeof window.clearRoadLanguageEngine.getAdvice === 'function') {
        const payload = window.clearRoadLanguageEngine.getAdvice({ lang });
        if (payload && (payload.voiceText || payload.text || payload.displayText)) return cleanVoiceText(payload.voiceText || payload.text || payload.displayText);
      }
    } catch (_) {}
    const selectors = ['.ai-advice-line', '.dh-route-line', '.decision-hero', '#drive-next-instruction', '#drive-ahead-text'];
    for (const selector of selectors) {
      const el = document.querySelector(selector);
      const text = el ? cleanVoiceText(el.textContent || '') : '';
      if (text && text.length > 3) return text;
    }
    return defaultText(lang);
  }

  function defaultText(lang){
    const fallback = {
      en: 'The route is ready. Better to leave now.',
      ru: 'Маршрут готов. Лучше выехать сейчас.',
      ua: 'Маршрут готовий. Краще виїхати зараз.',
      ar: 'المسار جاهز. الأفضل الانطلاق الآن.'
    };
    return fallback[lang] || fallback.en;
  }

  function cleanVoiceText(text){
    return String(text || '')
      .replace(/AI\s*advice\s*:?/ig, '')
      .replace(/AI-совет\s*:?/ig, '')
      .replace(/AI-порада\s*:?/ig, '')
      .replace(/نصيحة الذكاء الاصطناعي\s*:?/g, '')
      .replace(/[★•]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim()
      .slice(0, 900);
  }

  function stopAllVoice(){
    try { if (window.speechSynthesis) window.speechSynthesis.cancel(); } catch (_) {}
    try { if (activeAudio) { activeAudio.pause(); activeAudio.currentTime = 0; } } catch (_) {}
    if (activeObjectUrl) { try { URL.revokeObjectURL(activeObjectUrl); } catch (_) {} activeObjectUrl = null; }
    activeAudio = null;
  }

  async function speakWithElevenLabs(text, lang){
    const apiKey = getElevenLabsKey();
    if (!apiKey) throw new Error('Missing TTS_API_KEY');
    const voiceId = getVoiceId(lang);
    if (!voiceId) throw new Error('Missing ElevenLabs voice id for ' + lang);
    const response = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + encodeURIComponent(voiceId), {
      method: 'POST',
      headers: { 'Accept': 'audio/mpeg', 'Content-Type': 'application/json', 'xi-api-key': apiKey },
      body: JSON.stringify({
        text: text,
        model_id: window.TTS_MODEL_ID || 'eleven_multilingual_v2',
        voice_settings: {
          stability: typeof window.TTS_STABILITY === 'number' ? window.TTS_STABILITY : 0.48,
          similarity_boost: typeof window.TTS_SIMILARITY === 'number' ? window.TTS_SIMILARITY : 0.82,
          style: typeof window.TTS_STYLE === 'number' ? window.TTS_STYLE : 0.18,
          use_speaker_boost: true
        }
      })
    });
    if (!response.ok) {
      let detail = '';
      try { detail = await response.text(); } catch (_) {}
      throw new Error('ElevenLabs TTS failed: ' + response.status + ' ' + detail.slice(0, 140));
    }
    const blob = await response.blob();
    stopAllVoice();
    activeObjectUrl = URL.createObjectURL(blob);
    activeAudio = new Audio(activeObjectUrl);
    activeAudio.preload = 'auto';
    activeAudio.onended = function(){
      if (activeObjectUrl) { try { URL.revokeObjectURL(activeObjectUrl); } catch (_) {} activeObjectUrl = null; }
      activeAudio = null;
    };
    await activeAudio.play();
    return true;
  }

  function pickBrowserVoice(lang){
    if (!window.speechSynthesis || typeof window.speechSynthesis.getVoices !== 'function') return null;
    const wanted = (ELEVENLABS_LANG[lang] || ELEVENLABS_LANG.en).code.toLowerCase();
    const base = wanted.split('-')[0];
    const voices = window.speechSynthesis.getVoices() || [];
    return voices.find(v => String(v.lang || '').toLowerCase() === wanted) || voices.find(v => String(v.lang || '').toLowerCase().startsWith(base)) || null;
  }

  function speakWithBrowserFallback(text, lang){
    if (!('speechSynthesis' in window) || typeof SpeechSynthesisUtterance === 'undefined') { notifyTTS('Voice unavailable. ' + text); return false; }
    stopAllVoice();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = (ELEVENLABS_LANG[lang] || ELEVENLABS_LANG.en).code;
    const voice = pickBrowserVoice(lang);
    if (voice) utterance.voice = voice;
    utterance.rate = lang === 'ar' ? 0.88 : 0.94;
    utterance.pitch = 1;
    window.speechSynthesis.speak(utterance);

  function notifyTTS(message){

      el.id = 'tz1-tts-notice';
      el.setAttribute('role', 'status');
      el.style.cssText = 'position:fixed;left:14px;right:14px;bottom:calc(max(env(safe-area-inset-bottom),.75rem) + 78px);z-index:4000;padding:12px 14px;border-radius:16px;background:rgba(15,23,42,.96);color:white;border:1px solid rgba(245,158,11,.30);font:650 13px/1.35 Inter Tight,system-ui,sans-serif;box-shadow:0 18px 45px rgba(0,0,0,.38);opacity:0;transform:translateY(8px);transition:.18s ease;';
      document.body.appendChild(el);
    }
    el.textContent = message;
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
    clearTimeout(notifyTTS._timer);
    notifyTTS._timer = setTimeout(function(){ el.style.opacity = '0'; el.style.transform = 'translateY(8px)'; }, 3800);
  }

  async function speakDecisionNative(){
    const lang = getCurrentLang();
    const text = getDecisionText(lang);
    lastSpokenText = text;
    try {
      await speakWithElevenLabs(text, lang);
      return { ok: true, engine: 'elevenlabs', lang: lang, text: text };
    } catch (err) {
      console.warn('[TZ1 TTS] ElevenLabs fallback:', err);
      const usedFallback = speakWithBrowserFallback(text, lang);
      if (!getElevenLabsKey()) notifyTTS('TTS_API_KEY not found. Browser fallback is used. Add window.TTS_API_KEY in your hidden last lines.');
      return { ok: usedFallback, engine: 'browser-fallback', lang: lang, text: text, error: String(err && err.message || err) };
    }
  }

  function installTZ1TTS(){
    window.clearRoadTZ1TTS = {
      version: TZ1_TTS_VERSION,
      supportedLanguages: SUPPORTED_TTS_LANGS.slice(),
      provider: 'ElevenLabs',
      keyMode: 'window.TTS_API_KEY / window.ELEVENLABS_API_KEY / window.CLEAR_ROAD_TTS_API_KEY',
      model: window.TTS_MODEL_ID || 'eleven_multilingual_v2',
      getCurrentLang: getCurrentLang,
      getDecisionText: getDecisionText,
      speak: speakDecisionNative,
      stop: stopAllVoice,
      hasApiKey: function(){ return !!getElevenLabsKey(); },
      getVoiceId: getVoiceId,
      lastText: function(){ return lastSpokenText; }
    };
    window.speakCurrentDecision = function(){
      try { if (typeof voiceEnabled !== "undefined") voiceEnabled = true; } catch (_) {}
      return speakDecisionNative();
    };
    window.clearRoadSpeakPremiumAdvice = window.speakCurrentDecision;
    if (window.clearRoadVoiceEngine && typeof window.clearRoadVoiceEngine === 'object') {
      window.clearRoadVoiceEngine.provider = 'ElevenLabs';
      window.clearRoadVoiceEngine.version = TZ1_TTS_VERSION;
      window.clearRoadVoiceEngine.speak = function(input){
        const rawLang = input && input.lang ? String(input.lang).toLowerCase() : getCurrentLang();
        const lang = rawLang.startsWith('uk') ? 'ua' : SUPPORTED_TTS_LANGS.includes(rawLang) ? rawLang : getCurrentLang();
        const text = cleanVoiceText(input && input.text ? input.text : getDecisionText(lang));
        return speakWithElevenLabs(text, lang).catch(function(err){ console.warn('[TZ1 TTS] voiceEngine fallback:', err); return speakWithBrowserFallback(text, lang); });
      };
    }
    document.documentElement.setAttribute('data-tz1-tts', TZ1_TTS_VERSION);
    console.info('[TZ1 TTS] installed', { version: TZ1_TTS_VERSION, hasApiKey: !!getElevenLabsKey(), supportedLanguages: SUPPORTED_TTS_LANGS });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', installTZ1TTS, { once: true });
  else installTZ1TTS();
})();

</script>


<script id="cr-tz2-route-data-integrity">
// ============================================================
//  ТЗ-2 FINAL — ROUTE DATA INTEGRITY / UAE ROUTING LOCK
//  Fixes: huge ETA/distance numbers, NOT_FOUND stale UI, plus-code text routing,
//  floating minute diffs, and wrong-country geocoding.
//  Scope: route input + Directions data only. Voice/visual design untouched.
// ============================================================
(function installTZ2RouteDataIntegrity(){
  'use strict';

  const TZ2_VERSION = 'TZ2_ROUTE_DATA_INTEGRITY_2026_04_25_FINAL';
  const UAE_BOUNDS = { minLat: 22.45, maxLat: 26.35, minLng: 51.45, maxLng: 56.55 };
  const ROUTE_TIMEOUT_MS = 14000;
  const PLUS_CODE_RE = /^[23456789CFGHJMPQRVWX]{4,}\+[23456789CFGHJMPQRVWX]{2,}/i;

  window.tz2RouteDataIntegrity = window.tz2RouteDataIntegrity || { version: TZ2_VERSION };
  const tz2State = window.tz2RouteDataIntegrity;
  tz2State.selected = tz2State.selected || { start: null, end: null };

  function $(id){ return document.getElementById(id); }
  function htmlEscape(value){
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }
  function showRouteError(message){
    const results = $('results');
    if (results) results.innerHTML = '<div class="error">' + htmlEscape(message) + '</div>';
  }
  function clearRouteStateOnly(){
    try { if (typeof clearRoutes === 'function') clearRoutes(); } catch(e) { console.warn('[TZ2] clearRoutes skipped', e); }
    try {
      currentDirectionsResult = null;
      analyzedRoutes = [];
      selectedRoute = null;
      _bestRoute = null;
      _fastestRoute = null;
      currentDecision = null;
    } catch (_) {}
    try { window.__CLEAR_ROAD_AI_DECISION_STICKY__ = null; } catch (_) {}
  }
  function isGoogleReady(){
    return !!(window.google && google.maps && google.maps.DirectionsService && google.maps.Geocoder && directionsService && typeof directionsService.route === 'function');
  }
  function numeric(v){ const n = Number(v); return Number.isFinite(n) ? n : null; }
  function latOf(loc){
    if (!loc) return null;
    if (typeof loc.lat === 'function') return numeric(loc.lat());
    return numeric(loc.lat);
  }
  function lngOf(loc){
    if (!loc) return null;
    if (typeof loc.lng === 'function') return numeric(loc.lng());
    return numeric(loc.lng);
  }
  function toLatLngLiteral(loc){
    const lat = latOf(loc), lng = lngOf(loc);
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
    return { lat, lng };
  }
  function isInsideUAE(loc){
    const p = toLatLngLiteral(loc);
    if (!p) return false;
    return p.lat >= UAE_BOUNDS.minLat && p.lat <= UAE_BOUNDS.maxLat && p.lng >= UAE_BOUNDS.minLng && p.lng <= UAE_BOUNDS.maxLng;
  }
  function looksLikePlusCode(text){ return PLUS_CODE_RE.test(String(text || '').trim()); }
  /** Loose match so Autocomplete full address ↔ truncated input still pairs with Places geometry. */
  function tz2AddressesLooselyMatch(a, b){
    const x = String(a || '').trim().toLowerCase().replace(/\s+/g, ' ');
    const y = String(b || '').trim().toLowerCase().replace(/\s+/g, ' ');
    if (!x || !y) return false;
    if (x === y) return true;
