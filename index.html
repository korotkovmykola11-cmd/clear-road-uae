  };

  message.innerHTML = `
    <div class="drive-alert-header">
      <span class="drive-alert-badge ${confidenceClass}">
        <span class="dot"></span>
        ${decision.confidence} confidence
      </span>
      <span class="drive-alert-state ${decision.action}">${actionLabel}</span>
    </div>
    <div class="drive-alert-title">${decision.title}</div>
    <div class="drive-alert-detail">${decision.detail}</div>
    <div class="drive-alert-meta">${scoreText} · Via ${getRouteSummaryName(altRoute)}</div>
  `;

  const primaryBtn = alert.querySelector(".drive-alert-btn.primary");
  const secondaryBtn = alert.querySelector(".drive-alert-btn.secondary");

  if (primaryBtn && secondaryBtn) {
    primaryBtn.textContent = decision.action === "switch" ? "Switch now" : "Try alternative";
    primaryBtn.className = `drive-alert-btn primary${decision.action === "suggest" ? " suggest" : ""}`;
    secondaryBtn.textContent = "Keep current";
  }

  alert.classList.add("visible");
  speakRerouteDecision(decision, altRoute);
}

function evaluateReroute(currentRoute, allRoutes) {
  if (!currentRoute || !Array.isArray(allRoutes) || allRoutes.length <= 1) return null;

  const now = Date.now();
  const alternatives = allRoutes.filter(function(route) {
    if (!route || route.index === currentRoute.index) return false;
    if (_rerouteDismissedIndex === route.index && now < _rerouteDismissedUntil) return false;
    return true;
  });

  let bestAlt = null;
  let bestDecision = null;

  alternatives.forEach(function(alt) {
    const decision = getRerouteDecision(currentRoute, alt);
    if (!decision || decision.action === "stay") return;

    if (!bestAlt) {
      bestAlt = alt;
      bestDecision = decision;
      return;
    }

    const currentPriority = bestDecision.action === "switch" ? 2 : bestDecision.action === "suggest" ? 1 : 0;
    const newPriority = decision.action === "switch" ? 2 : decision.action === "suggest" ? 1 : 0;

    const currentScoreGain = Number(bestDecision.scoreGain || 0);
    const newScoreGain = Number(decision.scoreGain || 0);
    const currentTimeGain = Number(bestDecision.timeGain || 0);
    const newTimeGain = Number(decision.timeGain || 0);

    if (
      newPriority > currentPriority ||
      (newPriority === currentPriority && newScoreGain > currentScoreGain) ||
      (newPriority === currentPriority && newScoreGain === currentScoreGain && newTimeGain > currentTimeGain)
    ) {
      bestAlt = alt;
      bestDecision = decision;
    }
  });

  if (!bestAlt || !bestDecision) return null;

  return {
    index: bestAlt.index,
    route: bestAlt,
    decision: bestDecision,
    signature: currentRoute.index + "→" + bestAlt.index + ":" + bestDecision.action
  };
}

function getUserLatLngFromPosition(pos) {
  return new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
}

function getClosestStepIndex(userLatLng, steps, currentIndex = 0) {
  // Only compare end_location (not start_location) to avoid premature step advancement.
  // start_location[i+1] == end_location[i], so using both causes step i+1 to tie-win
  // as the user approaches the turn — advancing the index too early.
  let minDist = Infinity;
  let bestIndex = currentIndex;

  const from = Math.max(0, currentIndex);
  const to = Math.min(steps.length - 1, currentIndex + 3);

  for (let i = from; i <= to; i++) {
    const step = steps[i];
    if (!step?.end_location) continue;
    const d = google.maps.geometry.spherical.computeDistanceBetween(userLatLng, step.end_location);
    if (d < minDist) {
      minDist = d;
      bestIndex = i;
    }
  }

  return bestIndex;
}

function isUserOffRoute(userLatLng, route) {
  const path = route.route.overview_path;
  if (!path || !path.length) return false;
  return !google.maps.geometry.poly.isLocationOnEdge(
    userLatLng,
    new google.maps.Polyline({ path }),
    0.00045
  );
}

function smoothUserPosition(newLatLng) {
  if (!smoothedUserLatLng) {
    smoothedUserLatLng = newLatLng;
    return newLatLng;
  }
  const alpha = 0.35;
  smoothedUserLatLng = new google.maps.LatLng(
    smoothedUserLatLng.lat() + (newLatLng.lat() - smoothedUserLatLng.lat()) * alpha,
    smoothedUserLatLng.lng() + (newLatLng.lng() - smoothedUserLatLng.lng()) * alpha
  );
  return smoothedUserLatLng;
}

function updateUserHeading(prevLatLng, nextLatLng) {
  if (!prevLatLng || !nextLatLng) return lastUserHeading || 0;

  const d = google.maps.geometry.spherical.computeDistanceBetween(prevLatLng, nextLatLng);
  if (d < 5) return lastUserHeading || 0;

  lastUserHeading = google.maps.geometry.spherical.computeHeading(prevLatLng, nextLatLng) || 0;
  return lastUserHeading;
}

function hasUserMoved(prevLatLng, nextLatLng) {
  if (!prevLatLng || !nextLatLng) return true;
  const d = google.maps.geometry.spherical.computeDistanceBetween(prevLatLng, nextLatLng);
  return d > 8;
}

function getStableStepIndex(candidateIndex) {
  const now = Date.now();
  if (candidateIndex < currentStepIndex) return currentStepIndex;
  if (candidateIndex > currentStepIndex + 1) candidateIndex = currentStepIndex + 1;
  if (candidateIndex !== currentStepIndex) {
    if (now - lastStepSwitchAt < 2500) return currentStepIndex;
    lastStepSwitchAt = now;
  }
  lastStableStepIndex = candidateIndex;
  return candidateIndex;
}

function updateDriveUserMarker(userLatLng) {
  if (!driveMap) return;

  const icon = {
    path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
    scale: 6,
    fillColor: "#2563eb",
    fillOpacity: 1,
    strokeColor: "#ffffff",
    strokeWeight: 2,
    rotation: lastUserHeading || 0,
    anchor: new google.maps.Point(0, 2)
  };

  if (!driveUserMarker) {
    driveUserMarker = new google.maps.Marker({
      position: userLatLng,
      map: driveMap,
      title: "You",
      zIndex: 9999,
      icon
    });
  } else {
    driveUserMarker.setPosition(userLatLng);
    driveUserMarker.setIcon(icon);
  }
}

function updateDriveCamera(userLatLng) {
  if (!driveMap || !followUserMode || !userLatLng) return;

  if (!driveMapHasFollowed) {
    driveMap.setZoom(17);
    driveMap.panTo(userLatLng);
    driveMapHasFollowed = true;
    return;
  }

  driveMap.panTo(userLatLng);

  const currentZoom = driveMap.getZoom() || 0;
  if (currentZoom < 16) {
    driveMap.setZoom(16);
  }
}

function handleLiveDrivePosition(pos) {
  if (!selectedRoute) return;

  if (!isDriveGpsUsable(pos)) {
    updateDriveGpsStatus(selectedRoute, null, "GPS weak" + formatGpsAccuracy());
    return;
  }

  const rawLatLng = getUserLatLngFromPosition(pos);
  const userLatLng = smoothUserPosition(rawLatLng);
  const prevLatLng = lastKnownUserLatLng;

  lastDriveGpsMoveMeters = prevLatLng
    ? google.maps.geometry.spherical.computeDistanceBetween(prevLatLng, userLatLng)
    : 999;

  updateUserHeading(prevLatLng, userLatLng);
  lastKnownUserLatLng = userLatLng;

  updateDriveUserMarker(userLatLng);
  updateDriveCamera(userLatLng);

  const nextStepIndex = findBestCurrentStepIndex(selectedRoute, userLatLng, currentStepIndex);
  if (nextStepIndex !== currentStepIndex) {
    currentStepIndex = nextStepIndex;
    lastWarningPhase = "";
    lastDriveVoiceStepIndex = -1;
    lastDriveVoicePhase = "";
  }

  updateDriveUI();

  if (shouldTriggerSoftOffRouteReroute(userLatLng, selectedRoute)) {
    handleOffRouteRecalculation(userLatLng);
    return;
  }

  const now = Date.now();
  if (currentStepIndex >= 2 && now - lastRerouteCheckAt > 20000) {
    lastRerouteCheckAt = now;

    const reroute = evaluateReroute(selectedRoute, analyzedRoutes);

    if (!reroute) {
      if (betterRouteIndex !== null) {
        betterRouteIndex = null;
        _rerouteDecision = null;
        _rerouteLastSignature = "";
        const alert = document.getElementById("drive-alert");
        if (alert) alert.classList.remove("visible");
      }
      return;
    }

    const shouldShow = reroute.signature !== _rerouteLastSignature || now - _rerouteLastShownAt > 60000;
    betterRouteIndex = reroute.index;

    if (shouldShow) {
      _rerouteLastSignature = reroute.signature;
      _rerouteLastShownAt = now;
      renderDriveAlertDecision(reroute.decision, reroute.route);
    }
  }
}

function handleOffRouteRecalculation(userLatLng) {
  const now = Date.now();
  if (offRouteRecalcInProgress) return;
  if (now - lastOffRouteRecalcAt < DRIVE_OFF_ROUTE_REROUTE_COOLDOWN_MS) return;

  offRouteRecalcInProgress = true;
  lastOffRouteRecalcAt = now;
  betterRouteIndex = null;
  _rerouteDecision = null;
  dismissAlert();
  updateDriveGpsStatus(selectedRoute, null, "Off route · recalculating…");

  const destination = document.getElementById("end").value.trim();
  if (!destination || !directionsService) {
    offRouteRecalcInProgress = false;
    return;
  }

  directionsService.route({
    origin: userLatLng,
    destination,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    offRouteRecalcInProgress = false;

    if (status !== "OK" || !result.routes?.length) {
      updateDriveGpsStatus(selectedRoute, null, "Off route · recalculation unavailable");
      return;
    }

    currentDirectionsResult = result;

    analyzedRoutes = result.routes.map((route, i) => {
      const leg = route.legs[0];
      const metrics = calculateRouteMetrics(route, leg, route);
      return { route, index: i, displayIndex: i + 1, ...metrics };
    });

    analyzedRoutes = analyzedRoutes.map(r => {
      const scoreData = calculateRouteScore(r, analyzedRoutes);
      return { ...r, ...scoreData };
    });

    _bestRoute = selectBestRoute(analyzedRoutes);
    _fastestRoute = [...analyzedRoutes].sort((a, b) => a.time - b.time)[0];
    selectedRoute = _bestRoute;

    analyzedRoutes.forEach(r => {
      r.role = getRouteRole(r, _bestRoute, _fastestRoute, analyzedRoutes);
    });

    setActiveDriveRoute(_bestRoute, "softOffRouteReroute");
    currentStepIndex = 0;
    betterRouteIndex = null;
    _rerouteDecision = null;
    offRouteSince = 0;
    lastStepSwitchAt = 0;
    lastStableStepIndex = 0;
    smoothedUserLatLng = userLatLng;
    dismissAlert();

    renderSelectedRouteOnDriveMap(selectedRoute);
    updateDriveRouteStatusLabel(selectedRoute, "GPS reroute locked");
    updateDriveUI();
    updateDriveCamera(userLatLng);

    if (voiceEnabled) speakText("Route updated from your current position.", "normal");
  });
}

function startLiveDriveTracking() {
  if (!navigator.geolocation) {
    updateDriveGpsStatus(selectedRoute, null, "GPS not supported");
    return;
  }

  stopLiveDriveTracking();
  updateDriveGpsStatus(selectedRoute, null, "Waiting for GPS…");

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      handleLiveDrivePosition(pos);
      updateDriveGpsStatus(selectedRoute, null, "GPS live" + formatGpsAccuracy());
    },
    function(err) {
      console.error("Initial Drive GPS error:", err);
      updateDriveGpsStatus(selectedRoute, null, "GPS blocked or unavailable");
    },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
  );

  driveWatchId = navigator.geolocation.watchPosition(
    function(pos) {
      handleLiveDrivePosition(pos);
    },
    function(err) {
      console.error("Drive GPS error:", err);
      updateDriveGpsStatus(selectedRoute, null, "GPS error: allow location");
    },
    { enableHighAccuracy: true, maximumAge: 500, timeout: 10000 }
  );
}

function stopLiveDriveTracking() {
  if (driveWatchId !== null) {
    navigator.geolocation.clearWatch(driveWatchId);
    driveWatchId = null;
  }
  smoothedUserLatLng = null;
  offRouteSince = 0;
  offRouteRecalcInProgress = false;
  lastStepSwitchAt = 0;
  lastStableStepIndex = 0;
  lastGpsAccuracyMeters = null;
  lastRouteDistanceMeters = null;
  lastGpsStatusText = "";
}


// ============================================================
//  ТЗ3 — DRIVE MODE ROUTE BINDING
//  Keeps Decision Engine, selectedRoute and Drive Mode locked
//  to the same Google route index. Does not change UI/CSS.
// ============================================================
function getCanonicalRouteByIndex(index) {
  if (!Array.isArray(analyzedRoutes) || !analyzedRoutes.length) return null;
  const normalizedIndex = Number(index);
  if (Number.isFinite(normalizedIndex)) {
    const exact = analyzedRoutes.find(function(route) { return Number(route.index) === normalizedIndex; });
    if (exact) return exact;
  }
  return null;
}

function resolveDriveRoute(index) {
  const exact = getCanonicalRouteByIndex(index);
  if (exact) return exact;

  if (selectedRoute) {
    const selected = getCanonicalRouteByIndex(selectedRoute.index);
    if (selected) return selected;
  }

  if (_bestRoute) {
    const best = getCanonicalRouteByIndex(_bestRoute.index);
    if (best) return best;
  }

  return Array.isArray(analyzedRoutes) && analyzedRoutes.length ? analyzedRoutes[0] : null;
}

function setActiveDriveRoute(route, source) {
  const canonical = route ? getCanonicalRouteByIndex(route.index) || route : null;
  if (!canonical) return null;

  selectedRoute = canonical;
  activeDriveRouteIndex = canonical.index;
  activeDriveRouteSnapshot = {
    source: source || "unknown",
    index: canonical.index,
    title: canonical.title || _tz1RouteName(canonical),
    durationMin: canonical.durationMin || _tz1Minutes(canonical),
    score: canonical.score || null,
    updatedAt: Date.now()
  };

  return canonical;
}

function validateSelectedDriveRoute(route, source) {
  const canonical = setActiveDriveRoute(route, source);
  if (!canonical) return null;

  if (currentDirectionsResult && currentDirectionsResult.routes && currentDirectionsResult.routes[canonical.index] !== canonical.route) {
    const fixedIndex = currentDirectionsResult.routes.findIndex(function(googleRoute) { return googleRoute === canonical.route; });
    if (fixedIndex >= 0 && fixedIndex !== canonical.index) {
      canonical.index = fixedIndex;
      activeDriveRouteIndex = fixedIndex;
    }
  }

  return canonical;
}

function renderSelectedRouteOnDriveMap(route) {
  const r = validateSelectedDriveRoute(route, "renderSelectedRouteOnDriveMap");
  if (!r || !driveMap || !currentDirectionsResult) return false;

  if (driveRenderer) driveRenderer.setMap(null);

  driveRenderer = new google.maps.DirectionsRenderer({
    map: driveMap,
    directions: currentDirectionsResult,
    routeIndex: r.index,
    polylineOptions: {
      strokeColor: "#2d6a4f",
      strokeWeight: 6
    }
  });

  return true;
}

function updateDriveRouteStatusLabel(route, prefix) {
  const st = document.getElementById("drive-status");
  if (!st || !route) return;
  const label = route.title || _tz1RouteName(route) || ("Route " + (route.index + 1));
  st.textContent = (prefix || "AI route locked") + " · " + label;
}

function startDriveMode(index) {
  clearDelayedStartTimer();

  const r = validateSelectedDriveRoute(resolveDriveRoute(index), "startDriveMode");
  if (!r || !currentDirectionsResult) return;

  currentStepIndex = 0;
  betterRouteIndex = null;
  _rerouteDecision = null;
  _rerouteDismissedUntil = 0;
  _rerouteDismissedIndex = null;
  _rerouteLastShownAt = 0;
  _rerouteLastSignature = "";
  lastRerouteCheckAt = 0;
  lastKnownUserLatLng = null;
  lastGpsAccuracyMeters = null;
  lastRouteDistanceMeters = null;
  lastGpsStatusText = "";
  offRouteRecalcInProgress = false;
  offRouteSince = 0;
  lastStepSwitchAt = 0;
  lastStableStepIndex = 0;
  smoothedUserLatLng = null;
  lastWarningPhase = "";
  lastSpokenText = "";
  lastSpokenAt = 0;
  lastVoiceInstructionKey = "";
  lastVoiceInstructionAt = 0;
  hasSpokenStartNavigation = false;
  hasSpokenDriveDecision = false;
  heldTimedWarning = null;
  heldTimedWarningUntil = 0;
  lastPhaseChangeAt = 0;
  lastStableTimedPhase = "";
  followUserMode = true;
  lastUserHeading = 0;
  driveMapHasFollowed = false;

  document.getElementById("drive-mode").classList.add("active");

  if (!driveMap) {
    driveMap = new google.maps.Map(document.getElementById("drive-map"), {
      center: { lat: 25.2048, lng: 55.2708 },
      zoom: 14,
      disableDefaultUI: true,
      styles: [
        { elementType: "geometry", stylers: [{ color: "#1d2c4d" }] },
        { elementType: "labels.text.fill", stylers: [{ color: "#8ec3b9" }] },
        { elementType: "labels.text.stroke", stylers: [{ color: "#1a3646" }] },
        { featureType: "road", elementType: "geometry", stylers: [{ color: "#304a7d" }] },
        { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#255763" }] }
      ]
    });
  }

  renderSelectedRouteOnDriveMap(r);
  updateDriveRouteStatusLabel(r, "AI route locked");
  updateDriveUI();

  if (voiceEnabled) {
    setTimeout(function() {
      if (!hasSpokenDriveDecision && selectedRoute && selectedRoute.index === r.index) {
        hasSpokenDriveDecision = true;
        speakText(buildDecisionVoiceText(selectedRoute, "drive_start"), "normal");
      }
    }, 350);
    setTimeout(function() {
      if (selectedRoute && selectedRoute.index === r.index) speakStartNavigation(selectedRoute);
    }, 1800);
  }

  if (r.route && r.route.bounds) driveMap.fitBounds(r.route.bounds);

  if (driveInterval) {
    clearInterval(driveInterval);
    driveInterval = null;
  }

  startLiveDriveTracking();
}

function getDriveIcon(maneuver) {
  const m = (maneuver || "").toLowerCase();
  if (m.includes("uturn"))  return "↺";
  if (m.includes("left"))   return "←";
  if (m.includes("right"))  return "→";
  if (m.includes("merge"))  return "⇢";
  if (m.includes("ramp"))   return "↗";
  return "↑";
}


function formatDriveMeters(meters) {
  if (meters == null || !isFinite(meters)) return "Ahead";
  if (meters <= 25) return "Now";
  if (meters < 1000) return `${Math.round(meters / 10) * 10} m`;
  return `${(meters / 1000).toFixed(1)} km`;
}

function getStepActionText(step, routeObj) {
  const meta = getStepWarningMeta(step, routeObj?.route || routeObj);
  const instruction = stripHtml(step?.html_instructions || "");
  const m = (step?.maneuver || "").toLowerCase();
  if (meta?.shortText) return meta.shortText;
  if (m.includes("turn-left")) return "Turn left";
  if (m.includes("turn-right")) return "Turn right";
  if (m.includes("uturn")) return "Make a U-turn";
  if (m.includes("merge")) return "Merge ahead";
  if (m.includes("ramp")) return "Take the ramp";
  if (instruction) return instruction;
  return "Follow the route";
}

function getEffectiveDistanceToStepMeters(steps, currentIndex, targetIndex, userLatLng) {
  if (!steps?.[targetIndex]) return null;
  if (targetIndex === currentIndex) return getDistanceToStepEndMeters(steps[currentIndex], userLatLng);
  let meters = getDistanceToStepEndMeters(steps[currentIndex], userLatLng);
  if (meters == null) meters = steps[currentIndex]?.distance?.value || 0;
  for (let i = currentIndex + 1; i < targetIndex; i++) meters += steps[i]?.distance?.value || 0;
  meters += Math.min(steps[targetIndex]?.distance?.value || 0, 120);
  return meters;
}

function getNextMeaningfulDriveAction(r, stepIndex, userLatLng) {
  const steps = r?.route?.legs?.[0]?.steps || [];
  for (let i = stepIndex; i < Math.min(steps.length, stepIndex + 5); i++) {
    const meta = getStepWarningMeta(steps[i], r.route);
    if (!meta) continue;
    const meters = getEffectiveDistanceToStepMeters(steps, stepIndex, i, userLatLng);
    return { index: i, step: steps[i], meta, meters, distanceText: formatDriveMeters(meters), actionText: meta.shortText || getStepActionText(steps[i], r) };
  }
  return null;
}

function getCleanDriveMainInstruction(r, stepIndex, vm) {
  const steps = r?.route?.legs?.[0]?.steps || [];
  const currentStep = steps[stepIndex];
  const meta = getStepWarningMeta(currentStep, r.route);
  const currentMeters = getDistanceToStepEndMeters(currentStep, lastKnownUserLatLng);
  const currentPhase = meta ? getWarningPhaseForType(currentMeters, meta.type) : "none";
  if (meta && currentPhase !== "none") {
    return { text: buildLaneGuidanceText(meta, currentPhase) || meta.shortText, distance: formatDriveMeters(currentMeters), icon: meta.icon || getDriveIcon(vm.maneuver || "") };
  }
  const upcoming = getNextMeaningfulDriveAction(r, stepIndex, lastKnownUserLatLng);
  if (upcoming) return { text: upcoming.actionText, distance: upcoming.distanceText, icon: upcoming.meta.icon || getDriveIcon(vm.maneuver || "") };
  const raw = stripHtml(vm.instruction || "");
  const isGeneric = !raw || /^(head|continue|follow|drive|go)\b/i.test(raw);
  const routeName = getRouteSummaryName(r);
  return { text: isGeneric && routeName ? `Continue via ${routeName}` : raw || "Follow the route", distance: vm.instructionDistance || "", icon: getDriveIcon(vm.maneuver || "") };
}

function updateDriveUI() {
  const r = validateSelectedDriveRoute(selectedRoute || _bestRoute, "updateDriveUI");
  if (!r) return;
  if (lastKnownUserLatLng) currentStepIndex = findBestCurrentStepIndex(r, lastKnownUserLatLng, currentStepIndex);

  const vm = buildDriveViewModel(r, currentStepIndex);
  let timedWarning = getDriveTimedWarning(r, currentStepIndex);
  timedWarning = getHeldTimedWarning(timedWarning);
  const laneGuidance = getDriveLaneGuidance(r, currentStepIndex, lastKnownUserLatLng);
  const stress = getStressBadge(r.stressScore || 0);

  document.getElementById("drive-eta-time").textContent = vm.eta;
  document.getElementById("drive-distance").textContent = vm.distance;
  document.getElementById("drive-traffic").textContent = vm.trafficText;

  const main = getCleanDriveMainInstruction(r, currentStepIndex, vm);
  document.getElementById("drive-next-instruction").textContent = main.text;
  document.getElementById("drive-next-distance").textContent = main.distance;
  document.getElementById("drive-next-icon").textContent = main.icon;

  const realityStrip = document.getElementById("drive-reality-strip");
  const realityMain = document.getElementById("drive-reality-main");
  const realityDist = document.getElementById("drive-reality-distance");
  const nextAction = getNextMeaningfulDriveAction(r, currentStepIndex, lastKnownUserLatLng);
  if (realityStrip && realityMain && realityDist && nextAction) {
    realityStrip.style.display = "flex";
    realityMain.textContent = nextAction.actionText;
    realityDist.textContent = nextAction.distanceText;
  } else if (realityStrip) realityStrip.style.display = "none";

  let condition;
  if (timedWarning) {
    condition = { type: timedWarning.phase === "now" ? "alert" : "warning", icon: timedWarning.icon || "⚠", text: `${timedWarning.shortText || timedWarning.longText || "Action ahead"} · ${timedWarning.distanceText || "Ahead"}` };
  } else if (laneGuidance) {
    condition = { type: laneGuidance.phase === "now" ? "alert" : "warning", icon: laneGuidance.icon || "⇢", text: `${laneGuidance.text || laneGuidance.shortText || "Lane guidance"} · ${laneGuidance.distanceText || "Ahead"}` };
  } else condition = getUpcomingCondition(r, currentStepIndex);

  const aheadIcon = document.getElementById("drive-ahead-icon");
  aheadIcon.innerHTML = condition.icon;
  aheadIcon.className = `drive-ahead-icon ${condition.type}`;
  document.getElementById("drive-ahead-text").textContent = `${condition.text} · ${stress.label.toLowerCase()} · ${r.drivePersonality || "steady drive"}`;
  updateDriveGpsStatus(r, vm);

  const steps = r.route.legs[0].steps;
  const interchangeWarn = document.getElementById("drive-interchange-warn");
  if (interchangeWarn) {
    const isComplex = isComplexInterchangeAhead(steps, currentStepIndex, r.route);
    const wasVisible = interchangeWarn.classList.contains("visible");
    if (isComplex) showInterchangeWarning(); else interchangeWarn.classList.remove("visible");
    if (isComplex && !wasVisible && voiceEnabled) speakInterchangeWarning();
  }

  const laneBlock = document.getElementById("drive-lane-block");
  const laneIcon = document.getElementById("drive-lane-icon");
  const laneInstruction = document.getElementById("drive-lane-instruction");
  const laneDistance = document.getElementById("drive-lane-distance");
  if (laneBlock && laneIcon && laneInstruction && laneDistance) {
    const shouldShowLane = laneGuidance && ["prepare", "soon", "now"].includes(laneGuidance.phase) && ["exit", "ramp", "fork", "lane", "merge"].includes(laneGuidance.type);
    if (shouldShowLane) {
      laneBlock.style.display = "flex";
      laneBlock.className = "drive-lane-block";
      if (laneGuidance.phase === "prepare" || laneGuidance.phase === "soon") laneBlock.classList.add("lane-warn");
      if (laneGuidance.phase === "now") laneBlock.classList.add("lane-alert");
      laneIcon.textContent = laneGuidance.icon || "⇢";
      laneInstruction.textContent = laneGuidance.text || laneGuidance.shortText || "Use the correct lane";

    } else {
      laneBlock.style.display = "none";
      laneBlock.className = "drive-lane-block";
      laneInstruction.textContent = "";
      laneDistance.textContent = "";
    }
  }

  // Voice is driven only from confirmed GPS updates.
  // This prevents random commands from render/startup/repaint.
  maybeSpeakDriveNavigation(r, currentStepIndex, timedWarning, laneGuidance);

  lastWarningPhase = timedWarning?.phase || laneGuidance?.phase || "";
}

function switchToAlternative() {
  const targetIndex = _rerouteDecision && Number.isFinite(_rerouteDecision.targetIndex)
    ? _rerouteDecision.targetIndex
    : betterRouteIndex;

  if (targetIndex === null || targetIndex === undefined) return;

  const chosen = resolveDriveRoute(targetIndex);
  if (!chosen) return;

  if (typeof learnFromRouteChoice === "function") learnFromRouteChoice(chosen);

  betterRouteIndex = null;
  _rerouteDecision = null;
  _rerouteDismissedIndex = null;
  _rerouteDismissedUntil = 0;
  _rerouteLastSignature = "";

  setActiveDriveRoute(chosen, "switchToAlternative");
  currentStepIndex = 0;

function calculateRoutes() {
  clearRoutes();

  const start = document.getElementById("start").value.trim();
  const end = document.getElementById("end").value.trim();

  // ТЗ5: detect parking type (does NOT affect route selection)
  _parkingType = detectParkingType(end);

  if (!start || !end) {
    document.getElementById("results").innerHTML = "";
    return;
  }

  document.getElementById("results").innerHTML = '<div class="loading">Finding best routes...</div>';

  directionsService.route({
    origin: start,
    destination: end,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK") {
      document.getElementById("results").innerHTML = `<div class="error">Could not find route: ${status}</div>`;
      return;
    }

    const routes = result.routes;
    if (!routes?.length) {
      document.getElementById("results").innerHTML = '<div class="error">No routes found.</div>';
      return;
    }

    currentDirectionsResult = result;

    analyzedRoutes = routes.map((route, i) => {
      const leg = route.legs[0];
      const metrics = calculateRouteMetrics(route, leg, route);
      return { route, index: i, displayIndex: i + 1, ...metrics };
    });

    analyzedRoutes = analyzedRoutes.map(r => {
      const scoreData = calculateRouteScore(r, analyzedRoutes);
      return { ...r, ...scoreData };
    });

    _bestRoute = selectBestRoute(analyzedRoutes);
    _fastestRoute = [...analyzedRoutes].sort((a, b) => a.time - b.time)[0];
    selectedRoute = _bestRoute;

    analyzedRoutes.forEach(r => {
      r.role = getRouteRole(r, _bestRoute, _fastestRoute, analyzedRoutes);
    });

    renderResults();
    drawRoutes(result);

    // Day 6.5: fire predictive check asynchronously — doesn't block current render
    runPredictiveCheck(start, end, getDisplayMinutes(_bestRoute));
  });
}

const AUTOCOMPLETE_DEBOUNCE_MS  = 220;
const STEP_SWITCH_COOLDOWN_MS   = 1800;
const STEP_REACHED_RADIUS_M     = 28;
const NEXT_STEP_PREPARE_RADIUS_M = 180;
const NEXT_STEP_SOON_RADIUS_M   = 90;

let _startInputDebounced   = null;
let _endInputDebounced     = null;
let _lastManualRouteTrigger = 0;

function debounce(fn, delay) {
  let t = null;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay || 220); };
}

function setGpsLoading(on) {
  const btn = document.getElementById("gps-btn");
  if (btn) btn.classList.toggle("gps-loading", !!on);
}

function tryCalculateRoutesFromInputs() {
  const now   = Date.now();
  const start = document.getElementById("start")?.value?.trim() || "";
  const end   = document.getElementById("end")?.value?.trim() || "";
  if (!start || !end) return;
  if (now - _lastManualRouteTrigger < 900) return;
  _lastManualRouteTrigger = now;
  calculateRoutes();
}

function wireInputAssist() {
  const startInput = document.getElementById("start");
  const endInput   = document.getElementById("end");
  if (!startInput || !endInput) return;

  if (!_startInputDebounced) {
    _startInputDebounced = debounce(() => {
      const s = startInput.value.trim();
      const e = endInput.value.trim();
      if ((s.length >= 3 || e.length >= 3) && s && e) tryCalculateRoutesFromInputs();
    }, AUTOCOMPLETE_DEBOUNCE_MS);
  }
  if (!_endInputDebounced) {
    _endInputDebounced = debounce(() => {
      const s = startInput.value.trim();
      const e = endInput.value.trim();
      if ((s.length >= 3 || e.length >= 3) && s && e) tryCalculateRoutesFromInputs();
    }, AUTOCOMPLETE_DEBOUNCE_MS);
  }

  if (!startInput.dataset.inputAssistBound) {
    startInput.addEventListener("input", _startInputDebounced);
    startInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); tryCalculateRoutesFromInputs(); }
    });
    startInput.addEventListener("blur", () => tryCalculateRoutesFromInputs());
    startInput.dataset.inputAssistBound = "1";
  }
  if (!endInput.dataset.inputAssistBound) {
    endInput.addEventListener("input", _endInputDebounced);
    endInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); tryCalculateRoutesFromInputs(); }
    });
    endInput.addEventListener("blur", () => tryCalculateRoutesFromInputs());
    endInput.dataset.inputAssistBound = "1";
  }
}

function ensureAutocompleteReady() {
  if (!google?.maps?.places) {
    console.error("Google Places library is not loaded.");
    wireInputAssist();
    return;
  }
  if (!startAutocomplete || !endAutocomplete) initAutocomplete();
  wireInputAssist();
}

function bindAutocompletePlaceChanged(autocomplete, kind) {
  if (!autocomplete || autocomplete.__patchedPlaceChanged) return;
  autocomplete.addListener("place_changed", () => {
    const place = autocomplete.getPlace();
    if (!place?.geometry) return;

    const input = document.getElementById(kind === "start" ? "start" : "end");
    if (!input) return;

    input.value = place.formatted_address || place.name || input.value || "";

    if (kind === "start") {
      currentUserCoords = {
        lat: place.geometry.location.lat(),
        lng: place.geometry.location.lng()
      };
    }

    tryCalculateRoutesFromInputs();
  });
  autocomplete.__patchedPlaceChanged = true;
}

function patchAutocompleteBindings() {
  if (startAutocomplete) bindAutocompletePlaceChanged(startAutocomplete, "start");
  if (endAutocomplete)   bindAutocompletePlaceChanged(endAutocomplete, "end");
}

function handleGeoError(err) {
  setGpsLoading(false);
  const startInput = document.getElementById("start");
  if (!startInput) return;
  if (err?.code === 1) { startInput.placeholder = t("gps_blocked"); return; }
  if (err?.code === 2) { startInput.placeholder = t("gps_unavail"); return; }
  if (err?.code === 3) { startInput.placeholder = t("gps_timeout"); return; }
  startInput.placeholder = t("gps_error");
}

function reverseGeocodeLatLng(latLng) {
  return new Promise((resolve) => {
    try {
      new google.maps.Geocoder().geocode({ location: latLng }, (results, status) => {
        resolve((status === "OK" && results?.[0]) ? results[0].formatted_address : `${latLng.lat.toFixed(5)}, ${latLng.lng.toFixed(5)}`);
      });
    } catch { resolve(`${latLng.lat.toFixed(5)}, ${latLng.lng.toFixed(5)}`); }
  });
}

async function applyResolvedStartLocation(latLng, shouldRoute = true) {
  const startInput = document.getElementById("start");
  if (!startInput) return;
  currentUserCoords = { lat: latLng.lat, lng: latLng.lng };
  const address = await reverseGeocodeLatLng(latLng);
  startInput.value = address;
  startInput.placeholder = t("gps_current");
  if (map) map.panTo(latLng);
  if (shouldRoute) tryCalculateRoutesFromInputs();
}

async function requestGPSPatched() {
  if (!navigator.geolocation) {
    const si = document.getElementById("start");
    if (si) si.placeholder = t("gps_unsupported");
    return;
  }
  setGpsLoading(true);
  const si = document.getElementById("start");
  if (si) si.placeholder = t("gps_detecting");

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      await applyResolvedStartLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }, true);
      setGpsLoading(false);
    },
    (err) => { handleGeoError(err); },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 10000 }
  );
}

async function requestGPS() { await requestGPSPatched(); }

function patchGpsEntrypoints() {
  const btn = document.getElementById("gps-btn");
  if (btn) btn.onclick = requestGPSPatched;
}

// ── Step Stability ──

function getDistanceToStepStartMeters(step, userLatLng) {
  if (!step?.start_location || !userLatLng) return null;
  return google.maps.geometry.spherical.computeDistanceBetween(userLatLng, step.start_location);
}

function isStepActuallyReached(step, userLatLng) {
  const d = getDistanceToStepEndMeters(step, userLatLng);
  return d != null && d <= STEP_REACHED_RADIUS_M;
}

function findBestCurrentStepIndex(routeObj, userLatLng, fromIndex) {
  const steps = routeObj.route.legs[0].steps;
  const now   = Date.now();
  const start = Math.max(0, fromIndex - 1);
  const end   = Math.min(steps.length - 1, fromIndex + 2);
  let bestIndex = fromIndex;
  let bestScore = Infinity;

  for (let i = start; i <= end; i++) {
    const step        = steps[i];
    const distToEnd   = getDistanceToStepEndMeters(step, userLatLng) ?? 999999;
    const distToStart = getDistanceToStepStartMeters(step, userLatLng) ?? 999999;
    const reachedPenalty = isStepActuallyReached(step, userLatLng) ? 1000 : 0;
    const futurePenalty  = i > fromIndex ? 120 : 0;
    const score = distToEnd + distToStart * 0.35 + futurePenalty + reachedPenalty;
    if (score < bestScore) { bestScore = score; bestIndex = i; }
  }

  if (bestIndex !== lastStableStepIndex && now - lastStepSwitchAt < STEP_SWITCH_COOLDOWN_MS) {
    return lastStableStepIndex;
  }
  if (bestIndex > fromIndex) {
    const distCurrentEnd = getDistanceToStepEndMeters(steps[fromIndex], userLatLng) ?? 999999;
    if (distCurrentEnd > NEXT_STEP_PREPARE_RADIUS_M) return fromIndex;
  }
  if (bestIndex !== lastStableStepIndex) { lastStableStepIndex = bestIndex; lastStepSwitchAt = now; }
  return bestIndex;
}

function getUpcomingMeaningfulStep(steps, currentIndex, routeObj) {
  for (let i = currentIndex + 1; i < steps.length; i++) {
    if (getStepWarningMeta(steps[i], routeObj.route)) return { index: i, step: steps[i] };
  }
  return null;
}

function getWarningPhaseForType(distanceMeters, type = "") {
  if (distanceMeters == null || !isFinite(distanceMeters)) return "none";
  const t = String(type || "").toLowerCase();
  const isExitLike = ["exit", "ramp", "fork"].includes(t);
  const isLaneLike = ["lane", "merge"].includes(t);
  const isUTurn = t === "uturn";
  if (distanceMeters <= 25) return "none";
  if (isExitLike) {
    if (distanceMeters <= 180) return "now";
    if (distanceMeters <= 700) return "soon";
    if (distanceMeters <= 1600) return "prepare";
    return "none";
  }
  if (isLaneLike) {
    if (distanceMeters <= 140) return "now";
    if (distanceMeters <= 520) return "soon";
    if (distanceMeters <= 1100) return "prepare";
    return "none";
  }
  if (isUTurn) {
    if (distanceMeters <= 120) return "now";
    if (distanceMeters <= 450) return "soon";
    if (distanceMeters <= 900) return "prepare";
    return "none";
  }
  if (distanceMeters <= 100) return "now";
  if (distanceMeters <= 350) return "soon";
  if (distanceMeters <= 800) return "prepare";
  return "none";
}

//  DAY 6.5 — Predictive Engine (+15 min departure)
// ============================================================

function getDepartureDecision(nowMin, laterMin, waitMinutes = 15) {
  const saving = nowMin - laterMin;

  if (saving >= 3) {
    return {
      type: "wait",
      waitMinutes,
      nowMin,
      laterMin,
      saving,
      confidence: "high",
      message: `Wait ${waitMinutes} min → smoother trip and save ${saving} min`
    };
  }

  if (saving <= -3) {
    return {
      type: "leave_now",
      waitMinutes,
      nowMin,
      laterMin,
      saving: Math.abs(saving),
      confidence: "high",
      message: `Leave now → traffic likely gets heavier soon`
    };
  }

  return {
    type: "neutral",
    waitMinutes,
    nowMin,
    laterMin,
    saving,
    confidence: "low",
    message: "No strong timing advantage"
  };
}

function renderPredictiveDecision() {
  var box = document.getElementById("predict-tip");
  if (box) { box.style.display = "none"; box.innerHTML = ""; }

  var card = document.getElementById("predictive-card");
  if (!card) return;

  // ---- helpers for inline hero wait-hint ----
  var waitHint  = document.getElementById("dh-wait-hint");
  var waitTimes = document.getElementById("dh-wait-times");
  var waitSave  = document.getElementById("dh-wait-save");

  function _hideWaitHint() {
    if (waitHint) waitHint.style.display = "none";
  }
  function _showWaitHint(timesText, saveText) {
    if (!waitHint) return;
    if (waitTimes) waitTimes.textContent = timesText;
    if (waitSave)  waitSave.textContent  = saveText;
    waitHint.style.display = "block";
  }

  if (!_departureDecision || _departureDecision.type === "neutral") {
    card.style.display = "none";
    _hideWaitHint();
    return;
  }

  var pcMain = document.getElementById("pc-main");
  var pcSub  = document.getElementById("pc-sub");
  var pcSave = document.getElementById("pc-save");

  if (_departureDecision.type === "wait" && _predictiveData) {
    // update inline hero hint
    var saving = (_predictiveData.nowMin || 0) - (_predictiveData.laterMin || 0);
    var timesText = "Wait " + _predictiveData.waitMinutes + " min \u2192 " + _predictiveData.laterMin + " min";
    var saveText  = saving > 0 ? "Save " + saving + " min" : "";
    _showWaitHint(timesText, saveText);

    // update predictive-card (action buttons)
    card.style.display = "flex";
    var titleEl = card.querySelector(".pc-title");
    if (titleEl) titleEl.textContent = "BETTER OPTION AHEAD";
    if (pcMain) pcMain.textContent = "Leave in " + _predictiveData.waitMinutes + " min \u2192 " + _predictiveData.laterMin + " min";
    if (pcSave && saving > 0) pcSave.textContent = "Save " + saving + " min";
    else if (pcSave) pcSave.textContent = "";
    if (pcSub) {
      var subHtml = _departureDecision.message;
      subHtml += '<div class="pc-actions">';
      subHtml += '<button type="button" class="pc-action-btn primary" onclick="scheduleDelayedStart()">Wait &amp; go later</button>';
      subHtml += '<button type="button" class="pc-action-btn secondary" onclick="goNowDecision()">Go now</button>';
      subHtml += "</div>";
      subHtml += '<div id="delayed-start-status" style="margin-top:8px;font-size:12px;color:#94a3b8;"></div>';
      pcSub.innerHTML = subHtml;
    }
    return;
  }

  if (_departureDecision.type === "leave_now") {
    _hideWaitHint();
    card.style.display = "flex";
    var titleEl2 = card.querySelector(".pc-title");
    if (titleEl2) titleEl2.textContent = "AI TIMING ADVICE";
    if (pcMain) pcMain.textContent = _departureDecision.message;
    if (pcSub) {
      pcSub.innerHTML = '<div class="pc-actions"><button type="button" class="pc-action-btn primary" onclick="goNowDecision()">Go now</button></div>';
    }
    if (pcSave) pcSave.textContent = "";
  }
}


function goNowDecision() {
  if (!_bestRoute) return;
  clearDelayedStartTimer();
  startDrive(_bestRoute.index);
}

function scheduleDelayedStart() {
  if (!_bestRoute || !_departureDecision || _departureDecision.type !== "wait") return;

  clearDelayedStartTimer();

  const waitMs = _departureDecision.waitMinutes * 60 * 1000;
  _delayedStartUntil = Date.now() + waitMs;

  updateDelayedStartStatus();

  _delayedStartTimer = setInterval(() => {
    const remainingMs = _delayedStartUntil - Date.now();

    if (remainingMs <= 0) {
      clearDelayedStartTimer();
      startDrive(_bestRoute.index);
      return;
    }

    updateDelayedStartStatus();
  }, 1000);
}

function updateDelayedStartStatus() {
  const el = document.getElementById("delayed-start-status");
  if (!el || !_delayedStartUntil) return;

  const remainingMs = Math.max(0, _delayedStartUntil - Date.now());
  const totalSec = Math.ceil(remainingMs / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;

  el.textContent = `Starting in ${min}:${String(sec).padStart(2, "0")}`;
}

function clearDelayedStartTimer() {
  if (_delayedStartTimer) {
    clearInterval(_delayedStartTimer);
    _delayedStartTimer = null;
  }
  _delayedStartUntil = null;
}

function runPredictiveCheck(origin, destination, nowBestMin) {
  _predictiveData = null;
  _departureDecision = null;

  if (!directionsService || !origin || !destination) return;

  const waitMinutes = 15;

  directionsService.route({
    origin,
    destination,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: false,
    drivingOptions: {
      departureTime: new Date(Date.now() + waitMinutes * 60 * 1000),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK" || !result.routes?.length) {
      renderPredictiveDecision();
      return;
    }

    const leg = result.routes[0].legs[0];
    const laterSec = (leg.duration_in_traffic || leg.duration).value;
    const laterMin = Math.round(laterSec / 60);

    _predictiveData = { laterMin, nowMin: nowBestMin, saving: nowBestMin - laterMin };
    _departureDecision = getDepartureDecision(nowBestMin, laterMin, waitMinutes);

    renderPredictiveDecision();
  });
}

function drawRoutes(result) {
  const alts = analyzedRoutes.filter(r => _bestRoute && r.index !== _bestRoute.index);
  const ordered = [...alts, ...(_bestRoute ? [_bestRoute] : [])];

  ordered.forEach(r => {
    const isBest = _bestRoute && r.index === _bestRoute.index;
    const renderer = new google.maps.DirectionsRenderer({
      map: map,
      directions: result,
      routeIndex: r.index,
      suppressMarkers: !isBest,
      preserveViewport: true,
      polylineOptions: {
        strokeColor: isBest ? "#22d3a0" : "#60a5fa",
        strokeOpacity: isBest ? 1 : 0.50,
        strokeWeight: isBest ? 6 : 4,
        zIndex: isBest ? 10 : 1
      }
    });
    renderers.push(renderer);
  });

  if (_bestRoute) map.fitBounds(_bestRoute.route.bounds);
}

// ТЗ7: One-line route "personality" — how the drive will feel
function generateRoutePersonality(best) {
  const hwy = best.highwayShare || 0;
  const turns = best.complexity || 0;
  const traffic = best.traffic;

  // Scenario 4 (priority): busy / complex → stressful drive
  if (turns >= 12 || traffic === "high") {
    return "Busy route — expect frequent actions";
  }
  // Scenario 1: smooth highway
  if (hwy >= 0.7 && turns <= 8) {
    return "Smooth highway drive";
  }
  // Scenario 3: city driving
  if (hwy < 0.3) {
    return "City driving with turns";
  }
  // Scenario 2: mixed (0.3 ≤ hwy < 0.7)
  if (hwy >= 0.3 && hwy < 0.7) {
    return "Mixed city and highway";
  }
  // Fallback
  return "Standard route";
}

// ТЗ6: One-line "when to go" timing insight for best route
function generateTimeInsight(best) {
  const delay = best.delayMinutes || 0;
  const traffic = best.traffic;

  // Scenario 3: bad — wait
  if (delay > 5 || traffic === "high") {
    return t("pred_consider");
  }
  // Scenario 1: ideal — go now
  if (delay <= 2 && traffic === "low") {
    return t("pred_best_now");
  }
  // Scenario 2: ok — light delays
  if (delay <= 5 && traffic === "medium") {
    return t("pred_good_time");
  }
  // Fallback
  return t("pred_stable");
}

// One-line AI decision — always comparative, always factual
function generateAIDecision(best, routes) {
  const road = getRouteSummaryName(best);
  const others = (routes || []).filter(r => r.index !== best.index);

  if (!others.length) {
    return `Best available route via ${road}`;
  }

  const fastestAlt = others.reduce((a, b) => (a.time < b.time ? a : b));
  const calmestAlt = others.reduce((a, b) =>
    trafficRank(a.traffic) < trafficRank(b.traffic) ? a :
    trafficRank(a.traffic) > trafficRank(b.traffic) ? b :
    (a.delayMinutes || 0) <= (b.delayMinutes || 0) ? a : b
  );
  const simplestAlt = others.reduce((a, b) =>
    (a.complexity || 0) <= (b.complexity || 0) ? a : b
  );

  const bestMin = getDisplayMinutes(best);
  const fastestAltMin = getDisplayMinutes(fastestAlt);
  const bestDelay = best.delayMinutes || 0;
  const fastestAltDelay = fastestAlt.delayMinutes || 0;
  const bestTurns = best.complexity || 0;
  const fastestAltTurns = fastestAlt.complexity || 0;

  const timeAdvantage = fastestAltMin - bestMin;
  const delayAdvantage = fastestAltDelay - bestDelay;
  const turnAdvantage = fastestAltTurns - bestTurns;

  // 1. Best is actually the fastest
  if (timeAdvantage >= 1) {
    if (best.tollCost === 0 && fastestAlt.tollCost > 0) {
      return `${timeAdvantage} min faster with no tolls via ${road}`;
    }
    if (delayAdvantage >= 2) {
      return `${timeAdvantage} min faster with less delay via ${road}`;
    }
    return `${timeAdvantage} min faster than alternatives via ${road}`;
  }

  // 2. Similar time, but avoids tolls
  if (best.tollCost === 0) {
    const paidCloseAlt = others.find(r =>
      r.tollCost > 0 && Math.abs(getDisplayMinutes(r) - bestMin) <= 3
    );
    if (paidCloseAlt) {
      return `No tolls with similar time via ${road}`;
    }
  }

  // 3. Similar/faster alternatives exist, but best is calmer
  if (trafficRank(best.traffic) < trafficRank(fastestAlt.traffic)) {
    return `Less traffic than faster routes via ${road}`;
  }

  // 4. Similar/faster alternatives exist, but best has less delay
  if (delayAdvantage >= 2) {
    return `${delayAdvantage} min less delay via ${road}`;
  }

  // 5. Similar/faster alternatives exist, but best is easier to drive
  if (turnAdvantage >= 2) {
    return `${turnAdvantage} fewer turns than alternatives via ${road}`;
  }

  // 6. Best is calmer than the calmest close-time route
  const closeAlt = others.find(r => Math.abs(getDisplayMinutes(r) - bestMin) <= 2);
  if (closeAlt && trafficRank(best.traffic) < trafficRank(closeAlt.traffic)) {
    return `Calmer drive with similar time via ${road}`;
  }

  // 7. Best is simpler than the simplest close-time route
  if (closeAlt && bestTurns < (closeAlt.complexity || 0)) {
    return `Simpler route with similar time via ${road}`;
  }

  // 8. Fallback
  return `Best overall balance via ${road}`;
}

// ТЗ5: Decision insight — only 3 types (paid / fast / no tolls)
function getRouteInsight(r, best, fastest) {
  if (r.index === best.index) return "";

  const routeName = getRouteSummaryName(r);
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);
  const delayDiff = (r.delayMinutes || 0) - (best.delayMinutes || 0);
  const turnDiff = (r.complexity || 0) - (best.complexity || 0);

  // Faster but more stressful
  if (timeDiff < 0) {
    if (trafficRank(r.traffic) > trafficRank(best.traffic)) {
      return `${Math.abs(timeDiff)} min faster, but busier`;
    }
    if (delayDiff > 1) {
      return `${Math.abs(timeDiff)} min faster, but more delay`;
    }
    if (turnDiff > 1) {
      return `${Math.abs(timeDiff)} min faster, but more turns`;
    }
    return `${Math.abs(timeDiff)} min faster via ${routeName}`;
  }

  // Similar time, but avoids tolls
  if (timeDiff >= 0 && timeDiff <= 3 && r.tollCost === 0 && best.tollCost > 0) {
    return `No tolls, only ${timeDiff} min slower`;
  }

  // Slightly slower, but calmer
  if (timeDiff > 0 && timeDiff <= 4 && trafficRank(r.traffic) < trafficRank(best.traffic)) {
    return `${timeDiff} min slower, but calmer traffic`;
  }

  // Slightly slower, but less delay
  if (timeDiff > 0 && timeDiff <= 4 && delayDiff < 0) {
    return `${timeDiff} min slower, but less delay`;
  }

  // Slightly slower, but easier
  if (timeDiff > 0 && timeDiff <= 4 && turnDiff < 0) {
    return `${timeDiff} min slower, but fewer turns`;
  }

  // Cheaper paid route
  if (r.tollCost < best.tollCost && r.tollCost > 0) {
    return `Lower toll cost`;
  }

  // Toll-free general
  if (r.tollCost === 0 && best.tollCost > 0) {
    return `Toll-free alternative`;
  }

  return "";
}

function getAlternativeTitle(r, best, fastest) {
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);

  if (r.index === fastest.index && r.index !== best.index) {
    return "Fastest option";
  }

  if (r.tollCost === 0 && best.tollCost > 0) {
    return "No tolls route";
  }

  if (trafficRank(r.traffic) < trafficRank(best.traffic) && timeDiff <= 3) {
    return "Calmer option";
  }

  if ((r.complexity || 0) < (best.complexity || 0) && timeDiff <= 3) {
    return "Simpler route";
  }

  if (timeDiff <= 2) {
    return `Similar time via ${getRouteSummaryName(r)}`;
  }

  return `Alternative via ${getRouteSummaryName(r)}`;
}

function getFallbackAlternativeInsight(r, best) {
  const routeName = getRouteSummaryName(r);
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);
  const delayDiff = (r.delayMinutes || 0) - (best.delayMinutes || 0);
  const turnDiff = (r.complexity || 0) - (best.complexity || 0);

  if (timeDiff < 0) {
    return `${Math.abs(timeDiff)} min faster via ${routeName}`;
  }

  if (timeDiff === 0 && r.tollCost < best.tollCost) {
    return `Same time, lower cost`;
  }

  if (timeDiff <= 2 && trafficRank(r.traffic) < trafficRank(best.traffic)) {
    return `Similar time, calmer traffic`;
  }

  if (timeDiff <= 2 && delayDiff < 0) {
    return `Similar time, less delay`;
  }

  if (timeDiff <= 3 && turnDiff < 0) {
    return `Similar time, fewer turns`;
  }

  if (r.tollCost === 0) {
    return `No tolls alternative`;
  }

  return `Alternative via ${routeName}`;
}

function generateNeutralWhy(route, bestRoute) {
  const points = [];
  const isBest = bestRoute && route.index === bestRoute.index;
  const diff = bestRoute ? getDisplayDiff(route, bestRoute) : 0;
  const absDiff = Math.abs(diff);

  if (isBest) {
    points.push(generateUnifiedDecisionWhy(route, analyzedRoutes));

    if ((route.delayMinutes || 0) === 0) {
      points.push("No added traffic delay right now");
    } else {
      points.push(`Includes about ${route.delayMinutes} min delay`);
    }

    if (route.tollCost > 0) {
      points.push(`${route.tollCost} AED tolls on this route`);
    } else {
      points.push("No tolls on this route");
    }
  } else {
    points.push(generateDecisionInsight(route, bestRoute));

    if (diff > 0) {
      points.push(`${absDiff} min slower than recommended`);
    } else if (diff < 0) {
      points.push(`${absDiff} min faster than recommended`);
    } else {
      points.push("Similar time to recommended");
    }

    if (route.tollCost > 0) {
      points.push(`${route.tollCost} AED tolls on this route`);
    } else {
      points.push("No tolls on this route");
    }
  }

  return points.filter(Boolean).slice(0, 3);
}

function generateDecisionInsight(route, bestRoute) {
  if (!bestRoute || route.index === bestRoute.index) return "";

  const diff = getDisplayDiff(route, bestRoute);
  const absDiff = Math.abs(diff);
  const routeDelay = route.delayMinutes || 0;
  const bestDelay = bestRoute.delayMinutes || 0;
  const routeTurns = route.complexity || 0;
  const bestTurns = bestRoute.complexity || 0;

  // Faster, but worse trade-off
  if (diff < 0) {
    if (trafficRank(route.traffic) > trafficRank(bestRoute.traffic)) {
      return `${absDiff} min faster, but busier`;
    }
    if (routeDelay > bestDelay + 1) {
      return `${absDiff} min faster, but more delay`;
    }
    if (routeTurns > bestTurns + 1) {
      return `${absDiff} min faster, but more turns`;
    }
    if (route.tollCost > bestRoute.tollCost) {
      return `${absDiff} min faster, but higher tolls`;
    }
    return `${absDiff} min faster alternative`;
  }

  // Slightly slower, but avoids tolls
  if (diff > 0 && diff <= 4 && route.tollCost === 0 && bestRoute.tollCost > 0) {
    return `${diff} min slower, but no tolls`;
  }

  // Slightly slower, but calmer
  if (diff > 0 && diff <= 4 && trafficRank(route.traffic) < trafficRank(bestRoute.traffic)) {
    return `${diff} min slower, but calmer traffic`;
  }

  // Slightly slower, but less delay
  if (diff > 0 && diff <= 4 && routeDelay < bestDelay) {
    return `${diff} min slower, but less delay`;
  }

  // Slightly slower, but simpler
  if (diff > 0 && diff <= 4 && routeTurns < bestTurns) {
    return `${diff} min slower, but fewer turns`;
  }

  // Similar time, but lower tolls
  if (diff === 0 && route.tollCost < bestRoute.tollCost) {
    return "Similar time, lower toll cost";
  }

  // Similar time, but calmer
  if (Math.abs(diff) <= 1 && trafficRank(route.traffic) < trafficRank(bestRoute.traffic)) {
    return "Similar time, calmer traffic";
  }

  return `Alternative via ${getRouteSummaryName(route)}`;
}

// ============================================================

// ============================================================
function _tz1Minutes(route) {
  if (!route) return 0;
  if (typeof route.durationMin === "number") return route.durationMin;
  if (typeof route.time === "number") return Math.round(route.time / 60);
  return 0;
}

function _tz1TrafficRank(level) {
  if (level === "low" || level === "stable") return 1;
  if (level === "medium" || level === "moderate") return 2;
  if (level === "high" || level === "heavy") return 3;
  return 2;
}

function _tz1EscapeHTML(value) {
  return String(value == null ? "" : value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function _tz1RouteName(route) {
  try {
    return getRouteSummaryName(route);
  } catch (e) {
    return route && route.displayIndex ? "Route " + route.displayIndex : "route";
  }
}

function _tz2Number(value, fallback) {
  const n = Number(value);
  return Number.isFinite(n) ? n : fallback;
}

function _tz2Delay(route) {
  return Math.max(0, _tz2Number(route && route.delayMinutes, 0));
}

function _tz2Complexity(route) {
  return Math.max(0, _tz2Number(route && route.complexity, 0));
}

function _tz2Turns(route) {
  return Math.max(0, _tz2Number(route && (route.turnsCount || route.stopsCount || route.complexity), 0));
}

function _tz2TollCost(route) {
  return Math.max(0, _tz2Number(route && (route.tollCost || (route.hasToll ? 4 : 0)), 0));
}

function _tz2HighwayShare(route) {
  return Math.max(0, Math.min(1, _tz2Number(route && route.highwayShare, 0)));
}

function _tz2TrafficLabel(route) {
  const rank = _tz1TrafficRank(route && route.traffic);
  if (rank <= 1) return "light traffic";
  if (rank === 2) return "moderate traffic";
  return "heavy traffic";
}

function _tz2BuildScoreBreakdown(route) {
  const durationMin = _tz1Minutes(route);
  const trafficRank = _tz1TrafficRank(route && route.traffic);
  const delayMin = _tz2Delay(route);
  const turns = _tz2Turns(route);
  const complexity = _tz2Complexity(route);
  const tollCost = _tz2TollCost(route);
  const highwayShare = _tz2HighwayShare(route);
  const stressScore = typeof calculateDriveStress === "function" ? calculateDriveStress(route) : 0;

  const timeCost = durationMin;
  const trafficPenalty = trafficRank * 4 + delayMin * 1.7;
  const complexityPenalty = complexity * 1.35;
  const turnsPenalty = turns * 0.55;
  const tollPenalty = tollCost > 0 ? 4 + Math.min(8, tollCost * 0.45) : 0;
  const stressPenalty = stressScore ? stressScore * 0.65 : 0;
  const stabilityBonus = highwayShare >= 0.45 && trafficRank <= 2 ? -3 : highwayShare < 0.2 && complexity > 8 ? 2 : 0;

  const total = timeCost + trafficPenalty + complexityPenalty + turnsPenalty + tollPenalty + stressPenalty + stabilityBonus;
  const stabilityScore = Math.max(0, Math.min(100, Math.round(100 - trafficRank * 11 - delayMin * 2.2 - complexity * 1.6 - turns * 0.55 + highwayShare * 12)));

  return {
    timeCost,
    trafficPenalty,
    complexityPenalty,
    turnsPenalty,
    tollPenalty,
    stressPenalty,
    stabilityBonus,
    total,
    stabilityScore,
    durationMin,
    trafficRank,
    delayMin,
    turns,
    complexity,
    tollCost,
    highwayShare,
    stressScore
  };
}

function _tz2CompareMetric(best, others, getter, direction) {
  if (!best || !others || !others.length) return null;
  const bestValue = getter(best);
  const values = others.map(getter).filter(Number.isFinite);
  if (!values.length) return null;
  const target = direction === "lower" ? Math.min.apply(null, values) : Math.max.apply(null, values);
  return { bestValue, target, diff: direction === "lower" ? target - bestValue : bestValue - target };
}

function _tz2BuildWhy(best, routes) {
  if (!best) return "Route is being calculated";
  const others = (routes || []).filter(function(r) { return r && r.index !== best.index; });
  const road = _tz1RouteName(best);
  if (!others.length) return "Best available route via " + road;

  const reasons = [];
  const time = _tz2CompareMetric(best, others, _tz1Minutes, "lower");
  const delay = _tz2CompareMetric(best, others, _tz2Delay, "lower");
  const traffic = _tz2CompareMetric(best, others, function(r) { return _tz1TrafficRank(r.traffic); }, "lower");
  const turns = _tz2CompareMetric(best, others, _tz2Turns, "lower");
  const tolls = _tz2CompareMetric(best, others, _tz2TollCost, "lower");
  const stability = _tz2CompareMetric(best, others, function(r) { return _tz2BuildScoreBreakdown(r).stabilityScore; }, "higher");

  if (time && time.diff >= 2) reasons.push(time.diff + " min faster");
  if (traffic && traffic.diff >= 1) reasons.push("lighter traffic");
  if (delay && delay.diff >= 3) reasons.push(delay.diff + " min less delay");
  if (turns && turns.diff >= 3) reasons.push("fewer turns");
  if (tolls && tolls.diff > 0) reasons.push("lower toll cost");

      const safeRoute = tz6GetSafeDriveRoute(activeDriveRouteIndex || (selectedRoute && selectedRoute.index));
      if (!safeRoute) {
        tz6SetDriveFallback(TZ6_ROUTE_FALLBACK_MESSAGE, null);
        return;
      }
      if (!directionsService || typeof directionsService.route !== "function" || !tz6IsGoogleMapsReady()) {
        tz6SetDriveFallback("Off-route detected · recalculation unavailable", safeRoute);
        return;
      }
      try {
        return tz6OriginalHandleOffRouteRecalculation.apply(this, arguments);
      } catch (e) {
        tz6LogSafe("handleOffRouteRecalculation", e);
        tz6SetDriveFallback("Off-route detected · keep current route", safeRoute);
      }
    };
  }

  const tz6OriginalEvaluateReroute = typeof evaluateReroute === "function" ? evaluateReroute : null;
  if (tz6OriginalEvaluateReroute) {
    evaluateReroute = function(currentRoute, routes) {
      try {
        if (!currentRoute || !Array.isArray(routes) || routes.filter(Boolean).length < 2) return null;
        return tz6OriginalEvaluateReroute.apply(this, arguments);
      } catch (e) {
        tz6LogSafe("evaluateReroute", e);
        return null;
      }
    };
  }

  const tz6OriginalSwitchToAlternative = typeof switchToAlternative === "function" ? switchToAlternative : null;
  if (tz6OriginalSwitchToAlternative) {
    switchToAlternative = function() {
      try {
        const route = tz6GetSafeDriveRoute(betterRouteIndex);
        if (!route) {
          if (typeof dismissAlert === "function") dismissAlert();
          tz6SetDriveFallback("Alternative unavailable · keeping current route", selectedRoute);
          return;
        }
        return tz6OriginalSwitchToAlternative.apply(this, arguments);
      } catch (e) {
        tz6LogSafe("switchToAlternative", e);
        if (typeof dismissAlert === "function") dismissAlert();
        tz6SetDriveFallback("Switch unavailable · keeping current route", selectedRoute);
      }
    };
  }

  const tz6OriginalDismissAlert = typeof dismissAlert === "function" ? dismissAlert : null;
  if (tz6OriginalDismissAlert) {
    dismissAlert = function() {
      try {
        return tz6OriginalDismissAlert.apply(this, arguments);
      } catch (e) {
        tz6LogSafe("dismissAlert", e);
        const alert = tz6Element("drive-alert");
        if (alert) alert.classList.remove("visible");
        _rerouteDismissedUntil = Date.now() + 90000;
      }
    };
  }

  window.clearRoadTZ6Safety = {
    isFallback: function() { return tz6FallbackMode; },
    reason: function() { return tz6FallbackReason; },
    safeRoute: tz6GetSafeDriveRoute
  };
})();
