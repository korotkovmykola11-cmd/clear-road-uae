// ТЗ7: One-line route "personality" — how the drive will feel
function generateRoutePersonality(best) {
  const hwy = best.highwayShare || 0;
  const turns = best.complexity || 0;
  const traffic = best.traffic;

  // Scenario 4 (priority): busy / complex → stressful drive
  if (turns >= 12 || traffic === "high") {
    return "Busy route — expect frequent actions";
  }
  // Scenario 1: smooth highway
  if (hwy >= 0.7 && turns <= 8) {
    return "Smooth highway drive";
  }
  // Scenario 3: city driving
  if (hwy < 0.3) {
    return "City driving with turns";
  }
  // Scenario 2: mixed (0.3 ≤ hwy < 0.7)
  if (hwy >= 0.3 && hwy < 0.7) {
    return "Mixed city and highway";
  }
  // Fallback
  return "Standard route";
}

// ТЗ6: One-line "when to go" timing insight for best route
function generateTimeInsight(best) {
  const delay = best.delayMinutes || 0;
  const traffic = best.traffic;

  // Scenario 3: bad — wait
  if (delay > 5 || traffic === "high") {
    return t("pred_consider");
  }
  // Scenario 1: ideal — go now
  if (delay <= 2 && traffic === "low") {
    return t("pred_best_now");
  }
  // Scenario 2: ok — light delays
  if (delay <= 5 && traffic === "medium") {
    return t("pred_good_time");
  }
  // Fallback
  return t("pred_stable");
}

// One-line AI decision — always comparative, always factual
function generateAIDecision(best, routes) {
  const road = getRouteSummaryName(best);
  const others = (routes || []).filter(r => r.index !== best.index);

  if (!others.length) {
    return `Best available route via ${road}`;
  }

  const fastestAlt = others.reduce((a, b) => (a.time < b.time ? a : b));
  const calmestAlt = others.reduce((a, b) =>
    trafficRank(a.traffic) < trafficRank(b.traffic) ? a :
    trafficRank(a.traffic) > trafficRank(b.traffic) ? b :
    (a.delayMinutes || 0) <= (b.delayMinutes || 0) ? a : b
  );
  const simplestAlt = others.reduce((a, b) =>
    (a.complexity || 0) <= (b.complexity || 0) ? a : b
  );

  const bestMin = getDisplayMinutes(best);
  const fastestAltMin = getDisplayMinutes(fastestAlt);
  const bestDelay = best.delayMinutes || 0;
  const fastestAltDelay = fastestAlt.delayMinutes || 0;
  const bestTurns = best.complexity || 0;
  const fastestAltTurns = fastestAlt.complexity || 0;

  const timeAdvantage = fastestAltMin - bestMin;
  const delayAdvantage = fastestAltDelay - bestDelay;
  const turnAdvantage = fastestAltTurns - bestTurns;

  // 1. Best is actually the fastest
  if (timeAdvantage >= 1) {
    if (best.tollCost === 0 && fastestAlt.tollCost > 0) {
      return `${timeAdvantage} min faster with no tolls via ${road}`;
    }
    if (delayAdvantage >= 2) {
      return `${timeAdvantage} min faster with less delay via ${road}`;
    }
    return `${timeAdvantage} min faster than alternatives via ${road}`;
  }

  // 2. Similar time, but avoids tolls
  if (best.tollCost === 0) {
    const paidCloseAlt = others.find(r =>
      r.tollCost > 0 && Math.abs(getDisplayMinutes(r) - bestMin) <= 3
    );
    if (paidCloseAlt) {
      return `No tolls with similar time via ${road}`;
    }
  }

  // 3. Similar/faster alternatives exist, but best is calmer
  if (trafficRank(best.traffic) < trafficRank(fastestAlt.traffic)) {
    return `Less traffic than faster routes via ${road}`;
  }

  // 4. Similar/faster alternatives exist, but best has less delay
  if (delayAdvantage >= 2) {
    return `${delayAdvantage} min less delay via ${road}`;
  }

  // 5. Similar/faster alternatives exist, but best is easier to drive
  if (turnAdvantage >= 2) {
    return `${turnAdvantage} fewer turns than alternatives via ${road}`;
  }

  // 6. Best is calmer than the calmest close-time route
  const closeAlt = others.find(r => Math.abs(getDisplayMinutes(r) - bestMin) <= 2);
  if (closeAlt && trafficRank(best.traffic) < trafficRank(closeAlt.traffic)) {
    return `Calmer drive with similar time via ${road}`;
  }

  // 7. Best is simpler than the simplest close-time route
  if (closeAlt && bestTurns < (closeAlt.complexity || 0)) {
    return `Simpler route with similar time via ${road}`;
  }

  // 8. Fallback
  return `Best overall balance via ${road}`;
}

// ТЗ5: Decision insight — only 3 types (paid / fast / no tolls)
function getRouteInsight(r, best, fastest) {
  if (r.index === best.index) return "";

  const routeName = getRouteSummaryName(r);
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);
  const delayDiff = (r.delayMinutes || 0) - (best.delayMinutes || 0);
  const turnDiff = (r.complexity || 0) - (best.complexity || 0);

  // Faster but more stressful
  if (timeDiff < 0) {
    if (trafficRank(r.traffic) > trafficRank(best.traffic)) {
      return `${Math.abs(timeDiff)} min faster, but busier`;
    }
    if (delayDiff > 1) {
      return `${Math.abs(timeDiff)} min faster, but more delay`;
    }
    if (turnDiff > 1) {
      return `${Math.abs(timeDiff)} min faster, but more turns`;
    }
    return `${Math.abs(timeDiff)} min faster via ${routeName}`;
  }

  // Similar time, but avoids tolls
  if (timeDiff >= 0 && timeDiff <= 3 && r.tollCost === 0 && best.tollCost > 0) {
    return `No tolls, only ${timeDiff} min slower`;
  }

  // Slightly slower, but calmer
  if (timeDiff > 0 && timeDiff <= 4 && trafficRank(r.traffic) < trafficRank(best.traffic)) {
    return `${timeDiff} min slower, but calmer traffic`;
  }

  // Slightly slower, but less delay
  if (timeDiff > 0 && timeDiff <= 4 && delayDiff < 0) {
    return `${timeDiff} min slower, but less delay`;
  }

  // Slightly slower, but easier
  if (timeDiff > 0 && timeDiff <= 4 && turnDiff < 0) {
    return `${timeDiff} min slower, but fewer turns`;
  }

  // Cheaper paid route
  if (r.tollCost < best.tollCost && r.tollCost > 0) {
    return `Lower toll cost`;
  }

  // Toll-free general
  if (r.tollCost === 0 && best.tollCost > 0) {
    return `Toll-free alternative`;
  }

  return "";
}

function getAlternativeTitle(r, best, fastest) {
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);

  if (r.index === fastest.index && r.index !== best.index) {
    return "Fastest option";
  }

  if (r.tollCost === 0 && best.tollCost > 0) {
    return "No tolls route";
  }

  if (trafficRank(r.traffic) < trafficRank(best.traffic) && timeDiff <= 3) {
    return "Calmer option";
  }

  if ((r.complexity || 0) < (best.complexity || 0) && timeDiff <= 3) {
    return "Simpler route";
  }

  if (timeDiff <= 2) {
    return `Similar time via ${getRouteSummaryName(r)}`;
  }

  return `Alternative via ${getRouteSummaryName(r)}`;
}

function getFallbackAlternativeInsight(r, best) {
  const routeName = getRouteSummaryName(r);
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);
  const delayDiff = (r.delayMinutes || 0) - (best.delayMinutes || 0);
  const turnDiff = (r.complexity || 0) - (best.complexity || 0);

  if (timeDiff < 0) {
    return `${Math.abs(timeDiff)} min faster via ${routeName}`;
  }

  if (timeDiff === 0 && r.tollCost < best.tollCost) {
    return `Same time, lower cost`;
  }

  if (timeDiff <= 2 && trafficRank(r.traffic) < trafficRank(best.traffic)) {
    return `Similar time, calmer traffic`;
  }

  if (timeDiff <= 2 && delayDiff < 0) {
    return `Similar time, less delay`;
  }

  if (timeDiff <= 3 && turnDiff < 0) {
    return `Similar time, fewer turns`;
  }

  if (r.tollCost === 0) {
    return `No tolls alternative`;
  }

  return `Alternative via ${routeName}`;
}

function generateNeutralWhy(route, bestRoute) {
  const points = [];
  const isBest = bestRoute && route.index === bestRoute.index;
  const diff = bestRoute ? getDisplayDiff(route, bestRoute) : 0;
  const absDiff = Math.abs(diff);

  if (isBest) {
    points.push(generateUnifiedDecisionWhy(route, analyzedRoutes));

    if ((route.delayMinutes || 0) === 0) {
      points.push("No added traffic delay right now");
    } else {
      points.push(`Includes about ${route.delayMinutes} min delay`);
    }

    if (route.tollCost > 0) {
      points.push(`${route.tollCost} AED tolls on this route`);
    } else {
      points.push("No tolls on this route");
    }
  } else {
    points.push(generateDecisionInsight(route, bestRoute));

    if (diff > 0) {
      points.push(`${absDiff} min slower than recommended`);
    } else if (diff < 0) {
      points.push(`${absDiff} min faster than recommended`);
    } else {
      points.push("Similar time to recommended");
    }

    if (route.tollCost > 0) {
      points.push(`${route.tollCost} AED tolls on this route`);
    } else {
      points.push("No tolls on this route");
    }
  }

  return points.filter(Boolean).slice(0, 3);
}

function generateDecisionInsight(route, bestRoute) {
  if (!bestRoute || route.index === bestRoute.index) return "";

  const diff = getDisplayDiff(route, bestRoute);
  const absDiff = Math.abs(diff);
  const routeDelay = route.delayMinutes || 0;
  const bestDelay = bestRoute.delayMinutes || 0;
  const routeTurns = route.complexity || 0;
  const bestTurns = bestRoute.complexity || 0;

  // Faster, but worse trade-off
  if (diff < 0) {
    if (trafficRank(route.traffic) > trafficRank(bestRoute.traffic)) {
      return `${absDiff} min faster, but busier`;
    }
    if (routeDelay > bestDelay + 1) {
      return `${absDiff} min faster, but more delay`;
    }
    if (routeTurns > bestTurns + 1) {
      return `${absDiff} min faster, but more turns`;
    }
    if (route.tollCost > bestRoute.tollCost) {
      return `${absDiff} min faster, but higher tolls`;
    }
    return `${absDiff} min faster alternative`;
  }

  // Slightly slower, but avoids tolls
  if (diff > 0 && diff <= 4 && route.tollCost === 0 && bestRoute.tollCost > 0) {
    return `${diff} min slower, but no tolls`;
  }

  // Slightly slower, but calmer
  if (diff > 0 && diff <= 4 && trafficRank(route.traffic) < trafficRank(bestRoute.traffic)) {
    return `${diff} min slower, but calmer traffic`;
  }

  // Slightly slower, but less delay
  if (diff > 0 && diff <= 4 && routeDelay < bestDelay) {
    return `${diff} min slower, but less delay`;
  }

  // Slightly slower, but simpler
  if (diff > 0 && diff <= 4 && routeTurns < bestTurns) {
    return `${diff} min slower, but fewer turns`;
  }

  // Similar time, but lower tolls
  if (diff === 0 && route.tollCost < bestRoute.tollCost) {
    return "Similar time, lower toll cost";
  }

  // Similar time, but calmer
  if (Math.abs(diff) <= 1 && trafficRank(route.traffic) < trafficRank(bestRoute.traffic)) {
    return "Similar time, calmer traffic";
  }

  return `Alternative via ${getRouteSummaryName(route)}`;
}

function openRouteDetails(index) {
  const r = analyzedRoutes.find(x => x.index === index);
  if (!r) return;

  const best = _bestRoute;
  if (!best) return;

  const isBest = r.index === best.index;
  const whyPoints = generateNeutralWhy(r, best);
  const segments = buildRouteSegments(r);

  const distKm = (r.distance / 1000).toFixed(1);
  const delayText = (r.delayMinutes || 0) === 0 ? "0 min" : `+${r.delayMinutes} min`;
  const tollText = r.tollCost > 0 ? `${r.tollCost} AED` : "No tolls";
  const trafficText = toTitleCaseLabel(getTrafficText(r.traffic));
  const highwayPct = Math.round(r.highwayShare * 100);

  const compareNote = !isBest
    ? `<div class="comparison-note">${generateDecisionInsight(r, best)}</div>`
    : "";

  const segmentsHtml = segments.length > 0 ? `
    <div class="detail-section">
      <div class="detail-section-title">Route breakdown</div>
      <div class="segment-list">
        ${segments.map(seg => `
          <div class="segment-item">
            <div class="segment-icon ${seg.type}">${seg.icon}</div>
            <div class="segment-content">
              <div class="segment-title">${seg.title}</div>
              <div class="segment-details">${seg.details}</div>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  ` : "";

  document.getElementById("modal-content").innerHTML = `
    <div class="modal-handle"></div>

    <div class="modal-header">
      <div>
        <h2 class="modal-title">${getRouteSummaryName(r)}</h2>
      </div>
      <span class="modal-role-badge ${isBest ? "recommended" : "alternative"}">
        ${isBest ? t("modal_recommended") : t("modal_alternative")}
      </span>
    </div>

    ${compareNote}

    <div class="modal-why">
      <div class="modal-why-title">${isBest ? t("modal_why_title") : t("modal_tradeoff")}</div>
      <ul class="modal-why-points">
        ${whyPoints.map(point => `<li>${point}</li>`).join("")}
      </ul>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">${t("modal_key_facts")}</div>
      <div class="detail-grid">
        <div class="detail-item">
          <div class="detail-label">${t("modal_time")}</div>
          <div class="detail-value">${getDisplayMinutes(r)} min</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">${t("modal_distance")}</div>
          <div class="detail-value">${distKm} km</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">${t("modal_delay")}</div>
          <div class="detail-value">${delayText}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">${t("modal_tolls")}</div>
          <div class="detail-value" style="font-size:14px">${tollText}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">${t("modal_traffic")}</div>
          <div class="detail-value" style="font-size:14px">${trafficText}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">${t("modal_turns")}</div>
          <div class="detail-value">${r.complexity}</div>
        </div>
        <div class="detail-item full-width">
          <div class="detail-label">${t("modal_highway")}</div>
          <div class="detail-value">${highwayPct}%</div>
        </div>
      </div>
    </div>

    ${segmentsHtml}

    <button class="modal-cta" onclick="startDrive(${r.index})">
      ${isBest ? `${t("modal_go")} ${getRouteSummaryName(r)}` : `${t("modal_try")} ${getRouteSummaryName(r)}`}
    </button>
  `;

  document.getElementById("modal-overlay").classList.add("visible");
}

function closeModal(event) {
  if (event.target.id === "modal-overlay" || event.target.classList.contains("modal-cta")) {
    document.getElementById("modal-overlay").classList.remove("visible");
  }
}

// ============================================================
//  QUICK ACCESS — Saved Places (Home / Work) via localStorage
// ============================================================

// ── Route Filters ──
const FILTERS_KEY = "clearRoadUAE.filters.v1";
let userFilters = (() => {
  try { return Object.assign({ avoid_highways: false, fewer_turns: false }, JSON.parse(localStorage.getItem(FILTERS_KEY))); }
  catch { return { avoid_highways: false, fewer_turns: false }; }
})();

function toggleFilter(key) {
  if (!(key in userFilters)) return;
  userFilters[key] = !userFilters[key];
  try { localStorage.setItem(FILTERS_KEY, JSON.stringify(userFilters)); } catch {}
  document.querySelectorAll(".filter-btn").forEach(b =>
    b.classList.toggle("active", !!userFilters[b.dataset.filter])
  );
  calculateRoutes();
}

const SAVED_PLACES_KEY = "clearRoadUAE.savedPlaces.v1";

function getSavedPlaces() {
  try {
    const raw = localStorage.getItem(SAVED_PLACES_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function getSavedPlace(type) {
  const places = getSavedPlaces();
  const v = places[type];
  return (typeof v === "string" && v.trim()) ? v.trim() : null;
}

function savePlace(type, value) {
  if (typeof value !== "string" || !value.trim()) return false;
  try {
    const places = getSavedPlaces();
    places[type] = value.trim();
    localStorage.setItem(SAVED_PLACES_KEY, JSON.stringify(places));
    return true;
  } catch (e) {
    return false;
  }
}

// Triggered by single-click on Home/Work quick-item
function setDestination(place) {
  let address = getSavedPlace(place);

  if (!address) {
    // First-time: ask for address
    const input = window.prompt(`Enter your ${place} address:`);
    if (input === null) return;          // user cancelled
    const trimmed = input.trim();
    if (!trimmed) return;                // don't overwrite with empty
    if (!savePlace(place, trimmed)) return;
    address = trimmed;
  }

  const endField = document.getElementById("end");
  if (!endField) return;
  endField.value = address;
  if (typeof calculateRoutes === "function") {
    calculateRoutes();
  }
}

// Triggered by double-click — lets the user update a saved place without UI change
function updateSavedPlace(place) {
  const current = getSavedPlace(place) || "";
  const input = window.prompt(`Update your ${place} address:`, current);
  if (input === null) return;
  const trimmed = input.trim();
  if (!trimmed) return;                  // don't overwrite with empty
  if (!savePlace(place, trimmed)) return;
  const endField = document.getElementById("end");
  if (endField) endField.value = trimmed;
  if (typeof calculateRoutes === "function") calculateRoutes();
}

// ============================================================
//  USER PREFERENCE — Balanced / Fastest / No tolls (localStorage)
// ============================================================

function getUserPreference() {
  const v = localStorage.getItem("clearRoadUAE.pref") || "balanced";
  return ["balanced","fastest","no_tolls"].includes(v) ? v : "balanced";
}

function setUserPreference(value) {
  if (!["balanced","fastest","no_tolls"].includes(value)) return;
  localStorage.setItem("clearRoadUAE.pref", value);
  document.querySelectorAll(".pref-btn").forEach(btn =>
    btn.classList.toggle("active", btn.dataset.pref === value)
  );
  calculateRoutes();
}

// init language on load
setLang(currentLang);

// sync active button on script load (DOM already built at this point)
document.querySelectorAll(".pref-btn").forEach(b =>
  b.classList.toggle("active", b.dataset.pref === getUserPreference())
);
document.querySelectorAll(".filter-btn").forEach(b =>
  b.classList.toggle("active", !!userFilters[b.dataset.filter])
);
