<script>
let map, directionsService, renderers = [];
let lastResult = null;

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 25.2048, lng: 55.2708 },
    zoom: 11,
  });

  directionsService = new google.maps.DirectionsService();
}

function calculateRoutes() {
  clearRoutes();

  const start = document.getElementById("start").value.trim();
  const end = document.getElementById("end").value.trim();

  if (!start || !end) {
    document.getElementById("routes").innerHTML =
      '<div class="error">Please enter both start and destination.</div>';
    return;
  }

  directionsService.route({
    origin: start,
    destination: end,
    travelMode: 'DRIVING',
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: 'bestguess'
    }
  }, (result, status) => {

    if (status !== 'OK') {
      document.getElementById("routes").innerHTML =
        `<div class="error">Route request failed: ${status}</div>`;
      return;
    }

    lastResult = result;

    let routes = result.routes;
    let bestIndex = 0;
    let bestScore = Infinity;

    let analyzed = routes.map((route, i) => {

      let leg = route.legs[0];

      let time = leg.duration_in_traffic
        ? leg.duration_in_traffic.value
        : leg.duration.value;

      let distance = leg.distance.value;
      let stops = leg.steps.length;
      let trafficLevel = time / distance;

      // 🔥 НОВОЕ — анализ маршрута
      let highwayBonus = 0;
      let penalty = 0;

      let summary = route.summary || "";

      if (summary.includes("E11") || summary.includes("E311")) {
        highwayBonus -= 300; // лучше (быстрее, меньше светофоров)
      }

      if (stops > 20) {
        penalty += 200; // много остановок = плохо
      }

      // 🔥 НОВЫЙ SCORE
      let score = time + (stops * 30) + penalty + highwayBonus;

      if (score < bestScore) {
        bestScore = score;
        bestIndex = i;
      }

      return {
        route,
        time,
        distance,
        stops,
        trafficLevel,
        score,
        index: i,
        highway: highwayBonus < 0
      };
    });

    analyzed.forEach((r, i) => {
      drawRoute(result, r.index, i === bestIndex);
      renderCard(r, i, i === bestIndex);
    });
  });
}

function drawRoute(fullResult, routeIndex, isBest) {
  let renderer = new google.maps.DirectionsRenderer({
    map: map,
    directions: fullResult,
    routeIndex: routeIndex,
    polylineOptions: {
      strokeColor: isBest ? "green" : "gray",
      strokeWeight: isBest ? 6 : 4
    },
    suppressMarkers: false,
    preserveViewport: routeIndex !== 0
  });

  renderers.push(renderer);
}

function renderCard(r, index, isBest) {
  let div = document.createElement("div");
  div.className = "route";
  if (isBest) div.classList.add("best");

  let minutes = Math.round(r.time / 60);
  let km = (r.distance / 1000).toFixed(1);

  let badges = [];

  if (isBest) badges.push("Лучший маршрут");
  if (r.stops <= 16) badges.push("Меньше светофоров");
  if (r.stops >= 20) badges.push("Много остановок");

  if (minutes <= 27) badges.push("Быстрее сейчас");
  if (minutes >= 30) badges.push("Дольше по времени");

  if (r.highway) badges.push("Хайвей");

  if (r.trafficLevel < 0.0011) {
    badges.push("Меньше пробок");
  } else if (r.trafficLevel > 0.0013) {
    badges.push("Плотный трафик");
  } else {
    badges.push("Средний трафик");
  }

  let mainReason = isBest
    ? "Рекомендуем: самый быстрый и плавный маршрут"
    : "Альтернативный вариант";

  div.innerHTML = `
    <b>Route ${index + 1}</b><br>
    ⏱ ${minutes} min<br>
    📏 ${km} km<br>
    🚦 Stops: ${r.stops}<br>
    <div style="margin-top:8px; font-weight:600;">${mainReason}</div>
    <div style="margin-top:8px;">
      ${badges.map(b => `<span class="tag">${b}</span>`).join(" ")}
    </div>
  `;

  div.onclick = () => {
    if (r.route.bounds) {
      map.fitBounds(r.route.bounds);
    }
  };

  document.getElementById("routes").appendChild(div);
}

function clearRoutes() {
  renderers.forEach(r => r.setMap(null));
  renderers = [];
  lastResult = null;
  document.getElementById("routes").innerHTML = "";
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDLG6edII5ZKCffP_4qnwiNWg2X9IaLMM4&callback=initMap" async defer></script>

</body>
