<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clear Road UAE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0A0B0D">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: hsl(220 14% 5%);
        --surface: hsl(220 12% 7%);
        --surface2: hsl(220 11% 10%);
        --surface3: hsl(220 10% 14%);
        --green: hsl(72 96% 56%);
        --green-dim: hsl(72 80% 45%);
        --green-glow: hsla(72,96%,56%,0.15);
        --blue: hsl(210 90% 60%);
        --amber: hsl(38 95% 58%);
        --text: hsl(30 10% 96%);
        --text2: hsl(220 8% 56%);
        --text3: hsl(220 10% 40%);
        --border: hsl(220 10% 14%);
        --border2: hsl(220 10% 20%);
        --shadow-elev: 0 20px 60px -20px rgba(0,0,0,.6), 0 8px 24px -8px rgba(0,0,0,.4);
        --shadow-glow: 0 0 60px -10px hsla(72,96%,56%,.35);
      }

      body {
        font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding-bottom: 80px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "ss01", "cv11", "tnum";
      }

      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
      ::selection { background: hsla(72,96%,56%,.3); color: var(--text); }

      /* ===== HERO SECTION (map background) ===== */
      .hero-section {
        position: relative;
        height: 16vh;
        min-height: 100px;
        max-height: 140px;
        background: hsl(220 16% 9%);
        overflow: hidden;
        flex-shrink: 0;
      }
      .hero-section::after {
        content: "";
        position: absolute; left: 0; right: 0; bottom: 0;
        height: 55%;
        background: linear-gradient(180deg, transparent, var(--bg) 80%);
        pointer-events: none;
      }

      #map { width: 100%; height: 100%; }

      /* TOP FLOATING BAR */
      .top-bar {
        position: absolute;
        top: max(env(safe-area-inset-top), 0.75rem); 
        left: 1rem; right: 1rem;
        display: flex;
        align-items: center;
        gap: 0.625rem;
        z-index: 10;
      }

      .top-btn {
        display: grid; place-items: center;
        height: 2.5rem; width: 2.5rem;
        border-radius: 1rem;
        background: hsla(220,10%,14%,.7);
        border: 1px solid hsla(220,10%,20%,.35);
        color: hsla(30,10%,96%,.72);
        cursor: pointer; flex-shrink: 0;
        transition: background 0.15s ease;
      }
      .top-btn:hover { background: hsl(220 10% 18%); }

      .route-panel {
        flex: 1;
        background: hsla(220,11%,10%,.55);
        backdrop-filter: blur(16px) saturate(120%);
        -webkit-backdrop-filter: blur(16px) saturate(120%);
        border: 1px solid hsla(220,10%,20%,.5);
        border-radius: 14px;
        padding: 0.5rem;
        overflow: hidden;
      }

      .route-row {
        display: flex; align-items: center; gap: 0.75rem;
        padding: 0.625rem 0.75rem;
      }

      .route-row:first-child { border-bottom: 1px solid var(--border); }

      .route-dot {
        position: relative;
        width: 0.5rem; height: 0.5rem;
        border-radius: 9999px;
        background: var(--text3); flex-shrink: 0;
      }
      .route-dot.green { 
        background: var(--green);
      }
      .route-dot.green::before {
        content: "";
        position: absolute; inset: 0;
        border-radius: 9999px;
        background: hsla(72,96%,56%,.6);
        animation: ping 2.4s ease-out infinite;
      }
      @keyframes ping { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(3); opacity: 0; } }

      .route-label {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
        color: var(--text2); margin-right: 0.5rem;
      }
      .route-input {
        flex: 1; background: transparent; border: none; outline: none;
        font-size: 14px; font-weight: 450; color: var(--text); font-family: inherit;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .route-input::placeholder { color: var(--text3); font-weight: 400; }

      .gps-btn-top {
        display: grid; place-items: center;
        height: 2.5rem; width: 2.5rem;
        border-radius: 1rem;
        background: hsl(220 10% 14%);
        border: none; cursor: pointer; flex-shrink: 0;
        color: hsla(30,10%,96%,.8);
        transition: background 0.15s ease;
      }
      .gps-btn-top:hover { background: hsl(220 10% 18%); }
      .gps-btn-top svg { width: 1rem; height: 1rem; fill: currentColor; }
      .gps-btn-top.gps-loading { opacity: 0.5; pointer-events: none; }

      /* LIVE BADGE */
      .live-badge {
        display: none !important;
      }
      .live-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--green);
        animation: livePulse 1.6s infinite;
      }
      @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

      /* ===== CONTROLS STRIP (hidden - minimal UI) ===== */
      .controls-strip {
        display: none !important;
      }

      .pref-bar { display:none; }
      .pref-btn {
        flex:1; padding:5px 8px; font-size:11px;
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
        border-radius:9px; cursor:pointer; font-family:inherit; color: var(--text3);
        transition: all 0.15s;
      }
      .pref-btn.active { background: var(--green-glow); color: var(--green); border-color: rgba(34,211,160,0.30); }

      .filter-bar { display:none; }
      .filter-btn {
        flex:1; padding:4px 8px; font-size:10px;
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
        border-radius:7px; cursor:pointer; font-family:inherit; color: var(--text3);
      }
      .filter-btn.active { background: rgba(245,158,11,0.12); color: #fbbf24; border-color: rgba(245,158,11,0.28); }

      .lang-bar { display:flex; gap:4px; margin-left: auto; }
      .lang-btn {
        padding:3px 10px; border-radius:16px; border:1px solid rgba(255,255,255,0.06);
        background:rgba(17,24,39,0.5); font-size:10px; font-weight:600;
        cursor:pointer; color:var(--text3); transition:all 0.15s; min-width:28px;
      }
      .lang-btn.active { background:var(--green); color:#090e1a; border-color:var(--green); }

      /* ===== CONTENT SCROLL ===== */
      .content-scroll { flex:1; overflow-y:auto; }

      /* ===== PREMIUM DECISION HERO (Lovable style) ===== */
      .decision-hero {
        margin: -68px 14px 16px;
        background: hsla(220,11%,10%,.85);
        backdrop-filter: blur(32px) saturate(160%);
        -webkit-backdrop-filter: blur(32px) saturate(160%);
        border: 1px solid hsla(220,10%,20%,.9);
        border-radius: 32px;
        padding: 1.25rem 1.5rem 1rem;
        position: relative; overflow: hidden;
        z-index: 20;
        box-shadow: var(--shadow-elev), inset 0 1px 0 hsla(255,255,255,.04);
      }
      .decision-hero::before {
        content:''; position:absolute; top:0; left:0; right:0; height:2px;
        background: linear-gradient(90deg, transparent 0%, var(--green) 50%, transparent 100%);
        opacity: 0.6;
      }

      .dh-overline {
        font-size: 11px; font-weight: 500; letter-spacing: 0.22em;
        color: var(--green); text-transform: uppercase; margin-bottom: 0.75rem;
        display: flex; align-items: center; gap: 0.5rem;
      }
      .dh-overline::before {
        content: "★";
        display: inline-grid; place-items: center;
        width: 1.5rem; height: 1.5rem;
        border-radius: 9999px;
        background: hsla(72,96%,56%,.15);
        font-size: 10px;
      }
      .dh-meta-row {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 0.75rem;
      }
      .dh-live-tag {
        display: inline-flex; align-items: center; gap: 0.375rem;
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
        color: var(--text2);
      }
      .dh-live-dot {
        width: 0.375rem; height: 0.375rem;
        border-radius: 9999px;
        background: hsl(142 70% 50%);
        animation: pulseDot 2.4s ease-in-out infinite;
      }
      @keyframes pulseDot { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: 0.4; } }
      .dh-headline {
        display: none;
      }
      .dh-check { display: none; }
      .dh-eta {
        font-size: 88px; font-weight: 300; color: var(--text);
        line-height: 1; letter-spacing: -0.02em; margin-bottom: 0.75rem;
      }
      .dh-eta .dh-min {
        font-size: 11px; font-weight: 500; color: var(--text2);
        letter-spacing: 0.22em; text-transform: uppercase;
        margin-left: 0.5rem; vertical-align: middle;
      }
      .dh-chips { display:none; }
      .chip {
        padding: 4px 10px; border-radius: 20px;
        font-size: 11px; font-weight: 600;
        background: var(--surface2); color: var(--text2); border: 1px solid var(--border2);
      }
      .chip.chip-green { background:rgba(34,211,160,0.11); color:var(--green); border-color:rgba(34,211,160,0.25); }
      .chip.chip-blue  { background:rgba(96,165,250,0.11); color:var(--blue); border-color:rgba(96,165,250,0.25); }
      .chip.chip-amber { background:rgba(245,158,11,0.11); color:var(--amber); border-color:rgba(245,158,11,0.25); }

      .dh-route-line { 
        font-size: 15px; color: hsla(30,10%,96%,.85); 
        margin-bottom: 1rem; font-weight: 400; 
        line-height: 1.35; text-wrap: balance;
      }
      .dh-route-line em { color: var(--text); font-style: normal; }
      .dh-route-line span { color: var(--text2); }

      .ai-advice-line {
        margin: -4px 0 12px;
        padding: 10px 12px;
        border-radius: 14px;
        background: hsla(72,96%,56%,.08);
        border: 1px solid hsla(72,96%,56%,.18);
        color: hsla(30,10%,96%,.92);
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
      }
      .ai-advice-line span {
        color: var(--green);
        text-transform: uppercase;
        letter-spacing: .12em;
        font-size: 10px;
        margin-right: 6px;
      }
      body.rtl .ai-advice-line span { margin-right:0; margin-left:6px; }

      /* Signals grid disabled: design reference only, no new visible blocks */
      .dh-signals { display: none !important; }
      .dh-signal { display: none !important; }
      .dh-signal-head { display: none !important; }
      .dh-signal-val { display: none !important; }

      /* inline wait-hint — integrated into hero */
      .dh-wait-hint { 
        margin-bottom: 18px; 
        background: rgba(96,165,250,0.08);
        border: 1px solid rgba(96,165,250,0.15);
        border-radius: 14px;
        padding: 14px 16px;
      }
      .dh-wait-title { 
        display:block; 
        font-size:10px; font-weight:700; letter-spacing:0.8px;
        color:var(--blue); text-transform:uppercase; margin-bottom:6px;
      }
      .dh-wait-times { font-size:15px; font-weight:700; color:var(--text); letter-spacing:-0.2px; line-height:1.4; }
      .dh-wait-save  { font-size:13px; color:var(--green); font-weight:700; margin-top:6px; }

      /* slim confidence strip — secondary, bottom of hero */
      .dh-conf-slim {
        display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
        margin-top: 6px; padding-top: 10px;
        border-top: 1px solid var(--border);
      }
      .dh-conf-label {
        font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
        color: var(--text3); text-transform: uppercase;
      }
      .dh-conf-level {
        font-size: 10px; font-weight: 700;
        padding: 1px 7px; border-radius: 8px; text-transform: uppercase;
      }
      .dh-conf-level.high   { background:rgba(34,211,160,0.12); color:var(--green); }
      .dh-conf-level.medium { background:rgba(245,158,11,0.12); color:var(--amber); }
      .dh-conf-level.low    { background:rgba(148,163,184,0.10); color:var(--text3); }
      .dh-conf-pct { font-size:11px; font-weight:600; color:var(--text3); }
      .dh-conf-bar { flex:1; min-width:60px; height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; }
      .dh-conf-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.6s ease; }

      /* ===== PREDICTIVE CARD (hidden - merged into hero) ===== */
      .predictive-card {
        display: none !important;
      }
      .predictive-card-legacy {
        margin: 0 14px 10px;
        background: var(--surface2);
        border: 1px solid rgba(96,165,250,0.18);
        border-radius: 16px;
        padding: 14px 16px;
        display: flex; align-items: flex-start; gap: 14px;
      }
      .pc-icon {
        width: 42px; height: 42px; border-radius: 12px;
        background: rgba(96,165,250,0.12);
        display:flex; align-items:center; justify-content:center;
        font-size:20px; flex-shrink:0;
      }
      .pc-content { flex:1; }
      .pc-title {
        font-size:10px; font-weight:700; letter-spacing:0.8px;
        color:var(--blue); text-transform:uppercase; margin-bottom:3px;
      }
      .pc-main { font-size:14px; font-weight:600; color:var(--text); margin-bottom:3px; }
      .pc-sub  { font-size:12px; color:var(--text2); }
      .pc-save { font-size:12px; font-weight:700; color:var(--green); white-space:nowrap; padding-top:2px; }
      .pc-actions { display:flex; gap:8px; margin-top:10px; }
      .pc-action-btn {
        flex:1; padding:9px 12px; border-radius:10px;
        font-size:13px; font-weight:600; border:none; cursor:pointer; font-family:inherit;
      }
      .pc-action-btn.primary { background:var(--green); color:#090e1a; }
      .pc-action-btn.secondary { background:var(--surface); color:var(--text2); border:1px solid var(--border2); }

      /* ===== CTA ROW (Lovable style) ===== */
      .cta-row { margin: 0; padding: 0 0.75rem 0.75rem; }
      .cta-start {
        width: 100%; 
        display: flex; align-items: center; justify-content: space-between;
        gap: 0.75rem; padding: 1rem 1.25rem;
        background: var(--green); color: hsl(220 20% 6%);
        border: none; border-radius: 1rem;
        font-size: 15px; font-weight: 500; cursor: pointer;
        box-shadow: var(--shadow-glow);
        transition: transform 0.12s ease;
        font-family: inherit;
      }
      .cta-start:hover { transform: scale(1.01); }
      .cta-start:active { transform: scale(0.98); }
      .cta-start small { 
        display: inline-flex; align-items: center; gap: 0.25rem;
        font-size: 11px; font-weight: 500; text-transform: uppercase; 
        letter-spacing: 0.2em; opacity: 0.85;
      }
      .cta-details {
        display: none !important;
      }

      /* ===== OTHER ROUTES (Lovable glass style) ===== */
      .other-routes { 
        margin: 0.75rem 14px 8px; 
        background: hsla(220,14%,8%,.72);
        backdrop-filter: blur(24px) saturate(140%);
        -webkit-backdrop-filter: blur(24px) saturate(140%);
        border: 1px solid hsla(220,10%,14%,.8);
        border-radius: 24px;
        overflow: hidden;
      }
      .other-routes .alt-row { display: none; }
      .other-routes.expanded .alt-row { display: block; }
      .see-alts-btn {
        width: 100%; padding: 1rem 1.25rem 0.5rem;
        background: transparent; border: none;
        font-size: 10px; font-weight: 500; color: var(--text2);
        display: flex; align-items: center; justify-content: space-between;
        text-transform: uppercase; letter-spacing: 0.22em;
        cursor: pointer; transition: color 0.15s;
      }
      .see-alts-btn:hover { color: var(--text); }
      .see-alts-btn .arrow { transition: transform 0.2s; font-size: 10px; }
      .other-routes.expanded .see-alts-btn .arrow { transform: rotate(180deg); }
      .section-head {
        display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;
      }
      .section-head > span:first-child {
        font-size:10px; font-weight:700; letter-spacing:0.8px;
        color:var(--text3); text-transform:uppercase;
      }
      .how-compare { font-size:10px; color:var(--text3); cursor:pointer; }
      .alt-row { display: block; }
      .alt-card-p {
        width: 100%;
        display: flex; align-items: center; gap: 1rem;
        padding: 0.875rem 1.25rem;
        background: transparent; border: none;
        border-top: 1px solid var(--border);
        cursor: pointer; transition: background 0.15s;
        text-align: left;
      }
      .alt-card-p:first-child { border-top: none; }
      .alt-card-p:hover { background: hsla(220,10%,14%,.4); }
      .alt-bar {
        height: 1.75rem; width: 0.25rem;
        border-radius: 9999px; flex-shrink: 0;
        background: var(--blue);
      }
      .alt-bar.faster { background: var(--amber); }
      .alt-bar.relaxed { background: var(--blue); }
      .alt-bar.no-tolls { background: var(--green); }
      .alt-role { display: none; }
      .alt-body { flex: 1; min-width: 0; }
      .alt-time-p {
        display: flex; align-items: center; gap: 0.5rem;
        font-size: 14px; font-weight: 500; color: var(--text);
        margin-bottom: 0.125rem;
      }
      .alt-time-p span { 
        font-size: 10px; font-weight: 500; color: var(--text2);
        text-transform: uppercase; letter-spacing: 0.18em;
      }
      .alt-label-p { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .alt-badges { display: none; }
      .alt-insight { display: none; }
      .alt-end { text-align: right; }
      .alt-end-time { font-weight: 500; font-size: 15px; color: var(--text); font-variant-numeric: tabular-nums; }
      .alt-end-diff { font-size: 10px; letter-spacing: 0.06em; color: var(--text2); font-variant-numeric: tabular-nums; }
      .alt-end-diff.warn { color: var(--amber); }
      .alt-chev { width: 1rem; height: 1rem; color: hsla(220,8%,56%,.6); flex-shrink: 0; }

      /* ===== INFO STRIP (removed from main screen) ===== */
      .info-strip {
        display: none !important;
      }
      .info-item { display:flex; flex-direction:column; align-items:center; gap:2px; }
      .info-label { font-size:9px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.4px; }
      .info-value { font-size:12px; font-weight:600; color:var(--text2); }

      /* ===== QUICK ACCESS (hidden on initial load) ===== */
      .quick-section { display: none; margin: 16px 14px 12px; }
      .quick-title { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
      .quick-list { background:var(--surface); border-radius:14px; overflow:hidden; border:1px solid var(--border); }
      .quick-item {
        display:flex; align-items:center; gap:14px; padding:15px 16px;
        border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.12s;
      }
      .quick-item:last-child { border-bottom:none; }
      .quick-item:hover { background:var(--surface2); }
      .quick-icon { width:38px; height:38px; background:var(--surface2); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
      .quick-label { flex:1; font-size:15px; font-weight:500; color:var(--text); }
      .quick-arrow { color:var(--text3); font-size:18px; }

      /* ===== BOTTOM NAV (Lovable pill style) ===== */
      .bottom-nav {
        position: fixed; 
        bottom: max(env(safe-area-inset-bottom), 0.75rem);
        left: 50%; transform: translateX(-50%);
        background: hsla(220,11%,10%,.85);
        backdrop-filter: blur(32px) saturate(160%);
        -webkit-backdrop-filter: blur(32px) saturate(160%);
        border: 1px solid hsla(220,10%,20%,.9);
        border-radius: 9999px;
        display: flex; align-items: center; gap: 0.25rem;
        padding: 0.5rem; z-index: 100;
        box-shadow: var(--shadow-elev);
      }
      .nav-item {
        display: inline-flex; align-items: center; gap: 0.5rem;
        border-radius: 9999px; padding: 0.625rem 1rem;
        cursor: pointer; color: var(--text2);
        transition: all 0.15s ease;
        font-size: 12px; font-weight: 500;
      }
      .nav-item.active { 
        background: var(--green); 
        color: hsl(220 20% 6%);
        box-shadow: var(--shadow-glow);
      }
      .nav-item:hover:not(.active) { color: var(--text); }
      .nav-item svg { width: 1rem; height: 1rem; }
      .nav-label { 
        font-size: 10px; font-weight: 500; 
        text-transform: uppercase; letter-spacing: 0.16em;
      }

      /* ===== ROUTE DETAILS MODAL ===== */
      .modal-overlay {
        position:fixed; top:0; left:0; right:0; bottom:0;
        background:rgba(0,0,0,0.72);
        display:flex; align-items:flex-end; justify-content:center;
        z-index:1000; opacity:0; visibility:hidden;
        transition:opacity 0.2s, visibility 0.2s;
      }
      .modal-overlay.visible { opacity:1; visibility:visible; }
      .modal-content {
        background:var(--surface); border-radius:24px 24px 0 0;
        padding:24px; width:100%; max-width:500px; max-height:85vh; overflow-y:auto;
        transform:translateY(100%); transition:transform 0.3s ease;
        border:1px solid var(--border2); border-bottom:none;
      }
      .modal-overlay.visible .modal-content { transform:translateY(0); }

      /* ===== DRIVE MODE ===== */

      .drive-ahead-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }

      .drive-alert-badge .dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }
      .drive-alert-badge.high   { background:rgba(16,185,129,0.18); color:#6ee7b7; }
      .drive-alert-badge.medium { background:rgba(245,158,11,0.18); color:#fcd34d; }
      .drive-alert-badge.low    { background:rgba(148,163,184,0.18); color:#cbd5e1; }
      .drive-alert-state { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; }

      .drive-alert-state.suggest { color:#fcd34d; }
      .drive-alert-message { color:white; margin-bottom:12px; }
      .drive-alert-title  { font-size:18px; font-weight:700; line-height:1.2; margin-bottom:4px; }
      .drive-alert-detail { font-size:14px; color:#cbd5e1; line-height:1.4; margin-bottom:6px; }
      .drive-alert-meta   { font-size:12px; color:#94a3b8; line-height:1.3; }
      .drive-alert-actions { display:flex; gap:10px; }
      .drive-alert-btn { flex:1; padding:12px 14px; border-radius:12px; font-size:14px; font-weight:700; border:none; cursor:pointer; transition:transform 0.15s ease, opacity 0.15s ease; }

      .drive-panel { background:#1e293b; padding:24px 20px; border-radius:28px 28px 0 0; }
      .drive-eta { text-align:center; margin-bottom:16px; }

      .drive-info-label { font-size:12px; color:#64748b; margin-top:4px; }

      .drive-lane-block { display:none; align-items:center; gap:10px; margin-top:8px; padding:10px 14px; background:rgba(245,158,11,0.10); border:1px solid rgba(245,158,11,0.28); border-radius:12px; transition:background 0.3s; }
      .drive-lane-block.lane-warn { background:rgba(245,158,11,0.18); border-color:rgba(245,158,11,0.50); }

      .drive-lane-instruction { color:#fbbf24; font-size:13px; font-weight:600; }

      /* Complex interchange warning */

      /* ===== ТЗ-1: Drive Mode Reality Fix ===== */

      .confidence-high   { background:rgba(34,211,160,0.14); color:var(--green); }
      .confidence-medium { background:rgba(245,158,11,0.14); color:var(--amber); }
      .confidence-low    { background:rgba(148,163,184,0.12); color:var(--text3); }

      /* ===== LANGUAGE BAR ===== */
      /* (already defined above in controls-strip) */



      /* ===== FIX-1: visible language + AI voice controls ===== */
      .top-utility-bar {
        position: relative;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;

function learnFromRouteChoice(route) {
  if (!route) return;

  const total = (userProfile.totalChoices || 0) + 1;
  userProfile.totalChoices = total;

  const currentStress = route.stressScore || 0;
  const currentComplexity = route.complexity || 0;

  userProfile.avgChosenStress =
    userProfile.avgChosenStress == null
      ? currentStress
      : ((userProfile.avgChosenStress * (total - 1)) + currentStress) / total;

  userProfile.avgChosenComplexity =
    userProfile.avgChosenComplexity == null
      ? currentComplexity
      : ((userProfile.avgChosenComplexity * (total - 1)) + currentComplexity) / total;

  const noTollChoices = route.tollCost === 0;
  const calmChoice = currentStress <= 8;
  const fastChoice = route.index === (_fastestRoute && _fastestRoute.index);

  if (total >= 3) {
    if (noTollChoices) userProfile.prefersNoTolls = true;
    if (calmChoice)    userProfile.prefersCalmRoutes = true;
    if (fastChoice)    userProfile.prefersFastest = true;
  }

  saveUserProfile();
}

function getPersonalizationBias(route) {
  let bias = 0;

  if (userProfile.prefersNoTolls && route.tollCost === 0) {
    bias -= 2.5;
  }

  if (userProfile.prefersCalmRoutes) {
    bias -= (route.stressScore || 0) * 0.35;
  }

  if (userProfile.prefersFastest) {
    bias -= ((route.time - (_fastestRoute ? _fastestRoute.time : route.time)) / 60) * 0.8;
  }

  if (userProfile.avgChosenComplexity != null) {
    const complexityGap = Math.abs((route.complexity || 0) - userProfile.avgChosenComplexity);
    bias += complexityGap * 0.15;
  }

  if (userProfile.avgChosenStress != null) {
    const stressGap = Math.abs((route.stressScore || 0) - userProfile.avgChosenStress);
    bias += stressGap * 0.2;
  }

  return bias;
}

function generateUnifiedDecisionWhy(route, allRoutes) {
  const road = getRouteSummaryName(route);
  const profileWhy = generateProfileAwareWhy(route, allRoutes);
  const timingHint = getTimingDecisionHint();

  if (profileWhy) return profileWhy;

  const others = (allRoutes || []).filter(r => r.index !== route.index);
  if (!others.length) return `Best available route via ${road}`;

  const fastestAlt = others.reduce((a, b) =>
    getDisplayMinutes(a) < getDisplayMinutes(b) ? a : b
  );
  const diff = getDisplayMinutes(fastestAlt) - getDisplayMinutes(route);

  if (route.tollCost === 0 && fastestAlt.tollCost > 0 && Math.abs(diff) <= 3) {
    return `No tolls with similar time via ${road}`;
  }
  if (diff > 0 && route.stressScore <= (fastestAlt.stressScore || 999)) {
    return `${diff} min faster with smoother drive via ${road}`;
  }
  if (trafficRank(route.traffic) < trafficRank(fastestAlt.traffic)) {
    return `Less traffic than faster alternatives via ${road}`;
  }
  if ((route.stressScore || 0) + 2 < (fastestAlt.stressScore || 0)) {
    return `Lower-stress route via ${road}`;
  }
  if (timingHint && route.index === (_bestRoute && _bestRoute.index)) {
    return `${timingHint} via ${road}`;
  }
  return `Best overall balance via ${road}`;
}

function normalizeRoadText(step, route) {
  const summary = (route.summary || "");
  const html = stripHtml(step.html_instructions || "");
  return `${summary} ${html}`.toUpperCase();
}

function stepLooksLikeHighway(step, route) {
  const text = normalizeRoadText(step, route);
  return (
    /\bE11\b/.test(text) ||
    /\bE311\b/.test(text) ||
    /\bE611\b/.test(text) ||
    text.includes("SHEIKH") ||
    text.includes("HIGHWAY") ||
    text.includes("EXPRESSWAY")
  );
}

function getTrafficLevel(base, traffic) {
  if (!traffic || !base || traffic <= base) return "low";
  const ratio = (traffic - base) / base;
  if (ratio <= 0.05) return "low";
  if (ratio <= 0.15) return "medium";
  return "high";
}

function trafficRank(level) {
  if (level === "low") return 1;
  if (level === "medium") return 2;
  return 3;
}

function getTrafficText(traffic) {
  if (traffic === "low") return t("traf_stable");
  if (traffic === "medium") return t("traf_moderate");
  return t("traf_heavy");
}

function toTitleCaseLabel(value) {
  if (!value) return "";
  return value.charAt(0).toUpperCase() + value.slice(1);
}

function getStabilityLabel(stabilityScore) {
  if (stabilityScore >= 70) return t("stab_very");
  if (stabilityScore >= 50) return t("stab_stable");
  if (stabilityScore >= 30) return t("stab_moderate");
  return t("stab_unpred");
}

function isMeaningfulManeuver(step, route) {
  if (!step) return false;
  const html = stripHtml(step.html_instructions || "").toLowerCase();
  const maneuver = (step.maneuver || "").toLowerCase();
  const strong = ["turn-left", "turn-right", "uturn-left", "uturn-right", "roundabout"];
  if (strong.some(m => maneuver.includes(m))) return true;
  if (
    html.includes("exit") ||
    html.includes("keep right") ||
    html.includes("keep left") ||
    html.includes("ramp") ||
    html.includes("merge")
  ) return true;
  if (html.includes("continue") || html.includes("slight")) return false;
  return false;
}

function countComplexity(leg, route) {
  return leg.steps.filter(s => isMeaningfulManeuver(s, route)).length;
}

function calculateHighwayShare(leg, route) {
  const total = leg.distance?.value || 0;
  if (!total) return 0;
  let hwDistance = 0;
  leg.steps.forEach(step => {
    if (stepLooksLikeHighway(step, route)) {
      hwDistance += step.distance?.value || 0;
    }
  });
  return hwDistance / total;
}

function getDisplayMinutes(route) {
  return Math.round(route.time / 60);
}

function getDisplayDiff(routeA, routeB) {
  return getDisplayMinutes(routeA) - getDisplayMinutes(routeB);
}

function getRouteSummaryName(route) {
  const summary = route.route.summary || "";
  if (summary.includes("E311")) return "E311";
  if (summary.includes("E11")) return "E11";
  if (summary.includes("E611")) return "E611";
  if (summary.includes("Sheikh Zayed")) return "Sheikh Zayed Rd";
  return summary.split("/")[0].trim() || `Route ${route.displayIndex}`;
}

function calculateRouteMetrics(route, leg, rawRoute) {
  const baseTime = leg.duration.value;
  const time = leg.duration_in_traffic?.value || baseTime;
  const distance = leg.distance.value;
  const delaySeconds = Math.max(0, time - baseTime);
  const delayMinutes = Math.round(delaySeconds / 60);
  const complexity = countComplexity(leg, rawRoute);
  const highwayShare = calculateHighwayShare(leg, rawRoute);
  const traffic = getTrafficLevel(baseTime, time);

  // ТЗ3 ЭТАП 1: Salik toll data
  const tollCount = Math.floor(highwayShare * 3); // rough estimate based on highway usage
  const tollCost = tollCount * 4; // 4 AED per Salik gate
  const hasToll = tollCost > 0;

  return {
    time,
    baseTime,
    distance,
    delaySeconds,
    delayMinutes,
    complexity,
    highwayShare,
    traffic,
    highway: highwayShare >= 0.35,
    tollCount,
    tollCost,
    hasToll
  };
}

function calculateDriveStress(route) {
  let stress = 0;

  stress += (route.complexity || 0) * 0.55;
  stress += (route.delayMinutes || 0) * 0.9;
  stress += route.traffic === "high" ? 5 : route.traffic === "medium" ? 2 : 0;
  stress += route.highway ? 0 : 1.5;

  if ((route.highwayShare || 0) < 0.25) stress += 1.5;
  if ((route.complexity || 0) >= 12) stress += 2;
  if ((route.delayMinutes || 0) >= 6) stress += 2;

  return Math.round(stress * 10) / 10;
}

function getDrivePersonality(route) {
  const stress = route.stressScore || 0;
  const turns = route.complexity || 0;
  const delay = route.delayMinutes || 0;
  const highwayShare = route.highwayShare || 0;

  if (stress <= 6 && highwayShare >= 0.5 && turns <= 8) {
    return t("stress_smooth");
  }

  if (stress <= 9 && delay <= 3) {
    return t("stress_steady");
  }

  if (stress <= 12) {
    return t("stress_active");
  }

  if (turns >= 12 || delay >= 6) {
    return t("stress_stressful");
  }

  return t("stress_busy");
}

function getStressBadge(stressScore) {
  if (stressScore <= 6) {
    return { label: "Low stress", tone: "low" };
  }
  if (stressScore <= 10) {
    return { label: "Medium stress", tone: "medium" };
  }
  return { label: "High stress", tone: "high" };
}

//  ROUTE ROLE CLASSIFICATION

function getRouteRole(r, bestRoute, fastestRoute, allRoutes) {
  if (r.index === bestRoute.index) return "recommended";

  const diffFromBest = getDisplayDiff(r, bestRoute);
  const isFaster = diffFromBest < 0;
  const isSlower = diffFromBest > 0;

  const hasMoreTraffic = trafficRank(r.traffic) > trafficRank(bestRoute.traffic);
  const hasMoreDelay = r.delayMinutes > bestRoute.delayMinutes + 2;
  const isRiskier = hasMoreTraffic || hasMoreDelay;

  const fewerTurns = r.complexity < bestRoute.complexity - 1;
  const lighterTraffic = trafficRank(r.traffic) < trafficRank(bestRoute.traffic);
  const isMoreRelaxed = fewerTurns || lighterTraffic;

  const timeSimilar = Math.abs(diffFromBest) <= 1;
  const complexitySimilar = Math.abs(r.complexity - bestRoute.complexity) <= 2;
  const trafficSimilar = trafficRank(r.traffic) === trafficRank(bestRoute.traffic);
  const isSimilar = timeSimilar && complexitySimilar && trafficSimilar;

  if (isFaster && isRiskier) return "faster_risky";
  if (isSlower && isMoreRelaxed) return "more_relaxed";
  if (isSimilar) return "similar";
  return "balanced";
}

function buildRouteSegments(r) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const segments = [];

  let currentSegment = null;
  let segmentSteps = [];

  steps.forEach((step, i) => {
    const isHw = stepLooksLikeHighway(step, r.route);
    const isMeaningful = isMeaningfulManeuver(step, r.route);

    let type = isHw ? "highway" : "city";

    if (!isHw && isMeaningful) {
      const nearbyManeuvers = steps.slice(Math.max(0, i - 2), i + 3)
        .filter(s => isMeaningfulManeuver(s, r.route)).length;
      if (nearbyManeuvers >= 3) type = "turns";
    }

    if (!currentSegment || currentSegment.type !== type) {
      if (currentSegment && segmentSteps.length > 0) {
        currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
        currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
        segments.push(currentSegment);
      }
      currentSegment = { type, steps: [] };
      segmentSteps = [];
    }

    segmentSteps.push(step);
    currentSegment.steps = segmentSteps;
  });

  if (currentSegment && segmentSteps.length > 0) {
    currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
    currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
    segments.push(currentSegment);
  }

  const mergedSegments = [];
  segments.forEach(seg => {
    if (seg.distance < 500 && mergedSegments.length > 0) {
      const prev = mergedSegments[mergedSegments.length - 1];
      prev.distance += seg.distance;
      prev.duration += seg.duration;
    } else {
      mergedSegments.push(seg);
    }
  });

  if (r.delayMinutes > 3 && mergedSegments.length > 0) {
    const citySegment = mergedSegments.find(s => s.type === "city");
    if (citySegment) citySegment.type = "traffic";
  }

  return mergedSegments.map(seg => {
    const km = (seg.distance / 1000).toFixed(1);
    const mins = Math.round(seg.duration / 60);
    const labels = {
      highway: { icon: "&#128739;", title: "Highway section", note: "stable flow" },
      city: { icon: "&#127961;", title: "City driving", note: "urban roads" },
      traffic: { icon: "&#128679;", title: "Congested area", note: "expect delays" },
      turns: { icon: "&#128260;", title: "Complex section", note: "multiple turns" }
    };
    const label = labels[seg.type] || labels.city;
    return {
      type: seg.type,
      icon: label.icon,
      title: label.title,
      details: `${km} km · ~${mins} min · ${label.note}`,
      distance: seg.distance,
      duration: seg.duration
    };
  });
}

function buildDriveViewModel(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const currentStep = steps[stepIndex] || steps[0];

  const liveMeters = getLiveRemainingMeters(r, stepIndex, lastKnownUserLatLng);
  const liveSeconds = getLiveRemainingSeconds(r, stepIndex, lastKnownUserLatLng);

  let remainingDistance = Number.isFinite(liveMeters) ? liveMeters : 0;
  let remainingTime = Number.isFinite(liveSeconds) ? liveSeconds : 0;

  if (!Number.isFinite(liveMeters) || !Number.isFinite(liveSeconds)) {
    for (let i = stepIndex; i < steps.length; i++) {
      remainingDistance += steps[i].distance?.value || 0;
      remainingTime += steps[i].duration?.value || 0;
    }
  }

  lastRouteDistanceMeters = remainingDistance;

  return {
    eta: Math.max(1, Math.round(remainingTime / 60)),
    distance: (remainingDistance / 1000).toFixed(1),
    traffic: r.traffic,
    trafficText: getTrafficText(r.traffic),
    instruction: stripHtml(currentStep?.html_instructions || "Follow the route"),
    instructionDistance: currentStep?.distance?.text || "",
    maneuver: currentStep?.maneuver || "",
    stepIndex,
    totalSteps: steps.length
  };
}

function isDriveGpsUsable(pos) {
  if (!pos || !pos.coords) return false;
  const acc = Number(pos.coords.accuracy);
  lastGpsAccuracyMeters = Number.isFinite(acc) ? acc : null;
  if (!Number.isFinite(acc)) return true;
  return acc <= DRIVE_GPS_MAX_ACCURACY_M;
}

function formatGpsAccuracy() {
  if (!Number.isFinite(lastGpsAccuracyMeters)) return "";
  return " · ±" + Math.round(lastGpsAccuracyMeters) + "m";
}

function getLiveRemainingMeters(routeObj, stepIndex, userLatLng) {
  const steps = routeObj?.route?.legs?.[0]?.steps || [];
  if (!steps.length) return null;

  const safeIndex = Math.min(Math.max(0, stepIndex || 0), steps.length - 1);
  let meters = 0;

  if (userLatLng) {
    const currentEnd = getDistanceToStepEndMeters(steps[safeIndex], userLatLng);
    meters += Number.isFinite(currentEnd) ? Math.max(0, currentEnd) : (steps[safeIndex]?.distance?.value || 0);
  } else {
    meters += steps[safeIndex]?.distance?.value || 0;
  }

  for (let i = safeIndex + 1; i < steps.length; i++) {
    meters += steps[i]?.distance?.value || 0;
  }

  return meters;
}

function getLiveRemainingSeconds(routeObj, stepIndex, userLatLng) {
  const steps = routeObj?.route?.legs?.[0]?.steps || [];
  if (!steps.length) return null;

  const safeIndex = Math.min(Math.max(0, stepIndex || 0), steps.length - 1);
  let seconds = 0;
  const step = steps[safeIndex];

  const stepDistance = step?.distance?.value || 0;
  const stepDuration = step?.duration?.value || 0;

  if (userLatLng && stepDistance > 0 && stepDuration > 0) {
    const currentEnd = getDistanceToStepEndMeters(step, userLatLng);
    const ratio = Number.isFinite(currentEnd)
      ? Math.min(1, Math.max(0.05, currentEnd / stepDistance))
      : 1;
    seconds += stepDuration * ratio;
  } else {
    seconds += stepDuration;
  }

  for (let i = safeIndex + 1; i < steps.length; i++) {
    seconds += steps[i]?.duration?.value || 0;
  }

  return seconds;
}

function buildDriveGpsStatus(routeObj, vm) {
  const base = lastKnownUserLatLng ? "GPS live" : "Waiting for GPS";
  const step = routeObj && vm ? " · Step " + (currentStepIndex + 1) + "/" + vm.totalSteps : "";
  const distance = Number.isFinite(lastRouteDistanceMeters) ? " · " + (lastRouteDistanceMeters / 1000).toFixed(1) + " km left" : "";
  return base + step + distance + formatGpsAccuracy();
}

function updateDriveGpsStatus(routeObj, vm, overrideText) {
  const st = document.getElementById("drive-status");
  if (!st) return;
  lastGpsStatusText = overrideText || buildDriveGpsStatus(routeObj, vm);
  st.textContent = lastGpsStatusText;
}

function shouldTriggerSoftOffRouteReroute(userLatLng, routeObj) {
  if (!userLatLng || !routeObj) return false;
  if (Number.isFinite(lastGpsAccuracyMeters) && lastGpsAccuracyMeters > DRIVE_GPS_MAX_ACCURACY_M) return false;
  if (!isUserOffRoute(userLatLng, routeObj)) {
    offRouteSince = 0;
    return false;
  }

  if (!offRouteSince) offRouteSince = Date.now();

  const now = Date.now();
  if (now - offRouteSince < DRIVE_OFF_ROUTE_GRACE_MS) return false;
  if (now - lastOffRouteRecalcAt < DRIVE_OFF_ROUTE_REROUTE_COOLDOWN_MS) return false;
  if (offRouteRecalcInProgress) return false;

  lastOffRouteRecalcAt = now;
  return true;
}


function getStepWarningMeta(step, route) {
  const html = stripHtml(step?.html_instructions || "");
  const text = html.toLowerCase();
  const maneuver = (step?.maneuver || "").toLowerCase();
  const roadText = normalizeRoadText(step, route);
  
  const roadMatch =
  roadText.match(/\bE311\b/) ||
  roadText.match(/\bE11\b/) ||
  roadText.match(/\bE611\b/) ||
  roadText.match(/\bE66\b/) ||
  roadText.match(/\bE44\b/) ||
  roadText.match(/\bD\d+\b/);
  const roadName = roadMatch ? roadMatch[0] : getRouteSummaryName({ route });

  // Enhanced lane hints
  const laneHint = extractLaneHint(text);
  
  if (maneuver.includes("uturn") || text.includes("u-turn"))
    return { type: "uturn", icon: "↩", shortText: "U-turn ahead", longText: "Prepare for U-turn ahead", laneHint };
  if (text.includes("fork right") || maneuver.includes("fork-right")) 
    return { type: "fork", icon: "⤴", shortText: `Fork right to ${roadName}`, longText: `Take the right fork toward ${roadName}`, laneHint: laneHint || "Use right lanes" };
  if (text.includes("fork left") || maneuver.includes("fork-left"))
    return { type: "fork", icon: "⤳", shortText: `Fork left to ${roadName}`, longText: `Take the left fork toward ${roadName}`, laneHint: laneHint || "Use left lanes" };
  if (text.includes("keep right")) return { type: "lane",  icon: "↗", shortText: `Keep right for ${roadName}`,  longText: `Keep right ahead for exit toward ${roadName}`, laneHint: laneHint || "Use right lanes" };
  if (text.includes("keep left"))  return { type: "lane",  icon: "↖", shortText: `Keep left for ${roadName}`,   longText: `Keep left ahead toward ${roadName}`, laneHint: laneHint || "Use left lanes" };
  if (text.includes("exit"))       return { type: "exit",  icon: "⇢", shortText: `Exit ahead to ${roadName}`,   longText: `Prepare for exit toward ${roadName}`, laneHint: laneHint || "Move to exit lane" };
  if (text.includes("ramp"))       return { type: "ramp",  icon: "⇗", shortText: `Ramp ahead to ${roadName}`,   longText: `Take the ramp ahead toward ${roadName}`, laneHint: laneHint || "Use right lane" };
  if (text.includes("merge"))      return { type: "merge", icon: "⇄", shortText: `Merge ahead`,                 longText: `Merge carefully ahead`, laneHint: "Watch for merging traffic" };
  return null;
}

function extractLaneHint(text) {
  // Try to extract lane info from instruction text
  if (text.includes("3 left lanes") || text.includes("three left"))   return "Use 3 left lanes";
  if (text.includes("3 right lanes") || text.includes("three right")) return "Use 3 right lanes";
  if (text.includes("2 left lanes") || text.includes("two left"))     return "Use 2 left lanes";
  if (text.includes("2 right lanes") || text.includes("two right"))   return "Use 2 right lanes";
  if (text.includes("leftmost lane"))    return "Use leftmost lane";
  if (text.includes("rightmost lane"))   return "Use rightmost lane";
  if (text.includes("left lane"))        return "Use left lane";
  if (text.includes("right lane"))       return "Use right lane";
  if (text.includes("middle lane") || text.includes("center lane"))  return "Stay in middle lanes";
  if (text.includes("any lane"))         return "Any lane";
  if (text.includes("stay in lane"))     return "Stay in lane";
  return null;
}

function isComplexInterchangeAhead(steps, currentStepIndex, route) {
  let complex = false;
  let count = 0;

  for (let i = currentStepIndex; i < currentStepIndex + 3; i++) {
    if (!steps[i]) continue;
    let text = steps[i].instructions ? steps[i].instructions.toLowerCase() : (stripHtml(steps[i]?.html_instructions || "").toLowerCase());
    if (text.includes("exit") || text.includes("ramp") || text.includes("merge")) {
      count++;
    }
  }

  if (count >= 2) complex = true;

  return complex;
}

function showInterchangeWarning() {
  const interchangeWarn = document.getElementById("drive-interchange-warn");
  if (interchangeWarn) {
    interchangeWarn.classList.add("visible");
  }
}

function getDrivePriorityWarning(r, stepIndex, userLatLng) {
  const steps = r.route.legs[0].steps;
  const ulng = userLatLng || lastKnownUserLatLng;
  const currentStep = steps[stepIndex];

  if (!currentStep) return null;

  const phaseRank    = { now: 3, soon: 2, prepare: 1, none: 0 };
  const typePriority = { exit: 5, ramp: 5, lane: 4, merge: 3, uturn: 2, interchange: 1 };

  // 1. Current step wins if already active
  const currentMeta = getStepWarningMeta(currentStep, r.route);
  if (currentMeta) {
    const currentDist  = getDistanceToStepEndMeters(currentStep, ulng);
    const currentPhase = getWarningPhaseForType(currentDist, currentMeta.type || "");
    if (currentPhase !== "none") {
      return currentMeta;
    }
  }

  // 2. Upcoming steps — score all candidates, pick best
  const candidates = [];

  for (let i = stepIndex + 1; i < Math.min(steps.length, stepIndex + 5); i++) {
    const step = steps[i];
    const meta = getStepWarningMeta(step, r.route);
    if (!meta) continue;

    // Effective distance = remaining current step + full intermediate steps + approach to target
    let effectiveMeters = getDistanceToStepEndMeters(currentStep, ulng) ?? 0;
    for (let j = stepIndex + 1; j < i; j++) {
      effectiveMeters += steps[j]?.distance?.value || 0;
    }
    effectiveMeters += Math.min(step.distance?.value || 0, 180);

    const phase = getWarningPhaseForType(effectiveMeters, meta.type || "");
    if (phase === "none") continue;

    candidates.push({
      meta,
      type:           meta.type,
      phase,
      effectiveMeters,
      typeScore:  typePriority[meta.type] || 0,
      phaseScore: phaseRank[phase]        || 0
    });
  }

  if (candidates.length > 0) {
    candidates.sort((a, b) => {
      if (b.typeScore  !== a.typeScore)  return b.typeScore  - a.typeScore;
      if (b.phaseScore !== a.phaseScore) return b.phaseScore - a.phaseScore;
      return a.effectiveMeters - b.effectiveMeters;
    });
    return candidates[0].meta;
  }

  // 3. Fallback advisory only if nothing more concrete exists
  if (isComplexInterchangeAhead(steps, stepIndex, r.route)) {
    return {
      type:      "interchange",
      icon:      "⚠",
      shortText: "Complex interchange ahead",
      longText:  "Complex interchange ahead — stay focused for lane choice"
    };
  }

  return null;
}

function parseStepDistanceMeters(step) {
  if (!step?.distance?.value) return null;
  return step.distance.value;
}

function getDistanceToStepEndMeters(step, userLatLng) {
  if (!step?.end_location || !userLatLng) return parseStepDistanceMeters(step);
  return google.maps.geometry.spherical.computeDistanceBetween(
    userLatLng,
    step.end_location
  );
}

function getWarningPhase(distanceMeters) {
  return getWarningPhaseForType(distanceMeters, "");
}

function buildTimedWarning(priorityWarning, step, userLatLng) {
  if (!priorityWarning || !step) return null;

  const meters = getDistanceToStepEndMeters(step, userLatLng);
  const phase = getWarningPhaseForType(meters, priorityWarning.type);

  if (phase === "none") return null;

  let distanceText = "Ahead";
  if (meters != null) {
    if (meters <= 60) {
      distanceText = "Now";
    } else if (meters < 1000) {
      distanceText = `${Math.round(meters / 10) * 10} m`;
    } else {
      distanceText = `${(meters / 1000).toFixed(1)} km`;
    }
  }

  let shortText = priorityWarning.shortText;

  if (phase === "prepare") {
    if (priorityWarning.type === "exit" || priorityWarning.type === "ramp") {
      shortText = `Prepare: ${priorityWarning.shortText}`;
    } else if (priorityWarning.type === "lane" || priorityWarning.type === "merge") {
      shortText = `Lane: ${priorityWarning.shortText}`;
    } else if (priorityWarning.type === "uturn") {
      shortText = `Prepare: ${priorityWarning.shortText}`;
    }
  }

  if (phase === "now") {
    if (priorityWarning.type === "exit")  shortText = "Take the exit now";
    if (priorityWarning.type === "ramp")  shortText = "Take the ramp now";
    if (priorityWarning.type === "lane")  shortText = priorityWarning.shortText.replace("ahead", "now");
    if (priorityWarning.type === "merge") shortText = "Merge now";
    if (priorityWarning.type === "uturn") shortText = "Make a U-turn now";
  }

  return {
    ...priorityWarning,
    phase,
    shortText,
    distanceText
  };
}

function getHeldLaneGuidance(nextGuidance) {
  const now = Date.now();

  if (!nextGuidance) {
    if (_laneGuidanceHeld && now < _laneGuidanceHeldUntil) {
      return _laneGuidanceHeld;
    }
    _laneGuidanceHeld = null;
    _laneGuidanceHeldUntil = 0;
    return null;
  }

  const sameText  = _laneGuidanceHeld?.shortText === nextGuidance.shortText;
  const samePhase = _laneGuidanceHeld?.phase === nextGuidance.phase;

  if (sameText && samePhase) {
    _laneGuidanceHeld = nextGuidance;
    _laneGuidanceHeldUntil = now + 2500;
    return nextGuidance;
  }

  if (_laneGuidanceHeld && now < _laneGuidanceHeldUntil) {
    return _laneGuidanceHeld;
  }

  _laneGuidanceHeld = nextGuidance;
  _laneGuidanceHeldUntil = now + 2500;
  return nextGuidance;
}

function normalizeVoiceText(text) {
  return (text || "")
    .replace(/\bE311\b/g, "E three one one")
    .replace(/\bE611\b/g, "E six one one")
    .replace(/\bE11\b/g, "E eleven")
    .replace(/\s+/g, " ")
    .trim();
}



function getVoicePromptFromTimedWarning(timedWarning) {
  if (!timedWarning) return "";
  if (timedWarning.phase === "prepare") return timedWarning.shortText.replace(/^Prepare:\s*/i, "Prepare to ");
  if (timedWarning.phase === "soon")    return timedWarning.shortText;
  if (timedWarning.phase === "now")     return timedWarning.shortText.replace(/^NOW:\s*/i, "Now ");
  return timedWarning.shortText || "";
}

function buildContextAwareVoicePrompt(step, phase) {
  const html = stripHtml(step?.html_instructions || "");
  const text = html.toLowerCase();
  const maneuver = (step?.maneuver || "").toLowerCase();

  const isUTurn     = maneuver.includes("uturn") || text.includes("u-turn");
  const isKeepLeft  = text.includes("keep left");
  const isKeepRight = text.includes("keep right");
  const isExit      = text.includes("exit");
  const isRamp      = text.includes("ramp");
  const isMerge     = text.includes("merge");
  const isLeft      = text.includes("left") && !isKeepLeft;
  const isRight     = text.includes("right") && !isKeepRight;

  if (phase === "prepare") {
    if (isExit)      return t("tw_prep_exit");
    if (isRamp)      return t("tw_prep_ramp");
    if (isKeepLeft)  return t("tw_prep_keep_left");
    if (isKeepRight) return t("tw_prep_keep_right");
    if (isUTurn)     return t("tw_prep_uturn");
    if (isMerge)     return t("tw_prep_merge");
    if (isLeft)      return t("tw_prep_left");
    if (isRight)     return t("tw_prep_right");
    return t("tw_prep_straight");
  }

  if (phase === "soon") {
    if (isExit)      return t("tw_soon_exit");
    if (isRamp)      return t("tw_soon_ramp");
    if (isKeepLeft)  return t("tw_soon_keep_left");
    if (isKeepRight) return t("tw_soon_keep_right");
    if (isUTurn)     return t("tw_soon_uturn");
    if (isMerge)     return t("tw_soon_merge");
    if (isLeft)      return t("tw_soon_left");
    if (isRight)     return t("tw_soon_right");
    return t("tw_soon_straight");
  }

  if (phase === "now") {
    if (isExit)      return t("tw_now_exit");
    if (isRamp)      return t("tw_now_ramp");
    if (isKeepLeft)  return t("tw_now_keep_left");
    if (isKeepRight) return t("tw_now_keep_right");
    if (isUTurn)     return t("tw_now_uturn");
    if (isMerge)     return t("tw_now_merge");
    if (isLeft)      return t("tw_now_left");
    if (isRight)     return t("tw_now_right");
  }

  return t("tw_now_straight");
}

function getPriority(type) {
  if (type === "exit") return 5;
  if (type === "ramp") return 4;
  if (type === "merge") return 3;
  if (type === "lane") return 2;
  return 1;
}

let _currentHighestPriority = 0;

function speakDriveInstruction(step, phase, instructionType) {
  if (!voiceEnabled || !step) return;
  const text = buildContextAwareVoicePrompt(step, phase);
  
  // TASK 3: Kill straight voice
  if (text && text.toLowerCase().includes("straight")) return;
  
  if (!text || text === "Continue straight") return;
  
  // TASK 2: Priority system - only show instruction if it's highest priority
  const priority = getPriority(instructionType);
  if (priority < _currentHighestPriority) return;
  _currentHighestPriority = priority;
  
  const now = Date.now();
  if (Date.now() - lastSpokenAt < 3500 && lastSpokenText === text) return;
  if (text === lastSpokenText && now - lastSpokenAt < 4500) return;
  try {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(normalizeVoiceText(text));
    utter.rate = 1.0; utter.pitch = 1.0; utter.lang = voiceLang();
    window.speechSynthesis.speak(utter);
    lastSpokenText = text;
    lastSpokenAt = now;
  } catch (e) { console.warn("speech failed", e); }
}

let _lastInterchangeWarningAt = 0;

function speakInterchangeWarning() {
  const now = Date.now();
  if (now - _lastInterchangeWarningAt < 30000) return; // Don't repeat within 30s
  _lastInterchangeWarningAt = now;
  
  try {
    if ("speechSynthesis" in window) {
      const text = t("interchange_warn") || "Complex interchange ahead. Stay focused.";
      const utter = new SpeechSynthesisUtterance(normalizeVoiceText(text));
      utter.rate = 0.95; utter.pitch = 1.0; utter.lang = voiceLang();
      window.speechSynthesis.speak(utter);
    }
  } catch (e) { console.warn("interchange voice failed", e); }
}

function getVoicePromptFromManeuver(vm) {
  if (!vm) return "";
  const m = (vm.maneuver || "").toLowerCase();
  if (!m || m === "straight") return "";
  if (m.includes("uturn"))      return t("ctx_uturn");
  if (m.includes("turn-left"))  return t("ctx_left");
  if (m.includes("turn-right")) return t("ctx_right");
  if (m.includes("keep-left"))  return t("ctx_keep_left");
  if (m.includes("keep-right")) return t("ctx_keep_right");
  if (m.includes("ramp"))       return t("ctx_ramp");
  if (m.includes("fork"))       return t("ctx_fork") || "Take the fork";
  if (m.includes("merge"))      return t("ctx_merge");
  return stripHtml(vm.instruction || "");
}


function speakText(text, priority = "normal") {
  if (!voiceEnabled || !text) return;
  if (!("speechSynthesis" in window)) {
    console.warn("Speech synthesis is not supported in this browser.");
    return;
  }
  try {
    const normalized = normalizeVoiceText(stripHtml(text));
    if (!normalized) return;

    const now = Date.now();
    if (normalized === lastSpokenText && now - lastSpokenAt < 5000) return;

    // Urgent maneuver warnings may interrupt; normal AI explanations should queue naturally.
    if (priority === "urgent") window.speechSynthesis.cancel();
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();

    const utter = new SpeechSynthesisUtterance(normalized);
    utter.rate = currentLang === "ar" ? 0.92 : 0.98;
    utter.pitch = 1.0;
    utter.volume = 1.0;
    utter.lang = voiceLang();

    lastSpokenText = normalized;
    lastSpokenAt = now;
    window.speechSynthesis.speak(utter);
  } catch (e) {
    console.warn("speech failed", e);
  }
}


function getBestComparableAlternative(route) {
  const r = route || selectedRoute || _bestRoute;
  if (!r || !Array.isArray(analyzedRoutes)) return null;
  const alternatives = analyzedRoutes
    .filter(function(x) { return x && x.index !== r.index; })
    .sort(function(a, b) {
      const aScore = Math.abs(getDisplayMinutes(a) - getDisplayMinutes(r)) + trafficRank(a.traffic) + (a.complexity || 0) * 0.15;
      const bScore = Math.abs(getDisplayMinutes(b) - getDisplayMinutes(r)) + trafficRank(b.traffic) + (b.complexity || 0) * 0.15;
      return aScore - bScore;
    });
  return alternatives[0] || null;
}

function buildAlternativeComparisonForVoice(route, alt) {

  if (!r || !alt) return "";
  const diff = getDisplayMinutes(alt) - getDisplayMinutes(r);

  const rTraffic = translateTrafficForVoice(r.traffic);

  const rStress = (getUnifiedRouteMeta(r)?.stressLabel || r.drivePersonality || "").toLowerCase();

  if (currentLang === "ru") {
    if (diff < 0) return "Альтернатива через " + altName + " быстрее примерно на " + Math.abs(diff) + " мин, но может быть менее стабильной. Трафик там: " + altTraffic + ".";
    if (diff > 0) return "Альтернатива через " + altName + " медленнее примерно на " + diff + " мин. Она может быть спокойнее, но сейчас основной маршрут выглядит лучше.";
    return "Альтернатива через " + altName + " почти такая же по времени, но текущий маршрут выбран из-за более понятного профиля движения.";

    if (diff > 0) return "Альтернатива через " + altName + " повільніша приблизно на " + diff + " хв. Вона може бути спокійнішою, але зараз основний маршрут виглядає краще.";
    return "Альтернатива через " + altName + " майже така сама за часом, але поточний маршрут обрано через більш зрозумілий профіль руху.";

    if (diff > 0) return "الطريق البديل عبر " + altName + " أبطأ بحوالي " + diff + " دقيقة. قد يكون أهدأ، لكن الطريق الحالي أفضل الآن.";
    return "الطريق البديل عبر " + altName + " قريب جداً في الوقت، لكن الطريق الحالي تم اختياره لأنه أوضح وأكثر استقراراً.";
  }
  if (diff < 0) return "The alternative via " + altName + " is about " + Math.abs(diff) + " minutes faster, but it may be less stable. Traffic there is " + altTraffic + ".";
  if (diff > 0) return "The alternative via " + altName + " is about " + diff + " minutes slower. It may be calmer, but the current route looks stronger now.";

}

function buildTimingAdviceForVoice(route) {

function stripHtml(value) {

    .replace(/<[^>]*>/g, " ")
    .replace(/&nbsp;/g, " ")
    .replace(/&amp;/g, "&")

}

function translateConfidenceForVoice(conf) {

  if (currentLang === "ua") return c === "HIGH" ? "висока" : c === "MEDIUM" ? "середня" : "низька";

  if (currentLang === "ru") return tr === "high" ? "плотный" : tr === "medium" ? "умеренный" : "стабильный";
  if (currentLang === "ua") return tr === "high" ? "щільний" : tr === "medium" ? "помірний" : "стабільний";
  if (currentLang === "ar") return tr === "high" ? "كثيف" : tr === "medium" ? "متوسط" : "مستقر";
  return tr === "high" ? "heavy" : tr === "medium" ? "moderate" : "stable";
}

function getRouteStepsForVoice(routeObj) {
  const r = routeObj || selectedRoute;
  return r?.route?.legs?.[0]?.steps || [];
}

function getStepInstructionText(step) {
  return stripHtml(step?.html_instructions || step?.instructions || "");
}

function getStepDistanceText(step) {
  return step?.distance?.text || "";
}

function isMeaningfulVoiceManeuver(step) {
  if (!step) return false;
  const text = getStepInstructionText(step).toLowerCase();
  const m = String(step.maneuver || "").toLowerCase();
  return /left|right|u-turn|uturn|exit|ramp|merge|fork|keep/.test(text + " " + m);
}

function getVoicePhaseByDistance(distanceMeters) {
  if (distanceMeters == null || !isFinite(distanceMeters)) return "";
  if (distanceMeters <= 100) return "now";
  if (distanceMeters <= 450) return "prepare";
  return "";
}

function buildStartNavigationVoiceText(routeObj) {
  const r = routeObj || selectedRoute;
  const steps = getRouteStepsForVoice(r);
  if (!r || !steps.length) return "";

  const routeName = getRouteSummaryName(r);
  const first = steps[0];
  const firstInstruction = getStepInstructionText(first);
  const firstDistance = getStepDistanceText(first);

  if (currentLang === "ru") {
    return "Начинайте движение" + (routeName ? " по маршруту через " + routeName : "") + ". " +
      (firstInstruction ? "Сначала: " + firstInstruction + (firstDistance ? ", примерно " + firstDistance : "") + "." : "Следуйте по маршруту.");
  }
  if (currentLang === "ua") {
    return "Починайте рух" + (routeName ? " маршрутом через " + routeName : "") + ". " +
      (firstInstruction ? "Спочатку: " + firstInstruction + (firstDistance ? ", приблизно " + firstDistance : "") + "." : "Рухайтесь за маршрутом.");
  }
  if (currentLang === "ar") {
    return "ابدأ القيادة" + (routeName ? " عبر " + routeName : "") + ". " +
      (firstInstruction ? "أولاً: " + firstInstruction + (firstDistance ? "، حوالي " + firstDistance : "") + "." : "اتبع الطريق.");
  }
  return "Start driving" + (routeName ? " via " + routeName : "") + ". " +
    (firstInstruction ? "First, " + firstInstruction + (firstDistance ? " for about " + firstDistance : "") + "." : "Follow the route.");
}

function speakStartNavigation(routeObj) {
  if (!voiceEnabled || hasSpokenStartNavigation) return;
  const text = buildStartNavigationVoiceText(routeObj || selectedRoute);
  if (!text) return;
  hasSpokenStartNavigation = true;
  speakText(text, "normal");
}

function buildTurnVoiceText(step, phase, distanceText) {
  if (!step) return "";
  const base = buildContextAwareVoicePrompt(step, phase) || getStepInstructionText(step);
  if (!base) return "";
  if (currentLang === "ru") {
    return (phase === "now" ? "Сейчас: " : "Подготовьтесь: ") + base + (distanceText && phase !== "now" ? ", через " + distanceText : "");
  }
  if (currentLang === "ua") {
    return (phase === "now" ? "Зараз: " : "Підготуйтеся: ") + base + (distanceText && phase !== "now" ? ", через " + distanceText : "");
  }
  if (currentLang === "ar") {
    return (phase === "now" ? "الآن: " : "استعد: ") + base + (distanceText && phase !== "now" ? "، بعد " + distanceText : "");
  }
  return (phase === "now" ? "Now: " : "Prepare: ") + base + (distanceText && phase !== "now" ? " in " + distanceText : "");
}

function maybeSpeakDriveNavigation(routeObj, stepIndex, timedWarning, laneGuidance) {
  if (!voiceEnabled || !routeObj || !lastKnownUserLatLng) return;
  if (!document.getElementById("drive-mode")?.classList.contains("active")) return;

  const steps = getRouteStepsForVoice(routeObj);
  const step = steps[stepIndex];
  if (!step) return;

  const distanceMeters = getDistanceToStepEndMeters(step, lastKnownUserLatLng);
  let phase = "";
  let type = "maneuver";
  let distanceText = formatDriveMeters(distanceMeters);

  if (laneGuidance && ["prepare", "soon", "now"].includes(laneGuidance.phase)) {
    phase = laneGuidance.phase === "soon" ? "prepare" : laneGuidance.phase;
    type = laneGuidance.type || "lane";
    distanceText = laneGuidance.distanceText || distanceText;
  } else if (timedWarning && ["prepare", "soon", "now"].includes(timedWarning.phase)) {
    phase = timedWarning.phase === "soon" ? "prepare" : timedWarning.phase;
    type = timedWarning.type || "warning";
    distanceText = timedWarning.distanceText || distanceText;
  } else {
    if (!isMeaningfulVoiceManeuver(step)) return;
    phase = getVoicePhaseByDistance(distanceMeters);
    if (!phase) return;
  }

  // Do not speak from GPS jitter. "Prepare" needs real movement; "now" can speak close to maneuver.
  if (phase !== "now" && lastDriveGpsMoveMeters < 25) return;

  const key = stepIndex + ":" + phase + ":" + type;
  const now = Date.now();
  if (key === lastVoiceInstructionKey && now - lastVoiceInstructionAt < 45000) return;
  if (lastDriveVoiceStepIndex === stepIndex && lastDriveVoicePhase === phase && now - lastVoiceInstructionAt < 45000) return;

  const text = buildTurnVoiceText(step, phase, distanceText);
  if (!text) return;

  lastVoiceInstructionKey = key;
  lastVoiceInstructionAt = now;
  lastDriveVoiceStepIndex = stepIndex;
  lastDriveVoicePhase = phase;
  speakText(text, phase === "now" ? "urgent" : "normal");
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;

  if (!voiceEnabled) {
    if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    return;
  }

  // User interaction unlocks speech on iPhone/Safari.

    speakCurrentDecision();
    setTimeout(function() { speakStartNavigation(selectedRoute); }, 900);
  } else {
    speakCurrentDecision();
  }
}

function toggleFollowMode() {
  followUserMode = !followUserMode;

  if (followUserMode && lastKnownUserLatLng) {
    updateDriveCamera(lastKnownUserLatLng);
  }
}

function getDriveTimedWarning(r, stepIndex) {
  const steps = r.route.legs[0].steps;
  const ulng  = lastKnownUserLatLng;

  // CURRENT step only — never advance to next step here
  const curWarning = getStepWarningMeta(steps[stepIndex], r.route);
  if (curWarning && steps[stepIndex]) {
    const timed = buildTimedWarning(curWarning, steps[stepIndex], ulng);
    if (timed) return timed;
  }

  return null;
}

function getHeldTimedWarning(timedWarning) {
  const now = Date.now();

  if (!timedWarning) {
    if (heldTimedWarning && now < heldTimedWarningUntil) {
      return heldTimedWarning;
    }
    heldTimedWarning = null;
    heldTimedWarningUntil = 0;
    return null;
  }

  const nextPhase = timedWarning.phase || "";
  const currentPhase = lastStableTimedPhase || "";

  if (nextPhase !== currentPhase) {
    if (now - lastPhaseChangeAt < 1800 && currentPhase) {
      if (heldTimedWarning && now < heldTimedWarningUntil) {
        return heldTimedWarning;
      }
    }
    lastPhaseChangeAt = now;
    lastStableTimedPhase = nextPhase;
  }

  heldTimedWarning = timedWarning;
  heldTimedWarningUntil = now + 2500;

  return heldTimedWarning;
}

// ── Lane / Exit Guidance Block (lookahead, separate from main instruction) ──

function buildLaneGuidanceText(meta, phase) {
  const type = meta?.type || "";
  const base = meta?.shortText || "";
  const laneHint = meta?.laneHint || "";

  if (type === "exit") {
    if (phase === "prepare") return laneHint ? `${laneHint} — exit ahead` : base.replace("ahead", "").trim();
    if (phase === "soon")    return laneHint ? `${laneHint} — exit soon` : base;
    if (phase === "now")     return t("lg_exit_now");
  }

  if (type === "ramp") {
    if (phase === "prepare") return laneHint ? `${laneHint} — ramp ahead` : base.replace("ahead", "").trim();
    if (phase === "soon")    return laneHint ? `${laneHint} — ramp soon` : base;
    if (phase === "now")     return t("lg_ramp_now");
  }

  if (type === "fork") {
    if (phase === "prepare") return laneHint ? `${laneHint} — fork ahead` : base;
    if (phase === "soon")    return laneHint ? `${laneHint} — fork soon` : base;
    if (phase === "now") {
      if (base.toLowerCase().includes("left"))  return "Fork left now";
      if (base.toLowerCase().includes("right")) return "Fork right now";
      return "Take the fork now";
    }
  }

  if (type === "lane") {
    if (phase === "prepare") return laneHint || base;
    if (phase === "soon")    return laneHint || base;
    if (phase === "now") {
      if (base.toLowerCase().includes("left"))  return "Keep left now";
      if (base.toLowerCase().includes("right")) return "Keep right now";
      return "Use the correct lane now";
    }
  }

  if (type === "merge") {
    if (phase === "prepare") return laneHint || "Prepare to merge";
    if (phase === "soon")    return laneHint || "Merge ahead";
    if (phase === "now")     return "Merge now";
  }

  return laneHint || base;
}

function getDriveLaneGuidance(r, stepIndex, userLatLng) {
  const steps = r.route.legs[0].steps;
  const ulng = userLatLng || lastKnownUserLatLng;
  const now = Date.now();

  const candidates = [];

  for (let i = stepIndex; i < Math.min(steps.length, stepIndex + 4); i++) {
    const step = steps[i];
    const meta = getStepWarningMeta(step, r.route);
    if (!meta) continue;

    if (!["lane", "exit", "ramp", "merge", "fork"].includes(meta.type)) continue;

    const meters = getEffectiveDistanceToStepMeters(steps, stepIndex, i, ulng);
    const phase = getWarningPhaseForType(meters, meta.type);
    if (phase === "none") continue;

  const priority =
  meta.type === "exit" || meta.type === "ramp" || meta.type === "fork" ? 3 :
  meta.type === "lane" ? 2 :
  meta.type === "merge" ? 1 : 0;

    candidates.push({
      stepIndex: i,
      type: meta.type,
      phase,
      priority,
      meters,
      icon: meta.icon,
      shortText: buildLaneGuidanceText(meta, phase),
      text: buildLaneGuidanceText(meta, phase),
      distanceText:
        meters == null
          ? "Ahead"
          : meters <= 60
            ? "Now"
            : meters < 1000
              ? `${Math.round(meters / 10) * 10} m`
              : `${(meters / 1000).toFixed(1)} km`
    });
  }

  if (!candidates.length) {
    if (_laneGuidanceHeld && now < _laneGuidanceHeldUntil) {
      return _laneGuidanceHeld;
    }
    _laneGuidanceHeld = null;
    _laneGuidanceHeldUntil = 0;
    return null;
  }

  // Жёсткий приоритет: exit/ramp > lane > merge; фаза; ближайший
  candidates.sort((a, b) => {
    if (b.priority !== a.priority) return b.priority - a.priority;
    const phaseRank = { now: 3, soon: 2, prepare: 1 };
    if (phaseRank[b.phase] !== phaseRank[a.phase]) return phaseRank[b.phase] - phaseRank[a.phase];
    return (a.meters ?? 999999) - (b.meters ?? 999999);
  });

  const best = candidates[0];

  // Улучшенный hold: держим старое если тот же тип+фаза или held приоритетнее
  if (_laneGuidanceHeld && now < _laneGuidanceHeldUntil) {
    const sameType  = _laneGuidanceHeld.type  === best.type;
    const samePhase = _laneGuidanceHeld.phase === best.phase;

    if (sameType && samePhase) {
      return _laneGuidanceHeld;
    }

    const heldPriority =
      _laneGuidanceHeld.type === "exit" || _laneGuidanceHeld.type === "ramp" ? 3 :
      _laneGuidanceHeld.type === "lane" ? 2 :
      _laneGuidanceHeld.type === "merge" ? 1 : 0;

    if (heldPriority > best.priority) {
      return _laneGuidanceHeld;
    }
  }

  _laneGuidanceHeld = best;
  _laneGuidanceHeldUntil = now + 2200;
  return best;
}

function getUpcomingCondition(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const upcoming = steps.slice(stepIndex, stepIndex + 5);

  const timedWarning = getDriveTimedWarning(r, stepIndex);
  if (timedWarning) {
    return { type: timedWarning.phase === "now" ? "alert" : "warning", icon: timedWarning.icon, text: timedWarning.longText };
  }

  const hasHighway = upcoming.some(s => stepLooksLikeHighway(s, r.route));
  const hasManyTurns = upcoming.filter(s => isMeaningfulManeuver(s, r.route)).length >= 3;
  const isNearEnd = stepIndex >= steps.length - 3;

  if (r.traffic === "high") return { type: "warning", icon: "&#9888;", text: "Heavier traffic ahead" };
  if (hasManyTurns)         return { type: "warning", icon: "&#128260;", text: "Multiple turns ahead" };
  if (isNearEnd)            return { type: "stable",  icon: "&#127937;", text: "Approaching destination" };
  if (hasHighway)           return { type: "stable",  icon: "&#128739;", text: "Highway section ahead — smooth driving" };
  if (r.traffic === "low")  return { type: "stable",  icon: "&#9728;", text: "Stable traffic ahead" };
  return { type: "stable", icon: "&#9728;", text: "Moderate conditions ahead" };
}

function getRerouteDecision(currentRoute, alternativeRoute) {
  if (!currentRoute || !alternativeRoute) {
    return { action: "stay", confidence: "low", title: "Stay on current route", detail: "Missing route data" };
  }

  const currentMin = getDisplayMinutes(currentRoute);
  const altMin = getDisplayMinutes(alternativeRoute);
  const timeGain = currentMin - altMin;

  const currentDelay = currentRoute.delayMinutes || 0;
  const altDelay = alternativeRoute.delayMinutes || 0;
  const delayGain = currentDelay - altDelay;

  const currentScore = Number.isFinite(currentRoute.score) ? currentRoute.score : calculateRouteScore(currentRoute);
  const altScore = Number.isFinite(alternativeRoute.score) ? alternativeRoute.score : calculateRouteScore(alternativeRoute);
  const scoreGain = currentScore - altScore;

  const trafficBetter = trafficRank(alternativeRoute.traffic) < trafficRank(currentRoute.traffic);
  const simplerDrive = (alternativeRoute.complexity || 0) < (currentRoute.complexity || 0);
  const calmerDrive = (alternativeRoute.stressLevel || 0) < (currentRoute.stressLevel || 0);
  const fewerStops = (alternativeRoute.stopsCount || 0) < (currentRoute.stopsCount || 0);
  const tollImprovement = !!currentRoute.tolls && !alternativeRoute.tolls;

  const reasons = [];
  if (timeGain > 0) reasons.push(timeGain + " min faster");
  if (delayGain > 0) reasons.push(delayGain + " min less delay");
  if (trafficBetter) reasons.push("lighter traffic");
  if (simplerDrive) reasons.push("simpler drive");
  if (calmerDrive) reasons.push("calmer route");
  if (fewerStops) reasons.push("fewer stops");
  if (tollImprovement) reasons.push("no tolls");
  if (!reasons.length && scoreGain > 0) reasons.push("better total score");

  const reasonText = reasons.slice(0, 3).join(" · ") || "No strong advantage";
  const via = getRouteSummaryName(alternativeRoute);

  if (timeGain >= 4 || scoreGain >= 10) {
    return {
      action: "switch",
      confidence: "high",
      title: timeGain >= 4 ? ("Switch now → save " + timeGain + " min") : "Switch now → better route score",
      detail: reasonText + " via " + via,
      timeGain,
      delayGain,
      scoreGain
    };
  }

  if ((timeGain >= 2 && (trafficBetter || delayGain >= 2 || scoreGain >= 5)) || scoreGain >= 7) {
    return {
      action: "switch",
      confidence: "high",
      title: "Switch recommended",
      detail: reasonText + " via " + via,
      timeGain,
      delayGain,
      scoreGain
    };
  }

  if ((timeGain >= 1 && (trafficBetter || simplerDrive || calmerDrive || delayGain >= 1)) || scoreGain >= 4) {
    return {
      action: "suggest",
      confidence: "medium",
      title: "Alternative may be better",
      detail: reasonText + " via " + via,
      timeGain,
      delayGain,
      scoreGain
    };
  }

  if (timeGain >= 0 && (trafficBetter || calmerDrive || tollImprovement) && scoreGain >= 2) {
    return {
      action: "suggest",
      confidence: "medium",
      title: "Calmer route available",
      detail: reasonText + " via " + via,
      timeGain,
      delayGain,
      scoreGain
    };
  }

  return {
    action: "stay",
    confidence: "low",
    title: "Stay on current route",
    detail: "No strong reroute advantage",
    timeGain,
    delayGain,
    scoreGain
  };
}

function renderDriveAlertDecision(decision, altRoute) {
  const alert = document.getElementById("drive-alert");
  const message = document.getElementById("drive-alert-message");

  if (!alert || !message) return;

  if (!decision || decision.action === "stay" || !altRoute) {

                          decision.confidence === "medium" ? "medium" : "low";

  const scoreText = Number.isFinite(decision.scoreGain) ? ("Score +" + Math.round(decision.scoreGain)) : "AI route check";

  _rerouteDecision = {
    action: decision.action,
    confidence: decision.confidence,
    targetIndex: altRoute.index,
    title: decision.title,
    detail: decision.detail,
    scoreGain: decision.scoreGain || 0,
    timeGain: decision.timeGain || 0,
