<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Clear Road UAE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f5f5f0">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d6a4f;
      --green-light: #40916c;
      --green-bg: #d8f3dc;
      --yellow: #f59e0b;
      --yellow-bg: #fef3c7;
      --beige: #a8a29e;
      --beige-bg: #f5f5f0;
      --gray: #6b7280;
      --dark: #1f2937;
      --white: #ffffff;
      --border: #e5e5e5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: var(--beige-bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 80px;
    }

    /* ===== INPUT PANEL ===== */
    .input-panel {
      background: var(--white);
      margin: 16px;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .input-row:first-child {
      border-bottom: 1px solid var(--border);
    }

    .input-label {
      font-size: 14px;
      color: var(--gray);
      min-width: 40px;
    }

    .input-value {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      color: var(--dark);
      border: none;
      background: transparent;
      outline: none;
    }

    .input-value::placeholder {
      color: var(--gray);
      font-weight: 400;
    }

    .voice-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .voice-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    /* ===== BEST ROUTE CARD ===== */
    .best-card {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      margin: 0 16px 12px;
      border-radius: 20px;
      padding: 20px;
      position: relative;
    }

    .best-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .best-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .best-badge svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .best-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .best-title .check {
      color: var(--green);
    }

    .best-subtitle {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 12px;
    }

    .best-reason {
      font-size: 15px;
      color: #374151;
      line-height: 1.5;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .best-points {
      margin-bottom: 16px;
    }

    .best-point {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #374151;
      margin-bottom: 6px;
    }

    .best-point::before {
      content: "";
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .confidence-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .confidence-high {
      background: var(--green);
      color: white;
    }

    .confidence-medium {
      background: #fbbf24;
      color: #1f2937;
    }

    .confidence-low {
      background: #d1d5db;
      color: #374151;
    }

    .start-btn {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .start-btn:hover {
      background: var(--green-light);
    }

    .why-link {
      text-align: center;
      font-size: 14px;
      color: var(--gray);
      cursor: pointer;
    }

    .why-link:hover {
      color: var(--dark);
    }

    /* ===== ALTERNATIVE CARDS ===== */
    .alt-card {
      margin: 0 16px 12px;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .alt-card:hover {
      transform: translateY(-2px);
    }

    .alt-card.faster_risky {
      background: var(--yellow-bg);
    }

    .alt-card.more_relaxed {
      background: #f5f5f0;
      border: 1px solid var(--border);
    }

    .alt-card.balanced, .alt-card.similar {
      background: #f8fafc;
      border: 1px solid var(--border);
    }

    .alt-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .alt-card.faster_risky .alt-icon {
      background: #fcd34d;
    }

    .alt-card.more_relaxed .alt-icon {
      background: #d6d3d1;
    }

    .alt-card.balanced .alt-icon,
    .alt-card.similar .alt-icon {
      background: #e2e8f0;
    }

    .alt-content {
      flex: 1;
    }

    .alt-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 2px;
    }

    .alt-subtitle {
      font-size: 14px;
      color: var(--gray);
    }

    .alt-arrow {
      color: var(--gray);
      font-size: 18px;
    }

    /* ===== QUICK ACCESS ===== */
    .quick-section {
      margin: 20px 16px 12px;
    }

    .quick-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .quick-list {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
    }

    .quick-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .quick-item:last-child {
      border-bottom: none;
    }

    .quick-item:hover {
      background: #fafafa;
    }

    .quick-icon {
      width: 40px;
      height: 40px;
      background: #f3f4f6;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray);
      font-size: 18px;
    }

    .quick-label {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      color: var(--dark);
    }

    .quick-arrow {
      color: #d1d5db;
      font-size: 18px;
    }

    /* ===== MAP PREVIEW ===== */
    .map-preview {
      margin: 0 16px;
      height: 180px;
      border-radius: 16px;
      overflow: hidden;
      background: #e5e5e5;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 0 20px;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 6px 16px;
    }

    .nav-item.active {
      color: var(--green);
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 500;
    }

    /* ===== ROUTE DETAILS MODAL ===== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .modal-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .modal-overlay.visible .modal-content {
      transform: translateY(0);
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: #d1d5db;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
    }

    .modal-role-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .modal-role-badge.recommended {
      background: var(--green);
      color: white;
    }

    .modal-role-badge.alternative {
      background: #e5e7eb;
      color: #374151;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .detail-item {
      background: #f9fafb;
      padding: 14px;
      border-radius: 12px;
    }

    .detail-label {
      font-size: 12px;
      color: var(--gray);
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--dark);
    }

    .detail-item.full-width {
      grid-column: 1 / -1;
    }

    .modal-why {
      background: #f0fdf4;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .modal-why-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 8px;
    }

    .modal-why-points {
      list-style: none;
    }

    .modal-why-points li {
      font-size: 14px;
      color: #166534;
      line-height: 1.5;
      padding-left: 20px;
      position: relative;
      margin-bottom: 6px;
    }

    .modal-why-points li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
    }

    .segment-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .segment-item {
      background: #f9fafb;
      padding: 14px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .segment-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .segment-icon.highway { background: #dbeafe; }
    .segment-icon.city { background: #fef3c7; }
    .segment-icon.traffic { background: #fee2e2; }
    .segment-icon.turns { background: #f3e8ff; }

    .segment-content {
      flex: 1;
    }

    .segment-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
    }

    .segment-details {
      font-size: 13px;
      color: var(--gray);
    }

    .comparison-note {
      background: #fef3c7;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      color: #92400e;
      margin-bottom: 16px;
    }

    .modal-cta {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-cta:hover {
      background: var(--green-light);
    }

    /* ===== DRIVE MODE ===== */
    .drive-mode {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0f172a;
      z-index: 2000;
      flex-direction: column;
    }

    .drive-mode.active {
      display: flex;
    }

    .drive-header {
      padding: 16px 20px;
      background: #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .drive-status {
      color: #94a3b8;
      font-size: 14px;
    }

    .drive-exit {
      padding: 10px 20px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .drive-map-container {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    #drive-map {
      width: 100%;
      height: 100%;
    }

    /* ===== DRIVE MODE: AHEAD BLOCK ===== */
    .drive-ahead {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      background: rgba(30, 41, 59, 0.95);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .drive-ahead-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .drive-ahead-icon.stable { background: #166534; }
    .drive-ahead-icon.warning { background: #f59e0b; }
    .drive-ahead-icon.alert { background: #ef4444; }

    .drive-ahead-text {
      flex: 1;
      color: white;
      font-size: 14px;
      font-weight: 500;
    }

    /* ===== DRIVE MODE: SMART ALERT ===== */
    .drive-alert {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: rgba(30, 41, 59, 0.95);
      border-radius: 14px;
      padding: 16px;
      display: none;
    }

    .drive-alert.visible {
      display: block;
    }

    .drive-alert-message {
      color: white;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .drive-alert-actions {
      display: flex;
      gap: 10px;
    }

    .drive-alert-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .drive-alert-btn.primary {
      background: var(--green);
      color: white;
    }

    .drive-alert-btn.secondary {
      background: #475569;
      color: white;
    }

    .drive-panel {
      background: #1e293b;
      padding: 24px 20px;
      border-radius: 28px 28px 0 0;
    }

    .drive-eta {
      text-align: center;
      margin-bottom: 16px;
    }

    .drive-eta-time {
      font-size: 56px;
      font-weight: 700;
      color: white;
      line-height: 1;
    }

    .drive-eta-label {
      font-size: 14px;
      color: #64748b;
      margin-top: 4px;
    }

    .drive-info {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 16px 0;
      border-top: 1px solid #334155;
    }

    .drive-info-item {
      text-align: center;
    }

    .drive-info-value {
      font-size: 22px;
      font-weight: 600;
      color: white;
    }

    .drive-info-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    .drive-next {
      margin-top: 16px;
      padding: 18px;
      background: #334155;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .drive-next-icon {
      width: 52px;
      height: 52px;
      background: var(--green);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: white;
    }

    .drive-next-text {
      flex: 1;
    }

    .drive-next-instruction {
      color: white;
      font-size: 17px;
      font-weight: 600;
    }

    .drive-next-distance {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 4px;
    }

    /* ===== HIDDEN ELEMENTS ===== */
    .hidden {
      display: none !important;
    }

    /* ===== LOADING STATE ===== */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--gray);
      font-size: 15px;
    }

    .error {
      margin: 16px;
      padding: 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 12px;
      color: #b91c1c;
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- INPUT PANEL -->
<div class="input-panel">
  <div class="input-row">
    <span class="input-label">From:</span>
    <input type="text" class="input-value" id="start" placeholder="Current location" value="Dubai Marina">
    <button class="voice-btn">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
    </button>
  </div>
  <div class="input-row">
    <span class="input-label">To:</span>
    <input type="text" class="input-value" id="end" placeholder="Where to?" value="Dubai International Airport">
  </div>
</div>

<!-- RESULTS CONTAINER -->
<div id="results"></div>

<!-- QUICK ACCESS -->
<div class="quick-section" id="quick-access">
  <div class="quick-title">Quick Access</div>
  <div class="quick-list">
    <div class="quick-item" onclick="setDestination('Home')">
      <div class="quick-icon">&#127968;</div>
      <div class="quick-label">Home</div>
      <div class="quick-arrow">&#8250;</div>
    </div>
    <div class="quick-item" onclick="setDestination('Work')">
      <div class="quick-icon">&#128188;</div>
      <div class="quick-label">Work</div>
      <div class="quick-arrow">&#8250;</div>
    </div>
  </div>
</div>

<!-- MAP PREVIEW -->
<div class="map-preview">
  <div id="map"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
    <span class="nav-label">Start</span>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
    <span class="nav-label">History</span>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
    <span class="nav-label">AI Insights</span>
  </div>
  <div class="nav-item">

<script>
let map;
let driveMap;
let directionsService;
let renderers = [];
let analyzedRoutes = [];
let selectedRoute = null;
let currentDirectionsResult = null;
let driveRenderer = null;
let driveInterval = null;
let currentStepIndex = 0;
let betterRouteIndex = null;

// ===== ТЗ2: ROUTE METRICS & SCORE =====

function calculateRouteMetrics(route, leg, rawRoute) {
  const baseTime = leg.duration.value;
  const time = leg.duration_in_traffic?.value || baseTime;
  const distance = leg.distance.value;
  const delaySeconds = Math.max(0, time - baseTime);
  const delayMinutes = Math.round(delaySeconds / 60);
  const complexity = countComplexity(leg, rawRoute);
  const highwayShare = calculateHighwayShare(leg, rawRoute);
  const traffic = getTrafficLevel(baseTime, time);
  
  return {
    time,
    baseTime,
    distance,
    delaySeconds,
    delayMinutes,
    complexity,
    highwayShare,
    traffic,
    highway: highwayShare >= 0.35
  };
}

function calculateHighwayShare(leg, route) {
  const total = leg.distance?.value || 0;
  if (!total) return 0;
  
  let hwDistance = 0;
  leg.steps.forEach(step => {
    if (stepLooksLikeHighway(step, route)) {
      hwDistance += step.distance?.value || 0;
    }
  });
  
  return hwDistance / total;
}

function calculateRouteScore(r, allRoutes) {
  // Нормализованный score
  const fastest = allRoutes.length ? Math.min(...allRoutes.map(x => x.time)) : r.time;
  const timeScore = (r.time - fastest) / 60; // в минутах от fastest
  
  const trafficPenalty = r.traffic === "high" ? 15 : r.traffic === "medium" ? 5 : 0;
  const complexityPenalty = r.complexity * 0.75;
  const highwayBonus = r.highwayShare * -3; // бонус за highway
  const delayPenalty = r.delayMinutes * 1.5;
  
  // Stability score (0-100, выше = стабильнее)
  const stabilityScore = Math.max(0, 100 - trafficPenalty * 3 - r.complexity * 2 - r.delayMinutes * 4);
  
  const score = timeScore + trafficPenalty + complexityPenalty + highwayBonus + delayPenalty;
  
  return {
    score,
    timeScore,
    trafficPenalty,
    complexityPenalty,
    highwayBonus,
    delayPenalty,
    stabilityScore
  };
}

function getRouteRole(r, bestRoute, fastestRoute, allRoutes) {
  // ТЗ STEP 4: Assign EXACTLY one role based on comparison
  if (r.index === bestRoute.index) return "recommended";
  
  const diffFromBest = getDisplayDiff(r, bestRoute); // negative = faster
  const isFaster = diffFromBest < 0;
  const isSlower = diffFromBest > 0;
  
  // Check risk factors
  const hasMoreTraffic = trafficRank(r.traffic) > trafficRank(bestRoute.traffic);
  const hasMoreDelay = r.delayMinutes > bestRoute.delayMinutes + 2;
  const isRiskier = hasMoreTraffic || hasMoreDelay;
  
  // Check relaxation factors
  const fewerTurns = r.complexity < bestRoute.complexity - 1;
  const lighterTraffic = trafficRank(r.traffic) < trafficRank(bestRoute.traffic);
  const isMoreRelaxed = fewerTurns || lighterTraffic;
  
  // Check similarity
  const timeSimilar = Math.abs(diffFromBest) <= 1;
  const complexitySimilar = Math.abs(r.complexity - bestRoute.complexity) <= 2;
  const trafficSimilar = trafficRank(r.traffic) === trafficRank(bestRoute.traffic);
  const isSimilar = timeSimilar && complexitySimilar && trafficSimilar;
  
  // Assign role
  if (isFaster && isRiskier) return "faster_risky";
  if (isSlower && isMoreRelaxed) return "more_relaxed";
  if (isSimilar) return "similar";
  return "balanced";
}

// ===== ТЗ2: WHY GENERATION =====

function buildPrimaryWhy(r, bestRoute, fastestRoute, allRoutes) {
  const isBest = r.index === bestRoute.index;
  const isFastest = r.index === fastestRoute.index;
  const diffFromFastest = getDisplayDiff(r, fastestRoute);
  const diffFromBest = getDisplayDiff(r, bestRoute);
  
  // ТЗ: WHY MUST compare routes. No generic statements.
  
  if (isBest) {
    if (isFastest) {
      // Best = Fastest
      if (r.delayMinutes <= 2) {
        return "Fastest route with stable traffic.";
      }
      return "Fastest route available.";
    }
    
    // Best but NOT fastest - MUST explain why chosen over fastest
    const absDiff = Math.abs(diffFromFastest);
    
    if (r.delayMinutes < fastestRoute.delayMinutes) {
      const delayDiff = fastestRoute.delayMinutes - r.delayMinutes;
      return `Only ${absDiff} min slower than fastest, but ${delayDiff} min lower delay risk.`;
    }
    
    if (trafficRank(r.traffic) < trafficRank(fastestRoute.traffic)) {
      return `Only ${absDiff} min slower than fastest, but with lighter traffic.`;
    }
    
    if (r.stabilityScore > fastestRoute.stabilityScore + 10) {
      return `Only ${absDiff} min slower than fastest, but more stable conditions.`;
    }
    
    if (r.complexity < fastestRoute.complexity - 1) {
      const fewerTurns = fastestRoute.complexity - r.complexity;
      return `${absDiff} min slower than fastest, but ${fewerTurns} fewer turns.`;
    }
    
    return `Same time as alternatives, but lower delay risk.`;
  }
  
  // Alternative routes - MUST compare to recommended
  const role = r.role;
  const absDiffFromBest = Math.abs(diffFromBest);
  
  if (role === "faster_risky") {
    if (r.traffic === "high" && bestRoute.traffic !== "high") {
      return `${absDiffFromBest} min faster than recommended, but heavy traffic expected.`;
    }
    if (r.delayMinutes > bestRoute.delayMinutes) {
      const delayDiff = r.delayMinutes - bestRoute.delayMinutes;
      return `${absDiffFromBest} min faster than recommended, but +${delayDiff} min delay risk.`;
    }
    return `${absDiffFromBest} min faster than recommended, but less predictable.`;
  }
  
  if (role === "more_relaxed") {
    const fewerTurns = bestRoute.complexity - r.complexity;
    if (fewerTurns > 0) {
      return `${diffFromBest} min slower than recommended, but ${fewerTurns} fewer maneuvers.`;
    }
    if (trafficRank(r.traffic) < trafficRank(bestRoute.traffic)) {
      return `${diffFromBest} min slower than recommended, but lighter traffic.`;
    }
    return `${diffFromBest} min slower than recommended, but more relaxed driving.`;
  }
  
  if (role === "similar") {
    if (diffFromBest === 0) {
      return "Same time as recommended, similar conditions.";
    }
    return `${absDiffFromBest} min ${diffFromBest > 0 ? "slower" : "faster"} than recommended, similar overall.`;
  }
  
  // balanced
  if (diffFromBest > 0) {
    return `${diffFromBest} min slower than recommended.`;
  } else if (diffFromBest < 0) {
    return `${absDiffFromBest} min faster than recommended.`;
  }
  return "Similar to recommended route.";
}

function buildSecondaryWhyPoints(r, bestRoute, fastestRoute, allRoutes) {
  const points = [];
  const isBest = r.index === bestRoute.index;
  const isFastest = r.index === fastestRoute.index;
  
  // ТЗ: Secondary points MUST be comparative when possible (max 2 points)
  
  if (isBest) {
    // Compare to alternatives/fastest
    if (!isFastest) {
      const diffFromFastest = Math.abs(getDisplayDiff(r, fastestRoute));
      if (r.delayMinutes < fastestRoute.delayMinutes) {
        points.push(`Lower delay than fastest option (+${fastestRoute.delayMinutes - r.delayMinutes} min saved).`);
      }
    }
    
    // Highway comparison
    const avgHighway = allRoutes.reduce((sum, x) => sum + x.highwayShare, 0) / allRoutes.length;
    if (r.highwayShare > avgHighway + 0.1) {
      points.push(`Higher highway usage than alternatives.`);
    }
    
    // Complexity comparison
    const avgComplexity = allRoutes.reduce((sum, x) => sum + x.complexity, 0) / allRoutes.length;
    if (r.complexity < avgComplexity - 1) {
      points.push(`Fewer turns than alternatives.`);
    }
    
  } else {
    // Alternative route - compare to recommended
    const diff = getDisplayDiff(r, bestRoute);
    
    // Traffic comparison
    if (trafficRank(r.traffic) > trafficRank(bestRoute.traffic)) {
      points.push("Heavier traffic than recommended.");
    } else if (trafficRank(r.traffic) < trafficRank(bestRoute.traffic)) {
      points.push("Lighter traffic than recommended.");
    }
    
    // Complexity comparison
    if (r.complexity > bestRoute.complexity + 2) {
      points.push(`More complex route (+${r.complexity - bestRoute.complexity} turns).`);
    } else if (r.complexity < bestRoute.complexity - 2) {
      points.push(`Fewer turns (${bestRoute.complexity - r.complexity} less).`);
    }
    
    // Delay comparison
    if (r.delayMinutes > bestRoute.delayMinutes + 2) {
      points.push(`Higher delay risk (+${r.delayMinutes - bestRoute.delayMinutes} min).`);
    }
  }
  
  return points.slice(0, 2); // ТЗ: Max 2 points
}

// ===== ТЗ3: CONFIDENCE LEVEL =====

function getConfidenceLevel(bestRoute, allRoutes) {
  if (allRoutes.length <= 1) return "high";
  
  const sorted = [...allRoutes].sort((a, b) => a.score - b.score);
  const best = sorted[0];
  const second = sorted[1];
  
  const scoreDiff = second.score - best.score;
  const timeDiff = Math.abs(getDisplayDiff(best, second));
  
  // High confidence: clear winner
  if (scoreDiff > 8 || timeDiff >= 5) return "high";
  
  // Low confidence: very similar routes
  if (scoreDiff < 3 && timeDiff <= 1) return "low";
  
  // Medium confidence: some difference
  return "medium";
}

function getConfidenceText(level) {
  if (level === "high") return "High confidence";
  if (level === "medium") return "Good option";
  return "Close alternatives";
}

// ===== ТЗ3: VIEW MODELS =====

function buildBestCardViewModel(best, fastest, allRoutes) {
  const confidence = getConfidenceLevel(best, allRoutes);
  const primaryWhy = buildPrimaryWhy(best, best, fastest, allRoutes);
  const whyPoints = buildSecondaryWhyPoints(best, best, fastest, allRoutes);
  
  return {
    name: getRouteSummaryName(best),
    minutes: getDisplayMinutes(best),
    traffic: best.traffic,
    complexity: best.complexity,
    confidence,
    confidenceText: getConfidenceText(confidence),
    primaryWhy,
    whyPoints,
    index: best.index
  };
}

function buildAlternativeCardViewModel(r, best, fastest, allRoutes) {
  const role = r.role;
  const diff = getDisplayDiff(r, best);
  const mins = getDisplayMinutes(r);
  
  const roleLabels = {
    faster_risky: "Faster, but risky",
    more_relaxed: "More relaxed",
    balanced: "Alternative",
    similar: "Similar option"
  };
  
  let subtitle = `~${mins} min`;
  
  if (role === "faster_risky") {
    if (r.traffic !== "low") subtitle += " · heavier traffic";
  } else if (role === "more_relaxed") {
    subtitle += " · fewer stops";
  } else if (diff > 0) {
    subtitle += ` · +${diff} min`;
  } else if (diff < 0) {
    subtitle += ` · ${Math.abs(diff)} min faster`;
  }
  
  return {
    title: roleLabels[role] || "Alternative",
    subtitle,
    role,
    index: r.index
  };
}

// ===== ТЗ4: ROUTE SEGMENTS =====

function buildRouteSegments(r) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const segments = [];
  
  let currentSegment = null;
  let segmentSteps = [];
  
  steps.forEach((step, i) => {
    const isHw = stepLooksLikeHighway(step, r.route);
    const isMeaningful = isMeaningfulManeuver(step, r.route);
    
    // Определяем тип сегмента
    let type = isHw ? "highway" : "city";
    
    // Проверяем плотность манёвров
    if (!isHw && isMeaningful) {
      const nearbyManeuvers = steps.slice(Math.max(0, i-2), i+3)
        .filter(s => isMeaningfulManeuver(s, r.route)).length;
      if (nearbyManeuvers >= 3) {
        type = "turns";
      }
    }
    
    if (!currentSegment || currentSegment.type !== type) {
      if (currentSegment && segmentSteps.length > 0) {
        currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
        currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
        segments.push(currentSegment);
      }
      
      currentSegment = { type, steps: [] };
      segmentSteps = [];
    }
    
    segmentSteps.push(step);
    currentSegment.steps = segmentSteps;
  });
  
  // Добавляем последний сегмент
  if (currentSegment && segmentSteps.length > 0) {
    currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
    currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
    segments.push(currentSegment);
  }
  
  // Объединяем маленькие сегменты и добавляем traffic если есть задержка
  const mergedSegments = [];
  segments.forEach(seg => {
    if (seg.distance < 500 && mergedSegments.length > 0) {
      // Объединяем с предыдущим
      const prev = mergedSegments[mergedSegments.length - 1];
      prev.distance += seg.distance;
      prev.duration += seg.duration;
    } else {
      mergedSegments.push(seg);
    }
  });
  
  // Помечаем сегменты с traffic проблемами
  if (r.delayMinutes > 3 && mergedSegments.length > 0) {
    // Предполагаем что traffic проблемы в городских участках
    const citySegment = mergedSegments.find(s => s.type === "city");
    if (citySegment) {
      citySegment.type = "traffic";
    }
  }
  
  return mergedSegments.map(seg => classifySegment(seg, r));
}

function classifySegment(seg, route) {
  const km = (seg.distance / 1000).toFixed(1);
  const mins = Math.round(seg.duration / 60);
  
  const labels = {
    highway: { icon: "&#128739;", title: "Highway section", note: "stable flow" },
    city: { icon: "&#127961;", title: "City driving", note: "urban roads" },
    traffic: { icon: "&#128679;", title: "Congested area", note: "expect delays" },
    turns: { icon: "&#128260;", title: "Complex section", note: "multiple turns" }
  };
  
  const label = labels[seg.type] || labels.city;
  
  return {
    type: seg.type,
    icon: label.icon,
    title: label.title,
    details: `${km} km · ~${mins} min · ${label.note}`,
    distance: seg.distance,
    duration: seg.duration
  };
}

function buildRouteDetailsViewModel(r, bestRoute, fastestRoute, allRoutes) {
  const isBest = r.index === bestRoute.index;
  const role = isBest ? "recommended" : r.role;
  const confidence = isBest ? getConfidenceLevel(bestRoute, allRoutes) : null;
  
  const primaryWhy = buildPrimaryWhy(r, bestRoute, fastestRoute, allRoutes);
  const whyPoints = buildSecondaryWhyPoints(r, bestRoute, fastestRoute, allRoutes);
  const segments = buildRouteSegments(r);
  
  let comparisonNote = null;
  if (!isBest) {
    const diff = getDisplayDiff(r, bestRoute);
    if (diff < 0) {
      comparisonNote = `${Math.abs(diff)} min faster than recommended, but with ${r.traffic === "high" ? "heavier traffic" : "higher risk"}.`;
    } else if (diff > 0) {
      comparisonNote = `${diff} min slower than recommended${r.complexity < bestRoute.complexity ? ", but with fewer maneuvers" : ""}.`;
    }
  }
  
  // Comfort/stability label
  let stabilityLabel = "Stable";
  if (r.stabilityScore >= 70) stabilityLabel = "Very stable";
  else if (r.stabilityScore >= 50) stabilityLabel = "Stable";
  else if (r.stabilityScore >= 30) stabilityLabel = "Moderate";
  else stabilityLabel = "Unpredictable";
  
  return {
    name: getRouteSummaryName(r),
    role,
    roleLabel: isBest ? "Recommended" : "Alternative",
    confidence,
    minutes: getDisplayMinutes(r),
    distance: (r.distance / 1000).toFixed(1),
    delayMinutes: r.delayMinutes,
    traffic: r.traffic,
    trafficText: getTrafficText(r.traffic),
    complexity: r.complexity,
    highwayShare: Math.round(r.highwayShare * 100),
    stabilityLabel,
    primaryWhy,
    whyPoints,
    segments,
    comparisonNote,
    index: r.index
  };
}

// ===== ТЗ5: DRIVE MODE FUNCTIONS =====

function buildDriveViewModel(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  
  // Вычисляем оставшееся расстояние и время
  let remainingDistance = 0;
  let remainingTime = 0;
  
  for (let i = stepIndex; i < steps.length; i++) {
    remainingDistance += steps[i].distance?.value || 0;
    remainingTime += steps[i].duration?.value || 0;
  }
  
  const currentStep = steps[stepIndex] || steps[0];
  const nextStep = steps[stepIndex + 1];
  
  return {
    eta: Math.round(remainingTime / 60),
    distance: (remainingDistance / 1000).toFixed(1),
    traffic: r.traffic,
    trafficText: getTrafficText(r.traffic),
    instruction: stripHtml(currentStep?.html_instructions || "Follow the route"),
    instructionDistance: currentStep?.distance?.text || "",
    maneuver: currentStep?.maneuver || "",
    stepIndex,
    totalSteps: steps.length
  };
}

function getUpcomingCondition(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const upcoming = steps.slice(stepIndex, stepIndex + 5);
  
  // Проверяем что впереди
  const hasHighway = upcoming.some(s => stepLooksLikeHighway(s, r.route));
  const hasManyTurns = upcoming.filter(s => isMeaningfulManeuver(s, r.route)).length >= 3;
  const isNearEnd = stepIndex >= steps.length - 3;
  
  if (r.traffic === "high") {
    return { type: "warning", icon: "&#9888;", text: "Heavier traffic ahead" };
  }
  
  if (hasManyTurns) {
    return { type: "warning", icon: "&#128260;", text: "Multiple turns ahead" };
  }
  
  if (isNearEnd) {
    return { type: "stable", icon: "&#127937;", text: "Approaching destination" };
  }
  
  if (hasHighway) {
    return { type: "stable", icon: "&#128739;", text: "Highway section ahead — smooth driving" };
  }
  
  if (r.traffic === "low") {
    return { type: "stable", icon: "&#9728;", text: "Stable traffic ahead" };
  }
  
  return { type: "stable", icon: "&#9728;", text: "Moderate conditions ahead" };
}

function evaluateReroute(currentRoute, allRoutes) {
  if (allRoutes.length <= 1) return null;
  
  const alternatives = allRoutes.filter(r => r.index !== currentRoute.index);
  
  for (const alt of alternatives) {
    const scoreDiff = currentRoute.score - alt.score;
    const timeDiff = getDisplayDiff(currentRoute, alt);
    
    // Если альтернатива стала заметно лучше
    if (scoreDiff > 5 || (timeDiff > 2 && trafficRank(alt.traffic) < trafficRank(currentRoute.traffic))) {
      const benefit = timeDiff > 0 
        ? `${timeDiff} min faster, calmer traffic`
        : `Calmer traffic, similar time`;
      
      return {
        index: alt.index,
        benefit,
        name: getRouteSummaryName(alt)
      };
    }
  }
  
  return null;
}

function startDriveMode(index) {
  const r = analyzedRoutes.find(x => x.index === index);
  if (!r || !currentDirectionsResult) return;
  
  selectedRoute = r;
  currentStepIndex = 0;
  betterRouteIndex = null;
  
  document.getElementById("drive-mode").classList.add("active");
  
  if (!driveMap) {
    driveMap = new google.maps.Map(document.getElementById("drive-map"), {
      center: { lat: 25.2048, lng: 55.2708 },
      zoom: 14,
      disableDefaultUI: true,
      styles: [
        { elementType: "geometry", stylers: [{ color: "#1d2c4d" }] },
        { elementType: "labels.text.fill", stylers: [{ color: "#8ec3b9" }] },
        { elementType: "labels.text.stroke", stylers: [{ color: "#1a3646" }] },
        { featureType: "road", elementType: "geometry", stylers: [{ color: "#304a7d" }] },
        { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#255763" }] }
      ]
    });
  }
  
  if (driveRenderer) {
    driveRenderer.setMap(null);
  }
  
  driveRenderer = new google.maps.DirectionsRenderer({
    map: driveMap,
    directions: currentDirectionsResult,
    routeIndex: r.index,
    polylineOptions: {
      strokeColor: "#2d6a4f",
      strokeWeight: 6
    }
  });
  
  updateDriveUI();
  driveMap.fitBounds(r.route.bounds);
  
  // Запускаем симуляцию
  if (driveInterval) clearInterval(driveInterval);
  driveInterval = setInterval(simulateDriveProgress, 5000);
}

function updateDriveUI() {
  const r = selectedRoute;
  if (!r) return;
  
  const vm = buildDriveViewModel(r, currentStepIndex);
  const condition = getUpcomingCondition(r, currentStepIndex);
  
  document.getElementById("drive-eta-time").textContent = vm.eta;
  document.getElementById("drive-distance").textContent = vm.distance;
  document.getElementById("drive-traffic").textContent = vm.trafficText;
  document.getElementById("drive-next-instruction").textContent = vm.instruction;
  document.getElementById("drive-next-distance").textContent = vm.instructionDistance;
  
  // Иконка манёвра
  let icon = "&#8593;";
  if (vm.maneuver.includes("left")) icon = "&#8592;";
  else if (vm.maneuver.includes("right")) icon = "&#8594;";
  else if (vm.maneuver.includes("uturn")) icon = "&#8634;";
  document.getElementById("drive-next-icon").innerHTML = icon;
  
  // Ahead block
  const aheadIcon = document.getElementById("drive-ahead-icon");
  aheadIcon.innerHTML = condition.icon;
  aheadIcon.className = `drive-ahead-icon ${condition.type}`;
  document.getElementById("drive-ahead-text").textContent = condition.text;
  
  // Status
  document.getElementById("drive-status").textContent = `Step ${currentStepIndex + 1}/${vm.totalSteps}`;
}

function simulateDriveProgress() {
  if (!selectedRoute) return;
  
  const leg = selectedRoute.route.legs[0];
  const totalSteps = leg.steps.length;
  
  // Продвигаемся по маршруту
  if (currentStepIndex < totalSteps - 1) {
    currentStepIndex++;
    updateDriveUI();
  }
  
  // Проверяем альтернативы
  const reroute = evaluateReroute(selectedRoute, analyzedRoutes);
  if (reroute && reroute.index !== betterRouteIndex) {
    betterRouteIndex = reroute.index;
    showDriveAlert(`Better route available: ${reroute.name}`, reroute.benefit);
  }
}

function showDriveAlert(message, benefit) {
  const alert = document.getElementById("drive-alert");
  document.getElementById("drive-alert-message").textContent = `${message} — ${benefit}`;
  alert.classList.add("visible");
}

function dismissAlert() {
  document.getElementById("drive-alert").classList.remove("visible");
  betterRouteIndex = null;
}

function switchToAlternative() {
  if (betterRouteIndex !== null) {
    dismissAlert();
    startDriveMode(betterRouteIndex);
  }
}

function exitDriveMode() {
  document.getElementById("drive-mode").classList.remove("active");
  if (driveInterval) {
    clearInterval(driveInterval);
    driveInterval = null;
  }
  currentStepIndex = 0;
  betterRouteIndex = null;
}

// Alias for compatibility
function startDrive(index) {
  startDriveMode(index);
}

// ===== DISPLAY HELPERS =====

function getDisplayMinutes(route) {
  return Math.round(route.time / 60);
}

function getDisplayDiff(routeA, routeB) {
  return getDisplayMinutes(routeA) - getDisplayMinutes(routeB);
}

function formatDiff(diff) {
  const absDiff = Math.abs(diff);
  if (absDiff === 0) return "less than 1 min";
  return `${absDiff} min`;
}

function getTrafficText(traffic) {
  if (traffic === "low") return "stable";
  if (traffic === "medium") return "moderate";
  return "heavy";
}

function getRouteSummaryName(route) {
  const summary = route.route.summary || "";
  if (summary.includes("E311")) return "E311";
  if (summary.includes("E11")) return "E11";
  if (summary.includes("E611")) return "E611";
  if (summary.includes("Sheikh Zayed")) return "Sheikh Zayed Rd";
  return summary.split("/")[0].trim() || `Route ${route.displayIndex}`;
}

// ===== ROUTE ANALYSIS =====

function stripHtml(text) {
  return (text || "").replace(/<[^>]*>/g, " ").trim();
}

function normalizeRoadText(step, route) {
  const summary = (route.summary || "");
  const html = stripHtml(step.html_instructions || "");
  return `${summary} ${html}`.toUpperCase();
}

function stepLooksLikeHighway(step, route) {
  const text = normalizeRoadText(step, route);
  return (
    /\bE11\b/.test(text) ||
    /\bE311\b/.test(text) ||
    /\bE611\b/.test(text) ||
    text.includes("SHEIKH") ||
    text.includes("HIGHWAY") ||
    text.includes("EXPRESSWAY")
  );
}

function getTrafficLevel(base, traffic) {
  if (!traffic || !base || traffic <= base) return "low";
  const ratio = (traffic - base) / base;
  if (ratio <= 0.05) return "low";
  if (ratio <= 0.15) return "medium";
  return "high";
}

function trafficRank(level) {
  if (level === "low") return 1;
  if (level === "medium") return 2;
  return 3;
}

function isMeaningfulManeuver(step, route) {
  if (!step) return false;
  
  const html = stripHtml(step.html_instructions || "").toLowerCase();
  const maneuver = (step.maneuver || "").toLowerCase();
  
  const strong = ["turn-left", "turn-right", "uturn-left", "uturn-right", "roundabout"];
  if (strong.some(m => maneuver.includes(m))) return true;
  if (html.includes("exit")) return true;
  if (html.includes("continue") || html.includes("keep") || html.includes("slight")) return false;
  
  return false;
}

function countComplexity(leg, route) {
  return leg.steps.filter(s => isMeaningfulManeuver(s, route)).length;
}

function selectBestRoute(routes) {
  // ТЗ: STRICT RULES for selecting recommended route
  if (!routes?.length) return null;
  if (routes.length === 1) return routes[0];
  
  // STEP 2: Find fastest route
  const fastest = [...routes].sort((a, b) => a.time - b.time)[0];
  
  // STEP 3: Determine recommended route
  // Rule 1: If fastest has low delay, use fastest
  if (fastest.delayMinutes <= 2 && fastest.traffic !== "high") {
    return fastest;
  }
  
  // Rule 2: Find route within 2-3 min of fastest with better stability
  let recommended = fastest;
  
  for (const r of routes) {
    if (r.index === fastest.index) continue;
    
    const timeDiff = getDisplayDiff(r, fastest); // positive = r is slower
    
    // Within 3 minutes of fastest
    if (timeDiff >= 0 && timeDiff <= 3) {
      // Check if this route has lower delay OR higher stability
      const hasLowerDelay = r.delayMinutes < fastest.delayMinutes - 1;
      const hasHigherStability = r.stabilityScore > fastest.stabilityScore + 10;
      const hasLighterTraffic = trafficRank(r.traffic) < trafficRank(fastest.traffic);
      
      if (hasLowerDelay || hasHigherStability || hasLighterTraffic) {
        // This route is better despite being slightly slower
        if (recommended.index === fastest.index) {
          recommended = r;
        } else {
          // Compare with current recommended
          const betterThanCurrent = 
            (r.delayMinutes < recommended.delayMinutes) ||
            (r.stabilityScore > recommended.stabilityScore);
          if (betterThanCurrent) {
            recommended = r;
          }
        }
      }
    }
  }
  
  return recommended;
}

// ===== RENDER FUNCTIONS =====

function renderResults() {
  const container = document.getElementById("results");
  const quickAccess = document.getElementById("quick-access");
  
  if (!analyzedRoutes.length) {
    container.innerHTML = "";
    quickAccess.classList.remove("hidden");
    return;
  }
  
  quickAccess.classList.add("hidden");
  
  const best = selectBestRoute(analyzedRoutes);
  const fastest = [...analyzedRoutes].sort((a, b) => a.time - b.time)[0];
  selectedRoute = best;
  
  // Назначаем роли
  analyzedRoutes.forEach(r => {
    r.role = getRouteRole(r, best, fastest, analyzedRoutes);
  });
  
  let html = "";
  
  // Best card (ТЗ3: AI Decision Layer)
  const bestVM = buildBestCardViewModel(best, fastest, analyzedRoutes);
  const confidenceClass = `confidence-${bestVM.confidence}`;
  
  html += `
    <div class="best-card">
      <div class="best-label">AI Recommendation</div>
      <div class="best-badge">
        <svg viewBox="0 0 24 24"><path fill="white" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </div>
      <h2 class="best-title">Best route: ${bestVM.name}</h2>
      <p class="best-subtitle">${bestVM.minutes} min &middot; ${getTrafficText(bestVM.traffic)} traffic &middot; ${bestVM.complexity <= 4 ? "minimal stops" : bestVM.complexity + " turns"}</p>
      <p class="best-reason">${bestVM.primaryWhy}</p>
      <div class="best-points">
        ${bestVM.whyPoints.slice(0, 2).map(p => `<div class="best-point">${p}</div>`).join("")}
      </div>
      <span class="confidence-badge ${confidenceClass}">${bestVM.confidenceText}</span>
      <button class="start-btn" onclick="startDrive(${bestVM.index})">Start via ${bestVM.name}</button>
      <div class="why-link" onclick="openRouteDetails(${bestVM.index})">Why this route? &rsaquo;</div>
    </div>
  `;
  
  // Alternative cards (ТЗ3)
  analyzedRoutes.forEach(r => {
    if (r.index === best.index) return;
    
    const altVM = buildAlternativeCardViewModel(r, best, fastest, analyzedRoutes);
    const icons = {
      faster_risky: "&#9888;",
      more_relaxed: "&#128663;",
      balanced: "&#128736;",
      similar: "&#128257;"
    };
    
    html += `
      <div class="alt-card ${altVM.role}" onclick="openRouteDetails(${altVM.index})">
        <div class="alt-icon">${icons[altVM.role] || "&#128736;"}</div>
        <div class="alt-content">
          <div class="alt-title">${altVM.title}</div>
          <div class="alt-subtitle">${altVM.subtitle}</div>
        </div>
        <div class="alt-arrow">&#8250;</div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

function drawRoutes(result) {
  const best = selectBestRoute(analyzedRoutes);
  
  analyzedRoutes.forEach(r => {
    const isBest = r.index === best.index;
    const renderer = new google.maps.DirectionsRenderer({
      map: map,
      directions: result,
      routeIndex: r.index,
      suppressMarkers: !isBest,
      polylineOptions: {
        strokeColor: isBest ? "#2d6a4f" : "#9ca3af",
        strokeOpacity: isBest ? 1 : 0.6,
        strokeWeight: isBest ? 6 : 4
      }
    });
    renderers.push(renderer);
  });
  
  if (best) {
    map.fitBounds(best.route.bounds);
  }
}

// ===== CALCULATE ROUTES =====

function calculateRoutes() {
  clearRoutes();
  
  const start = document.getElementById("start").value.trim();
  const end = document.getElementById("end").value.trim();
  
  if (!start || !end) {
    document.getElementById("results").innerHTML = "";
    return;
  }
  
  document.getElementById("results").innerHTML = '<div class="loading">Finding best routes...</div>';
  
  directionsService.route({
    origin: start,
    destination: end,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK") {
      document.getElementById("results").innerHTML = `<div class="error">Could not find route: ${status}</div>`;
      return;
    }
    
    const routes = result.routes;
    if (!routes?.length) {
      document.getElementById("results").innerHTML = '<div class="error">No routes found.</div>';
      return;
    }
    
    currentDirectionsResult = result;
    
    // Первый проход: базовые метрики
    analyzedRoutes = routes.map((route, i) => {
      const leg = route.legs[0];
      const metrics = calculateRouteMetrics(route, leg, route);
      
      return {
        route,
        index: i,
        displayIndex: i + 1,
        ...metrics
      };
    });
    
    // Второй проход: score и normalized metrics
    analyzedRoutes = analyzedRoutes.map(r => {
      const scoreData = calculateRouteScore(r, analyzedRoutes);
      return {
        ...r,
        ...scoreData
      };
    });
    
    renderResults();
    drawRoutes(result);
  });
}

function closeModal(event) {
  if (event.target.id === "modal-overlay" || event.target.classList.contains("modal-cta")) {
    document.getElementById("modal-overlay").classList.remove("visible");
  }
}
