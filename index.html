function stripHtml(text) {
  return (text || "").replace(/<[^>]*>/g, " ").trim();
}

function normalizeRoadText(step, route) {
  const summary = (route.summary || "");
  const html = stripHtml(step.html_instructions || "");
  return `${summary} ${html}`.toUpperCase();
}

function stepLooksLikeHighway(step, route) {
  const text = normalizeRoadText(step, route);
  return (
    /\bE11\b/.test(text) ||
    /\bE311\b/.test(text) ||
    /\bE611\b/.test(text) ||
    text.includes("SHEIKH") ||
    text.includes("HIGHWAY") ||
    text.includes("EXPRESSWAY")
  );
}

function getTrafficLevel(base, traffic) {
  if (!traffic || !base || traffic <= base) return "low";
  const ratio = (traffic - base) / base;
  if (ratio <= 0.05) return "low";
  if (ratio <= 0.15) return "medium";
  return "high";
}

function trafficRank(level) {
  if (level === "low") return 1;
  if (level === "medium") return 2;
  return 3;
}

function getTrafficText(traffic) {
  if (traffic === "low") return t("traf_stable");
  if (traffic === "medium") return t("traf_moderate");
  return t("traf_heavy");
}

function toTitleCaseLabel(value) {
  if (!value) return "";
  return value.charAt(0).toUpperCase() + value.slice(1);
}

function getStabilityLabel(stabilityScore) {
  if (stabilityScore >= 70) return t("stab_very");
  if (stabilityScore >= 50) return t("stab_stable");
  if (stabilityScore >= 30) return t("stab_moderate");
  return t("stab_unpred");
}

function isMeaningfulManeuver(step, route) {
  if (!step) return false;
  const html = stripHtml(step.html_instructions || "").toLowerCase();
  const maneuver = (step.maneuver || "").toLowerCase();
  const strong = ["turn-left", "turn-right", "uturn-left", "uturn-right", "roundabout"];
  if (strong.some(m => maneuver.includes(m))) return true;
  if (
    html.includes("exit") ||
    html.includes("keep right") ||
    html.includes("keep left") ||
    html.includes("ramp") ||
    html.includes("merge")
  ) return true;
  if (html.includes("continue") || html.includes("slight")) return false;
  return false;
}

function countComplexity(leg, route) {
  return leg.steps.filter(s => isMeaningfulManeuver(s, route)).length;
}

function calculateHighwayShare(leg, route) {
  const total = leg.distance?.value || 0;
  if (!total) return 0;
  let hwDistance = 0;
  leg.steps.forEach(step => {
    if (stepLooksLikeHighway(step, route)) {
      hwDistance += step.distance?.value || 0;
    }
  });
  return hwDistance / total;
}

function getDisplayMinutes(route) {
  return Math.round(route.time / 60);
}

function getDisplayDiff(routeA, routeB) {
  return getDisplayMinutes(routeA) - getDisplayMinutes(routeB);
}

function getRouteSummaryName(route) {
  const summary = route.route.summary || "";
  if (summary.includes("E311")) return "E311";
  if (summary.includes("E11")) return "E11";
  if (summary.includes("E611")) return "E611";
  if (summary.includes("Sheikh Zayed")) return "Sheikh Zayed Rd";
  return summary.split("/")[0].trim() || `Route ${route.displayIndex}`;
}

// ============================================================
//  ROUTE METRICS
// ============================================================

function calculateRouteMetrics(route, leg, rawRoute) {
  const baseTime = leg.duration.value;
  const time = leg.duration_in_traffic?.value || baseTime;
  const distance = leg.distance.value;
  const delaySeconds = Math.max(0, time - baseTime);
  const delayMinutes = Math.round(delaySeconds / 60);
  const complexity = countComplexity(leg, rawRoute);
  const highwayShare = calculateHighwayShare(leg, rawRoute);
  const traffic = getTrafficLevel(baseTime, time);

  // ТЗ3 ЭТАП 1: Salik toll data
  const tollCount = Math.floor(highwayShare * 3); // rough estimate based on highway usage
  const tollCost = tollCount * 4; // 4 AED per Salik gate
  const hasToll = tollCost > 0;

  return {
    time,
    baseTime,
    distance,
    delaySeconds,
    delayMinutes,
    complexity,
    highwayShare,
    traffic,
    highway: highwayShare >= 0.35,
    tollCount,
    tollCost,
    hasToll
  };
}

function calculateDriveStress(route) {
  let stress = 0;

  stress += (route.complexity || 0) * 0.55;
  stress += (route.delayMinutes || 0) * 0.9;
  stress += route.traffic === "high" ? 5 : route.traffic === "medium" ? 2 : 0;
  stress += route.highway ? 0 : 1.5;

  if ((route.highwayShare || 0) < 0.25) stress += 1.5;
  if ((route.complexity || 0) >= 12) stress += 2;
  if ((route.delayMinutes || 0) >= 6) stress += 2;

  return Math.round(stress * 10) / 10;
}

function getDrivePersonality(route) {
  const stress = route.stressScore || 0;
  const turns = route.complexity || 0;
  const delay = route.delayMinutes || 0;
  const highwayShare = route.highwayShare || 0;

  if (stress <= 6 && highwayShare >= 0.5 && turns <= 8) {
    return t("stress_smooth");
  }

  if (stress <= 9 && delay <= 3) {
    return t("stress_steady");
  }

  if (stress <= 12) {
    return t("stress_active");
  }

  if (turns >= 12 || delay >= 6) {
    return t("stress_stressful");
  }

  return t("stress_busy");
}

function getStressBadge(stressScore) {
  if (stressScore <= 6) {
    return { label: "Low stress", tone: "low" };
  }
  if (stressScore <= 10) {
    return { label: "Medium stress", tone: "medium" };
  }
  return { label: "High stress", tone: "high" };
}

function calculateRouteScore(r, allRoutes) {
  const fastest = allRoutes.length ? Math.min(...allRoutes.map(x => x.time)) : r.time;
  const timeScore = (r.time - fastest) / 60;
  const trafficPenalty = r.traffic === "high" ? 15 : r.traffic === "medium" ? 5 : 0;
  const complexityPenalty = r.complexity * 0.75;
  const highwayBonus = r.highwayShare * -3;
  const delayPenalty = r.delayMinutes * 1.5;

  const stressScore = calculateDriveStress(r);
  const stressPenalty = stressScore * 0.65;

  const stabilityScore = Math.max(
    0,
    100 - trafficPenalty * 3 - r.complexity * 2 - r.delayMinutes * 4 - stressScore * 2
  );

  const score =
    timeScore +
    trafficPenalty +
    complexityPenalty +
    highwayBonus +
    delayPenalty +
    stressPenalty;

  return {
    score,
    timeScore,
    trafficPenalty,
    complexityPenalty,
    highwayBonus,
    delayPenalty,
    stressPenalty,
    stressScore,
    drivePersonality: getDrivePersonality({ ...r, stressScore }),
    stabilityScore
  };
}

// ============================================================
// ============================================================
//  ROUTE ROLE CLASSIFICATION
// ============================================================

function getRouteRole(r, bestRoute, fastestRoute, allRoutes) {
  if (r.index === bestRoute.index) return "recommended";

  const diffFromBest = getDisplayDiff(r, bestRoute);
  const isFaster = diffFromBest < 0;
  const isSlower = diffFromBest > 0;

  const hasMoreTraffic = trafficRank(r.traffic) > trafficRank(bestRoute.traffic);
  const hasMoreDelay = r.delayMinutes > bestRoute.delayMinutes + 2;
  const isRiskier = hasMoreTraffic || hasMoreDelay;

  const fewerTurns = r.complexity < bestRoute.complexity - 1;
  const lighterTraffic = trafficRank(r.traffic) < trafficRank(bestRoute.traffic);
  const isMoreRelaxed = fewerTurns || lighterTraffic;

  const timeSimilar = Math.abs(diffFromBest) <= 1;
  const complexitySimilar = Math.abs(r.complexity - bestRoute.complexity) <= 2;
  const trafficSimilar = trafficRank(r.traffic) === trafficRank(bestRoute.traffic);
  const isSimilar = timeSimilar && complexitySimilar && trafficSimilar;

  if (isFaster && isRiskier) return "faster_risky";
  if (isSlower && isMoreRelaxed) return "more_relaxed";
  if (isSimilar) return "similar";
  return "balanced";
}

// ============================================================
//  DECISION LOGIC — SELECT RECOMMENDED ROUTE
// ============================================================

function selectBestRoute(routes) {
  if (!routes?.length) return null;
  if (routes.length === 1) return routes[0];

  const fastest = [...routes].sort((a, b) => a.time - b.time)[0];

  // ── User preference override (minimal injection) ──
  const pref = getUserPreference();

  if (pref === "fastest") {
    // avoid_highways modifier: if fastest is highway, accept a non-highway route within 3 min
    if (userFilters.avoid_highways && fastest.highway) {
      const closeNoHwy = routes.filter(r => !r.highway && (r.time - fastest.time) / 60 <= 3);
      if (closeNoHwy.length > 0)
        return closeNoHwy.sort((a, b) => a.time - b.time || a.complexity - b.complexity)[0];
    }
    // Always prefer shortest time; only switch if a peer is essentially the same time
    // AND has cheaper toll cost (very small difference).
    const peers = routes.filter(r =>
      Math.abs(r.time - fastest.time) / 60 <= 1 && r.tollCost < fastest.tollCost
    );
    if (peers.length === 0) return fastest;
    return peers.sort((a, b) => a.tollCost - b.tollCost || a.time - b.time)[0];
  }

  if (pref === "no_tolls") {
    // Strongly prefer toll-free, even if up to ~5 min slower than fastest
    const free = routes.filter(r =>
      r.tollCost === 0 && (r.time - fastest.time) / 60 <= 5
    );
    if (free.length > 0) {
      // fewer_turns modifier: elevate complexity in sort among toll-free candidates
      return free.sort((a, b) =>
        trafficRank(a.traffic) - trafficRank(b.traffic) ||
        a.delayMinutes - b.delayMinutes ||
        (a.stressScore || 0) - (b.stressScore || 0) ||
        (userFilters.fewer_turns ? a.complexity - b.complexity : 0) ||
        getPersonalizationBias(a) - getPersonalizationBias(b) ||
        a.tollCost - b.tollCost ||
        a.complexity - b.complexity ||
        a.time - b.time
      )[0];
    }
    // Otherwise fall through to balanced logic below
  }

  // ── Step 1: Build "competitive pool" — routes within 5 min of fastest ──
  // Anything further is too slow to be considered, regardless of other merits.
  let pool = routes.filter(r => (r.time - fastest.time) / 60 <= 5);
  if (pool.length === 0) pool = [fastest];

  // ── Step 2: Strong free-route preference ──
  // If fastest is paid AND there's a free route within 4 min → prefer free.
  if (fastest.tollCost > 0) {
    const competitiveFree = pool.filter(r =>
      r.tollCost === 0 && (r.time - fastest.time) / 60 <= 4
    );
    if (competitiveFree.length > 0) {
      return competitiveFree.sort((a, b) =>
        trafficRank(a.traffic) - trafficRank(b.traffic) ||
        a.delayMinutes - b.delayMinutes ||
        a.complexity - b.complexity ||
        a.time - b.time
      )[0];
    }
  }

  // ── Step 3: Drop high-traffic routes if any non-high alternative exists ──
  // Fastest with unstable traffic should NOT auto-win.
  const nonHigh = pool.filter(r => r.traffic !== "high");
  if (nonHigh.length > 0) pool = nonHigh;

  // ── Step 4: Final ranking — filters act as sort modifiers, not overrides ──
  // avoid_highways: highway routes sorted last (penalty as first comparator)
  // fewer_turns:    complexity elevated before toll cost
  return pool.sort((a, b) =>
    (userFilters.avoid_highways ? (a.highway ? 1 : 0) - (b.highway ? 1 : 0) : 0) ||
    trafficRank(a.traffic) - trafficRank(b.traffic) ||
    a.delayMinutes - b.delayMinutes ||
    (a.stressScore || 0) - (b.stressScore || 0) ||
    getPersonalizationBias(a) - getPersonalizationBias(b) ||
    (userFilters.fewer_turns ? a.complexity - b.complexity : 0) ||
    a.tollCost - b.tollCost ||
    a.complexity - b.complexity ||
    a.time - b.time
  )[0];
}

// ── Confidence helper: practical, decision-aligned (matches selectBestRoute logic) ──
// HIGH   = obvious human choice (free vs slightly faster paid, lower traffic, lower delay, or dominant)
// MEDIUM = real trade-off (faster alt exists but worse on cost/stability)
// LOW    = routes are genuinely interchangeable on all dimensions
function calculateConfidence(best, allRoutes) {
  if (!allRoutes || allRoutes.length < 2) return t("conf_high");
  const others = allRoutes.filter(r => r.index !== best.index);
  if (others.length === 0) return t("conf_high");

  const bestMin = getDisplayMinutes(best);
  const fasterAlts = others.filter(r => getDisplayMinutes(r) < bestMin);
  const fastestAlt = fasterAlts.length
    ? fasterAlts.reduce((a, b) => getDisplayMinutes(a) < getDisplayMinutes(b) ? a : b)
    : null;

  // Case A: nothing is faster — best is dominant on time
  if (!fastestAlt) return t("conf_high");

  const timeGap = bestMin - getDisplayMinutes(fastestAlt); // min that alt saves

  // Case B: best is free, faster alt is paid, small gap → clear human win
  if (best.tollCost === 0 && fastestAlt.tollCost > 0 && timeGap <= 3) {
    return t("conf_high");
  }
  // Case C: best clearly avoids worse traffic of the faster alt
  if (trafficRank(best.traffic) < trafficRank(fastestAlt.traffic) && timeGap <= 5) {
    return t("conf_high");
  }
  // Case D: best clearly avoids higher delay of the faster alt
  if ((fastestAlt.delayMinutes || 0) - (best.delayMinutes || 0) >= 3 && timeGap <= 5) {
    return t("conf_high");
  }

  // Truly similar across the board → LOW (rare)
  const trulySimilar = others.every(r => {
    const dt = Math.abs(getDisplayMinutes(r) - bestMin);
    return dt <= 2
      && r.tollCost === best.tollCost
      && trafficRank(r.traffic) === trafficRank(best.traffic)
      && Math.abs((r.complexity || 0) - (best.complexity || 0)) <= 2;
  });
  if (trulySimilar) return t("conf_low");

  // Otherwise: meaningful trade-off
  return t("conf_medium");
}

// ============================================================
//  ROUTE SEGMENTS (for Route Details modal)
// ============================================================

function buildRouteSegments(r) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const segments = [];

  let currentSegment = null;
  let segmentSteps = [];

  steps.forEach((step, i) => {
    const isHw = stepLooksLikeHighway(step, r.route);
    const isMeaningful = isMeaningfulManeuver(step, r.route);

    let type = isHw ? "highway" : "city";

    if (!isHw && isMeaningful) {
      const nearbyManeuvers = steps.slice(Math.max(0, i - 2), i + 3)
        .filter(s => isMeaningfulManeuver(s, r.route)).length;
      if (nearbyManeuvers >= 3) type = "turns";
    }

    if (!currentSegment || currentSegment.type !== type) {
      if (currentSegment && segmentSteps.length > 0) {
        currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
        currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
        segments.push(currentSegment);
      }
      currentSegment = { type, steps: [] };
      segmentSteps = [];
    }

    segmentSteps.push(step);
    currentSegment.steps = segmentSteps;
  });

  if (currentSegment && segmentSteps.length > 0) {
    currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
    currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
    segments.push(currentSegment);
  }

  const mergedSegments = [];
  segments.forEach(seg => {
    if (seg.distance < 500 && mergedSegments.length > 0) {
      const prev = mergedSegments[mergedSegments.length - 1];
      prev.distance += seg.distance;
      prev.duration += seg.duration;
    } else {
      mergedSegments.push(seg);
    }
  });

  if (r.delayMinutes > 3 && mergedSegments.length > 0) {
    const citySegment = mergedSegments.find(s => s.type === "city");
    if (citySegment) citySegment.type = "traffic";
  }

  return mergedSegments.map(seg => {
    const km = (seg.distance / 1000).toFixed(1);
    const mins = Math.round(seg.duration / 60);
    const labels = {
      highway: { icon: "&#128739;", title: "Highway section", note: "stable flow" },
      city: { icon: "&#127961;", title: "City driving", note: "urban roads" },
      traffic: { icon: "&#128679;", title: "Congested area", note: "expect delays" },
      turns: { icon: "&#128260;", title: "Complex section", note: "multiple turns" }
    };
    const label = labels[seg.type] || labels.city;
    return {
      type: seg.type,
      icon: label.icon,
      title: label.title,
      details: `${km} km · ~${mins} min · ${label.note}`,
      distance: seg.distance,
      duration: seg.duration
    };
  });
}

// ============================================================
//  DRIVE MODE
// ============================================================

function buildDriveViewModel(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  let remainingDistance = 0;
  let remainingTime = 0;

  for (let i = stepIndex; i < steps.length; i++) {
    remainingDistance += steps[i].distance?.value || 0;
    remainingTime += steps[i].duration?.value || 0;
  }

  const currentStep = steps[stepIndex] || steps[0];

  return {
    eta: Math.round(remainingTime / 60),
    distance: (remainingDistance / 1000).toFixed(1),
    traffic: r.traffic,
    trafficText: getTrafficText(r.traffic),
    instruction: stripHtml(currentStep?.html_instructions || "Follow the route"),
    instructionDistance: currentStep?.distance?.text || "",
    maneuver: currentStep?.maneuver || "",
    stepIndex,
    totalSteps: steps.length
  };
}

function getStepWarningMeta(step, route) {
  const html = stripHtml(step?.html_instructions || "");
  const text = html.toLowerCase();
  const maneuver = (step?.maneuver || "").toLowerCase();
  const roadText = normalizeRoadText(step, route);
  
  const roadMatch =
  roadText.match(/\bE311\b/) ||
  roadText.match(/\bE11\b/) ||
  roadText.match(/\bE611\b/) ||
  roadText.match(/\bE66\b/) ||
  roadText.match(/\bE44\b/) ||
  roadText.match(/\bD\d+\b/);
  const roadName = roadMatch ? roadMatch[0] : getRouteSummaryName({ route });

  // Enhanced lane hints
  const laneHint = extractLaneHint(text);
  
  if (maneuver.includes("uturn") || text.includes("u-turn"))
    return { type: "uturn", icon: "↩", shortText: "U-turn ahead", longText: "Prepare for U-turn ahead", laneHint };
  if (text.includes("fork right") || maneuver.includes("fork-right")) 
    return { type: "fork", icon: "⤴", shortText: `Fork right to ${roadName}`, longText: `Take the right fork toward ${roadName}`, laneHint: laneHint || "Use right lanes" };
  if (text.includes("fork left") || maneuver.includes("fork-left"))
    return { type: "fork", icon: "⤳", shortText: `Fork left to ${roadName}`, longText: `Take the left fork toward ${roadName}`, laneHint: laneHint || "Use left lanes" };
  if (text.includes("keep right")) return { type: "lane",  icon: "↗", shortText: `Keep right for ${roadName}`,  longText: `Keep right ahead for exit toward ${roadName}`, laneHint: laneHint || "Use right lanes" };
  if (text.includes("keep left"))  return { type: "lane",  icon: "↖", shortText: `Keep left for ${roadName}`,   longText: `Keep left ahead toward ${roadName}`, laneHint: laneHint || "Use left lanes" };
  if (text.includes("exit"))       return { type: "exit",  icon: "⇢", shortText: `Exit ahead to ${roadName}`,   longText: `Prepare for exit toward ${roadName}`, laneHint: laneHint || "Move to exit lane" };
  if (text.includes("ramp"))       return { type: "ramp",  icon: "⇗", shortText: `Ramp ahead to ${roadName}`,   longText: `Take the ramp ahead toward ${roadName}`, laneHint: laneHint || "Use right lane" };
  if (text.includes("merge"))      return { type: "merge", icon: "⇄", shortText: `Merge ahead`,                 longText: `Merge carefully ahead`, laneHint: "Watch for merging traffic" };
  return null;
}

function extractLaneHint(text) {
  // Try to extract lane info from instruction text
  if (text.includes("3 left lanes") || text.includes("three left"))   return "Use 3 left lanes";
  if (text.includes("3 right lanes") || text.includes("three right")) return "Use 3 right lanes";
  if (text.includes("2 left lanes") || text.includes("two left"))     return "Use 2 left lanes";
  if (text.includes("2 right lanes") || text.includes("two right"))   return "Use 2 right lanes";
  if (text.includes("leftmost lane"))    return "Use leftmost lane";
  if (text.includes("rightmost lane"))   return "Use rightmost lane";
  if (text.includes("left lane"))        return "Use left lane";
  if (text.includes("right lane"))       return "Use right lane";
  if (text.includes("middle lane") || text.includes("center lane"))  return "Stay in middle lanes";
  if (text.includes("any lane"))         return "Any lane";
  if (text.includes("stay in lane"))     return "Stay in lane";
  return null;
}

function isComplexInterchangeAhead(steps, currentStepIndex, route) {
  let complex = false;
  let count = 0;

  for (let i = currentStepIndex; i < currentStepIndex + 3; i++) {
    if (!steps[i]) continue;
    let text = steps[i].instructions ? steps[i].instructions.toLowerCase() : (stripHtml(steps[i]?.html_instructions || "").toLowerCase());
    if (text.includes("exit") || text.includes("ramp") || text.includes("merge")) {
      count++;
    }
  }

  if (count >= 2) complex = true;

  return complex;
}

function showInterchangeWarning() {
  const interchangeWarn = document.getElementById("drive-interchange-warn");
  if (interchangeWarn) {
    interchangeWarn.classList.add("visible");
  }
}

function getDrivePriorityWarning(r, stepIndex, userLatLng) {
  const steps = r.route.legs[0].steps;
  const ulng = userLatLng || lastKnownUserLatLng;
  const currentStep = steps[stepIndex];

  if (!currentStep) return null;

  const phaseRank    = { now: 3, soon: 2, prepare: 1, none: 0 };
  const typePriority = { exit: 5, ramp: 5, lane: 4, merge: 3, uturn: 2, interchange: 1 };

  // 1. Current step wins if already active
  const currentMeta = getStepWarningMeta(currentStep, r.route);
  if (currentMeta) {
    const currentDist  = getDistanceToStepEndMeters(currentStep, ulng);
    const currentPhase = getWarningPhaseForType(currentDist, currentMeta.type || "");
    if (currentPhase !== "none") {
      return currentMeta;
    }
  }

  // 2. Upcoming steps — score all candidates, pick best
  const candidates = [];

  for (let i = stepIndex + 1; i < Math.min(steps.length, stepIndex + 5); i++) {
    const step = steps[i];
    const meta = getStepWarningMeta(step, r.route);
    if (!meta) continue;

    // Effective distance = remaining current step + full intermediate steps + approach to target
    let effectiveMeters = getDistanceToStepEndMeters(currentStep, ulng) ?? 0;
    for (let j = stepIndex + 1; j < i; j++) {
      effectiveMeters += steps[j]?.distance?.value || 0;
    }
    effectiveMeters += Math.min(step.distance?.value || 0, 180);

    const phase = getWarningPhaseForType(effectiveMeters, meta.type || "");
    if (phase === "none") continue;

    candidates.push({
      meta,
      type:           meta.type,
      phase,
      effectiveMeters,
      typeScore:  typePriority[meta.type] || 0,
      phaseScore: phaseRank[phase]        || 0
    });
  }

  if (candidates.length > 0) {
    candidates.sort((a, b) => {
      if (b.typeScore  !== a.typeScore)  return b.typeScore  - a.typeScore;
      if (b.phaseScore !== a.phaseScore) return b.phaseScore - a.phaseScore;
      return a.effectiveMeters - b.effectiveMeters;
    });
    return candidates[0].meta;
  }

  // 3. Fallback advisory only if nothing more concrete exists
  if (isComplexInterchangeAhead(steps, stepIndex, r.route)) {
    return {
      type:      "interchange",
      icon:      "⚠",
      shortText: "Complex interchange ahead",
      longText:  "Complex interchange ahead — stay focused for lane choice"
    };
  }

  return null;
}

function parseStepDistanceMeters(step) {
  if (!step?.distance?.value) return null;
  return step.distance.value;
}

function getDistanceToStepEndMeters(step, userLatLng) {
  if (!step?.end_location || !userLatLng) return parseStepDistanceMeters(step);
  return google.maps.geometry.spherical.computeDistanceBetween(
    userLatLng,
    step.end_location
  );
}

function getWarningPhase(distanceMeters) {
  return getWarningPhaseForType(distanceMeters, "");
}

function buildTimedWarning(priorityWarning, step, userLatLng) {
  if (!priorityWarning || !step) return null;

  const meters = getDistanceToStepEndMeters(step, userLatLng);
  const phase = getWarningPhaseForType(meters, priorityWarning.type);

  if (phase === "none") return null;

  let distanceText = "Ahead";
  if (meters != null) {
    if (meters <= 60) {
      distanceText = "Now";
    } else if (meters < 1000) {
      distanceText = `${Math.round(meters / 10) * 10} m`;
    } else {
      distanceText = `${(meters / 1000).toFixed(1)} km`;
    }
  }

  let shortText = priorityWarning.shortText;

  if (phase === "prepare") {
    if (priorityWarning.type === "exit" || priorityWarning.type === "ramp") {
      shortText = `Prepare: ${priorityWarning.shortText}`;
    } else if (priorityWarning.type === "lane" || priorityWarning.type === "merge") {
      shortText = `Lane: ${priorityWarning.shortText}`;
    } else if (priorityWarning.type === "uturn") {
      shortText = `Prepare: ${priorityWarning.shortText}`;
    }
  }

  if (phase === "now") {
    if (priorityWarning.type === "exit")  shortText = "Take the exit now";
    if (priorityWarning.type === "ramp")  shortText = "Take the ramp now";
    if (priorityWarning.type === "lane")  shortText = priorityWarning.shortText.replace("ahead", "now");
    if (priorityWarning.type === "merge") shortText = "Merge now";
    if (priorityWarning.type === "uturn") shortText = "Make a U-turn now";
  }

  return {
    ...priorityWarning,
    phase,
    shortText,
    distanceText
  };
}

function getHeldLaneGuidance(nextGuidance) {
  const now = Date.now();

  if (!nextGuidance) {
    if (_laneGuidanceHeld && now < _laneGuidanceHeldUntil) {
      return _laneGuidanceHeld;
    }
    _laneGuidanceHeld = null;
    _laneGuidanceHeldUntil = 0;
    return null;
  }

  const sameText  = _laneGuidanceHeld?.shortText === nextGuidance.shortText;
  const samePhase = _laneGuidanceHeld?.phase === nextGuidance.phase;

  if (sameText && samePhase) {
    _laneGuidanceHeld = nextGuidance;
    _laneGuidanceHeldUntil = now + 2500;
    return nextGuidance;
  }

  if (_laneGuidanceHeld && now < _laneGuidanceHeldUntil) {
    return _laneGuidanceHeld;
  }

  _laneGuidanceHeld = nextGuidance;
  _laneGuidanceHeldUntil = now + 2500;
  return nextGuidance;
}

function normalizeVoiceText(text) {
  return (text || "")
    .replace(/\bE311\b/g, "E three one one")
    .replace(/\bE611\b/g, "E six one one")
    .replace(/\bE11\b/g, "E eleven")
    .replace(/\s+/g, " ")
    .trim();
}

function speakText(text, priority = "normal") {
  if (!voiceEnabled || !("speechSynthesis" in window)) return;
  if (!text) return;
  const now = Date.now();
  const normalized = normalizeVoiceText(text);
  if (normalized === lastSpokenText && now - lastSpokenAt < 6000) return;
  if (priority === "urgent") window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(normalized);
  utterance.lang = voiceLang();
  utterance.rate = priority === "urgent" ? 1.0 : 0.95;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;
  lastSpokenText = normalized;
  lastSpokenAt = now;
  window.speechSynthesis.speak(utterance);
}

function getVoicePromptFromTimedWarning(timedWarning) {
  if (!timedWarning) return "";
  if (timedWarning.phase === "prepare") return timedWarning.shortText.replace(/^Prepare:\s*/i, "Prepare to ");
  if (timedWarning.phase === "soon")    return timedWarning.shortText;
  if (timedWarning.phase === "now")     return timedWarning.shortText.replace(/^NOW:\s*/i, "Now ");
  return timedWarning.shortText || "";
}

function buildContextAwareVoicePrompt(step, phase) {
  const html = stripHtml(step?.html_instructions || "");
  const text = html.toLowerCase();
  const maneuver = (step?.maneuver || "").toLowerCase();

  const isUTurn     = maneuver.includes("uturn") || text.includes("u-turn");
  const isKeepLeft  = text.includes("keep left");
  const isKeepRight = text.includes("keep right");
  const isExit      = text.includes("exit");
  const isRamp      = text.includes("ramp");
  const isMerge     = text.includes("merge");
  const isLeft      = text.includes("left") && !isKeepLeft;
  const isRight     = text.includes("right") && !isKeepRight;

  if (phase === "prepare") {
    if (isExit)      return t("tw_prep_exit");
    if (isRamp)      return t("tw_prep_ramp");
    if (isKeepLeft)  return t("tw_prep_keep_left");
    if (isKeepRight) return t("tw_prep_keep_right");
    if (isUTurn)     return t("tw_prep_uturn");
    if (isMerge)     return t("tw_prep_merge");
    if (isLeft)      return t("tw_prep_left");
    if (isRight)     return t("tw_prep_right");
    return t("tw_prep_straight");
  }

  if (phase === "soon") {
    if (isExit)      return t("tw_soon_exit");
    if (isRamp)      return t("tw_soon_ramp");
    if (isKeepLeft)  return t("tw_soon_keep_left");
    if (isKeepRight) return t("tw_soon_keep_right");
    if (isUTurn)     return t("tw_soon_uturn");
    if (isMerge)     return t("tw_soon_merge");
    if (isLeft)      return t("tw_soon_left");
    if (isRight)     return t("tw_soon_right");
    return t("tw_soon_straight");
  }

  if (phase === "now") {
    if (isExit)      return t("tw_now_exit");
    if (isRamp)      return t("tw_now_ramp");
    if (isKeepLeft)  return t("tw_now_keep_left");
    if (isKeepRight) return t("tw_now_keep_right");
    if (isUTurn)     return t("tw_now_uturn");
    if (isMerge)     return t("tw_now_merge");
    if (isLeft)      return t("tw_now_left");
    if (isRight)     return t("tw_now_right");
  }

  return t("tw_now_straight");
}

function getPriority(type) {
  if (type === "exit") return 5;
  if (type === "ramp") return 4;
  if (type === "merge") return 3;
  if (type === "lane") return 2;
  return 1;
}

let _currentHighestPriority = 0;

function speakDriveInstruction(step, phase, instructionType) {
  if (!voiceEnabled || !step) return;
  const text = buildContextAwareVoicePrompt(step, phase);
  
  // TASK 3: Kill straight voice
  if (text && text.toLowerCase().includes("straight")) return;
  
  if (!text || text === "Continue straight") return;
  
  // TASK 2: Priority system - only show instruction if it's highest priority
  const priority = getPriority(instructionType);
  if (priority < _currentHighestPriority) return;
  _currentHighestPriority = priority;
  
  const now = Date.now();
  if (Date.now() - lastSpokenAt < 3500 && lastSpokenText === text) return;
  if (text === lastSpokenText && now - lastSpokenAt < 4500) return;
  try {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(normalizeVoiceText(text));
    utter.rate = 1.0; utter.pitch = 1.0; utter.lang = voiceLang();
    window.speechSynthesis.speak(utter);
    lastSpokenText = text;
    lastSpokenAt = now;
  } catch (e) { console.warn("speech failed", e); }
}

let _lastInterchangeWarningAt = 0;

function speakInterchangeWarning() {
  const now = Date.now();
  if (now - _lastInterchangeWarningAt < 30000) return; // Don't repeat within 30s
  _lastInterchangeWarningAt = now;
  
  try {
    if ("speechSynthesis" in window) {
      const text = t("interchange_warn") || "Complex interchange ahead. Stay focused.";
      const utter = new SpeechSynthesisUtterance(normalizeVoiceText(text));
      utter.rate = 0.95; utter.pitch = 1.0; utter.lang = voiceLang();
      window.speechSynthesis.speak(utter);
    }
  } catch (e) { console.warn("interchange voice failed", e); }
}

function getVoicePromptFromManeuver(vm) {
  if (!vm) return "";
  const m = (vm.maneuver || "").toLowerCase();
  if (!m || m === "straight") return "";
  if (m.includes("uturn"))      return t("ctx_uturn");
  if (m.includes("turn-left"))  return t("ctx_left");
  if (m.includes("turn-right")) return t("ctx_right");
  if (m.includes("keep-left"))  return t("ctx_keep_left");
  if (m.includes("keep-right")) return t("ctx_keep_right");
  if (m.includes("ramp"))       return t("ctx_ramp");
  if (m.includes("fork"))       return t("ctx_fork") || "Take the fork";
  if (m.includes("merge"))      return t("ctx_merge");
  return stripHtml(vm.instruction || "");
}


function toggleVoice() {
  voiceEnabled = !voiceEnabled;

  if (!voiceEnabled && "speechSynthesis" in window) {
    window.speechSynthesis.cancel();
  }
}

function toggleFollowMode() {
  followUserMode = !followUserMode;

  if (followUserMode && lastKnownUserLatLng) {
    updateDriveCamera(lastKnownUserLatLng);
  }
}

function getDriveTimedWarning(r, stepIndex) {
  const steps = r.route.legs[0].steps;
  const ulng  = lastKnownUserLatLng;

  // CURRENT step only — never advance to next step here
  const curWarning = getStepWarningMeta(steps[stepIndex], r.route);
  if (curWarning && steps[stepIndex]) {
    const timed = buildTimedWarning(curWarning, steps[stepIndex], ulng);
    if (timed) return timed;
  }

  return null;
}

function getHeldTimedWarning(timedWarning) {
  const now = Date.now();

  if (!timedWarning) {
    if (heldTimedWarning && now < heldTimedWarningUntil) {
      return heldTimedWarning;
    }
    heldTimedWarning = null;
    heldTimedWarningUntil = 0;
    return null;
  }

  const nextPhase = timedWarning.phase || "";
  const currentPhase = lastStableTimedPhase || "";

  if (nextPhase !== currentPhase) {
    if (now - lastPhaseChangeAt < 1800 && currentPhase) {
      if (heldTimedWarning && now < heldTimedWarningUntil) {
        return heldTimedWarning;
      }
    }
    lastPhaseChangeAt = now;
    lastStableTimedPhase = nextPhase;
  }

  heldTimedWarning = timedWarning;
  heldTimedWarningUntil = now + 2500;

  return heldTimedWarning;
}

// ── Lane / Exit Guidance Block (lookahead, separate from main instruction) ──

function buildLaneGuidanceText(meta, phase) {
  const type = meta?.type || "";
  const base = meta?.shortText || "";
  const laneHint = meta?.laneHint || "";

  if (type === "exit") {
    if (phase === "prepare") return laneHint ? `${laneHint} — exit ahead` : base.replace("ahead", "").trim();
    if (phase === "soon")    return laneHint ? `${laneHint} — exit soon` : base;
    if (phase === "now")     return t("lg_exit_now");
  }

  if (type === "ramp") {
    if (phase === "prepare") return laneHint ? `${laneHint} — ramp ahead` : base.replace("ahead", "").trim();
    if (phase === "soon")    return laneHint ? `${laneHint} — ramp soon` : base;
    if (phase === "now")     return t("lg_ramp_now");
  }

  if (type === "fork") {
    if (phase === "prepare") return laneHint ? `${laneHint} — fork ahead` : base;
    if (phase === "soon")    return laneHint ? `${laneHint} — fork soon` : base;
    if (phase === "now") {
      if (base.toLowerCase().includes("left"))  return "Fork left now";
      if (base.toLowerCase().includes("right")) return "Fork right now";
      return "Take the fork now";
    }
  }

  if (type === "lane") {
    if (phase === "prepare") return laneHint || base;
    if (phase === "soon")    return laneHint || base;
    if (phase === "now") {
      if (base.toLowerCase().includes("left"))  return "Keep left now";
      if (base.toLowerCase().includes("right")) return "Keep right now";
      return "Use the correct lane now";
    }
  }

  if (type === "merge") {
    if (phase === "prepare") return laneHint || "Prepare to merge";
    if (phase === "soon")    return laneHint || "Merge ahead";
    if (phase === "now")     return "Merge now";
  }

  return laneHint || base;
}

function getDriveLaneGuidance(r, stepIndex, userLatLng) {
  const steps = r.route.legs[0].steps;
  const ulng = userLatLng || lastKnownUserLatLng;
  const now = Date.now();

  const candidates = [];

  for (let i = stepIndex; i < Math.min(steps.length, stepIndex + 4); i++) {
    const step = steps[i];
    const meta = getStepWarningMeta(step, r.route);
    if (!meta) continue;

    if (!["lane", "exit", "ramp", "merge", "fork"].includes(meta.type)) continue;

    const meters = getDistanceToStepEndMeters(step, ulng);
    const phase = getWarningPhaseForType(meters, meta.type);
    if (phase === "none") continue;

  const priority =
  meta.type === "exit" || meta.type === "ramp" || meta.type === "fork" ? 3 :
  meta.type === "lane" ? 2 :
  meta.type === "merge" ? 1 : 0;

    candidates.push({
      stepIndex: i,
      type: meta.type,
      phase,
      priority,
      meters,
      icon: meta.icon,
      shortText: buildLaneGuidanceText(meta, phase),
      text: buildLaneGuidanceText(meta, phase),
      distanceText:
        meters == null
          ? "Ahead"
          : meters <= 60
            ? "Now"
            : meters < 1000
              ? `${Math.round(meters / 10) * 10} m`
              : `${(meters / 1000).toFixed(1)} km`
    });
  }

  if (!candidates.length) {
    if (_laneGuidanceHeld && now < _laneGuidanceHeldUntil) {
      return _laneGuidanceHeld;
    }
    _laneGuidanceHeld = null;
    _laneGuidanceHeldUntil = 0;
    return null;
  }

  // Жёсткий приоритет: exit/ramp > lane > merge; фаза; ближайший
  candidates.sort((a, b) => {
    if (b.priority !== a.priority) return b.priority - a.priority;
    const phaseRank = { now: 3, soon: 2, prepare: 1 };
    if (phaseRank[b.phase] !== phaseRank[a.phase]) return phaseRank[b.phase] - phaseRank[a.phase];
    return (a.meters ?? 999999) - (b.meters ?? 999999);
  });

  const best = candidates[0];

  // Улучшенный hold: держим старое если тот же тип+фаза или held приоритетнее
  if (_laneGuidanceHeld && now < _laneGuidanceHeldUntil) {
    const sameType  = _laneGuidanceHeld.type  === best.type;
    const samePhase = _laneGuidanceHeld.phase === best.phase;

    if (sameType && samePhase) {
      return _laneGuidanceHeld;
    }

    const heldPriority =
      _laneGuidanceHeld.type === "exit" || _laneGuidanceHeld.type === "ramp" ? 3 :
      _laneGuidanceHeld.type === "lane" ? 2 :
      _laneGuidanceHeld.type === "merge" ? 1 : 0;

    if (heldPriority > best.priority) {
      return _laneGuidanceHeld;
    }
  }

  _laneGuidanceHeld = best;
  _laneGuidanceHeldUntil = now + 2200;
  return best;
}

function getUpcomingCondition(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const upcoming = steps.slice(stepIndex, stepIndex + 5);

  const timedWarning = getDriveTimedWarning(r, stepIndex);
  if (timedWarning) {
    return { type: timedWarning.phase === "now" ? "alert" : "warning", icon: timedWarning.icon, text: timedWarning.longText };
  }

  const hasHighway = upcoming.some(s => stepLooksLikeHighway(s, r.route));
  const hasManyTurns = upcoming.filter(s => isMeaningfulManeuver(s, r.route)).length >= 3;
  const isNearEnd = stepIndex >= steps.length - 3;

  if (r.traffic === "high") return { type: "warning", icon: "&#9888;", text: "Heavier traffic ahead" };
  if (hasManyTurns)         return { type: "warning", icon: "&#128260;", text: "Multiple turns ahead" };
  if (isNearEnd)            return { type: "stable",  icon: "&#127937;", text: "Approaching destination" };
  if (hasHighway)           return { type: "stable",  icon: "&#128739;", text: "Highway section ahead — smooth driving" };
  if (r.traffic === "low")  return { type: "stable",  icon: "&#9728;", text: "Stable traffic ahead" };
  return { type: "stable", icon: "&#9728;", text: "Moderate conditions ahead" };
}

function getRerouteDecision(currentRoute, alternativeRoute) {
  const timeGain = getDisplayMinutes(currentRoute) - getDisplayMinutes(alternativeRoute);
  const currentDelay = currentRoute.delayMinutes || 0;
  const altDelay = alternativeRoute.delayMinutes || 0;
  const delayGain = currentDelay - altDelay;
  const trafficBetter = trafficRank(alternativeRoute.traffic) < trafficRank(currentRoute.traffic);
  const simplerDrive = (alternativeRoute.complexity || 0) < (currentRoute.complexity || 0);

  if (timeGain >= 4) {
    return {
      action: "switch",
      confidence: "high",
      title: `Switch now → save ${timeGain} min`,
      detail: `Faster${alternativeRoute.drivePersonality ? " · " + alternativeRoute.drivePersonality.toLowerCase() : ""} via ${getRouteSummaryName(alternativeRoute)}`
    };
  }

  if (timeGain >= 2 && (trafficBetter || delayGain >= 2)) {
    return {
      action: "switch",
      confidence: "high",
      title: `Switch now → smoother and faster`,
      detail: `${timeGain} min faster with calmer traffic and ${(alternativeRoute.drivePersonality || "steady drive").toLowerCase()}`
    };
  }

  if (timeGain >= 1 && (trafficBetter || simplerDrive || delayGain >= 1)) {
    return {
      action: "suggest",
      confidence: "medium",
      title: `Alternative may be better`,
      detail: `${timeGain} min gain or ${(alternativeRoute.drivePersonality || "easier drive").toLowerCase()} ahead`
    };
  }

  if (timeGain >= 0 && trafficBetter && delayGain >= 2) {
    return {
      action: "suggest",
      confidence: "medium",
      title: `Calmer route available`,
      detail: `Similar time, but calmer and lower-stress ahead`
    };
  }

  return {
    action: "stay",
    confidence: "low",
    title: "Stay on current route",
    detail: "No strong reroute advantage"
  };
}

function renderDriveAlertDecision(decision, altRoute) {
  const alert = document.getElementById("drive-alert");
  const message = document.getElementById("drive-alert-message");

  if (!alert || !message) return;

  if (!decision || decision.action === "stay") {
    alert.classList.remove("visible");
    return;
  }

  const confidenceClass = decision.confidence === "high" ? "high" :
                          decision.confidence === "medium" ? "medium" : "low";

  const actionLabel = decision.action === "switch" ? "Switch recommended" : "Alternative suggested";

  message.innerHTML = `
    <div class="drive-alert-header">
      <span class="drive-alert-badge ${confidenceClass}">
        <span class="dot"></span>
        ${decision.confidence} confidence
      </span>
      <span class="drive-alert-state ${decision.action}">${actionLabel}</span>
    </div>
    <div class="drive-alert-title">${decision.title}</div>
    <div class="drive-alert-detail">${decision.detail}</div>
    <div class="drive-alert-meta">Via ${getRouteSummaryName(altRoute)}</div>
  `;

  const primaryBtn = alert.querySelector(".drive-alert-btn.primary");
  const secondaryBtn = alert.querySelector(".drive-alert-btn.secondary");

  if (primaryBtn && secondaryBtn) {
    primaryBtn.textContent = decision.action === "switch" ? "Switch now" : "Try alternative";
    primaryBtn.className = `drive-alert-btn primary${decision.action === "suggest" ? " suggest" : ""}`;
    secondaryBtn.textContent = "Stay";
  }

  alert.classList.add("visible");
}

function evaluateReroute(currentRoute, allRoutes) {
  if (allRoutes.length <= 1) return null;

  const alternatives = allRoutes.filter(r => r.index !== currentRoute.index);

  let bestAlt = null;
  let bestDecision = null;

  for (const alt of alternatives) {
    const decision = getRerouteDecision(currentRoute, alt);

    if (decision.action === "stay") continue;

    if (!bestAlt) {
      bestAlt = alt;
      bestDecision = decision;
      continue;
    }

    const currentPriority =
      bestDecision.action === "switch" ? 2 :
      bestDecision.action === "suggest" ? 1 : 0;

    const newPriority =
      decision.action === "switch" ? 2 :
      decision.action === "suggest" ? 1 : 0;

    if (newPriority > currentPriority) {
      bestAlt = alt;
      bestDecision = decision;
      continue;
    }

    if (newPriority === currentPriority) {
      const currentGain = getDisplayMinutes(currentRoute) - getDisplayMinutes(bestAlt);
      const newGain = getDisplayMinutes(currentRoute) - getDisplayMinutes(alt);

      const currentBias = getPersonalizationBias(bestAlt);
      const newBias = getPersonalizationBias(alt);

      if (newGain > currentGain || (newGain === currentGain && newBias < currentBias)) {
        bestAlt = alt;
        bestDecision = decision;
      }
    }
  }

  if (!bestAlt || !bestDecision) return null;

  return {
    index: bestAlt.index,
    route: bestAlt,
    decision: bestDecision
  };
}

function getUserLatLngFromPosition(pos) {
  return new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
}

function getClosestStepIndex(userLatLng, steps, currentIndex = 0) {
  // Only compare end_location (not start_location) to avoid premature step advancement.
  // start_location[i+1] == end_location[i], so using both causes step i+1 to tie-win
  // as the user approaches the turn — advancing the index too early.
  let minDist = Infinity;
  let bestIndex = currentIndex;

  const from = Math.max(0, currentIndex);
  const to = Math.min(steps.length - 1, currentIndex + 3);

  for (let i = from; i <= to; i++) {
    const step = steps[i];
    if (!step?.end_location) continue;
    const d = google.maps.geometry.spherical.computeDistanceBetween(userLatLng, step.end_location);
    if (d < minDist) {
      minDist = d;
      bestIndex = i;
    }
  }

  return bestIndex;
}

function isUserOffRoute(userLatLng, route) {
  const path = route.route.overview_path;
  if (!path || !path.length) return false;
  return !google.maps.geometry.poly.isLocationOnEdge(
    userLatLng,
    new google.maps.Polyline({ path }),
    0.00045
  );
}

function smoothUserPosition(newLatLng) {
  if (!smoothedUserLatLng) {
    smoothedUserLatLng = newLatLng;
    return newLatLng;
  }
  const alpha = 0.35;
  smoothedUserLatLng = new google.maps.LatLng(
    smoothedUserLatLng.lat() + (newLatLng.lat() - smoothedUserLatLng.lat()) * alpha,
    smoothedUserLatLng.lng() + (newLatLng.lng() - smoothedUserLatLng.lng()) * alpha
  );
  return smoothedUserLatLng;
}

function updateUserHeading(prevLatLng, nextLatLng) {
  if (!prevLatLng || !nextLatLng) return lastUserHeading || 0;

  const d = google.maps.geometry.spherical.computeDistanceBetween(prevLatLng, nextLatLng);
  if (d < 5) return lastUserHeading || 0;

  lastUserHeading = google.maps.geometry.spherical.computeHeading(prevLatLng, nextLatLng) || 0;
  return lastUserHeading;
}

function hasUserMoved(prevLatLng, nextLatLng) {
  if (!prevLatLng || !nextLatLng) return true;
  const d = google.maps.geometry.spherical.computeDistanceBetween(prevLatLng, nextLatLng);
  return d > 8;
}

function getStableStepIndex(candidateIndex) {
  const now = Date.now();
  if (candidateIndex < currentStepIndex) return currentStepIndex;
  if (candidateIndex > currentStepIndex + 1) candidateIndex = currentStepIndex + 1;
  if (candidateIndex !== currentStepIndex) {
    if (now - lastStepSwitchAt < 2500) return currentStepIndex;
    lastStepSwitchAt = now;
  }
  lastStableStepIndex = candidateIndex;
  return candidateIndex;
}

function updateDriveUserMarker(userLatLng) {
  if (!driveMap) return;

  const icon = {
    path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
    scale: 6,
    fillColor: "#2563eb",
    fillOpacity: 1,
    strokeColor: "#ffffff",
    strokeWeight: 2,
    rotation: lastUserHeading || 0,
    anchor: new google.maps.Point(0, 2)
  };

  if (!driveUserMarker) {
    driveUserMarker = new google.maps.Marker({
      position: userLatLng,
      map: driveMap,
      title: "You",
      zIndex: 9999,
      icon
    });
  } else {
    driveUserMarker.setPosition(userLatLng);
    driveUserMarker.setIcon(icon);
  }
}

function updateDriveCamera(userLatLng) {
  if (!driveMap || !followUserMode || !userLatLng) return;

  if (!driveMapHasFollowed) {
    driveMap.setZoom(17);
    driveMap.panTo(userLatLng);
    driveMapHasFollowed = true;
    return;
  }

  driveMap.panTo(userLatLng);

  const currentZoom = driveMap.getZoom() || 0;
  if (currentZoom < 16) {
    driveMap.setZoom(16);
  }
}

function handleLiveDrivePosition(pos) {
  if (!selectedRoute) return;

  const rawLatLng = getUserLatLngFromPosition(pos);
  const userLatLng = smoothUserPosition(rawLatLng);

  updateUserHeading(lastKnownUserLatLng, userLatLng);

  if (!hasUserMoved(lastKnownUserLatLng, userLatLng)) {
    updateDriveUserMarker(userLatLng);
    updateDriveCamera(userLatLng);
    return;
  }

  lastKnownUserLatLng = userLatLng;
  updateDriveUserMarker(userLatLng);
  updateDriveCamera(userLatLng);

  currentStepIndex = findBestCurrentStepIndex(selectedRoute, userLatLng, currentStepIndex);

  updateDriveUI();

  if (isUserOffRoute(userLatLng, selectedRoute)) {
    if (!offRouteSince) offRouteSince = Date.now();
    if (Date.now() - offRouteSince > 4000) {
      handleOffRouteRecalculation(userLatLng);
      offRouteSince = 0;
      return;
    }
  } else {
    offRouteSince = 0;
  }

  const now = Date.now();
  if (currentStepIndex >= 2 && now - lastRerouteCheckAt > 15000) {
    lastRerouteCheckAt = now;

    const reroute = evaluateReroute(selectedRoute, analyzedRoutes);

    if (!reroute) {
      _rerouteDecision = null;
      betterRouteIndex = null;
      dismissAlert();
      return;
    }

    if (reroute.index !== betterRouteIndex) {
      betterRouteIndex = reroute.index;
      _rerouteDecision = reroute.decision;
      renderDriveAlertDecision(reroute.decision, reroute.route);
    }
  }
}

function handleOffRouteRecalculation(userLatLng) {
  betterRouteIndex = null;
  _rerouteDecision = null;
  dismissAlert();

  const destination = document.getElementById("end").value.trim();
  if (!destination || !directionsService) return;

  directionsService.route({
    origin: userLatLng,
    destination,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK" || !result.routes?.length) return;

    currentDirectionsResult = result;

    analyzedRoutes = result.routes.map((route, i) => {
      const leg = route.legs[0];
      const metrics = calculateRouteMetrics(route, leg, route);
      return { route, index: i, displayIndex: i + 1, ...metrics };
    });

    analyzedRoutes = analyzedRoutes.map(r => {
      const scoreData = calculateRouteScore(r, analyzedRoutes);
      return { ...r, ...scoreData };
    });

    _bestRoute = selectBestRoute(analyzedRoutes);
    _fastestRoute = [...analyzedRoutes].sort((a, b) => a.time - b.time)[0];

    analyzedRoutes.forEach(r => {
      r.role = getRouteRole(r, _bestRoute, _fastestRoute, analyzedRoutes);
    });

    selectedRoute = _bestRoute;
    currentStepIndex = 0;
    betterRouteIndex = null;
    _rerouteDecision = null;
    offRouteSince = 0;
    lastStepSwitchAt = 0;
    lastStableStepIndex = 0;
    smoothedUserLatLng = userLatLng;
    dismissAlert();

    if (driveRenderer) driveRenderer.setMap(null);

    driveRenderer = new google.maps.DirectionsRenderer({
      map: driveMap,
      directions: currentDirectionsResult,
      routeIndex: selectedRoute.index,
      polylineOptions: {
        strokeColor: "#2d6a4f",
        strokeWeight: 6
      }
    });

    updateDriveUI();
    updateDriveCamera(userLatLng);
  });
}

function startLiveDriveTracking() {

  driveWatchId = navigator.geolocation.watchPosition(

function getDriveIcon(maneuver) {
  const m = (maneuver || "").toLowerCase();
  if (m.includes("uturn"))  return "↺";
  if (m.includes("left"))   return "←";
  if (m.includes("right"))  return "→";
  if (m.includes("merge"))  return "⇢";
  if (m.includes("ramp"))   return "↗";
  return "↑";
}

function updateDriveUI() {
  const r = selectedRoute;
  if (!r) return;

  if (lastKnownUserLatLng) {
    currentStepIndex = findBestCurrentStepIndex(r, lastKnownUserLatLng, currentStepIndex);
  }

  const vm = buildDriveViewModel(r, currentStepIndex);
  let timedWarning = getDriveTimedWarning(r, currentStepIndex);
  timedWarning = getHeldTimedWarning(timedWarning);

  const condition = timedWarning
    ? {
        type: timedWarning.phase === "now" ? "alert" : "warning",
        icon: timedWarning.icon,
        text: timedWarning.longText
      }
    : getUpcomingCondition(r, currentStepIndex);

  const stress = getStressBadge(r.stressScore || 0);

  document.getElementById("drive-eta-time").textContent = vm.eta;
  document.getElementById("drive-distance").textContent = vm.distance;
  document.getElementById("drive-traffic").textContent = vm.trafficText;

  const laneGuidance = getDriveLaneGuidance(r, currentStepIndex, lastKnownUserLatLng);

  // main instruction — только для текущего манёвра или non-lane timed warning
  let mainInstruction = vm.instruction || "Follow the route";
  let mainDistance    = vm.instructionDistance || "";
  let mainIcon        = getDriveIcon(vm.maneuver || "");

  if (timedWarning && !["lane", "exit", "ramp", "merge"].includes(timedWarning.type)) {
    mainInstruction = timedWarning.shortText   || mainInstruction;
    mainDistance    = timedWarning.distanceText || mainDistance;
    mainIcon        = timedWarning.icon         || mainIcon;
  }

  // если laneGuidance активен и main instruction дублирует его — показываем route step
  if (
    laneGuidance &&
    typeof mainInstruction === "string" &&
    typeof laneGuidance.text === "string"
  ) {
    const mi = mainInstruction.toLowerCase();
    const duplicated =
      mi === laneGuidance.text.toLowerCase() ||
      mi.includes("exit")       ||
      mi.includes("ramp")       ||
      mi.includes("keep left")  ||
      mi.includes("keep right") ||
      mi.includes("merge");

    if (duplicated) {
      mainInstruction = vm.instruction || "Continue straight";
      mainDistance    = vm.instructionDistance || "";
      mainIcon        = getDriveIcon(vm.maneuver || "");
    }
  }

  document.getElementById("drive-next-instruction").textContent = mainInstruction;
  document.getElementById("drive-next-distance").textContent    = mainDistance;
  document.getElementById("drive-next-icon").textContent        = mainIcon;

  const aheadIcon = document.getElementById("drive-ahead-icon");
  aheadIcon.innerHTML = condition.icon;
  aheadIcon.className = `drive-ahead-icon ${condition.type}`;
  document.getElementById("drive-ahead-text").textContent =
    `${condition.text} · ${stress.label.toLowerCase()} · ${r.drivePersonality || "steady drive"}`;

  document.getElementById("drive-status").textContent = `Step ${currentStepIndex + 1}/${vm.totalSteps}`;

  // Complex interchange warning (TASK 4)
  const steps = r.route.legs[0].steps;
  const interchangeWarn = document.getElementById("drive-interchange-warn");
  if (interchangeWarn) {
    const isComplex = isComplexInterchangeAhead(steps, currentStepIndex, r.route);
    const wasVisible = interchangeWarn.classList.contains("visible");
    
    if (isComplex) {
      showInterchangeWarning();
    } else {
      interchangeWarn.classList.remove("visible");
    }
    
    // Voice alert when entering complex interchange (only once)
    if (isComplex && !wasVisible && voiceEnabled) {
      speakInterchangeWarning();
    }
  }

  // Lane guidance block — driven by getDriveLaneGuidance (priority: exit/ramp > lane > merge)
  const laneBlock       = document.getElementById("drive-lane-block");
  const laneIcon        = document.getElementById("drive-lane-icon");
  const laneInstruction = document.getElementById("drive-lane-instruction");
  const laneDistance    = document.getElementById("drive-lane-distance");

  // TASK 5: Lane Display Control — show ONLY when phase is "soon" or "now" AND instruction is exit/ramp/merge
  if (laneBlock && laneIcon && laneInstruction && laneDistance) {
    const shouldShowLane = laneGuidance && 
      (laneGuidance.phase === "soon" || laneGuidance.phase === "now") &&
      ["exit", "ramp", "merge"].includes(laneGuidance.type);
    
    if (shouldShowLane) {
      laneBlock.style.display = "flex";
      laneBlock.className = "drive-lane-block";

      if (laneGuidance.phase === "soon") {
        laneBlock.classList.add("lane-warn");
      } else if (laneGuidance.phase === "now") {
        laneBlock.classList.add("lane-alert");
      }

      laneIcon.textContent        = laneGuidance.icon || "⇢";
      laneInstruction.textContent = laneGuidance.text || "";
      laneDistance.textContent    = laneGuidance.distanceText || "";
    } else {
      laneBlock.style.display = "none";
      laneBlock.className = "drive-lane-block";
      laneInstruction.textContent = "";
      laneDistance.textContent    = "";
    }
  }

  // Reset priority at start of each update cycle
  _currentHighestPriority = 0;

  // Voice — ONE engine, priority: exit/ramp > lane/merge > timedWarning > none
  const currentStep = selectedRoute?.route?.legs?.[0]?.steps?.[currentStepIndex];
  if (laneGuidance && ["exit", "ramp"].includes(laneGuidance.type)) {
    speakDriveInstruction(currentStep, laneGuidance.phase, laneGuidance.type);
  } else if (laneGuidance && ["lane", "merge"].includes(laneGuidance.type)) {
    speakDriveInstruction(currentStep, laneGuidance.phase, laneGuidance.type);
  } else if (timedWarning) {
    speakDriveInstruction(currentStep, timedWarning.phase, timedWarning.type);
  }
  // else: no speech on straight segments — silence is better than spam

  lastWarningPhase = timedWarning?.phase || "";
}

function calculateRoutes() {
  clearRoutes();

  const start = document.getElementById("start").value.trim();
  const end = document.getElementById("end").value.trim();

  // ТЗ5: detect parking type (does NOT affect route selection)
  _parkingType = detectParkingType(end);

  if (!start || !end) {
    document.getElementById("results").innerHTML = "";
    return;
  }

  document.getElementById("results").innerHTML = '<div class="loading">Finding best routes...</div>';

  directionsService.route({
    origin: start,
    destination: end,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK") {
      document.getElementById("results").innerHTML = `<div class="error">Could not find route: ${status}</div>`;
      return;
    }

    const routes = result.routes;
    if (!routes?.length) {
      document.getElementById("results").innerHTML = '<div class="error">No routes found.</div>';
      return;
    }

    currentDirectionsResult = result;

    analyzedRoutes = routes.map((route, i) => {
      const leg = route.legs[0];
      const metrics = calculateRouteMetrics(route, leg, route);
      return { route, index: i, displayIndex: i + 1, ...metrics };
    });

    analyzedRoutes = analyzedRoutes.map(r => {
      const scoreData = calculateRouteScore(r, analyzedRoutes);
      return { ...r, ...scoreData };
    });

    _bestRoute = selectBestRoute(analyzedRoutes);
    _fastestRoute = [...analyzedRoutes].sort((a, b) => a.time - b.time)[0];

    analyzedRoutes.forEach(r => {
      r.role = getRouteRole(r, _bestRoute, _fastestRoute, analyzedRoutes);
    });

    renderResults();
    drawRoutes(result);

    // Day 6.5: fire predictive check asynchronously — doesn't block current render
    runPredictiveCheck(start, end, getDisplayMinutes(_bestRoute));
  });
}

const AUTOCOMPLETE_DEBOUNCE_MS  = 220;
const STEP_SWITCH_COOLDOWN_MS   = 1800;
const STEP_REACHED_RADIUS_M     = 28;
const NEXT_STEP_PREPARE_RADIUS_M = 180;
const NEXT_STEP_SOON_RADIUS_M   = 90;

let _startInputDebounced   = null;
let _endInputDebounced     = null;
let _lastManualRouteTrigger = 0;

function debounce(fn, delay) {
  let t = null;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay || 220); };
}

function setGpsLoading(on) {
  const btn = document.getElementById("gps-btn");
  if (btn) btn.classList.toggle("gps-loading", !!on);
}

function tryCalculateRoutesFromInputs() {
  const now   = Date.now();
  const start = document.getElementById("start")?.value?.trim() || "";
  const end   = document.getElementById("end")?.value?.trim() || "";
  if (!start || !end) return;
  if (now - _lastManualRouteTrigger < 900) return;
  _lastManualRouteTrigger = now;
  calculateRoutes();
}

function wireInputAssist() {
  const startInput = document.getElementById("start");
  const endInput   = document.getElementById("end");
  if (!startInput || !endInput) return;

  if (!_startInputDebounced) {
    _startInputDebounced = debounce(() => {
      const s = startInput.value.trim();
      const e = endInput.value.trim();
      if ((s.length >= 3 || e.length >= 3) && s && e) tryCalculateRoutesFromInputs();
    }, AUTOCOMPLETE_DEBOUNCE_MS);
  }
  if (!_endInputDebounced) {
    _endInputDebounced = debounce(() => {
      const s = startInput.value.trim();
      const e = endInput.value.trim();
      if ((s.length >= 3 || e.length >= 3) && s && e) tryCalculateRoutesFromInputs();
    }, AUTOCOMPLETE_DEBOUNCE_MS);
  }

  if (!startInput.dataset.inputAssistBound) {
    startInput.addEventListener("input", _startInputDebounced);
    startInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); tryCalculateRoutesFromInputs(); }
    });
    startInput.addEventListener("blur", () => tryCalculateRoutesFromInputs());
    startInput.dataset.inputAssistBound = "1";
  }
  if (!endInput.dataset.inputAssistBound) {
    endInput.addEventListener("input", _endInputDebounced);
    endInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); tryCalculateRoutesFromInputs(); }
    });
    endInput.addEventListener("blur", () => tryCalculateRoutesFromInputs());
    endInput.dataset.inputAssistBound = "1";
  }
}

function ensureAutocompleteReady() {
  if (!google?.maps?.places) {
    console.error("Google Places library is not loaded.");
    wireInputAssist();
    return;
  }
  if (!startAutocomplete || !endAutocomplete) initAutocomplete();
  wireInputAssist();
}

function bindAutocompletePlaceChanged(autocomplete, kind) {
  if (!autocomplete || autocomplete.__patchedPlaceChanged) return;
  autocomplete.addListener("place_changed", () => {
    const place = autocomplete.getPlace();
    if (!place?.geometry) return;

    const input = document.getElementById(kind === "start" ? "start" : "end");
    if (!input) return;

    input.value = place.formatted_address || place.name || input.value || "";

    if (kind === "start") {
      currentUserCoords = {
        lat: place.geometry.location.lat(),
        lng: place.geometry.location.lng()
      };
    }

    tryCalculateRoutesFromInputs();
  });
  autocomplete.__patchedPlaceChanged = true;
}

function patchAutocompleteBindings() {
  if (startAutocomplete) bindAutocompletePlaceChanged(startAutocomplete, "start");
  if (endAutocomplete)   bindAutocompletePlaceChanged(endAutocomplete, "end");
}

function handleGeoError(err) {
  setGpsLoading(false);
  const startInput = document.getElementById("start");
  if (!startInput) return;
  if (err?.code === 1) { startInput.placeholder = t("gps_blocked"); return; }
  if (err?.code === 2) { startInput.placeholder = t("gps_unavail"); return; }
  if (err?.code === 3) { startInput.placeholder = t("gps_timeout"); return; }
  startInput.placeholder = t("gps_error");
}

function reverseGeocodeLatLng(latLng) {
  return new Promise((resolve) => {
    try {
      new google.maps.Geocoder().geocode({ location: latLng }, (results, status) => {
        resolve((status === "OK" && results?.[0]) ? results[0].formatted_address : `${latLng.lat.toFixed(5)}, ${latLng.lng.toFixed(5)}`);
      });
    } catch { resolve(`${latLng.lat.toFixed(5)}, ${latLng.lng.toFixed(5)}`); }
  });
}

async function applyResolvedStartLocation(latLng, shouldRoute = true) {
  const startInput = document.getElementById("start");
  if (!startInput) return;
  currentUserCoords = { lat: latLng.lat, lng: latLng.lng };
  const address = await reverseGeocodeLatLng(latLng);
  startInput.value = address;
  startInput.placeholder = t("gps_current");
  if (map) map.panTo(latLng);
  if (shouldRoute) tryCalculateRoutesFromInputs();
}

async function requestGPSPatched() {
  if (!navigator.geolocation) {
    const si = document.getElementById("start");
    if (si) si.placeholder = t("gps_unsupported");
    return;
  }
  setGpsLoading(true);
  const si = document.getElementById("start");
  if (si) si.placeholder = t("gps_detecting");

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      await applyResolvedStartLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }, true);
      setGpsLoading(false);
    },
    (err) => { handleGeoError(err); },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 10000 }
  );
}

async function requestGPS() { await requestGPSPatched(); }

function patchGpsEntrypoints() {
  const btn = document.getElementById("gps-btn");
  if (btn) btn.onclick = requestGPSPatched;
}

// ── Step Stability ──

function getDistanceToStepStartMeters(step, userLatLng) {
  if (!step?.start_location || !userLatLng) return null;
  return google.maps.geometry.spherical.computeDistanceBetween(userLatLng, step.start_location);
}

function isStepActuallyReached(step, userLatLng) {
  const d = getDistanceToStepEndMeters(step, userLatLng);
  return d != null && d <= STEP_REACHED_RADIUS_M;
}

function findBestCurrentStepIndex(routeObj, userLatLng, fromIndex) {
  const steps = routeObj.route.legs[0].steps;
  const now   = Date.now();
  const start = Math.max(0, fromIndex - 1);
  const end   = Math.min(steps.length - 1, fromIndex + 2);
  let bestIndex = fromIndex;
  let bestScore = Infinity;

  for (let i = start; i <= end; i++) {
    const step        = steps[i];
    const distToEnd   = getDistanceToStepEndMeters(step, userLatLng) ?? 999999;
    const distToStart = getDistanceToStepStartMeters(step, userLatLng) ?? 999999;
    const reachedPenalty = isStepActuallyReached(step, userLatLng) ? 1000 : 0;
    const futurePenalty  = i > fromIndex ? 120 : 0;
    const score = distToEnd + distToStart * 0.35 + futurePenalty + reachedPenalty;
    if (score < bestScore) { bestScore = score; bestIndex = i; }
  }

  if (bestIndex !== lastStableStepIndex && now - lastStepSwitchAt < STEP_SWITCH_COOLDOWN_MS) {
    return lastStableStepIndex;
  }
  if (bestIndex > fromIndex) {
    const distCurrentEnd = getDistanceToStepEndMeters(steps[fromIndex], userLatLng) ?? 999999;
    if (distCurrentEnd > NEXT_STEP_PREPARE_RADIUS_M) return fromIndex;
  }
  if (bestIndex !== lastStableStepIndex) { lastStableStepIndex = bestIndex; lastStepSwitchAt = now; }
  return bestIndex;
}

function getUpcomingMeaningfulStep(steps, currentIndex, routeObj) {
  for (let i = currentIndex + 1; i < steps.length; i++) {
    if (getStepWarningMeta(steps[i], routeObj.route)) return { index: i, step: steps[i] };
  }
  return null;
}

function getWarningPhaseForType(distanceMeters, type = "") {
  if (distanceMeters == null) return "none";
  
  let phase = "";

  if (distanceMeters > 800) phase = "prepare";
  else if (distanceMeters > 300) phase = "soon";
  else if (distanceMeters > 80) phase = "now";
  else return "none"; // ignore too late

  return phase;
}

function getDepartureDecision(nowMin, laterMin, waitMinutes = 15) {
  const saving = nowMin - laterMin;

  if (saving >= 3) {
    return {
      type: "wait",
      waitMinutes,
      nowMin,
      laterMin,
      saving,
      confidence: "high",
      message: `Wait ${waitMinutes} min → smoother trip and save ${saving} min`
    };
  }

  if (saving <= -3) {
    return {
      type: "leave_now",
      waitMinutes,
      nowMin,
      laterMin,
      saving: Math.abs(saving),
      confidence: "high",
      message: `Leave now → traffic likely gets heavier soon`
    };
  }

  return {
    type: "neutral",
    waitMinutes,
    nowMin,
    laterMin,
    saving,
    confidence: "low",
    message: "No strong timing advantage"
  };
}

function renderPredictiveDecision() {
  var box = document.getElementById("predict-tip");
  if (box) { box.style.display = "none"; box.innerHTML = ""; }

  var card = document.getElementById("predictive-card");

  var waitHint  = document.getElementById("dh-wait-hint");

  function _hideWaitHint() {
    if (waitHint) waitHint.style.display = "none";
  }
  function _showWaitHint(timesText, saveText) {
    if (!waitHint) return;
    if (waitTimes) waitTimes.textContent = timesText;
    if (waitSave)  waitSave.textContent  = saveText;
    waitHint.style.display = "block";
  }

  if (!_departureDecision || _departureDecision.type === "neutral") {

  var pcMain = document.getElementById("pc-main");

  var pcSave = document.getElementById("pc-save");

  if (_departureDecision.type === "wait" && _predictiveData) {

    var timesText = "Wait " + _predictiveData.waitMinutes + " min \u2192 " + _predictiveData.laterMin + " min";
    var saveText  = saving > 0 ? "Save " + saving + " min" : "";
    _showWaitHint(timesText, saveText);

    // update predictive-card (action buttons)
    card.style.display = "flex";

    if (titleEl) titleEl.textContent = "BETTER OPTION AHEAD";

    if (pcSave && saving > 0) pcSave.textContent = "Save " + saving + " min";
    else if (pcSave) pcSave.textContent = "";
    if (pcSub) {
      var subHtml = _departureDecision.message;
      subHtml += '<div class="pc-actions">';

      pcSub.innerHTML = subHtml;

    }
    if (pcSave) pcSave.textContent = "";
  }
}


function goNowDecision() {
  if (!_bestRoute) return;
  clearDelayedStartTimer();
  startDrive(_bestRoute.index);
}

function scheduleDelayedStart() {
  if (!_bestRoute || !_departureDecision || _departureDecision.type !== "wait") return;

  clearDelayedStartTimer();

  const waitMs = _departureDecision.waitMinutes * 60 * 1000;
  _delayedStartUntil = Date.now() + waitMs;

  updateDelayedStartStatus();

  _delayedStartTimer = setInterval(() => {
    const remainingMs = _delayedStartUntil - Date.now();

    if (remainingMs <= 0) {
      clearDelayedStartTimer();
      startDrive(_bestRoute.index);
      return;
    }

    updateDelayedStartStatus();
  }, 1000);
}

function updateDelayedStartStatus() {
  const el = document.getElementById("delayed-start-status");
  if (!el || !_delayedStartUntil) return;

  const remainingMs = Math.max(0, _delayedStartUntil - Date.now());
  const totalSec = Math.ceil(remainingMs / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;

  el.textContent = `Starting in ${min}:${String(sec).padStart(2, "0")}`;
}

function clearDelayedStartTimer() {
  if (_delayedStartTimer) {
    clearInterval(_delayedStartTimer);
    _delayedStartTimer = null;
  }
  _delayedStartUntil = null;
}

function runPredictiveCheck(origin, destination, nowBestMin) {
  _predictiveData = null;
  _departureDecision = null;

  if (!directionsService || !origin || !destination) return;

  const waitMinutes = 15;

  directionsService.route({
    origin,
    destination,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: false,
    drivingOptions: {
      departureTime: new Date(Date.now() + waitMinutes * 60 * 1000),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK" || !result.routes?.length) {
      renderPredictiveDecision();
      return;
    }

    const leg = result.routes[0].legs[0];
    const laterSec = (leg.duration_in_traffic || leg.duration).value;
    const laterMin = Math.round(laterSec / 60);

    _predictiveData = { laterMin, nowMin: nowBestMin, saving: nowBestMin - laterMin };
    _departureDecision = getDepartureDecision(nowBestMin, laterMin, waitMinutes);

    renderPredictiveDecision();
  });
}

function drawRoutes(result) {
  const alts = analyzedRoutes.filter(r => _bestRoute && r.index !== _bestRoute.index);
  const ordered = [...alts, ...(_bestRoute ? [_bestRoute] : [])];

  ordered.forEach(r => {
    const isBest = _bestRoute && r.index === _bestRoute.index;
    const renderer = new google.maps.DirectionsRenderer({
      map: map,
      directions: result,
      routeIndex: r.index,
      suppressMarkers: !isBest,
      preserveViewport: true,
      polylineOptions: {
        strokeColor: isBest ? "#22d3a0" : "#60a5fa",
        strokeOpacity: isBest ? 1 : 0.50,
        strokeWeight: isBest ? 6 : 4,
        zIndex: isBest ? 10 : 1
      }
    });
    renderers.push(renderer);
  });

  if (_bestRoute) map.fitBounds(_bestRoute.route.bounds);
}
