 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clear Road UAE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f5f5f0">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d6a4f;
      --green-light: #40916c;
      --green-bg: #d8f3dc;
      --yellow: #f59e0b;
      --yellow-bg: #fef3c7;
      --beige: #a8a29e;
      --beige-bg: #f5f5f0;
      --gray: #6b7280;
      --dark: #1f2937;
      --white: #ffffff;
      --border: #e5e5e5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: var(--beige-bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 80px;
    }

    /* ===== INPUT PANEL ===== */
    .input-panel {
      background: var(--white);
      margin: 16px;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .input-row:first-child {
      border-bottom: 1px solid var(--border);
    }

    .input-label {
      font-size: 14px;
      color: var(--gray);
      min-width: 40px;
    }

    .input-value {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      color: var(--dark);
      border: none;
      background: transparent;
      outline: none;
    }

    .input-value::placeholder {
      color: var(--gray);
      font-weight: 400;
    }

    .voice-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .voice-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .voice-btn.gps-loading { opacity: 0.5; pointer-events: none; }
    .predict-tip { font-size: 12px; color: #059669; background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 8px; padding: 6px 10px; margin: 8px 0 0; font-weight: 500; }

    /* ===== BEST ROUTE CARD ===== */
    .best-card {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      margin: 0 16px 12px;
      border-radius: 20px;
      padding: 20px;
      position: relative;
    }

    .best-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .best-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .best-badge svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .best-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .best-title .check {
      color: var(--green);
    }

    .best-metrics {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 8px;
    }

    .best-toll {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .best-toll.has-toll {
      color: #d97706;
      font-weight: 500;
    }

    .best-parking {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    /* ── Day 4.5: AI Decision UX ── */
    .decision-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .ai-confidence-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.4px; }
    .ai-confidence-badge .conf-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .confidence-high   { background: #d1fae5; color: #065f46; }
    .confidence-medium { background: #fef3c7; color: #92400e; }
    .confidence-low    { background: #f3f4f6; color: #6b7280; }
    .ai-hero-time { font-size: 52px; font-weight: 800; color: var(--dark); line-height: 1; margin-bottom: 4px; letter-spacing: -1px; }
    .ai-hero-time span { font-size: 22px; font-weight: 600; color: var(--gray); margin-left: 2px; }
    .ai-distance { font-size: 14px; color: var(--gray); margin-bottom: 14px; }
    .ai-why { font-size: 16px; color: #1f2937; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
    .ai-secondary { font-size: 13px; color: var(--gray); font-weight: 500; margin-bottom: 16px; }

    .start-btn {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .start-btn:hover {
      background: var(--green-light);
    }

    .why-link {
      text-align: center;
      font-size: 14px;
      color: var(--gray);
      cursor: pointer;
    }

    .why-link:hover {
      color: var(--dark);
    }

    /* ===== ALTERNATIVE CARDS ===== */
    .alt-card {
      margin: 0 16px 12px;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .alt-card:hover {
      transform: translateY(-2px);
    }

    .alt-card.faster_risky {
      background: var(--yellow-bg);
    }

    .alt-card.more_relaxed {
      background: #f5f5f0;
      border: 1px solid var(--border);
    }

    .alt-card.balanced, .alt-card.similar {
      background: #f8fafc;
      border: 1px solid var(--border);
    }

    .alt-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .alt-card.faster_risky .alt-icon {
      background: #fcd34d;
    }

    .alt-card.more_relaxed .alt-icon {
      background: #d6d3d1;
    }

    .alt-card.balanced .alt-icon,
    .alt-card.similar .alt-icon {
      background: #e2e8f0;
    }

    .alt-content {
      flex: 1;
    }

    .alt-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 2px;
    }

    .alt-subtitle {
      font-size: 14px;
      color: var(--gray);
    }

    .alt-toll {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .alt-toll.has-toll {
      color: #d97706;
    }

    .route-insight {
      font-size: 12px;
      color: #059669;
      font-weight: 500;
      margin-top: 2px;
    }

    .ai-insight {
      font-size: 12px;
      color: var(--green);
      font-weight: 500;
      margin-top: 4px;
      background: var(--green-bg);
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
    }

    .alt-arrow {
      color: var(--gray);
      font-size: 18px;
    }

    /* ===== QUICK ACCESS ===== */
    .quick-section {
      margin: 20px 16px 12px;
    }

    .quick-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .quick-list {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
    }

    .quick-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .quick-item:last-child {
      border-bottom: none;
    }

    .quick-item:hover {
      background: #fafafa;
    }

    .quick-icon {
      width: 40px;
      height: 40px;
      background: #f3f4f6;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray);
      font-size: 18px;
    }

    .quick-label {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      color: var(--dark);
    }

    .quick-arrow {
      color: #d1d5db;
      font-size: 18px;
    }

    .pref-bar{display:flex;gap:8px;margin:0 16px 12px}
    .pref-btn{flex:1;padding:8px 10px;font-size:13px;background:var(--white);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-family:inherit;color:var(--gray)}
    .pref-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
    .filter-bar{display:flex;gap:8px;margin:0 16px 12px}
    .filter-btn{flex:1;padding:6px 8px;font-size:12px;background:var(--white);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit;color:var(--gray)}
    .filter-btn.active{background:var(--yellow-bg);color:#92400e;border-color:var(--yellow)}

    /* ===== MAP PREVIEW ===== */
    .map-preview {
      margin: 0 16px;
      height: 180px;
      border-radius: 16px;
      overflow: hidden;
      background: #e5e5e5;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 0 20px;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 6px 16px;
    }

    .nav-item.active {
      color: var(--green);
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 500;
    }

    /* ===== ROUTE DETAILS MODAL ===== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .modal-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .modal-overlay.visible .modal-content {
      transform: translateY(0);
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: #d1d5db;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
    }

    .modal-role-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .modal-role-badge.recommended {
      background: var(--green);
      color: white;
    }

    .modal-role-badge.alternative {
      background: #e5e7eb;
      color: #374151;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .detail-item {
      background: #f9fafb;
      padding: 14px;
      border-radius: 12px;
    }

    .detail-label {
      font-size: 12px;
      color: var(--gray);
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--dark);
    }

    .detail-item.full-width {
      grid-column: 1 / -1;
    }

    .modal-why {
      background: #f0fdf4;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .modal-why-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 8px;
    }

    .modal-why-points {
      list-style: none;
    }

    .modal-why-points li {
      font-size: 14px;
      color: #166534;
      line-height: 1.5;
      padding-left: 20px;
      position: relative;
      margin-bottom: 6px;
    }

    .modal-why-points li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
    }

    .segment-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .segment-item {
      background: #f9fafb;
      padding: 14px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .segment-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .segment-icon.highway { background: #dbeafe; }
    .segment-icon.city { background: #fef3c7; }
    .segment-icon.traffic { background: #fee2e2; }
    .segment-icon.turns { background: #f3e8ff; }

    .segment-content {
      flex: 1;
    }

    .segment-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
    }

    .segment-details {
      font-size: 13px;
      color: var(--gray);
    }

    .comparison-note {
      background: #fef3c7;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      color: #92400e;
      margin-bottom: 16px;
    }

    .modal-cta {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-cta:hover {
      background: var(--green-light);
    }

    /* ===== DRIVE MODE ===== */
    .drive-mode {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0f172a;
      z-index: 2000;
      flex-direction: column;
    }

    .drive-mode.active {
      display: flex;
    }

    .drive-header {
      padding: 16px 20px;
      background: #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .drive-status {
      color: #94a3b8;
      font-size: 14px;
    }

    .drive-exit {
      padding: 10px 20px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .drive-map-container {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    #drive-map {
      width: 100%;
      height: 100%;
    }

    .drive-ahead {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      background: rgba(30, 41, 59, 0.95);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .drive-ahead-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .drive-ahead-icon.stable { background: #166534; }
    .drive-ahead-icon.warning { background: #f59e0b; }
    .drive-ahead-icon.alert { background: #ef4444; }

    .drive-ahead-text {
      flex: 1;
      color: white;
      font-size: 14px;
      font-weight: 500;
    }

    .drive-alert {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: rgba(30, 41, 59, 0.95);
      border-radius: 14px;
      padding: 16px;
      display: none;
    }

    .drive-alert.visible {
      display: block;
    }

    .drive-alert-message {
      color: white;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .drive-alert-actions {
      display: flex;
      gap: 10px;
    }

    .drive-alert-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .drive-alert-btn.primary {
      background: var(--green);
      color: white;
    }

    .drive-alert-btn.secondary {
      background: #475569;
      color: white;
    }

    .drive-panel {
      background: #1e293b;
      padding: 24px 20px;
      border-radius: 28px 28px 0 0;
    }

    .drive-eta {
      text-align: center;
      margin-bottom: 16px;
    }

    .drive-eta-time {
      font-size: 56px;
      font-weight: 700;
      color: white;
      line-height: 1;
    }

    .drive-eta-label {
      font-size: 14px;
      color: #64748b;
      margin-top: 4px;
    }

    .drive-info {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 16px 0;
      border-top: 1px solid #334155;
    }

    .drive-info-item {
      text-align: center;
    }

    .drive-info-value {
      font-size: 22px;
      font-weight: 600;
      color: white;
    }

    .drive-info-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    .drive-next {
      margin-top: 16px;
      padding: 18px;
      background: #334155;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .drive-next-icon {
      width: 52px;
      height: 52px;
      background: var(--green);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: white;
    }

    .drive-next-text {
      flex: 1;
    }

    .drive-next-instruction {
      color: white;
      font-size: 17px;
      font-weight: 600;
    }

    .drive-next-distance {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 4px;
    }

    .hidden {
      display: none !important;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--gray);
      font-size: 15px;
    }

    .error {
      margin: 16px;
      padding: 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 12px;
      color: #b91c1c;
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- INPUT PANEL -->
<div class="input-panel">
  <div class="input-row">
    <span class="input-label">From:</span>
    <input type="text" class="input-value" id="start" placeholder="Current location" value="Dubai Marina">
    <button class="voice-btn" id="gps-btn" onclick="requestGPS()" title="Use my location">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </button>
  </div>
  <div class="input-row">
    <span class="input-label">To:</span>
    <input type="text" class="input-value" id="end" placeholder="Where to?" value="Dubai International Airport">
  </div>
</div>

<!-- PREFERENCE BAR (minimal) -->
<div class="pref-bar" id="pref-bar">
  <button type="button" class="pref-btn" data-pref="balanced" onclick="setUserPreference('balanced')">Balanced</button>
  <button type="button" class="pref-btn" data-pref="fastest"  onclick="setUserPreference('fastest')">Fastest</button>
  <button type="button" class="pref-btn" data-pref="no_tolls" onclick="setUserPreference('no_tolls')">No tolls</button>
</div>
<div class="filter-bar" id="filter-bar">
  <button type="button" class="filter-btn" data-filter="avoid_highways" onclick="toggleFilter('avoid_highways')">🛣 Avoid highways</button>
  <button type="button" class="filter-btn" data-filter="fewer_turns"    onclick="toggleFilter('fewer_turns')">↩ Fewer turns</button>
</div>

<!-- RESULTS CONTAINER -->
<div id="results"></div>

<!-- QUICK ACCESS -->
<div class="quick-section" id="quick-access">
  <div class="quick-title">Quick Access</div>
  <div class="quick-list">
    <div class="quick-item" onclick="setDestination('Home')" ondblclick="updateSavedPlace('Home')">
      <div class="quick-icon">&#127968;</div>

<script>
// ============================================================
//  GLOBAL STATE
// ============================================================
let map;
let driveMap;
let directionsService;
let renderers = [];
let analyzedRoutes = [];
let selectedRoute = null;
let currentDirectionsResult = null;
let driveRenderer = null;
let driveInterval = null;
let currentStepIndex = 0;
let betterRouteIndex = null;

let _bestRoute = null;
let _fastestRoute = null;
let _parkingType = "unknown";
let _predictiveData = null;  // Day 6.5: {laterMin, nowMin, saving}

// ТЗ5: Parking detection (does NOT affect route selection)
function detectParkingType(destination) {
  const text = (destination || "").toLowerCase();
  if (
    text.includes("mall") ||
    text.includes("airport") ||
    text.includes("harbour") ||
    text.includes("parkonic") ||
    text.includes("beach") ||
    text.includes("marina")
  ) {
    return "salik_parking";
  }
  return "separate_payment";
}

function getParkingInsight() {
  if (_parkingType === "salik_parking") {
    return "Parking via Salik may be available";
  }
  return "";
}

// ============================================================
//  HELPERS
// ============================================================

function stripHtml(text) {
  return (text || "").replace(/<[^>]*>/g, " ").trim();
}

function normalizeRoadText(step, route) {
  const summary = (route.summary || "");
  const html = stripHtml(step.html_instructions || "");
  return `${summary} ${html}`.toUpperCase();
}

function stepLooksLikeHighway(step, route) {
  const text = normalizeRoadText(step, route);
  return (
    /\bE11\b/.test(text) ||
    /\bE311\b/.test(text) ||
    /\bE611\b/.test(text) ||
    text.includes("SHEIKH") ||
    text.includes("HIGHWAY") ||
    text.includes("EXPRESSWAY")
  );
}

function getTrafficLevel(base, traffic) {
  if (!traffic || !base || traffic <= base) return "low";
  const ratio = (traffic - base) / base;
  if (ratio <= 0.05) return "low";
  if (ratio <= 0.15) return "medium";
  return "high";
}

function trafficRank(level) {
  if (level === "low") return 1;
  if (level === "medium") return 2;
  return 3;
}

function getTrafficText(traffic) {
  if (traffic === "low") return "stable";
  if (traffic === "medium") return "moderate";
  return "heavy";
}

function toTitleCaseLabel(value) {
  if (!value) return "";
  return value.charAt(0).toUpperCase() + value.slice(1);
}

function getStabilityLabel(stabilityScore) {
  if (stabilityScore >= 70) return "Very stable";
  if (stabilityScore >= 50) return "Stable";
  if (stabilityScore >= 30) return "Moderate";
  return "Unpredictable";
}

function isMeaningfulManeuver(step, route) {
  if (!step) return false;
  const html = stripHtml(step.html_instructions || "").toLowerCase();
  const maneuver = (step.maneuver || "").toLowerCase();
  const strong = ["turn-left", "turn-right", "uturn-left", "uturn-right", "roundabout"];
  if (strong.some(m => maneuver.includes(m))) return true;
  if (html.includes("exit")) return true;
  if (html.includes("continue") || html.includes("keep") || html.includes("slight")) return false;
  return false;
}

function countComplexity(leg, route) {
  return leg.steps.filter(s => isMeaningfulManeuver(s, route)).length;
}

function calculateHighwayShare(leg, route) {
  const total = leg.distance?.value || 0;
  if (!total) return 0;
  let hwDistance = 0;
  leg.steps.forEach(step => {
    if (stepLooksLikeHighway(step, route)) {
      hwDistance += step.distance?.value || 0;
    }
  });
  return hwDistance / total;
}

function getDisplayMinutes(route) {
  return Math.round(route.time / 60);
}

function getDisplayDiff(routeA, routeB) {
  return getDisplayMinutes(routeA) - getDisplayMinutes(routeB);
}

function getRouteSummaryName(route) {
  const summary = route.route.summary || "";
  if (summary.includes("E311")) return "E311";
  if (summary.includes("E11")) return "E11";
  if (summary.includes("E611")) return "E611";
  if (summary.includes("Sheikh Zayed")) return "Sheikh Zayed Rd";
  return summary.split("/")[0].trim() || `Route ${route.displayIndex}`;
}

// ============================================================
//  ROUTE METRICS
// ============================================================

function calculateRouteMetrics(route, leg, rawRoute) {
  const baseTime = leg.duration.value;
  const time = leg.duration_in_traffic?.value || baseTime;
  const distance = leg.distance.value;
  const delaySeconds = Math.max(0, time - baseTime);
  const delayMinutes = Math.round(delaySeconds / 60);
  const complexity = countComplexity(leg, rawRoute);
  const highwayShare = calculateHighwayShare(leg, rawRoute);
  const traffic = getTrafficLevel(baseTime, time);

  // ТЗ3 ЭТАП 1: Salik toll data
  const tollCount = Math.floor(highwayShare * 3); // rough estimate based on highway usage
  const tollCost = tollCount * 4; // 4 AED per Salik gate
  const hasToll = tollCost > 0;

  return {
    time,
    baseTime,
    distance,
    delaySeconds,
    delayMinutes,
    complexity,
    highwayShare,
    traffic,
    highway: highwayShare >= 0.35,
    tollCount,
    tollCost,
    hasToll
  };
}

function calculateRouteScore(r, allRoutes) {
  const fastest = allRoutes.length ? Math.min(...allRoutes.map(x => x.time)) : r.time;
  const timeScore = (r.time - fastest) / 60;
  const trafficPenalty = r.traffic === "high" ? 15 : r.traffic === "medium" ? 5 : 0;
  const complexityPenalty = r.complexity * 0.75;
  const highwayBonus = r.highwayShare * -3;
  const delayPenalty = r.delayMinutes * 1.5;
  const stabilityScore = Math.max(0, 100 - trafficPenalty * 3 - r.complexity * 2 - r.delayMinutes * 4);
  const score = timeScore + trafficPenalty + complexityPenalty + highwayBonus + delayPenalty;

  return {
    score,
    timeScore,
    trafficPenalty,
    complexityPenalty,
    highwayBonus,
    delayPenalty,
    stabilityScore
  };
}

// ============================================================
// ============================================================
//  ROUTE ROLE CLASSIFICATION
// ============================================================

function getRouteRole(r, bestRoute, fastestRoute, allRoutes) {
  if (r.index === bestRoute.index) return "recommended";

  const diffFromBest = getDisplayDiff(r, bestRoute);
  const isFaster = diffFromBest < 0;
  const isSlower = diffFromBest > 0;

  const hasMoreTraffic = trafficRank(r.traffic) > trafficRank(bestRoute.traffic);
  const hasMoreDelay = r.delayMinutes > bestRoute.delayMinutes + 2;
  const isRiskier = hasMoreTraffic || hasMoreDelay;

  const fewerTurns = r.complexity < bestRoute.complexity - 1;
  const lighterTraffic = trafficRank(r.traffic) < trafficRank(bestRoute.traffic);
  const isMoreRelaxed = fewerTurns || lighterTraffic;

  const timeSimilar = Math.abs(diffFromBest) <= 1;
  const complexitySimilar = Math.abs(r.complexity - bestRoute.complexity) <= 2;
  const trafficSimilar = trafficRank(r.traffic) === trafficRank(bestRoute.traffic);
  const isSimilar = timeSimilar && complexitySimilar && trafficSimilar;

  if (isFaster && isRiskier) return "faster_risky";
  if (isSlower && isMoreRelaxed) return "more_relaxed";
  if (isSimilar) return "similar";
  return "balanced";
}

// ============================================================
//  DECISION LOGIC — SELECT RECOMMENDED ROUTE
// ============================================================

function selectBestRoute(routes) {
  if (!routes?.length) return null;
  if (routes.length === 1) return routes[0];

  const fastest = [...routes].sort((a, b) => a.time - b.time)[0];

  // ── User preference override (minimal injection) ──
  const pref = getUserPreference();

  if (pref === "fastest") {
    // avoid_highways modifier: if fastest is highway, accept a non-highway route within 3 min
    if (userFilters.avoid_highways && fastest.highway) {
      const closeNoHwy = routes.filter(r => !r.highway && (r.time - fastest.time) / 60 <= 3);
      if (closeNoHwy.length > 0)
        return closeNoHwy.sort((a, b) => a.time - b.time || a.complexity - b.complexity)[0];
    }
    // Always prefer shortest time; only switch if a peer is essentially the same time
    // AND has cheaper toll cost (very small difference).
    const peers = routes.filter(r =>
      Math.abs(r.time - fastest.time) / 60 <= 1 && r.tollCost < fastest.tollCost
    );
    if (peers.length === 0) return fastest;
    return peers.sort((a, b) => a.tollCost - b.tollCost || a.time - b.time)[0];
  }

  if (pref === "no_tolls") {
    // Strongly prefer toll-free, even if up to ~5 min slower than fastest
    const free = routes.filter(r =>
      r.tollCost === 0 && (r.time - fastest.time) / 60 <= 5
    );
    if (free.length > 0) {
      // fewer_turns modifier: elevate complexity in sort among toll-free candidates
      return free.sort((a, b) =>
        trafficRank(a.traffic) - trafficRank(b.traffic) ||
        a.delayMinutes - b.delayMinutes ||
        (userFilters.fewer_turns ? a.complexity - b.complexity : 0) ||
        a.tollCost - b.tollCost ||
        a.complexity - b.complexity ||
        a.time - b.time
      )[0];
    }
    // Otherwise fall through to balanced logic below
  }

  // ── Step 1: Build "competitive pool" — routes within 5 min of fastest ──
  // Anything further is too slow to be considered, regardless of other merits.
  let pool = routes.filter(r => (r.time - fastest.time) / 60 <= 5);
  if (pool.length === 0) pool = [fastest];

  // ── Step 2: Strong free-route preference ──
  // If fastest is paid AND there's a free route within 4 min → prefer free.
  if (fastest.tollCost > 0) {
    const competitiveFree = pool.filter(r =>
      r.tollCost === 0 && (r.time - fastest.time) / 60 <= 4
    );
    if (competitiveFree.length > 0) {
      return competitiveFree.sort((a, b) =>
        trafficRank(a.traffic) - trafficRank(b.traffic) ||
        a.delayMinutes - b.delayMinutes ||
        a.complexity - b.complexity ||
        a.time - b.time
      )[0];
    }
  }

  // ── Step 3: Drop high-traffic routes if any non-high alternative exists ──
  // Fastest with unstable traffic should NOT auto-win.
  const nonHigh = pool.filter(r => r.traffic !== "high");
  if (nonHigh.length > 0) pool = nonHigh;

  // ── Step 4: Final ranking — filters act as sort modifiers, not overrides ──
  // avoid_highways: highway routes sorted last (penalty as first comparator)
  // fewer_turns:    complexity elevated before toll cost
  return pool.sort((a, b) =>
    (userFilters.avoid_highways ? (a.highway ? 1 : 0) - (b.highway ? 1 : 0) : 0) ||
    trafficRank(a.traffic) - trafficRank(b.traffic) ||
    a.delayMinutes - b.delayMinutes ||
    (userFilters.fewer_turns ? a.complexity - b.complexity : 0) ||
    a.tollCost - b.tollCost ||
    a.complexity - b.complexity ||
    a.time - b.time
  )[0];
}

// ── Confidence helper: practical, decision-aligned (matches selectBestRoute logic) ──
// HIGH   = obvious human choice (free vs slightly faster paid, lower traffic, lower delay, or dominant)
// MEDIUM = real trade-off (faster alt exists but worse on cost/stability)
// LOW    = routes are genuinely interchangeable on all dimensions
function calculateConfidence(best, allRoutes) {
  if (!allRoutes || allRoutes.length < 2) return "High";
  const others = allRoutes.filter(r => r.index !== best.index);
  if (others.length === 0) return "High";

  const bestMin = getDisplayMinutes(best);
  const fasterAlts = others.filter(r => getDisplayMinutes(r) < bestMin);
  const fastestAlt = fasterAlts.length
    ? fasterAlts.reduce((a, b) => getDisplayMinutes(a) < getDisplayMinutes(b) ? a : b)
    : null;

  // Case A: nothing is faster — best is dominant on time
  if (!fastestAlt) return "High";

  const timeGap = bestMin - getDisplayMinutes(fastestAlt); // min that alt saves

  // Case B: best is free, faster alt is paid, small gap → clear human win
  if (best.tollCost === 0 && fastestAlt.tollCost > 0 && timeGap <= 3) {
    return "High";
  }
  // Case C: best clearly avoids worse traffic of the faster alt
  if (trafficRank(best.traffic) < trafficRank(fastestAlt.traffic) && timeGap <= 5) {
    return "High";
  }
  // Case D: best clearly avoids higher delay of the faster alt
  if ((fastestAlt.delayMinutes || 0) - (best.delayMinutes || 0) >= 3 && timeGap <= 5) {
    return "High";
  }

  // Truly similar across the board → LOW (rare)
  const trulySimilar = others.every(r => {
    const dt = Math.abs(getDisplayMinutes(r) - bestMin);
    return dt <= 2
      && r.tollCost === best.tollCost
      && trafficRank(r.traffic) === trafficRank(best.traffic)
      && Math.abs((r.complexity || 0) - (best.complexity || 0)) <= 2;
  });
  if (trulySimilar) return "Low";

  // Otherwise: meaningful trade-off
  return "Medium";
}

// ============================================================
//  ROUTE SEGMENTS (for Route Details modal)
// ============================================================

function buildRouteSegments(r) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const segments = [];

  let currentSegment = null;
  let segmentSteps = [];

  steps.forEach((step, i) => {
    const isHw = stepLooksLikeHighway(step, r.route);
    const isMeaningful = isMeaningfulManeuver(step, r.route);

    let type = isHw ? "highway" : "city";

    if (!isHw && isMeaningful) {
      const nearbyManeuvers = steps.slice(Math.max(0, i - 2), i + 3)
        .filter(s => isMeaningfulManeuver(s, r.route)).length;
      if (nearbyManeuvers >= 3) type = "turns";
    }

    if (!currentSegment || currentSegment.type !== type) {
      if (currentSegment && segmentSteps.length > 0) {
        currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
        currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
        segments.push(currentSegment);
      }
      currentSegment = { type, steps: [] };
      segmentSteps = [];
    }

    segmentSteps.push(step);
    currentSegment.steps = segmentSteps;
  });

  if (currentSegment && segmentSteps.length > 0) {
    currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
    currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
    segments.push(currentSegment);
  }

  const mergedSegments = [];
  segments.forEach(seg => {
    if (seg.distance < 500 && mergedSegments.length > 0) {
      const prev = mergedSegments[mergedSegments.length - 1];
      prev.distance += seg.distance;
      prev.duration += seg.duration;
    } else {
      mergedSegments.push(seg);
    }
  });

  if (r.delayMinutes > 3 && mergedSegments.length > 0) {
    const citySegment = mergedSegments.find(s => s.type === "city");
    if (citySegment) citySegment.type = "traffic";
  }

  return mergedSegments.map(seg => {
    const km = (seg.distance / 1000).toFixed(1);
    const mins = Math.round(seg.duration / 60);
    const labels = {
      highway: { icon: "&#128739;", title: "Highway section", note: "stable flow" },
      city: { icon: "&#127961;", title: "City driving", note: "urban roads" },
      traffic: { icon: "&#128679;", title: "Congested area", note: "expect delays" },
      turns: { icon: "&#128260;", title: "Complex section", note: "multiple turns" }
    };
    const label = labels[seg.type] || labels.city;
    return {
      type: seg.type,
      icon: label.icon,
      title: label.title,
      details: `${km} km · ~${mins} min · ${label.note}`,
      distance: seg.distance,
      duration: seg.duration
    };
  });
}

// ============================================================
//  DRIVE MODE
// ============================================================

function buildDriveViewModel(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  let remainingDistance = 0;
  let remainingTime = 0;

  for (let i = stepIndex; i < steps.length; i++) {
    remainingDistance += steps[i].distance?.value || 0;
    remainingTime += steps[i].duration?.value || 0;
  }

  const currentStep = steps[stepIndex] || steps[0];

  return {
    eta: Math.round(remainingTime / 60),
    distance: (remainingDistance / 1000).toFixed(1),
    traffic: r.traffic,
    trafficText: getTrafficText(r.traffic),
    instruction: stripHtml(currentStep?.html_instructions || "Follow the route"),
    instructionDistance: currentStep?.distance?.text || "",
    maneuver: currentStep?.maneuver || "",
    stepIndex,
    totalSteps: steps.length
  };
}

function getUpcomingCondition(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const upcoming = steps.slice(stepIndex, stepIndex + 5);

  const hasHighway = upcoming.some(s => stepLooksLikeHighway(s, r.route));
  const hasManyTurns = upcoming.filter(s => isMeaningfulManeuver(s, r.route)).length >= 3;
  const isNearEnd = stepIndex >= steps.length - 3;

  if (r.traffic === "high") {
    return { type: "warning", icon: "&#9888;", text: "Heavier traffic ahead" };
  }
  if (hasManyTurns) {
    return { type: "warning", icon: "&#128260;", text: "Multiple turns ahead" };
  }
  if (isNearEnd) {
    return { type: "stable", icon: "&#127937;", text: "Approaching destination" };
  }
  if (hasHighway) {
    return { type: "stable", icon: "&#128739;", text: "Highway section ahead — smooth driving" };
  }
  if (r.traffic === "low") {
    return { type: "stable", icon: "&#9728;", text: "Stable traffic ahead" };
  }
  return { type: "stable", icon: "&#9728;", text: "Moderate conditions ahead" };
}

function evaluateReroute(currentRoute, allRoutes) {
  if (allRoutes.length <= 1) return null;

  const alternatives = allRoutes.filter(r => r.index !== currentRoute.index);

  for (const alt of alternatives) {
    const scoreDiff = currentRoute.score - alt.score;
    const timeDiff = getDisplayDiff(currentRoute, alt);

    if (scoreDiff > 5 || (timeDiff > 2 && trafficRank(alt.traffic) < trafficRank(currentRoute.traffic))) {
      const benefit = timeDiff > 0
        ? `${timeDiff} min faster, calmer traffic`
        : `Calmer traffic, similar time`;

      return {
        index: alt.index,
        benefit,
        name: getRouteSummaryName(alt)
      };
    }
  }
  return null;
}

function startDriveMode(index) {
  const r = analyzedRoutes.find(x => x.index === index);
  if (!r || !currentDirectionsResult) return;

  selectedRoute = r;
  currentStepIndex = 0;
  betterRouteIndex = null;

  document.getElementById("drive-mode").classList.add("active");

  if (!driveMap) {
    driveMap = new google.maps.Map(document.getElementById("drive-map"), {
      center: { lat: 25.2048, lng: 55.2708 },
      zoom: 14,
      disableDefaultUI: true,
      styles: [
        { elementType: "geometry", stylers: [{ color: "#1d2c4d" }] },
        { elementType: "labels.text.fill", stylers: [{ color: "#8ec3b9" }] },
        { elementType: "labels.text.stroke", stylers: [{ color: "#1a3646" }] },
        { featureType: "road", elementType: "geometry", stylers: [{ color: "#304a7d" }] },
        { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#255763" }] }
      ]
    });
  }

  if (driveRenderer) driveRenderer.setMap(null);

  driveRenderer = new google.maps.DirectionsRenderer({
    map: driveMap,
    directions: currentDirectionsResult,
    routeIndex: r.index,
    polylineOptions: {
      strokeColor: "#2d6a4f",
      strokeWeight: 6
    }
  });

  updateDriveUI();
  driveMap.fitBounds(r.route.bounds);

  if (driveInterval) clearInterval(driveInterval);
  driveInterval = setInterval(simulateDriveProgress, 5000);
}

function updateDriveUI() {
  const r = selectedRoute;
  if (!r) return;

  const vm = buildDriveViewModel(r, currentStepIndex);
  const condition = getUpcomingCondition(r, currentStepIndex);

  document.getElementById("drive-eta-time").textContent = vm.eta;
  document.getElementById("drive-distance").textContent = vm.distance;
  document.getElementById("drive-traffic").textContent = vm.trafficText;
  document.getElementById("drive-next-instruction").textContent = vm.instruction;
  document.getElementById("drive-next-distance").textContent = vm.instructionDistance;

  let icon = "&#8593;";
  if (vm.maneuver.includes("left")) icon = "&#8592;";
  else if (vm.maneuver.includes("right")) icon = "&#8594;";
  else if (vm.maneuver.includes("uturn")) icon = "&#8634;";
  document.getElementById("drive-next-icon").innerHTML = icon;

  const aheadIcon = document.getElementById("drive-ahead-icon");
  aheadIcon.innerHTML = condition.icon;
  aheadIcon.className = `drive-ahead-icon ${condition.type}`;
  document.getElementById("drive-ahead-text").textContent = condition.text;

  document.getElementById("drive-status").textContent = `Step ${currentStepIndex + 1}/${vm.totalSteps}`;
}

function simulateDriveProgress() {
  if (!selectedRoute) return;

  const leg = selectedRoute.route.legs[0];
  const totalSteps = leg.steps.length;

  if (currentStepIndex < totalSteps - 1) {
    currentStepIndex++;
    updateDriveUI();
  }

  const reroute = evaluateReroute(selectedRoute, analyzedRoutes);
  if (reroute && reroute.index !== betterRouteIndex) {
    betterRouteIndex = reroute.index;
    showDriveAlert(`Better route available: ${reroute.name}`, reroute.benefit);
  }
}

function showDriveAlert(message, benefit) {
  const alert = document.getElementById("drive-alert");
  document.getElementById("drive-alert-message").textContent = `${message} — ${benefit}`;
  alert.classList.add("visible");
}

function dismissAlert() {
  document.getElementById("drive-alert").classList.remove("visible");
  betterRouteIndex = null;
}

function switchToAlternative() {
  if (betterRouteIndex !== null) {
    dismissAlert();
    startDriveMode(betterRouteIndex);
  }
}

function exitDriveMode() {
  document.getElementById("drive-mode").classList.remove("active");
  if (driveInterval) {
    clearInterval(driveInterval);
    driveInterval = null;
  }
  currentStepIndex = 0;
  betterRouteIndex = null;
}

function startDrive(index) {
  startDriveMode(index);
}

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 25.2048, lng: 55.2708 },

    disableDefaultUI: true,

    ]
  });

  setTimeout(calculateRoutes, 500);

  document.getElementById("start").addEventListener("change", calculateRoutes);
  document.getElementById("end").addEventListener("change", calculateRoutes);

function clearRoutes() {
  renderers.forEach(r => r.setMap(null));
  renderers = [];
  analyzedRoutes = [];
  selectedRoute = null;
  _bestRoute = null;
  _fastestRoute = null;
}

// ============================================================
//  ROUTE ANALYSIS + RENDERING
// ============================================================

function calculateRoutes() {
  clearRoutes();

  const start = document.getElementById("start").value.trim();
  const end = document.getElementById("end").value.trim();

  // ТЗ5: detect parking type (does NOT affect route selection)
  _parkingType = detectParkingType(end);

  if (!start || !end) {
    document.getElementById("results").innerHTML = "";
    return;
  }

  document.getElementById("results").innerHTML = '<div class="loading">Finding best routes...</div>';

  directionsService.route({
    origin: start,
    destination: end,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK") {
      document.getElementById("results").innerHTML = `<div class="error">Could not find route: ${status}</div>`;
      return;
    }

    const routes = result.routes;
    if (!routes?.length) {
      document.getElementById("results").innerHTML = '<div class="error">No routes found.</div>';
      return;
    }

    currentDirectionsResult = result;

    analyzedRoutes = routes.map((route, i) => {
      const leg = route.legs[0];
      const metrics = calculateRouteMetrics(route, leg, route);
      return { route, index: i, displayIndex: i + 1, ...metrics };
    });

    analyzedRoutes = analyzedRoutes.map(r => {
      const scoreData = calculateRouteScore(r, analyzedRoutes);
      return { ...r, ...scoreData };
    });

    _bestRoute = selectBestRoute(analyzedRoutes);
    _fastestRoute = [...analyzedRoutes].sort((a, b) => a.time - b.time)[0];

    analyzedRoutes.forEach(r => {
      r.role = getRouteRole(r, _bestRoute, _fastestRoute, analyzedRoutes);
    });

    renderResults();
    drawRoutes(result);

    // Day 6.5: fire predictive check asynchronously — doesn't block current render
    runPredictiveCheck(start, end, getDisplayMinutes(_bestRoute));
  });
}

// ============================================================
//  DAY 6 — GPS / Current Position
// ============================================================

function requestGPS() {
  if (!navigator.geolocation) return;
  const btn = document.getElementById("gps-btn");
  if (btn) btn.classList.add("gps-loading");

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude: lat, longitude: lng } = pos.coords;
      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({ location: { lat, lng } }, (results, status) => {
        if (btn) btn.classList.remove("gps-loading");
        if (status === "OK" && results[0]) {
          document.getElementById("start").value = results[0].formatted_address;
          calculateRoutes();
        }
      });
    },
    () => {
      if (btn) btn.classList.remove("gps-loading");
    },
    { timeout: 8000, maximumAge: 60000 }
  );
}

// ============================================================
//  DAY 6.5 — Predictive Engine (+15 min departure)
// ============================================================

function runPredictiveCheck(origin, destination, nowBestMin) {
  _predictiveData = null;
  if (!directionsService || !origin || !destination) return;

  directionsService.route({
    origin,
    destination,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: false,
    drivingOptions: {
      departureTime: new Date(Date.now() + 15 * 60 * 1000),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK" || !result.routes?.length) return;
    const leg = result.routes[0].legs[0];
    const laterSec = (leg.duration_in_traffic || leg.duration).value;
    const laterMin = Math.round(laterSec / 60);
    const saving = nowBestMin - laterMin;
    if (saving >= 2) {
      _predictiveData = { laterMin, nowMin: nowBestMin, saving };
      // Update predict tip in DOM if results are still showing
      const tip = document.getElementById("predict-tip");
      if (tip) {
        tip.textContent = `⏱ Leave in 15 min → ${laterMin} min (save ${saving} min)`;
        tip.style.display = "block";
      }
    }
  });
}

function drawRoutes(result) {
  const alts = analyzedRoutes.filter(r => _bestRoute && r.index !== _bestRoute.index);
  const ordered = [...alts, ...(_bestRoute ? [_bestRoute] : [])];

  ordered.forEach(r => {
    const isBest = _bestRoute && r.index === _bestRoute.index;
    const renderer = new google.maps.DirectionsRenderer({
      map: map,
      directions: result,
      routeIndex: r.index,
      suppressMarkers: !isBest,
      preserveViewport: true,
      polylineOptions: {
        strokeColor: isBest ? "#2d6a4f" : "#e07a28",
        strokeOpacity: isBest ? 1 : 0.55,
        strokeWeight: isBest ? 7 : 4,
        zIndex: isBest ? 10 : 1
      }
    });
    renderers.push(renderer);
  });

  if (_bestRoute) map.fitBounds(_bestRoute.route.bounds);
}

function renderResults() {
  const container = document.getElementById("results");
  const quickAccess = document.getElementById("quick-access");

  if (!analyzedRoutes.length) {
    container.innerHTML = "";
    quickAccess.classList.remove("hidden");
    return;
  }

  quickAccess.classList.add("hidden");

  const best = _bestRoute;
  const fastest = _fastestRoute;
  selectedRoute = best;

  // --- Best card (ТЗ2: clean UI, no comparative text) ---
  // Day 4.5: AI Decision UX — confidence badge + hero time + one why-line
  const conf = calculateConfidence(best, analyzedRoutes);
  const whyText = generateAIDecision(best, analyzedRoutes);
  const distKm = (best.distance / 1000).toFixed(1);
  const tollTag = best.tollCost > 0 ? `+${best.tollCost} AED Salik` : "No tolls";
  const trafficLabel = best.traffic === "low" ? "Low delay" : best.traffic === "high" ? "High traffic" : "Moderate traffic";
  const secondaryText = `${trafficLabel} · ${best.complexity} turns`;

  let html = `
    <div class="best-card">
      <div class="decision-header">
        <span class="best-label">Best route right now</span>
        <span class="ai-confidence-badge confidence-${conf.toLowerCase()}">
          <span class="conf-dot"></span>${conf}
        </span>
      </div>
      <div class="ai-hero-time">${getDisplayMinutes(best)}<span>min</span></div>
      <div class="ai-distance">${distKm} km · ${tollTag}</div>
      <div class="ai-why">${whyText}</div>
      <div class="ai-secondary">${secondaryText}</div>
      <div class="predict-tip" id="predict-tip" style="display:none"></div>
      ${getParkingInsight() ? `<div class="best-parking">${getParkingInsight()}</div>` : ""}
      <button class="start-btn" onclick="startDrive(${best.index})">Go via ${getRouteSummaryName(best)}</button>
      <div class="why-link" onclick="openRouteDetails(${best.index})">Route details &rsaquo;</div>
    </div>
  `;

  // --- Alternative cards ---
  const alternatives = analyzedRoutes
    .filter(r => r.index !== best.index)
    .sort((a, b) => {
      const timeDiff = Math.abs(getDisplayMinutes(a) - getDisplayMinutes(best))
                     - Math.abs(getDisplayMinutes(b) - getDisplayMinutes(best));
      return (
        timeDiff ||
        trafficRank(a.traffic) - trafficRank(b.traffic) ||
        a.complexity - b.complexity ||
        a.tollCost - b.tollCost ||
        a.time - b.time
      );
    });

  // Soft dedupe: drop only truly identical routes (time ±1 min, same toll, traffic, complexity)
  const dedupedAlternatives = [];
  for (const cand of alternatives) {
    const dupIdx = dedupedAlternatives.findIndex(existing => {
      const sameTime = Math.abs(getDisplayMinutes(existing) - getDisplayMinutes(cand)) <= 1;
      const sameToll = existing.tollCost === cand.tollCost;
      const sameTraffic = existing.traffic === cand.traffic;
      const sameComplexity = Math.abs(existing.complexity - cand.complexity) <= 1;
      return sameTime && sameToll && sameTraffic && sameComplexity;
    });
    if (dupIdx === -1) {
      dedupedAlternatives.push(cand);
      continue;
    }
    const existing = dedupedAlternatives[dupIdx];
    const candBetter =
      trafficRank(cand.traffic) < trafficRank(existing.traffic) ||
      (trafficRank(cand.traffic) === trafficRank(existing.traffic) && cand.complexity < existing.complexity) ||
      (trafficRank(cand.traffic) === trafficRank(existing.traffic) &&
       cand.complexity === existing.complexity && cand.time < existing.time);
    if (candBetter) dedupedAlternatives[dupIdx] = cand;
  }

  // Show up to 2 real alternatives
  dedupedAlternatives.slice(0, 2).forEach(r => {
    const insight = getRouteInsight(r, best, fastest) || getFallbackAlternativeInsight(r, best);
    const insightHasMoney = insight && (insight.includes("AED") || insight.includes("Save"));
    const insightHtml = `<div class="route-insight">${insight}</div>`;
    const tollLine = insightHasMoney ? "" : (r.tollCost > 0 ? `+${r.tollCost} AED` : "No tolls");
    const tollHtml = tollLine ? `<div class="alt-toll">${tollLine}</div>` : "";

    html += `
      <div class="alt-card ${r.role || "balanced"}" onclick="openRouteDetails(${r.index})">
        <div class="alt-icon">&#128736;</div>
        <div class="alt-content">
          <div class="alt-title">${getAlternativeTitle(r, best, fastest)}</div>
          <div class="alt-subtitle">${getDisplayMinutes(r)} min</div>
          ${insightHtml}
          ${tollHtml}
        </div>
        <div class="alt-arrow">&#8250;</div>
      </div>
    `;
  });

  container.innerHTML = html;
}

// ТЗ7: One-line route "personality" — how the drive will feel
function generateRoutePersonality(best) {
  const hwy = best.highwayShare || 0;
  const turns = best.complexity || 0;
  const traffic = best.traffic;

  // Scenario 4 (priority): busy / complex → stressful drive
  if (turns >= 12 || traffic === "high") {
    return "Busy route — expect frequent actions";
  }
  // Scenario 1: smooth highway
  if (hwy >= 0.7 && turns <= 8) {
    return "Smooth highway drive";
  }
  // Scenario 3: city driving
  if (hwy < 0.3) {
    return "City driving with turns";
  }
  // Scenario 2: mixed (0.3 ≤ hwy < 0.7)
  if (hwy >= 0.3 && hwy < 0.7) {
    return "Mixed city and highway";
  }
  // Fallback
  return "Standard route";
}

// ТЗ6: One-line "when to go" timing insight for best route
function generateTimeInsight(best) {
  const delay = best.delayMinutes || 0;
  const traffic = best.traffic;

  // Scenario 3: bad — wait
  if (delay > 5 || traffic === "high") {
    return "Consider waiting — traffic building up";
  }
  // Scenario 1: ideal — go now
  if (delay <= 2 && traffic === "low") {
    return "Best time to go now";
  }
  // Scenario 2: ok — light delays
  if (delay <= 5 && traffic === "medium") {
    return "Good time — light delays";
  }
  // Fallback
  return "Conditions are stable";
}

// One-line AI decision: [FACT] + [REASON] + [SPECIFICS] — no marketing language
function generateAIDecision(best, allRoutes) {
  const others = (allRoutes || []).filter(r => r.index !== best.index);
  const bestMin = getDisplayMinutes(best);
  const road = getRouteSummaryName(best);
  const via = (road && !road.startsWith("Route ")) ? ` via ${road}` : "";
  const delay = best.delayMinutes || 0;

  // Gap to nearest alternative
  const nextFastest = others.length
    ? others.reduce((a, b) => getDisplayMinutes(a) < getDisplayMinutes(b) ? a : b)
    : null;
  const gapToNext = nextFastest ? Math.round(getDisplayMinutes(nextFastest) - bestMin) : 0;

  // ── Filter-aware phrases ──
  if (userFilters.avoid_highways && !best.highway) {
    const fasterHwy = others.find(r => r.highway && getDisplayMinutes(r) < bestMin);
    if (fasterHwy) {
      const gap = Math.abs(Math.round(getDisplayMinutes(fasterHwy) - bestMin));
      return `${gap} min more — avoids all highways${via}`;
    }
    return `No highways used${via} — best option available`;
  }
  if (userFilters.fewer_turns) {
    const simplerThanAll = others.every(r => r.complexity >= best.complexity);
    return simplerThanAll
      ? `Fewest turns${via} — easiest to navigate`
      : `Simpler route${via} — fewer intersections`;
  }

  const fasterPaid = others.find(r =>
    r.tollCost > best.tollCost && getDisplayMinutes(r) < bestMin
  );
  const slowerFree = others.find(r =>
    best.tollCost > 0 && r.tollCost === 0 && getDisplayMinutes(r) >= bestMin
  );

  // Free, but a paid alt is faster
  if (best.tollCost === 0 && fasterPaid) {
    const gap = Math.abs(bestMin - getDisplayMinutes(fasterPaid));
    return gap <= 2
      ? `${gap} min more${via} — saves ${fasterPaid.tollCost} AED in tolls`
      : `Saves ${fasterPaid.tollCost} AED${via} with minimal time trade-off`;
  }
  // Paid, free alt is slower
  if (best.tollCost > 0 && slowerFree) {
    const gap = Math.round(getDisplayMinutes(slowerFree) - bestMin);
    return `${gap} min faster than free route${via}`;
  }
  // Heavy traffic — factual
  if (best.traffic === "high") {
    return delay > 0
      ? `Fastest despite ${delay} min delay${via}`
      : `Fastest available${via} — heavy traffic ahead`;
  }
  // Significant delay — show gap to justify
  if (delay >= 4) {
    return gapToNext > 0
      ? `${delay} min delay${via} — still ${gapToNext} min ahead of next route`
      : `${delay} min delay${via} — still the fastest option`;
  }
  // Clear road — use gap to quantify advantage
  if (best.traffic === "low" && delay <= 2) {
    return gapToNext >= 2
      ? `${gapToNext} min faster${via} with stable traffic`
      : `Stable traffic${via} — least delay right now`;
  }
  // Free, normal conditions — gap or flow
  if (best.tollCost === 0) {
    return gapToNext >= 2
      ? `${gapToNext} min ahead of alternatives${via} — no tolls`
      : `No tolls${via} — smooth flow right now`;
  }
  // Generic with gap
  return gapToNext >= 2
    ? `${gapToNext} min faster than next option${via}`
    : `Least delay of all routes${via}`;
}

// ТЗ5: Decision insight — only 3 types (paid / fast / no tolls)
function getRouteInsight(r, best, fastest) {
  if (r.index === best.index) return "";

  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);
  const absTimeDiff = Math.abs(timeDiff);
  const tollDiff = r.tollCost - best.tollCost;

  // Type 1 — PAID: route is more expensive AND faster → show value trade-off
  if (tollDiff > 0 && timeDiff < 0) {
    return `+${tollDiff} AED → save ${absTimeDiff} min`;
  }

  // Type 2 — CHEAPER: route saves money AND is not too slow
  if (tollDiff < 0) {
    const savings = Math.abs(tollDiff);
    if (timeDiff <= 0) return `Save ${savings} AED`;
    if (timeDiff <= 5) return `Save ${savings} AED, +${timeDiff} min`;
    return ""; // saves money but way too slow → no value
  }

  // Type 3 — FAST: clearly faster (≥ 2 min) at same toll level
  if (tollDiff === 0 && timeDiff < 0 && absTimeDiff >= 2) {
    return `${absTimeDiff} min faster`;
  }

  // Type 4 — NO TOLLS: this route is free while best is paid
  if (r.tollCost === 0 && best.tollCost > 0) {
    return "No tolls";
  }

  // Everything else (fewer turns, lighter traffic, weak diffs) → drop
  return "";
}

function getAlternativeTitle(r, best, fastest) {
  if (r.index === fastest.index && r.index !== best.index) return "Fastest option";
  if (r.tollCost === 0 && best.tollCost > 0) return "No tolls route";
  if (trafficRank(r.traffic) < trafficRank(best.traffic)) return "Calmer option";
  if (r.complexity < best.complexity) return "Simpler route";
  return `Via ${getRouteSummaryName(r)}`;
}

function getFallbackAlternativeInsight(r, best) {
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);
  if (timeDiff < 0) return `${Math.abs(timeDiff)} min faster, but different route`;
  if (timeDiff > 0 && trafficRank(r.traffic) < trafficRank(best.traffic)) return `${timeDiff} min slower, but calmer traffic`;
  if (timeDiff > 0 && r.complexity < best.complexity) return `${timeDiff} min slower, but fewer turns`;
  if (r.tollCost < best.tollCost) return `Lower toll cost with similar time`;
  if (r.tollCost === 0) return `No tolls alternative`;
  return `Alternative via ${getRouteSummaryName(r)}`;
}

function generateNeutralWhy(route) {
  const points = [];

  if (route.delayMinutes > 0) {
    points.push(`Includes ~${route.delayMinutes} min traffic delay`);
  } else {
    points.push("No additional traffic delay");
  }

  points.push(`${route.complexity} maneuvers`);
  points.push(`${Math.round(route.highwayShare * 100)}% highway`);
  points.push(`${toTitleCaseLabel(getTrafficText(route.traffic))} traffic`);

  // ТЗ3 ЭТАП 3: Add toll info to modal facts
  if (route.tollCost > 0) {
    points.push(`Includes ${route.tollCost} AED tolls`);
  } else {
    points.push("No tolls");
  }

  return points;
}

// ТЗ3 ЭТАП 4: Decision insight for alternatives
function generateDecisionInsight(route, bestRoute) {
  if (!bestRoute) return null;

  const diff = getDisplayDiff(route, bestRoute);
  const absDiff = Math.abs(diff);

  // === 1. Оба платные ===
  if (route.tollCost > 0 && bestRoute.tollCost > 0) {
    if (route.tollCost === bestRoute.tollCost) {
      if (diff === 0) return "Same toll cost and time — no advantage";
      if (diff > 0) return `Same toll cost, but ${absDiff} min slower`;
      return `Same toll cost, but ${absDiff} min faster`;
    }

    if (route.tollCost > bestRoute.tollCost) {
      return `Pay ${route.tollCost - bestRoute.tollCost} AED more for ${absDiff} min`;
    }

    return `Save ${bestRoute.tollCost - route.tollCost} AED for ${absDiff} min more`;
  }

  // === 2. Этот платный, лучший бесплатный ===
  if (route.tollCost > 0 && bestRoute.tollCost === 0) {
    if (diff < 0) {
      return `Pay ${route.tollCost} AED to save ${absDiff} min`;
    }
    return `Costs ${route.tollCost} AED and slower by ${absDiff} min`;
  }

  // === 3. Этот бесплатный, лучший платный ===
  if (route.tollCost === 0 && bestRoute.tollCost > 0) {
    if (diff > 0) {
      return `Avoid tolls, only ${absDiff} min longer`;
    }
    return `No tolls and ${absDiff} min faster`;
  }

  // === 4. Оба бесплатные ===
  if (route.tollCost === 0 && bestRoute.tollCost === 0) {
    if (diff === 0) return "Same time, no toll difference";
    if (diff > 0) return `${absDiff} min slower, no benefit`;
    return `${absDiff} min faster`;
  }

  // === fallback (никогда не null) ===
  return `${absDiff} min difference`;
}

  const distKm = (r.distance / 1000).toFixed(1);

  document.getElementById("modal-content").innerHTML = `

    </div>

    <div class="detail-section">

        </div>
        <div class="detail-item">
          <div class="detail-label">Distance</div>
          <div class="detail-value">${distKm} km</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Maneuvers</div>
          <div class="detail-value">${r.complexity}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Traffic</div>
          <div class="detail-value" style="font-size:14px">${trafficCellText}</div>
        </div>
        ${r.delayMinutes > 0 ? `
        <div class="detail-item">
          <div class="detail-label">Est. Delay</div>
          <div class="detail-value">+${r.delayMinutes} min</div>
        </div>
        ` : ""}
        <div class="detail-item">
          <div class="detail-label">Highway</div>
          <div class="detail-value">${highwayPct}%</div>
        </div>
        <div class="detail-item full-width">
          <div class="detail-label">Stability</div>
          <div class="detail-value">${stabilityLabel}</div>
        </div>
      </div>
    </div>

    <div class="modal-why">
      <div class="modal-why-title">Route facts</div>
      <ul class="modal-why-points">
        ${neutralWhy.map(point => `<li>${point}</li>`).join("")}
      </ul>
    </div>

    ${segmentsHtml}

    <button class="modal-cta" onclick="closeModal(event); startDrive(${r.index})">Start this route</button>
  `;

  document.getElementById("modal-overlay").classList.add("visible");
}

function closeModal(event) {
  if (event.target.id === "modal-overlay" || event.target.classList.contains("modal-cta")) {
    document.getElementById("modal-overlay").classList.remove("visible");
  }
}

// ============================================================
//  QUICK ACCESS — Saved Places (Home / Work) via localStorage
// ============================================================

// ── Route Filters ──
const FILTERS_KEY = "clearRoadUAE.filters.v1";
let userFilters = (() => {
  try { return Object.assign({ avoid_highways: false, fewer_turns: false }, JSON.parse(localStorage.getItem(FILTERS_KEY))); }
  catch { return { avoid_highways: false, fewer_turns: false }; }
})();

function toggleFilter(key) {
  if (!(key in userFilters)) return;
  userFilters[key] = !userFilters[key];
  try { localStorage.setItem(FILTERS_KEY, JSON.stringify(userFilters)); } catch {}
  document.querySelectorAll(".filter-btn").forEach(b =>
    b.classList.toggle("active", !!userFilters[b.dataset.filter])
  );
  calculateRoutes();
}

const SAVED_PLACES_KEY = "clearRoadUAE.savedPlaces.v1";

function getSavedPlaces() {
  try {
    const raw = localStorage.getItem(SAVED_PLACES_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function getSavedPlace(type) {
  const places = getSavedPlaces();
  const v = places[type];
  return (typeof v === "string" && v.trim()) ? v.trim() : null;
}

function savePlace(type, value) {
  if (typeof value !== "string" || !value.trim()) return false;
  try {
    const places = getSavedPlaces();
    places[type] = value.trim();
    localStorage.setItem(SAVED_PLACES_KEY, JSON.stringify(places));
    return true;
  } catch (e) {
    return false;
  }
}

// Triggered by single-click on Home/Work quick-item
function setDestination(place) {
  let address = getSavedPlace(place);

  if (!address) {
    // First-time: ask for address
    const input = window.prompt(`Enter your ${place} address:`);
    if (input === null) return;          // user cancelled
    const trimmed = input.trim();
    if (!trimmed) return;                // don't overwrite with empty
    if (!savePlace(place, trimmed)) return;
    address = trimmed;
  }

  const endField = document.getElementById("end");
  if (!endField) return;
  endField.value = address;
  if (typeof calculateRoutes === "function") {
    calculateRoutes();
  }
}

// Triggered by double-click — lets the user update a saved place without UI change
function updateSavedPlace(place) {
  const current = getSavedPlace(place) || "";
  const input = window.prompt(`Update your ${place} address:`, current);
  if (input === null) return;
  const trimmed = input.trim();
  if (!trimmed) return;                  // don't overwrite with empty
  if (!savePlace(place, trimmed)) return;
  const endField = document.getElementById("end");
  if (endField) endField.value = trimmed;
  if (typeof calculateRoutes === "function") calculateRoutes();
}

// ============================================================
//  USER PREFERENCE — Balanced / Fastest / No tolls (localStorage)
// ============================================================

function getUserPreference() {
  const v = localStorage.getItem("clearRoadUAE.pref") || "balanced";
  return ["balanced","fastest","no_tolls"].includes(v) ? v : "balanced";
}

function setUserPreference(value) {
  if (!["balanced","fastest","no_tolls"].includes(value)) return;
  localStorage.setItem("clearRoadUAE.pref", value);
  document.querySelectorAll(".pref-btn").forEach(btn =>
    btn.classList.toggle("active", btn.dataset.pref === value)
  );
  calculateRoutes();
}

// sync active button on script load (DOM already built at this point)
document.querySelectorAll(".pref-btn").forEach(b =>
  b.classList.toggle("active", b.dataset.pref === getUserPreference())
);
document.querySelectorAll(".filter-btn").forEach(b =>
  b.classList.toggle("active", !!userFilters[b.dataset.filter])
);

// ============================================================
//  ENTRY POINT
// ============================================================

window.initMap = initMap;
</script>

src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDLG6edII5ZKCffP_4qnwiNWg2X9IaLMM4&callback=initMap">
