<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clear Road UAE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f5f5f0">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d6a4f;
      --green-light: #40916c;
      --green-bg: #d8f3dc;
      --yellow: #f59e0b;
      --yellow-bg: #fef3c7;
      --beige: #a8a29e;
      --beige-bg: #f5f5f0;
      --gray: #6b7280;
      --dark: #1f2937;
      --white: #ffffff;
      --border: #e5e5e5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: var(--beige-bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 80px;
    }

    /* ===== INPUT PANEL ===== */
    .input-panel {
      background: var(--white);
      margin: 16px;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .input-row:first-child {
      border-bottom: 1px solid var(--border);
    }

    .input-label {
      font-size: 14px;
      color: var(--gray);
      min-width: 40px;
    }

    .input-value {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      color: var(--dark);
      border: none;
      background: transparent;
      outline: none;
    }

    .input-value::placeholder {
      color: var(--gray);
      font-weight: 400;
    }

    .voice-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .voice-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .voice-btn.gps-loading { opacity: 0.5; pointer-events: none; }
    .predict-tip { font-size: 12px; color: #059669; background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 8px; padding: 6px 10px; margin: 8px 0 0; font-weight: 500; }

    /* ===== BEST ROUTE CARD ===== */
    .best-card {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      margin: 0 16px 12px;
      border-radius: 20px;
      padding: 20px;
      position: relative;
    }

    .best-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .best-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .best-badge svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .best-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .best-title .check {
      color: var(--green);
    }

    .best-metrics {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 8px;
    }

    .best-toll {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .best-toll.has-toll {
      color: #d97706;
      font-weight: 500;
    }

    .best-parking {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    /* ── Day 4.5: AI Decision UX ── */
    .decision-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .ai-confidence-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.4px; }
    .ai-confidence-badge .conf-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .confidence-high   { background: #d1fae5; color: #065f46; }
    .confidence-medium { background: #fef3c7; color: #92400e; }
    .confidence-low    { background: #f3f4f6; color: #6b7280; }
    .ai-hero-time { font-size: 52px; font-weight: 800; color: var(--dark); line-height: 1; margin-bottom: 4px; letter-spacing: -1px; }
    .ai-hero-time span { font-size: 22px; font-weight: 600; color: var(--gray); margin-left: 2px; }
    .ai-distance { font-size: 14px; color: var(--gray); margin-bottom: 14px; }
    .ai-why { font-size: 16px; color: #1f2937; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
    .ai-secondary { font-size: 13px; color: var(--gray); font-weight: 500; margin-bottom: 10px; }

    .ai-stress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .ai-stress-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.35px; }
    .ai-stress-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .ai-stress-badge.low { background: rgba(16, 185, 129, 0.14); color: #047857; }
    .ai-stress-badge.medium { background: rgba(245, 158, 11, 0.16); color: #b45309; }
    .ai-stress-badge.high { background: rgba(239, 68, 68, 0.14); color: #b91c1c; }
    .ai-personality { font-size: 13px; color: var(--gray); font-weight: 600; }

    .start-btn {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .start-btn:hover {
      background: var(--green-light);
    }

    .why-link {
      text-align: center;
      font-size: 14px;
      color: var(--gray);
      cursor: pointer;
    }

    .why-link:hover {
      color: var(--dark);
    }

    /* ===== ALTERNATIVE CARDS ===== */
    .alt-card {
      margin: 0 16px 12px;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .alt-card:hover {
      transform: translateY(-2px);
    }

    .alt-card.faster_risky {
      background: var(--yellow-bg);
    }

    .alt-card.more_relaxed {
      background: #f5f5f0;
      border: 1px solid var(--border);
    }

    .alt-card.balanced, .alt-card.similar {
      background: #f8fafc;
      border: 1px solid var(--border);
    }

    .alt-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .alt-card.faster_risky .alt-icon {
      background: #fcd34d;
    }

    .alt-card.more_relaxed .alt-icon {
      background: #d6d3d1;
    }

    .alt-card.balanced .alt-icon,
    .alt-card.similar .alt-icon {
      background: #e2e8f0;
    }

    .alt-content {
      flex: 1;
    }

    .alt-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 2px;
    }

    .alt-subtitle {
      font-size: 14px;
      color: var(--gray);
    }

    .alt-toll {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .alt-toll.has-toll {
      color: #d97706;
    }

    .route-insight {
      font-size: 12px;
      color: #059669;
      font-weight: 500;
      margin-top: 2px;
    }

    .ai-insight {
      font-size: 12px;
      color: var(--green);
      font-weight: 500;
      margin-top: 4px;
      background: var(--green-bg);
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
    }

    .alt-arrow {
      color: var(--gray);
      font-size: 18px;
    }

    /* ===== QUICK ACCESS ===== */
    .quick-section {
      margin: 20px 16px 12px;
    }

    .quick-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .quick-list {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
    }

    .quick-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .quick-item:last-child {
      border-bottom: none;
    }

    .quick-item:hover {
      background: #fafafa;
    }

    .quick-icon {
      width: 40px;
      height: 40px;
      background: #f3f4f6;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray);
      font-size: 18px;
    }

    .quick-label {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      color: var(--dark);
    }

    .quick-arrow {
      color: #d1d5db;
      font-size: 18px;
    }

    .pref-bar{display:flex;gap:8px;margin:0 16px 12px}
    .pref-btn{flex:1;padding:8px 10px;font-size:13px;background:var(--white);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-family:inherit;color:var(--gray)}
    .pref-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
    .filter-bar{display:flex;gap:8px;margin:0 16px 12px}
    .filter-btn{flex:1;padding:6px 8px;font-size:12px;background:var(--white);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit;color:var(--gray)}
    .filter-btn.active{background:var(--yellow-bg);color:#92400e;border-color:var(--yellow)}

    /* ===== MAP PREVIEW ===== */
    .map-preview {
      margin: 0 16px;
      height: 180px;
      border-radius: 16px;
      overflow: hidden;
      background: #e5e5e5;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 0 20px;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 6px 16px;
    }

    .nav-item.active {
      color: var(--green);
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 500;
    }

    /* ===== ROUTE DETAILS MODAL ===== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .modal-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .modal-overlay.visible .modal-content {
      transform: translateY(0);
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: #d1d5db;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
    }

    .modal-role-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .modal-role-badge.recommended {
      background: var(--green);
      color: white;
    }

    .modal-role-badge.alternative {
      background: #e5e7eb;
      color: #374151;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .detail-item {
      background: #f9fafb;
      padding: 14px;
      border-radius: 12px;
    }

    .detail-label {
      font-size: 12px;
      color: var(--gray);
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--dark);
    }

    .detail-item.full-width {
      grid-column: 1 / -1;
    }

    .modal-why {
      background: #f0fdf4;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .modal-why-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 8px;
    }

    .modal-why-points {
      list-style: none;
    }

    .modal-why-points li {
      font-size: 14px;
      color: #166534;
      line-height: 1.5;
      padding-left: 20px;
      position: relative;
      margin-bottom: 6px;
    }

    .modal-why-points li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
    }

    .segment-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .segment-item {
      background: #f9fafb;
      padding: 14px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .segment-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .segment-icon.highway { background: #dbeafe; }
    .segment-icon.city { background: #fef3c7; }
    .segment-icon.traffic { background: #fee2e2; }
    .segment-icon.turns { background: #f3e8ff; }

    .segment-content {
      flex: 1;
    }

    .segment-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
    }

    .segment-details {
      font-size: 13px;
      color: var(--gray);
    }

    .comparison-note {
      background: #fef3c7;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      color: #92400e;
      margin-bottom: 16px;
    }

    .modal-cta {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-cta:hover {
      background: var(--green-light);
    }

    /* ===== DRIVE MODE ===== */
    .drive-mode {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0f172a;
      z-index: 2000;
      flex-direction: column;
    }

    .drive-mode.active {
      display: flex;
    }

    .drive-header {
      padding: 16px 20px;
      background: #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .drive-status {
      color: #94a3b8;
      font-size: 14px;
    }

    .drive-exit {
      padding: 10px 20px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .drive-map-container {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    #drive-map {
      width: 100%;
      height: 100%;
    }

    .drive-ahead {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      background: rgba(30, 41, 59, 0.95);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .drive-ahead-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .drive-ahead-icon.stable { background: #166534; }
    .drive-ahead-icon.warning { background: #f59e0b; }
    .drive-ahead-icon.alert { background: #ef4444; }

    .drive-ahead-text {
      flex: 1;
      color: white;
      font-size: 14px;
      font-weight: 500;
    }

    .drive-alert {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      padding: 16px;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
    }

    .drive-alert.visible {
      display: block;
    }

    .drive-alert-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .drive-alert-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .drive-alert-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .drive-alert-badge.high {
      background: rgba(16, 185, 129, 0.18);
      color: #6ee7b7;
    }

    .drive-alert-badge.medium {
      background: rgba(245, 158, 11, 0.18);
      color: #fcd34d;
    }

    .drive-alert-badge.low {
      background: rgba(148, 163, 184, 0.18);
      color: #cbd5e1;
    }

    .drive-alert-state {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .drive-alert-state.switch {
      color: #86efac;
    }

    .drive-alert-state.suggest {
      color: #fcd34d;
    }

    .drive-alert-message {
      color: white;
      margin-bottom: 12px;
    }

    .drive-alert-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .drive-alert-detail {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .drive-alert-meta {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.3;
    }

    .drive-alert-actions {
      display: flex;
      gap: 10px;
    }

    .drive-alert-btn {
      flex: 1;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .drive-alert-btn:hover {
      transform: translateY(-1px);
    }

    .drive-alert-btn.primary {
      background: #2d6a4f;
      color: white;
    }

    .drive-alert-btn.primary.suggest {
      background: #b45309;
    }

    .drive-alert-btn.secondary {
      background: #334155;
      color: white;
    }

    .drive-panel {
      background: #1e293b;
      padding: 24px 20px;
      border-radius: 28px 28px 0 0;
    }

    .drive-eta {
      text-align: center;
      margin-bottom: 16px;
    }

    .drive-eta-time {
      font-size: 56px;
      font-weight: 700;
      color: white;
      line-height: 1;
    }

    .drive-eta-label {
      font-size: 14px;
      color: #64748b;
      margin-top: 4px;
    }

    .drive-info {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 16px 0;
      border-top: 1px solid #334155;
    }

    .drive-info-item {
      text-align: center;
    }

    .drive-info-value {
      font-size: 22px;
      font-weight: 600;
      color: white;
    }

    .drive-info-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    .drive-next {
      margin-top: 16px;
      padding: 18px;
      background: #334155;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .drive-next-icon {
      width: 52px;
      height: 52px;
      background: var(--green);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;

<script>
// ============================================================
//  GLOBAL STATE
// ============================================================
let map;
let driveMap;
let directionsService;
let renderers = [];
let analyzedRoutes = [];
let selectedRoute = null;
let currentDirectionsResult = null;
let driveRenderer = null;
let driveInterval = null;
let currentStepIndex = 0;
let betterRouteIndex = null;
let driveWatchId = null;
let driveUserMarker = null;
let lastRerouteCheckAt = 0;
let lastKnownUserLatLng = null;
let smoothedUserLatLng = null;
let lastWarningPhase = "";
let voiceEnabled = true;
let lastSpokenText = "";
let lastSpokenAt = 0;
let heldTimedWarning = null;
let heldTimedWarningUntil = 0;
let lastPhaseChangeAt = 0;
let lastStableTimedPhase = "";
let offRouteSince = 0;
let lastStepSwitchAt = 0;
let lastStableStepIndex = 0;

let _bestRoute = null;
let _fastestRoute = null;
let _parkingType = "unknown";
let _predictiveData = null;  // Day 6.5: {laterMin, nowMin, saving}
let _departureDecision = null;
let _rerouteDecision = null;
let _delayedStartTimer = null;
let _delayedStartUntil = null;

let userProfile = {
  prefersNoTolls: false,
  prefersCalmRoutes: false,
  prefersFastest: false,
  avgChosenComplexity: null,
  avgChosenStress: null,
  totalChoices: 0
};

// ТЗ5: Parking detection (does NOT affect route selection)
function detectParkingType(destination) {
  const text = (destination || "").toLowerCase();
  if (
    text.includes("mall") ||
    text.includes("airport") ||
    text.includes("harbour") ||
    text.includes("parkonic") ||
    text.includes("beach") ||
    text.includes("marina")
  ) {
    return "salik_parking";
  }
  return "separate_payment";
}

function getParkingInsight() {
  if (_parkingType === "salik_parking") {
    return "Parking via Salik may be available";
  }
  return "";
}

function loadUserProfile() {
  try {
    const raw = localStorage.getItem("clearroad_user_profile");
    if (!raw) return;
    const parsed = JSON.parse(raw);
    userProfile = { ...userProfile, ...parsed };
  } catch (e) {}
}

function saveUserProfile() {
  try {
    localStorage.setItem("clearroad_user_profile", JSON.stringify(userProfile));
  } catch (e) {}
}

function learnFromRouteChoice(route) {
  if (!route) return;

  const total = (userProfile.totalChoices || 0) + 1;
  userProfile.totalChoices = total;

  const currentStress = route.stressScore || 0;
  const currentComplexity = route.complexity || 0;

  userProfile.avgChosenStress =
    userProfile.avgChosenStress == null
      ? currentStress
      : ((userProfile.avgChosenStress * (total - 1)) + currentStress) / total;

  userProfile.avgChosenComplexity =
    userProfile.avgChosenComplexity == null
      ? currentComplexity
      : ((userProfile.avgChosenComplexity * (total - 1)) + currentComplexity) / total;

  const noTollChoices = route.tollCost === 0;
  const calmChoice = currentStress <= 8;
  const fastChoice = route.index === (_fastestRoute && _fastestRoute.index);

  if (total >= 3) {
    if (noTollChoices) userProfile.prefersNoTolls = true;
    if (calmChoice)    userProfile.prefersCalmRoutes = true;
    if (fastChoice)    userProfile.prefersFastest = true;
  }

  saveUserProfile();
}

function getPersonalizationBias(route) {
  let bias = 0;

  if (userProfile.prefersNoTolls && route.tollCost === 0) {
    bias -= 2.5;
  }

  if (userProfile.prefersCalmRoutes) {
    bias -= (route.stressScore || 0) * 0.35;
  }

  if (userProfile.prefersFastest) {
    bias -= ((route.time - (_fastestRoute ? _fastestRoute.time : route.time)) / 60) * 0.8;
  }

  if (userProfile.avgChosenComplexity != null) {
    const complexityGap = Math.abs((route.complexity || 0) - userProfile.avgChosenComplexity);
    bias += complexityGap * 0.15;
  }

  if (userProfile.avgChosenStress != null) {
    const stressGap = Math.abs((route.stressScore || 0) - userProfile.avgChosenStress);
    bias += stressGap * 0.2;
  }

  return bias;
}

function getUserProfileLabel() {
  if (userProfile.prefersCalmRoutes) return "Learns your calm driving style";
  if (userProfile.prefersNoTolls)    return "Learns your no-tolls preference";
  if (userProfile.prefersFastest)    return "Learns your fastest-route style";
  return "";
}

function generateProfileAwareWhy(route, allRoutes) {
  const road = getRouteSummaryName(route);
  const stress = route.stressScore || 0;

  if (userProfile.prefersCalmRoutes && stress <= 8) {
    return `Matches your calm driving style via ${road}`;
  }
  if (userProfile.prefersNoTolls && route.tollCost === 0) {
    return `Matches your no-tolls preference via ${road}`;
  }
  if (userProfile.prefersFastest && _fastestRoute && route.index === _fastestRoute.index) {
    return `Matches your fastest-route style via ${road}`;
  }
  return "";
}

function getTimingDecisionHint() {
  if (!_departureDecision || _departureDecision.type === "neutral") return "";
  if (_departureDecision.type === "wait") {
    return `Better to leave in ${_departureDecision.waitMinutes} min`;
  }
  if (_departureDecision.type === "leave_now") {
    return "Better to leave now before traffic builds";
  }
  return "";
}

function getUnifiedRouteMeta(route) {
  const stress = getStressBadge(route.stressScore || 0);
  const personality = route.drivePersonality || "Steady drive";
  const delay = route.delayMinutes || 0;
  const delayText = delay === 0 ? "0 min delay" : `+${delay} min delay`;
  return {
    stressLabel: stress.label,
    stressTone: stress.tone,
    personality,
    delayText
  };
}

function generateUnifiedDecisionWhy(route, allRoutes) {
  const road = getRouteSummaryName(route);
  const profileWhy = generateProfileAwareWhy(route, allRoutes);
  const timingHint = getTimingDecisionHint();

  if (profileWhy) return profileWhy;

  const others = (allRoutes || []).filter(r => r.index !== route.index);
  if (!others.length) return `Best available route via ${road}`;

  const fastestAlt = others.reduce((a, b) =>
    getDisplayMinutes(a) < getDisplayMinutes(b) ? a : b
  );
  const diff = getDisplayMinutes(fastestAlt) - getDisplayMinutes(route);

  if (route.tollCost === 0 && fastestAlt.tollCost > 0 && Math.abs(diff) <= 3) {
    return `No tolls with similar time via ${road}`;
  }
  if (diff > 0 && route.stressScore <= (fastestAlt.stressScore || 999)) {
    return `${diff} min faster with smoother drive via ${road}`;
  }
  if (trafficRank(route.traffic) < trafficRank(fastestAlt.traffic)) {
    return `Less traffic than faster alternatives via ${road}`;
  }
  if ((route.stressScore || 0) + 2 < (fastestAlt.stressScore || 0)) {
    return `Lower-stress route via ${road}`;
  }
  if (timingHint && route.index === (_bestRoute && _bestRoute.index)) {
    return `${timingHint} via ${road}`;
  }
  return `Best overall balance via ${road}`;
}

// ============================================================
//  HELPERS
// ============================================================

function stripHtml(text) {
  return (text || "").replace(/<[^>]*>/g, " ").trim();
}

function normalizeRoadText(step, route) {
  const summary = (route.summary || "");
  const html = stripHtml(step.html_instructions || "");
  return `${summary} ${html}`.toUpperCase();
}

function stepLooksLikeHighway(step, route) {
  const text = normalizeRoadText(step, route);
  return (
    /\bE11\b/.test(text) ||
    /\bE311\b/.test(text) ||
    /\bE611\b/.test(text) ||
    text.includes("SHEIKH") ||
    text.includes("HIGHWAY") ||
    text.includes("EXPRESSWAY")
  );
}

function getTrafficLevel(base, traffic) {
  if (!traffic || !base || traffic <= base) return "low";
  const ratio = (traffic - base) / base;
  if (ratio <= 0.05) return "low";
  if (ratio <= 0.15) return "medium";
  return "high";
}

function trafficRank(level) {
  if (level === "low") return 1;
  if (level === "medium") return 2;
  return 3;
}

function getTrafficText(traffic) {
  if (traffic === "low") return "stable";
  if (traffic === "medium") return "moderate";
  return "heavy";
}

function toTitleCaseLabel(value) {
  if (!value) return "";
  return value.charAt(0).toUpperCase() + value.slice(1);
}

function getStabilityLabel(stabilityScore) {
  if (stabilityScore >= 70) return "Very stable";
  if (stabilityScore >= 50) return "Stable";
  if (stabilityScore >= 30) return "Moderate";
  return "Unpredictable";
}

function isMeaningfulManeuver(step, route) {
  if (!step) return false;
  const html = stripHtml(step.html_instructions || "").toLowerCase();
  const maneuver = (step.maneuver || "").toLowerCase();
  const strong = ["turn-left", "turn-right", "uturn-left", "uturn-right", "roundabout"];
  if (strong.some(m => maneuver.includes(m))) return true;
  if (
    html.includes("exit") ||
    html.includes("keep right") ||
    html.includes("keep left") ||
    html.includes("ramp") ||
    html.includes("merge")
  ) return true;
  if (html.includes("continue") || html.includes("slight")) return false;
  return false;
}

function countComplexity(leg, route) {
  return leg.steps.filter(s => isMeaningfulManeuver(s, route)).length;
}

function calculateHighwayShare(leg, route) {
  const total = leg.distance?.value || 0;
  if (!total) return 0;
  let hwDistance = 0;
  leg.steps.forEach(step => {
    if (stepLooksLikeHighway(step, route)) {
      hwDistance += step.distance?.value || 0;
    }
  });
  return hwDistance / total;
}

function getDisplayMinutes(route) {
  return Math.round(route.time / 60);
}

function getDisplayDiff(routeA, routeB) {
  return getDisplayMinutes(routeA) - getDisplayMinutes(routeB);
}

function getRouteSummaryName(route) {
  const summary = route.route.summary || "";
  if (summary.includes("E311")) return "E311";
  if (summary.includes("E11")) return "E11";
  if (summary.includes("E611")) return "E611";
  if (summary.includes("Sheikh Zayed")) return "Sheikh Zayed Rd";
  return summary.split("/")[0].trim() || `Route ${route.displayIndex}`;
}

// ============================================================
//  ROUTE METRICS
// ============================================================

function calculateRouteMetrics(route, leg, rawRoute) {
  const baseTime = leg.duration.value;
  const time = leg.duration_in_traffic?.value || baseTime;
  const distance = leg.distance.value;
  const delaySeconds = Math.max(0, time - baseTime);
  const delayMinutes = Math.round(delaySeconds / 60);
  const complexity = countComplexity(leg, rawRoute);
  const highwayShare = calculateHighwayShare(leg, rawRoute);
  const traffic = getTrafficLevel(baseTime, time);

  // ТЗ3 ЭТАП 1: Salik toll data
  const tollCount = Math.floor(highwayShare * 3); // rough estimate based on highway usage
  const tollCost = tollCount * 4; // 4 AED per Salik gate
  const hasToll = tollCost > 0;

  return {
    time,
    baseTime,
    distance,
    delaySeconds,
    delayMinutes,
    complexity,
    highwayShare,
    traffic,
    highway: highwayShare >= 0.35,
    tollCount,
    tollCost,
    hasToll
  };
}

function calculateDriveStress(route) {
  let stress = 0;

  stress += (route.complexity || 0) * 0.55;
  stress += (route.delayMinutes || 0) * 0.9;
  stress += route.traffic === "high" ? 5 : route.traffic === "medium" ? 2 : 0;
  stress += route.highway ? 0 : 1.5;

  if ((route.highwayShare || 0) < 0.25) stress += 1.5;
  if ((route.complexity || 0) >= 12) stress += 2;
  if ((route.delayMinutes || 0) >= 6) stress += 2;

  return Math.round(stress * 10) / 10;
}

function getDrivePersonality(route) {
  const stress = route.stressScore || 0;
  const turns = route.complexity || 0;
  const delay = route.delayMinutes || 0;
  const highwayShare = route.highwayShare || 0;

  if (stress <= 6 && highwayShare >= 0.5 && turns <= 8) {
    return "Smooth drive";
  }

  if (stress <= 9 && delay <= 3) {
    return "Steady drive";
  }

  if (stress <= 12) {
    return "Active drive";
  }

  if (turns >= 12 || delay >= 6) {
    return "Stressful drive";
  }

  return "Busy route";
}

function getStressBadge(stressScore) {
  if (stressScore <= 6) {
    return { label: "Low stress", tone: "low" };
  }
  if (stressScore <= 10) {
    return { label: "Medium stress", tone: "medium" };
  }
  return { label: "High stress", tone: "high" };
}

function calculateRouteScore(r, allRoutes) {
  const fastest = allRoutes.length ? Math.min(...allRoutes.map(x => x.time)) : r.time;
  const timeScore = (r.time - fastest) / 60;
  const trafficPenalty = r.traffic === "high" ? 15 : r.traffic === "medium" ? 5 : 0;
  const complexityPenalty = r.complexity * 0.75;
  const highwayBonus = r.highwayShare * -3;
  const delayPenalty = r.delayMinutes * 1.5;

  const stressScore = calculateDriveStress(r);
  const stressPenalty = stressScore * 0.65;

  const stabilityScore = Math.max(
    0,
    100 - trafficPenalty * 3 - r.complexity * 2 - r.delayMinutes * 4 - stressScore * 2
  );

  const score =
    timeScore +
    trafficPenalty +
    complexityPenalty +
    highwayBonus +
    delayPenalty +
    stressPenalty;

  return {
    score,
    timeScore,
    trafficPenalty,
    complexityPenalty,
    highwayBonus,
    delayPenalty,
    stressPenalty,
    stressScore,
    drivePersonality: getDrivePersonality({ ...r, stressScore }),
    stabilityScore
  };
}

// ============================================================
// ============================================================
//  ROUTE ROLE CLASSIFICATION
// ============================================================

function getRouteRole(r, bestRoute, fastestRoute, allRoutes) {
  if (r.index === bestRoute.index) return "recommended";

  const diffFromBest = getDisplayDiff(r, bestRoute);
  const isFaster = diffFromBest < 0;
  const isSlower = diffFromBest > 0;

  const hasMoreTraffic = trafficRank(r.traffic) > trafficRank(bestRoute.traffic);
  const hasMoreDelay = r.delayMinutes > bestRoute.delayMinutes + 2;
  const isRiskier = hasMoreTraffic || hasMoreDelay;

  const fewerTurns = r.complexity < bestRoute.complexity - 1;
  const lighterTraffic = trafficRank(r.traffic) < trafficRank(bestRoute.traffic);
  const isMoreRelaxed = fewerTurns || lighterTraffic;

  const timeSimilar = Math.abs(diffFromBest) <= 1;
  const complexitySimilar = Math.abs(r.complexity - bestRoute.complexity) <= 2;
  const trafficSimilar = trafficRank(r.traffic) === trafficRank(bestRoute.traffic);
  const isSimilar = timeSimilar && complexitySimilar && trafficSimilar;

  if (isFaster && isRiskier) return "faster_risky";
  if (isSlower && isMoreRelaxed) return "more_relaxed";
  if (isSimilar) return "similar";
  return "balanced";
}

// ============================================================
//  DECISION LOGIC — SELECT RECOMMENDED ROUTE
// ============================================================

function selectBestRoute(routes) {
  if (!routes?.length) return null;
  if (routes.length === 1) return routes[0];

  const fastest = [...routes].sort((a, b) => a.time - b.time)[0];

  // ── User preference override (minimal injection) ──
  const pref = getUserPreference();

  if (pref === "fastest") {
    // avoid_highways modifier: if fastest is highway, accept a non-highway route within 3 min
    if (userFilters.avoid_highways && fastest.highway) {
      const closeNoHwy = routes.filter(r => !r.highway && (r.time - fastest.time) / 60 <= 3);
      if (closeNoHwy.length > 0)
        return closeNoHwy.sort((a, b) => a.time - b.time || a.complexity - b.complexity)[0];
    }
    // Always prefer shortest time; only switch if a peer is essentially the same time
    // AND has cheaper toll cost (very small difference).
    const peers = routes.filter(r =>
      Math.abs(r.time - fastest.time) / 60 <= 1 && r.tollCost < fastest.tollCost
    );
    if (peers.length === 0) return fastest;
    return peers.sort((a, b) => a.tollCost - b.tollCost || a.time - b.time)[0];
  }

  if (pref === "no_tolls") {
    // Strongly prefer toll-free, even if up to ~5 min slower than fastest
    const free = routes.filter(r =>
      r.tollCost === 0 && (r.time - fastest.time) / 60 <= 5
    );
    if (free.length > 0) {
      // fewer_turns modifier: elevate complexity in sort among toll-free candidates
      return free.sort((a, b) =>
        trafficRank(a.traffic) - trafficRank(b.traffic) ||
        a.delayMinutes - b.delayMinutes ||
        (a.stressScore || 0) - (b.stressScore || 0) ||
        (userFilters.fewer_turns ? a.complexity - b.complexity : 0) ||
        getPersonalizationBias(a) - getPersonalizationBias(b) ||
        a.tollCost - b.tollCost ||
        a.complexity - b.complexity ||
        a.time - b.time
      )[0];
    }
    // Otherwise fall through to balanced logic below
  }

  // ── Step 1: Build "competitive pool" — routes within 5 min of fastest ──
  // Anything further is too slow to be considered, regardless of other merits.
  let pool = routes.filter(r => (r.time - fastest.time) / 60 <= 5);
  if (pool.length === 0) pool = [fastest];

  // ── Step 2: Strong free-route preference ──
  // If fastest is paid AND there's a free route within 4 min → prefer free.
  if (fastest.tollCost > 0) {
    const competitiveFree = pool.filter(r =>
      r.tollCost === 0 && (r.time - fastest.time) / 60 <= 4
    );
    if (competitiveFree.length > 0) {
      return competitiveFree.sort((a, b) =>
        trafficRank(a.traffic) - trafficRank(b.traffic) ||
        a.delayMinutes - b.delayMinutes ||
        a.complexity - b.complexity ||
        a.time - b.time
      )[0];
    }
  }

  // ── Step 3: Drop high-traffic routes if any non-high alternative exists ──
  // Fastest with unstable traffic should NOT auto-win.
  const nonHigh = pool.filter(r => r.traffic !== "high");
  if (nonHigh.length > 0) pool = nonHigh;

  // ── Step 4: Final ranking — filters act as sort modifiers, not overrides ──
  // avoid_highways: highway routes sorted last (penalty as first comparator)
  // fewer_turns:    complexity elevated before toll cost
  return pool.sort((a, b) =>
    (userFilters.avoid_highways ? (a.highway ? 1 : 0) - (b.highway ? 1 : 0) : 0) ||
    trafficRank(a.traffic) - trafficRank(b.traffic) ||
    a.delayMinutes - b.delayMinutes ||
    (a.stressScore || 0) - (b.stressScore || 0) ||
    getPersonalizationBias(a) - getPersonalizationBias(b) ||
    (userFilters.fewer_turns ? a.complexity - b.complexity : 0) ||
    a.tollCost - b.tollCost ||
    a.complexity - b.complexity ||
    a.time - b.time
  )[0];
}

// ── Confidence helper: practical, decision-aligned (matches selectBestRoute logic) ──
// HIGH   = obvious human choice (free vs slightly faster paid, lower traffic, lower delay, or dominant)
// MEDIUM = real trade-off (faster alt exists but worse on cost/stability)
// LOW    = routes are genuinely interchangeable on all dimensions
function calculateConfidence(best, allRoutes) {
  if (!allRoutes || allRoutes.length < 2) return "High";
  const others = allRoutes.filter(r => r.index !== best.index);
  if (others.length === 0) return "High";

  const bestMin = getDisplayMinutes(best);
  const fasterAlts = others.filter(r => getDisplayMinutes(r) < bestMin);
  const fastestAlt = fasterAlts.length
    ? fasterAlts.reduce((a, b) => getDisplayMinutes(a) < getDisplayMinutes(b) ? a : b)
    : null;

  // Case A: nothing is faster — best is dominant on time
  if (!fastestAlt) return "High";

  const timeGap = bestMin - getDisplayMinutes(fastestAlt); // min that alt saves

  // Case B: best is free, faster alt is paid, small gap → clear human win
  if (best.tollCost === 0 && fastestAlt.tollCost > 0 && timeGap <= 3) {
    return "High";
  }
  // Case C: best clearly avoids worse traffic of the faster alt
  if (trafficRank(best.traffic) < trafficRank(fastestAlt.traffic) && timeGap <= 5) {
    return "High";
  }
  // Case D: best clearly avoids higher delay of the faster alt
  if ((fastestAlt.delayMinutes || 0) - (best.delayMinutes || 0) >= 3 && timeGap <= 5) {
    return "High";
  }

  // Truly similar across the board → LOW (rare)
  const trulySimilar = others.every(r => {
    const dt = Math.abs(getDisplayMinutes(r) - bestMin);
    return dt <= 2
      && r.tollCost === best.tollCost
      && trafficRank(r.traffic) === trafficRank(best.traffic)
      && Math.abs((r.complexity || 0) - (best.complexity || 0)) <= 2;
  });
  if (trulySimilar) return "Low";

  // Otherwise: meaningful trade-off
  return "Medium";
}

// ============================================================
//  ROUTE SEGMENTS (for Route Details modal)
// ============================================================

function buildRouteSegments(r) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const segments = [];

  let currentSegment = null;
  let segmentSteps = [];

  steps.forEach((step, i) => {
    const isHw = stepLooksLikeHighway(step, r.route);
    const isMeaningful = isMeaningfulManeuver(step, r.route);

    let type = isHw ? "highway" : "city";

    if (!isHw && isMeaningful) {
      const nearbyManeuvers = steps.slice(Math.max(0, i - 2), i + 3)
        .filter(s => isMeaningfulManeuver(s, r.route)).length;
      if (nearbyManeuvers >= 3) type = "turns";
    }

    if (!currentSegment || currentSegment.type !== type) {
      if (currentSegment && segmentSteps.length > 0) {
        currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
        currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
        segments.push(currentSegment);
      }
      currentSegment = { type, steps: [] };
      segmentSteps = [];
    }

    segmentSteps.push(step);
    currentSegment.steps = segmentSteps;
  });

  if (currentSegment && segmentSteps.length > 0) {
    currentSegment.distance = segmentSteps.reduce((sum, s) => sum + (s.distance?.value || 0), 0);
    currentSegment.duration = segmentSteps.reduce((sum, s) => sum + (s.duration?.value || 0), 0);
    segments.push(currentSegment);
  }

  const mergedSegments = [];
  segments.forEach(seg => {
    if (seg.distance < 500 && mergedSegments.length > 0) {
      const prev = mergedSegments[mergedSegments.length - 1];
      prev.distance += seg.distance;
      prev.duration += seg.duration;
    } else {
      mergedSegments.push(seg);
    }
  });

  if (r.delayMinutes > 3 && mergedSegments.length > 0) {
    const citySegment = mergedSegments.find(s => s.type === "city");
    if (citySegment) citySegment.type = "traffic";
  }

  return mergedSegments.map(seg => {
    const km = (seg.distance / 1000).toFixed(1);
    const mins = Math.round(seg.duration / 60);
    const labels = {
      highway: { icon: "&#128739;", title: "Highway section", note: "stable flow" },
      city: { icon: "&#127961;", title: "City driving", note: "urban roads" },
      traffic: { icon: "&#128679;", title: "Congested area", note: "expect delays" },
      turns: { icon: "&#128260;", title: "Complex section", note: "multiple turns" }
    };
    const label = labels[seg.type] || labels.city;
    return {
      type: seg.type,
      icon: label.icon,
      title: label.title,
      details: `${km} km · ~${mins} min · ${label.note}`,
      distance: seg.distance,
      duration: seg.duration
    };
  });
}

// ============================================================
//  DRIVE MODE
// ============================================================

function buildDriveViewModel(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  let remainingDistance = 0;
  let remainingTime = 0;

  for (let i = stepIndex; i < steps.length; i++) {
    remainingDistance += steps[i].distance?.value || 0;
    remainingTime += steps[i].duration?.value || 0;
  }

  const currentStep = steps[stepIndex] || steps[0];

  return {
    eta: Math.round(remainingTime / 60),
    distance: (remainingDistance / 1000).toFixed(1),
    traffic: r.traffic,
    trafficText: getTrafficText(r.traffic),
    instruction: stripHtml(currentStep?.html_instructions || "Follow the route"),
    instructionDistance: currentStep?.distance?.text || "",
    maneuver: currentStep?.maneuver || "",
    stepIndex,
    totalSteps: steps.length
  };
}

function getStepWarningMeta(step, route) {
  const html = stripHtml(step?.html_instructions || "");
  const text = html.toLowerCase();
  const roadText = normalizeRoadText(step, route);

  const roadMatch =
    roadText.match(/\bE311\b/) ||
    roadText.match(/\bE11\b/) ||
    roadText.match(/\bE611\b/);
  const roadName = roadMatch ? roadMatch[0] : getRouteSummaryName({ route });

  if (text.includes("keep right")) return { type: "lane",  icon: "↗", shortText: `Keep right for ${roadName}`,  longText: `Keep right ahead for exit toward ${roadName}` };
  if (text.includes("keep left"))  return { type: "lane",  icon: "↖", shortText: `Keep left for ${roadName}`,   longText: `Keep left ahead toward ${roadName}` };
  if (text.includes("exit"))       return { type: "exit",  icon: "⇢", shortText: `Exit ahead to ${roadName}`,   longText: `Prepare for exit toward ${roadName}` };
  if (text.includes("ramp"))       return { type: "ramp",  icon: "⇗", shortText: `Ramp ahead to ${roadName}`,   longText: `Take the ramp ahead toward ${roadName}` };
  if (text.includes("merge"))      return { type: "merge", icon: "⇄", shortText: `Merge ahead`,                 longText: `Merge carefully ahead` };
  return null;
}

function isComplexInterchangeAhead(steps, currentStepIndex, route) {
  const lookahead = steps.slice(currentStepIndex, currentStepIndex + 4);
  const specialCount = lookahead.filter(step => {
    const text = stripHtml(step?.html_instructions || "").toLowerCase();
    return (
      text.includes("exit") ||
      text.includes("keep right") ||
      text.includes("keep left") ||
      text.includes("ramp") ||
      text.includes("merge")
    );
  }).length;
  const hasHighway = lookahead.some(step => stepLooksLikeHighway(step, route));
  return hasHighway && specialCount >= 2;
}

function getDrivePriorityWarning(r, stepIndex) {
  const steps = r.route.legs[0].steps;
  const meta = (s) => s ? getStepWarningMeta(s, r.route) : null;
  return (
    meta(steps[stepIndex]) ||
    meta(steps[stepIndex + 1]) ||
    meta(steps[stepIndex + 2]) ||
    (isComplexInterchangeAhead(steps, stepIndex, r.route)
      ? { type: "interchange", icon: "⚠", shortText: "Complex interchange ahead", longText: "Complex interchange ahead — stay focused for lane choice" }
      : null)
  );
}

function parseStepDistanceMeters(step) {
  if (!step?.distance?.value) return null;
  return step.distance.value;
}

function getDistanceToStepEndMeters(step, userLatLng) {
  if (!step?.end_location || !userLatLng) return parseStepDistanceMeters(step);
  return google.maps.geometry.spherical.computeDistanceBetween(
    userLatLng,
    step.end_location
  );
}

function getWarningPhase(distanceMeters) {
  if (distanceMeters == null) return "none";

  const current = lastStableTimedPhase || "none";

  if (current === "prepare") {
    if (distanceMeters <= 240) return "soon";
    if (distanceMeters > 860) return "none";
    return "prepare";
  }

  if (current === "soon") {
    if (distanceMeters <= 60) return "now";
    if (distanceMeters > 360) return "prepare";
    return "soon";
  }

  if (current === "now") {
    if (distanceMeters > 120) return "soon";
    return "now";
  }

  if (distanceMeters <= 80) return "now";
  if (distanceMeters <= 300) return "soon";
  if (distanceMeters <= 800) return "prepare";
  return "none";
}

function buildTimedWarning(priorityWarning, step, userLatLng) {
  if (!priorityWarning || !step) return null;

  const meters = getDistanceToStepEndMeters(step, userLatLng);
  const phase = getWarningPhase(meters);

  if (phase === "none") return null;

  let distanceText = "Ahead";
  if (meters != null) {
    if (meters <= 80) {
      distanceText = "Now";
    } else if (meters < 1000) {
      distanceText = `${Math.round(meters / 10) * 10} m`;
    } else {
      distanceText = `${(meters / 1000).toFixed(1)} km`;
    }
  }

  if (phase === "prepare") {
    return { ...priorityWarning, phase, shortText: `Prepare: ${priorityWarning.shortText}`, longText: priorityWarning.longText, distanceText };
  }

  if (phase === "soon") {
    return { ...priorityWarning, phase, shortText: priorityWarning.shortText, longText: priorityWarning.longText, distanceText };
  }

  return { ...priorityWarning, phase: "now", shortText: `NOW: ${priorityWarning.shortText}`, longText: `Now — ${priorityWarning.longText}`, distanceText: "Now" };
}

function normalizeVoiceText(text) {
  return (text || "")
    .replace(/\bE311\b/g, "E three one one")
    .replace(/\bE611\b/g, "E six one one")
    .replace(/\bE11\b/g, "E eleven")
    .replace(/\s+/g, " ")
    .trim();
}

function speakText(text, priority = "normal") {
  if (!voiceEnabled || !("speechSynthesis" in window)) return;
  if (!text) return;
  const now = Date.now();
  const normalized = normalizeVoiceText(text);
  if (normalized === lastSpokenText && now - lastSpokenAt < 6000) return;
  if (priority === "urgent") window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(normalized);
  utterance.lang = "en-US";
  utterance.rate = priority === "urgent" ? 1.0 : 0.95;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;
  lastSpokenText = normalized;
  lastSpokenAt = now;
  window.speechSynthesis.speak(utterance);
}

function getVoicePromptFromTimedWarning(timedWarning) {
  if (!timedWarning) return "";
  if (timedWarning.phase === "prepare") return timedWarning.shortText.replace(/^Prepare:\s*/i, "Prepare to ");
  if (timedWarning.phase === "soon")    return timedWarning.shortText;
  if (timedWarning.phase === "now")     return timedWarning.shortText.replace(/^NOW:\s*/i, "Now ");
  return timedWarning.shortText || "";
}

function getVoicePromptFromManeuver(vm) {
  if (!vm) return "";
  const instruction = stripHtml(vm.instruction || "");
  if (!instruction) return "";
  if (vm.maneuver?.includes("uturn")) return "Make a U turn";
  if (vm.maneuver?.includes("left"))  return "Turn left";
  if (vm.maneuver?.includes("right")) return "Turn right";
  return instruction;
}

function maybeSpeakDriveInstruction(vm, timedWarning) {
  if (!voiceEnabled) return;

  if (timedWarning?.phase) {
    if (timedWarning.phase !== lastWarningPhase) {
      const text = getVoicePromptFromTimedWarning(timedWarning);
      speakText(text, timedWarning.phase === "now" ? "urgent" : "normal");
    }
    return;
  }

  const fallbackText = getVoicePromptFromManeuver(vm);
  if (!fallbackText) return;

  if (Date.now() - lastSpokenAt > 12000) {
    speakText(fallbackText, "normal");
  }
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;

  if (!voiceEnabled && "speechSynthesis" in window) {
    window.speechSynthesis.cancel();
  }
}

function getDriveTimedWarning(r, stepIndex) {
  const steps = r.route.legs[0].steps;
  const userLatLng = lastKnownUserLatLng;

  const candidates = [
    { step: steps[stepIndex],     warning: getStepWarningMeta(steps[stepIndex],     r.route) },
    { step: steps[stepIndex + 1], warning: getStepWarningMeta(steps[stepIndex + 1], r.route) },
    { step: steps[stepIndex + 2], warning: getStepWarningMeta(steps[stepIndex + 2], r.route) }
  ];

  for (const item of candidates) {
    if (!item.step || !item.warning) continue;
    const timed = buildTimedWarning(item.warning, item.step, userLatLng);
    if (timed) return timed;
  }

  if (isComplexInterchangeAhead(steps, stepIndex, r.route)) {
    return { type: "interchange", icon: "⚠", phase: "prepare", shortText: "Prepare: complex interchange ahead", longText: "Complex interchange ahead — stay focused for lane choice", distanceText: "Ahead" };
  }

  return null;
}

function getHeldTimedWarning(timedWarning) {
  const now = Date.now();

  if (!timedWarning) {
    if (heldTimedWarning && now < heldTimedWarningUntil) {
      return heldTimedWarning;
    }
    heldTimedWarning = null;
    heldTimedWarningUntil = 0;
    return null;
  }

  const nextPhase = timedWarning.phase || "";
  const currentPhase = lastStableTimedPhase || "";

  if (nextPhase !== currentPhase) {
    if (now - lastPhaseChangeAt < 1800 && currentPhase) {
      if (heldTimedWarning && now < heldTimedWarningUntil) {
        return heldTimedWarning;
      }
    }
    lastPhaseChangeAt = now;
    lastStableTimedPhase = nextPhase;
  }

  heldTimedWarning = timedWarning;
  heldTimedWarningUntil = now + 2500;

  return heldTimedWarning;
}

function getUpcomingCondition(r, stepIndex) {
  const leg = r.route.legs[0];
  const steps = leg.steps;
  const upcoming = steps.slice(stepIndex, stepIndex + 5);

  const timedWarning = getDriveTimedWarning(r, stepIndex);
  if (timedWarning) {
    return { type: timedWarning.phase === "now" ? "alert" : "warning", icon: timedWarning.icon, text: timedWarning.longText };
  }

  const hasHighway = upcoming.some(s => stepLooksLikeHighway(s, r.route));
  const hasManyTurns = upcoming.filter(s => isMeaningfulManeuver(s, r.route)).length >= 3;
  const isNearEnd = stepIndex >= steps.length - 3;

  if (r.traffic === "high") return { type: "warning", icon: "&#9888;", text: "Heavier traffic ahead" };
  if (hasManyTurns)         return { type: "warning", icon: "&#128260;", text: "Multiple turns ahead" };
  if (isNearEnd)            return { type: "stable",  icon: "&#127937;", text: "Approaching destination" };
  if (hasHighway)           return { type: "stable",  icon: "&#128739;", text: "Highway section ahead — smooth driving" };
  if (r.traffic === "low")  return { type: "stable",  icon: "&#9728;", text: "Stable traffic ahead" };
  return { type: "stable", icon: "&#9728;", text: "Moderate conditions ahead" };
}

function getRerouteDecision(currentRoute, alternativeRoute) {
  const timeGain = getDisplayMinutes(currentRoute) - getDisplayMinutes(alternativeRoute);
  const currentDelay = currentRoute.delayMinutes || 0;
  const altDelay = alternativeRoute.delayMinutes || 0;
  const delayGain = currentDelay - altDelay;
  const trafficBetter = trafficRank(alternativeRoute.traffic) < trafficRank(currentRoute.traffic);
  const simplerDrive = (alternativeRoute.complexity || 0) < (currentRoute.complexity || 0);

  if (timeGain >= 4) {
    return {
      action: "switch",
      confidence: "high",
      title: `Switch now → save ${timeGain} min`,
      detail: `Faster${alternativeRoute.drivePersonality ? " · " + alternativeRoute.drivePersonality.toLowerCase() : ""} via ${getRouteSummaryName(alternativeRoute)}`
    };
  }

  if (timeGain >= 2 && (trafficBetter || delayGain >= 2)) {
    return {
      action: "switch",
      confidence: "high",
      title: `Switch now → smoother and faster`,
      detail: `${timeGain} min faster with calmer traffic and ${(alternativeRoute.drivePersonality || "steady drive").toLowerCase()}`
    };
  }

  if (timeGain >= 1 && (trafficBetter || simplerDrive || delayGain >= 1)) {
    return {
      action: "suggest",
      confidence: "medium",
      title: `Alternative may be better`,
      detail: `${timeGain} min gain or ${(alternativeRoute.drivePersonality || "easier drive").toLowerCase()} ahead`
    };
  }

  if (timeGain >= 0 && trafficBetter && delayGain >= 2) {
    return {
      action: "suggest",
      confidence: "medium",
      title: `Calmer route available`,
      detail: `Similar time, but calmer and lower-stress ahead`
    };
  }

  return {
    action: "stay",
    confidence: "low",
    title: "Stay on current route",
    detail: "No strong reroute advantage"
  };
}

function renderDriveAlertDecision(decision, altRoute) {
  const alert = document.getElementById("drive-alert");
  const message = document.getElementById("drive-alert-message");

  if (!alert || !message) return;

  if (!decision || decision.action === "stay") {
    alert.classList.remove("visible");
    return;
  }

  const confidenceClass = decision.confidence === "high" ? "high" :
                          decision.confidence === "medium" ? "medium" : "low";

  const actionLabel = decision.action === "switch" ? "Switch recommended" : "Alternative suggested";

  message.innerHTML = `
    <div class="drive-alert-header">
      <span class="drive-alert-badge ${confidenceClass}">
        <span class="dot"></span>
        ${decision.confidence} confidence
      </span>
      <span class="drive-alert-state ${decision.action}">${actionLabel}</span>
    </div>
    <div class="drive-alert-title">${decision.title}</div>
    <div class="drive-alert-detail">${decision.detail}</div>
    <div class="drive-alert-meta">Via ${getRouteSummaryName(altRoute)}</div>
  `;

  const primaryBtn = alert.querySelector(".drive-alert-btn.primary");
  const secondaryBtn = alert.querySelector(".drive-alert-btn.secondary");

  if (primaryBtn && secondaryBtn) {
    primaryBtn.textContent = decision.action === "switch" ? "Switch now" : "Try alternative";
    primaryBtn.className = `drive-alert-btn primary${decision.action === "suggest" ? " suggest" : ""}`;
    secondaryBtn.textContent = "Stay";
  }

  alert.classList.add("visible");
}

function evaluateReroute(currentRoute, allRoutes) {
  if (allRoutes.length <= 1) return null;

  const alternatives = allRoutes.filter(r => r.index !== currentRoute.index);

  let bestAlt = null;
  let bestDecision = null;

  for (const alt of alternatives) {
    const decision = getRerouteDecision(currentRoute, alt);

    if (decision.action === "stay") continue;

    if (!bestAlt) {
      bestAlt = alt;
      bestDecision = decision;
      continue;
    }

    const currentPriority =
      bestDecision.action === "switch" ? 2 :
      bestDecision.action === "suggest" ? 1 : 0;

    const newPriority =
      decision.action === "switch" ? 2 :
      decision.action === "suggest" ? 1 : 0;

    if (newPriority > currentPriority) {
      bestAlt = alt;
      bestDecision = decision;
      continue;
    }

    if (newPriority === currentPriority) {
      const currentGain = getDisplayMinutes(currentRoute) - getDisplayMinutes(bestAlt);
      const newGain = getDisplayMinutes(currentRoute) - getDisplayMinutes(alt);

      const currentBias = getPersonalizationBias(bestAlt);
      const newBias = getPersonalizationBias(alt);

      if (newGain > currentGain || (newGain === currentGain && newBias < currentBias)) {
        bestAlt = alt;
        bestDecision = decision;
      }
    }
  }

  if (!bestAlt || !bestDecision) return null;

  return {
    index: bestAlt.index,
    route: bestAlt,
    decision: bestDecision
  };
}

function getUserLatLngFromPosition(pos) {
  return new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
}

function getClosestStepIndex(userLatLng, steps, currentIndex = 0) {
  let minDist = Infinity;
  let bestIndex = currentIndex;

  const from = Math.max(0, currentIndex - 1);
  const to = Math.min(steps.length - 1, currentIndex + 3);

  for (let i = from; i <= to; i++) {
    const step = steps[i];
    const points = [];
    if (step.start_location) points.push(step.start_location);
    if (step.end_location) points.push(step.end_location);

    points.forEach(point => {
      const d = google.maps.geometry.spherical.computeDistanceBetween(userLatLng, point);
      if (d < minDist) {
        minDist = d;
        bestIndex = i;
      }
    });
  }

  return bestIndex;
}

function isUserOffRoute(userLatLng, route) {
  const path = route.route.overview_path;
  if (!path || !path.length) return false;
  return !google.maps.geometry.poly.isLocationOnEdge(
    userLatLng,
    new google.maps.Polyline({ path }),
    0.00045
  );
}

function smoothUserPosition(newLatLng) {
  if (!smoothedUserLatLng) {
    smoothedUserLatLng = newLatLng;
    return newLatLng;
  }
  const alpha = 0.35;
  smoothedUserLatLng = new google.maps.LatLng(
    smoothedUserLatLng.lat() + (newLatLng.lat() - smoothedUserLatLng.lat()) * alpha,
    smoothedUserLatLng.lng() + (newLatLng.lng() - smoothedUserLatLng.lng()) * alpha
  );
  return smoothedUserLatLng;
}

function hasUserMoved(prevLatLng, nextLatLng) {
  if (!prevLatLng || !nextLatLng) return true;
  const d = google.maps.geometry.spherical.computeDistanceBetween(prevLatLng, nextLatLng);
  return d > 8;
}

function getStableStepIndex(candidateIndex) {
  const now = Date.now();
  if (candidateIndex < currentStepIndex) return currentStepIndex;
  if (candidateIndex > currentStepIndex + 1) candidateIndex = currentStepIndex + 1;
  if (candidateIndex !== currentStepIndex) {
    if (now - lastStepSwitchAt < 2500) return currentStepIndex;
    lastStepSwitchAt = now;
  }
  lastStableStepIndex = candidateIndex;
  return candidateIndex;
}

function updateDriveUserMarker(userLatLng) {
  if (!driveMap) return;
  if (!driveUserMarker) {
    driveUserMarker = new google.maps.Marker({
      position: userLatLng,
      map: driveMap,
      title: "You",
      zIndex: 9999
    });
  } else {
    driveUserMarker.setPosition(userLatLng);
  }
}

function handleLiveDrivePosition(pos) {
  if (!selectedRoute) return;

  const rawLatLng = getUserLatLngFromPosition(pos);
  const userLatLng = smoothUserPosition(rawLatLng);

  if (!hasUserMoved(lastKnownUserLatLng, userLatLng)) {
    updateDriveUserMarker(userLatLng);
    return;
  }

  lastKnownUserLatLng = userLatLng;
  updateDriveUserMarker(userLatLng);

  const steps = selectedRoute.route.legs[0].steps;
  const candidateIndex = getClosestStepIndex(userLatLng, steps, currentStepIndex);
  const stableIndex = getStableStepIndex(candidateIndex);

  if (stableIndex !== currentStepIndex) {
    currentStepIndex = stableIndex;
  }

  updateDriveUI();

  if (isUserOffRoute(userLatLng, selectedRoute)) {
    if (!offRouteSince) offRouteSince = Date.now();
    if (Date.now() - offRouteSince > 4000) {
      handleOffRouteRecalculation(userLatLng);
      offRouteSince = 0;
      return;
    }
  } else {
    offRouteSince = 0;
  }

  const now = Date.now();
  if (currentStepIndex >= 2 && now - lastRerouteCheckAt > 15000) {
    lastRerouteCheckAt = now;

    const reroute = evaluateReroute(selectedRoute, analyzedRoutes);

    if (!reroute) {
      _rerouteDecision = null;
      betterRouteIndex = null;
      dismissAlert();
      return;
    }

    if (reroute.index !== betterRouteIndex) {
      betterRouteIndex = reroute.index;
      _rerouteDecision = reroute.decision;
      renderDriveAlertDecision(reroute.decision, reroute.route);
    }
  }
}

function handleOffRouteRecalculation(userLatLng) {
  betterRouteIndex = null;
  _rerouteDecision = null;
  dismissAlert();

  const destination = document.getElementById("end").value.trim();
  if (!destination || !directionsService) return;

  directionsService.route({
    origin: userLatLng,
    destination,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK" || !result.routes?.length) return;

    currentDirectionsResult = result;

    analyzedRoutes = result.routes.map((route, i) => {
      const leg = route.legs[0];
      const metrics = calculateRouteMetrics(route, leg, route);
      return { route, index: i, displayIndex: i + 1, ...metrics };
    });

    analyzedRoutes = analyzedRoutes.map(r => {
      const scoreData = calculateRouteScore(r, analyzedRoutes);
      return { ...r, ...scoreData };
    });

    _bestRoute = selectBestRoute(analyzedRoutes);
    _fastestRoute = [...analyzedRoutes].sort((a, b) => a.time - b.time)[0];

    analyzedRoutes.forEach(r => {
      r.role = getRouteRole(r, _bestRoute, _fastestRoute, analyzedRoutes);
    });

    selectedRoute = _bestRoute;
    currentStepIndex = 0;
    betterRouteIndex = null;
    _rerouteDecision = null;
    offRouteSince = 0;
    lastStepSwitchAt = 0;
    lastStableStepIndex = 0;
    smoothedUserLatLng = userLatLng;
    dismissAlert();

    if (driveRenderer) driveRenderer.setMap(null);

    driveRenderer = new google.maps.DirectionsRenderer({
      map: driveMap,
      directions: currentDirectionsResult,
      routeIndex: selectedRoute.index,
      polylineOptions: {
        strokeColor: "#2d6a4f",
        strokeWeight: 6
      }
    });

    updateDriveUI();
  });
}

function startLiveDriveTracking() {
  if (!navigator.geolocation) return;
  stopLiveDriveTracking();
  driveWatchId = navigator.geolocation.watchPosition(
    handleLiveDrivePosition,
    (err) => { console.error("Drive GPS error:", err); },
    { enableHighAccuracy: true, maximumAge: 1000, timeout: 7000 }
  );
}

function stopLiveDriveTracking() {
  if (driveWatchId !== null) {
    navigator.geolocation.clearWatch(driveWatchId);
    driveWatchId = null;
  }
  smoothedUserLatLng = null;
  offRouteSince = 0;
  lastStepSwitchAt = 0;
  lastStableStepIndex = 0;
}

function startDriveMode(index) {

  currentStepIndex = 0;
  betterRouteIndex = null;
  _rerouteDecision = null;
  lastRerouteCheckAt = 0;
  lastKnownUserLatLng = null;
  offRouteSince = 0;
  lastStepSwitchAt = 0;
  lastStableStepIndex = 0;
  smoothedUserLatLng = null;
  lastWarningPhase = "";
  lastSpokenText = "";
  lastSpokenAt = 0;
  heldTimedWarning = null;

  document.getElementById("drive-mode").classList.add("active");

function updateDriveUI() {
  const r = selectedRoute;
  if (!r) return;

  const vm = buildDriveViewModel(r, currentStepIndex);
  let timedWarning = getDriveTimedWarning(r, currentStepIndex);
  timedWarning = getHeldTimedWarning(timedWarning);

  const condition = timedWarning
    ? {
        type: timedWarning.phase === "now" ? "alert" : "warning",
        icon: timedWarning.icon,
        text: timedWarning.longText
      }
    : getUpcomingCondition(r, currentStepIndex);

  const stress = getStressBadge(r.stressScore || 0);

  document.getElementById("drive-eta-time").textContent = vm.eta;
  document.getElementById("drive-distance").textContent = vm.distance;
  document.getElementById("drive-traffic").textContent = vm.trafficText;

  document.getElementById("drive-next-instruction").textContent =
    timedWarning ? timedWarning.shortText : vm.instruction;
  document.getElementById("drive-next-distance").textContent =
    timedWarning ? timedWarning.distanceText : vm.instructionDistance;

  let icon = "&#8593;";
  if (timedWarning?.icon) {
    icon = timedWarning.icon;
  } else if (vm.maneuver.includes("left")) {
    icon = "&#8592;";
  } else if (vm.maneuver.includes("right")) {
    icon = "&#8594;";
  } else if (vm.maneuver.includes("uturn")) {
    icon = "&#8634;";
  }
  document.getElementById("drive-next-icon").innerHTML = icon;

  const aheadIcon = document.getElementById("drive-ahead-icon");
  aheadIcon.innerHTML = condition.icon;
  aheadIcon.className = `drive-ahead-icon ${condition.type}`;
  document.getElementById("drive-ahead-text").textContent =
    `${condition.text} · ${stress.label.toLowerCase()} · ${r.drivePersonality || "steady drive"}`;

  document.getElementById("drive-status").textContent = `Step ${currentStepIndex + 1}/${vm.totalSteps}`;

  maybeSpeakDriveInstruction(vm, timedWarning);

  if (timedWarning?.phase) {
    lastWarningPhase = timedWarning.phase;
  } else {
    lastWarningPhase = "";
  }
}

function calculateRoutes() {
  clearRoutes();

  const start = document.getElementById("start").value.trim();
  const end = document.getElementById("end").value.trim();

  // ТЗ5: detect parking type (does NOT affect route selection)
  _parkingType = detectParkingType(end);

  if (!start || !end) {
    document.getElementById("results").innerHTML = "";
    return;
  }

  document.getElementById("results").innerHTML = '<div class="loading">Finding best routes...</div>';

  directionsService.route({
    origin: start,
    destination: end,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: "bestguess"
    }
  }, (result, status) => {
    if (status !== "OK") {
      document.getElementById("results").innerHTML = `<div class="error">Could not find route: ${status}</div>`;
      return;
    }

    const routes = result.routes;
    if (!routes?.length) {
      document.getElementById("results").innerHTML = '<div class="error">No routes found.</div>';
      return;
    }

    currentDirectionsResult = result;

    analyzedRoutes = routes.map((route, i) => {
      const leg = route.legs[0];
      const metrics = calculateRouteMetrics(route, leg, route);
      return { route, index: i, displayIndex: i + 1, ...metrics };
    });

    analyzedRoutes = analyzedRoutes.map(r => {
      const scoreData = calculateRouteScore(r, analyzedRoutes);
      return { ...r, ...scoreData };
    });

    _bestRoute = selectBestRoute(analyzedRoutes);
    _fastestRoute = [...analyzedRoutes].sort((a, b) => a.time - b.time)[0];

    analyzedRoutes.forEach(r => {
      r.role = getRouteRole(r, _bestRoute, _fastestRoute, analyzedRoutes);
    });

    renderResults();
    drawRoutes(result);

    // Day 6.5: fire predictive check asynchronously — doesn't block current render
    runPredictiveCheck(start, end, getDisplayMinutes(_bestRoute));
  });
}
