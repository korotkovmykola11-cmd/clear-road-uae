<!DOCTYPE html>
<html>
<head>
  <title>Clear Road UAE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #map { height: 60vh; width: 100%; }

    .panel {
      padding: 12px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    input {
      width: 44%;
      padding: 10px;
      margin: 3px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      font-size: 16px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .routes {
      padding: 10px;
    }

    .route {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .best {
      border: 2px solid green;
    }

    .tag {
      display: inline-block;
      background: #eee;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 5px;
      margin-right: 5px;
    }

    .error {
      color: red;
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="panel">
  <input id="start" placeholder="Start (e.g. Dubai Marina)">
  <input id="end" placeholder="Destination">
  <button onclick="calculateRoutes()">Compare Routes</button>
</div>

<div id="map"></div>
<div class="routes" id="routes"></div>

<script>
let map, directionsService, renderers = [];
let lastResult = null;

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 25.2048, lng: 55.2708 },
    zoom: 11,
  });

  directionsService = new google.maps.DirectionsService();
}

function isHighwayRoute(route) {
  const text = `${route.summary || ""} ${
    route.legs?.[0]?.steps?.map(step => step.instructions || "").join(" ") || ""
  }`.toUpperCase();

  return (
    text.includes("E11") ||
    text.includes("E311") ||
    text.includes("E611") ||
    text.includes("SHEIKH ZAYED") ||
    text.includes("EMIRATES ROAD")
  );
}

function calculateRoutes() {
  clearRoutes();

  const start = document.getElementById("start").value.trim();
  const end = document.getElementById("end").value.trim();

  if (!start || !end) {
    document.getElementById("routes").innerHTML =
      '<div class="error">Please enter both start and destination.</div>';
    return;
  }

  directionsService.route({
    origin: start,
    destination: end,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: true,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: 'bestguess'
    }
  }, (result, status) => {
    if (status !== 'OK') {
      document.getElementById("routes").innerHTML =
        `<div class="error">Route request failed: ${status}</div>`;
      return;
    }

    lastResult = result;

    const routes = result.routes;
    let bestIndex = 0;
    let bestScore = Infinity;

    const analyzed = routes.map((route, i) => {
      const leg = route.legs[0];
      const time = leg.duration_in_traffic
        ? leg.duration_in_traffic.value
        : leg.duration.value;
      const distance = leg.distance.value;
      const stops = leg.steps.length;
      const trafficLevel = time / distance;
      const highway = isHighwayRoute(route);

      let score = time + (stops * 50);

      if (highway) {
        score -= 150;
      }

      if (stops >= 20) {
        score += 300;
      }

      if (score < bestScore) {
        bestScore = score;
        bestIndex = i;
      }

      return {
        route,
        time,
        distance,
        stops,
        trafficLevel,
        score,
        index: i,
        highway
      };
    });

    analyzed.forEach((r, i) => {
      drawRoute(result, r.index, i === bestIndex);
      renderCard(r, i, i === bestIndex);
    });
  });
}

function drawRoute(fullResult, routeIndex, isBest) {
  const renderer = new google.maps.DirectionsRenderer({
    map: map,
    directions: fullResult,
    routeIndex: routeIndex,
    polylineOptions: {
      strokeColor: isBest ? "green" : "gray",
      strokeWeight: isBest ? 6 : 4
    },
    suppressMarkers: false,
    preserveViewport: routeIndex !== 0
  });

  renderers.push(renderer);
}

function renderCard(r, index, isBest) {
  const div = document.createElement("div");
  div.className = "route";
  if (isBest) div.classList.add("best");

  const minutes = Math.round(r.time / 60);
  const km = (r.distance / 1000).toFixed(1);

  const badges = [];

  if (isBest) badges.push("Лучший маршрут");
  if (r.highway) badges.push("Хайвей");
  if (r.stops <= 16) badges.push("Меньше светофоров");
  if (r.stops >= 20) badges.push("Больше остановок");
  if (minutes <= 27) badges.push("Быстрее сейчас");
  if (minutes >= 30) badges.push("Дольше по времени");

  if (r.trafficLevel < 0.0011) {
    badges.push("Меньше пробок");
  } else if (r.trafficLevel > 0.0013) {
    badges.push("Плотный трафик");
  } else {
    badges.push("Средний трафик");
  }

  let mainReason = "Альтернативный вариант";

  if (isBest && r.highway && r.stops < 20) {
    mainReason = "Рекомендуем: быстрый и плавный маршрут по хайвею";
  } else if (isBest) {
    mainReason = "Рекомендуем: более удобный маршрут";
  } else if (r.highway) {
    mainReason = "Альтернатива: маршрут с участком по хайвею";
  }

  div.innerHTML = `
    <b>Route ${index + 1}</b><br>
    ⏱ ${minutes} min<br>
    📏 ${km} km<br>
    🚦 Stops: ${r.stops}<br>
    <div style="margin-top:8px; font-weight:600;">${mainReason}</div>
    <div style="margin-top:8px;">
      ${badges.map(b => `<span class="tag">${b}</span>`).join(" ")}
    </div>
  `;

  div.onclick = () => {
    if (r.route.bounds) {
      map.fitBounds(r.route.bounds);
    }
  };

  document.getElementById("routes").appendChild(div);
}

function clearRoutes() {
  renderers.forEach(r => r.setMap(null));
  renderers = [];
  lastResult = null;
  document.getElementById("routes").innerHTML = "";
}
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDLG6edII5ZKCffP_4qnwiNWg2X9IaLMM4&callback=initMap" async defer></script>

</body>
</html>
