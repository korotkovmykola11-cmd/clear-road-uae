<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clear Road UAE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0A0B0D">
  <!-- ROUTE CANON: calculateRoutes → calculateRoutesUnified (TZ7 + TZ6B + __CLEAR_ROAD_ROUTE_CALC_CORE__). initMap без изменений. Выбор маршрута SSOT: buildRealDecision / clearRoadOfficialBestRoute; tz4BestByScore — только legacy подписи, не выбор. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Theme: полный CSS в src/styles/app.css (в dist встраивается командой npm run build) -->
  <style id="clear-road-inline-theme">
__CLEAR_ROAD_BUILD_CSS_PLACEHOLDER__
  </style>

</head>
<body>

  <!-- HERO SECTION: full-width map + floating top bar -->
  <div class="hero-section">
    <div id="map"></div>
    <div class="top-bar">
      <button class="top-btn" title="Menu">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div class="route-panel">
        <div class="route-row">
          <span class="route-dot green"></span>
          <div class="route-field">
            <input type="text" class="route-input" id="start" data-i18n-ph="placeholder_start" placeholder="From (e.g. Ajman)" value="" aria-label="From" title="From" autocomplete="off">
            <button type="button" class="route-clear-btn" id="clear-route-start" onclick="clearRouteInputField('start')" data-i18n-title="route_clear_from" title="Clear start" aria-label="Clear start">&times;</button>
          </div>
          <button type="button" class="gps-btn-top" id="gps-btn" title="Use my location" aria-label="Use GPS location">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          </button>
        </div>
        <div class="route-row">
          <span class="route-dot"></span>
          <div class="route-field">
            <input type="text" class="route-input" id="end" data-i18n-ph="placeholder_end" placeholder="To (e.g. Dubai Mall)" value="" aria-label="To" title="To" autocomplete="off">
            <button type="button" class="route-clear-btn" id="clear-route-end" onclick="clearRouteInputField('end')" data-i18n-title="route_clear_to" title="Clear destination" aria-label="Clear destination">&times;</button>
          </div>
        </div>
        <div class="route-mode-row" role="group" aria-label="Routing style">
          <div class="route-mode-toggle">
            <button type="button" class="route-mode-btn active" data-route-mode="fast" onclick="setRouteMode('fast')" data-i18n="route_mode_fast">FAST</button>
            <button type="button" class="route-mode-btn" data-route-mode="calm" onclick="setRouteMode('calm')" data-i18n="route_mode_calm">CALM</button>
          </div>
          <span class="route-mode-hint" data-i18n="route_mode_hint">Less stress • fewer turns</span>
        </div>
      </div>
    </div>
    <div class="live-badge"><span class="live-dot"></span> LIVE TRAFFIC</div>
  </div>

  <!-- FIX-1: visible language + AI voice controls -->
  <div class="top-utility-bar" id="top-utility-bar">
    <div class="lang-bar visible-lang-bar" id="visible-lang-bar" aria-label="Language selector">
      <button type="button" class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button type="button" class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
      <button type="button" class="lang-btn" data-lang="ua" onclick="setLang('ua')">UA</button>
      <button type="button" class="lang-btn" data-lang="ar" onclick="setLang('ar')">AR</button>
    </div>
    <button type="button" class="ai-voice-btn" onclick="speakCurrentDecision()" data-i18n="ai_voice_button">AI Voice</button>
  </div>

  <!-- CONTROLS STRIP (pref / filter / lang) -->
  <div class="controls-strip">
    <div class="pref-bar" id="pref-bar">
      <button type="button" class="pref-btn" data-pref="balanced" onclick="setUserPreference('balanced')" data-i18n="pref_balanced">Balanced</button>
      <button type="button" class="pref-btn" data-pref="fastest"  onclick="setUserPreference('fastest')"  data-i18n="pref_fastest">Fastest</button>
      <button type="button" class="pref-btn" data-pref="no_tolls" onclick="setUserPreference('no_tolls')" data-i18n="pref_no_tolls">No tolls</button>
    </div>
    <div class="filter-bar" id="filter-bar">
      <button type="button" class="filter-btn" data-filter="avoid_highways" onclick="toggleFilter('avoid_highways')" data-i18n="filter_highways">🛣 Avoid highways</button>
      <button type="button" class="filter-btn" data-filter="fewer_turns"    onclick="toggleFilter('fewer_turns')"    data-i18n="filter_turns">↩ Fewer turns</button>
    </div>
    <div class="lang-bar" id="lang-bar">
      <button type="button" class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button type="button" class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
      <button type="button" class="lang-btn" data-lang="ua" onclick="setLang('ua')">UA</button>
      <button type="button" class="lang-btn" data-lang="ar" onclick="setLang('ar')">AR</button>
    </div>
  </div>

  <!-- CONTENT SCROLL -->
  <div class="content-scroll">
    <!-- RESULTS filled by renderResults() -->
    <div id="results"></div>

    <!-- QUICK ACCESS (shown when no routes) -->
    <div class="quick-section" id="quick-access">
      <div class="quick-title" data-i18n="quick_access">Quick Access</div>
      <div class="quick-list">
        <div class="quick-item" onclick="setDestination('Home')" ondblclick="updateSavedPlace('Home')">
          <div class="quick-icon">&#127968;</div>
          <div class="quick-label">Home</div>
          <div class="quick-arrow">&#8250;</div>
        </div>
        <div class="quick-item" onclick="setDestination('Work')" ondblclick="updateSavedPlace('Work')">
          <div class="quick-icon">&#128188;</div>
          <div class="quick-label">Work</div>
          <div class="quick-arrow">&#8250;</div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV (premium dark) -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="handleStartNavTap()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
      <span class="nav-label" data-i18n="nav_route">Route</span>
    </div>
    <div class="nav-item" onclick="handleStartNavTap()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      <span class="nav-label" data-i18n="nav_drive">Drive</span>
    </div>
    <div class="nav-item disabled" aria-disabled="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 17v-6c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v6H4v2h16v-2h-2zm-2 0H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6zm-4 5c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2z"/></svg>
      <span class="nav-label" data-i18n="nav_alerts">Alerts</span>
    </div>
    <div class="nav-item disabled" aria-disabled="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <span class="nav-label" data-i18n="nav_saved">Saved</span>
    </div>
    <div class="nav-item disabled" aria-disabled="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span class="nav-label" data-i18n="nav_profile">Profile</span>
    </div>
  </nav>
<!-- ROUTE DETAILS MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-content" id="modal-content">
  </div>
</div>

<!-- DRIVE MODE -->
<div class="drive-mode" id="drive-mode">
  <div class="drive-header">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="drive-status" id="drive-status">Navigating...</span>
      <button class="drive-exit" type="button" onclick="toggleVoice()" style="background:#334155;">Voice</button>
      <button class="drive-exit" type="button" onclick="toggleFollowMode()" style="background:#1d4ed8;">Follow</button>
    </div>
    <button class="drive-exit" onclick="exitDriveMode()">Exit</button>
  </div>

  <div class="drive-map-container">
    <div id="drive-map"></div>

    <div class="drive-ahead">
      <div class="drive-ahead-icon stable" id="drive-ahead-icon">&#9728;</div>
      <div class="drive-ahead-text" id="drive-ahead-text" data-i18n="calculating">Calculating conditions...</div>
    </div>

    <div class="drive-interchange-warn" id="drive-interchange-warn">
      Complex interchange ahead — stay focused
    </div>

    <div class="drive-reality-strip" id="drive-reality-strip" style="display:none">
      <span id="drive-reality-main">Next action</span>
      <strong id="drive-reality-distance">--</strong>
    </div>

    <div class="drive-alert" id="drive-alert">
      <div class="drive-alert-message" id="drive-alert-message"></div>
      <div class="drive-alert-actions">
        <button class="drive-alert-btn primary" onclick="switchToAlternative()" data-i18n="switch_route">Switch Route</button>
        <button class="drive-alert-btn secondary" onclick="dismissAlert()" data-i18n="keep_current">Keep Current</button>
      </div>
    </div>
  </div>

  <div class="drive-panel">
    <div class="drive-eta">
      <div class="drive-eta-time" id="drive-eta-time">--</div>
      <div class="drive-eta-label" data-i18n="min_remaining">min remaining</div>
    </div>
    <div class="drive-info">
      <div class="drive-info-item">
        <div class="drive-info-value" id="drive-distance">--</div>
        <div class="drive-info-label" data-i18n="km_left">km left</div>
      </div>
      <div class="drive-info-item">
        <div class="drive-info-value" id="drive-traffic">--</div>
        <div class="drive-info-label" data-i18n="traffic_label">traffic</div>
      </div>
    </div>
    <div class="drive-next">
      <div class="drive-next-icon" id="drive-next-icon">&#8593;</div>
      <div class="drive-next-text">
        <div class="drive-next-instruction" id="drive-next-instruction" data-i18n="follow_route">Follow the route</div>
        <div class="drive-next-distance" id="drive-next-distance"></div>
      </div>
    </div>
    <div class="drive-lane-block" id="drive-lane-block" style="display:none">
      <div class="drive-lane-icon" id="drive-lane-icon">⇢</div>
      <div class="drive-lane-text">
        <div class="drive-lane-instruction" id="drive-lane-instruction"></div>
        <div class="drive-lane-distance" id="drive-lane-distance"></div>
      </div>
    </div>
  </div>
</div>
<script id="clear-road-inline-i18n">
__CLEAR_ROAD_BUILD_I18N_PLACEHOLDER__
</script>
<script>
// ============================================================
//  CLEAR_ROAD_MAINTAINER_INDEX (этап 5 — карта слоёв; вариант A = без выноса .js в прод)
//  TZ2  — UAE route integrity, AE geocode/autocomplete, calculateRoutesTZ2Final → __CLEAR_ROAD_ROUTE_CALC_CORE__
//  TZ3  — predictive departure (ждать / ехать)
//  TZ5  — GPS, off-route, smoothed position (см. DRIVE_* константы)
//  TZ6  — production safety fallback (карта, drive UI)
//  TZ7  — pref/filter UI, live recalc, обёртка directionsService.route (не прототип)
//  TZ8  — buildRealDecision, AI-тексты, RTL AR
//  TZ9–13 + cr-* — карточки, модалка, язык, финальные полировки
//  cr-fix-route-empty-state-final-v2 — IDLE + calculateRoutesUnified
//  Не удалять IIFE без регрессии; разбиение на файлы — только при явной смене контракта деплоя.
// ============================================================
//  ТЗ-2. КАРТА МОНОЛИТА (этот же <script>, ~строки 200–5965 input/index.html)
//  Навигация: Ctrl+F по строке-якорю. Ниже — порядок ПЛАНИРУЕМОГО ВЫНОСА снизу вверх (к менее связанному с ядром).
//  Уже вынесено: cr-tz1-directions-route-extract, cr-tz1-route-metrics-traffic, cr-tz1-route-role-segments, cr-tz1-drive-gps-warnings, cr-tz1-drive-voice-timed-warnings, cr-tz1-drive-lane-timed-hud, cr-tz1-drive-upcoming-condition, cr-tz1-drive-main-instruction, cr-tz1-drive-voice-nav-turns, cr-tz2-normalization-layer, cr-tz1-tz2-decision-helpers, cr-tz1-drive-update-ui, cr-tz3-score-engine, cr-tz4-why-generator, cr-ai-decision-layer, cr-tz1-drive-voice-ai-advice, cr-tz1-drive-live-gps-tracking, cr-route-cards-ui-cleanup, cr-render-results-decision-ui, cr-route-compare-modal-ui, cr-drive-start-nav-entry, TZ6 production safety, TZ2 GPS stability, TZ7 live recalc (см. ТЗ-0).
//
//  [v01] Якорь: "function startDrive(index)" — handleStartNavTap / startDrive (хвост перед <\/script>). Вынесено: cr-drive-start-nav-entry.js.
//  [v02] Якорь: "ТЗ-6 — DECISION UI BINDING" — рендер карточки решения / currentDecision. Вынесено: cr-render-results-decision-ui.js (плейсхолдер после основного <script>).
//  [v03] Якорь: "ТЗ-9 — ROUTE CARDS UI CLEANUP" — карточки маршрутов. Вынесено: cr-route-cards-ui-cleanup.js (после [v22] cr-tz1-drive-live-gps-tracking; см. ТЗ-0).
//  [v04] Якорь: "ТЗ-8 — RESTORE ALTERNATIVES + ROUTE COMPARE UI" — сравнение альтернатив / модалка. Вынесено: cr-route-compare-modal-ui.js (сразу после cr-render-results-decision-ui).
//  [v05] Якорь: "ТЗ-5 — AI DECISION LAYER" — AI decision в монолите. Вынесено: cr-ai-decision-layer.js (внешний script после cr-tz4-why-generator).
//  [v06] Якорь: "ТЗ-4 — WHY GENERATOR" — WHY / trade-off тексты. Вынесено: cr-tz4-why-generator.js (внешний script после cr-tz3-score-engine, до cr-ai-decision-layer).
//  [v07] Якорь: "ТЗ-3 — SCORE ENGINE" — скоринг маршрутов. Вынесено: cr-tz3-score-engine.js (после cr-tz1-drive-update-ui.js).
//  [v20] Якорь: Drive HUD live refresh — updateDriveUI, applySmoothedDriveEta. Вынесено: cr-tz1-drive-update-ui.js (после [v08]; до [v07]).
//  [v08] Якорь: "ТЗ-2: Decision Engine Strengthening" / "ТЗ-1 PATCH — ROUTE DECISION CORE LOCK" — хелперы решения. Вынесено: cr-tz1-tz2-decision-helpers.js (после cr-tz2-normalization-layer.js).
//  [v10] Якорь: "ТЗ-2: NORMALIZATION LAYER" — normalizeRoute, sanity, validateNormalizedRoutes. Вынесено: cr-tz2-normalization-layer.js (после cr-tz1-drive-voice-nav-turns.js).
//  [v11] Якорь: "ТЗ-1 — ROUTE DATA EXTRACTION" — extractRoutesFromDirectionsResult, validateExtractedRoutes. Вынесено: cr-tz1-directions-route-extract.js (первый внешний script после <\/script>).
//  [v12] Якорь: "HELPERS" / "ROUTE METRICS" — normalizeRoadText, trafficRank, calculateRouteMetrics, getStressBadge. Вынесено: cr-tz1-route-metrics-traffic.js (после cr-tz1-directions-route-extract; до [v13]).
//  [v13] Якорь: "ROUTE ROLE CLASSIFICATION" / "ROUTE SEGMENTS" — getRouteRole, buildRouteSegments. Вынесено: cr-tz1-route-role-segments.js (после cr-tz1-route-metrics-traffic; до [v14]).
//  [v14] Якорь: "DRIVE MODE" / GPS / step warnings — buildDriveViewModel, getLiveRemainingMeters, getDistanceToStepEndMeters, getWarningPhaseForType, getEffectiveDistanceToStepMeters. Вынесено: cr-tz1-drive-gps-warnings.js (после cr-tz1-route-role-segments; до [v15]).
//  [v15] Якорь: timed warnings + drive voice (getWarningPhase, buildTimedWarning, normalizeVoiceText, speakDriveInstruction, …). Вынесено: cr-tz1-drive-voice-timed-warnings.js (после [v14]; до [v18]).
//  [v18] Якорь: DRIVE HUD timed + lane — getDriveTimedWarning, getHeldTimedWarning, buildLaneGuidanceText, getDriveLaneGuidance. Вынесено: cr-tz1-drive-lane-timed-hud.js (после [v15]; до [v21]).
//  [v21] Якорь: «условия впереди» — getUpcomingCondition. Вынесено: cr-tz1-drive-upcoming-condition.js (после [v18]; до [v19]).
//  [v19] Якорь: главная подсказка Drive HUD — getCleanDriveMainInstruction, formatDriveMeters, getDriveIcon, … Вынесено: cr-tz1-drive-main-instruction.js (после [v21]; до [v17]).
//  [v17] Якорь: VOICE NAV — speakStartNavigation, maybeSpeakDriveNavigation, buildTurnVoiceText, … Вынесено: cr-tz1-drive-voice-nav-turns.js (после [v19]; до [v10]).
//  [v16] Якорь: AI voice / advice / reroute speak (getAIAdviceText, speakCurrentDecision, buildRerouteVoiceText, …). Вынесено: cr-tz1-drive-voice-ai-advice.js (после cr-ai-decision-layer; до [v22]).
//  [v22] Якорь: live GPS Drive — watchPosition, handleLiveDrivePosition, handleOffRouteRecalculation, evaluateReroute, renderDriveAlertDecision. Вынесено: cr-tz1-drive-live-gps-tracking.js (после [v16]; до [v03]).
//  [v09] Якорь: "ENTRY POINT" — window.initMap = initMap (не отрывать от объявления initMap без регрессии).
//  Средняя часть файла: множество блоков с "// ============================================================" — выносить подсекциями
//  (initMap тело, маршруты, голос, drive) только после согласования границ.
//  [⚠] Якорь: "GLOBAL STATE" — ранний вынос не рекомендуется (общие let/map/directionsService).
//  [⚠] Зона высокого риска: полное тело function initMap / calculateRoutesUnified + __CLEAR_ROAD_ROUTE_CALC_CORE__ — отдельное ТЗ.
//  Метаданные: CLEAR_ROAD_MAINTAINER_INDEX, __CLEAR_ROAD_ROUTE_CANON__ — не дублировать при выносе без обновления канона.
// ============================================================
//  PATCH POLICY — заморозка monkey-patching (maintainer contract)
//  Не добавлять новые IIFE/слои, которые переназначают:
//    window.calculateRoutes | window.setLang | window.renderResults |
//    window.initMap | ( DirectionsService.prototype — не патчить; трекинг запросов — обёртка экземпляра directionsService )
//  Новая логика — через явные функции и вызовы из существующего канала
//  маршрута: единая calculateRoutesUnified + window.__CLEAR_ROAD_ROUTE_CALC_CORE__ (см. cr-fix-route-empty-state-final-v2),
//  либо через отдельный модуль после выноса ядра, а не новые обёртки здесь.
// ============================================================
//  ROUTE CANON — единственный источник правды по вызову маршрута
//  calculateRoutes:
//    Публичная функция: calculateRoutesUnified (markers: __crEmptyStateFinalV2, __crRouteUnified).
//    Ядро UAE: window.__CLEAR_ROAD_ROUTE_CALC_CORE__ (= calculateRoutesTZ2Final).
//    Шаги внутри unified: clearRoadTZ7PatchDirectionsRoute → await core →
//    clearRoadTZ7ScheduleAfterCalculateRoutes → clearRoadTZ6bScheduleApplyAll.
//  initMap (снаружи → внутрь, финальный window.initMap после всех скриптов):
//    1. cr-empty-state-directions            (window.__crEmptyStateInitMapHookV2 → initMapCrEmptyStateDirectionsHook)
//    2. cr-tz1-tz2-final-patch             (marker: __crTz12Patched → initMapTZ1TZ2Final)
//    3. TZ2 UAE map                        (impl: initMapTZ2Final; ядро карты)
//  Решение «лучший маршрут» (этап 1 SSOT): window.buildRealDecision (= __CLEAR_ROAD_ROUTE_DECISION_SSOT__);
//    вспомогательно clearRoadOfficialBestRoute; ранг ядра: __CLEAR_ROAD_RANK_ROUTES__ (aiScore).
//  tz4BestByScore — только legacy текст/тай-брейк по route.score, не выбор маршрута.
// ============================================================
window.__CLEAR_ROAD_ROUTE_CANON__ = Object.freeze({
  version: "2026-05-02-phase2-ssot",
  calculateRoutes: {
    public: { marker: "__crEmptyStateFinalV2", impl: "calculateRoutesUnified", also: "__crRouteUnified" },
    core: { ref: "__CLEAR_ROAD_ROUTE_CALC_CORE__", impl: "calculateRoutesTZ2Final" },
    hooks: [
      { id: "tz7", patch: "clearRoadTZ7PatchDirectionsRoute", after: "clearRoadTZ7ScheduleAfterCalculateRoutes" },
      { id: "tz6b", after: "clearRoadTZ6bScheduleApplyAll" }
    ]

function learnFromRouteChoice(route) {
  if (!route) return;

  const total = (userProfile.totalChoices || 0) + 1;
  userProfile.totalChoices = total;

  const currentStress = route.stressScore || 0;
  const currentComplexity = route.complexity || 0;

  userProfile.avgChosenStress =
    userProfile.avgChosenStress == null
      ? currentStress
      : ((userProfile.avgChosenStress * (total - 1)) + currentStress) / total;

  userProfile.avgChosenComplexity =
    userProfile.avgChosenComplexity == null
      ? currentComplexity
      : ((userProfile.avgChosenComplexity * (total - 1)) + currentComplexity) / total;

  const noTollChoices = route.tollCost === 0;
  const calmChoice = currentStress <= 8;
  const fastChoice = route.index === (_fastestRoute && _fastestRoute.index);

  if (total >= 3) {
    if (noTollChoices) userProfile.prefersNoTolls = true;
    if (calmChoice)    userProfile.prefersCalmRoutes = true;
    if (fastChoice)    userProfile.prefersFastest = true;
  }

  saveUserProfile();
}

function getPersonalizationBias(route) {
  let bias = 0;

  if (userProfile.prefersNoTolls && route.tollCost === 0) {
    bias -= 2.5;
  }

  if (userProfile.prefersCalmRoutes) {
    bias -= (route.stressScore || 0) * 0.35;
  }

  if (userProfile.prefersFastest) {
    bias -= ((route.time - (_fastestRoute ? _fastestRoute.time : route.time)) / 60) * 0.8;
  }

  if (userProfile.avgChosenComplexity != null) {
    const complexityGap = Math.abs((route.complexity || 0) - userProfile.avgChosenComplexity);
    bias += complexityGap * 0.15;
  }

  if (userProfile.avgChosenStress != null) {
    const stressGap = Math.abs((route.stressScore || 0) - userProfile.avgChosenStress);
    bias += stressGap * 0.2;
  }

  return bias;
}

  if (userProfile.prefersNoTolls)    return t("pers_no_tolls");

  return "";
}

function generateProfileAwareWhy(route, allRoutes) {
  const road = getRouteSummaryName(route);
  const stress = route.stressScore || 0;

  if (userProfile.prefersCalmRoutes && stress <= 8) {
    return `Matches your calm driving style via ${road}`;
  }
  if (userProfile.prefersNoTolls && route.tollCost === 0) {
    return `Matches your no-tolls preference via ${road}`;
  }
  if (userProfile.prefersFastest && _fastestRoute && route.index === _fastestRoute.index) {
    return `Matches your fastest-route style via ${road}`;
  }
  return "";
}

function getTimingDecisionHint() {
  if (!_departureDecision || _departureDecision.type === "neutral") return "";
  if (_departureDecision.type === "wait") {
    return `Better to leave in ${_departureDecision.waitMinutes} min`;
  }
  if (_departureDecision.type === "leave_now") {
    return t("dep_leave_now");
  }
  return "";
}

function getUnifiedRouteMeta(route) {
  const stress = getStressBadge(route.stressScore || 0);
  const personality = route.drivePersonality || "Steady drive";
  const delay = route.delayMinutes || 0;
  const delayText = delay === 0 ? "0 min delay" : `+${delay} min delay`;
  return {
    stressLabel: stress.label,
    stressTone: stress.tone,
    personality,
    delayText
  };
}

function generateUnifiedDecisionWhy(route, allRoutes) {
  const road = getRouteSummaryName(route);
  const profileWhy = generateProfileAwareWhy(route, allRoutes);
  const timingHint = getTimingDecisionHint();

  if (profileWhy) return profileWhy;

  const others = (allRoutes || []).filter(r => r.index !== route.index);
  if (!others.length) return `Best available route via ${road}`;

  const fastestAlt = others.reduce((a, b) =>
    getDisplayMinutes(a) < getDisplayMinutes(b) ? a : b
  );
  const diff = getDisplayMinutes(fastestAlt) - getDisplayMinutes(route);

  if (route.tollCost === 0 && fastestAlt.tollCost > 0 && Math.abs(diff) <= 3) {
    return `No tolls with similar time via ${road}`;
  }
  if (diff > 0 && route.stressScore <= (fastestAlt.stressScore || 999)) {
    return `${diff} min faster with smoother drive via ${road}`;
  }
  if (trafficRank(route.traffic) < trafficRank(fastestAlt.traffic)) {
    return `Less traffic than faster alternatives via ${road}`;
  }
  if ((route.stressScore || 0) + 2 < (fastestAlt.stressScore || 0)) {
    return `Lower-stress route via ${road}`;
  }
  if (timingHint && route.index === (_bestRoute && _bestRoute.index)) {
    return `${timingHint} via ${road}`;
  }
  return `Best overall balance via ${road}`;
}

function speakText(text, priority = "normal") {
  if (!voiceEnabled || !text) return;
  if (!("speechSynthesis" in window)) {
    console.warn("Speech synthesis is not supported in this browser.");
    return;
  }
  try {
    const normalized = normalizeVoiceText(stripHtml(text));
    if (!normalized) return;

    const now = Date.now();
    if (normalized === lastSpokenText && now - lastSpokenAt < 5000) return;

    // Urgent maneuver warnings may interrupt; normal AI explanations should queue naturally.
    if (priority === "urgent") window.speechSynthesis.cancel();
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();

    const utter = buildNativeUtterance(normalized, priority);
    if (!utter) return;

    lastSpokenText = normalized;
    lastSpokenAt = now;
    window.speechSynthesis.speak(utter);
  } catch (e) {
    console.warn("speech failed", e);
  }
}


function stripHtml(value) {
  return String(value || "")
    .replace(/<[^>]*>/g, " ")
    .replace(/&nbsp;/g, " ")
    .replace(/&amp;/g, "&")
    .replace(/\s+/g, " ")
    .trim();
}

function translateConfidenceForVoice(conf) {
  const c = String(conf || "").toUpperCase();
  if (currentLang === "ru") return c === "HIGH" ? "высокая" : c === "MEDIUM" ? "средняя" : "низкая";
  if (currentLang === "ua") return c === "HIGH" ? "висока" : c === "MEDIUM" ? "середня" : "низька";
  if (currentLang === "ar") return c === "HIGH" ? "عالية" : c === "MEDIUM" ? "متوسطة" : "منخفضة";
  return c === "HIGH" ? "high" : c === "MEDIUM" ? "medium" : "low";
}

function translateTrafficForVoice(traffic) {
  const tr = String(traffic || "stable");
  if (currentLang === "ru") return tr === "high" ? "плотный" : tr === "medium" ? "умеренный" : "стабильный";
  if (currentLang === "ua") return tr === "high" ? "щільний" : tr === "medium" ? "помірний" : "стабільний";
  if (currentLang === "ar") return tr === "high" ? "كثيف" : tr === "medium" ? "متوسط" : "مستقر";
  return tr === "high" ? "heavy" : tr === "medium" ? "moderate" : "stable";
}

// ── Step Stability ──

function getDistanceToStepStartMeters(step, userLatLng) {
  if (!step?.start_location || !userLatLng) return null;
  return google.maps.geometry.spherical.computeDistanceBetween(userLatLng, step.start_location);
}

function isStepActuallyReached(step, userLatLng) {
  const d = getDistanceToStepEndMeters(step, userLatLng);
  return d != null && d <= STEP_REACHED_RADIUS_M;
}

function findBestCurrentStepIndex(routeObj, userLatLng, fromIndex) {
  const steps = routeObj.route.legs[0].steps;
  const now   = Date.now();
  const start = Math.max(0, fromIndex - 1);
  const end   = Math.min(steps.length - 1, fromIndex + 2);
  let bestIndex = fromIndex;
  let bestScore = Infinity;

  for (let i = start; i <= end; i++) {
    const step        = steps[i];
    const distToEnd   = getDistanceToStepEndMeters(step, userLatLng) ?? 999999;
    const distToStart = getDistanceToStepStartMeters(step, userLatLng) ?? 999999;
    const reachedPenalty = isStepActuallyReached(step, userLatLng) ? 1000 : 0;
    const futurePenalty  = i > fromIndex ? 120 : 0;
    const score = distToEnd + distToStart * 0.35 + futurePenalty + reachedPenalty;
    if (score < bestScore) { bestScore = score; bestIndex = i; }
  }

  if (bestIndex !== lastStableStepIndex && now - lastStepSwitchAt < STEP_SWITCH_COOLDOWN_MS) {
    return lastStableStepIndex;
  }
  if (bestIndex > fromIndex) {
    const distCurrentEnd = getDistanceToStepEndMeters(steps[fromIndex], userLatLng) ?? 999999;
    if (distCurrentEnd > NEXT_STEP_PREPARE_RADIUS_M) return fromIndex;
  }
  if (bestIndex !== lastStableStepIndex) { lastStableStepIndex = bestIndex; lastStepSwitchAt = now; }
  return bestIndex;
}

function getUpcomingMeaningfulStep(steps, currentIndex, routeObj) {
  for (let i = currentIndex + 1; i < steps.length; i++) {
    if (getStepWarningMeta(steps[i], routeObj.route)) return { index: i, step: steps[i] };
  }
  return null;
}

// ТЗ7: One-line route "personality" — how the drive will feel
function generateRoutePersonality(best) {
  const hwy = best.highwayShare || 0;
  const turns = best.complexity || 0;
  const traffic = best.traffic;

  // Scenario 4 (priority): busy / complex → stressful drive
  if (turns >= 12 || traffic === "high") {
    return "Busy route — expect frequent actions";
  }
  // Scenario 1: smooth highway
  if (hwy >= 0.7 && turns <= 8) {
    return "Smooth highway drive";
  }
  // Scenario 3: city driving
  if (hwy < 0.3) {
    return "City driving with turns";
  }
  // Scenario 2: mixed (0.3 ≤ hwy < 0.7)
  if (hwy >= 0.3 && hwy < 0.7) {
    return "Mixed city and highway";
  }
  // Fallback
  return "Standard route";
}

// ТЗ6: One-line "when to go" timing insight for best route
function generateTimeInsight(best) {
  const delay = best.delayMinutes || 0;
  const traffic = best.traffic;

  // Scenario 3: bad — wait
  if (delay > 5 || traffic === "high") {
    return t("pred_consider");
  }
  // Scenario 1: ideal — go now
  if (delay <= 2 && traffic === "low") {
    return t("pred_best_now");
  }
  // Scenario 2: ok — light delays
  if (delay <= 5 && traffic === "medium") {
    return t("pred_good_time");
  }
  // Fallback
  return t("pred_stable");
}

// One-line AI decision — always comparative, always factual
function generateAIDecision(best, routes) {
  const road = getRouteSummaryName(best);
  const others = (routes || []).filter(r => r.index !== best.index);

  if (!others.length) {
    return `Best available route via ${road}`;
  }

  const fastestAlt = others.reduce((a, b) => (a.time < b.time ? a : b));
  const calmestAlt = others.reduce((a, b) =>
    trafficRank(a.traffic) < trafficRank(b.traffic) ? a :
    trafficRank(a.traffic) > trafficRank(b.traffic) ? b :
    (a.delayMinutes || 0) <= (b.delayMinutes || 0) ? a : b
  );
  const simplestAlt = others.reduce((a, b) =>
    (a.complexity || 0) <= (b.complexity || 0) ? a : b
  );

  const bestMin = getDisplayMinutes(best);
  const fastestAltMin = getDisplayMinutes(fastestAlt);
  const bestDelay = best.delayMinutes || 0;
  const fastestAltDelay = fastestAlt.delayMinutes || 0;
  const bestTurns = best.complexity || 0;
  const fastestAltTurns = fastestAlt.complexity || 0;

  const timeAdvantage = fastestAltMin - bestMin;
  const delayAdvantage = fastestAltDelay - bestDelay;
  const turnAdvantage = fastestAltTurns - bestTurns;

  // 1. Best is actually the fastest
  if (timeAdvantage >= 1) {
    if (best.tollCost === 0 && fastestAlt.tollCost > 0) {
      return `${timeAdvantage} min faster with no tolls via ${road}`;
    }
    if (delayAdvantage >= 2) {
      return `${timeAdvantage} min faster with less delay via ${road}`;
    }
    return `${timeAdvantage} min faster than alternatives via ${road}`;
  }

  // 2. Similar time, but avoids tolls
  if (best.tollCost === 0) {
    const paidCloseAlt = others.find(r =>
      r.tollCost > 0 && Math.abs(getDisplayMinutes(r) - bestMin) <= 3
    );
    if (paidCloseAlt) {
      return `No tolls with similar time via ${road}`;
    }
  }

  // 3. Similar/faster alternatives exist, but best is calmer
  if (trafficRank(best.traffic) < trafficRank(fastestAlt.traffic)) {
    return `Less traffic than faster routes via ${road}`;
  }

  // 4. Similar/faster alternatives exist, but best has less delay
  if (delayAdvantage >= 2) {
    return `${delayAdvantage} min less delay via ${road}`;
  }

  // 5. Similar/faster alternatives exist, but best is easier to drive
  if (turnAdvantage >= 2) {
    return `${turnAdvantage} fewer turns than alternatives via ${road}`;
  }

  // 6. Best is calmer than the calmest close-time route
  const closeAlt = others.find(r => Math.abs(getDisplayMinutes(r) - bestMin) <= 2);
  if (closeAlt && trafficRank(best.traffic) < trafficRank(closeAlt.traffic)) {
    return `Calmer drive with similar time via ${road}`;
  }

  // 7. Best is simpler than the simplest close-time route
  if (closeAlt && bestTurns < (closeAlt.complexity || 0)) {
    return `Simpler route with similar time via ${road}`;
  }

  // 8. Fallback
  return `Best overall balance via ${road}`;
}

// ТЗ5: Decision insight — only 3 types (paid / fast / no tolls)
function getRouteInsight(r, best, fastest) {
  if (r.index === best.index) return "";

  const routeName = getRouteSummaryName(r);
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);
  const delayDiff = (r.delayMinutes || 0) - (best.delayMinutes || 0);
  const turnDiff = (r.complexity || 0) - (best.complexity || 0);

  // Faster but more stressful
  if (timeDiff < 0) {
    if (trafficRank(r.traffic) > trafficRank(best.traffic)) {
      return `${Math.abs(timeDiff)} min faster, but busier`;
    }
    if (delayDiff > 1) {
      return `${Math.abs(timeDiff)} min faster, but more delay`;
    }
    if (turnDiff > 1) {
      return `${Math.abs(timeDiff)} min faster, but more turns`;
    }
    return `${Math.abs(timeDiff)} min faster via ${routeName}`;
  }

  // Similar time, but avoids tolls
  if (timeDiff >= 0 && timeDiff <= 3 && r.tollCost === 0 && best.tollCost > 0) {
    return `No tolls, only ${timeDiff} min slower`;
  }

  // Slightly slower, but calmer
  if (timeDiff > 0 && timeDiff <= 4 && trafficRank(r.traffic) < trafficRank(best.traffic)) {
    return `${timeDiff} min slower, but calmer traffic`;
  }

  // Slightly slower, but less delay
  if (timeDiff > 0 && timeDiff <= 4 && delayDiff < 0) {
    return `${timeDiff} min slower, but less delay`;
  }

  // Slightly slower, but easier
  if (timeDiff > 0 && timeDiff <= 4 && turnDiff < 0) {
    return `${timeDiff} min slower, but fewer turns`;
  }

  // Cheaper paid route
  if (r.tollCost < best.tollCost && r.tollCost > 0) {
    return `Lower toll cost`;
  }

  // Toll-free general
  if (r.tollCost === 0 && best.tollCost > 0) {
    return `Toll-free alternative`;
  }

  return "";
}

function getAlternativeTitle(r, best, fastest) {
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);

  if (r.index === fastest.index && r.index !== best.index) {
    return "Fastest option";
  }

  if (r.tollCost === 0 && best.tollCost > 0) {
    return "No tolls route";
  }

  if (trafficRank(r.traffic) < trafficRank(best.traffic) && timeDiff <= 3) {
    return "Calmer option";
  }

  if ((r.complexity || 0) < (best.complexity || 0) && timeDiff <= 3) {
    return "Simpler route";
  }

  if (timeDiff <= 2) {
    return `Similar time via ${getRouteSummaryName(r)}`;
  }

  return `Alternative via ${getRouteSummaryName(r)}`;
}

function getFallbackAlternativeInsight(r, best) {
  const routeName = getRouteSummaryName(r);
  const timeDiff = getDisplayMinutes(r) - getDisplayMinutes(best);
  const delayDiff = (r.delayMinutes || 0) - (best.delayMinutes || 0);
  const turnDiff = (r.complexity || 0) - (best.complexity || 0);

  if (timeDiff < 0) {
    return `${Math.abs(timeDiff)} min faster via ${routeName}`;
  }

  if (timeDiff === 0 && r.tollCost < best.tollCost) {
    return `Same time, lower cost`;
  }

  if (timeDiff <= 2 && trafficRank(r.traffic) < trafficRank(best.traffic)) {
    return `Similar time, calmer traffic`;
  }

  if (timeDiff <= 2 && delayDiff < 0) {
    return `Similar time, less delay`;
  }

  if (timeDiff <= 3 && turnDiff < 0) {
    return `Similar time, fewer turns`;
  }

  if (r.tollCost === 0) {
    return `No tolls alternative`;
  }

  return `Alternative via ${routeName}`;
}

function generateNeutralWhy(route, bestRoute) {
  const points = [];
  const isBest = bestRoute && route.index === bestRoute.index;
  const diff = bestRoute ? getDisplayDiff(route, bestRoute) : 0;
  const absDiff = Math.abs(diff);

  if (isBest) {
    points.push(generateUnifiedDecisionWhy(route, analyzedRoutes));

    if ((route.delayMinutes || 0) === 0) {
      points.push("No added traffic delay right now");
    } else {
      points.push(`Includes about ${route.delayMinutes} min delay`);
    }

    if (route.tollCost > 0) {
      points.push(`${route.tollCost} AED tolls on this route`);
    } else {
      points.push("No tolls on this route");
    }
  } else {
    points.push(generateDecisionInsight(route, bestRoute));

    if (diff > 0) {
      points.push(`${absDiff} min slower than recommended`);
    } else if (diff < 0) {
      points.push(`${absDiff} min faster than recommended`);
    } else {
      points.push("Similar time to recommended");
    }

    if (route.tollCost > 0) {
      points.push(`${route.tollCost} AED tolls on this route`);
    } else {
      points.push("No tolls on this route");
    }
  }

  return points.filter(Boolean).slice(0, 3);
}

function generateDecisionInsight(route, bestRoute) {
  if (!bestRoute || route.index === bestRoute.index) return "";

  const diff = getDisplayDiff(route, bestRoute);
  const absDiff = Math.abs(diff);
  const routeDelay = route.delayMinutes || 0;
  const bestDelay = bestRoute.delayMinutes || 0;
  const routeTurns = route.complexity || 0;
  const bestTurns = bestRoute.complexity || 0;

  // Faster, but worse trade-off
  if (diff < 0) {
    if (trafficRank(route.traffic) > trafficRank(bestRoute.traffic)) {
      return `${absDiff} min faster, but busier`;
    }
    if (routeDelay > bestDelay + 1) {
      return `${absDiff} min faster, but more delay`;
    }
    if (routeTurns > bestTurns + 1) {
      return `${absDiff} min faster, but more turns`;
    }
    if (route.tollCost > bestRoute.tollCost) {
      return `${absDiff} min faster, but higher tolls`;
    }
    return `${absDiff} min faster alternative`;
  }

  // Slightly slower, but avoids tolls
  if (diff > 0 && diff <= 4 && route.tollCost === 0 && bestRoute.tollCost > 0) {
    return `${diff} min slower, but no tolls`;
  }

  // Slightly slower, but calmer
  if (diff > 0 && diff <= 4 && trafficRank(route.traffic) < trafficRank(bestRoute.traffic)) {
    return `${diff} min slower, but calmer traffic`;
  }

  // Slightly slower, but less delay
  if (diff > 0 && diff <= 4 && routeDelay < bestDelay) {
    return `${diff} min slower, but less delay`;
  }

  // Slightly slower, but simpler
  if (diff > 0 && diff <= 4 && routeTurns < bestTurns) {
    return `${diff} min slower, but fewer turns`;
  }

  // Similar time, but lower tolls
  if (diff === 0 && route.tollCost < bestRoute.tollCost) {
    return "Similar time, lower toll cost";
  }

  // Similar time, but calmer
  if (Math.abs(diff) <= 1 && trafficRank(route.traffic) < trafficRank(bestRoute.traffic)) {
    return "Similar time, calmer traffic";
  }

  return `Alternative via ${getRouteSummaryName(route)}`;
}

// ТЗ-1: safe ETA difference formatter.
// Fixes JS floating point noise in ETA comparison.
// and prevents negative ETA comparison from being shown to the user.
function tz1EtaDiffMinutes(route, bestRoute) {
  const routeMin = Number(typeof _tz1Minutes === "function" ? _tz1Minutes(route) : 0);
  const bestMin = Number(typeof _tz1Minutes === "function" ? _tz1Minutes(bestRoute || route) : routeMin);
  if (!Number.isFinite(routeMin) || !Number.isFinite(bestMin)) return 0;
  const rounded = Math.round(routeMin - bestMin);
  return Math.abs(rounded) < 1 ? 0 : rounded;
}

function tz1FormatEtaVsBest(route, bestRoute, isBest) {
  if (isBest) return "Best route";
  const diff = tz1EtaDiffMinutes(route, bestRoute);
  if (diff <= 0) return "Same as best";
  return "+" + diff + " min vs best";
}

const FILTERS_KEY = "clearRoadUAE.filters.v1";
let userFilters = (() => {
  try { return Object.assign({ avoid_highways: false, fewer_turns: false }, JSON.parse(localStorage.getItem(FILTERS_KEY))); }
  catch { return { avoid_highways: false, fewer_turns: false }; }
})();

function toggleFilter(key) {
  if (!(key in userFilters)) return;
  userFilters[key] = !userFilters[key];
  try { localStorage.setItem(FILTERS_KEY, JSON.stringify(userFilters)); } catch {}
  document.querySelectorAll(".filter-btn").forEach(b =>

  );

const SAVED_PLACES_KEY = "clearRoadUAE.savedPlaces.v1";

function getSavedPlaces() {
  try {
    const raw = localStorage.getItem(SAVED_PLACES_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function getSavedPlace(type) {
  const places = getSavedPlaces();
  const v = places[type];
  return (typeof v === "string" && v.trim()) ? v.trim() : null;
}

function savePlace(type, value) {
  if (typeof value !== "string" || !value.trim()) return false;
  try {
    const places = getSavedPlaces();
    places[type] = value.trim();
    localStorage.setItem(SAVED_PLACES_KEY, JSON.stringify(places));
    return true;
  } catch (e) {
    return false;
  }
}

// Triggered by single-click on Home/Work quick-item
function setDestination(place) {
  let address = getSavedPlace(place);

  if (!address) {
    // First-time: ask for address
    const input = window.prompt(`Enter your ${place} address:`);
    if (input === null) return;          // user cancelled
    const trimmed = input.trim();
    if (!trimmed) return;                // don't overwrite with empty
    if (!savePlace(place, trimmed)) return;
    address = trimmed;
  }

  const endField = document.getElementById("end");
  if (!endField) return;
  endField.value = address;
  if (typeof calculateRoutes === "function") {
    calculateRoutes();
  }
}

// Triggered by double-click — lets the user update a saved place without UI change
function updateSavedPlace(place) {
  const current = getSavedPlace(place) || "";
  const input = window.prompt(`Update your ${place} address:`, current);
  if (input === null) return;
  const trimmed = input.trim();
  if (!trimmed) return;                  // don't overwrite with empty
  if (!savePlace(place, trimmed)) return;
  const endField = document.getElementById("end");
  if (endField) endField.value = trimmed;
  if (typeof calculateRoutes === "function") calculateRoutes();
}
